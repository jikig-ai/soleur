# Compound Promotion Loop — live opt-in config.
#
# DATA FLOW (read before flipping enabled to true):
# - Enabling sends summaries (path + first 10 lines) of your
#   knowledge-base/project/learnings/ files to Anthropic for clustering.
# - The pre-promotion GDPR shell pre-pass excludes any learning matching
#   the canonical PII regex (email, IPv4, IBAN, API-key shapes) BEFORE the
#   Anthropic call.
# - Opens public draft PRs whose bodies quote source-learning paths and the
#   proposed diff. PR bodies are world-readable on the public repo.
# - Kill switch: set `enabled: false` and commit; next cron tick exits no-op.
#
# Flipping to true requires a committed PR that operators can review. The
# .example file (promotion-config.yml.example) is documentation only.
# See knowledge-base/engineering/operations/runbooks/compound-promote-runbook.md.
# Default: OFF. Enabled 2026-07-06 (#6039) — operator dogfood; loop opens
# human-gated draft PRs (never auto-merges). Kill switch: set false + commit.
# Issue: #2720.
enabled: true
