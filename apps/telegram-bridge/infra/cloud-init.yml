#cloud-config
package_update: true
packages:
  - curl
  - jq

groups:
  - docker

users:
  - default
  - name: deploy
    groups: docker
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - restrict,command="/usr/local/bin/ci-deploy.sh" ${deploy_ssh_public_key}

write_files:
  - path: /etc/ssh/sshd_config.d/01-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      MaxAuthTries 3
      LoginGraceTime 30
      PermitRootLogin prohibit-password
      AllowUsers root deploy
      ClientAliveInterval 300
      ClientAliveCountMax 2
    owner: root:root
    permissions: '0644'
  - path: /etc/sudoers.d/deploy-chown
    content: |
      deploy ALL=(root) NOPASSWD: /usr/bin/chown 1001\:1001 /mnt/data/workspaces
    owner: root:root
    permissions: '0440'

  # CI deploy forced command script. The CI SSH key in authorized_keys uses:
  #   restrict,command="/usr/local/bin/ci-deploy.sh" ssh-ed25519 AAAA... ci-deploy-2026@soleur-bridge
  # This restricts the CI key to only execute deploy commands (see #747).
  # Content injected from ci-deploy.sh via Terraform base64encode(file()) -- do not inline.
  - path: /usr/local/bin/ci-deploy.sh
    encoding: b64
    content: ${ci_deploy_script_b64}
    owner: root:root
    permissions: '0755'

runcmd:
  # Apply SSH hardening immediately (drop-in written by write_files above)
  - systemctl restart sshd

  # Install Doppler CLI (for secrets injection)
  - curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sh
  # Persist Doppler token for deploy user (read by SSH forced commands via /etc/environment)
  - echo "DOPPLER_TOKEN=${doppler_token}" >> /etc/environment

  # Install Docker
  - curl -fsSL https://get.docker.com | sh

  # Configure Docker log rotation
  - |
    cat > /etc/docker/daemon.json << 'DOCKEREOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "10m",
        "max-file": "3"
      }
    }
    DOCKEREOF
  - systemctl restart docker

  # Mount volume (Hetzner pre-formats with ext4 via Terraform)
  - mkdir -p /mnt/data
  - mount /dev/disk/by-id/scsi-0HC_Volume_* /mnt/data || true
  - echo '/dev/disk/by-id/scsi-0HC_Volume_* /mnt/data ext4 defaults 0 2' >> /etc/fstab

  # Create .env placeholder and grant deploy user ownership of /mnt/data
  # (deploy user writes .env vars and manages containers via CI/CD)
  #
  # After provisioning, populate /mnt/data/.env with secrets.
  # See apps/telegram-bridge/.env.example (bridge keys) and
  #     apps/web-platform/.env.example (platform keys).
  # Both containers read from this single shared file.
  - touch /mnt/data/.env
  - chmod 600 /mnt/data/.env
  - chown -R deploy:deploy /mnt/data

  # Pull and run container (prefer Doppler secrets, fall back to /mnt/data/.env)
  - docker pull ${image_name}
  - |
    ENV_FILE="/mnt/data/.env"
    DOPPLER_TOKEN="${doppler_token}"
    export DOPPLER_TOKEN
    if command -v doppler >/dev/null 2>&1 && [ -n "$DOPPLER_TOKEN" ]; then
      TMPENV=$(mktemp /tmp/doppler-env.XXXXXX)
      chmod 600 "$TMPENV"
      if doppler secrets download --no-file --format docker --project soleur --config prd > "$TMPENV" 2>/dev/null; then
        ENV_FILE="$TMPENV"
      else
        rm -f "$TMPENV"
      fi
    fi
    docker run -d \
      --name soleur-bridge \
      --restart unless-stopped \
      --env-file "$ENV_FILE" \
      -v /mnt/data:/home/soleur/data \
      -p 127.0.0.1:8080:8080 \
      ${image_name}
    if [ "$ENV_FILE" != "/mnt/data/.env" ]; then rm -f "$ENV_FILE"; fi
