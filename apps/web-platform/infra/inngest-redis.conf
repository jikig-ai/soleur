# Self-hosted Redis for the Inngest durable queue/run-state (#5450).
#
# Inngest's queue + run-state live in Redis (Postgres holds only config/history —
# Phase-0 spike, runbook § Durable backend). The default in-memory Redis loses
# armed future-`ts` reminders on a host re-provision; this durable instance with
# AOF on the persistent /mnt/data volume is what survives.
#
# requirepass is NOT set here — it is injected at runtime from Doppler prd via
# the inngest-redis.service ExecStart (`--requirepass "$INNGEST_REDIS_PASSWORD"`)
# so the secret never lands in a committed file or the systemd journal.

# Loopback only — Inngest connects over 127.0.0.1; never expose Redis publicly.
bind 127.0.0.1 -::1
protected-mode yes
port 6379

# Durability: append-only file on the persistent volume, fsync every second
# (the AOF is the queue's survival mechanism across a root-disk wipe).
dir /mnt/data/redis
appendonly yes
appendfsync everysec
# Bound the AOF so a runaway cannot fill /mnt/data and starve the co-located
# workspaces volume (spec-flow P2-3): rewrite when it doubles, min 64mb.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# noeviction: NEVER evict jobs — a full store fails writes loudly rather than
# silently dropping an armed reminder. maxmemory bounds RSS well under the
# inngest-redis.service MemoryMax (queue/run-state for alpha volume is small).
maxmemory 256mb
maxmemory-policy noeviction

# RDB snapshots are redundant with AOF for our durability goal and add disk
# churn; AOF is the source of truth.
save ""
