# systemd-journald drop-in — persistent + bounded host journal (#4792, #4773).
#
# Single source of truth. Rendered to /etc/systemd/journald.conf.d/00-soleur.conf
# via TWO paths that BOTH read this exact file (byte-identical by construction):
#   - cloud-init.yml write_files (fresh hosts) — base64encode(file()) templatefile var
#   - server.tf terraform_data.journald_persistent file provisioner (existing host)
# Mirrors the fail2ban-sshd.local two-path pattern.
#
# Why: PR #4786 (#4773) moved the soleur-web-platform container to
# `--log-driver journald`. Without Storage=persistent the journal runs volatile
# (RAM under /run, lost on reboot) and Vector's 3 journald sources read an
# empty/truncated /var/log/journal after any reboot. The explicit caps make the
# disk budget auditable in IaC instead of derived from a kernel default that
# changes silently with disk size.
#
# Sizing (cx33, ~80 GB root /; authoritative number is the apply-time `df /`):
#   SystemMaxUse=1G   — hard cap on the on-disk journal (~1.25% of /). Holds days
#                       of supervisor journald + the app-container pino volume
#                       (the on-disk journal retains ALL levels; Vector filters
#                       to level>=40 only at egress).
#   SystemKeepFree=2G — LOAD-BEARING safety floor: journald stops writing if free
#                       space on / drops below 2 GB, so the journal can never be
#                       the cause of a full-disk outage. Overrides SystemMaxUse
#                       when disk is tight.
#   RuntimeMaxUse=200M — bounds the volatile /run journal during the boot window
#                        before /var/log/journal is flushed.
[Journal]
Storage=persistent
SystemMaxUse=1G
SystemKeepFree=2G
RuntimeMaxUse=200M
