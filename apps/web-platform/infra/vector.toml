# Vector agent config — ships journald + host_metrics to Better Stack Logs.
#
# Co-located with inngest-server.service on the Hetzner VM. Provisioned by
# inngest-bootstrap.sh (binary install) + vector.tf (version pin) +
# vector.service systemd unit. Doppler `prd` injects BETTERSTACK_LOGS_TOKEN
# + SENTRY_USERID_PEPPER at ExecStart time.
#
# Sink shape (#4293): generic HTTP sink against Better Stack is the canonical
# vendor-recommended pattern (per https://betterstack.com/docs/logs/vector/).
# The native `better_stack_logs` sink does NOT exist — Vector PR #19274
# (proposed sink, opened 2023-11-30) was closed unmerged 2025-01-27.
# Strategic single-provider consolidation question tracked in #4296 (60-day
# re-decision).
#
# PII redaction (#4293): three VRL transforms run before the sink —
# pii_scrub_drop_userdata (Art-9 user-content key drop) → pii_scrub_structured
# (userId → userIdHash via HMAC-SHA256 reusing SENTRY_USERID_PEPPER per
# ADR-029 §I4) → pii_scrub_string (regex backstop for non-pino / kernel-oops
# lines, runs ONLY when the structured branch did not parse).

data_dir = "/var/lib/vector"

# ---------------- Source 1: inngest-server journald (WARN+) ----------------
# Filter by syslog priority via `include_matches.PRIORITY`. INFO+DEBUG
# (5,6,7) drop at source — keeps the log quota focused on signal.
# 0=EMERG, 1=ALERT, 2=CRIT, 3=ERR, 4=WARNING.
[sources.inngest_journald]
type = "journald"
include_units = ["inngest-server.service"]
include_matches.PRIORITY = ["0", "1", "2", "3", "4"]
journal_directory = "/var/log/journal"
batch_size = 16

# ---------------- Source 2: system journald (CRIT+) ----------------
# Kernel oops, OOM-killer, networking drops — anything CRIT or worse at
# the host level. Tighter filter (PRIORITY 0-2) than the inngest source.
[sources.system_journald]
type = "journald"
exclude_units = ["inngest-server.service", "vector.service"]
include_matches.PRIORITY = ["0", "1", "2"]
journal_directory = "/var/log/journal"
batch_size = 16

# ---------------- Source 3: app container journald (#4773) ----------------
# The Next.js app runs as the `soleur-web-platform` Docker container, whose
# pino stdout (incl. `spawnClaudeEval` cron output, `fn: cron-<name>`) was NOT
# shipped to Better Stack — only the inngest CLI supervisor's systemd journald
# (Source 1) was. cloud-init.yml + ci-deploy.sh now start the container with
# `--log-driver journald`, so its stdout/stderr land in the host journal tagged
# CONTAINER_NAME=soleur-web-platform (Docker's journald driver sets this field).
# The canary container ALSO logs to journald (ci-deploy.sh) but is excluded here
# as an implicit consequence of exact-value matching: systemd `include_matches`
# is FIELD=value equality (sd_journal_add_match), not prefix/substring, so
# `["soleur-web-platform"]` never matches `soleur-web-platform-canary`. Canary
# journald coverage is intentionally local-only (docker logs), not warehoused —
# do NOT widen this to a prefix/regex (would double Better Stack quota). A
# parity fixture in vector-pii-scrub.test.sh pins the exclusion.
#
# NO `include_matches.PRIORITY` filter (deliberate — differs from Sources 1/2):
# pino writes EVERY level to fd 1 (stdout) with no `destination` configured
# (server/logger.ts:102), and Docker's journald driver maps fd 1 → PRIORITY 6
# uniformly regardless of pino level. A PRIORITY 0-4 (WARN+) match would
# therefore drop 100% of pino lines. Level filtering happens by parsing the
# pino JSON `level` field in `app_container_warn_filter` below instead.
[sources.app_container_journald]
type = "journald"
include_matches.CONTAINER_NAME = ["soleur-web-platform"]
journal_directory = "/var/log/journal"
batch_size = 16

# ---------------- Filter: app container WARN+ (pino level >= 40) ----------------
# Quota control (#4773 Vendor-tier reality check): the app container's stdout is
# higher-volume than the supervisor journald (cron INFO output + scattered
# logger.info; there is no per-request pino-http logger, so this is not a
# request-per-line firehose — the WARN+ cut is conservative headroom, not a
# hard necessity). Keep only pino WARN/ERROR/FATAL (level >= 40) so the INFO
# volume does
# not blow the Better Stack quota; the cron FAILURE reason (non-zero exit stderr,
# logged at error level) is the load-bearing signal here. The INFO-level
# max-turns notice still reaches Sentry via SpawnResult.stdoutTail (PR-A) — this
# Better Stack path is for queryable WARN+ diagnosis, per the plan trade-off.
# Non-JSON lines (container crash / uncaught-exception stack on fd 2) are kept.
[transforms.app_container_warn_filter]
type = "filter"
inputs = ["app_container_journald"]
condition = '''
parsed, parse_err = parse_json(.message)
if parse_err != null {
  true
} else if is_object(parsed) {
  parsed_obj = object!(parsed)
  level_int = to_int(parsed_obj.level) ?? 0
  level_int >= 40
} else {
  true
}
'''

# ---------------- Source 4: host-script journald (logger -t tags) (#5499, #6178) ----------------
# Thirteen bash scripts under apps/web-platform/infra/ log operational events to
# the journal via `logger -t <LOG_TAG>`. They run under webhook.service / cron on
# the web hosts, or (the #6178 cutover trio: inngest-cutover-flip +
# inngest-server-flip-guard) as systemd oneshot/ExecStartPre on the dedicated
# Inngest host — NOT inside inngest-server.service (Source 1) nor the app container
# (Source 3) — and their PRIORITY 5 (user.notice; ci-deploy.sh:665 is PRIORITY 4
# user.warning) lines are dropped by Source 2's PRIORITY 0-2 (CRIT+) filter, so
# they are invisible in Better Stack today. This source captures them by EXACT
# SYSLOG_IDENTIFIER match (`logger -t <tag>` sets SYSLOG_IDENTIFIER=<tag>;
# systemd include_matches is sd_journal_add_match exact-value equality, NOT
# prefix/regex — a tag typo silently matches nothing).
#
# NO `include_matches.PRIORITY` filter (deliberate — differs from Sources 1/2):
# these lines are PRIORITY 4-6 (the #6536 inngest-heartbeat channel is PRIORITY 5-6),
# which Source 2 drops; the SYSLOG_IDENTIFIER scoping to 14 known tags is already
# the narrowing. We do NOT widen
# system_journald's PRIORITY filter — that would ship every host NOTICE+ line
# (sshd, cron, systemd units, fail2ban) and blow the Better Stack logs quota
# (per the 2026-06-10 quota-diagnosis learning + #5110 verdict).
#
# Quota (#5110 reality check): 13 of the 14 are event-driven (deploy/webhook/cron-fire/
# cutover-flip), not continuous request-per-line firehoses — projected
# tens-to-low-hundreds of rows/day, well within the ~20% headroom under 25k/day.
#
# `inngest-heartbeat` (#6536) is the ONE exception. The unit still FIRES every 60s, but as
# of #6617b its dark-arm row is rate-limited to one per hour (`dark_arm_emit_due` in
# inngest-bootstrap.sh), so it costs ~24 rows/day on the dedicated host — NOT the ~1,440
# this comment claimed before that change. See the Source 4 note below, which states the
# same ~24 figure; the two must not drift apart again. (The co-located web host renders no
# dark arm and emits NO success-path row, so it adds ~0.)
#
# Steady-state delta is now a real SAVING, where pre-#6617b it was roughly neutral: the
# `Failed to start` storm this replaced was itself shipping ~1,240 rows/day — though via a
# mechanism this file does not explain (a live row carries SYSLOG_IDENTIFIER=systemd, which
# NO source here admits; tracked separately).
#
# Rate-limited, NOT transition-only: what the ~24 buys is best-effort dark-host evidence the
# host never had, and "emit once" or "emit on transition" would make a DEAD pusher and a
# healthy deliberately-dark one produce the identical observation — nothing. Best-effort
# because the script exits 0 regardless of whether `logger` succeeds, so ABSENCE of the row
# proves nothing (journald down looks like a healthy dark host). Presence proves the script
# ran; that is the whole claim. Deliberately NO success-path row on the URL-present path: at
# 60s that would add ~2,880/day to duplicate what the Better Stack heartbeat monitor already
# asserts.
#
# Adding a tag here is a quota decision; keep the list to genuinely-diagnostic
# host scripts, and treat any further timer-driven tag as a fresh quota decision.
# The drift-guard + no-PRIORITY-filter fixtures in
# vector-pii-scrub.test.sh pin this exact-tag set and the absent PRIORITY filter.
[sources.host_scripts_journald]
type = "journald"
include_matches.SYSLOG_IDENTIFIER = [
  "infra-config-apply",
  "infra-config-install",
  "ci-deploy",
  "inngest-enumerate-reminders",
  "inngest-rearm-reminders",
  "inngest-wiped-volume-verify",
  "inngest-inventory",
  "git-lock-chardevice-sweep",
  # #6178 webhook-exec diagnosis: the adnanh/webhook binary runs `-verbose`
  # (webhook.service ExecStart) and logs each hook match + command execution + any
  # fork/exec error to journald as SYSLOG_IDENTIFIER=webhook. Without this, a hook that
  # returns its success code (e.g. /hooks/infra-config → 202) while its command
  # SILENTLY fails to exec is undiagnosable off-box — exactly the state that stalled the
  # cutover infra-config delivery (handler never ran, host stuck at 13/15). Shipping the
  # webhook channel makes that exec failure self-report to Better Stack.
  "webhook",
  # #6178 cutover (ADR-100): the no-SSH flip-state + guard channels. Without these the
  # `inngest-cutover-flip` marker never reaches Better Stack and the P0-2 operator gate is
  # dead (the flip oneshot has no synchronous webhook response — Better Stack is the ONLY
  # off-box read of the deny-all-public dedicated host). inngest-server-flip-guard emits the
  # "refused a second prod scheduler" BLOCK event (P1-5). The two probes have a synchronous
  # workflow-response fallback so these are for post-hoc querying (redundant but useful).
  "inngest-cutover-flip",
  "inngest-server-flip-guard",
  "inngest-registry-probe",
  "inngest-doublefire-probe",
  # #6536: inngest-heartbeat.service exited non-zero every 60s for 3 days (3,724 fires) and
  # the stderr proving why never left the host — the unit set no SyslogIdentifier=, so systemd
  # tagged it with the ExecStart basename (`doppler`), which matches no source here. The
  # unit now sets SyslogIdentifier=inngest-heartbeat (inngest-bootstrap.sh) and this entry
  # ships that channel: BOTH the ping script's own dark-arm row AND the unit's raw
  # doppler/curl stderr. Source 4 is the ONLY viable home — the unit's output is PRIORITY 5-6
  # (SyslogLevel=info), which Source 1's PRIORITY 0-4 cut drops; this source has no PRIORITY
  # filter. Adding it to Source 1 instead is the trap the naive fix falls into.
  "inngest-heartbeat",
  # #6604: the daily LUKS at-rest probe (luks-monitor.timer → luks-monitor.sh, `logger -t
  # luks-monitor`) + the workspaces-luks-emit.sh discriminating-field emit. Without this tag the
  # drift log-lines never reach Better Stack and the soak's positive-control heartbeat query
  # (workspaces-luks-soak-6604.sh) has no channel to read — a dead probe would look identical to a
  # healthy silent one. Exact-value match: the units set SyslogIdentifier=luks-monitor / logger -t.
  "luks-monitor",
  # #6438 §1/§3 + #6548: the three web-host consumer/guard oneshot probes (web-*.service,
  # for_each var.web_hosts). Each declares SyslogIdentifier= (retagging the ExecStart basename
  # `bash`) so its fault-CLASSIFICATION stderr reaches Better Stack off-box, not SSH-only: the
  # heartbeat only says "suppressed", the journal line says WHY (zot 401 vs 404 vs 000; git-data
  # unreachable; NIC-guard "SOLEUR_PRIVATE_NIC direct-curl egress FAILED"). Same #6556 lesson as
  # inngest-heartbeat above. Exact-value match: the units set these SyslogIdentifier= tags.
  "web-zot-consumer-probe",
  "web-git-data-probe",
  "web-nic-guard",
  # #6617 (a/c): the dedicated inngest host's three remaining dark channels. Each entry here
  # is HALF a change — Source 4 is sd_journal_add_match EXACT-VALUE equality, so an entry
  # whose unit does not set that literal SyslogIdentifier= is a permanently-dead no-op that
  # reads like coverage. Two of these three were exactly that until #6617c set the tag:
  #   inngest-redis     — the unit set NO SyslogIdentifier=, so journald tagged it from the
  #                       ExecStart basename `doppler` (inngest-redis.service now sets it).
  #   inngest-nftables  — same, tagged `inngest-nftables.sh` WITH the .sh
  #                       (cloud-init-inngest.yml's unit now sets it).
  #   inngest-server-probe — new #6617a unit; declares the tag from birth.
  # journald-config.test.sh asserts each literal on BOTH sides. Quota: the two service
  # channels are event-driven (a boot + failures); the probe is HOURLY by design (~24 rows/
  # day) and lands in the SAME change that takes inngest-heartbeat's dark arm from ~1,440
  # rows/day to ~24 (#6617b), so this trio is a large net saving, not a new cost.
  #
  # DELIBERATELY ABSENT: `inngest-boot-phone-home`. It is a pure curl POST to the Better
  # Stack HTTP ingest and never calls `logger` — it has NO journald channel at all, so an
  # entry for it could never match anything. It already ships direct; the tag would buy a
  # dead line in an allowlist that is read as an inventory of live channels.
  "inngest-redis",
  "inngest-nftables",
  "inngest-server-probe",
]
journal_directory = "/var/log/journal"
batch_size = 16

# ---------------- Source 5: host metrics (CPU/mem/disk) ----------------
# 300s scrape (2026-06-10 quota fix) + trimmed collectors (2026-06-10 second
# pass — AC12 verdict FAIL on #5110: 198 rows/scrape = ~57k rows/day, 2.3x
# the 25k/day threshold; the 300s interval alone was insufficient). Measured
# per-scrape breakdown: filesystem 108 (4 metrics x 27 mountpoints, 21
# virtual-fs), network ~33, disk 24, cpu 20, memory/load ~13. Remedy: drop
# the network collector (no alert/runbook consumes it; uptime monitors +
# Sentry carry incident-grade signal) and allowlist filesystem to the three
# diagnostic mountpoints below (root capacity, Hetzner data volume, Vector's
# own buffer dir — /mnt/data is covered by NO other monitor; / is also
# covered by disk-monitor.sh). Predicted ~69 rows/scrape = ~19.9k rows/day
# (20% under threshold). Snap loop devices (loop*) and device-mapper (dm-*)
# stay excluded from the disk + filesystem collectors — pseudo-device series
# with no diagnostic signal.
# Decision record: knowledge-base/operations/expenses.md (Better Stack row);
# verdict tracker: #5110; strategic re-decision tracked in #4296.
[sources.host_metrics]
type = "host_metrics"
scrape_interval_secs = 300
collectors = ["cpu", "memory", "disk", "filesystem", "load"]

[sources.host_metrics.disk]
devices.excludes = ["loop*", "dm-*"]

[sources.host_metrics.filesystem]
devices.excludes = ["loop*", "dm-*"]
mountpoints.includes = ["/", "/mnt/data", "/var/lib/vector"]

# ---------------- Transform 1/3: drop user-content keys (Art-9) ----------------
# Pino consumers may carry user-supplied content via `{body, content, message,
# userMessage, prompt, chat_message, userInput, user_input}` keys (chat
# messages, AI prompts, support-ticket bodies — Art-9-class fragments per
# GDPR-gate Crit-5). Drop these AT THE VECTOR BOUNDARY before any HMAC /
# regex stage so they never reach Better Stack regardless of downstream
# transform correctness. Top-level only — nested forms (extra.body,
# ctx.message) are explicitly out-of-scope per ADR-029 §I2 boundary contract.
# Non-pino lines (kernel oops, raw stderr) fall through to pii_scrub_string.
[transforms.pii_scrub_drop_userdata]
type = "remap"
# app_container_warn_filter (#4773) is wired here, NOT direct to the sink, so
# the app container's pino lines traverse the full 3-stage redaction (Art-9 key
# drop → userId HMAC → string backstop) like every other source.
inputs = ["inngest_journald", "system_journald", "app_container_warn_filter", "host_scripts_journald"]
source = '''
.pii_scrub_applied = ""
parsed, parse_err = parse_json(.message)
if parse_err == null && is_object(parsed) {
  parsed_obj = object!(parsed)
  if exists(parsed_obj.body) { del(parsed_obj.body) }
  if exists(parsed_obj.content) { del(parsed_obj.content) }
  if exists(parsed_obj.message) { del(parsed_obj.message) }
  if exists(parsed_obj.userMessage) { del(parsed_obj.userMessage) }
  if exists(parsed_obj.prompt) { del(parsed_obj.prompt) }
  if exists(parsed_obj.chat_message) { del(parsed_obj.chat_message) }
  if exists(parsed_obj.userInput) { del(parsed_obj.userInput) }
  if exists(parsed_obj.user_input) { del(parsed_obj.user_input) }
  .message = encode_json(parsed_obj)
  .pii_scrub_applied = "drop_userdata"
}
'''

# ---------------- Transform 2/3: structured userId → userIdHash (HMAC) -------
# Defense-in-depth backstop for ADR-029 (pino formatters.log already renames
# pre-stdout). Top-level userId / user_id ONLY (matches TS hashUserId scope
# byte-for-byte for string-typed userId values — workspaceId / nested forms
# are NOT in scope per SF-P0-3. For non-string types (the pino schema does
# not emit these): VRL falls back to "" via `to_string ?? ""` while TS uses
# String() coercion; theoretical divergence with no production occurrence.
# Reuses SENTRY_USERID_PEPPER per ADR-029 §I4 (single source of truth — no
# separate VRL_HMAC_KEY). HMAC-SHA256 + encode_base16 matches TS
# crypto.createHmac("sha256", pepper).update(userId).digest("hex").
# Fail-safe behavior:
#   - pepper unset → leave raw line, tag `+skipped_pepper_unset`
#   - null userId → emit `pepper_unset_null` sentinel (matches TS hashUserIdValue)
#   - preset userIdHash → don't re-hash (defensive idempotence)
[transforms.pii_scrub_structured]
type = "remap"
inputs = ["pii_scrub_drop_userdata"]
source = '''
existing_tag = string!(.pii_scrub_applied)
parsed, parse_err = parse_json(.message)
if parse_err == null && is_object(parsed) {
  parsed_obj = object!(parsed)
  if !exists(parsed_obj.userIdHash) {
    raw_key = ""
    raw_value = null
    if exists(parsed_obj.userId) {
      raw_key = "userId"
      raw_value = parsed_obj.userId
    } else if exists(parsed_obj.user_id) {
      raw_key = "user_id"
      raw_value = parsed_obj.user_id
    }
    if raw_key != "" {
      if raw_value == null {
        parsed_obj.userIdHash = "pepper_unset_null"
        if raw_key == "userId" { del(parsed_obj.userId) } else { del(parsed_obj.user_id) }
        existing_tag = existing_tag + "+structured_null_sentinel"
        .message = encode_json(parsed_obj)
      } else {
        pepper, pepper_err = get_env_var("SENTRY_USERID_PEPPER")
        if pepper_err != null || pepper == "" {
          existing_tag = existing_tag + "+skipped_pepper_unset"
        } else {
          str_value = to_string(raw_value) ?? ""
          hashed = hmac(str_value, pepper, algorithm: "SHA-256")
          parsed_obj.userIdHash = encode_base16(hashed)
          if raw_key == "userId" { del(parsed_obj.userId) } else { del(parsed_obj.user_id) }
          existing_tag = existing_tag + "+structured"
          .message = encode_json(parsed_obj)
        }
      }
    }
  }
}
.pii_scrub_applied = existing_tag
'''

# ---------------- Transform 3/3: string-level scrub (non-pino branch) --------
# Runs for kernel oops, OOM-killer, and any raw stderr that did NOT parse
# as JSON in pii_scrub_structured. Guard: if `pii_scrub_applied` already
# contains "structured" (parse succeeded), SKIP this stage entirely to
# avoid corrupting a clean JSON payload by re-running regex over the
# serialised string (per Arch-F2 ordering fix). Trade-off: a kernel-shaped
# string that happens to be valid JSON with a top-level userId key has its
# rename applied but its non-rename payload preserved verbatim — accepted
# per Arch-F2; pii_scrub_drop_userdata already strips the canonical
# user-content keys at the top of the pipeline.
#
# Substring-stripped: userid=<token>, email-shaped substring, Authorization
# Bearer/Basic value, line-injection control + Unicode-separator chars.
# OAuth callback paths (`/api/auth/callback/...`) are NOT redacted (UI-F1) —
# their callback discriminator is load-bearing for operator debugging of
# real canary-fired incidents, and the structured branch already strips
# user content via pii_scrub_drop_userdata.
[transforms.pii_scrub_string]
type = "remap"
inputs = ["pii_scrub_structured"]
source = '''
tag = string!(.pii_scrub_applied)
if contains(tag, "structured") {
  .pii_scrub_applied = tag + "+string_skipped_already_parsed"
} else {
  msg = string!(.message)
  # Length-bound BEFORE regex (per 2026-04-17-pii-regex-scrubber-three-invariants.md Invariant 1)
  if length(msg) > 10000 {
    msg = slice!(msg, 0, 10000)
  }
  msg = replace(msg, r'(?i)\b(userid|user_id)=[\w-]+', "$${1}=[redacted]")
  # OAuth query-param redaction (PR #4293 review F2): the /api/auth/callback/...
  # path carve-out preserves the discriminator but query params can carry
  # short-lived OAuth tokens (code, state, access_token, id_token, refresh_token).
  # The path itself is not touched; only the value following =.
  msg = replace(msg, r'(?i)([?&](code|state|access_token|id_token|refresh_token)=)[^\s&]+', "$${1}[redacted]")
  msg = replace(msg, r'\b[\w.+\-]+@[\w\-]+\.[\w.\-]+\b', "[email]")
  msg = replace(msg, r'(?i)(authorization:\s*)bearer\s+\S+', "$${1}Bearer [redacted]")
  msg = replace(msg, r'(?i)(authorization:\s*)basic\s+\S+', "$${1}Basic [redacted]")
  # Source 4 now allowlists `inngest-redis`, which routes that unit's RAW STDERR here — and
  # raw stderr is not JSON, so pii_scrub_structured skips it and this is the ONLY scrubber it
  # meets. redis-server echoes an offending directive VERBATIM on any config parse failure
  # (`>>> 'requirepass "<value>"'`) and the unit's ExecStart passes the live prd password as
  # exactly that directive, so without this rule a malformed inngest-redis.conf ships the
  # password to Better Stack. Value-shaped, not key=value: redis prints it as a bare
  # space-separated directive, which none of the rules above match.
  msg = replace(msg, r'(?i)requirepass\s+\S+', "requirepass [redacted]")
  # Same channel, same reason: INNGEST_POSTGRES_URI is a postgres://<user>:<pw>@host DSN in the
  # same unit's env, and DSNs surface in connection-failure diagnostics verbatim. Anchored on
  # the CREDENTIAL shape (`scheme://<user>:<pw>@`), never on `://` — this host legitimately logs
  # credential-less internal URLs (http://10.0.1.40:8288/) that must pass through intact, and
  # a `://` ban would either mangle those or get muted. Scheme-agnostic so redis://, amqp://
  # and https:// DSNs are covered by the same rule.
  msg = replace(msg, r'([a-z][a-z0-9+.-]*://)[^:/@\s]+:[^@/\s]+@', "$${1}[redacted]@")
  msg = replace(msg, r'[\x00-\x1f\x7f\u{2028}\u{2029}]', "")
  .message = msg
  .pii_scrub_applied = tag + "+string"
}
'''

# ---------------- Transform: tag journald events for Better Stack ----------------
# VRL adds a `source_kind` tag so Better Stack's log search can filter by
# {journald, app_container}. Other journald fields (PRIORITY, _SYSTEMD_UNIT,
# host, message) flow through unchanged. Inputs chain back through the
# three pii_scrub_* transforms above so every event reaching Better Stack
# carries a `pii_scrub_applied` audit tag.
#
# #4773: the app container's lines carry a CONTAINER_NAME journald field (set by
# Docker's journald driver); supervisor/system lines carry _SYSTEMD_UNIT and no
# CONTAINER_NAME. Tagging app-container lines `source_kind=app_container` lets an
# operator filter cron pino lines (`fn: cron-<name>`) from supervisor journald in
# Better Stack. The pii_scrub_* transforms preserve CONTAINER_NAME (they edit
# only `.message` + `.pii_scrub_applied`), so the field survives to here.
[transforms.tag_journald]
type = "remap"
inputs = ["pii_scrub_string"]
source = '''
if exists(.CONTAINER_NAME) {
  .source_kind = "app_container"
} else {
  .source_kind = "journald"
}
.shipper = "vector"
# @@HOST_NAME@@ (#6396): per-host Better Stack discriminator. ALL hosts multiplex into
# the ONE Logs source 2457081 — host_name is the sole discriminator. The inngest path
# (inngest-bootstrap.sh) renders this to `soleur-inngest-prd` (byte-identical to pre-#6396);
# the ungated web-host path (soleur-host-bootstrap.sh) renders the TF-injected per-host
# server name (`soleur-web-platform`/`soleur-web-2`). Keep both render sites in lockstep.
.host_name = "@@HOST_NAME@@"
'''

# ---------------- Transform: host_metrics → flat log shape ----------------
# Better Stack accepts metrics as logs (its Logs product is metric-aware
# via tags); this transform flattens the metric event into a single log
# record per scrape datapoint with a `metric.name` + `metric.value`
# pair that Better Stack can chart.
[transforms.tag_metrics]
type = "remap"
inputs = ["host_metrics"]
source = '''
.source_kind = "host_metrics"
.shipper = "vector"
# @@HOST_NAME@@ (#6396) — see the tag_journald note above; rendered per-host at install.
.host_name = "@@HOST_NAME@@"

metric_name = "unknown"
if exists(.name) {
    metric_name = to_string(.name) ?? "unknown"
}
.metric.name = metric_name

if exists(.gauge.value) {
    .metric.value = .gauge.value
} else if exists(.counter.value) {
    .metric.value = .counter.value
} else {
    .metric.value = 0.0
}
'''

# ---------------- Sink: Better Stack Logs via generic http sink ----------------
# Generic HTTP sink is the canonical vendor-recommended pattern
# (per https://betterstack.com/docs/logs/vector/). The native
# `better_stack_logs` sink does NOT exist in any Vector release — Vector
# PR #19274 closed unmerged 2025-01-27.
#
# Per-source ingesting host pin (#4293 FR3 / GDPR Art-44 transfer record):
#   Source ID: 2457081 (name: soleur-inngest-vector-prd)
#   Region: EU — Hetzner Falkenstein cluster `eu-fsn-3`
#   Verified 2026-05-22 via authenticated POST probe (eu-fsn-3 → HTTP 202;
#     eu-nbg-2 → HTTP 401, confirming token cluster-binding).
#   Better Stack dashboard: https://uptime.betterstack.com/team/<TEAM-ID>/sources/2457081
#   Allowlist tightened to (eu-nbg-2|eu-fsn-3) — adversary `eu-foo-99`
#   typosquats are rejected by AC7 grep.
[sinks.betterstack]
type = "http"
inputs = ["tag_journald", "tag_metrics"]
uri = "https://s2457081.eu-fsn-3.betterstackdata.com/"
method = "post"
batch.max_events = 10
encoding.codec = "json"
[sinks.betterstack.request.headers]
authorization = "Bearer ${BETTERSTACK_LOGS_TOKEN}"
content-type = "application/json"
[sinks.betterstack.request]
timeout_secs = 10
retry_attempts = 2
retry_initial_backoff_secs = 1
retry_max_duration_secs = 30

# ---------------- Internal liveness sink (stdout → journald) ----------------
# Vector emits its own internal_metrics every 60s so `cat-deploy-state.sh`'s
# `vector_journal_tail` can spot crashes or sink failures via the structured
# JSON. Kept on stdout (journald) rather than shipped to Better Stack — these
# are debug counters, not operational alerts.
[sources.vector_internal]
type = "internal_metrics"
scrape_interval_secs = 60

[sinks.vector_console]
type = "console"
inputs = ["vector_internal"]
encoding.codec = "json"
target = "stdout"
