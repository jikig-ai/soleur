#cloud-config
# #6545 — operator dogfood host for headless Grok Build (Grok 4.5 API Phase 1).
# Minimal first-boot: git/curl tools, install pinned grok CLI, workspace dirs.
# Model endpoint + API key are NOT baked here (secrets via runtime; model via config.toml).

package_update: true
packages:
  - git
  - curl
  - ca-certificates
  - jq
  - build-essential

users:
  # No passwordless sudo — agent runs as dogfood without root escalation by default.
  - name: dogfood
    shell: /bin/bash
    lock_passwd: true

write_files:
  - path: /etc/grok-dogfood.env
    permissions: "0644"
    content: |
      # Populated post-boot: XAI_API_KEY via operator Doppler/scp (0600 secrets file).
      # See runbook: knowledge-base/engineering/operations/runbooks/grok-build-hetzner-dogfood.md
      GROK_DOGFOOD_WORKSPACE=/home/dogfood/soleur

  - path: /home/dogfood/.grok/config.toml
    owner: dogfood:dogfood
    permissions: "0644"
    content: |
      # Model selection is config-driven (FR11 substrate). Swap default to a local
      # OpenAI-compatible endpoint for Phase 2 without reinstalling the harness.
      [models]
      default = "grok-4.5"

      # Phase 2 placeholder — enable when a local inference endpoint exists.
      # [model.local-open]
      # model = "your-open-weight-id"
      # base_url = "http://127.0.0.1:11434/v1"
      # name = "Local open model"
      # context_window = 128000

  - path: /usr/local/bin/grok-dogfood-install-cli.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      # Install Grok Build CLI via official install script, then record version.
      # Full binary pin (checksum URL) is operator-maintained in the runbook when
      # a fixed release artifact is required; install.sh tracks latest stable.
      set -euo pipefail
      export PATH="/usr/local/bin:$PATH"
      if command -v grok >/dev/null 2>&1; then
        echo "grok already installed: $(grok --version 2>/dev/null || true)"
        exit 0
      fi
      curl -fsSL https://x.ai/cli/install.sh | bash
      if [[ -x /root/.grok/bin/grok ]] && [[ ! -e /usr/local/bin/grok ]]; then
        ln -sf /root/.grok/bin/grok /usr/local/bin/grok || true
      fi
      if [[ -x /home/dogfood/.grok/bin/grok ]]; then
        ln -sf /home/dogfood/.grok/bin/grok /usr/local/bin/grok || true
      fi
      command -v grok && grok --version | tee /var/log/grok-dogfood/cli-version.txt \
        || echo "WARN: grok not on PATH after install"

runcmd:
  - mkdir -p /home/dogfood/soleur /var/log/grok-dogfood /home/dogfood/.grok
  - chown -R dogfood:dogfood /home/dogfood /var/log/grok-dogfood
  - bash /usr/local/bin/grok-dogfood-install-cli.sh
  - chown -R dogfood:dogfood /var/log/grok-dogfood /home/dogfood/.grok || true
  - |
    touch /var/log/grok-dogfood/boot-complete
    chown dogfood:dogfood /var/log/grok-dogfood/boot-complete
