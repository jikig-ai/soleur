#cloud-config
package_update: true
packages:
  - curl
  - fail2ban
  - jq

groups:
  - docker

users:
  - default
  - name: deploy
    groups: docker
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - restrict,command="/usr/local/bin/ci-deploy.sh" ${deploy_ssh_public_key}

write_files:
  - path: /etc/ssh/sshd_config.d/01-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      MaxAuthTries 3
      LoginGraceTime 30
      PermitRootLogin prohibit-password
      AllowUsers root deploy
      ClientAliveInterval 300
      ClientAliveCountMax 2
    owner: root:root
    permissions: '0644'
  - path: /etc/sudoers.d/deploy-chown
    content: |
      deploy ALL=(root) NOPASSWD: /usr/bin/chown 1001\:1001 /mnt/data/workspaces
    owner: root:root
    permissions: '0440'

  # CI deploy forced command script. The CI SSH key in authorized_keys uses:
  #   restrict,command="/usr/local/bin/ci-deploy.sh" ssh-ed25519 AAAA... ci-deploy-2026@soleur-web-platform
  # This restricts the CI key to only execute deploy commands (see #747).
  - path: /usr/local/bin/ci-deploy.sh
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      # Forced command script for the CI deploy SSH key.
      # Parses SSH_ORIGINAL_COMMAND for structured "deploy <component> <image> <tag>" format.
      #
      # IMPORTANT: Do not add 'envs' input to appleboy/ssh-action steps that use this key.
      # drone-ssh prepends 'export VAR=value' lines to SSH_ORIGINAL_COMMAND which would
      # break the 'read -r' parsing below.

      readonly LOG_TAG="ci-deploy"

      # Exact allowlist of valid images per component (not prefix match -- prevents suffix injection).
      declare -A ALLOWED_IMAGES=(
        [web-platform]="ghcr.io/jikig-ai/soleur-web-platform"
        [telegram-bridge]="ghcr.io/jikig-ai/soleur-telegram-bridge"
      )

      # Log truncated command to avoid persisting attacker payloads to syslog
      logger -t "$LOG_TAG" "SSH_ORIGINAL_COMMAND: ${SSH_ORIGINAL_COMMAND:0:200}"

      if [[ -z "${SSH_ORIGINAL_COMMAND:-}" ]]; then
        logger -t "$LOG_TAG" "REJECTED: no command provided"
        echo "Error: no command provided" >&2
        exit 1
      fi

      # Validate field count (exactly 4 fields expected: deploy <component> <image> <tag>)
      field_count=$(printf '%s\n' "$SSH_ORIGINAL_COMMAND" | wc -w)
      if [[ "$field_count" -ne 4 ]]; then
        logger -t "$LOG_TAG" "REJECTED: expected 4 fields, got $field_count"
        echo "Error: malformed command (expected 4 fields, got $field_count)" >&2
        exit 1
      fi

      # Parse command -- read -r prevents backslash interpretation in untrusted input
      read -r ACTION COMPONENT IMAGE TAG <<< "$SSH_ORIGINAL_COMMAND"

      # Validate action
      if [[ "$ACTION" != "deploy" ]]; then
        logger -t "$LOG_TAG" "REJECTED: unknown action '$ACTION'"
        echo "Error: unknown action '$ACTION'" >&2
        exit 1
      fi

      # Validate component exists in allowlist
      if [[ -z "${ALLOWED_IMAGES[$COMPONENT]+x}" ]]; then
        logger -t "$LOG_TAG" "REJECTED: unknown component '$COMPONENT'"
        echo "Error: unknown component '$COMPONENT'" >&2
        exit 1
      fi

      # Validate image matches exact expected value for this component
      if [[ "$IMAGE" != "${ALLOWED_IMAGES[$COMPONENT]}" ]]; then
        logger -t "$LOG_TAG" "REJECTED: invalid image '$IMAGE' for component '$COMPONENT'"
        echo "Error: invalid image" >&2
        exit 1
      fi

      # Validate tag format (vX.Y.Z)
      if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        logger -t "$LOG_TAG" "REJECTED: invalid tag '$TAG'"
        echo "Error: invalid tag format" >&2
        exit 1
      fi

      logger -t "$LOG_TAG" "ACCEPTED: deploy $COMPONENT $IMAGE:$TAG"

      # Component-specific deploy logic
      case "$COMPONENT" in
        web-platform)
          docker pull "$IMAGE:$TAG"
          { docker stop soleur-web-platform || true; }
          { docker rm soleur-web-platform || true; }
          sudo chown 1001:1001 /mnt/data/workspaces
          docker run -d \
            --name soleur-web-platform \
            --restart unless-stopped \
            --env-file /mnt/data/.env \
            -v /mnt/data/workspaces:/workspaces \
            -v /mnt/data/plugins/soleur:/app/shared/plugins/soleur:ro \
            -p 0.0.0.0:80:3000 \
            -p 0.0.0.0:3000:3000 \
            "$IMAGE:$TAG"
          echo "Waiting for health check..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health; then
              echo " OK"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed"
          docker logs soleur-web-platform --tail 30
          exit 1
          ;;
        telegram-bridge)
          docker pull "$IMAGE:$TAG"
          { docker stop soleur-bridge || true; }
          { docker rm soleur-bridge || true; }
          docker run -d \
            --name soleur-bridge \
            --restart unless-stopped \
            --env-file /mnt/data/.env \
            -v /mnt/data:/home/soleur/data \
            -v /mnt/data/plugins/soleur:/app/shared/plugins/soleur:ro \
            -p 127.0.0.1:8080:8080 \
            "$IMAGE:$TAG"
          echo "Waiting for health endpoint..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health 2>/dev/null) || STATUS="000"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              BODY=$(curl -s http://localhost:8080/health)
              echo "Health endpoint responded: HTTP $STATUS - $BODY"
              exit 0
            fi
            echo "Attempt $i/24: HTTP $STATUS (waiting...)"
            sleep 5
          done
          echo "Health check failed after 120s"
          docker logs soleur-bridge --tail 30
          exit 1
          ;;
        *)
          logger -t "$LOG_TAG" "ERROR: no deploy handler for '$COMPONENT'"
          echo "Error: no deploy handler for '$COMPONENT'" >&2
          exit 1
          ;;
      esac
    owner: root:root
    permissions: '0755'

runcmd:
  # Apply SSH hardening immediately (drop-in written by write_files above)
  - systemctl restart sshd

  # Install Docker
  - curl -fsSL https://get.docker.com | sh

  # Configure Docker log rotation
  - |
    cat > /etc/docker/daemon.json << 'DOCKEREOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "10m",
        "max-file": "3"
      }
    }
    DOCKEREOF
  - systemctl restart docker

  # Mount volume for workspaces (Hetzner pre-formats with ext4 via Terraform)
  - mkdir -p /mnt/data
  - mount /dev/disk/by-id/scsi-0HC_Volume_* /mnt/data || true
  - echo '/dev/disk/by-id/scsi-0HC_Volume_* /mnt/data ext4 defaults 0 2' >> /etc/fstab

  # Create workspace and plugin directories
  - mkdir -p /mnt/data/workspaces
  - mkdir -p /mnt/data/plugins/soleur

  # Create .env placeholder and grant deploy user ownership of /mnt/data
  # (deploy user writes .env vars and manages containers via CI/CD)
  #
  # After provisioning, populate /mnt/data/.env with secrets.
  # See apps/web-platform/.env.example for required keys:
  #   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
  #   SUPABASE_SERVICE_ROLE_KEY, STRIPE_SECRET_KEY, STRIPE_PRICE_ID,
  #   STRIPE_WEBHOOK_SECRET, BYOK_ENCRYPTION_KEY, ANTHROPIC_API_KEY
  # This file is shared with telegram-bridge -- both containers read it.
  - touch /mnt/data/.env
  - chmod 600 /mnt/data/.env
  - chown -R deploy:deploy /mnt/data

  # Workspace dir must be owned by soleur UID 1001 (must match apps/web-platform/Dockerfile)
  # Set after recursive chown so it isn't overridden
  - chown 1001:1001 /mnt/data/workspaces

  # Pull and run container
  - docker pull ${image_name}
  - |
    docker run -d \
      --name soleur-web-platform \
      --restart unless-stopped \
      --env-file /mnt/data/.env \
      -v /mnt/data/workspaces:/workspaces \
      -v /mnt/data/plugins/soleur:/app/shared/plugins/soleur:ro \
      -p 0.0.0.0:80:3000 \
      -p 0.0.0.0:3000:3000 \
      ${image_name}
