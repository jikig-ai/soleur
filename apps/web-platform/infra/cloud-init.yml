#cloud-config
package_update: true
packages:
  - curl
  - fail2ban
  - jq
  - nftables

groups:
  - docker

# CI SSH key for the apply-deploy-pipeline-fix.yml file/remote-exec
# provisioner chain. Mirrors terraform_data.root_authorized_keys
# (see ci-ssh-key.tf) for fresh-host parity — on a brand-new host this
# block lands the key before the terraform_data resource fires, then the
# resource's `grep -qxF` no-ops on the subsequent apply. Top-level
# placement applies the key to the default user (root on Hetzner
# ubuntu-24.04 cloud images).
ssh_authorized_keys:
  - ${ci_ssh_public_key_openssh}

users:
  - default
  - name: deploy
    groups: docker
    shell: /bin/bash
    lock_passwd: true
    # No SSH key -- deploys now arrive via webhook through Cloudflare Tunnel (#749).
    # The deploy user is kept for Docker group membership and sudoers.

write_files:
  - path: /etc/ssh/sshd_config.d/01-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      MaxAuthTries 3
      LoginGraceTime 30
      PermitRootLogin prohibit-password
      AllowUsers root
      ClientAliveInterval 300
      ClientAliveCountMax 2
    owner: root:root
    permissions: '0644'
  - path: /etc/sudoers.d/deploy-chown
    content: |
      deploy ALL=(root) NOPASSWD: /usr/bin/chown 1001\:1001 /mnt/data/workspaces
    owner: root:root
    permissions: '0440'

  # #4144 — permits ci-deploy.sh to invoke inngest-bootstrap.sh as root
  # from the fixed path /tmp/inngest-extract/ (no wildcards, sudo-rs safe).
  # env_keep preserves INNGEST_CLI_VERSION + SHA across the sudo boundary.
  # Mirrored in apps/web-platform/infra/deploy-inngest-bootstrap.sudoers
  # so terraform_data.deploy_pipeline_fix can refresh existing hosts.
  - path: /etc/sudoers.d/deploy-inngest-bootstrap
    content: |
      Cmnd_Alias INNGEST_BOOTSTRAP = /usr/bin/bash /tmp/inngest-extract/inngest-bootstrap.sh
      Defaults!INNGEST_BOOTSTRAP env_keep += "INNGEST_CLI_VERSION INNGEST_CLI_SHA256 VECTOR_CLI_VERSION VECTOR_CLI_SHA256"
      deploy ALL=(root) NOPASSWD: INNGEST_BOOTSTRAP

      # #3756 — permits infra-config-apply.sh to schedule a delayed webhook restart
      # via systemd-run. The handler runs as the deploy user inside webhook.service's
      # mount namespace; systemctl restart requires root.
      Cmnd_Alias WEBHOOK_SELF_RESTART = /usr/bin/systemd-run --on-active=3s --unit=webhook-self-restart /usr/bin/systemctl restart webhook
      deploy ALL=(root) NOPASSWD: WEBHOOK_SELF_RESTART

      # #4538 — permits ci-deploy.sh to restart inngest-server.service via the
      # `restart inngest _ latest` command.
      Cmnd_Alias INNGEST_RESTART = /usr/bin/systemctl restart inngest-server.service
      deploy ALL=(root) NOPASSWD: INNGEST_RESTART

      # #5450 — permits the opt-in wiped-volume durability verify to stop THEN
      # start inngest-server around the /var/lib/inngest wipe (can't be a restart;
      # the wipe happens while down). Two pinned, wildcard-free aliases.
      Cmnd_Alias INNGEST_STOP = /usr/bin/systemctl stop inngest-server.service
      deploy ALL=(root) NOPASSWD: INNGEST_STOP
      Cmnd_Alias INNGEST_START = /usr/bin/systemctl start inngest-server.service
      deploy ALL=(root) NOPASSWD: INNGEST_START

      # #4827 — permits infra-config-apply.sh to escalate the atomic install of
      # its managed files into root:root dest dirs the deploy user cannot write.
      # Fixed helper path, no argument wildcards (sudo-rs safe); the helper's
      # hardcoded dest allowlist + TOCTOU guards are the security boundary.
      Cmnd_Alias INFRA_CONFIG_INSTALL = /usr/local/bin/infra-config-install
      deploy ALL=(root) NOPASSWD: INFRA_CONFIG_INSTALL

      # #5934 — char-device sweep grant (full rationale in the mirrored
      # deploy-inngest-bootstrap.sudoers; keep the two in sync). Pins the exact
      # argv ci-deploy.sh invokes; no wildcards (sudo-rs safe).
      Cmnd_Alias GIT_LOCK_CHARDEVICE_SWEEP = /usr/bin/timeout 60 /usr/local/bin/git-lock-chardevice-sweep.sh
      deploy ALL=(root) NOPASSWD: GIT_LOCK_CHARDEVICE_SWEEP
    owner: root:root
    permissions: '0440'

  # NOTE (#5921): 22 bootstrap scripts + hooks.json were REMOVED from write_files: here
  # (infra-config-install, disk/resource/container-restart-monitor.sh + units, all
  # cron-egress artifacts, ci-deploy*/cat-deploy-state/canary/infra-config-apply/
  # cat-infra-config-state, and hooks.json). As base64 blobs they pushed the rendered
  # user_data ~8.6x over Hetzner's 32,768-byte cap. They are now baked into
  # ${image_name} at /opt/soleur/host-scripts/ and extracted by the "host-script
  # extraction" runcmd block below (docker cp → combined-hash verify → per-file install).
  # The keep-inline set (sshd hardening, sudoers, the /etc/default/* secret env files,
  # disk/resource-monitor .service/.timer, webhook.service, fail2ban/journald) stays here.

  # Disk monitor environment file (API key, chmod 600 for secrets).
  - path: /etc/default/disk-monitor
    content: |
      RESEND_API_KEY='${resend_api_key}'
    owner: root:root
    permissions: '0600'

  # Disk monitor systemd service (oneshot, invoked by timer).
  - path: /etc/systemd/system/disk-monitor.service
    content: |
      [Unit]
      Description=Disk space monitor
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/disk-monitor.sh
    owner: root:root
    permissions: '0644'

  # Disk monitor systemd timer (every 5 minutes, persistent across reboots).
  - path: /etc/systemd/system/disk-monitor.timer
    content: |
      [Unit]
      Description=Run disk monitor every 5 minutes

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=5min
      Persistent=true

      [Install]
      WantedBy=timers.target
    owner: root:root
    permissions: '0644'

  # Resource monitor environment file (API key, chmod 600 for secrets).
  - path: /etc/default/resource-monitor
    content: |
      RESEND_API_KEY='${resend_api_key}'
    owner: root:root
    permissions: '0600'

  # Resource monitor systemd service (oneshot, invoked by timer).
  - path: /etc/systemd/system/resource-monitor.service
    content: |
      [Unit]
      Description=Host CPU/RAM/session monitor
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/resource-monitor.sh
    owner: root:root
    permissions: '0644'

  # Resource monitor systemd timer (every 5 minutes, persistent across reboots).
  - path: /etc/systemd/system/resource-monitor.timer
    content: |
      [Unit]
      Description=Run resource monitor every 5 minutes

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=5min
      Persistent=true

      [Install]
      WantedBy=timers.target
    owner: root:root
    permissions: '0644'

  # Doppler-less Resend fallback (the .service prefers doppler prd, which also
  # supplies SENTRY_*). chmod 600 for the secret.
  - path: /etc/default/container-restart-monitor
    content: |
      RESEND_API_KEY='${resend_api_key}'
    owner: root:root
    permissions: '0600'

  # (#5921) container-restart-monitor.{sh,service,timer}, all cron-egress artifacts,
  # ci-deploy*/cat-deploy-state/canary/infra-config-apply/cat-infra-config-state, and
  # hooks.json were removed from write_files: here and are extracted from the image by
  # the host-script extraction runcmd block below. The container-restart-monitor
  # /etc/default secret env file above stays inline (secret, consumed by the .service).

  # Hardened systemd unit for the webhook listener.
  # Runs as deploy user (docker group) on localhost:9000.
  - path: /etc/systemd/system/webhook.service
    content: |
      [Unit]
      Description=Webhook deploy listener
      After=network.target

      [Service]
      Type=simple
      EnvironmentFile=/etc/default/webhook-deploy
      # -ip 0.0.0.0 (was 127.0.0.1): the private-net peer reaches /hooks/deploy-peer
      # for the 2-host deploy fan-out (#5274 Phase 3, ADR-068). SAFE — hcloud_firewall.web
      # default-denies 9000 on the public interface; only loopback + 10.0.1.0/24 connect.
      # MUST stay in lockstep with webhook.service (infra-config delivers that to web-1).
      ExecStart=/usr/local/bin/webhook -verbose -hooks /etc/webhook/hooks.json -port 9000 -ip 0.0.0.0
      Restart=on-failure
      RestartSec=5
      User=deploy
      Group=deploy
      # NoNewPrivileges omitted: ci-deploy.sh requires sudo for chown (#967)
      ProtectSystem=strict
      ProtectHome=read-only
      PrivateTmp=true
      # Bootstrap path (inngest-bootstrap.sh + future deploy <component>
      # handlers) installs systemd units + binaries + env files via sudo.
      # ProtectSystem=strict is namespace-scoped — sudo elevates UID but does
      # NOT escape the mount namespace, so without these explicit
      # ReadWritePaths the inngest bootstrap fails with cryptic chown error
      # messages. See #4017 substrate audit (2026-05-19).
      ReadWritePaths=/mnt/data /var/lock /etc/systemd/system /etc/default /etc/sudoers.d /etc/webhook /var/lib/inngest -/var/lib/vector -/etc/vector /usr/local/bin
      ReadOnlyPaths=/etc/default/webhook-deploy
      TimeoutStopSec=180

      [Install]
      WantedBy=multi-user.target
    owner: root:root
    permissions: '0644'

  # Cloudflare apt repository source list for cloudflared.
  - path: /etc/apt/sources.list.d/cloudflare-main.list
    content: |
      deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared noble main
    owner: root:root
    permissions: '0644'

  # fail2ban sshd tuning drop-in (issue #2654).
  # Loads after /etc/fail2ban/jail.d/defaults-debian.conf (alphabetic order).
  # Caps recidivist bantime at 1h so an operator typo does not snowball into a
  # multi-hour lockout via bantime.increment escalation. Content injected from
  # fail2ban-sshd.local via Terraform base64encode(file()).
  # Runbook for recovery when locked out:
  #   knowledge-base/engineering/operations/runbooks/ssh-fail2ban-unban.md
  # Keep in sync with terraform_data.fail2ban_tuning in server.tf.
  - path: /etc/fail2ban/jail.d/soleur-sshd.local
    encoding: b64
    content: ${fail2ban_sshd_local_b64}
    owner: root:root
    permissions: '0644'

  # (#5921) The journald persistent drop-in was moved out of inline write_files: (its 2.4 KB
  # base64 blob was the biggest remaining user_data expansion). It is now baked and installed
  # by soleur-host-bootstrap.sh, which also applies it — safe because its only consumer, the
  # terminal --log-driver journald app container, starts after extraction.

runcmd:
  # (#6090 follow-up) Arm the baked-${sentry_dsn} fatal-emit trap at the TOP of runcmd so it
  # ALSO covers the package-audit + doppler + docker install region below. That region runs
  # under the `set -e` leaked from the package audit but PRE-DATES the host-script extraction
  # block where on_err used to be defined — the blind spot that silently aborted web-2's fresh
  # boot (recreate 28805034101: 0 emits, :9000 unbound). STAGE is bumped per install step so the
  # fatal names the exact dying command; the extraction block re-sets STAGE=pull onward and
  # disarms this trap (trap - EXIT) before handing off to the trusted baked installer. on_err
  # emits `soleur-hostscript-seed failed` (already in the workflow QUERY + AC8 lockstep) with the
  # live STAGE tag — docker IS the hostscript-seed prerequisite, so the message stays accurate.
  # NOTE: the trap fires only under `set -e`, which the package audit turns on — so emit coverage
  # effectively begins at the audit; the preceding `systemctl restart sshd` stays deliberately
  # non-fatal (its own comment below) and is intentionally NOT emit-covered. The emit is a curl
  # POST, so a curl-less host (which dies everywhere) is an accepted residual.
  - |
    IMAGE_REF='${image_name}'
    STAGE=pkg_audit
    HOST_ID=$( (cat /var/lib/cloud/data/instance-id 2>/dev/null || hostname) | tr -d '"' )
    on_err() {
      trap - EXIT
      docker rm -f soleur-hostscript-seed >/dev/null 2>&1 || true
      ( set +e
        . /etc/default/webhook-deploy 2>/dev/null || true
        # Prefer the BAKED DSN so this fatal fires even when doppler is the broken stage (and
        # even before doppler/docker are installed, which is exactly the region this now covers).
        DSN='${sentry_dsn}'
        [ -n "$DSN" ] || DSN=$(timeout 15 doppler secrets get SENTRY_DSN --plain --project soleur --config prd 2>/dev/null \
               || timeout 15 doppler secrets get NEXT_PUBLIC_SENTRY_DSN --plain --project soleur --config prd 2>/dev/null || true)
        if [ -n "$DSN" ]; then
          KEY=$(printf '%s' "$DSN" | sed -E 's#https://([^@]+)@.*#\1#')
          SHOST=$(printf '%s' "$DSN" | sed -E 's#https://[^@]+@([^/]+)/.*#\1#')
          PROJ=$(printf '%s' "$DSN" | sed -E 's#.*/([0-9]+)$#\1#')
          BODY=$(printf '{"message":"soleur-hostscript-seed failed","level":"fatal","tags":{"stage":"%s","image_ref":"%s","host_id":"%s"}}' "$STAGE" "$IMAGE_REF" "$HOST_ID")
          curl -m 10 --retry 3 -sf -X POST "https://$SHOST/api/$PROJ/store/" \
            -H 'Content-Type: application/json' \
            -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$KEY" \
            -d "$BODY" >/dev/null 2>&1 || true
        fi ) || true
      exit 1
    }
    trap on_err EXIT

  # Apply SSH hardening immediately (drop-in written by write_files above).
  # Runs BEFORE the package audit so the operator always has hardened SSH
  # access even if the audit exits non-zero and halts the rest of cloud-init.
  - systemctl restart sshd

  # Audit that cloud-init's packages: stage actually installed every declared
  # package. Cloud-init can silently drop package installs on transient
  # failures (apt lock contention, network error, "No space left on device"
  # during first boot) without failing the run. If any declared package is
  # missing after packages:, fail loudly so the operator sees the root cause
  # in /var/log/cloud-init-output.log (#2680).
  #
  # The required-package list is parsed at runtime from the rendered cloud
  # config at /var/lib/cloud/instance/cloud-config.txt -- no hardcoded list
  # to drift away from the packages: block at the top of this file.
  - |
    set -e
    required_packages=$(awk '/^packages:$/{flag=1; next} /^[^ ]/{flag=0} flag && /^  - /{sub(/^  - /, ""); print}' /var/lib/cloud/instance/cloud-config.txt)
    if [ -z "$required_packages" ]; then
      echo "FATAL: package audit could not parse packages: list from cloud-config.txt" >&2
      exit 1
    fi
    missing=""
    for pkg in $required_packages; do
      dpkg -s "$pkg" >/dev/null 2>&1 || missing="$missing $pkg"
    done
    if [ -n "$missing" ]; then
      echo "FATAL: cloud-init packages: stage did not install:$missing" >&2
      # One-shot self-heal for transient apt failures. If this also fails we
      # exit non-zero so cloud-init marks the boot failed and the operator
      # investigates via the Hetzner console.
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq $missing
      for pkg in $missing; do
        dpkg -s "$pkg" >/dev/null 2>&1 || { echo "FATAL: $pkg still missing after recovery install" >&2; exit 1; }
      done
    fi

  # Reload fail2ban so the jail.d/soleur-sshd.local drop-in applies (#2654).
  # fail2ban is installed via `packages:` above; the service auto-starts on
  # install with the defaults-debian.conf [sshd] jail enabled. The reload
  # picks up the bantime.maxtime cap before any login activity is recorded.
  - STAGE=fail2ban  # (#6090) exact stage attribution for the top-armed on_err fatal
  - systemctl reload fail2ban || systemctl restart fail2ban

  # (#5921) journald persistence (mkdir /var/log/journal + systemd-tmpfiles + restart +
  # journalctl --flush) moved into soleur-host-bootstrap.sh — it runs after the host-script
  # extraction but before the terminal --log-driver journald app container, and `flush`
  # migrates this early boot's volatile journal into the persistent store (no logs lost).

  # Install Doppler CLI v3.75.3 (for secrets injection) with checksum verification
  - STAGE=doppler_dl  # (#6090) name the stage for the top-armed on_err fatal
  - |
    DOPPLER_VERSION="3.75.3"
    DOPPLER_SHA256="9c840cdd32cffff06d048329549ba2fa908146b385f21cd1d54bf34a0082d0db"
    curl -fsSL --retry 3 "https://github.com/DopplerHQ/cli/releases/download/$${DOPPLER_VERSION}/doppler_$${DOPPLER_VERSION}_linux_amd64.tar.gz" -o /tmp/doppler.tar.gz
    echo "$${DOPPLER_SHA256}  /tmp/doppler.tar.gz" | sha256sum -c -
    tar xzf /tmp/doppler.tar.gz -C /usr/local/bin doppler
    chmod +x /usr/local/bin/doppler
    rm /tmp/doppler.tar.gz
  # Create dedicated env file for webhook systemd service (chmod 600, deploy:deploy).
  # Token is NOT written to /etc/environment (world-readable) -- only this restricted file.
  - printf 'DOPPLER_TOKEN=%s\nDOPPLER_CONFIG_DIR=/tmp/.doppler\nDOPPLER_ENABLE_VERSION_CHECK=false\n' '${doppler_token}' > /etc/default/webhook-deploy
  - chmod 600 /etc/default/webhook-deploy
  - chown deploy:deploy /etc/default/webhook-deploy

  # Install Docker via official APT repository with GPG key verification (#1615).
  # Replaces pipe-to-shell (curl | sh) with signed APT repo -- same pattern as cloudflared above.
  - STAGE=docker_apt  # (#6090) name the stage for the top-armed on_err fatal
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin

  # Configure Docker log rotation
  - |
    cat > /etc/docker/daemon.json << 'DOCKEREOF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "10m",
        "max-file": "3"
      }
    }
    DOCKEREOF
  - STAGE=docker_restart  # (#6090) name the stage for the top-armed on_err fatal
  - systemctl restart docker

  # BEGIN host-script extraction (#5921) — verify + launch the baked bootstrap installer.
  # The 22 scripts + hooks.json.tmpl + soleur-host-bootstrap.sh are baked into ${image_name}
  # at /opt/soleur/host-scripts/ (as base64 blobs they blew the 32,768-byte user_data cap).
  # After docker is up + BEFORE the first consumer, docker-cp the assets, recompute the
  # combined content-hash, compare to host_scripts_content_hash, and ONLY THEN run the
  # now-trusted soleur-host-bootstrap.sh. FAIL-CLOSED: runcmd is ONE /bin/sh, so `set -e` +
  # `exit 1` aborts the whole runcmd (the app `docker run` never starts) + the terminal block
  # gates on /run/soleur-hostscripts.ok; do NOT add a `set +e`. Pull/extract/verify failures are
  # named by the top-armed on_err trap (STAGE=pull/ghcr_login/extract/verify); install-stage
  # failures come from the bootstrap's own emit_fail after the trap is disarmed below.
  - |
    set -e
    IMAGE_REF='${image_name}'
    HOST_SCRIPTS_HASH='${host_scripts_content_hash}'
    STAGE=pull
    for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 2; done
    docker rm -f soleur-hostscript-seed >/dev/null 2>&1 || true
    # ROOT FIX (#6005): the seed image is now a PRIVATE GHCR package, so this early seed-pull
    # must authenticate FIRST (bootstrap's ghcr_login runs post-extract, too late) — anonymous
    # pull 401s + aborts the boot. Non-fatal: a creds miss still lets the pull emit stage=pull.
    STAGE=ghcr_login
    ( set +e
      . /etc/default/webhook-deploy 2>/dev/null || true
      GHCR_USER=$(timeout 15 doppler secrets get GHCR_READ_USER --plain --project soleur --config prd 2>/dev/null || true)
      GHCR_TOKEN=$(timeout 15 doppler secrets get GHCR_READ_TOKEN --plain --project soleur --config prd 2>/dev/null || true)
      [ -n "$GHCR_USER" ] && [ -n "$GHCR_TOKEN" ] && printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null 2>&1 || true
    ) || true
    STAGE=pull
    N=0; until docker pull "$IMAGE_REF"; do N=$((N+1)); [ "$N" -ge 3 ] && exit 1; sleep 5; done
    STAGE=extract
    docker create --name soleur-hostscript-seed "$IMAGE_REF" >/dev/null
    SEED=$(mktemp -d)
    docker cp soleur-hostscript-seed:/opt/soleur/host-scripts/. "$SEED/"
    docker rm -f soleur-hostscript-seed >/dev/null 2>&1 || true
    # Integrity: recompute the combined content-hash and compare BEFORE running any baked
    # code. Matches local.host_scripts_content_hash = sha256(join("", sort([filesha256(f)]))).
    STAGE=verify
    GOT=$(cd "$SEED" && find . -type f -exec sha256sum {} + | awk '{print $1}' | LC_ALL=C sort | tr -d '\n' | sha256sum | awk '{print $1}')
    [ "$GOT" = "$HOST_SCRIPTS_HASH" ] || exit 1
    # Verified — hand off to the now-trusted baked installer (it owns its own emit_fail trap +
    # writes /run/soleur-hostscripts.ok). Disarm THIS trap FIRST so a bootstrap-stage failure
    # isn't ALSO re-emitted here mislabeled stage=verify; a bootstrap non-zero still aborts
    # runcmd (set -e) before the app starts. Secret via single-quote interpolation, same as
    # doppler_token below (trusted operator value, generated ASCII — no shell metachar).
    trap - EXIT
    WEBHOOK_DEPLOY_SECRET='${webhook_deploy_secret}' SOLEUR_SENTRY_DSN='${sentry_dsn}' sh "$SEED/soleur-host-bootstrap.sh" "$SEED"
    rm -rf "$SEED"
    set +e  # H3 (#6090): scope set -e — runcmd is ONE /bin/sh; leak = silent abort (plan).
  # END host-script extraction (#5921)

  # Mount volume for workspaces (Hetzner pre-formats with ext4 via Terraform)
  - mkdir -p /mnt/data
  - mount /dev/disk/by-id/scsi-0HC_Volume_* /mnt/data || true
  - echo '/dev/disk/by-id/scsi-0HC_Volume_* /mnt/data ext4 defaults 0 2' >> /etc/fstab

  # Create workspace and plugin directories
  - mkdir -p /mnt/data/workspaces
  - mkdir -p /mnt/data/plugins/soleur

  # Grant deploy user ownership of /mnt/data
  # (deploy user manages containers via webhook/ci-deploy.sh)
  - chown -R deploy:deploy /mnt/data

  # Workspace dir must be owned by soleur UID 1001 (must match apps/web-platform/Dockerfile)
  # Set after recursive chown so it isn't overridden
  - chown 1001:1001 /mnt/data/workspaces

  # Install cloudflared from Cloudflare apt repository.
  # GPG key downloaded at provision time (rotated Oct 2025).
  - curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg -o /usr/share/keyrings/cloudflare-main.gpg
  - apt-get update
  - apt-get install -y cloudflared

  # Register cloudflared as a systemd service with the tunnel token.
  # The token encodes tunnel configuration managed remotely via Terraform.
  - cloudflared service install ${tunnel_token}

  # #6090 H4: baked readiness poll (enable returns 0 before connect).
  - soleur-wait-ready service cloudflared cloudflared_ready || exit 1

  # Install webhook binary (adnanh/webhook v2.8.2) with checksum verification
  - |
    WEBHOOK_VERSION="2.8.2"
    WEBHOOK_SHA256="7a190ec7b4c2ffbb4eb1e11755a2e7acd82f1ffe74f60f235a360441daf22fd2"
    curl -fsSL "https://github.com/adnanh/webhook/releases/download/$${WEBHOOK_VERSION}/webhook-linux-amd64.tar.gz" -o /tmp/webhook.tar.gz
    # #6090: checksum fail-CLOSED independent of H3 set +e (mismatch aborts).
    echo "$${WEBHOOK_SHA256}  /tmp/webhook.tar.gz" | sha256sum -c - || { soleur-boot-emit webhook_checksum fatal; exit 1; }
    tar xzf /tmp/webhook.tar.gz -C /usr/local/bin --strip-components=1 webhook-linux-amd64/webhook
    chmod +x /usr/local/bin/webhook
    rm /tmp/webhook.tar.gz
  - systemctl daemon-reload
  - systemctl enable --now webhook

  # #6090 H4 (load-bearing): baked :9000 bind poll (the primary symptom).
  - soleur-wait-ready port 9000 webhook_bound || exit 1

  # Enable disk space monitoring timer (#1409)
  - systemctl enable --now disk-monitor.timer

  # Enable host resource (CPU/RAM/sessions) monitoring timer (#1052)
  - systemctl enable --now resource-monitor.timer

  # Enable container restart/OOM churn monitor timer (#5417)
  - systemctl enable --now container-restart-monitor.timer

  # Container egress firewall + allowlist re-resolve (#5046 PR-2). The
  # firewall unit is After=docker.service and tolerates a not-yet-running
  # container (probes live in the SSH provisioner, not here).
  - systemctl enable --now cron-egress-firewall.service
  - systemctl enable --now cron-egress-resolve.timer

  # Weekly Docker image cleanup -- keeps only images used by running containers.
  # Prevents disk exhaustion from accumulated deploy images (#967).
  - |
    cat > /etc/cron.weekly/docker-cleanup << 'CRONEOF'
    #!/bin/sh
    docker image prune -af --filter "until=72h" > /dev/null 2>&1
    CRONEOF
    chmod +x /etc/cron.weekly/docker-cleanup

  # Pull and run container (secrets from Doppler -- no .env fallback)
  - docker pull ${image_name}

  # Seed /mnt/data/plugins/soleur from the image's baked plugin tree (#3045).
  # Ephemeral container so we don't depend on a long-running container.
  # `docker cp src/.` copies *contents* (not the src dir itself) into dst.
  # `find -mindepth 1 -delete` is POSIX-portable: cloud-init `- |` blocks run
  # under /bin/sh (= dash on Ubuntu), which has no bash brace-expansion. The
  # same form is also used in ci-deploy.sh so both paths share one cleanup
  # expression and the bash test exercises the production form.
  # The .seed-complete sentinel is written LAST and checked by
  # verifyPluginMountOnce so a partial copy (manifest present but skill files
  # missing) is detected at startup instead of silently degrading.
  - |
    set -e
    docker rm -f soleur-plugin-seed >/dev/null 2>&1 || true
    cleanup() { docker rm -f soleur-plugin-seed >/dev/null 2>&1 || true; }
    # #6090: composite trap (cleanup + named fatal).
    trap 'rc=$?; cleanup; [ "$rc" = 0 ] || soleur-boot-emit plugin_seed fatal' EXIT
    docker create --name soleur-plugin-seed ${image_name}
    find /mnt/data/plugins/soleur -mindepth 1 -delete 2>/dev/null || true
    docker cp soleur-plugin-seed:/opt/soleur/plugin/. /mnt/data/plugins/soleur/
    docker rm soleur-plugin-seed
    trap - EXIT
    printf '%s\n' "seeded $(date -u +%Y-%m-%dT%H:%M:%SZ) tag=cloud-init" \
      > /mnt/data/plugins/soleur/.seed-complete

  # Bootstrap Inngest server on first boot (#4118, Tier 1).
  # Pinned image tag = the soleur-inngest-bootstrap OCI image version (the
  # bootstrap-script SHAPE version), NOT the inngest-cli version (the latter is
  # sourced from the image's Config.Env at run time). This pin MUST be bumped to
  # the latest released bootstrap image on every bootstrap-script change, or
  # fresh-host reprovision installs a stale script. Bumped to v1.1.17 to track the
  # latest published bootstrap image (resolves the AC6 pin-drift). NOTE: the #5560
  # env-not-argv bootstrap change lands in a FOLLOW-UP image build + pin bump per
  # #5565 (#5560 deploy step); v1.1.17 predates it. On top of the
  # #5547 durable-Redis delivery-on-existing-host + SQLite fail-safe ExecStart
  # (the bootstrap now branches the ExecStart on REDIS_READY), on top of the
  # #5499 host-script journald → Better Stack vector.toml source (#5526), the
  # #5450 durable-backend change (durable ExecStart, env-delivered URIs since #5560 + the
  # inngest-redis.{conf,service} + inngest-redis-bootstrap.sh assets baked into
  # the image), and the post-v1.1.14 cutover-op fixes (#5518/#5528/#5520).
  # Running hosts get it via the deploy webhook path: push
  # vinngest-vX.Y.Z tag → deploy inngest …:vX.Y.Z; cloud-init installs only on
  # fresh hosts.
  - |
    set -e
    docker pull ghcr.io/jikig-ai/soleur-inngest-bootstrap:v1.1.18
    EXTRACT_DIR=$(mktemp -d)
    cleanup() { docker rm -f soleur-inngest-bootstrap-extract >/dev/null 2>&1 || true; rm -rf "$EXTRACT_DIR"; }
    # #6090: composite trap (cleanup + named fatal).
    trap 'rc=$?; cleanup; [ "$rc" = 0 ] || soleur-boot-emit inngest_bootstrap fatal' EXIT
    docker create --name soleur-inngest-bootstrap-extract ghcr.io/jikig-ai/soleur-inngest-bootstrap:v1.1.18
    docker cp soleur-inngest-bootstrap-extract:/inngest-bootstrap.sh "$EXTRACT_DIR/inngest-bootstrap.sh"
    docker cp soleur-inngest-bootstrap-extract:/vector.toml /tmp/vector.toml 2>/dev/null || true
    # Durable Redis assets (#5450) — stage to /tmp like vector.toml so the
    # cloud-init-invoked inngest-bootstrap.sh installs + starts Redis on a fresh
    # host (the `deploy` webhook path gets them via the image ENTRYPOINT cp).
    docker cp soleur-inngest-bootstrap-extract:/inngest-redis.conf /tmp/inngest-redis.conf 2>/dev/null || true
    docker cp soleur-inngest-bootstrap-extract:/inngest-redis.service /tmp/inngest-redis.service 2>/dev/null || true
    docker cp soleur-inngest-bootstrap-extract:/inngest-redis-bootstrap.sh /tmp/inngest-redis-bootstrap.sh 2>/dev/null || true
    chmod +x /tmp/inngest-redis-bootstrap.sh 2>/dev/null || true
    image_env=$(docker inspect ghcr.io/jikig-ai/soleur-inngest-bootstrap:v1.1.18 -f '{{range .Config.Env}}{{println .}}{{end}}')
    chmod +x "$EXTRACT_DIR/inngest-bootstrap.sh"
    INNGEST_CLI_VERSION=$(printf '%s\n' "$image_env" | grep '^INNGEST_CLI_VERSION=' | head -1 | cut -d= -f2-)
    INNGEST_CLI_SHA256=$(printf '%s\n' "$image_env" | grep '^INNGEST_CLI_SHA256=' | head -1 | cut -d= -f2-)
    # `|| true` for symmetry with ci-deploy.sh's hotfix (which runs under
    # `set -o pipefail` — this block doesn't, but defense-in-depth costs
    # nothing). Bootstrap script's bash `:-`-default guard on VECTOR_CLI_VERSION
    # skips Vector install gracefully on empty values. (Comment intentionally
    # avoids the literal $${ } shell-expansion syntax — this YAML is rendered
    # by terraform `templatefile()` which would interpret it as TF interpolation.)
    VECTOR_CLI_VERSION=$(printf '%s\n' "$image_env" | grep '^VECTOR_CLI_VERSION=' | head -1 | cut -d= -f2- || true)
    VECTOR_CLI_SHA256=$(printf '%s\n' "$image_env" | grep '^VECTOR_CLI_SHA256=' | head -1 | cut -d= -f2- || true)
    env "INNGEST_CLI_VERSION=$INNGEST_CLI_VERSION" "INNGEST_CLI_SHA256=$INNGEST_CLI_SHA256" \
        "VECTOR_CLI_VERSION=$VECTOR_CLI_VERSION" "VECTOR_CLI_SHA256=$VECTOR_CLI_SHA256" \
      bash "$EXTRACT_DIR/inngest-bootstrap.sh"
    trap - EXIT  # #6090: disarm, else the composite trap mislabels terminal-block failures as inngest_bootstrap.

  - |
    set -e
    # Fail-closed gate (#5921): the host-script extraction block above writes
    # /run/soleur-hostscripts.ok ONLY after hash-verify + all installs + all assertions
    # pass. runcmd is NOT under a top-level set -e, so a failed extraction still reaches
    # here — refuse to bring the app up (which would serve with an unconfigured egress
    # firewall / missing deploy scripts) and poweroff so the host is visibly absent to the
    # provision-armed Better Stack uptime check.
    test -f /run/soleur-hostscripts.ok || { echo "FATAL: host-script extraction incomplete; refusing to start app" >&2; poweroff -f; }
    # Source token from the restricted env file (avoids exposing it in /proc/<pid>/cmdline)
    set -a; . /etc/default/webhook-deploy; set +a
    TMPENV=$(mktemp /tmp/doppler-env.XXXXXX)
    chmod 600 "$TMPENV"
    if ! doppler secrets download --no-file --format docker --project soleur --config prd > "$TMPENV"; then
      rm -f "$TMPENV"
      echo "FATAL: Doppler secrets download failed during initial provisioning" >&2
      exit 1
    fi
    # tmpfs /tmp (closes #2473): caps overlayfs COW write-amp from
    # pdf-linearize tempfiles. Post-GIT_ASKPASS migration, git credential
    # scripts live in $HOME (see `server/git-auth.ts#writeAskpassScript`),
    # so /tmp no longer needs to be exec-able for git auth. `noexec` is
    # still omitted to avoid regressing unrelated tools that may exec
    # from /tmp — if future hardening flips it on, grep for other
    # exec-from-/tmp call sites first.
    docker run -d \
      --name soleur-web-platform \
      --log-driver journald \
      --restart unless-stopped \
      --tmpfs /tmp:rw,nosuid,nodev,size=256m \
      --env-file "$TMPENV" \
      --add-host host.docker.internal:host-gateway \
      -e INNGEST_BASE_URL=http://host.docker.internal:8288 \
      -v /mnt/data/workspaces:/workspaces \
      -v /mnt/data/plugins/soleur:/app/shared/plugins/soleur:ro \
      -p 0.0.0.0:80:3000 \
      -p 0.0.0.0:3000:3000 \
      ${image_name}
    rm -f "$TMPENV"
    # Fresh-host post-container egress-enforcement probe (#5933; details in the script
    # header). Fail-closed: a non-enforcing host poweroffs rather than serve an open
    # exfil path. The probe emits an SSH-free Sentry event before exiting non-zero.
    if ! /usr/local/bin/cron-egress-enforce-probe.sh; then
      echo "FATAL: container egress enforcement not proven — powering off (#5933)" >&2
      poweroff -f
    fi
    # #6090: reached serving host (poweroff → Better Stack).
    soleur-boot-emit cloud_init_complete info
