[install]
# Reject packages published less than 3 days ago (supply chain defense).
# See: https://github.com/jikig-ai/soleur/issues/1174
minimumReleaseAge = 259200

[test]
# Web-platform tests run exclusively under vitest (see vitest.config.ts).
# Block all bun test discovery as defense-in-depth — prevents happy-dom's
# GlobalRegistrator from corrupting native Request/Headers/Response APIs.
# See: #1469
pathIgnorePatterns = ["**"]
