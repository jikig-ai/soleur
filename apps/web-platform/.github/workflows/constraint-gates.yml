name: constraint-gates (L1 import boundary)

# GENERATED by `plugins/soleur/skills/constraint-scaffold` (ADR-071). Always-runs
# + internal path-check: the job fires on every PR and reports a real conclusion,
# but exits 0 fast when the target app is untouched — so a required check never
# deadlocks pending-forever on a `paths:` filter. The agent — never the founder —
# owns this file. Recovery is automatic: when this gate trips on a PR, the two-stage
# auto-recovery dispatcher (fix-constraints-stage-a/b, ADR-074) fixes the import and
# opens a follow-up PR if it is auto-fixable; otherwise a maintainer re-runs the
# constraint-scaffold skill locally (or runs `--refresh-baseline`).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  constraint-gates:
    name: L1 import-boundary gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect target changes
        id: changed
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # No --depth here: a shallow fetch can leave the merge-base unreachable,
          # making the three-dot diff fail under `set -e` and redden every
          # non-target PR. checkout already used fetch-depth: 0 (full history).
          git fetch --no-tags origin "$BASE_REF"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE '^apps/web-platform/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "apps/web-platform/** unchanged in this PR — constraint-gates passes (no-op)."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.changed == 'true'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/web-platform
        run: bun install --frozen-lockfile

      - name: Run constraint gates (fail-closed)
        if: steps.changed.outputs.changed == 'true'
        run: bash apps/web-platform/scripts/constraint-gates.sh
