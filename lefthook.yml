pre-commit:
  parallel: false
  commands:
    rust-format:
      priority: 1
      glob: "*.rs"
      run: cargo fmt --all --
      stage_fixed: true
    rust-lint-fix:
      priority: 2
      glob: "*.rs"
      run: cargo clippy --fix --allow-dirty --allow-staged -- -D warnings
      stage_fixed: true
    rust-lint-check:
      priority: 3
      glob: "*.rs"
      run: cargo clippy -- -D warnings
    markdown-lint:
      priority: 4
      glob: "*.md"
      run: npx --yes markdownlint-cli {staged_files}
      stage_fixed: true
    # Secret-scanning floor (#3121). gitleaks scans the staged index directly,
    # so no `glob:` filter is set — the binary handles file selection.
    # `--exit-code 1` makes lefthook treat any finding as a hard failure.
    # Documented as fast-feedback companion to the load-bearing CI gate at
    # .github/workflows/secret-scan.yml. Bypass with `git commit --no-verify`
    # is intentionally possible — CI re-scans on every PR.
    gitleaks-staged:
      priority: 4
      run: gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1
    # Companion linter for shapes gitleaks doesn't catch (real emails, prod-shape
    # UUIDs, Supabase project refs). Path-array glob (NOT `**/*` — gobwas
    # semantics silently no-op without explicit subdirs; see learning
    # 2026-03-21-lefthook-gobwas-glob-double-star.md).
    lint-fixture-content:
      priority: 4
      glob:
        - "apps/web-platform/test/fixtures/**"
        - "apps/web-platform/test/__synthesized__/**"
        - "apps/web-platform/test/__goldens__/**"
        - "**/__goldens__/**"
        - "**/*.snap"
        # #3322 — cover learning files so future `gitleaks:allow` waivers
        # there carry the `issue:#NNN <reason>` trailer. Dual-glob mirrors
        # kb-structure-guard (gobwas `**` requires intermediate dirs;
        # see learning 2026-03-21-lefthook-gobwas-glob-double-star.md).
        - "knowledge-base/project/learnings/*.md"
        - "knowledge-base/project/learnings/**/*.md"
      run: node apps/web-platform/scripts/lint-fixture-content.mjs {staged_files}
    rule-id-lint:
      priority: 4
      # Run target is pinned to the full index+sidecar set, not `{staged_files}`:
      # the cross-file linter (--index-file mode, #3493) needs the union to
      # validate pointer↔body 1:1, and when only retired-rule-ids.txt is
      # staged the positional path resolution would otherwise break.
      glob:
        - "AGENTS.md"
        - "AGENTS.core.md"
        - "AGENTS.docs.md"
        - "AGENTS.rest.md"
        - "scripts/retired-rule-ids.txt"
      run: python3 scripts/lint-rule-ids.py --retired-file scripts/retired-rule-ids.txt --index-file AGENTS.md AGENTS.md AGENTS.core.md AGENTS.docs.md AGENTS.rest.md
    agents-compound-sync:
      priority: 4
      # Enumerate EVERY file the guard reads. Two pre-existing gaps (#6461):
      # (a) AGENTS.docs.md was missing -- the rule-threshold sentinel moved
      #     there post-#3493 and this glob never followed, so editing the
      #     sentinel did not fire the guard that reads it;
      # (b) no self-glob, so editing the guard did not re-run the guard.
      glob:
        - "AGENTS.md"
        - "AGENTS.docs.md"
        - "plugins/soleur/skills/compound/SKILL.md"
        - "plugins/soleur/skills/plan/SKILL.md"
        - "scripts/lint-agents-rule-budget.py"
        - "scripts/compound-promote.sh"
        - "apps/web-platform/server/inngest/functions/cron-compound-promote.ts"
        - "scripts/lint-agents-compound-sync.sh"
        - "scripts/lint-agents-compound-sync.test.sh"
      run: bash scripts/lint-agents-compound-sync.sh
    agents-enforcement-tag-lint:
      priority: 5
      glob:
        - "AGENTS.md"
        - "AGENTS.core.md"
        - "AGENTS.docs.md"
        - "AGENTS.rest.md"
        - "scripts/lint-agents-enforcement-tags.py"
      # Post-#3493 sidecar split: enforcement tags now live in sidecars.
      # Anchor-parity extension landed in #3684.
      run: python3 scripts/lint-agents-enforcement-tags.py AGENTS.md AGENTS.core.md AGENTS.docs.md AGENTS.rest.md
    rule-budget-lint:
      priority: 5
      # Mirrors rule-id-lint's glob shape. Self-glob includes the linter
      # script and the test harness so test-only edits re-run the linter
      # (lint-scheduled-show-full-output convention). The shared SECTIONS
      # module is also globbed because a section-list edit should re-run
      # both lint-rule-ids.py and lint-agents-rule-budget.py.
      glob:
        - "AGENTS.md"
        - "AGENTS.core.md"
        - "AGENTS.docs.md"
        - "AGENTS.rest.md"
        - "scripts/lint-agents-rule-budget.py"
        - "scripts/lint-agents-rule-budget.test.sh"
        - "scripts/_agents_md_sections.py"
      run: python3 scripts/lint-agents-rule-budget.py AGENTS.md AGENTS.core.md AGENTS.docs.md AGENTS.rest.md
    # Fail a plan/spec/runbook/ADR/legal-runbook that prescribes a *human-run*
    # terraform / SSH / reboot / verify-on-private-net infra step (actor +
    # imperative co-occurrence, not a bare-token denylist). Enforcement teeth
    # for hr-no-ssh-fallback-in-runbooks. Dual-glob (single-star + double-star)
    # per gobwas `**` semantics: `**` requires >=1 intermediate dir, so a bare
    # `dir/**/*.md` silently skips depth-1 files. See learning
    # 2026-03-21-lefthook-gobwas-glob-double-star.md.
    lint-infra-no-human-steps:
      priority: 4
      glob:
        - "knowledge-base/project/plans/*.md"
        - "knowledge-base/project/plans/**/*.md"
        - "knowledge-base/project/specs/*.md"
        - "knowledge-base/project/specs/**/*.md"
        - "knowledge-base/engineering/operations/runbooks/*.md"
        - "knowledge-base/engineering/operations/runbooks/**/*.md"
        - "knowledge-base/legal/runbooks/*.md"
        - "knowledge-base/legal/runbooks/**/*.md"
        - "knowledge-base/engineering/architecture/decisions/*.md"
        - "knowledge-base/engineering/architecture/decisions/**/*.md"
      run: python3 scripts/lint-infra-no-human-steps.py {staged_files}
    scheduled-show-full-output-lint:
      priority: 5
      # Forbid show_full_output: true in recurring scheduled workflows. Only
      # `--once` workflows (name starts with "Scheduled (once):") may set it
      # because their prompt + tool surface are bound at create time. See
      # scripts/lint-scheduled-show-full-output.sh and #3404 + #3411 review.
      glob:
        - ".github/workflows/scheduled-*.yml"
        - "scripts/lint-scheduled-show-full-output.sh"
      run: bash scripts/lint-scheduled-show-full-output.sh {staged_files}
    web-platform-typecheck:
      priority: 5
      glob:
        - "apps/web-platform/*.{ts,tsx}"
        - "apps/web-platform/**/*.{ts,tsx}"
      run: cd apps/web-platform && npx tsc --noEmit
    conversations-update-callsites:
      priority: 5
      # Run target is the whole repo (not `{staged_files}`) because the
      # linter inspects ALL conversation-update sites in
      # apps/web-platform/server/ — adding a new allowlist marker requires
      # rescanning files that may not be staged.
      glob:
        - "apps/web-platform/server/*.ts"
        - "apps/web-platform/server/**/*.ts"
        - "scripts/lint-conversations-update-callsites.sh"
      run: bash scripts/lint-conversations-update-callsites.sh
    # client-pii-grep (#3703): signal-quality gate — flags userId/user_id/email
    # passed in `extra:` to a direct Sentry.capture* call in client-importable
    # code. NOT a security control (the L3 beforeSend backstop strips it at
    # runtime); this surfaces the bypass in the PR diff. Path-array glob, not
    # `**/*`, per 2026-03-21-lefthook-gobwas-glob-double-star.md.
    client-pii-grep:
      priority: 5
      # Dual-glob (single-star + double-star) per gobwas `**` semantics:
      # gobwas `**` matches 1+ intermediate dirs, NOT 0+, so a bare
      # `dir/**/*.{ts,tsx}` silently SKIPS depth-1 files such as
      # app/global-error.tsx and lib/observability-edge.ts — both real client
      # Sentry.captureException sites. Mirrors the gdpr-gate-advisory dual-glob
      # below. See 2026-03-21-lefthook-gobwas-glob-double-star.md.
      glob:
        - "apps/web-platform/lib/*.{ts,tsx}"
        - "apps/web-platform/lib/**/*.{ts,tsx}"
        - "apps/web-platform/components/*.{ts,tsx}"
        - "apps/web-platform/components/**/*.{ts,tsx}"
        - "apps/web-platform/app/*.{ts,tsx}"
        - "apps/web-platform/app/**/*.{ts,tsx}"
      run: bash .github/scripts/check-client-pii-sentry.sh {staged_files}
    # gdpr-gate advisory hook (per AGENTS.md hr-gdpr-gate-on-regulated-data-surfaces).
    # ALWAYS exits 0 — prints a one-line stderr breadcrumb when staged paths
    # match the canonical regulated-data regex. Glob list is in path-array
    # form to avoid gobwas `**` semantics
    # (see 2026-03-21-lefthook-gobwas-glob-double-star.md). Mirrors the
    # canonical regex in plugins/soleur/skills/gdpr-gate/SKILL.md and
    # scripts/gdpr-gate.sh.
    #
    # CI self-test: .github/workflows/gdpr-gate-self-test.yml is the
    # load-bearing gate for regressions in
    # plugins/soleur/skills/gdpr-gate/scripts/** (issue #3536). The glob
    # below intentionally does NOT cover scripts/ because pre-commit
    # fixture runs are slow and flaky; CI carries the assertion instead.
    gdpr-gate-advisory:
      priority: 6
      glob:
        - "apps/web-platform/supabase/migrations/*.sql"
        - "apps/web-platform/lib/auth/*.ts"
        - "apps/web-platform/lib/auth/**/*.ts"
        - "apps/web-platform/lib/auth/*.tsx"
        - "apps/web-platform/lib/auth/**/*.tsx"
        - "apps/web-platform/lib/auth/*.js"
        - "apps/web-platform/lib/auth/**/*.js"
        - "apps/web-platform/server/*auth*.ts"
        - "apps/web-platform/server/*auth*.tsx"
        - "apps/web-platform/server/*auth*.js"
        - "apps/web-platform/app/api/*.ts"
        - "apps/web-platform/app/api/**/*.ts"
        - "apps/web-platform/app/api/*.tsx"
        - "apps/web-platform/app/api/**/*.tsx"
        - "*.sql"
      run: bash plugins/soleur/skills/gdpr-gate/scripts/gdpr-gate.sh {staged_files}
    # vendor-pin-integrity (FR5): verifies the staged contents of every
    # NOTICE-tracked lifted file match the blob SHAs pinned in NOTICE
    # frontmatter. Detects silent local edits to upstream-vendored content
    # and silent additions of files outside the registry. The integrity
    # script reads its registry from NOTICE at runtime, so the glob
    # intentionally covers the whole `references/` subtree (plus NOTICE
    # itself) — any new file added under `references/` triggers the script,
    # which then rejects it via the "staged but not in NOTICE" branch.
    # Narrow per-file globs would let a re-vendor land a 6th file without
    # the integrity gate ever firing on it.
    vendor-pin-integrity:
      priority: 6
      glob:
        - "plugins/soleur/skills/gdpr-gate/references/*.md"
        - "plugins/soleur/skills/gdpr-gate/references/layers/*.md"
        - "plugins/soleur/skills/gdpr-gate/NOTICE"
      run: bash plugins/soleur/skills/gdpr-gate/scripts/vendor-pin-integrity.sh {staged_files}
    # skill-security-scan advisory hook (#2719).
    # ALWAYS exits 0 — prints a one-line stderr breadcrumb on HIGH-RISK
    # without override artifact. Belt-and-suspenders for IDE / manual
    # `git commit` paths that bypass the Claude Code PreToolUse hook.
    # Glob list is in array form per gobwas `**` semantics
    # (2026-03-21-lefthook-gobwas-glob-double-star.md).
    skill-security-scan-advisory:
      priority: 7
      glob:
        - "plugins/soleur/skills/**/SKILL.md"
        - ".claude/skills/**/SKILL.md"
        - ".claude/agents/**/*.md"
        - "plugins/soleur/agents/**/*.md"
      run: bash .claude/hooks/skill-security-scan.sh {staged_files}
    bun-test:
      priority: 6
      glob: "*.{ts,tsx,js,jsx}"
      run: bash scripts/test-all.sh
    plugin-component-test:
      priority: 7
      glob: "plugins/soleur/**/*.md"
      run: bun test plugins/soleur/test/
    terraform-fmt:
      priority: 8
      glob: "apps/*/infra/*.tf"
      run: terraform fmt {staged_files}
      stage_fixed: true
    kb-structure-guard:
      priority: 9
      glob:
        - "knowledge-base/{brainstorms,learnings,plans,specs}/*"
        - "knowledge-base/{brainstorms,learnings,plans,specs}/**/*"
      run: |
        echo "ERROR: Files staged at deprecated knowledge-base paths." >&2
        echo "Move to knowledge-base/project/ before committing:" >&2
        echo "  knowledge-base/{brainstorms,learnings,plans,specs}/ -> knowledge-base/project/{brainstorms,learnings,plans,specs}/" >&2
        exit 1
    generate-kb-index:
      priority: 10
      glob: "knowledge-base/**/*.md"
      run: bash scripts/generate-kb-index.sh && git add knowledge-base/INDEX.md
    # Auto-regenerate the compiled LikeC4 model whenever a .c4 source is staged,
    # then re-stage it — mirrors the generate-kb-index precedent above (its
    # priority 10 + `run: <script> && git add <generated-file>` shape). NOTE the
    # glob differs deliberately: generate-kb-index uses `**` because KB markdown
    # is nested, but the .c4 sources are FLAT depth-1, so this glob is single-star
    # (gobwas `**` requires ≥1 intermediate dir and would silently skip depth-1
    # files — see 2026-03-21-lefthook-gobwas-glob-double-star.md). The script
    # renders off-tree + validates (refuses to publish an empty/invalid model),
    # so a broken .c4 BLOCKS the commit instead of clobbering the good artifact.
    # The CI freshness test (plugins/soleur/test/c4-model-freshness.test.sh)
    # backstops a --no-verify bypass. c4-model.md is hand-authored prose — never
    # machine-rewritten; the advisory line only nudges a human review.
    c4-model-regenerate:
      priority: 10
      glob: "knowledge-base/engineering/architecture/diagrams/*.c4"
      run: |
        bash scripts/regenerate-c4-model.sh || exit 1
        git add knowledge-base/engineering/architecture/diagrams/model.likec4.json || exit 1
        git diff --cached --name-only | grep -qx 'knowledge-base/engineering/architecture/diagrams/c4-model.md' \
          || echo "NOTE: .c4 model changed but c4-model.md was not staged — review its ## Notes prose for staleness (advisory; commit not blocked)." >&2
        exit 0
    # priority 11: runs after generate-kb-index (priority 10) so the linter
    # sees the final staged file. Single-star glob is intentional — content
    # files are flat; gobwas's ** requires 1+ directory levels and would
    # silently skip everything. See knowledge-base/project/learnings/
    # 2026-03-21-lefthook-gobwas-glob-double-star.md.
    distribution-content-liquid-guard:
      priority: 11
      glob: "knowledge-base/marketing/distribution-content/*.md"
      run: bash scripts/lint-distribution-content.sh {staged_files}

# pre-push mirror of the client-pii-grep signal-quality gate (#3703) so a bypass
# is surfaced at push time even if the pre-commit hook was skipped (e.g. amended
# commit, --no-verify on an earlier commit). Same shared script, same scope.
pre-push:
  commands:
    client-pii-grep:
      priority: 5
      # Dual-glob, same gobwas rationale as the pre-commit entry above.
      glob:
        - "apps/web-platform/lib/*.{ts,tsx}"
        - "apps/web-platform/lib/**/*.{ts,tsx}"
        - "apps/web-platform/components/*.{ts,tsx}"
        - "apps/web-platform/components/**/*.{ts,tsx}"
        - "apps/web-platform/app/*.{ts,tsx}"
        - "apps/web-platform/app/**/*.{ts,tsx}"
      # {push_files}, NOT {staged_files}: in a pre-push hook lefthook resolves
      # {staged_files} to empty (nothing is staged at push time), so the
      # command silently skips with "no files for inspection" — a vacuous gate.
      # {push_files} is the pre-push file set (the push range). Verified e2e
      # against lefthook 2.1.6 with a real `git push`.
      run: bash .github/scripts/check-client-pii-sentry.sh {push_files}
