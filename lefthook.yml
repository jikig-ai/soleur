pre-commit:
  parallel: false
  commands:
    rust-format:
      priority: 1
      glob: "*.rs"
      run: cargo fmt --all --
      stage_fixed: true
    rust-lint-fix:
      priority: 2
      glob: "*.rs"
      run: cargo clippy --fix --allow-dirty --allow-staged -- -D warnings
      stage_fixed: true
    rust-lint-check:
      priority: 3
      glob: "*.rs"
      run: cargo clippy -- -D warnings
    markdown-lint:
      priority: 4
      glob: "*.md"
      run: npx --yes markdownlint-cli {staged_files}
      stage_fixed: true
    rule-id-lint:
      priority: 4
      glob: "AGENTS.md"
      run: python3 scripts/lint-rule-ids.py {staged_files}
    web-platform-typecheck:
      priority: 5
      glob:
        - "apps/web-platform/*.{ts,tsx}"
        - "apps/web-platform/**/*.{ts,tsx}"
      run: cd apps/web-platform && npx tsc --noEmit
    bun-test:
      priority: 6
      glob: "*.{ts,tsx,js,jsx}"
      run: bash scripts/test-all.sh
    plugin-component-test:
      priority: 7
      glob: "plugins/soleur/**/*.md"
      run: bun test plugins/soleur/test/
    terraform-fmt:
      priority: 8
      glob: "apps/*/infra/*.tf"
      run: terraform fmt {staged_files}
      stage_fixed: true
    kb-structure-guard:
      priority: 9
      glob:
        - "knowledge-base/{brainstorms,learnings,plans,specs}/*"
        - "knowledge-base/{brainstorms,learnings,plans,specs}/**/*"
      run: |
        echo "ERROR: Files staged at deprecated knowledge-base paths." >&2
        echo "Move to knowledge-base/project/ before committing:" >&2
        echo "  knowledge-base/{brainstorms,learnings,plans,specs}/ -> knowledge-base/project/{brainstorms,learnings,plans,specs}/" >&2
        exit 1
    generate-kb-index:
      priority: 10
      glob: "knowledge-base/**/*.md"
      run: bash scripts/generate-kb-index.sh && git add knowledge-base/INDEX.md
    distribution-content-liquid-guard:
      priority: 11
      glob: "knowledge-base/marketing/distribution-content/*.md"
      run: bash scripts/lint-distribution-content.sh {staged_files}
