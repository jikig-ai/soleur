# skill-security-scan rule-pack manifest (SHA-pinned, R13 mitigation)
#
# `run-scan.sh` recomputes sha256sum of each declared file at scan time. A
# mismatch fail-closes the scan to REVIEW with reason "rule pack tampered."
# This prevents a poisoned rule pack from silently passing malicious skills.
#
# SHA computation: `sha256sum <file>` over raw bytes. .gitattributes pins LF
# line-endings via `text=auto` so SHAs are reproducible cross-platform.
#
# Rule-pack edits MUST recompute SHAs in the same commit. Use:
#
#   bash scripts/run-self-test.sh --regenerate-manifest
#
# (CI rejects --regenerate-manifest when env CI=true to prevent accidental
# bypass.)
#
# Format: each entry under `files:` declares a rule-pack file path RELATIVE
# to the skill's references/ directory.

version: "0.1.0"
semgrep_min_version: "1.0.0"  # advisory pin; semgrep is not at runtime path today
