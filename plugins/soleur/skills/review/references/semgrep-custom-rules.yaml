# Custom semgrep rules that mirror CodeQL queries we care about but which are
# NOT covered by the public rule packs (p/javascript, p/owasp-top-ten,
# p/security-audit, --config=auto). Loaded alongside the stock rule packs.
#
# Coverage goal: close the "CI CodeQL surprises us after push" gap for
# JS/TS patterns we've already been burned by.
#
# Rule numbering: prefix every rule ID with `soleur.` so they are visibly
# distinct from upstream rules in semgrep output.
#
# Starter file — add a new rule any time CodeQL flags a pattern in CI that
# semgrep didn't catch locally. The rule does not have to be perfect; it
# only has to catch the exact shape of the real violation so we regress-
# test future changes against our own past mistakes.

rules:
  # Mirrors CodeQL js/file-system-race.
  # Origin: PR #2463 flagged stat + readFile on the same path as a TOCTOU.
  # The fix is O_NOFOLLOW + fstat on an fd handle.
  - id: soleur.js-file-system-race-stat-then-readfile
    patterns:
      - pattern-inside: |
          function $F(...) {
            ...
          }
      - pattern-either:
          - pattern: |
              await fs.promises.stat($PATH)
              ...
              await fs.promises.readFile($PATH)
          - pattern: |
              fs.statSync($PATH)
              ...
              fs.readFileSync($PATH)
    message: |
      Possible TOCTOU race: fs.promises.stat($PATH) followed by
      fs.promises.readFile($PATH) on the same path (CodeQL js/file-system-race).
      An attacker can swap the file between the two syscalls. Switch to an
      fd-based read: fs.promises.open(path, O_RDONLY | O_NOFOLLOW) then
      handle.stat() and handle.readFile().
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-367: Time-of-check to Time-of-use"
      owasp: "A01:2021 - Broken Access Control"
      mirrors: "CodeQL: js/file-system-race"
      soleur-origin: "PR #2463"

  # Mirrors CodeQL js/file-system-race variant with an lstat pre-check that
  # is superseded by an O_NOFOLLOW fd path. The pre-check is dead code and
  # widens the TOCTOU window.
  - id: soleur.js-file-system-race-lstat-before-open
    patterns:
      - pattern-inside: |
          function $F(...) {
            ...
          }
      - pattern: |
          await fs.promises.lstat($PATH)
          ...
          await fs.promises.open($PATH, ...)
    message: |
      Redundant lstat pre-check ahead of fs.promises.open($PATH). The open
      call with O_NOFOLLOW and the subsequent fd-level fstat are the
      authoritative checks; the lstat only widens the TOCTOU window.
      Remove the lstat and rely on the fd path (CodeQL js/file-system-race).
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-367: Time-of-check to Time-of-use"
      mirrors: "CodeQL: js/file-system-race"
      soleur-origin: "PR #2463"

  # Mirrors CodeQL js/incomplete-url-substring-sanitization.
  # Origin: PR #4573 — a test assertion `html.includes("https://soleur.ai")`
  # tripped CodeQL in CI (local semgrep auto/p-packs did not catch it). Checking
  # whether a string contains a scheme-bearing URL via a substring method is the
  # canonical incomplete-host-sanitization anti-pattern: "https://soleur.ai" can
  # appear anywhere (e.g. https://soleur.ai.evil.com). Use URL parsing + exact
  # host comparison in prod code, or an anchored HTML-element regex in tests.
  - id: soleur.js-incomplete-url-substring-sanitization
    patterns:
      - pattern-either:
          - pattern: $X.includes($URL)
          - pattern: $X.startsWith($URL)
          - pattern: $X.endsWith($URL)
          - pattern: $X.indexOf($URL)
      - metavariable-regex:
          metavariable: $URL
          regex: ^"https?://
    message: |
      Substring check against a scheme-bearing URL literal ($URL). A host
      embedded in a substring test can be bypassed (the literal may appear
      anywhere in the string). In production code, parse the URL and compare
      .host exactly; in tests, match an anchored HTML-element regex via
      toMatch(...) instead of .includes("https://..."). Mirrors CodeQL
      js/incomplete-url-substring-sanitization.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-20: Improper Input Validation"
      mirrors: "CodeQL: js/incomplete-url-substring-sanitization"
      soleur-origin: "PR #4573"

  # In-transit half of the encryption-posture ledger (R6): moved here from the
  # hand-rolled lint-encryption-posture.py detector rather than a bespoke
  # connection-surface recognizer, because CodeQL/Semgrep already cover this shape
  # and a fail-closed-on-indeterminate branch in the Python detector would fire on
  # the whole connection surface (52+ sites source their DSN from Doppler at
  # runtime with no scheme string in the code at all).
  - id: soleur.tls-cert-verification-defeated
    patterns:
      - pattern-either:
          # AST patterns (TS/JS): both key orders of the object-literal defeat.
          - pattern: $OPTS.rejectUnauthorized = false
          - pattern: |
              {rejectUnauthorized: false, ...}
          - pattern: |
              {..., rejectUnauthorized: false, ...}
          # Text patterns (cross-language: bash/python/env/CLI shapes that are
          # not valid TS/JS AST and would otherwise fail --validate).
          - pattern-regex: 'NODE_TLS_REJECT_UNAUTHORIZED\s*=\s*.?0'
          - pattern-regex: '(^|\s)curl\s[^\n]*(-k\b|--insecure\b)'
          - pattern-regex: '--no-check-certificate\b'
          - pattern-regex: 'verify\s*=\s*False\b'
          - pattern-regex: 'InsecureSkipVerify\s*:\s*true'
    message: |
      This defeats TLS certificate verification (rejectUnauthorized: false,
      NODE_TLS_REJECT_UNAUTHORIZED=0, --no-check-certificate, curl -k/--insecure,
      or verify=False). Encryption in transit without certificate verification lets
      an attacker on the network path present their own certificate undetected --
      "TLS is on" is not "TLS is verified". See the encryption-posture ledger
      (scripts/encryption-posture-ledger.json) and ADR-140: the connection's
      in_transit.cert_verification must be "on" with a resolvable anchor, or the
      row is an exception with a named justification and tracking_issue. Known
      dev-only exceptions (e.g. the byok-*.tenant-isolation.test.ts fixtures) are
      test-path-excluded, not silenced here.
    severity: ERROR
    languages: [typescript, javascript, bash, python]
    metadata:
      category: security
      cwe: "CWE-295: Improper Certificate Validation"
      mirrors: "encryption-posture ledger R6 (in-transit)"
      soleur-origin: "feat-one-shot-encryption-at-rest-in-transit-design-default"

  # Postgres sslmode: `require`/`allow`/`prefer` encrypt the connection but do NOT
  # verify the presented certificate; `disable` skips TLS entirely. This is the
  # in-transit analogue of the hcloud_volume attribute trap -- the thing that
  # *looks* like the check is not the check. Advisory (WARNING) because the
  # Supabase-pooler self-signed-chain exception (sslmode=require against the
  # pooler) is a known, ledgered exception -- do not try to encode it here.
  - id: soleur.postgres-sslmode-unverified
    patterns:
      - pattern-either:
          - pattern-regex: 'sslmode=(require|allow|prefer|disable)\b'
    message: |
      This Postgres connection string uses sslmode=require/allow/prefer/disable,
      which encrypts-without-verifying (require/allow/prefer) or does not encrypt
      at all (disable). Use sslmode=verify-full so the presented certificate is
      checked against a trusted CA and the hostname. The known Supabase-pooler
      self-signed-chain exception (sslmode=require against the connection pooler)
      is recorded in scripts/encryption-posture-ledger.json with its own
      tracking_issue -- do not treat this WARNING as blocking without checking the
      ledger first. See ADR-140.
    severity: WARNING
    languages: [typescript, javascript, bash, python]
    metadata:
      category: security
      cwe: "CWE-295: Improper Certificate Validation"
      mirrors: "encryption-posture ledger R6 (in-transit)"
      soleur-origin: "feat-one-shot-encryption-at-rest-in-transit-design-default"
