name: bot-pr-with-synthetic-checks
description: >
  Commit bot-authored changes, open a PR, post synthetic check-runs to satisfy
  the CI Required and CLA Required rulesets on main, and queue auto-merge.
  PRs created with GITHUB_TOKEN don't re-trigger workflows — we post the
  required Checks via the API (integration_id 15368 is the GitHub Actions
  app). Callers pass the paths to add (newline-separated), branch prefix,
  commit message, PR title prefix, and a short change-summary used in the
  synthetic check outputs.

inputs:
  add-paths:
    description: >
      Newline-separated paths to `git add`. Each line is a single path; empty
      lines are ignored. Paths may contain spaces. A trailing `--` is passed
      to `git add` so leading-dash paths cannot be interpreted as flags.
    required: true
  branch-prefix:
    description: >
      Prefix for the feature branch name. The action appends `$(date -u
      +%Y-%m-%d)` as a date suffix inside the shell so expansion works.
    required: true
  commit-message:
    description: Commit message for the bot PR.
    required: true
  pr-title-prefix:
    description: >
      PR title prefix. The action appends the same date suffix used for the
      branch name (e.g. prefix `chore(rule-metrics): weekly aggregate` →
      title `chore(rule-metrics): weekly aggregate 2026-04-18`).
    required: true
  pr-body:
    description: >
      PR body. Must be single-line — multi-line content fails validation so
      a future caller doesn't silently break `gh pr create --body`.
    required: true
  change-summary:
    description: >
      Short text used as the `output[summary]` of the test, dependency-review,
      and e2e synthetic checks. cla-check uses a fixed allowlist summary.
      Must fit the GitHub check-run summary 60KB cap.
    required: false
    default: "Bot PR, no code changes"
  gh-token:
    description: GITHUB_TOKEN with contents/pull-requests/checks=write.
    required: true

runs:
  using: composite
  steps:
    - name: Commit, open bot PR, post synthetic checks, queue auto-merge
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        ADD_PATHS: ${{ inputs.add-paths }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        PR_TITLE_PREFIX: ${{ inputs.pr-title-prefix }}
        PR_BODY: ${{ inputs.pr-body }}
        CHANGE_SUMMARY: ${{ inputs.change-summary }}
        REPO: ${{ github.repository }}
      run: |
        set -eo pipefail
        # Validate payload-like inputs up-front so failure is loud, not silent.
        if [[ "$PR_BODY" == *$'\n'* ]]; then
          echo "::error::pr-body must be single-line"
          exit 1
        fi
        if (( ${#CHANGE_SUMMARY} > 60000 )); then
          echo "::error::change-summary exceeds GitHub 60KB check-run summary cap"
          exit 1
        fi
        # Parse newline-separated add-paths into an array. Drops blank lines
        # and preserves spaces in individual paths. The trailing `--` in the
        # git add call stops option parsing so a path beginning with `-`
        # cannot be misread as a flag.
        PATHS=()
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          PATHS+=("$line")
        done <<< "$ADD_PATHS"
        if (( ${#PATHS[@]} == 0 )); then
          echo "::error::add-paths is empty"
          exit 1
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -- "${PATHS[@]}"
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        DATE_SUFFIX="$(date -u +%Y-%m-%d)"
        BRANCH="${BRANCH_PREFIX}${DATE_SUFFIX}"
        git checkout -b "$BRANCH"
        git commit -m "$COMMIT_MESSAGE"
        git push -u origin "$BRANCH"
        # Pass PR body via --body-file so multi-line content would round-trip
        # cleanly if the single-line guard is ever relaxed.
        BODY_FILE=$(mktemp)
        printf '%s' "$PR_BODY" > "$BODY_FILE"
        gh pr create \
          --title "${PR_TITLE_PREFIX} ${DATE_SUFFIX}" \
          --body-file "$BODY_FILE" \
          --base main \
          --head "$BRANCH"
        rm -f "$BODY_FILE"
        COMMIT_SHA=$(git rev-parse HEAD)
        # Synthetic checks — satisfies CI Required + CLA Required rulesets on
        # main. Use the Checks API (/check-runs), NOT Statuses API; rulesets
        # require Check Runs from integration_id 15368.
        for check in test dependency-review e2e; do
          gh api "repos/${REPO}/check-runs" \
            -f name="$check" \
            -f head_sha="$COMMIT_SHA" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=Bot PR" \
            -f "output[summary]=${CHANGE_SUMMARY}"
        done
        gh api "repos/${REPO}/check-runs" \
          -f name=cla-check \
          -f head_sha="$COMMIT_SHA" \
          -f status=completed \
          -f conclusion=success \
          -f "output[title]=CLA pre-approved" \
          -f "output[summary]=github-actions[bot] is in CLA allowlist"
        gh pr merge "$BRANCH" --squash --auto
