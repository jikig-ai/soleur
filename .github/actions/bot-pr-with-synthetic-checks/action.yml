name: bot-pr-with-synthetic-checks
description: >
  Commit bot-authored changes, open a PR, post synthetic check-runs to satisfy
  the CI Required and CLA Required rulesets on main, and queue auto-merge.
  PRs created with GITHUB_TOKEN don't re-trigger workflows — we post the
  required Checks via the API (integration_id 15368 is the GitHub Actions
  app). Callers pass the paths to add (newline-separated), branch prefix,
  commit message, PR title prefix, and a short change-summary used in the
  synthetic check outputs.

inputs:
  add-paths:
    description: >
      Newline-separated paths to `git add`. Each line is a single path; empty
      lines are ignored. Paths may contain spaces. A trailing `--` is passed
      to `git add` so leading-dash paths cannot be interpreted as flags.
    required: true
  branch-prefix:
    description: >
      Prefix for the feature branch name. The action appends `$(date -u
      +%Y-%m-%d)` as a date suffix inside the shell so expansion works.
    required: true
  commit-message:
    description: Commit message for the bot PR.
    required: true
  pr-title-prefix:
    description: >
      PR title prefix. The action appends the same date suffix used for the
      branch name (e.g. prefix `chore(rule-metrics): weekly aggregate` →
      title `chore(rule-metrics): weekly aggregate 2026-04-18`).
    required: true
  pr-body:
    description: >
      PR body. Must be single-line — multi-line content fails validation so
      a future caller doesn't silently break `gh pr create --body`.
    required: true
  change-summary:
    description: >
      Short text used as the `output[summary]` of the test, dependency-review,
      and e2e synthetic checks. cla-check uses a fixed allowlist summary;
      cla-evidence uses a fixed not-applicable summary.
      Must fit the GitHub check-run summary 60KB cap.
    required: false
    default: "Bot PR, no code changes"
  gh-token:
    description: GITHUB_TOKEN with contents/pull-requests/checks=write.
    required: true
  draft:
    description: >
      If 'true' (case-insensitive after lowercase normalization), open the PR
      as draft. Default 'false' preserves existing caller behavior. Non-boolean
      values fail loud. See CHANGELOG.md v2.
    required: false
    default: 'false'
  skip-auto-merge:
    description: >
      If 'true' (case-insensitive after lowercase normalization), skip the
      final `gh pr merge --squash --auto`. Default 'false' preserves existing
      caller behavior. Non-boolean values fail loud. See CHANGELOG.md v2.
    required: false
    default: 'false'
  labels:
    description: >
      Newline-separated label names applied via `gh pr edit --add-label`.
      Empty string skips the label step. Labels MUST already exist — caller's
      responsibility. See CHANGELOG.md v2.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Commit, open bot PR, post synthetic checks, queue auto-merge
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        ADD_PATHS: ${{ inputs.add-paths }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        PR_TITLE_PREFIX: ${{ inputs.pr-title-prefix }}
        PR_BODY: ${{ inputs.pr-body }}
        CHANGE_SUMMARY: ${{ inputs.change-summary }}
        DRAFT: ${{ inputs.draft }}
        SKIP_AUTO_MERGE: ${{ inputs.skip-auto-merge }}
        LABELS: ${{ inputs.labels }}
        REPO: ${{ github.repository }}
      run: |
        set -eo pipefail
        # Normalize boolean inputs at the boundary. Composite-action inputs are
        # always strings; lowercase + hard-reject any non-{true,false} value so
        # callers passing 'True'/'1'/'yes' fail loud. (Architecture review #4.)
        DRAFT=$(printf '%s' "${DRAFT:-false}" | tr '[:upper:]' '[:lower:]')
        SKIP_AUTO_MERGE=$(printf '%s' "${SKIP_AUTO_MERGE:-false}" | tr '[:upper:]' '[:lower:]')
        case "$DRAFT" in
          true|false) ;;
          *) echo "::error::draft must be 'true' or 'false' (got: $DRAFT)"; exit 1 ;;
        esac
        case "$SKIP_AUTO_MERGE" in
          true|false) ;;
          *) echo "::error::skip-auto-merge must be 'true' or 'false' (got: $SKIP_AUTO_MERGE)"; exit 1 ;;
        esac
        # Validate payload-like inputs up-front so failure is loud, not silent.
        if [[ "$PR_BODY" == *$'\n'* ]]; then
          echo "::error::pr-body must be single-line"
          exit 1
        fi
        if (( ${#CHANGE_SUMMARY} > 60000 )); then
          echo "::error::change-summary exceeds GitHub 60KB check-run summary cap"
          exit 1
        fi
        # Parse newline-separated add-paths into an array. Drops blank lines
        # and preserves spaces in individual paths. The trailing `--` in the
        # git add call stops option parsing so a path beginning with `-`
        # cannot be misread as a flag.
        PATHS=()
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          PATHS+=("$line")
        done <<< "$ADD_PATHS"
        if (( ${#PATHS[@]} == 0 )); then
          echo "::error::add-paths is empty"
          exit 1
        fi
        # --- #6049 safe-surface allowlist (explicit enumeration) ---
        # This action fabricates a green `gitleaks scan` AND `lint fixture
        # content` for bot PRs (both are required 15368 contexts the bot cannot
        # trigger). It may therefore only add artifacts whose content it can
        # ACTUALLY scan with a real gitleaks run below. `.gitleaks.toml`
        # allowlists the knowledge-base/{plans,specs,references}/** and
        # learnings/** subtrees, so a real gitleaks pass over them finds nothing
        # and the earned-green would be a fabrication after all. Reject anything
        # outside the two real artifacts — fail loud (NOT a bare "markdown under
        # knowledge-base/" predicate, which would be gitleaks-blind AND reject
        # the rule-metrics `.json` caller).
        #
        # ⚠ #6103 / ADR-092 PREFLIGHT-TODO (rule-body-lint fabrication ceiling):
        # `rule-body-lint` is a required 15368 context this action FABRICATES a
        # green for (it is in required-checks.txt for canonical set-parity). That
        # is sound ONLY because no AGENTS.{core,docs,rest}.md path is in
        # ALLOWED_PATHS below, so no bot PR can weaken a hard-rule body under the
        # fabricated green. BEFORE adding any AGENTS.{core,docs,rest}.md path here
        # (the #6038 auto-proposer will need AGENTS.core.md — its TARGET_ALLOW_RE),
        # you MUST first reproduce `python3 scripts/lint-rule-bodies.py --check
        # --base <merge-base>` over the bot diff in a Phase-4 preflight step (same
        # earned-green pattern as the real gitleaks run below) and fail loud on a
        # BLOCK. Extending ALLOWED_PATHS to an AGENTS path without that
        # reproduction silently defeats the body-weakening gate for bot PRs.
        #
        # ⚠ #6882 / ADR-139 — the ALLOWED_PATHS ∩ SCAN_DIRS test. The two notes
        # above (and the sentry-destroy-required note in required-checks.txt)
        # rely on the guarded surface being UNREACHABLE from ALLOWED_PATHS. That
        # argument is per-gate and must be RE-DERIVED, never inherited: it does
        # NOT hold for `credential-path-guard`, whose scanner walks tracked *.md
        # under plugins/ and knowledge-base/ — which includes weakness-digest.md
        # below. Its green is therefore EARNED by a real scan in the Phase-4
        # ceiling, not argued. Before adding ANY path here, re-derive the
        # intersection for EVERY content-scoped required check, and note that
        # reachability can also widen without touching this array — a change to
        # a generator's OUTPUT FORMAT (e.g. weakness-miner.sh emitting learning
        # titles instead of bare basenames) moves the other input silently.
        ALLOWED_PATHS=(
          "knowledge-base/project/weakness-digest.md"
          "knowledge-base/project/rule-metrics.json"
        )
        for p in "${PATHS[@]}"; do
          allowed=false
          for a in "${ALLOWED_PATHS[@]}"; do
            [[ "$p" == "$a" ]] && { allowed=true; break; }
          done
          if [[ "$allowed" != "true" ]]; then
            echo "::error::add-path '$p' is not in the bot-PR safe-surface allowlist (${ALLOWED_PATHS[*]}). #6049 content-safety ceiling: the action can only earn a real gitleaks/lint-fixture green for paths it can actually scan; .gitleaks.toml allowlists plans/specs/references/learnings so a real scan there is blind. Add a Phase-4 preflight that can scan this path, then extend ALLOWED_PATHS."
            exit 1
          fi
        done
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -- "${PATHS[@]}"
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        # --- #6049 content-safety ceiling (Tier 2, MANDATORY) ---
        # Because the synthetic set now fabricates greens for `gitleaks scan`
        # AND `lint fixture content`, the action must EARN both over its own
        # staged diff before creating the PR. Any finding => fail loud, no
        # branch pushed, no PR, no synthetics. Tier 1 (push-protection only)
        # was REJECTED: it misses this repo's custom .gitleaks.toml rules +
        # the entire lint-fixture-content PII class. (security-sentinel)
        #
        # gitleaks: pinned install (3rd site) — version + SHA256 MUST match
        # secret-scan.yml and ci.yml test-scripts (enforced by
        # required-checks-canonical-parity.test.sh Test 5). Scans the STAGED
        # index only (`git --pre-commit --staged`) with the repo .gitleaks.toml
        # (auto-loaded at repo root), mirroring secret-scan.yml's engine.
        GITLEAKS_VERSION="8.24.2"
        GITLEAKS_SHA256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
        GITLEAKS_DIR="$(mktemp -d)"
        curl -sSLo "${GITLEAKS_DIR}/gitleaks.tgz" \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        echo "${GITLEAKS_SHA256}  ${GITLEAKS_DIR}/gitleaks.tgz" | sha256sum -c -
        tar -xzf "${GITLEAKS_DIR}/gitleaks.tgz" -C "${GITLEAKS_DIR}" gitleaks
        chmod +x "${GITLEAKS_DIR}/gitleaks"
        if ! "${GITLEAKS_DIR}/gitleaks" git --pre-commit --staged --redact --no-banner --exit-code 1; then
          echo "::error::gitleaks found a secret-shaped string in the bot diff — refusing to create the PR or post synthetics (#6049 content-safety ceiling)."
          exit 1
        fi
        # lint fixture content: emails / prod Supabase refs / prod UUIDs — a
        # class gitleaks does NOT cover and whose CI scope excludes the digest
        # paths. Fail loud if node is unavailable rather than silently skipping
        # a security gate.
        if ! command -v node >/dev/null 2>&1; then
          echo "::error::node not found — cannot run lint-fixture-content over the bot diff (#6049 ceiling requires it)."
          exit 1
        fi
        if ! node apps/web-platform/scripts/lint-fixture-content.mjs "${PATHS[@]}"; then
          echo "::error::lint-fixture-content found a PII/prod-ref string in the bot diff — refusing to create the PR or post synthetics (#6049 content-safety ceiling)."
          exit 1
        fi
        # --- #6882 earned green for `credential-path-guard` (ADR-139) ---
        # A resolvable home-relative path to a real credential file makes Claude
        # Code's harness auto-attach that file into model context when the doc
        # loads — the vector that leaked a live Doppler token into transcripts.
        #
        # `credential-path-guard` is a required 15368 context, so the synthetic
        # posted below is unconditional. Unlike `rule-body-lint` (#6103) and
        # `sentry-destroy-required` (#6589) — whose fabricated greens are sound
        # because their guarded surfaces sit OUTSIDE ALLOWED_PATHS — this gate's
        # SCAN_DIRS (tracked *.md under plugins/ + knowledge-base/) INCLUDES
        # knowledge-base/project/weakness-digest.md, which IS in ALLOWED_PATHS.
        # ALLOWED_PATHS ∩ SCAN_DIRS is NON-empty, so the green must be EARNED
        # here rather than argued from unreachability. Deleting this block
        # fabricates a pass over a reachable surface; parity test 8 enforces it.
        #
        # Non-.md staged paths (rule-metrics.json) are filtered by the scanner
        # itself — passing the full "${PATHS[@]}" is correct.
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::error::python3 not found — cannot run lint-credential-path-literals over the bot diff (#6882 earned green requires it)."
          exit 1
        fi
        if ! python3 scripts/lint-credential-path-literals.py "${PATHS[@]}"; then
          echo "::error::lint-credential-path-literals found a resolvable credential-file path in the bot diff — refusing to create the PR or post synthetics (#6882 earned green)."
          exit 1
        fi
        DATE_SUFFIX="$(date -u +%Y-%m-%d)"
        BRANCH="${BRANCH_PREFIX}${DATE_SUFFIX}"
        git checkout -b "$BRANCH"
        git commit -m "$COMMIT_MESSAGE"
        git push -u origin "$BRANCH"
        # Pass PR body via --body-file so multi-line content would round-trip
        # cleanly if the single-line guard is ever relaxed.
        BODY_FILE=$(mktemp)
        printf '%s' "$PR_BODY" > "$BODY_FILE"
        # Build args array so the conditional --draft flag does not become a
        # quoted empty arg (would land in the title with `gh pr create --draft ""`).
        PR_CREATE_ARGS=(
          --title "${PR_TITLE_PREFIX} ${DATE_SUFFIX}"
          --body-file "$BODY_FILE"
          --base main
          --head "$BRANCH"
        )
        if [[ "$DRAFT" == "true" ]]; then
          PR_CREATE_ARGS+=(--draft)
        fi
        gh pr create "${PR_CREATE_ARGS[@]}"
        rm -f "$BODY_FILE"
        # Apply labels (no-op when LABELS is empty). Labels must pre-exist —
        # caller's responsibility per CHANGELOG.md v2.
        if [[ -n "$LABELS" ]]; then
          while IFS= read -r label; do
            [[ -z "$label" ]] && continue
            gh pr edit "$BRANCH" --add-label "$label"
          done <<< "$LABELS"
        fi
        COMMIT_SHA=$(git rev-parse HEAD)
        # Synthetic checks — satisfies CI Required + CLA Required rulesets on
        # main. Use the Checks API (/check-runs), NOT Statuses API; rulesets
        # require Check Runs from integration_id 15368. PRs created with
        # GITHUB_TOKEN don't re-trigger CI, so each required check is posted here.
        #
        # CHECK_NAMES is DERIVED from scripts/required-checks.txt (the SSOT) —
        # NOT hardcoded. #6049 fixed the drift where a hardcoded 6-name array
        # fell behind the ruleset's 16 always-run 15368 contexts and every bot
        # PR stalled at mergeState=BLOCKED forever. The file-vs-file parity test
        # (plugins/soleur/test/required-checks-canonical-parity.test.sh) keeps
        # the SSOT ≡ the canonical ruleset JSON, and a composite→SSOT guard in
        # the same test catches any future re-hardcode here. `CodeQL` (GHAS
        # 57789) is intentionally omitted from the SSOT — a 15368 synthetic
        # cannot satisfy a GHAS gate; CodeQL concludes `neutral` for bot PRs.
        #
        # Parser: leading-`#`-only comment rule (kept in sync with
        # scripts/lint-bot-synthetic-completeness.sh) — preserves multi-word
        # names ("skill-security-scan PR gate") and `#`-bearing names ("waiver
        # discipline (issue:#NNN trailer)"); NEVER `tr -d '[:space:]'`.
        REQUIRED_CHECKS_FILE="scripts/required-checks.txt"
        if [[ ! -f "$REQUIRED_CHECKS_FILE" ]]; then
          echo "::error::${REQUIRED_CHECKS_FILE} not found — the repo must be checked out before this action so CHECK_NAMES can be derived from the SSOT. Refusing to post an empty (deadlocking) synthetic set."
          exit 1
        fi
        CHECK_NAMES=()
        while IFS= read -r rcline; do
          [[ "$rcline" =~ ^[[:space:]]*# ]] && continue
          rcline="${rcline#"${rcline%%[![:space:]]*}"}"
          rcline="${rcline%"${rcline##*[![:space:]]}"}"
          if [[ "$rcline" == \"*\" ]]; then rcline="${rcline#\"}"; rcline="${rcline%\"}"; fi
          [[ -z "$rcline" ]] && continue
          CHECK_NAMES+=("$rcline")
        done < "$REQUIRED_CHECKS_FILE"
        if (( ${#CHECK_NAMES[@]} == 0 )); then
          echo "::error::no synthetic check names parsed from ${REQUIRED_CHECKS_FILE}"
          exit 1
        fi
        # Post one check-run per name, exactly once. cla-check / cla-evidence
        # carry custom output titles/summaries via a `case`; all others share
        # the generic change-summary. Sourcing from ONE list means no name is
        # double-posted and no hardcoded block can silently diverge from the SSOT.
        for check in "${CHECK_NAMES[@]}"; do
          case "$check" in
            cla-check)
              OUT_TITLE="CLA pre-approved"
              OUT_SUMMARY="github-actions[bot] is in CLA allowlist"
              ;;
            cla-evidence)
              OUT_TITLE="CLA evidence not applicable"
              OUT_SUMMARY="Bot-authored PR — no CLA-signed contributions to attest."
              ;;
            *)
              OUT_TITLE="Bot PR"
              OUT_SUMMARY="${CHANGE_SUMMARY}"
              ;;
          esac
          gh api "repos/${REPO}/check-runs" \
            -f name="$check" \
            -f head_sha="$COMMIT_SHA" \
            -f status=completed \
            -f conclusion=success \
            -f "output[title]=${OUT_TITLE}" \
            -f "output[summary]=${OUT_SUMMARY}"
        done
        if [[ "$SKIP_AUTO_MERGE" != "true" ]]; then
          gh pr merge "$BRANCH" --squash --auto
        fi
