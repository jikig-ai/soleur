# CF Tunnel SSH bridge — setup steps for a GitHub runner to SSH into the prod
# Hetzner host whose firewall :22 ingress is restricted to var.admin_ips (the
# runner's egress IP is NOT in that allowlist and cannot be — 5000+ rotating
# IPs). Bridges SSH through the existing Cloudflare Tunnel (#4177/#4181/#4830):
# install cloudflared, open a `cloudflared access tcp` localhost forward, pull
# the CF Access ci_ssh service-token + decode the CI SSH key, and add an
# `iptables -t nat OUTPUT REDIRECT` rule rewriting SERVER_IP:22 → 127.0.0.1:2222.
# The redirect is transparent to terraform's Go SSH client (which ignores
# ~/.ssh/config / ProxyCommand — learning
# 2026-05-20-terraform-go-ssh-client-ignores-ssh-config-multi-agent-catch.md).
#
# Extracted verbatim from apply-deploy-pipeline-fix.yml (#4830 inline bridge,
# lines 182-309) so both that workflow and apply-web-platform-infra.yml share
# one mechanism (#4844). SETUP ONLY — see the teardown contract below.
#
# ── SHA-RECOMPUTE DISCIPLINE ───────────────────────────────────────────────
# `cloudflared-sha256` MUST be computed against the REAL released binary at the
# pinned `cloudflared-version` (curl the release asset, `sha256sum` it). NEVER
# paste a checksum from documentation or AI output (2026-03-21 server-
# provisioning learning, Session Error #4). Re-verify at /work time when bumping
# the version.
#
# ── CALLER-SIDE TEARDOWN CONTRACT (load-bearing) ───────────────────────────
# This composite action CANNOT register a post-job hook (no JS `post:` step), so
# it does NOT tear itself down. Every caller MUST add an `if: always()` teardown
# step AFTER its terraform apply that deletes the NAT rule and kills cloudflared,
# guarded so a pre-bridge failure does not error the teardown:
#
#   - name: Tear down cloudflared SSH bridge
#     if: always()
#     shell: bash
#     run: |
#       set +e
#       if [[ -n "${SERVER_IP:-}" ]]; then
#         sudo iptables -t nat -D OUTPUT -d "$SERVER_IP" -p tcp --dport 22 \
#           -j REDIRECT --to-ports 2222 2>/dev/null || true
#       fi
#       if [[ -n "${CLOUDFLARED_PID:-}" ]]; then
#         kill "$CLOUDFLARED_PID" 2>/dev/null || true
#       fi
#       if [[ -n "${CI_SSH_KEYFILE:-}" && -f "$CI_SSH_KEYFILE" ]]; then
#         shred -u "$CI_SSH_KEYFILE" 2>/dev/null || true
#       fi
#       if [[ -f /tmp/cloudflared.log ]]; then tail -n 200 /tmp/cloudflared.log || true; fi
#
# The `-n` guards are mandatory: SERVER_IP / CLOUDFLARED_PID / CI_SSH_KEYFILE are
# unset if the bridge failed before exporting them (SpecFlow 1a). A left-over
# OUTPUT NAT rule, orphaned cloudflared, or on-disk CI keyfile would corrupt/leak
# into a later job on a persistent runner (moot on GH-hosted ephemeral runners,
# but the discipline is required). The `CI_SSH_KEYFILE` shred applies only to
# `server-ip` (bash-ssh) callers; it is unset for terraform callers.
#
# ── PREREQUISITES ──────────────────────────────────────────────────────────
#  - `terraform init` must have run in `infra-dir` BEFORE this action ONLY when
#    the `server-ip` input is EMPTY (the bridge then reads `terraform output -raw
#    server_ip` from the R2 state). When `server-ip` is supplied, no terraform is
#    needed — the caller passes the address directly.
#  - The CF Access ci_ssh service token + DEPLOY_SSH_PRIVATE_KEY must be present
#    in Doppler prd_terraform (apply-web-platform-infra.yml auto-syncs both
#    post-apply). The pull/decode steps fail loud if either is missing/empty.
#
# ── OUTPUTS (to $GITHUB_ENV, job-scoped, visible to the caller's later steps) ─
#  Always: SERVER_IP, CLOUDFLARED_PID, TUNNEL_SERVICE_TOKEN_ID,
#  TUNNEL_SERVICE_TOKEN_SECRET.
#  When `server-ip` is EMPTY (terraform callers): TF_VAR_ci_ssh_private_key.
#  When `server-ip` is SET (bash-ssh callers): CI_SSH_KEYFILE (chmod 600 temp key)
#  + WEB_HOST_SSH + GIT_DATA_SSH (ready `ssh -i <keyfile> … -l root` invocations the
#  cutover/verify scripts consume via `${WEB_HOST_SSH}`). The key form is
#  mutually exclusive per caller class — the key never lands on an unused surface.
#
# Composite actions cannot read the `secrets` context — every secret is an
# explicit input referenced ONLY inside `env:` mappings (never a `run:` body or
# step `name:`), because action inputs are NOT auto-masked the way repository
# secrets are (AC8). The key/token values are add-masked per-line at decode time.

name: 'CF Tunnel SSH bridge'
description: 'Bring up a cloudflared SSH bridge + iptables NAT redirect so a GH runner can SSH to the prod host over the Cloudflare Tunnel. Setup only; caller must add an if:always() teardown.'

inputs:
  doppler-token:
    description: 'Doppler service token (prd_terraform, read-only). Caller forwards the DOPPLER_TOKEN repo secret.'
    required: true
  infra-dir:
    description: 'Path to the terraform root; `terraform output -raw server_ip` is read from it ONLY when `server-ip` is empty. e.g. apps/web-platform/infra.'
    required: true
  cloudflared-version:
    description: 'cloudflared release version to install (e.g. 2026.5.0).'
    required: true
  cloudflared-sha256:
    description: 'SHA-256 of the cloudflared-linux-amd64 binary at cloudflared-version (recompute against the real binary — see header).'
    required: true
  server-ip:
    description: >-
      Optional. The address the redirect scopes to AND (for bash-ssh callers) the
      keyfile+WEB_HOST_SSH/GIT_DATA_SSH export is enabled by. When set, the bridge
      skips `terraform output -raw server_ip` (no terraform needed) and writes the
      CI key to a temp file + exports the ready ssh invocation the cutover scripts
      consume. When empty (default), behavior is byte-identical to the pre-input
      terraform path (apply-web-platform-infra.yml relies on this).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install cloudflared (SHA-pinned)
      shell: bash
      env:
        CLOUDFLARED_VERSION: ${{ inputs.cloudflared-version }}
        CLOUDFLARED_SHA256: ${{ inputs.cloudflared-sha256 }}
      run: |
        set -euo pipefail
        curl -fsSL -o /tmp/cloudflared \
          "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64"
        echo "${CLOUDFLARED_SHA256}  /tmp/cloudflared" | sha256sum -c -
        sudo install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
        rm /tmp/cloudflared
        cloudflared --version

    - name: Pull CF Access service-token credentials from Doppler
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
        DOPPLER_PROJECT: soleur
        DOPPLER_CONFIG: prd_terraform
      # `doppler secrets get … --plain` returns rc=1 ONLY when the key is
      # absent; for keys present with an empty value it returns rc=0 + empty
      # stdout. The `-z` guard catches both. Prereq: apply-web-platform-infra.yml
      # must have succeeded once to create the CF Access ci_ssh service token AND
      # populate Doppler (it auto-syncs both post-apply).
      run: |
        set -euo pipefail
        TOKEN_ID=$(doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain 2>/dev/null || true)
        TOKEN_SECRET=$(doppler secrets get CI_SSH_ACCESS_TOKEN_SECRET --plain 2>/dev/null || true)
        if [[ -z "$TOKEN_ID" || -z "$TOKEN_SECRET" ]]; then
          echo "::error::CI_SSH_ACCESS_TOKEN_ID/_SECRET missing or empty in Doppler prd_terraform. Apply apply-web-platform-infra.yml first (it auto-syncs both secrets post-apply)."
          exit 1
        fi
        printf '::add-mask::%s\n' "$TOKEN_ID"
        printf '::add-mask::%s\n' "$TOKEN_SECRET"
        printf 'TUNNEL_SERVICE_TOKEN_ID=%s\n' "$TOKEN_ID" >> "$GITHUB_ENV"
        printf 'TUNNEL_SERVICE_TOKEN_SECRET=%s\n' "$TOKEN_SECRET" >> "$GITHUB_ENV"

    - name: Decode CI SSH private key (TF_VAR + optional keyfile/WEB_HOST_SSH export)
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
        DOPPLER_PROJECT: soleur
        DOPPLER_CONFIG: prd_terraform
        SERVER_IP_INPUT: ${{ inputs.server-ip }}
      # The bridge connection authenticates with var.ci_ssh_private_key
      # (agent = false in CI). The secret name (DEPLOY_SSH_PRIVATE_KEY) does NOT
      # map to the var name (ci_ssh_private_key) via --name-transformer tf-var,
      # so it is set here explicitly. The key is multiline (OpenSSH format) →
      # GITHUB_ENV heredoc-delimiter form; each line add-masked. NEVER on the command line
      # (AC6). terraform marks the var sensitive = true so it is never echoed in
      # plan/apply output.
      run: |
        set -euo pipefail
        KEY=$(doppler secrets get DEPLOY_SSH_PRIVATE_KEY --plain)
        if [[ -z "$KEY" ]]; then
          echo "::error::DEPLOY_SSH_PRIVATE_KEY missing or empty in Doppler prd_terraform (produced by ci-ssh-key.tf on the operator-local full apply)."
          exit 1
        fi
        while IFS= read -r line; do
          [[ -n "$line" ]] && printf '::add-mask::%s\n' "$line"
        done <<< "$KEY"
        # The two caller classes are mutually exclusive and each gets ONLY the key
        # form it uses — the key never lands on a surface its caller does not need:
        if [[ -n "${SERVER_IP_INPUT:-}" ]]; then
          # bash-ssh callers (LUKS cutover/verify pipe a script over
          # `${WEB_HOST_SSH} "$HOST"`): write the key to a chmod 600 temp keyfile
          # and export the ready ssh invocation. NO TF_VAR — these callers run no
          # terraform, so the key stays OFF $GITHUB_ENV (only the keyfile holds
          # it, and the caller's if:always() teardown shreds that).
          KEYFILE=$(mktemp)
          chmod 600 "$KEYFILE"
          # Export the path BEFORE writing key bytes so the caller's if:always()
          # teardown can shred the file even if the write below is interrupted.
          echo "CI_SSH_KEYFILE=$KEYFILE" >> "$GITHUB_ENV"
          printf '%s\n' "$KEY" > "$KEYFILE"
          SSH_INVOCATION="ssh -i $KEYFILE -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -l root"
          printf 'WEB_HOST_SSH=%s\n' "$SSH_INVOCATION" >> "$GITHUB_ENV"
          printf 'GIT_DATA_SSH=%s\n' "$SSH_INVOCATION" >> "$GITHUB_ENV"
        else
          # terraform callers (apply-web-platform-infra.yml): the Go SSH client
          # authenticates with var.ci_ssh_private_key. Byte-identical to the
          # pre-server-ip behavior (this heredoc was previously unconditional).
          {
            echo "TF_VAR_ci_ssh_private_key<<__SOLEUR_CI_SSH_KEY_EOF__"
            printf '%s\n' "$KEY"
            echo "__SOLEUR_CI_SSH_KEY_EOF__"
          } >> "$GITHUB_ENV"
        fi

    - name: Start cloudflared SSH bridge + iptables NAT redirect
      shell: bash
      working-directory: ${{ inputs.infra-dir }}
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
        DOPPLER_PROJECT: soleur
        DOPPLER_CONFIG: prd_terraform
        SERVER_IP_INPUT: ${{ inputs.server-ip }}
      run: |
        set -euo pipefail
        # APP_DOMAIN_BASE is NOT in the prd_terraform config — fall back to the
        # canonical default exactly like the verify steps in the caller (do NOT
        # use the bare form: it exits non-zero under `set -e` and kills the step
        # before cloudflared starts; #4829 post-merge hotfix #4840).
        APP_DOMAIN_BASE=$(doppler secrets get APP_DOMAIN_BASE --plain 2>/dev/null || echo "soleur.ai")
        # When server-ip is supplied (bash-ssh callers: the LUKS cutover/verify
        # workflows), scope the NAT redirect to it directly — no terraform needed.
        # When empty (terraform callers: apply-web-platform-infra.yml), read the
        # public IP from state exactly as before. The empty-check + export below
        # are COMMON to both paths (teardown needs SERVER_IP either way).
        SERVER_IP="${SERVER_IP_INPUT:-}"
        if [[ -z "$SERVER_IP" ]]; then
          SERVER_IP=$(terraform output -raw server_ip)
        fi
        if [[ -z "$SERVER_IP" ]]; then
          echo "::error::server-ip input empty AND terraform output server_ip empty — cannot scope the NAT redirect to the prod host."
          exit 1
        fi
        printf '::add-mask::%s\n' "$SERVER_IP"
        printf 'SERVER_IP=%s\n' "$SERVER_IP" >> "$GITHUB_ENV"

        # Start cloudflared in the background; it forwards 127.0.0.1:2222 over
        # the tunnel to the host's localhost:22 (sshd) via the ssh.${app_domain_base}
        # ingress rule. Service-token auth at the CF Access edge uses
        # TUNNEL_SERVICE_TOKEN_ID/_SECRET env. `--loglevel warn` bounds steady-state
        # log volume; flap/handshake failures still surface (teardown step dumps the log).
        cloudflared access tcp \
          --loglevel warn \
          --hostname "ssh.${APP_DOMAIN_BASE}" \
          --url 127.0.0.1:2222 \
          > /tmp/cloudflared.log 2>&1 &
        CF_PID=$!
        printf 'CLOUDFLARED_PID=%s\n' "$CF_PID" >> "$GITHUB_ENV"
        disown "$CF_PID"

        # Wait up to 15s for the local TCP listener to come up.
        for _ in $(seq 1 15); do
          if nc -z 127.0.0.1 2222 2>/dev/null; then
            break
          fi
          sleep 1
        done
        if ! nc -z 127.0.0.1 2222 2>/dev/null; then
          echo "::error::cloudflared TCP forward did not open on 127.0.0.1:2222 within 15s (CF Access ci_ssh token may be expired/missing)."
          cat /tmp/cloudflared.log >&2 || true
          exit 1
        fi

        # iptables NAT redirect: terraform's provisioner "file"/"remote-exec"
        # blocks use the Go SSH client (golang.org/x/crypto/ssh) directly, which
        # does NOT consult ~/.ssh/config or ProxyCommand (only the system ssh
        # binary does — learning 2026-05-20-terraform-go-ssh-client-ignores-ssh-config-multi-agent-catch.md).
        # Kernel-redirect outbound SERVER_IP:22 → 127.0.0.1:2222 on this runner
        # (transparent to the Go client), with no server.tf connection.host change.
        # Scoped to -d "$SERVER_IP" so ONLY traffic to the prod host is hijacked,
        # never all outbound :22 on the runner. OUTPUT chain → only this runner's egress.
        if ! sudo iptables -t nat -A OUTPUT \
          -d "$SERVER_IP" -p tcp --dport 22 \
          -j REDIRECT --to-ports 2222; then
          echo "::error::iptables NAT redirect SERVER_IP:22 → 127.0.0.1:2222 failed — terraform's Go SSH client cannot reach the host via the tunnel."
          exit 1
        fi
