name: 'Notify Ops Email'
description: 'Send ops notification email via Resend HTTP API to ops@jikigai.com'

inputs:
  subject:
    description: 'Email subject line'
    required: true
  body:
    description: 'Email body (HTML allowed)'
    required: true
  resend-api-key:
    description: 'Resend API key (from secrets.RESEND_API_KEY)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Send email via Resend
      shell: bash
      env:
        RESEND_API_KEY: ${{ inputs.resend-api-key }}
        EMAIL_SUBJECT: ${{ inputs.subject }}
        EMAIL_BODY: ${{ inputs.body }}
      run: |
        if [[ -z "${RESEND_API_KEY:-}" ]]; then
          echo "::warning::RESEND_API_KEY not set, skipping email notification"
          exit 0
        fi

        PAYLOAD=$(jq -n \
          --arg from "Soleur Ops <noreply@send.soleur.ai>" \
          --arg subject "$EMAIL_SUBJECT" \
          --arg html "$EMAIL_BODY" \
          '{from: $from, to: ["ops@jikigai.com"], subject: $subject, html: $html}')

        HTTP_CODE=$(curl -s -o /tmp/resend-response.txt -w "%{http_code}" \
          -X POST "https://api.resend.com/emails" \
          -H "Authorization: Bearer ${RESEND_API_KEY}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        if [[ "$HTTP_CODE" =~ ^2 ]]; then
          echo "Email notification sent to ops@jikigai.com (HTTP ${HTTP_CODE})"
        else
          echo "::warning::Email notification failed (HTTP ${HTTP_CODE}): $(cat /tmp/resend-response.txt)"
        fi
