name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    # Keep this list in sync with the path-filter regex in
    # .github/workflows/ci.yml's detect-changes job — both gate the same
    # docs/Eleventy surface (critical-css-gate pre-merge, this workflow
    # post-merge). See #3624.
    paths:
      - 'plugins/soleur/docs/**'
      - 'plugins/soleur/agents/**'
      - 'plugins/soleur/skills/**'
      - 'plugins/soleur/commands/**'
      - 'eleventy.config.js'
  workflow_run:
    workflows: ["Version Bump and Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Runs inside the official Playwright container so the screenshot-gate step
    # (below) has Chromium + OS deps pre-installed at the matching Playwright
    # version. Container tag, digest, and the playwright@X.Y.Z npm pin below
    # MUST stay in lockstep with .github/workflows/ci.yml's critical-css-gate —
    # both gates assert the same FOUC contract via the same screenshot-gate.mjs
    # script (see AGENTS.md cq-eleventy-critical-css-screenshot-gate). Future
    # Playwright bumps: update tag, digest, AND the `playwright@<X.Y.Z>` npm
    # pin below, in BOTH this workflow and ci.yml — 4 places total, atomically.
    container:
      # Pinned by both tag (greppable version) AND digest (vendor-pin discipline,
      # per AGENTS.md hr-mcp-tools-playwright-etc-resolve-paths). The Playwright
      # image runs as root by default — that is the supported path for
      # actions/checkout (see https://github.com/actions/checkout/issues/956).
      # Do NOT add `options: --user 1001` — it triggers UID-mismatch permission
      # errors against /__w/_temp. Image ships Node 24 (no actions/setup-node
      # needed). Pages-deploy actions (configure-pages, upload-pages-artifact,
      # deploy-pages) work inside container jobs — the OIDC token is env-injected
      # by the runner, not filesystem-dependent.
      image: mcr.microsoft.com/playwright:v1.60.0-jammy@sha256:e1529a04087193966ea15d4a1617345bdaa0791690a24ab2c42b65f9ce5b2cdc
    defaults:
      run:
        # GitHub Actions container `run:` steps default to /bin/sh (dash on
        # Jammy). Explicit bash matches existing step shapes (`|| true`,
        # `2>/dev/null`, `if [ "$UP" -ne 1 ]`).
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npx @11ty/eleventy
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate SEO
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-seo.sh _site

      - name: Canonical-host gate (no www leaks)
        # Catches stray https://www.soleur.ai/... (www) interpolations leaking
        # into rendered HTML/XML. Canonical host is https://soleur.ai (the bare
        # apex); www 301s → apex at the edge (GitHub Pages enforces the CNAME
        # apex). Any rendered www reference points at a host that redirects,
        # which is the GSC `Page with redirect` cluster cause this gate guards
        # against. Regex covers EVERY non-host-continuation suffix: `/`, `?`,
        # `#`, `"`, `'`, `<`, ` `, EOL, etc. Negative class `[^a-zA-Z0-9.-]`
        # rejects only same-prefix-different-domain matches. See #3297 and the
        # 2026-05-29 www→apex host flip. No untrusted input — pattern is literal.
        run: |
          if grep -rEn 'https://www\.soleur\.ai($|[^a-zA-Z0-9.-])' _site/; then
            echo "FAIL: rendered output contains www-host references (canonical is apex)"
            exit 1
          fi
          echo "PASS: no www-host leaks in rendered output"

      - name: Validate CSP
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-csp.sh _site

      - name: Verify build output
        run: |
          test -f _site/index.html || { echo "Missing index.html"; exit 1; }
          for page in agents skills changelog getting-started; do
            test -f "_site/${page}/index.html" || { echo "Missing ${page}/index.html"; exit 1; }
          done
          test -f _site/404.html || { echo "Missing 404.html"; exit 1; }
          test -f _site/css/style.css || { echo "Missing css/style.css"; exit 1; }
          test -f _site/CNAME || { echo "Missing CNAME"; exit 1; }
          test -f _site/llms.txt || { echo "Missing llms.txt"; exit 1; }
          echo "All required files present"

      - name: Static critical-CSS coverage check
        # Cheap pre-check: enumerate above-fold class selectors in templates and
        # confirm each has a rule in the inline <style> block. Fails fast with
        # an actionable list of missing selectors before the Playwright gate
        # spins up Chromium. See plugins/soleur/docs/scripts/check-critical-css-coverage.mjs.
        run: node plugins/soleur/docs/scripts/check-critical-css-coverage.mjs

      - name: Install Playwright (Chromium only) for screenshot gate
        # Container provides the Chromium binary + OS deps; the npm package
        # (used by `import { chromium } from "playwright"` in screenshot-gate.mjs)
        # must match the container's Playwright version EXACTLY — browser-binary
        # lookup is exact-revision (see learning
        # 2026-03-20-playwright-shared-cache-version-coupling.md). Use exact
        # `X.Y.Z` — no `^`, no `~`, no `playwright@1` floating tag — or the
        # npm package drifts off the container's Chromium revision. Keep this
        # pin in sync with the container image tag above and with ci.yml's
        # critical-css-gate matching step.
        run: npm install --no-save playwright@1.60.0 http-server@14

      - name: Screenshot gate (FOUC) + stylesheet-swap regression gate
        run: |
          npx http-server _site -p 8888 -a 127.0.0.1 -c-1 -s &
          SERVER_PID=$!
          UP=0
          for _ in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:8888/; then UP=1; break; fi
            sleep 0.5
          done
          if [ "$UP" -ne 1 ]; then
            echo "gates: http-server failed to come up within 15s" >&2
            kill $SERVER_PID 2>/dev/null || true
            exit 2
          fi
          set +e
          node plugins/soleur/docs/scripts/screenshot-gate.mjs
          GATE_EXIT=$?
          if [ "$GATE_EXIT" -eq 0 ]; then
            node plugins/soleur/docs/scripts/check-stylesheet-swap.mjs
            GATE_EXIT=$?
          fi
          set -e
          kill $SERVER_PID 2>/dev/null || true
          exit $GATE_EXIT

      - name: Upload screenshot-gate failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshot-gate-failures
          path: screenshot-gate-failures/
          if-no-files-found: ignore
          retention-days: 14

      # ─── Option A (#4596): suppress soleur_www deploy-window false page ───
      # A Pages rebuild re-propagates the apex-canonical redirect; during that
      # window https://www.soleur.ai/ transiently serves its own 200 instead of
      # the asserted 301, false-paging the soleur_www uptime monitor (observed
      # 2026-05-29 ~12:30 CEST, #4573/#4578). Pausing the monitor for the publish
      # window makes the deploy invisible to it WITHOUT lengthening its fuse, so
      # real www→apex regressions still page at threshold=3 (parity with apex;
      # supersedes the conservative downtime_threshold=5 from #4595). The resume
      # step below runs `if: always()` so a failed deploy still re-enables it.
      - name: Pause soleur_www uptime monitor (suppress deploy-window false page)
        id: pause_www_monitor
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          SENTRY_API_HOST: ${{ secrets.SENTRY_API_HOST }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        run: |
          # Best-effort: a transient Sentry API blip must NEVER block a docs
          # deploy. Every failure path warns + exits 0; only a successful pause
          # records monitor_id so the resume step knows to re-enable.
          set -uo pipefail
          # This job runs in the Playwright container as root, so bare apt-get
          # (no sudo, unlike apply-sentry-infra.yml's VM runner) is correct.
          which jq >/dev/null 2>&1 || { apt-get update && apt-get install -y jq; }
          # Uptime monitors are Sentry "detectors", NOT Crons monitors — they are
          # served by /detectors/, not /organizations/{org}/monitors/ (#4591).
          detectors=$(curl -sS --max-time 20 \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://${SENTRY_API_HOST}/api/0/organizations/${SENTRY_ORG}/detectors/") || {
              echo "::warning::Failed to list Sentry detectors; skipping pause (deploy continues)."
              exit 0
            }
          # Select by name AND uptime type. The /detectors/ list returns every
          # detector type for the org (uptime, Crons, metric/error) and Sentry
          # allows duplicate names, so cross-check .type to avoid pausing a
          # non-uptime detector that happens to share the name. Substring match
          # on "uptime" is resilient to the exact discriminator string and is
          # fail-safe: no match → empty id → pause skipped with a warning,
          # never a wrong-detector mutation.
          id=$(jq -r '[.[] | select(.name == "soleur-ai-www" and ((.type // "") | test("uptime")))] | .[0].id // empty' <<<"$detectors" 2>/dev/null)
          if [[ -z "$id" ]]; then
            echo "::warning::soleur-ai-www detector not found; skipping pause (deploy continues)."
            exit 0
          fi
          # Toggle via a bare partial PUT {"enabled": false} (verified 200).
          # Echoing the full GET response back instead 400s: the GET (response)
          # shape includes nested fields (dataSources[].queryObj.url) that
          # serialize as null on read, but the PUT (request) schema requires a
          # non-null string — the response and request schemas differ. A bare
          # partial body avoids the whole class. See #4596 hotfix (#4603 shipped
          # the broken GET-then-PUT and reddened every docs deploy).
          status=$(curl -sS --max-time 20 -X PUT \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled":false}' \
            "https://${SENTRY_API_HOST}/api/0/organizations/${SENTRY_ORG}/detectors/${id}/" \
            -o /dev/null -w '%{http_code}')
          echo "pause PUT status: ${status}"
          # Record id regardless of pause-PUT outcome so resume always re-enables
          # (resume PUT enabled=true is idempotent if the pause never took effect).
          echo "monitor_id=${id}" >> "$GITHUB_OUTPUT"
          if [[ "$status" != "200" ]]; then
            echo "::warning::Pause PUT returned ${status} (expected 200); monitor may not be paused. Deploy continues; resume still runs."
          else
            echo "Paused soleur-ai-www detector ${id}."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      # Resume the soleur_www monitor paused above. `if: always()` so a failed
      # deploy/probe still re-enables it (never strand the monitor paused). The
      # probe is best-effort: wait for the apex-canonical redirect to re-propagate
      # (~15-min window observed 2026-05-29), then resume regardless of outcome.
      - name: Probe www→apex 301 then resume soleur_www monitor
        if: always()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          SENTRY_API_HOST: ${{ secrets.SENTRY_API_HOST }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          MONITOR_ID: ${{ steps.pause_www_monitor.outputs.monitor_id }}
        run: |
          set -uo pipefail
          # Propagation grace + confirming probe (best-effort; never block resume).
          # Cap = 30 × 10s ≈ 5 min. The pause/resume bracket already covers the
          # whole deploy window, so this probe only decides whether to log
          # "301 confirmed" vs a warning before resuming — the resume runs
          # regardless, so the cap never strands the monitor.
          confirmed=0
          for attempt in $(seq 1 30); do
            code=$(curl -s --max-time 10 -o /dev/null -w '%{http_code}' "https://www.soleur.ai/")
            if [[ "$code" == "301" ]]; then confirmed=1; break; fi
            if [[ "$attempt" -lt 30 ]]; then sleep 10; fi  # no trailing sleep after the last probe
          done
          if [[ "$confirmed" -eq 1 ]]; then
            echo "www→apex 301 confirmed."
          else
            echo "::warning::www did not return 301 within probe cap; resuming monitor anyway."
          fi
          # Resume only if the pause step captured an id (it skips on not-found).
          if [[ -z "${MONITOR_ID}" ]]; then
            echo "No monitor id captured at pause; nothing to resume."
            exit 0
          fi
          # Resume via a bare partial PUT {"enabled": true} (verified 200) — same
          # reason as the pause step: echoing the full GET body back 400s on the
          # null nested fields. A stranded-paused monitor is worse than a red
          # workflow, so a non-200 exits 1 (fail-loud).
          http=$(curl -sS --max-time 20 -X PUT \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled":true}' \
            "https://${SENTRY_API_HOST}/api/0/organizations/${SENTRY_ORG}/detectors/${MONITOR_ID}/" \
            -o /dev/null -w '%{http_code}')
          echo "resume PUT status: ${http}"
          if [[ "$http" != "200" ]]; then
            echo "::error::Failed to resume soleur-ai-www monitor (HTTP ${http}). It may remain paused until manually re-enabled or a deploy-docs.yml re-run (the next apply-sentry-infra.yml run is NOT a guaranteed self-heal — enabled:null null-handling is unverified)."
            exit 1
          fi
          echo "Resumed soleur-ai-www detector ${MONITOR_ID}."
