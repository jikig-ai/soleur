name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'plugins/soleur/docs/**'
      - 'plugins/soleur/agents/**'
      - 'plugins/soleur/skills/**'
      - 'plugins/soleur/commands/**'
      - 'eleventy.config.js'
  workflow_run:
    workflows: ["Version Bump and Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npx @11ty/eleventy
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate SEO
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-seo.sh _site

      - name: Apex-host canonical gate
        # Catches stray https://soleur.ai/... (apex) interpolations leaking
        # into rendered HTML/XML. Canonical host is https://www.soleur.ai
        # (apex 301s to www at the edge). Regex covers EVERY non-host-
        # continuation suffix: `/`, `?`, `#`, `"`, `'`, `<`, ` `, EOL, etc.
        # Negative class `[^a-zA-Z0-9.-]` rejects only `soleur.ai-org` /
        # `soleur.aitech.com` style same-prefix-different-domain matches.
        # See #3297. No untrusted input — pattern is literal.
        run: |
          if grep -rEn 'https://soleur\.ai($|[^a-zA-Z0-9.-])' _site/; then
            echo "FAIL: rendered output contains apex-host references"
            exit 1
          fi
          echo "PASS: no apex-host leaks in rendered output"

      - name: Validate CSP
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-csp.sh _site

      - name: Verify build output
        run: |
          test -f _site/index.html || { echo "Missing index.html"; exit 1; }
          for page in agents skills changelog getting-started; do
            test -f "_site/${page}/index.html" || { echo "Missing ${page}/index.html"; exit 1; }
          done
          test -f _site/404.html || { echo "Missing 404.html"; exit 1; }
          test -f _site/css/style.css || { echo "Missing css/style.css"; exit 1; }
          test -f _site/CNAME || { echo "Missing CNAME"; exit 1; }
          test -f _site/llms.txt || { echo "Missing llms.txt"; exit 1; }
          echo "All required files present"

      - name: Static critical-CSS coverage check
        # Cheap pre-check: enumerate above-fold class selectors in templates and
        # confirm each has a rule in the inline <style> block. Fails fast with
        # an actionable list of missing selectors before the Playwright gate
        # spins up Chromium. See plugins/soleur/docs/scripts/check-critical-css-coverage.mjs.
        run: node plugins/soleur/docs/scripts/check-critical-css-coverage.mjs

      - name: Install Playwright (Chromium only) for screenshot gate
        run: |
          npm install --no-save playwright@1 http-server@14
          npx playwright install --with-deps chromium

      - name: Screenshot gate (FOUC) + stylesheet-swap regression gate
        run: |
          npx http-server _site -p 8888 -a 127.0.0.1 -c-1 -s &
          SERVER_PID=$!
          UP=0
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:8888/; then UP=1; break; fi
            sleep 0.5
          done
          if [ "$UP" -ne 1 ]; then
            echo "gates: http-server failed to come up within 15s" >&2
            kill $SERVER_PID 2>/dev/null || true
            exit 2
          fi
          set +e
          node plugins/soleur/docs/scripts/screenshot-gate.mjs
          GATE_EXIT=$?
          if [ "$GATE_EXIT" -eq 0 ]; then
            node plugins/soleur/docs/scripts/check-stylesheet-swap.mjs
            GATE_EXIT=$?
          fi
          set -e
          kill $SERVER_PID 2>/dev/null || true
          exit $GATE_EXIT

      - name: Upload screenshot-gate failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshot-gate-failures
          path: screenshot-gate-failures/
          if-no-files-found: ignore
          retention-days: 14

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
