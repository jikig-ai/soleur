name: Telegram Bridge Release

on:
  push:
    branches: [main]
    paths: ['apps/telegram-bridge/**']
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      skip_deploy:
        description: "Skip deployment after release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      component: telegram-bridge
      component_display: "Soleur Telegram Bridge"
      path_filter: "apps/telegram-bridge/"
      tag_prefix: "telegram-v"
      docker_image: "ghcr.io/jikig-ai/soleur-telegram-bridge"
      docker_context: "apps/telegram-bridge"
      bump_type: ${{ inputs.bump_type || '' }}
      force_run: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  deploy:
    needs: release
    if: >-
      always() &&
      needs.release.outputs.docker_pushed == 'true' &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-telegram-bridge
      cancel-in-progress: false
    steps:
      - name: Deploy via webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET_BRIDGE }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID_BRIDGE }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET_BRIDGE }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          PAYLOAD=$(printf '{"command":"deploy telegram-bridge ghcr.io/jikig-ai/soleur-telegram-bridge v%s"}' "$VERSION")
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -d "$PAYLOAD" \
            "https://deploy-bridge.soleur.ai/hooks/deploy")
          if [[ "$HTTP_CODE" != "202" ]]; then
            echo "::error::Deploy webhook rejected (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deploy initiated (HTTP 202)"

      - name: Verify deploy health
        run: |
          echo "::warning::Bridge health endpoint is localhost-only -- automated verification not available. Check: ssh root@bridge 'journalctl -u webhook -t ci-deploy --since 5min'"
