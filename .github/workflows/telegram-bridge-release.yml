name: Telegram Bridge Release

on:
  push:
    branches: [main]
    paths: ['apps/telegram-bridge/**']
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      component: telegram-bridge
      component_display: "Soleur Telegram Bridge"
      path_filter: "apps/telegram-bridge/"
      tag_prefix: "telegram-v"
      docker_image: "ghcr.io/jikig-ai/soleur-telegram-bridge"
      docker_context: "apps/telegram-bridge"
      bump_type: ${{ inputs.bump_type || '' }}
      force_run: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  deploy:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy via webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          PAYLOAD=$(printf '{"command":"deploy telegram-bridge ghcr.io/jikig-ai/soleur-telegram-bridge v%s"}' "$VERSION")
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          RESPONSE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$RESPONSE" -w '%{http_code}' \
            --max-time 150 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -d "$PAYLOAD" \
            "https://deploy.soleur.ai/hooks/deploy")
          if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
            echo "::error::Deploy webhook failed (HTTP $HTTP_CODE)"
            cat "$RESPONSE"
            rm -f "$RESPONSE"
            exit 1
          fi
          echo "Deploy completed (HTTP $HTTP_CODE)"
          cat "$RESPONSE"
          rm -f "$RESPONSE"
