# Apply `apps/web-platform/infra/sentry/**` (cron monitors, uptime monitors,
# issue alerts) whenever a PR touching that tree merges to main. Closes the
# window between the per-workflow check-in steps shipping (Phase 4 of #3814)
# and the monitors existing in Sentry. See:
#   knowledge-base/engineering/architecture/decisions/ADR-031-sentry-as-iac.md
#
# ── FULL-ROOT PLAN (#6589) ──────────────────────────────────────────────────
# This workflow used to plan against a hand-maintained allow-list of ~71
# explicit resource addresses. That made DELETION A SILENT NO-OP: a scoped plan
# restricts Terraform's plan universe to the addresses named on the command
# line, and a resource whose block has been deleted from a .tf file is — by
# construction — no longer nameable there. So removing a block removed the
# resource from CI's view while leaving it live and billing in Sentry.
#
# It fired twice. #4929 orphaned kb_tenant_mint_silent_fallback; the comment
# documenting that leak sat in this file for two months and nobody re-checked
# it. #6034 then added a monitor block AND its allow-list line; #6074 removed
# BOTH together — the intuitive edit — and orphaned scheduled_ghcr_token_minter,
# live at $0.78/mo with a 12-day unresolved incident. Monitor count went 8 -> 49
# in two months and never once decreased, because nothing could make it.
#
# The plan is now FULL-ROOT: the universe is `state UNION config`, so removing a
# block yields a real destroy, governed by the [ack-destroy] gate below. The
# per-monitor tax is gone with it — adding a monitor is now just a resource
# block, not a block + an allow-list line + a parity-test entry + a count.
#
# Two consequences are load-bearing and must not be undone independently:
#   1. `paths:` below covers the WHOLE infra/sentry/ tree, not 3 named .tf
#      files. The old allow-list doubled as the gate for "declared but never
#      applied"; under full-root that gate is the path filter, so a
#      versions.tf/variables.tf change must not silently skip the apply.
#   2. The `sentry-destroy-required` PR gate (below) is what makes deletion
#      SAFE rather than merely possible. Full-root alone would only relocate
#      the footgun: this workflow applies on push-to-main, so an unacked delete
#      would go red AFTER merge, with the orphan surviving — an end state
#      byte-identical to #6074, only louder in a place nobody watches.
#
# Authorization model: the PR merge IS the human authorization. The 4 AUTH
# issue-alert resources carry `ignore_changes` on their v2 attributes (they are
# import-only; a fresh apply would 412), so they plan as no-op under full-root
# rather than needing to be excluded by omission.
#
# Kill switch: include `[skip-sentry-apply]` in the merge commit message to
# skip auto-apply for that merge.
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a
# transient failure or for ad-hoc applies (scoped to cron + uptime monitors).
#
# Authentication divergence from apps/web-platform/infra/ root:
#   - SENTRY_IAC_AUTH_TOKEN (the GitHub repo secret) is dedicated to this
#     IaC pipeline. It maps to the Internal Integration `iac-terraform-prd`
#     on `jikigai-eu` (see ADR-031 §Authentication). The env var passed to
#     terraform/audit scripts is still named `SENTRY_AUTH_TOKEN` because that
#     is the canonical env var the Sentry terraform provider and audit
#     tooling expect.
#   - SENTRY_IAC_AUTH_TOKEN comes from a GitHub repo secret (NOT Doppler) per
#     ADR-031 secret-store-divergence.
#   - R2 backend creds (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY) come from
#     Doppler `prd_terraform` via `doppler secrets get --plain`.
#
# All untrusted inputs (commit messages, workflow_dispatch inputs) are routed
# through env vars before reaching any `run:` block. All action references
# are SHA-pinned.

name: Apply sentry infra (cron + uptime monitors)

on:
  push:
    branches: [main]
    paths:
      # WIDENED #6589: the whole tree, not 3 named .tf files. Under the old
      # target-scoped plan, the allow-list was the gate for "declared but never
      # applied" (#6374 clause (b)). Full-root retires that clause, which makes
      # this path filter the thing that keeps `declared => applied` true — a
      # versions.tf / variables.tf / provider change must NOT silently skip the
      # apply. Do not narrow this back to a file list.
      - "apps/web-platform/infra/sentry/**"
      # Defense-in-depth: re-fire on filter mutations so a PR that mutates
      # the destroy-guard filter without touching infra still runs the
      # apply step against `main`'s captured baseline (#4419).
      - "tests/scripts/lib/destroy-guard-filter-sentry.jq"
  # PR-time destroy gate (#6589). DELIBERATELY has NO `paths:` filter, and the
  # reason is the whole point of #5585: a path-filtered workflow never reports a
  # status context for a filtered-out PR, so a REQUIRED check would sit
  # "Expected — Waiting" forever and wedge every unrelated PR. Path detection
  # lives in the `detect-changes` job instead; the always-run
  # `sentry-destroy-required` aggregator therefore reports on every PR while the
  # heavy plan still runs only on PRs that touch the Sentry surface.
  #
  # `pull_request`, NEVER `pull_request_target`. The latter would run
  # `terraform plan` with the prod Sentry token against UNTRUSTED fork-authored
  # .tf — and a single `data "http"` block in that .tf exfiltrates the token.
  # That is the one edit that would make this gate actively dangerous.
  pull_request:
    branches: [main]
  # Merge queue: `sentry-destroy-required` is a required context, so it must
  # report on the gh-readonly-queue/main/* temp ref or the queue stalls. The
  # heavy plan is NOT re-run here (it ran authoritatively on the PR, and
  # secrets.* may be absent on a GITHUB_TOKEN-authored merge_group event);
  # detect-changes emits sentry=false and the aggregator posts a PASS via the
  # suite=skipped branch.
  merge_group:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (manual re-run only)"
        required: true
        type: string

concurrency:
  # Keyed by ref so a PR's plan cannot cancel main's apply (they shared a single
  # global group before the PR trigger existed). cancel-in-progress stays false:
  # a superseded run concludes `cancelled`, which fails the required gate on the
  # head SHA until a re-run (#5585 R3).
  group: terraform-apply-sentry-infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Read the PR's branch commit messages to detect a pre-staged [ack-destroy]
  # (see the destroy gate). Read-only; no write scope anywhere in this workflow.
  pull-requests: read

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: apps/web-platform/infra/sentry

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # Anchor `[skip-sentry-apply]` to its own line so it cannot
        # fire from a quoted block, code fence, or trailer that happens
        # to carry the literal substring. Symmetric posture with the
        # `[ack-destroy]` gate in the apply job.
        run: |
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-sentry-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── PR-time destroy gate (#6589) ──────────────────────────────────────────
  # detect-changes: does this PR touch the Sentry surface? Cheap — one checkout
  # + one git diff, NO Doppler/Sentry access. Mirrors tenant-integration.yml's
  # detect-changes (#5585) and ci.yml's. BASE_REF exists only on pull_request.
  detect-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      sentry: ${{ steps.filter.outputs.sentry }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            # merge_group: the authoritative plan already ran on the PR; the
            # aggregator PASSes via detect=success + plan=skipped so the required
            # context reports without re-running (and without needing secrets).
            # push/workflow_dispatch: the PR gate does not apply — the push-to-main
            # `apply` job owns those events and carries its own destroy guard.
            printf 'sentry=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A git/checkout error must FAIL the job — never silently emit
          # sentry=false. The aggregator treats a detect-changes failure as
          # fail-closed, so this cannot degrade to a green.
          if ! CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD"); then
            echo "::error::git diff against origin/${BASE_REF} failed; failing detect-changes closed." >&2
            exit 1
          fi
          # Anchors mirror the `paths:` filter above PLUS this workflow file and
          # the jq filter (anti-bypass: the gate logic lives in both, so a PR
          # editing either must run the gate against itself — the same
          # self-trigger posture ci.yml uses).
          if printf '%s\n' "$CHANGED" | grep -qE '^(apps/web-platform/infra/sentry/|tests/scripts/lib/destroy-guard-filter-sentry\.jq$|\.github/workflows/apply-sentry-infra\.yml$)'; then
            printf 'sentry=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'sentry=false\n' >> "$GITHUB_OUTPUT"
          fi

  # plan_pr: the read-only full-root plan, run BEFORE merge so a destroy is
  # visible while the PR can still be edited. This is the job that actually
  # removes the #6074 footgun — full-root alone would only move the red from
  # "after merge, monitor already orphaned" to "after merge, monitor still
  # orphaned". Heavy (Doppler + prod Sentry token), so it is gated on
  # detect-changes and never runs on the ~95% of PRs that miss the surface.
  plan_pr:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.sentry == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Refuse fork PRs (named, not a confusing secret error)
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          if [[ "$IS_FORK" == "true" ]]; then
            echo "::error::Fork PRs cannot run the Sentry plan gate: secrets.* are not exposed to fork workflows, so a full-root plan against live Sentry state is impossible here. A maintainer must re-open this change from a branch in this repository. (Deliberate: switching to pull_request_target to obtain secrets would run terraform plan with the prod Sentry token against untrusted fork-authored .tf — a token-exfiltration primitive.)"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history: the create gate diffs this PR against its base to
          # decide whether a planned create is explained by an added block.
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify required secrets present
        env:
          SENTRY_TOKEN_CHECK: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [[ -z "$SENTRY_TOKEN_CHECK" ]]; then
            echo "::error::SENTRY_IAC_AUTH_TOKEN secret is not configured."
            exit 1
          fi
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain)
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain)
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Full-root plan + destroy gate
        working-directory: ${{ env.INFRA_DIR }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          # Read-only: no -out, so nothing here can be applied. The plan is
          # FULL-ROOT (no -target=) — that is the contract this gate exists to
          # enforce, and AC3 pins that no -target= survives in this file.
          terraform plan -no-color -input=false -out=tfplan
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan failed (exit $rc)"
            exit $rc
          fi
          set -e

          # Type-scope assertion against the PLAN, which is the authoritative
          # `state UNION config` universe. The jq filter's nested-block clauses
          # cover a fixed set of types; a type outside that set would have its
          # array-of-blocks shrink counted as 0 and slip the guard. The sibling
          # run in scripts/test-all.sh can only read the .tf half (no R2
          # credentials in CI), so THIS is the run that sees state-only types —
          # exactly the class a removed-block PR is made of.
          plan_types=$(terraform show -json tfplan | jq -r '[.resource_changes[].type] | unique | .[]')
          SENTRY_STATE_TYPES="$plan_types" \
            bash "${GITHUB_WORKSPACE}/tests/scripts/test-destroy-guard-sentry-scope-guard.sh"

          counts=$(terraform show -json tfplan | \
            jq -f "${GITHUB_WORKSPACE}/tests/scripts/lib/destroy-guard-filter-sentry.jq")
          resource_deletes=$(echo "$counts" | jq -r '.resource_deletes')
          resource_creates=$(echo "$counts" | jq -r '.resource_creates')
          nested_deletes=$(echo "$counts" | jq -r '.nested_deletes')
          # Fail-closed numeric validation: an empty value from a jq failure
          # would silently evaluate false in the `-gt 0` test below and let a
          # destroying PR through green.
          if [[ ! "$resource_deletes" =~ ^[0-9]+$ ]] || [[ ! "$nested_deletes" =~ ^[0-9]+$ ]] \
             || [[ ! "$resource_creates" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy-guard counter parse failed (resource_deletes='${resource_deletes}', resource_creates='${resource_creates}', nested_deletes='${nested_deletes}')."
            exit 1
          fi

          # ── CREATE gate (#6589) ──────────────────────────────────────────
          # Runs BEFORE the destroy gate and has NO [ack-destroy] bypass: an
          # unexplained create is a different failure from an intended delete,
          # and typing one ack must not wave through the other. Diff-matched,
          # not blanket-acked — the normal add-a-monitor flow passes silently.
          if [[ "$resource_creates" -gt 0 ]]; then
            terraform show -json tfplan \
              | jq -r '[.resource_changes[] | select(.change.actions == ["create"]) | .address] | .[]' \
              > /tmp/sentry-creates.txt
            git -C "${GITHUB_WORKSPACE}" diff "origin/${BASE_REF}...HEAD" \
              -- 'apps/web-platform/infra/sentry/*.tf' > /tmp/sentry-tf.diff
            bash "${GITHUB_WORKSPACE}/scripts/sentry-create-gate.sh" \
              /tmp/sentry-creates.txt /tmp/sentry-tf.diff
          fi

          if [[ "$destroy_count" -eq 0 ]]; then
            echo "sentry destroy gate: PASS (plan destroys nothing)"
            exit 0
          fi

          addresses=$(terraform show -json tfplan | \
            jq -r '[.resource_changes[] | select(.change.actions == ["delete"]) | .address] | sort | .[]')

          # ── The ack must actually REACH the merge commit ──────────────────
          # This gate greens on a pre-staged [ack-destroy], which only survives
          # into the squash commit while the repo's squash body is composed from
          # COMMIT_MESSAGES. If someone flips that setting, a pre-staged ack
          # silently stops reaching the merge commit: this gate would go green
          # and the post-merge apply would go red — #6074 again, with an extra
          # step. Green must MEAN "the ack will reach the merge commit", so the
          # premise is verified rather than assumed. This incident's etiology was
          # a known hole documented in prose that nobody re-checked; do not put a
          # second one in the fix.
          squash_mode=$(gh api "repos/${REPO}" --jq '.squash_merge_commit_message')
          if [[ "$squash_mode" != "COMMIT_MESSAGES" ]]; then
            echo "::error::This gate assumes the squash commit body is built from the branch commit messages (squash_merge_commit_message=COMMIT_MESSAGES), which is how a pre-staged [ack-destroy] reaches the merge commit. The repo now reports '${squash_mode}', so that assumption is broken and this gate cannot certify the ack. Failing closed. Fix the repo setting, or rework the gate."
            exit 1
          fi

          # Does a pre-staged [ack-destroy] actually survive into the squash
          # commit? That is a question about GitHub's squash-body COMPOSITION,
          # not about the raw commit messages — an ack in a commit BODY survives
          # line-anchored, an ack used as a commit SUBJECT is rendered
          # "* [ack-destroy]" and does not. Grepping the raw messages would green
          # this gate on a subject-ack that the apply gate then rejects: #6074
          # with extra steps. The emulation lives in a script so its branches are
          # unit-tested (tests/scripts/test-sentry-squash-ack-detect.sh) and so
          # its copy of the canonical regex is pinned as a distinct site by
          # tests/scripts/test-destroy-guard-regex-parity.sh.
          # `--paginate --slurp` (NOT --paginate --jq): gh applies --jq per PAGE
          # and concatenates, so `--jq '[...]'` emits one array PER PAGE — two
          # concatenated JSON documents on a >1-page PR, which is not parseable
          # as a single array. gh also rejects --slurp together with --jq, so the
          # flatten runs in a standalone jq. Verified against this PR.
          ack_destroy=false
          if gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate --slurp \
             | jq '[.[][] | .commit.message]' \
             | bash "${GITHUB_WORKSPACE}/scripts/sentry-squash-ack-detect.sh"; then
            ack_destroy=true
          fi

          if [[ "$ack_destroy" == "true" ]]; then
            echo "sentry destroy gate: PASS (${destroy_count} destroy(s) acknowledged via a pre-staged [ack-destroy])"
            printf '%s\n' "$addresses" | sed 's/^/  destroys: /'
            exit 0
          fi

          echo "::error::this PR destroys ${destroy_count} Sentry resource(s):"
          printf '%s\n' "$addresses" | sed 's/^/::error::  /'
          echo "::error::The merge commit must contain a line [ack-destroy]. Pre-stage it now so it survives the squash: put [ack-destroy] on its own line in the BODY of a commit on this branch (not the subject line — GitHub prefixes subjects with '* ' when it composes the squash body, which breaks the line anchor). Then this check goes green and the post-merge apply is authorized to destroy the resources listed above. If you did not intend to destroy anything, restore the resource block(s) instead."
          exit 1

  # Always-run aggregator (#6589, mirroring tenant-integration-required/#5585).
  # THIS job — not plan_pr — is the required status check registered in the
  # "CI Required" ruleset (infra/github/ruleset-ci-required.tf). It runs on every
  # PR (`if: always()`) so a context is always reported, and asserts the verdict
  # INSIDE a run: step — never via a job-level `if:`, which would report no
  # context at all and reopen the path-filter gap the always-run shape closes.
  # The verdict lives in a script so its branches are unit-tested
  # (tests/scripts/test-sentry-destroy-gate-verdict.sh).
  sentry-destroy-required:
    needs: [detect-changes, plan_pr]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Aggregate gate verdict (fail-closed)
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          PLAN_RESULT: ${{ needs.plan_pr.result }}
        run: bash scripts/sentry-destroy-gate-verdict.sh "$DETECT_RESULT" "$PLAN_RESULT"

  apply:
    needs: preflight
    # Event guard (#6589): this workflow now also triggers on pull_request and
    # merge_group for the destroy gate. Without this guard, adding those triggers
    # would make the APPLY job reachable from a PR — applying prod Sentry infra
    # from an unreviewed branch. The PR path must be plan-only, always.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # No `environment:` reviewer gate. PR #4220 removed it: the per-apply
    # reviewer click was duplicative friction on top of the PR-merge gate
    # (CODEOWNERS review + branch protection on main), and was blocking
    # apply runs for up to 13h (#4204 on 2026-05-20). The PR-merge IS the
    # human authorization per `hr-menu-option-ack-not-prod-write-auth`.
    # `apply-github-infra.yml` already omits the gate without incident.
    # See PR #4218 for the failed App-as-reviewer attempt; GitHub does
    # not allow Apps in env reviewers (User/Team only).

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify required secrets present
        env:
          SENTRY_TOKEN_CHECK: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [[ -z "$SENTRY_TOKEN_CHECK" ]]; then
            echo "::error::SENTRY_IAC_AUTH_TOKEN secret is not configured."
            exit 1
          fi
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain)
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain)
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        # `-lockfile=readonly` refuses to download a provider whose
        # checksum is not already in `.terraform.lock.hcl`. Combined with
        # the committed lockfile, this defends against a malicious
        # republish of the pinned beta provider version (beta tags are
        # mutable on the Terraform registry by policy).
        run: terraform init -input=false -lockfile=readonly

      - name: Sentry audit-gate (4-gate destination-controllability)
        # PR-beta §10.6 / Branch-C Arch F1 gate-call-graph closure: the
        # operator-driven `workflow_dispatch:` path was previously a
        # gate-bypass surface for stale-credentials terraform apply.
        # Running the audit script BEFORE `terraform plan` ensures every
        # operator-triggered apply traverses the 4-gate check. Fail-closed
        # — non-zero exit halts the workflow before any state mutation.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          SENTRY_API_HOST: ${{ secrets.SENTRY_API_HOST }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
        run: |
          set -euo pipefail
          which jq >/dev/null 2>&1 || sudo apt-get install -y jq
          # Class D's state half. Terraform is initialised by the step above, so
          # THIS caller can distinguish an unreclaimable orphan from a pending
          # destroy — and it must, because this audit runs BEFORE `terraform
          # plan`. Without the state half, a monitor whose block this very PR
          # removed reads as Class D, fails the job, and the plan that would
          # reclaim it never runs: the detector blocks its own cure and the
          # monitor stays live and billing (#6074's end state, reached from the
          # other side).
          #
          # A FILE, not a var: an empty state (legitimately zero cron monitors,
          # where every live monitor IS a true orphan) must stay distinguishable
          # from "state was never read". An empty var is indistinguishable from
          # unset and would fail OPEN on exactly that case.
          #
          # `set -euo pipefail` is active, so a `terraform show` failure aborts
          # the step rather than writing an empty file that would read as an
          # empty state and flag all 49 monitors as orphans.
          terraform -chdir="${INFRA_DIR}" show -json \
            | jq -r '.values.root_module.resources[]?
                     | select(.type == "sentry_cron_monitor")
                     | .values.name' > /tmp/sentry-state-slugs.txt
          export SENTRY_STATE_SLUGS_FILE=/tmp/sentry-state-slugs.txt
          bash apps/web-platform/scripts/sentry-monitors-audit.sh

      - name: Terraform plan (full root)
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # `-e` is intentionally omitted so we can capture terraform plan's
          # exit code in $rc — plan exits non-zero on legitimate failures we
          # want to surface, not abort silently. Re-enabled with `set -e`
          # after the rc-capture window per
          # `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
          set -uo pipefail
          # FULL ROOT (#6589) — no address scoping. The plan universe is
          # `state UNION config`, which is what makes deleting a resource block
          # produce a real destroy instead of a silent no-op. The destroy is then
          # governed by the [ack-destroy] gate below and surfaced BEFORE merge by
          # the sentry-destroy-required PR gate. Do not reintroduce address
          # scoping here: it is unrepresentable for a resource whose block is
          # gone, which is precisely how #4929 and #6074 orphaned live monitors.
          terraform plan -no-color -input=false -out=tfplan
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan failed (exit $rc)"
            exit $rc
          fi
          set -e
          # Type-scope assertion against the PLAN (state UNION config) — see the
          # identical call in the plan_pr job. The CI-side run of this guard sees
          # only the .tf half; this run is the one that catches a state-only type
          # whose array-of-blocks shrink the filter would silently count as 0.
          plan_types=$(terraform show -json tfplan | jq -r '[.resource_changes[].type] | unique | .[]')
          SENTRY_STATE_TYPES="$plan_types" \
            bash "${GITHUB_WORKSPACE}/tests/scripts/test-destroy-guard-sentry-scope-guard.sh"

          terraform show -no-color tfplan > tfplan.txt
          # Authoritative destroy count via the structured plan, not the
          # `Plan: …` summary line. The summary-line grep is brittle and
          # can be silently bypassed by Terraform formatting changes;
          # `terraform show -json` is the documented stable contract.
          # Sibling of apply-github-infra.yml's destroy-guard (closes #4419
          # — extends the #4420 widening to apply-sentry-infra). Filter is
          # path-specific per the #4420 plan-review iteration. Source of
          # truth: tests/scripts/lib/destroy-guard-filter-sentry.jq (also
          # exercised by tests/scripts/test-destroy-guard-counter-sentry.sh).
          counts=$(terraform show -json tfplan | \
            jq -f "${GITHUB_WORKSPACE}/tests/scripts/lib/destroy-guard-filter-sentry.jq")
          resource_deletes=$(echo "$counts" | jq -r '.resource_deletes')
          nested_deletes=$(echo "$counts" | jq -r '.nested_deletes')
          # Validate counters parsed correctly — empty values from a jq
          # failure would silently evaluate false in the `-gt 0` test and
          # let destructive plans slip past the guard.
          if [[ ! "$resource_deletes" =~ ^[0-9]+$ ]] || [[ ! "$nested_deletes" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy-guard counter parse failed (resource_deletes='${resource_deletes}', nested_deletes='${nested_deletes}')."
            exit 1
          fi
          destroy_count=$((resource_deletes + nested_deletes))
          # Anchor `[ack-destroy]` to its own line (start-of-string OR
          # preceded by newline; followed by newline OR end-of-string) so
          # the token cannot fire from a quoted block, code fence, or
          # `Co-Authored-By:` trailer carrying that literal substring.
          ack_destroy=false
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[ack-destroy\]($|$'\n') ]]; then
            ack_destroy=true
          fi
          if [[ "$destroy_count" -gt 0 ]] && [[ "$ack_destroy" != "true" ]]; then
            echo "::error::terraform plan shows ${destroy_count} destructive change(s) on sentry infra (${resource_deletes} resource-level delete(s) + ${nested_deletes} nested-block removal(s))."
            echo "::error::Add a line containing exactly '[ack-destroy]' to the merge commit message to acknowledge, or revert the trigger commit."
            grep -E 'will be destroyed|Plan:' tfplan.txt | head -20 >&2
            exit 1
          fi

      - name: Terraform apply (cron + uptime monitors)
        working-directory: ${{ env.INFRA_DIR }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          terraform apply -auto-approve -input=false tfplan

      - name: BYOK Art.33 detector liveness assertion (#4656 item 5)
        # Read-only post-apply check: assert both BYOK issue-alert rules
        # (byok-art-33-breach, byok-cap-exceeded) exist in Sentry by name. A
        # silent mis-wire (dropped -target, deleted/muted rule, name drift)
        # would leave the GDPR Art.33 control un-paged until a real breach.
        # Emits NO synthetic breach event (plan D2). Fail-closed: a non-zero
        # exit halts the workflow and surfaces a GitHub Actions failure.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          SENTRY_API_HOST: ${{ secrets.SENTRY_API_HOST }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          which jq >/dev/null 2>&1 || sudo apt-get install -y jq
          bash apps/web-platform/scripts/assert-byok-rules-exist.sh

      - name: Post-apply summary
        if: always()
        env:
          TRIGGER: ${{ github.event_name }}
          MERGE_SHA: ${{ github.sha }}
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## Apply sentry infra (cron + uptime monitors)"
            echo ""
            echo "**Trigger:** ${TRIGGER}"
            echo "**Merge SHA:** ${MERGE_SHA}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
