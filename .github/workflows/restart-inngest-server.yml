# Standalone inngest-server restart via deploy webhook (#4538).
# Sends `restart inngest _ latest` to ci-deploy.sh and polls deploy-status
# for completion. Use when inngest-server desyncs after rapid deploy churn
# (H9 in cloud-scheduled-tasks.md runbook).
# The verify poll window (MAX_POLLS x POLL_INTERVAL) must exceed ci-deploy.sh's
# verify_inngest_health worst case (incl. the unit's TimeoutStopSec hung-stop
# that can precede the verify) — drift-guarded by ci-deploy.test.sh (#5145).
# Verify now gates on /health (process liveness); the cron-plan check is
# ADVISORY — a standalone inngest restart de-plans crons until they re-arm async
# via a web-platform redeploy (modified:true sync) or the --poll-interval
# self-heal (#5159).
name: Restart Inngest Server

on:
  workflow_dispatch: {}
  # push trigger scoped to this file forces GitHub to register the workflow
  # in the Actions UI. Without a non-dispatch trigger, workflow_dispatch-only
  # workflows can take 30+ minutes to appear. The path filter ensures this
  # trigger only fires when the workflow file itself is edited.
  push:
    branches: [main]
    paths:
      - '.github/workflows/restart-inngest-server.yml'

permissions:
  contents: read

jobs:
  restart:
    runs-on: ubuntu-latest
    # Hygiene cap (#5159): the poll budget below is 600s; 30min wall leaves
    # ample headroom over the poll ceiling. No timeout-minutes key existed
    # before (defaulted to GHA's 6h) — this is poll-ceiling-tracks-window
    # hygiene, not a correctness requirement.
    timeout-minutes: 30
    concurrency:
      group: deploy-inngest-restart
      cancel-in-progress: false
    steps:
      # #6407 (code-review Finding B): check out the repo so the restart-poll classifier
      # helper (scripts/inngest-restart-poll-classify.sh) is on disk for the Verify step
      # to source via $GITHUB_WORKSPACE.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Trigger restart via webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          PAYLOAD='{"command":"restart inngest _ latest"}'
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -d "$PAYLOAD" \
            "https://deploy.soleur.ai/hooks/deploy")
          if [[ "$HTTP_CODE" != "202" ]]; then
            echo "::error::Restart webhook rejected (HTTP $HTTP_CODE)"
            exit 1
          fi
          # Freshness anchor for the verify step (#5145): deploy-state is a
          # single slot, so the first poll after the 202 can read the PREVIOUS
          # green inngest state before this run's webhook exec writes
          # "running". The verify loop only honors terminal states whose
          # start_ts is at or after this trigger (minus clock-skew tolerance).
          echo "TRIGGER_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "Restart initiated (HTTP 202), polling status..."

      - name: Verify restart completion
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          # #6407 (Finding B): pure per-frame classifier + budget-expiry adjudicators
          # (classify_restart_frame / deploy_status_confirms_fresh_inngest /
          # liveness_confirms_healthy) live in a sourceable, unit-tested helper.
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/scripts/inngest-restart-poll-classify.sh"
          SIGNATURE=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          # Client window must exceed ci-deploy.sh's server-side verify worst
          # case (#5145). Verify gates on /health (process liveness); the
          # cron-plan check is advisory (crons re-arm async via redeploy or the
          # --poll-interval self-heal, #5159). (health 10 + cron 10) x (3s sleep
          # + 5s curl) = 160s; + TimeoutStopSec=180 hung-stop that can precede
          # the verify + 60s margin = 400s required. 120 x 5s = 600s > 400s
          # (~200s headroom). Drift-guarded by ci-deploy.test.sh — retune both
          # sides together.
          MAX_POLLS=120
          POLL_INTERVAL=5
          # 60s clock-skew tolerance: the host writes start_ts with its own
          # clock (ci-deploy.sh write_state; field is schema-stable).
          FRESH_FLOOR=$((TRIGGER_TS - 60))
          # #6407 (ADR-079 #5960 applied to the restart poll): track whether the ONLY failure
          # reason seen for our fresh inngest frame was lock_contention (a concurrent
          # deploy/restart holds the critical section — benign, NON-TERMINAL). Any OTHER failure
          # reason exits 1 immediately. At budget expiry, a lock_contention-only window does a
          # final STATE re-read before exiting benign (mirror apply-deploy-pipeline-fix.yml).
          only_lock_contention="no"
          for i in $(seq 1 "$MAX_POLLS"); do
            # Truncate before each poll — on curl connection failure -o does
            # not write, and a stale previous body would be re-read as current.
            rm -f /tmp/status-body
            # shellcheck disable=SC2034 # capture exists to keep curl's -w
            # status code off stdout; the loop branches on BODY, not the code
            HTTP_CODE=$(curl -s --max-time 10 \
              -o /tmp/status-body \
              -w '%{http_code}' \
              -X GET \
              -H "X-Signature-256: sha256=$SIGNATURE" \
              -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
              -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
              "https://deploy.soleur.ai/hooks/deploy-status" || echo "000")
            BODY=$(cat /tmp/status-body 2>/dev/null || echo "")
            if [ -z "$BODY" ] || ! echo "$BODY" | jq -e . >/dev/null 2>&1; then
              echo "Attempt $i/$MAX_POLLS: non-JSON or empty body — retrying"
              sleep "$POLL_INTERVAL"
              continue
            fi
            EXIT_CODE=$(echo "$BODY" | jq -r '.exit_code // -99')
            REASON=$(echo "$BODY" | jq -r '.reason // "unknown"')
            COMPONENT=$(echo "$BODY" | jq -r '.component // "unknown"')
            # Freshness guard (#5145): deploy-state is a single slot; the
            # first poll after the 202 can read the PREVIOUS green inngest
            # state before this run's webhook exec writes "running". Only
            # honor terminal states written at/after FRESH_FLOOR.
            START_TS=$(echo "$BODY" | jq -r '.start_ts // 0')
            # #6407 (Finding B): the per-frame decision is the pure, unit-tested
            # classify_restart_frame; this case only reproduces the side effects.
            verdict=$(classify_restart_frame "$EXIT_CODE" "$COMPONENT" "$START_TS" "$FRESH_FLOOR" "$REASON")
            case "$verdict" in
              success)
                echo "::notice::Inngest restart completed successfully (reason=$REASON)"
                echo "$BODY" | jq .
                exit 0
                ;;
              terminal_fail)
                echo "::error::Restart failed (exit_code=$EXIT_CODE, reason=$REASON)"
                echo "$BODY" | jq .
                exit 1
                ;;
              lock_contention)
                # #6407 (ADR-079 #5960): a flock loser means a concurrent deploy/restart
                # already holds the critical section and will bring inngest current — this is
                # NON-TERMINAL, not a restart failure. Keep polling for a fresh
                # component=inngest terminal success; the budget-expiry STATE re-read
                # adjudicates if none arrives. Any OTHER failure reason still fails loud above.
                only_lock_contention="yes"
                echo "Attempt $i/$MAX_POLLS: reason=lock_contention (a concurrent deploy/restart holds the lock) — NON-TERMINAL, keep polling for the winner's terminal…"
                ;;
              predates)
                echo "Attempt $i/$MAX_POLLS: state predates this trigger (start_ts=$START_TS < floor=$FRESH_FLOOR) — waiting"
                ;;
              still_running)
                echo "Attempt $i/$MAX_POLLS: restart still running (reason=$REASON)"
                ;;
              no_prior)
                echo "Attempt $i/$MAX_POLLS: no prior deploy/restart recorded"
                ;;
              corrupt)
                echo "Attempt $i/$MAX_POLLS: corrupt state read, retrying"
                ;;
              other_component)
                # exit_code==0 → "last operation was for X, not inngest"; a failure frame
                # for a non-inngest component → "waiting for inngest". Preserve both strings.
                if [ "$EXIT_CODE" = "0" ]; then
                  echo "Attempt $i/$MAX_POLLS: last operation was for $COMPONENT, not inngest"
                else
                  echo "Attempt $i/$MAX_POLLS: last state is for $COMPONENT (exit_code=$EXIT_CODE), waiting for inngest"
                fi
                ;;
            esac
            sleep "$POLL_INTERVAL"
          done
          # #6407: poll budget exhausted. If the ONLY failure reason seen for our fresh inngest
          # frame was lock_contention (a concurrent deploy/restart held the lock the whole
          # window), the restart was SUPERSEDED by an in-flight op, not failed. Mirror
          # apply-deploy-pipeline-fix.yml's final STATE re-read (ADR-079 #5960): confirm inngest
          # is actually current NOW before exiting benign — a blind exit 0 would false-clean if
          # the in-flight op ALSO failed. A non-lock_contention path never reaches here (it
          # exits 1 in the loop).
          if [ "$only_lock_contention" = "yes" ]; then
            echo "Poll window exhausted seeing only lock_contention — final STATE re-read (a concurrent deploy/restart may have brought inngest current)."
            rm -f /tmp/status-body
            FINAL_CODE=$(curl -s --max-time 10 -o /tmp/status-body -w '%{http_code}' \
              -X GET \
              -H "X-Signature-256: sha256=$SIGNATURE" \
              -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
              -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
              "https://deploy.soleur.ai/hooks/deploy-status" || echo "000")
            FINAL_BODY=$(cat /tmp/status-body 2>/dev/null || echo "")
            # #6407 (Finding B): the fresh-inngest confirmation is the pure, unit-tested
            # deploy_status_confirms_fresh_inngest; the message fields are re-read here.
            if [ "$(deploy_status_confirms_fresh_inngest "$FINAL_CODE" "$FINAL_BODY" "$FRESH_FLOOR")" = "yes" ]; then
              F_REASON=$(echo "$FINAL_BODY" | jq -r '.reason // "unknown"')
              F_START=$(echo "$FINAL_BODY" | jq -r '.start_ts // 0')
              # SOLEUR_INNGEST_RESTART_LOCK_CONTENTION: benign supersede confirmed via a fresh
              # inngest success (greppable in the run log; the host-side journald marker is in
              # ci-deploy.sh).
              echo "SOLEUR_INNGEST_RESTART_LOCK_CONTENTION action=restart component=inngest outcome=superseded_confirmed_current"
              echo "::notice::restart superseded by in-flight deploy/restart (inngest confirmed current: reason=$F_REASON start_ts=$F_START)"
              exit 0
            fi
            # deploy-status did not confirm a fresh inngest success — corroborate via the
            # liveness hook (an independent "inngest IS serving" signal: 200 + a non-empty
            # functions registry). The healthy-shape check is the pure, unit-tested
            # liveness_confirms_healthy (#6407 Finding B); the non-empty requirement is
            # load-bearing (a cold-start empty registry must NOT confirm).
            rm -f /tmp/liveness-body
            LIVE_SIG=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
            LIVE_CODE=$(curl -s --max-time 10 -o /tmp/liveness-body -w '%{http_code}' \
              -X GET \
              -H "X-Signature-256: sha256=$LIVE_SIG" \
              -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
              -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
              "https://deploy.soleur.ai/hooks/inngest-liveness" || echo "000")
            LIVE_BODY=$(cat /tmp/liveness-body 2>/dev/null || echo "")
            if [ "$(liveness_confirms_healthy "$LIVE_CODE" "$LIVE_BODY")" = "yes" ]; then
              echo "SOLEUR_INNGEST_RESTART_LOCK_CONTENTION action=restart component=inngest outcome=superseded_confirmed_current"
              echo "::notice::restart superseded by in-flight deploy/restart (inngest liveness healthy: functions registered)"
              exit 0
            fi
            echo "::error::Restart poll saw only lock_contention but neither /hooks/deploy-status nor /hooks/inngest-liveness confirms inngest is current — restart state UNVERIFIED."
            exit 1
          fi
          echo "::error::Restart did not complete within the $((MAX_POLLS * POLL_INTERVAL))s poll budget (elapsed can exceed this when status curls run slow)"
          exit 1
