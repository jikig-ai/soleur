# Monthly agent-native architecture audit using the soleur:agent-native-audit skill.
# Launches 8 parallel sub-agents scoring the codebase against agent-native
# principles (action parity, CRUD completeness, capability discovery, etc.) and
# files findings as GitHub issues.
#
# Cron `0 9 15 * *` (15th of each month at 09:00 UTC) — distinct date from the
# `0 9 1 * *` cluster (scheduled-ux-audit, scheduled-competitive-analysis) to
# spread monthly runner contention.
#
# Issue-filing semantics live in the prompt, not the skill: agent-native-audit
# SKILL.md produces a scored report only; this workflow drives `gh issue create`
# with explicit MILESTONE / CAP_OPEN_ISSUES / CAP_PER_RUN / injection-safety
# rules, mirroring scheduled-ux-audit.yml's pattern.
#
# Track C1 of #3122 — see knowledge-base/project/plans/2026-05-04-feat-scheduled-audits-skill-freshness-plan.md
#
# Security: no untrusted event inputs interpolated in run: blocks. Agent output
# is written to files inside the action and referenced via env vars.
#
# To test manually (post-merge): gh workflow run scheduled-agent-native-audit.yml

name: "Scheduled: Agent-Native Audit"

on:
  schedule:
    - cron: '0 9 15 * *'
  workflow_dispatch:

concurrency:
  group: schedule-agent-native-audit
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  pull-requests: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  agent-native-audit:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create scheduled-agent-native-audit \
            --description "Monthly agent-native architecture audit finding" \
            --color "0E8A16" 2>/dev/null || true

      - name: Run scheduled skill
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-opus-4-7 --max-turns 50 --allowedTools Bash,Read,Write,Edit,Glob,Grep,Task'
          prompt: |
            IMPORTANT: This is an automated CI workflow. Do NOT push directly
            to main. Do NOT create commits.

            MILESTONE RULE: Every gh issue create command MUST include
            --milestone "Post-MVP / Later".

            Run /soleur:agent-native-audit on this repository. Each of the 8
            principle sub-agents produces a scored finding; collect findings
            into a structured list before filing.

            Cap enforcement is mandatory:
              CAP_OPEN_ISSUES = 20   (refuse to file when reached; check via
                                      `gh issue list --label scheduled-agent-native-audit
                                       --state open --limit 30 | wc -l`)
              CAP_PER_RUN     = 5    (severity-ranked top-N filed per run)

            For each filed issue:
              - Title prefix: "[Scheduled] Agent-Native Audit — <principle>: <gap>"
              - Labels: scheduled-agent-native-audit
              - Milestone: "Post-MVP / Later"
              - Body: principle name, score, specific gap, recommendation,
                referenced files

            Idempotency: before filing, check
              gh issue list --label scheduled-agent-native-audit \
                            --search "<gap-summary> in:title" --state all --limit 5
            and skip if any existing issue (open or closed within 30 days)
            matches. Prevents reopen-loops on stable findings.

            Injection safety: write each finding's title and body to env vars
            or files BEFORE `gh issue create` — never interpolate agent output
            into bash `run:` commands directly.

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Agent-Native Audit workflow failed'
          body: '<p><strong>Agent-Native Audit</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
