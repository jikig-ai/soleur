# CodeQL advanced setup (#5780). Replaces GitHub CodeQL *default* setup so the
# required `CodeQL` status context also posts on `merge_group` temp refs — the
# gap that deadlocked the merge queue (default setup runs only on push /
# pull_request, never merge_group, so every queue entry stalled AWAITING_CHECKS
# on a CodeQL result that never arrived). See ADR-032 + the PIR.
#
# This MUST stay byte-faithful to the prior default-setup config or the SAST
# gate weakens silently:
#   languages:   actions, javascript-typescript, python   (default-setup set)
#   query suite: security-extended                          (default = "extended")
# Code Scanning posts a single aggregate `CodeQL` check (GitHub Advanced
# Security app, integration_id 57789) — the same context the CI Required
# ruleset requires — regardless of the per-language matrix below.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}

# Least-privilege; security-events:write is required to upload SARIF.
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the disabled default-setup language set (javascript and
        # typescript collapse into the javascript-typescript analysis).
        language: [actions, javascript-typescript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: ${{ matrix.language }}
          # Match default setup's "extended" query suite (broadest first-party pack).
          queries: security-extended
          # All three languages are interpreted / no-compile here (Next.js TS,
          # Python, Actions YAML), so no build step is needed.
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:${{ matrix.language }}"
