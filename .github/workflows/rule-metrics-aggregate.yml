# Weekly aggregator for AGENTS.md rule utility metrics.
# Rolls up .claude/.rule-incidents.jsonl + AGENTS.md into
# knowledge-base/project/rule-metrics.json and opens a PR when materially
# changed. The PR is auto-merged after synthetic check-runs satisfy the
# CI Required and CLA Required rulesets on main.
#
# See knowledge-base/project/plans/2026-04-14-feat-rule-utility-scoring-plan.md
# Issue: #2258 (switched from direct push to PR pattern)
#
# Security: No untrusted event inputs used in run: commands. Uses only
# GITHUB_TOKEN, repo-local files, and safe GitHub context values
# (github.repository, github.server_url, github.run_id, github.token).

name: "Scheduled: Rule Metrics Aggregate"

on:
  schedule:
    - cron: '0 0 * * 0'   # Sunday 00:00 UTC
  workflow_dispatch:

concurrency:
  group: scheduled-rule-metrics-aggregate
  cancel-in-progress: false

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run aggregator
        env:
          AGGREGATOR_ROTATE: '1'
        run: bash scripts/rule-metrics-aggregate.sh

      - name: Create PR with rule-metrics snapshot
        uses: ./.github/actions/bot-pr-with-synthetic-checks
        with:
          add-paths: knowledge-base/project/rule-metrics.json
          branch-prefix: ci/rule-metrics-
          commit-message: "chore(rule-metrics): weekly aggregate"
          pr-title-prefix: "chore(rule-metrics): weekly aggregate"
          pr-body: "Automated weekly rule-metrics snapshot from .claude/.rule-incidents.jsonl + AGENTS.md. See scripts/rule-metrics-aggregate.sh."
          change-summary: "Rule metrics aggregation only, no code changes"
          gh-token: ${{ github.token }}

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Rule Metrics Aggregate failed'
          body: '<p><strong>Scheduled: Rule Metrics Aggregate</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
