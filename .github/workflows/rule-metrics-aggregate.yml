# On-demand aggregator for AGENTS.md rule utility metrics.
# Rolls up .claude/.rule-incidents.jsonl + AGENTS.md into
# knowledge-base/project/rule-metrics.json and opens a PR when materially
# changed. The PR is auto-merged after synthetic check-runs satisfy the
# CI Required and CLA Required rulesets on main.
#
# LOCAL-PRODUCER MODEL (ADR-091, issue #6042): the AUTHORITATIVE producer of
# rule-metrics.json is the local compound flow (compound/SKILL.md step 8), which
# runs on the operator's machine where the gitignored .claude/.rule-incidents.jsonl
# actually exists. The weekly `schedule:` trigger was REMOVED because a
# fresh-checkout CI run sees zero incident data and committed an all-zero
# (97/97 unused) snapshot every week, clobbering the real local aggregate. The
# aggregator now no-ops on zero rule-carrying lines (scripts/rule-metrics-aggregate.sh),
# so a rare manual workflow_dispatch on a fresh checkout self-no-ops and
# bot-pr-with-synthetic-checks opens no empty PR. workflow_dispatch is retained
# only for on-demand manual runs (e.g. from a checkout that DOES carry a log).
#
# See knowledge-base/project/plans/2026-04-14-feat-rule-utility-scoring-plan.md
# and knowledge-base/engineering/architecture/decisions/ADR-091-rule-metrics-local-producer.md
# Issue: #2258 (switched from direct push to PR pattern), #6042 (locality fix)
#
# Security: No untrusted event inputs used in run: commands. Uses only
# GITHUB_TOKEN, repo-local files, and safe GitHub context values
# (github.repository, github.server_url, github.run_id, github.token).

name: "On-Demand: Rule Metrics Aggregate"

on:
  workflow_dispatch:

concurrency:
  group: rule-metrics-aggregate
  cancel-in-progress: false

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run aggregator
        env:
          AGGREGATOR_ROTATE: '1'
        run: bash scripts/rule-metrics-aggregate.sh

      - name: Create PR with rule-metrics snapshot
        uses: ./.github/actions/bot-pr-with-synthetic-checks
        with:
          add-paths: knowledge-base/project/rule-metrics.json
          branch-prefix: ci/rule-metrics-
          commit-message: "chore(rule-metrics): on-demand aggregate"
          pr-title-prefix: "chore(rule-metrics): on-demand aggregate"
          # Cite only files present in the PR diff — the body-vs-diff guard
          # (#2905) blocks bodies whose cited paths are <50% matched.
          pr-body: "On-demand rule-metrics snapshot: regenerates knowledge-base/project/rule-metrics.json from the rule-incidents log and the AGENTS rule index via the rule-metrics-aggregate script."
          change-summary: "Rule metrics aggregation only, no code changes"
          gh-token: ${{ github.token }}

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] On-Demand: Rule Metrics Aggregate failed'
          body: '<p><strong>On-Demand: Rule Metrics Aggregate</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
