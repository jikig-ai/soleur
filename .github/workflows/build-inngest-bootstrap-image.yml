name: Build inngest-bootstrap OCI image

# Triggered on `vinngest-vX.Y.Z` tag pushes. Builds a scratch-based image
# embedding the pinned inngest-cli binary + inngest-bootstrap.sh + a minimal
# entrypoint shim. The deploy webhook fires:
#   `deploy inngest ghcr.io/jikig-ai/soleur-inngest-bootstrap vX.Y.Z`
# and ci-deploy.sh's `case "inngest")` branch pulls + runs this image.
#
# Versioning: the tag's `vX.Y.Z` portion is the OCI image tag (not the
# inngest-cli version embedded inside it — that comes from inngest.tf locals
# and bumps separately). Each bootstrap image release is a release of THIS
# bootstrap shape, regardless of the embedded inngest-cli version.

on:
  push:
    tags:
      - 'vinngest-v*.*.*'
  # workflow_dispatch re-publishes an EXISTING vinngest-v* tag (escape hatch
  # for a CVE base-image rebuild of an already-released version). It takes the
  # tag name as `ref` — NOT a free-form version — so it can never mint a
  # tagless image that blinds the cloud-init drift-guard (#4692 / #4676 AC6).
  workflow_dispatch:
    inputs:
      ref:
        description: 'Existing vinngest-vX.Y.Z tag to (re)publish (e.g., vinngest-v1.1.11)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Validate the dispatch ref BEFORE checkout, from the trusted workflow
      # tree — so the guard script is never sourced from an untrusted ref's
      # tree. This inline regex is the canonical full-ref validator and the
      # load-bearing gate: a tagless publish is structurally impossible because
      # dispatch can only check out an existing vinngest-v* tag. Dispatch
      # requires repo write access (collaborator threat model); a wider grant
      # would make this the sole gate.
      - name: Validate dispatch ref
        if: github.event_name == 'workflow_dispatch'
        env:
          REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [[ ! "$REF" =~ ^vinngest-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: workflow_dispatch ref '$REF' is not an existing vinngest-vX.Y.Z tag"; exit 1
          fi

      # `ref: ${{ inputs.ref }}` is empty on the push path → checkout uses the
      # triggering tag. The requested/triggering tag is created locally via
      # actions/checkout's `+refs/tags/X:refs/tags/X` refspec, so no fetch-tags
      # / fetch-depth: 0 is needed. `inputs.ref` is regex-validated above
      # before it reaches this `ref:`.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tag
        id: tag
        # Hardened against workflow-injection: untrusted inputs (GITHUB_REF,
        # inputs.ref) flow through env vars, never inlined into shell.
        #
        # This logic is INLINE (not a checked-out script) on purpose: the
        # checkout above lands `inputs.ref`'s tree (an existing tag, predating
        # this workflow), so a `.github/scripts/*.sh` helper would not exist
        # there and the step would fail with exit 127. The workflow file is
        # always read from the default branch, so inline logic is current
        # regardless of which tag tree is checked out. The post-strip regex
        # `^v[0-9]+\.[0-9]+\.[0-9]+$` is byte-identical to the consumer
        # drift-guard's regex (cloud-init-inngest-bootstrap.test.sh) — a parity
        # test asserts it; an inline-equivalent harness unit-tests the logic.
        env:
          GH_EVENT: ${{ github.event_name }}
          INPUTS_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          # Discriminate on the event name (NOT inputs.ref emptiness) so a
          # future stale/defaulted dispatch input can't misroute the push path.
          if [[ "$GH_EVENT" == "workflow_dispatch" ]]; then
            src="$INPUTS_REF"
          else
            src="$GITHUB_REF"
          fi
          tag="${src#refs/tags/}"
          tag="${tag#vinngest-}"
          # The regex is the reject gate (not the strip) and guarantees non-empty.
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: resolved tag '$tag' is not vX.Y.Z (from ref '$src', event '$GH_EVENT')"; exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Read pinned inngest-cli + vector versions + SHAs from *.tf
        id: pin
        # Reads only from tracked files (no untrusted github.event.* input).
        run: |
          set -euo pipefail
          version=$(grep -E '^\s*inngest_cli_version\s*=' apps/web-platform/infra/inngest.tf | sed -E 's/.*"([^"]+)".*/\1/')
          sha=$(grep -E '^\s*inngest_cli_sha256\s*=' apps/web-platform/infra/inngest.tf | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$version" || -z "$sha" ]]; then
            echo "ERROR: failed to extract inngest_cli_version or inngest_cli_sha256 from inngest.tf"
            exit 1
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: inngest_cli_version '$version' is not vX.Y.Z"; exit 1
          fi
          if [[ ! "$sha" =~ ^[0-9a-f]{64}$ ]]; then
            echo "ERROR: inngest_cli_sha256 is not a 64-hex-char SHA256"; exit 1
          fi
          printf 'inngest_version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'inngest_sha256=%s\n' "$sha" >> "$GITHUB_OUTPUT"

          # Vector observability shipper (TR9 PR-5). Optional — empty values
          # cause the bootstrap script's vector-install block to skip
          # gracefully (warn-log only).
          v_version=$(grep -E '^\s*vector_version\s*=' apps/web-platform/infra/vector.tf | sed -E 's/.*"([^"]+)".*/\1/' || true)
          v_sha=$(grep -E '^\s*vector_sha256\s*=' apps/web-platform/infra/vector.tf | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [[ -n "$v_version" && ! "$v_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: vector_version '$v_version' is not X.Y.Z (no 'v' prefix per packages.timber.io)"; exit 1
          fi
          if [[ -n "$v_sha" && ! "$v_sha" =~ ^[0-9a-f]{64}$ ]]; then
            echo "ERROR: vector_sha256 is not a 64-hex-char SHA256"; exit 1
          fi
          printf 'vector_version=%s\n' "$v_version" >> "$GITHUB_OUTPUT"
          printf 'vector_sha256=%s\n' "$v_sha" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + verify + push
        env:
          IMAGE: ghcr.io/jikig-ai/soleur-inngest-bootstrap
          TAG: ${{ steps.tag.outputs.tag }}
          INNGEST_VERSION: ${{ steps.pin.outputs.inngest_version }}
          INNGEST_SHA256: ${{ steps.pin.outputs.inngest_sha256 }}
          VECTOR_VERSION: ${{ steps.pin.outputs.vector_version }}
          VECTOR_SHA256: ${{ steps.pin.outputs.vector_sha256 }}
        run: |
          set -euo pipefail
          BUILD_DIR=$(mktemp -d)

          # SHA256-verify the inngest-cli binary at build time. If this fails,
          # the build fails — runtime never sees a tampered binary.
          curl -fsSL -o "$BUILD_DIR/inngest.tar.gz" \
            "https://github.com/inngest/inngest/releases/download/${INNGEST_VERSION}/inngest_${INNGEST_VERSION#v}_linux_amd64.tar.gz"
          actual=$(sha256sum "$BUILD_DIR/inngest.tar.gz" | awk '{print $1}')
          if [[ "$actual" != "$INNGEST_SHA256" ]]; then
            echo "ERROR: SHA256 mismatch at build time — expected $INNGEST_SHA256, got $actual"
            exit 1
          fi
          echo "Build-time SHA256 verified: $actual"

          # Stage bootstrap script + Vector config with version + SHA baked
          # in at build time.
          cp apps/web-platform/infra/inngest-bootstrap.sh "$BUILD_DIR/inngest-bootstrap.sh"
          cp apps/web-platform/infra/vector.toml "$BUILD_DIR/vector.toml"
          # Durable Redis assets (#5450) — delivered the same way as vector.toml:
          # baked into the image, staged to /tmp at entrypoint, installed by the
          # bootstrap script after the Doppler env file exists.
          cp apps/web-platform/infra/inngest-redis.conf "$BUILD_DIR/inngest-redis.conf"
          cp apps/web-platform/infra/inngest-redis.service "$BUILD_DIR/inngest-redis.service"
          cp apps/web-platform/infra/inngest-redis-bootstrap.sh "$BUILD_DIR/inngest-redis-bootstrap.sh"

          # Conditional Vector env block — empty pin values produce empty
          # ENV lines, which the bootstrap script's `${VECTOR_CLI_VERSION:-}`
          # guard treats as "skip Vector install".
          cat > "$BUILD_DIR/Dockerfile" <<DOCKERFILE
          FROM alpine:3.20
          RUN apk add --no-cache bash curl tar coreutils
          ENV INNGEST_CLI_VERSION=${INNGEST_VERSION}
          ENV INNGEST_CLI_SHA256=${INNGEST_SHA256}
          ENV VECTOR_CLI_VERSION=${VECTOR_VERSION}
          ENV VECTOR_CLI_SHA256=${VECTOR_SHA256}
          COPY inngest-bootstrap.sh /inngest-bootstrap.sh
          COPY vector.toml /vector.toml
          COPY inngest-redis.conf /inngest-redis.conf
          COPY inngest-redis.service /inngest-redis.service
          COPY inngest-redis-bootstrap.sh /inngest-redis-bootstrap.sh
          RUN chmod +x /inngest-bootstrap.sh /inngest-redis-bootstrap.sh
          # The bootstrap script reads /tmp/vector.toml + /tmp/inngest-redis.*
          # at install time; stage the OCI-bundled assets there at entrypoint.
          ENTRYPOINT ["/bin/bash", "-c", "cp /vector.toml /tmp/vector.toml && cp /inngest-redis.conf /inngest-redis.service /inngest-redis-bootstrap.sh /tmp/ && /inngest-bootstrap.sh"]
          DOCKERFILE

          docker build -t "$IMAGE:$TAG" "$BUILD_DIR"
          docker push "$IMAGE:$TAG"
          echo "Pushed $IMAGE:$TAG"

      # --- #6122 (ADR-096) Phase 2: dual-push the inngest-bootstrap image to the self-hosted
      # zot registry. The plain `docker build`/`docker push` above leaves the image in the
      # runner's local docker, so `docker tag` + `docker push 127.0.0.1:5000/...` mirrors it
      # over the CF Tunnel bridge directly (no crane/buildx-localhost issue). GHCR push stays
      # primary (break-glass through the Phase-5 soak). Additive: a zot/bridge failure must not
      # fail the GHCR release (bridge continue-on-error; teardown if:always()). This image is
      # NOT cosign-signed (no id-token perm) — parity with the GHCR side, no sign step.
      - name: Bridge to zot registry (CF Tunnel)
        id: zot_bridge
        continue-on-error: true
        uses: ./.github/actions/cf-tunnel-registry-bridge
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          cloudflared-version: "2026.5.0"
          cloudflared-sha256: "0095e46fdc88855d801c4d304cb1f5dd4bd656116c47ab94c2ad0ae7cda1c7ec"

      - name: Mirror inngest image GHCR→zot (docker tag + push)
        if: steps.zot_bridge.outcome == 'success'
        env:
          IMAGE: ghcr.io/jikig-ai/soleur-inngest-bootstrap
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          ZOT="127.0.0.1:5000/soleur-inngest-bootstrap"
          docker tag "$IMAGE:$TAG" "$ZOT:$TAG"
          docker push "$ZOT:$TAG"
          echo "Pushed $ZOT:$TAG"

      - name: Tear down cloudflared registry bridge
        if: always()
        run: |
          set +e
          docker logout 127.0.0.1:5000 2>/dev/null || true
          if [[ -n "${REGISTRY_BRIDGE_PID:-}" ]]; then
            kill "$REGISTRY_BRIDGE_PID" 2>/dev/null || true
          fi
          [[ -f /tmp/cloudflared-registry.log ]] && tail -n 200 /tmp/cloudflared-registry.log || true
