name: PR quality guards (#2905)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard-script-fixture-tests:
    name: Bash fixture tests for guard scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run guard fixture tests
        run: bash .github/scripts/test/run-all.sh

  settings-json-integrity:
    name: Block destructive .claude/settings.json edits
    runs-on: ubuntu-latest
    steps:
      - name: Check for opt-out label (must be applied by non-author)
        id: opt_out
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GH_REPO: ${{ github.repository }}
          JOB_NAME: settings-json-integrity
        run: |
          set -uo pipefail
          # Honor the opt-out label only when applied by a user OTHER than
          # the PR author. Blocks the autonomous-loop bypass: a bot account
          # that opens a PR and applies its own opt-out label is treated as
          # unlabelled — the gate still runs. See #2905.
          LABELER=$(gh api --paginate "/repos/$GH_REPO/issues/$PR_NUMBER/events" \
            --jq '[.[] | select(.event=="labeled" and .label.name=="confirm:claude-config-change")] | last | .actor.login // empty' \
            2>/dev/null || true)
          if [[ -z "$LABELER" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELER" == "$PR_AUTHOR" ]]; then
            echo "::warning::confirm:claude-config-change applied by PR author ($LABELER) — opt-out ignored. A non-author must apply the label."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::$JOB_NAME skipped — label applied by $LABELER (non-author)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.opt_out.outputs.skip != 'true'
        with:
          fetch-depth: 0
      - name: Run integrity check
        if: steps.opt_out.outputs.skip != 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/check-settings-integrity.sh

  pr-body-vs-diff:
    name: Block PR body citing files not in diff
    runs-on: ubuntu-latest
    steps:
      - name: Check for opt-out label (must be applied by non-author)
        id: opt_out
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GH_REPO: ${{ github.repository }}
          JOB_NAME: pr-body-vs-diff
        run: |
          set -uo pipefail
          LABELER=$(gh api --paginate "/repos/$GH_REPO/issues/$PR_NUMBER/events" \
            --jq '[.[] | select(.event=="labeled" and .label.name=="confirm:claude-config-change")] | last | .actor.login // empty' \
            2>/dev/null || true)
          if [[ -z "$LABELER" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELER" == "$PR_AUTHOR" ]]; then
            echo "::warning::confirm:claude-config-change applied by PR author ($LABELER) — opt-out ignored."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::$JOB_NAME skipped — label applied by $LABELER (non-author)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.opt_out.outputs.skip != 'true'
      - name: Run body-vs-diff check
        if: steps.opt_out.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/check-pr-body-vs-diff.sh

  stray-worktree-marker-block:
    name: Block .claude/worktrees/ entries in diff
    runs-on: ubuntu-latest
    steps:
      - name: Check for opt-out label (must be applied by non-author)
        id: opt_out
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GH_REPO: ${{ github.repository }}
          JOB_NAME: stray-worktree-marker-block
        run: |
          set -uo pipefail
          LABELER=$(gh api --paginate "/repos/$GH_REPO/issues/$PR_NUMBER/events" \
            --jq '[.[] | select(.event=="labeled" and .label.name=="confirm:claude-config-change")] | last | .actor.login // empty' \
            2>/dev/null || true)
          if [[ -z "$LABELER" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELER" == "$PR_AUTHOR" ]]; then
            echo "::warning::confirm:claude-config-change applied by PR author ($LABELER) — opt-out ignored."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::$JOB_NAME skipped — label applied by $LABELER (non-author)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Check diff for .claude/worktrees/ entries
        if: steps.opt_out.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          STRAY=$(gh pr diff "$PR_NUMBER" --repo "$GH_REPO" --name-only \
            | grep -E '^\.claude/worktrees/' || true)
          if [[ -n "$STRAY" ]]; then
            echo "::error::Diff contains .claude/worktrees/ entries — these are agent-runtime markers, never commit them. See #2905."
            echo "Offending paths:"
            echo "$STRAY" | sed 's/^/  - /'
            exit 1
          fi

  pii-grep:
    name: Block Linear CDN URLs in PR diff (#3635)
    # Intentionally NO opt-out support. The redaction guard is the
    # load-bearing defense for a single-user-incident threshold per
    # knowledge-base/project/specs/feat-linear-issue-image-context/spec.md FR7.
    # An opt-out label would defeat the purpose. If a PR legitimately
    # needs to commit a uploads.linear.app reference (e.g., a test
    # fixture documenting the failure mode), use the synthesized non-
    # routable string `uploads.linear.app/TEST-FIXTURE-NOT-REAL.png`
    # convention from cq-test-fixtures-synthesized-only — that string
    # is detected as a test-fixture and skipped below.
    runs-on: ubuntu-latest
    steps:
      - name: Scan PR diff for Linear CDN URLs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$GH_REPO" 2>/dev/null || true)
          if [[ -z "$DIFF" ]]; then
            echo "::notice::Empty diff — nothing to scan."
            exit 0
          fi
          # Match URL shape only: https?://uploads.linear.app/ — bare prose
          # mentions of the string "uploads.linear.app" in documentation are
          # legitimate (this skill's docs discuss the pattern at length).
          #
          # Hostname match is case-insensitive (-iE flag): DNS is case-
          # insensitive, so https://Uploads.Linear.App/... resolves to the
          # same CDN host and serves the same signed bearer credential.
          # Matches the redaction primitive's case-insensitive hostname
          # class in scripts/redact-linear-urls.sh.
          #
          # The TEST-FIXTURE-NOT-REAL allowlist is anchored to the path
          # immediately after the hostname, NOT a free substring. A real
          # Linear upload named "screenshot-TEST-FIXTURE-NOT-REAL.png" would
          # produce a URL like https://uploads.linear.app/<uuid>/screenshot-
          # TEST-FIXTURE-NOT-REAL.png that the unanchored allowlist would
          # let pass. Anchoring to /TEST-FIXTURE-NOT-REAL right after the
          # hostname requires the test fixture token to appear at a fixed
          # positional slot, which real Linear paths cannot satisfy.
          # Exclude unified-diff file-header lines (+++) which begin with `+`.
          OFFENDERS=$(printf '%s' "$DIFF" \
            | grep -E '^\+' | grep -vE '^\+\+\+' \
            | grep -iE 'https?://uploads\.linear\.app/' \
            | grep -ivE 'https?://uploads\.linear\.app/TEST-FIXTURE-NOT-REAL' || true)
          if [[ -n "$OFFENDERS" ]]; then
            echo "::error::PR diff contains a uploads.linear.app URL. This is a Linear CDN signed URL — committing it on a public-GitHub repo is a single-user-incident threshold breach per knowledge-base/project/specs/feat-linear-issue-image-context/spec.md FR7. Use Skill: soleur:linear-fetch to redact, or replace the URL with [linear-image: REDACTED]."
            echo "Offending lines (first 10):"
            printf '%s\n' "$OFFENDERS" | head -n 10 | sed 's/^/  /'
            exit 1
          fi

  userid-bypass-lint:
    name: Block direct userId emissions in apps/web-platform (#3698)
    # Intentionally NO opt-out support. The pino formatters.log rename hook
    # in apps/web-platform/server/logger.ts is the load-bearing defense for
    # the single-user-incident threshold per ADR-028 / PA8 §(c)(ii). Future
    # direct `logger.{error,warn,info,debug}({...userId...})` sites would be
    # caught at runtime by formatters.log, but raw-source readability suffers
    # and any silent regression of the formatter erodes the disclosure
    # truthfulness. This guard enforces a baseline known-cover set.
    #
    # Allowlist:
    # - reportSilentFallback / warnSilentFallback / mirrorP0Deduped — emit
    #   userIdHash via observability.ts:hashExtraUserId (already pseudonymised).
    # - userIdHash explicit emissions — already in the post-rename naming.
    # - github-resolve/callback/route.ts — known leave-and-cover info
    #   success log (covered by formatters.log defence-in-depth per #3698).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Scan PR diff for direct userId emissions
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$GH_REPO" 2>/dev/null || true)
          if [[ -z "$DIFF" ]]; then
            echo "::notice::Empty diff — nothing to scan."
            exit 0
          fi
          # Restrict to added lines in apps/web-platform/(server|app)/**.
          # Track current file via awk so we only flag scoped additions.
          OFFENDERS=$(printf '%s' "$DIFF" \
            | awk '
                /^\+\+\+ b\// { file = substr($0, 7); next }
                /^\+/ && !/^\+\+\+/ {
                  if (file ~ /^apps\/web-platform\/(server|app)\//) print file ":" $0
                }
              ' \
            | grep -E '(log|logger)\.(error|warn|info|debug)' \
            | grep -E '\buserId\b|\buser_id\b' \
            | grep -vE 'reportSilentFallback|warnSilentFallback|mirrorP0Deduped' \
            | grep -vE 'userIdHash\b' \
            | grep -vE '^apps/web-platform/app/api/auth/github-resolve/callback/route\.ts:' \
            || true)
          if [[ -n "$OFFENDERS" ]]; then
            echo "::error::Direct userId emit added in apps/web-platform/(server|app)/. The pino formatters.log rename hook covers all current sites; new direct emits should either route through the silent-fallback helpers (reportSilentFallback / warnSilentFallback) or emit userIdHash directly. If this is a genuinely-new leave-and-cover site, extend the allowlist in .github/workflows/pr-quality-guards.yml#userid-bypass-lint."
            echo "Offending diff lines:"
            printf '%s\n' "$OFFENDERS" | head -n 20 | sed 's/^/  /'
            exit 1
          fi

  auto-commit-message-density:
    name: Block PRs dominated by auto-commit headlines
    runs-on: ubuntu-latest
    steps:
      - name: Check for opt-out label (must be applied by non-author)
        id: opt_out
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GH_REPO: ${{ github.repository }}
          JOB_NAME: auto-commit-message-density
        run: |
          set -uo pipefail
          LABELER=$(gh api --paginate "/repos/$GH_REPO/issues/$PR_NUMBER/events" \
            --jq '[.[] | select(.event=="labeled" and .label.name=="confirm:claude-config-change")] | last | .actor.login // empty' \
            2>/dev/null || true)
          if [[ -z "$LABELER" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELER" == "$PR_AUTHOR" ]]; then
            echo "::warning::confirm:claude-config-change applied by PR author ($LABELER) — opt-out ignored."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::$JOB_NAME skipped — label applied by $LABELER (non-author)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.opt_out.outputs.skip != 'true'
      - name: Run density check
        if: steps.opt_out.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/check-auto-commit-density.sh
