name: Merge queue stall check

# Scheduled stall detector for the GitHub merge queue on `main` (#5780).
#
# WHY GH-Actions cron (ADR-033 repo-scoped determination): this probe uses the
# default GITHUB_TOKEN + `gh api graphql`/`gh issue` ONLY — no app context, no
# app/Doppler secrets, no app-token mint. The `repository.mergeQueue` GraphQL
# field is the same data the https://github.com/<repo>/queue/main UI shows any
# contributor (ordinary repo read scope); it is NOT the Administration-scoped
# REST `/rulesets` config surface. So it stays on a GHA ephemeral runner per
# ADR-033 — no Inngest needed. (CTO ruling, #5780.)
#
# SCOPE — STALLED ENTRIES ONLY. A required status check that never reports on a
# `merge_group` event leaves the queue entry pending forever; this probe finds
# such entries and files an issue. It is, BY DESIGN, blind to a silently
# *disabled* queue (rule removed out-of-band → no entries → nothing to find).
# Detecting merge_queue-rule drift / a disabled queue is the job of
# `scheduled-terraform-drift.yml` (the `infra/github` matrix entry added in
# PR-2), which runs `terraform plan` against the ruleset root with the App-auth
# provider creds it already carries. Do NOT add a `gh api .../rulesets` probe
# here — it needs Administration:Read (app token), which would defeat the
# no-app-secrets property above. (CTO ruling, #5780.)
#
# PRE-PR-2 / steady-state: before the merge_queue rule is enabled (and whenever
# nothing is queued), `repository.mergeQueue` is null → graceful green no-op.
# That null-handling intrinsically covers the pre-enablement phase, so no
# sentinel / "PR-2 landed" flag is needed. A null mergeQueue is NOT treated as
# "queue disabled" here — that determination belongs to the drift detector.

on:
  schedule:
    - cron: '*/30 * * * *'   # ~every 30 min
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: merge-queue-stall-check
  cancel-in-progress: false

jobs:
  stall-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # Keep >= the ruleset's check_response_timeout_minutes (PR-2 sets 15) plus
      # a buffer. An entry pending longer than this almost certainly means a
      # required check is not reporting on merge_group (a queue stall).
      STALL_THRESHOLD_MINUTES: '30'
    steps:
      - name: Detect stalled merge-queue entries and file an issue
        run: |
          set -euo pipefail

          owner="${GH_REPO%/*}"
          name="${GH_REPO#*/}"

          # mergeQueue is null when no queue is configured on main (pre-PR-2 or
          # disabled) OR when nothing is queued — both are no-ops for a STALL
          # probe. A GraphQL *error* (vs a null field) still fails the run loud.
          # shellcheck disable=SC2016  # $owner/$name below are GraphQL variables, not shell
          resp="$(gh api graphql \
            -f owner="$owner" -f name="$name" \
            -f query='
              query($owner:String!, $name:String!) {
                repository(owner:$owner, name:$name) {
                  mergeQueue(branch:"main") {
                    entries(first:50) {
                      nodes {
                        enqueuedAt
                        position
                        pullRequest { number url }
                      }
                    }
                  }
                }
              }')"

          if [[ "$(jq -r '.data.repository.mergeQueue // "null"' <<<"$resp")" == "null" ]]; then
            echo "merge queue not configured on main (pre-PR-2 or disabled), or nothing queued; no entries to evaluate."
            exit 0
          fi

          now="$(date -u +%s)"
          threshold_s=$(( STALL_THRESHOLD_MINUTES * 60 ))

          # One line per stalled entry: <pr_number>\t<age_minutes>\t<pr_url>
          # (title is intentionally excluded to keep the TSV delimiter-safe).
          stalled="$(jq -r --argjson now "$now" --argjson thr "$threshold_s" '
            (.data.repository.mergeQueue.entries.nodes // [])[]
            | select(.enqueuedAt != null and .pullRequest != null)
            | (($now) - (.enqueuedAt | fromdateiso8601)) as $age
            | select($age > $thr)
            | "\(.pullRequest.number)\t\(($age/60)|floor)\t\(.pullRequest.url)"
          ' <<<"$resp")"

          if [[ -z "$stalled" ]]; then
            echo "No merge-queue entry on main has been pending longer than ${STALL_THRESHOLD_MINUTES}m."
            exit 0
          fi

          echo "::warning::Stalled merge-queue entries detected (pending > ${STALL_THRESHOLD_MINUTES}m):"
          printf '%s\n' "$stalled"

          # Ensure the label exists so `gh issue create --label` cannot error.
          gh label create merge-queue-stall --repo "$GH_REPO" \
            --color FBCA04 \
            --description "Merge queue entry stalled pending (#5780)" \
            2>/dev/null || true

          while IFS=$'\t' read -r pr age url; do
            [[ -z "$pr" ]] && continue
            # Match anchor includes the constant " pending" suffix that always
            # follows the PR number in the filed title — without it, the prefix
            # for PR #1 ("…PR #1") would startswith-match PR #12's title
            # ("…PR #12 pending …") and suppress a genuine stall for #1.
            match_anchor="merge-queue stall: PR #${pr} pending"
            existing="$(gh issue list --repo "$GH_REPO" --state open --limit 100 \
              --label merge-queue-stall --json number,title --jq '.[] | [.number, .title] | @tsv' \
              | awk -F'\t' -v p="$match_anchor" 'index($2, p) == 1 { print $1; exit }')"
            if [[ -n "$existing" ]]; then
              echo "Open stall issue #${existing} already tracks PR #${pr}; skipping create."
              continue
            fi
            # shellcheck disable=SC2016  # single-quoted printf format: the backticks are literal markdown, no shell/var expansion intended
            body="$(printf 'PR #%s has been pending in the merge queue for ~%s minutes (> %sm threshold): %s\n\nA queue entry that never drains means a **required status check is not reporting on the `merge_group` event** for the queue temp ref, leaving the entry pending forever (#5780 failure mode).\n\nTriage:\n1. Open the queue: https://github.com/%s/queue/main\n2. Open the PR checks for the pending context: %s/checks\n3. Confirm every required-context producer fires on `merge_group`: ci.yml, secret-scan.yml, pr-quality-guards.yml, legal-doc-cross-document-gate.yml, tenant-integration.yml, dependency-review.yml, skill-security-scan-pr-trailer.yml, plus CodeQL default setup. A missing `merge_group:` trigger (or a context that never posts on it) is the usual cause.\n\nFiled automatically by .github/workflows/merge-queue-stall-check.yml.' \
              "$pr" "$age" "$STALL_THRESHOLD_MINUTES" "$url" "$GH_REPO" "$url")"
            gh issue create --repo "$GH_REPO" \
              --title "merge-queue stall: PR #${pr} pending >${STALL_THRESHOLD_MINUTES}m" \
              --label merge-queue-stall \
              --body "$body"
            echo "Filed stall issue for PR #${pr}."
          done <<<"$stalled"
