# Scheduled health probe for feat-team-workspace-multi-user (Phase 8.3).
#
# Hits the `/api/health/team-membership` endpoint hourly. Fires a P0
# Sentry issue if:
#
#   (1) `FLAG_TEAM_WORKSPACE_INVITE=1` in the env under test, AND
#   (2) the endpoint reports `status=degraded` OR returns non-2xx.
#
# Stays silent under flag-OFF — the workspace tables are dormant until
# the invite surface flips on. Per `hr-no-dashboard-eyeball-pull-data-yourself`
# the workflow auto-pages via `gh issue create` rather than an operator
# eyeball mailbox.
#
# All untrusted values (probe payload, status fields) flow through env
# vars + sanitization before any echo into ::error::/issue body, so the
# log-injection class flagged by .github/security_reminder_hook is
# closed. No github.event.* inputs consumed.
#
# Tracks #4229. See app/api/health/team-membership/route.ts for the
# probe implementation and knowledge-base/project/specs/
# feat-team-workspace-multi-user/spec.md failure_modes #1-5.

name: "Scheduled: Team-Membership Health"

on:
  schedule:
    - cron: '17 * * * *'   # hourly at :17 (offset from generic :00 cron storms)
  workflow_dispatch: {}

concurrency:
  group: scheduled-membership-health
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HEALTH_URL: ${{ vars.SOLEUR_HEALTH_TEAM_MEMBERSHIP_URL || 'https://soleur.ai/api/health/team-membership' }}
      FLAG_ON: ${{ vars.FLAG_TEAM_WORKSPACE_INVITE || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Probe health endpoint
        id: probe
        run: |
          set -euo pipefail
          status_code=$(curl -sS -o /tmp/health.json -w '%{http_code}' "$HEALTH_URL" || echo "000")
          payload=$(cat /tmp/health.json 2>/dev/null || echo "{}")
          health_status=$(printf '%s' "$payload" | grep -oE '"status"[[:space:]]*:[[:space:]]*"[a-z]+"' | head -1 | grep -oE '"[a-z]+"$' | tr -d '"' || echo "unknown")
          reason=$(printf '%s' "$payload" | grep -oE '"reason"[[:space:]]*:[[:space:]]*"[^"]+"' | head -1 | sed -E 's/.*"reason"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/' || true)
          # Sanitize reason for log + downstream output. Newlines and
          # control chars cannot tamper with the issue body.
          safe_reason=$(printf '%s' "${reason:-}" | tr -d '\000-\037' | head -c 500)
          {
            echo "status_code=$status_code"
            echo "health_status=$health_status"
            echo "reason=$safe_reason"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Decide whether to page
        id: decide
        env:
          STATUS_CODE: ${{ steps.probe.outputs.status_code }}
          HEALTH_STATUS: ${{ steps.probe.outputs.health_status }}
        run: |
          set -euo pipefail
          should_page="false"
          if [ "$FLAG_ON" = "1" ]; then
            if [ "$STATUS_CODE" != "200" ] || [ "$HEALTH_STATUS" != "ok" ]; then
              should_page="true"
            fi
          fi
          echo "should_page=$should_page" | tee -a "$GITHUB_OUTPUT"

      - name: File P0 issue on degraded health
        if: steps.decide.outputs.should_page == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASON: ${{ steps.probe.outputs.reason }}
          STATUS_CODE: ${{ steps.probe.outputs.status_code }}
          HEALTH_STATUS: ${{ steps.probe.outputs.health_status }}
        run: |
          set -euo pipefail
          gh issue create \
            --title "[P0] team-membership health degraded (${HEALTH_STATUS}, HTTP ${STATUS_CODE})" \
            --label "type/incident,severity/p0,area/workspace" \
            --body "Automated probe from .github/workflows/scheduled-membership-health.yml at $(date -u +%FT%TZ).

          - HTTP status: \`${STATUS_CODE}\`
          - Health status: \`${HEALTH_STATUS}\`
          - Reason: \`${REASON:-(none)}\`
          - Endpoint: \`${HEALTH_URL}\`
          - Flag-state: \`FLAG_TEAM_WORKSPACE_INVITE=${FLAG_ON}\`

          ## Likely failure classes
          (1) Migrations 053-057 not applied to prd.
          (2) RLS policy regression on workspace_members /
              workspace_member_attestations.
          (3) PostgREST schema cache stale post-migration apply.
          (4) Service-role key drift between web-platform and Supabase.

          ## Runbook
          See \`knowledge-base/project/specs/feat-team-workspace-multi-user/rollback.md\`."
