name: "PR auto-close keyword scanner (#3407)"

# Scans PR title, body, AND commit messages for GitHub auto-close keyword + #N
# references using the regex from plugins/soleur/skills/ship/scripts/auto-close-scan.sh.
# Commit messages are included because this repo squash-merges, and the squash
# commit (which GitHub's negation-blind parser reads on merge) is built from the
# branch commit messages — a keyword there closes an issue even when the PR body
# is clean. That gap closed #5463 twice (#5519, #5564).
#
# SECURITY: this workflow uses the env-block pattern (PR_TITLE/PR_BODY mapped to
# env vars, then accessed via "$PR_TITLE"/"$PR_BODY" in the run script) — never
# interpolates ${{ github.event.pull_request.* }} directly into a `run:` line.
# Untrusted PR title/body content is treated as data passed through env, not as
# shell. See https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
#
# Fail-soft: warns via `::warning::` annotation and (idempotently) edits a single
# bot comment listing all matches. The workflow exits 0 even when matches are
# found — sometimes `Closes #N` IS intentional (e.g., the canonical body line).
# Operators confirm intent by adding `<!-- auto-close-scanner: confirm -->` to
# the PR body, which silences subsequent edits.
#
# Two-surface coverage with one blocking layer. The CI workflow runs on
# `pull_request: opened, edited` AFTER the PR exists — by then GitHub's parser
# has already recorded the auto-close intent. CI is therefore observational:
# it warns + comments, but cannot prevent the auto-close that fires when the
# PR is merged. The blocking layer is `plugins/soleur/skills/ship/SKILL.md`
# Phase 6 pre-creation scan, which surfaces matches BEFORE `gh pr create` /
# `gh pr edit`. CI covers the surfaces ship doesn't (manual `gh pr create`,
# GitHub UI, third-party plugins). Together they reduce blast radius without
# being literal defense-in-depth (only one layer blocks).

on:
  pull_request:
    # `synchronize` is required so a commit-message trap pushed AFTER the PR opens
    # is re-scanned — `edited` only fires on title/body changes, not new commits.
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-auto-close-scanner-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan PR title and body for auto-close keyword + #N
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          # Honor explicit operator opt-out marker.
          if printf '%s\n' "$PR_BODY" | grep -qF '<!-- auto-close-scanner: confirm -->'; then
            echo "::notice::PR body contains <!-- auto-close-scanner: confirm --> — scanner skipped per author opt-in."
            exit 0
          fi

          TMP_T=$(mktemp); TMP_B=$(mktemp); TMP_C=$(mktemp)
          printf '%s\n' "$PR_TITLE" > "$TMP_T"
          printf '%s\n' "$PR_BODY"  > "$TMP_B"
          # Commit messages feed the squash-merge commit (this repo's default),
          # which is the text GitHub's auto-close parser reads on merge to main.
          # A negated keyword in a commit body ("Does not close #N") still fires
          # the close — the parser is negation-blind — yet a title/body-only scan
          # misses it. That exact gap closed #5463 twice (#5519, then #5564). The
          # commit messages are untrusted PR-author input, so they are treated as
          # data: written to a file, scanned, and backtick-stripped before any
          # embedding (same model as PR_BODY).
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/commits" \
            --jq '.[].commit.message' > "$TMP_C" 2>/dev/null || true

          T_MATCHES_RAW=$(bash plugins/soleur/skills/ship/scripts/auto-close-scan.sh "$TMP_T")
          B_MATCHES_RAW=$(bash plugins/soleur/skills/ship/scripts/auto-close-scan.sh "$TMP_B")
          C_MATCHES_RAW=$(bash plugins/soleur/skills/ship/scripts/auto-close-scan.sh "$TMP_C")

          if [[ -z "$T_MATCHES_RAW" && -z "$B_MATCHES_RAW" && -z "$C_MATCHES_RAW" ]]; then
            echo "No auto-close keyword + #N references detected in title, body, or commits."
            exit 0
          fi

          # Strip backticks from match output before embedding inside the bot
          # comment's triple-backtick fences. Without this, an attacker submitting
          # a PR body containing literal ``` near an auto-close keyword could
          # break out of the bot comment's code fence and inject arbitrary
          # Markdown into a github-actions[bot]-authored comment (high apparent
          # trust, downstream agents read bot comments). See PR #3411 P2-1.
          T_MATCHES=$(printf '%s' "$T_MATCHES_RAW" | tr -d '`')
          B_MATCHES=$(printf '%s' "$B_MATCHES_RAW" | tr -d '`')
          C_MATCHES=$(printf '%s' "$C_MATCHES_RAW" | tr -d '`')

          MSG="auto-close keyword + #N detected in PR title, body, or a commit message. Verify each match is intentional. NOTE: GitHub's parser is negation-blind — 'does not close #N' still closes #N — and commit messages feed the squash-merge commit, so a keyword there auto-closes on merge even if the PR body is clean. If unintentional, edit the PR title/body or reword the commit. To silence this scanner on subsequent body edits, add <!-- auto-close-scanner: confirm --> to the PR body."
          MSG_SAFE="${MSG//[$'\n\r']/}"
          echo "::warning::${MSG_SAFE}"

          # Build the comment body with a stable header line so we can match a
          # prior bot comment for in-place edit (idempotency — see #3407 R3).
          COMMENT_HEADER='## Auto-close keyword scanner (#3407)'
          COMMENT_BODY=$(printf '%s\n\n%s\n\n### Title matches\n```\n%s\n```\n\n### Body matches\n```\n%s\n```\n\n### Commit message matches\n```\n%s\n```\n\nIf any match is unintentional, edit the PR title/body or reword the commit. To silence this scanner on subsequent body edits, add `<!-- auto-close-scanner: confirm -->` to the PR body.\n' \
            "$COMMENT_HEADER" \
            "$MSG" \
            "${T_MATCHES:-(none)}" \
            "${B_MATCHES:-(none)}" \
            "${C_MATCHES:-(none)}")

          # Find a prior bot comment with the same header → edit in place.
          # Otherwise post a new comment. Either path keeps the surface to a
          # single PR-thread comment regardless of edit cadence. `--paginate
          # ?per_page=100` covers PRs with >30 comments where the prior bot
          # comment may not be on page 1; without paging we'd silently degrade
          # to "post a new comment every edit" on long PRs.
          PRIOR_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.user.login=="github-actions[bot]" and (.body | startswith("## Auto-close keyword scanner")))] | .[0].id // empty')

          if [[ -n "$PRIOR_ID" ]]; then
            # If the prior comment was deleted between GET and PATCH, fall
            # through to POST instead of failing the workflow.
            if ! gh api -X PATCH "repos/$REPO/issues/comments/$PRIOR_ID" \
              -f "body=$COMMENT_BODY" \
              >/dev/null 2>&1; then
              echo "Prior comment $PRIOR_ID PATCH failed (deleted?); posting fresh."
              gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" \
                -f "body=$COMMENT_BODY" \
                >/dev/null
            else
              echo "Edited prior scanner comment (id=$PRIOR_ID)."
            fi
          else
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" \
              -f "body=$COMMENT_BODY" \
              >/dev/null
            echo "Posted new scanner comment."
          fi

          # Always exit 0 — fail-soft per #3407.
          exit 0
