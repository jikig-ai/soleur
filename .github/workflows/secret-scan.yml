# Secret-scanning floor (#3121). Load-bearing CI gate. The lefthook
# `gitleaks-staged` command is fast-feedback only; this workflow is the
# enforcer. Bypass via `git commit --no-verify` is intentional locally —
# this job re-scans on every PR and on every push to main.
#
# Triggers:
#   - pull_request                     PR-diff scan (cheap, fail-fast)
#   - push: branches: [main]           full-tree scan after merge
#   - schedule: '0 6 * * 1'            weekly retroactive scan with current
#                                      rule pack (catches coverage gaps when
#                                      the rule pack adds new shapes)
#
# Security posture:
#   - permissions: contents: read ONLY (no pull-requests: read)
#   - pull_request (NOT pull_request_target) — fork PRs run in untrusted
#     context with no secrets exposure
#   - gitleaks v8.24.2 pinned with hardcoded SHA256 literal in the YAML
#     (NOT fetched from GitHub at runtime — same-origin attacker could
#     swap both binary and checksum)
#   - --redact suppresses raw secret content in logs
#   - NO --report-path artifact upload — on a public repo, the safer
#     default is "logs only, forensics via local re-run with the offending
#     commit SHA"; see knowledge-base/engineering/operations/secret-scanning.md
#   - All `${{ github.event.* }}` references are hoisted to env: vars per
#     workflow-injection hardening guide.

name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.24.2"
  # SHA256 for gitleaks_8.24.2_linux_x64.tar.gz (verified against
  # https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_checksums.txt
  # at pin time). To upgrade: fetch new checksum, update both lines.
  GITLEAKS_SHA256: "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"

jobs:
  scan:
    name: gitleaks scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history for diff scans)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned, sha-verified)
        run: |
          set -euo pipefail
          curl -sSLo gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan (PR diff)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1 \
            --log-opts="--no-merges ${BASE_SHA}..${HEAD_SHA}"

      - name: Scan (full tree, push:main)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1

      - name: Scan (full history, weekly cron)
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1

  lint-fixture-content:
    name: lint fixture content
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine staged-equivalent file set (PR diff)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --diff-filter=ACMR --name-only "${BASE_SHA}..${HEAD_SHA}" \
            | grep -E '^(apps/web-platform/test/(fixtures|__synthesized__|__goldens__)/|.*/__goldens__/|.*\.snap$)' \
            > /tmp/lint-files.txt || true

      - name: Determine staged-equivalent file set (push / schedule)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git ls-files \
            | grep -E '^(apps/web-platform/test/(fixtures|__synthesized__|__goldens__)/|.*/__goldens__/|.*\.snap$)' \
            > /tmp/lint-files.txt || true

      - name: Run linter
        run: |
          set -euo pipefail
          if [[ ! -s /tmp/lint-files.txt ]]; then
            echo "No fixture/golden/snapshot files in scope; skipping."
            exit 0
          fi
          xargs -a /tmp/lint-files.txt node apps/web-platform/scripts/lint-fixture-content.mjs

  smoke-tests:
    name: smoke (${{ matrix.case }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        case:
          - allowlist-positive
          - allowlist-negative
          - linter-positive
          - linter-waiver
          - rename-laundering
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSLo gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks

      - name: Configure git identity (for staging fixtures)
        run: |
          git config user.email "smoke-tests@example.com"
          git config user.name "secret-scan smoke tests"

      - name: Run case
        env:
          CASE: ${{ matrix.case }}
          # Synthetic Doppler-shape token, SPLIT into prefix + body so the
          # full literal NEVER appears in this committed file. The smoke
          # script concatenates them at runtime in CI memory only — that
          # avoids:
          #   (a) GitHub push-protection blocking the workflow file
          #       (it scans every committed line for the full Doppler shape).
          #   (b) Our own `doppler-token` rule firing on this file when the
          #       PR-diff scanner runs (the rule requires the contiguous
          #       `dp.pt.<40+>` shape; split prefix/body never matches).
          # The concatenated value is staged into separate fixture files
          # (allowlisted vs. not) to prove the path-based allowlist works.
          # Choosing Doppler over JWT because the default `jwt` rule cannot
          # be allowlisted per-path in gitleaks v8.24.2.
          FAKE_DOPPLER_PREFIX: "dp.pt."
          FAKE_DOPPLER_BODY: "SMOKETESTaBCDEFGHijklmnopqrstuvwxyz123456789"
        run: |
          set -euo pipefail
          # Compose the synthetic token at runtime; never a literal in the file.
          FAKE_DOPPLER="${FAKE_DOPPLER_PREFIX}${FAKE_DOPPLER_BODY}"
          case "${CASE}" in
            allowlist-positive)
              mkdir -p apps/web-platform/test/__goldens__/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/test/__goldens__/smoke/fake.snap
              git add apps/web-platform/test/__goldens__/smoke/fake.snap
              ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1
              echo "PASS: allowlisted path didn't trip"
              ;;
            allowlist-negative)
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/leaked.ts
              git add apps/web-platform/server/smoke/leaked.ts
              if ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1; then
                echo "FAIL: gate did NOT fire on un-allowlisted server path" >&2
                exit 1
              fi
              echo "PASS: gate fired on server-path token"
              ;;
            linter-positive)
              mkdir -p apps/web-platform/test/__goldens__/smoke
              echo "user@gmail.com" > apps/web-platform/test/__goldens__/smoke/contains-real-email.txt
              if node apps/web-platform/scripts/lint-fixture-content.mjs apps/web-platform/test/__goldens__/smoke/contains-real-email.txt; then
                echo "FAIL: linter did NOT fire on real email" >&2
                exit 1
              fi
              echo "PASS: linter fired on real email"
              ;;
            linter-waiver)
              mkdir -p apps/web-platform/test/__goldens__/smoke
              echo "user@gmail.com # gitleaks:allow # issue:#3121 documented allowed" \
                > apps/web-platform/test/__goldens__/smoke/with-waiver.txt
              node apps/web-platform/scripts/lint-fixture-content.mjs apps/web-platform/test/__goldens__/smoke/with-waiver.txt
              echo "PASS: valid waiver accepted"
              ;;
            rename-laundering)
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/with-secret.ts
              git add apps/web-platform/server/smoke/with-secret.ts
              git commit -m "fixture: baseline for rename-laundering smoke" --no-verify
              mkdir -p apps/web-platform/test/__synthesized__
              git mv apps/web-platform/server/smoke/with-secret.ts \
                     apps/web-platform/test/__synthesized__/now-allowed.ts
              if ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1; then
                echo "VERDICT: gitleaks v${GITLEAKS_VERSION} ALLOWS the rename (laundered into allowlist path)."
                echo "VERDICT: rename-laundering=allowed" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "VERDICT: gitleaks v${GITLEAKS_VERSION} BLOCKS the rename (fail-closed on diff content)."
                echo "VERDICT: rename-laundering=blocked" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            *)
              echo "Unknown case: ${CASE}" >&2
              exit 1
              ;;
          esac
