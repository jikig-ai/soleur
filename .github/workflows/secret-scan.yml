# Secret-scanning floor (#3121). Load-bearing CI gate. The lefthook
# `gitleaks-staged` command is fast-feedback only; this workflow is the
# enforcer. Bypass via `git commit --no-verify` is intentional locally —
# this job re-scans on every PR and on every push to main.
#
# Triggers:
#   - pull_request                     PR-diff scan (cheap, fail-fast)
#   - push: branches: [main]           full-tree scan after merge
#   - schedule: '0 6 * * 1'            weekly retroactive scan with current
#                                      rule pack (catches coverage gaps when
#                                      the rule pack adds new shapes)
#
# Security posture:
#   - permissions: contents: read ONLY (no pull-requests: read)
#   - pull_request (NOT pull_request_target) — fork PRs run in untrusted
#     context with no secrets exposure
#   - gitleaks v8.24.2 pinned with hardcoded SHA256 literal in the YAML
#     (NOT fetched from GitHub at runtime — same-origin attacker could
#     swap both binary and checksum)
#   - --redact suppresses raw secret content in logs
#   - NO --report-path artifact upload — on a public repo, the safer
#     default is "logs only, forensics via local re-run with the offending
#     commit SHA"; see knowledge-base/engineering/operations/secret-scanning.md
#   - All `${{ github.event.* }}` references are hoisted to env: vars per
#     workflow-injection hardening guide.

name: secret-scan

on:
  pull_request:
    # `labeled`/`unlabeled` are LOAD-BEARING for the rename-guard +
    # allowlist-diff override paths (#3160, #3323): without them, applying
    # the override label after a failing run would not re-trigger the gate.
    # Per gh community discussion #4679, this is the canonical pattern.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  # Merge queue (#5780). All five required contexts produced here
  # (`gitleaks scan`, `lint fixture content`, `allowlist-diff …`,
  # `rename-guard …`, `waiver discipline …`) MUST report on the
  # gh-readonly-queue/main/* temp ref or the queue entry stalls pending.
  # Two patterns are used per job:
  #   (A) candidate re-scan — for cheap, pure-diff, label-INDEPENDENT jobs.
  #       `scan` + `waiver discipline` re-run against the merge_group base..head
  #       SHAs; `lint fixture content` takes its existing non-PR branch on
  #       merge_group (full-tree `git ls-files` scan — a superset of the diff).
  #       Strictly safer (validates the projected-merge content), no PR-label dep.
  #   (B) trust-the-pre-queue-PR-run — `rename-guard` + `allowlist-diff` post a
  #       pass on merge_group without re-running. Soundness invariant: a PR
  #       cannot ENTER the queue unless all required contexts are green on its
  #       head SHA — GitHub docs: "Once a pull request has passed all required
  #       branch protection checks, a user with write access can add the pull
  #       request to the queue" (Managing a merge queue) — which already proves,
  #       for this PR's content, that
  #       every secret is in an allowlisted path, every rename-into-allowlist
  #       was operator-acked, and every .gitleaks.toml widening was acked. The
  #       merge_group candidate is the SAME PR commits replayed on projected
  #       `main`; the added content is byte-identical. The projected base can
  #       differ from the PR base only by TIGHTENING the allowlist (caught by
  #       the `scan` job, which DOES re-scan the candidate — Pattern A — and
  #       fails closed) or WIDENING it (that widening was a separate PR acked on
  #       its own; it cannot retroactively un-ack this PR's renames). So no
  #       unauthorized projected-merge path exists.
  #       LOAD-BEARING COUPLING: the (B) trust-pass is sound ONLY because the
  #       `scan` job re-runs on merge_group (Pattern A) — that re-scan is the
  #       backstop for an allowlist tightening, and gitleaks structurally
  #       cannot catch rename-laundering itself (that is why `rename-guard`
  #       exists). If `scan` ever stops firing on merge_group, these trust-
  #       passes become unsafe and MUST convert to candidate re-runs. (The
  #       merge_group ref `gh-readonly-queue/main/pr-N-<sha>` does carry the PR
  #       number, so re-deriving the label is feasible — it is simply
  #       unnecessary given the invariant. Mirrors the tenant-integration-
  #       required trust decision; ADR-032 amendment.)
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.24.2"
  # SHA256 for gitleaks_8.24.2_linux_x64.tar.gz (verified against
  # https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_checksums.txt
  # at pin time). To upgrade: fetch new checksum, update both lines.
  GITLEAKS_SHA256: "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"

jobs:
  scan:
    name: gitleaks scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout (full history for diff scans)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned, sha-verified)
        run: |
          set -euo pipefail
          curl -sSLo gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan (PR diff)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1 \
            --log-opts="--no-merges ${BASE_SHA}..${HEAD_SHA}"

      # Pattern (A): re-scan the merge-queue candidate's projected diff.
      # GitHub-controlled SHAs hoisted to env + quoted per injection guidance.
      - name: Scan (merge_group candidate diff)
        if: github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1 \
            --log-opts="--no-merges ${BASE_SHA}..${HEAD_SHA}"

      - name: Scan (full tree, push:main)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1

      - name: Scan (full history, weekly cron)
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          ./gitleaks git --redact --no-banner --exit-code 1

  lint-fixture-content:
    name: lint fixture content
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine staged-equivalent file set (PR diff)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --diff-filter=ACMR --name-only "${BASE_SHA}..${HEAD_SHA}" \
            | grep -E '^(apps/web-platform/test/(fixtures|__synthesized__|__goldens__)/|.*/__goldens__/|.*\.snap$|knowledge-base/project/learnings/.*\.md$)' \
            > /tmp/lint-files.txt || true

      - name: Determine staged-equivalent file set (push / schedule)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git ls-files \
            | grep -E '^(apps/web-platform/test/(fixtures|__synthesized__|__goldens__)/|.*/__goldens__/|.*\.snap$|knowledge-base/project/learnings/.*\.md$)' \
            > /tmp/lint-files.txt || true

      - name: Run linter
        run: |
          set -euo pipefail
          if [[ ! -s /tmp/lint-files.txt ]]; then
            echo "No fixture/golden/snapshot files in scope; skipping."
            exit 0
          fi
          xargs -a /tmp/lint-files.txt node apps/web-platform/scripts/lint-fixture-content.mjs

  # ===========================================================================
  # 4. Waiver-discipline guard. Native gitleaks honors `# gitleaks:allow` on
  #    ANY line in ANY file — our `lint-fixture-content.mjs` requires the
  #    `issue:#NNN <reason>` trailer but is glob-scoped to fixture dirs only.
  #    Without this job, a developer could waive a real `whsec_` / `sk-ant-` /
  #    service-role JWT in a server-path file with bare `# gitleaks:allow`
  #    and gitleaks would honor it. This job greps the WHOLE diff (not just
  #    fixture paths) and rejects any waiver missing the trailer.
  # ===========================================================================
  waiver-discipline:
    name: waiver discipline (issue:#NNN trailer)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Pattern (A): runs on merge_group too (required context — must post or the
    # queue stalls). The trailer lives in the diff CONTENT, not a PR label, so
    # re-scanning the candidate diff is correct and label-independent.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Enforce trailer on every gitleaks:allow waiver
        env:
          # PR event sets pull_request.*; merge_group event sets merge_group.*
          # (the other is empty → `||` selects the populated one). GitHub-
          # controlled SHAs, hoisted to env + quoted per injection guidance.
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          # Collect every line ADDED in this PR that contains a real gitleaks
          # waiver and is missing the issue trailer.
          #
          # Real waivers are TRAILING comments on a line containing a secret:
          #     api_key = "real-token"  # gitleaks:allow # issue:#NNN reason
          # Native gitleaks does NOT honor standalone-comment waivers, prose
          # mentions, or string-literal references — so we exclude:
          #   1. The tooling files themselves (this workflow + linter +
          #      gitleaks config + AGENTS.md + runbook + spec/plan docs)
          #      — they DESCRIBE the waiver convention; they don't host
          #      live waivers, and CODEOWNERS gates any change to them.
          #   2. Pure-comment lines (start with `#` or `//`) — docs/templates.
          #   3. Backtick-wrapped mentions (markdown code spans).
          # Refs: gitleaks GH issue 1019 (waiver semantics), #3121 PR1 review.
          violations=$(git diff --unified=0 "${BASE_SHA}..${HEAD_SHA}" -- \
              ':!.github/workflows/secret-scan.yml' \
              ':!apps/web-platform/scripts/lint-fixture-content.mjs' \
              ':!.gitleaks.toml' \
              ':!AGENTS.md' \
              ':!knowledge-base/**' \
            | grep -E '^\+' \
            | grep -v '^\+\+\+ ' \
            | grep -E '(#|//)\s*gitleaks:allow\b' \
            | grep -vE '^\+\s*(#|//)' \
            | grep -vE '`[^`]*gitleaks:allow' \
            | grep -vE 'issue:#[0-9]+\s+\S{3,}' || true)
          if [[ -n "$violations" ]]; then
            echo "::error::gitleaks:allow waivers MUST include 'issue:#NNN <reason>' trailer (reason >= 3 chars)." >&2
            echo "Offending lines:" >&2
            echo "$violations" >&2
            exit 1
          fi
          echo "OK — all added gitleaks:allow waivers carry an issue trailer."

  # ===========================================================================
  # 5. Rename-laundering guard (#3160). gitleaks v8.24.2 evaluates path
  #    allowlists against the DESTINATION of a `git mv` and does not re-scan
  #    the diff content against the source. A `git mv server/X.ts
  #    test/__synthesized__/Y.ts` slips a real secret past the gate. This job
  #    blocks the rename unless an operator opts in via label or commit
  #    trailer. Logic lives in apps/web-platform/scripts/rename-guard.sh so
  #    the smoke matrix can exercise it directly.
  # ===========================================================================
  rename-guard:
    name: rename-guard (allowlist destinations)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Pattern (B): runs on merge_group too (required context — must post or the
    # queue stalls). The merge_group path trusts the authoritative pre-queue PR
    # run and posts a pass without re-running. Sound ONLY because the `scan` job
    # re-scans the candidate (Pattern A) as the backstop for an allowlist
    # tightening — see the full invariant in the on:.merge_group rationale.
    # Re-running here would also false-fail an already-`secret-scan-allow-rename`-
    # overridden rename, but the safety crux is the `scan` coupling, not the label.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    # Inherits top-level `permissions: contents: read` — no override needed.
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run rename-guard
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: bash apps/web-platform/scripts/rename-guard.sh

      - name: rename-guard (merge_group — trust pre-queue PR run)
        if: github.event_name == 'merge_group'
        run: |
          echo "merge_group candidate — rename-guard ran authoritatively on the PR (incl. any secret-scan-allow-rename label override) before queue eligibility; posting pass. See #5780."

  # ===========================================================================
  # 6. Allowlist-diff gate (#3323). Diffs `paths = [...]` arrays in
  #    .gitleaks.toml between PR base and head. Posts a sticky comment
  #    listing additions; the PR author MUST add the
  #    `secret-scan-allowlist-ack` label OR include an `Allowlist-Widened-By:
  #    <name>` commit trailer for additions. Removals are net-tightening
  #    and pass automatically.
  # ===========================================================================
  allowlist-diff:
    name: allowlist-diff (.gitleaks.toml paths surface)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Pattern (B): runs on merge_group too (required context — must post or the
    # queue stalls). The merge_group path trusts the authoritative pre-queue PR
    # run and posts a pass without re-running. Sound ONLY because the `scan` job
    # re-scans the candidate (Pattern A) as the backstop for an allowlist
    # tightening — see the full invariant in the on:.merge_group rationale. (Its
    # ack LABEL + PR COMMENT are also awkward on merge_group, but the safety crux
    # is the `scan` coupling, not the label.)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read
      pull-requests: write  # required for `gh pr comment` to post the diff comment
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run allowlist-diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash apps/web-platform/scripts/allowlist-diff.sh

      - name: allowlist-diff (merge_group — trust pre-queue PR run)
        if: github.event_name == 'merge_group'
        run: |
          echo "merge_group candidate — allowlist-diff ran authoritatively on the PR (incl. ack label for any .gitleaks.toml widening) before queue eligibility; posting pass. See #5780."

  # Each matrix case runs in an isolated VM (fresh checkout, no shared cache).
  # Do NOT consolidate cases into a single job: fixture paths (e.g.,
  # apps/web-platform/server/smoke/with-secret.ts) collide across cases and
  # would corrupt sequential runs. The `git commit --no-verify` calls below
  # are intentional fixture setup — they bypass lefthook because the *purpose*
  # of these commits is to stage a known-bad repo state for the gate to detect.
  smoke-tests:
    name: smoke (${{ matrix.case }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        case:
          - allowlist-positive
          - allowlist-negative
          - linter-positive
          - linter-waiver
          - rename-laundering
          - rename-guard-fires
          - rename-guard-label-override
          - rename-guard-trailer-override
          - allowlist-diff-fires
          - colocated-lib-test-allowlist
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSLo gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks

      - name: Configure git identity (for staging fixtures)
        run: |
          git config user.email "smoke-tests@example.com"
          git config user.name "secret-scan smoke tests"

      - name: Run case
        env:
          CASE: ${{ matrix.case }}
          # Synthetic Doppler-shape token, SPLIT into prefix + body so the
          # full literal NEVER appears in this committed file. The smoke
          # script concatenates them at runtime in CI memory only — that
          # avoids:
          #   (a) GitHub push-protection blocking the workflow file
          #       (it scans every committed line for the full Doppler shape).
          #   (b) Our own `doppler-token` rule firing on this file when the
          #       PR-diff scanner runs (the rule requires the contiguous
          #       `dp.pt.<40+>` shape; split prefix/body never matches).
          # The concatenated value is staged into separate fixture files
          # (allowlisted vs. not) to prove the path-based allowlist works.
          # Choosing Doppler over JWT because the default `jwt` rule cannot
          # be allowlisted per-path in gitleaks v8.24.2.
          FAKE_DOPPLER_PREFIX: "dp.pt."
          FAKE_DOPPLER_BODY: "SMOKETESTaBCDEFGHijklmnopqrstuvwxyz123456789"
        run: |
          set -euo pipefail
          # Compose the synthetic token at runtime; never a literal in the file.
          FAKE_DOPPLER="${FAKE_DOPPLER_PREFIX}${FAKE_DOPPLER_BODY}"
          case "${CASE}" in
            allowlist-positive)
              mkdir -p apps/web-platform/test/__goldens__/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/test/__goldens__/smoke/fake.snap
              git add apps/web-platform/test/__goldens__/smoke/fake.snap
              ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1
              echo "PASS: allowlisted path didn't trip"
              ;;
            allowlist-negative)
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/leaked.ts
              git add apps/web-platform/server/smoke/leaked.ts
              if ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1; then
                echo "FAIL: gate did NOT fire on un-allowlisted server path" >&2
                exit 1
              fi
              echo "PASS: gate fired on server-path token"
              ;;
            linter-positive)
              mkdir -p apps/web-platform/test/__goldens__/smoke
              echo "user@gmail.com" > apps/web-platform/test/__goldens__/smoke/contains-real-email.txt
              if node apps/web-platform/scripts/lint-fixture-content.mjs apps/web-platform/test/__goldens__/smoke/contains-real-email.txt; then
                echo "FAIL: linter did NOT fire on real email" >&2
                exit 1
              fi
              echo "PASS: linter fired on real email"
              ;;
            linter-waiver)
              mkdir -p apps/web-platform/test/__goldens__/smoke
              echo "user@gmail.com # gitleaks:allow # issue:#3121 documented allowed" \
                > apps/web-platform/test/__goldens__/smoke/with-waiver.txt
              node apps/web-platform/scripts/lint-fixture-content.mjs apps/web-platform/test/__goldens__/smoke/with-waiver.txt
              echo "PASS: valid waiver accepted"
              ;;
            rename-laundering)
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/with-secret.ts
              git add apps/web-platform/server/smoke/with-secret.ts
              git commit -m "fixture: baseline for rename-laundering smoke" --no-verify
              mkdir -p apps/web-platform/test/__synthesized__
              git mv apps/web-platform/server/smoke/with-secret.ts \
                     apps/web-platform/test/__synthesized__/now-allowed.ts
              if ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1; then
                echo "VERDICT: gitleaks v${GITLEAKS_VERSION} ALLOWS the rename (laundered into allowlist path)."
                echo "VERDICT: rename-laundering=allowed" >> "$GITHUB_STEP_SUMMARY"
              else
                # Empirical baseline at v8.24.2 is "allowed" (see #3160 follow-up).
                # A "blocked" verdict means upstream behavior flipped — surface it
                # as a warning so the runbook + #3160 get re-evaluated.
                echo "::warning title=rename-laundering verdict changed::gitleaks v${GITLEAKS_VERSION} now BLOCKS rename-into-allowlist (was 'allowed' at pin time). Re-evaluate #3160 mitigation and update knowledge-base/engineering/operations/secret-scanning.md."
                echo "VERDICT: gitleaks v${GITLEAKS_VERSION} BLOCKS the rename (fail-closed on diff content)."
                echo "VERDICT: rename-laundering=blocked" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            rename-guard-fires)
              # #3160 — script must EXIT 1 on rename-into-allowlist with no override
              # AND emit a ::error:: GitHub annotation (regression in just the
              # exit-code path would otherwise pass silently).
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/with-secret.ts
              git add apps/web-platform/server/smoke/with-secret.ts
              git commit -m "fixture: baseline" --no-verify
              mkdir -p apps/web-platform/test/__synthesized__
              git mv apps/web-platform/server/smoke/with-secret.ts \
                     apps/web-platform/test/__synthesized__/now-allowed.ts
              git commit -m "fixture: rename into allowlist" --no-verify
              SMOKE_OUT=$(mktemp)
              if BASE_SHA=$(git rev-parse HEAD~2) HEAD_SHA=$(git rev-parse HEAD) PR_LABELS='[]' \
                  bash apps/web-platform/scripts/rename-guard.sh >"$SMOKE_OUT" 2>&1; then
                echo "FAIL: rename-guard did NOT fire on rename-into-allowlist" >&2
                cat "$SMOKE_OUT" >&2
                exit 1
              fi
              if ! grep -qF '::error::' "$SMOKE_OUT"; then
                echo "FAIL: rename-guard exited non-zero but emitted no ::error:: annotation" >&2
                cat "$SMOKE_OUT" >&2
                exit 1
              fi
              echo "PASS: rename-guard fired on rename-into-allowlist with ::error:: annotation"
              ;;
            rename-guard-label-override)
              # #3160 — script must EXIT 0 when the override label is present.
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/with-secret.ts
              git add apps/web-platform/server/smoke/with-secret.ts
              git commit -m "fixture: baseline" --no-verify
              mkdir -p apps/web-platform/test/__synthesized__
              git mv apps/web-platform/server/smoke/with-secret.ts \
                     apps/web-platform/test/__synthesized__/now-allowed.ts
              git commit -m "fixture: rename into allowlist" --no-verify
              BASE_SHA=$(git rev-parse HEAD~2) HEAD_SHA=$(git rev-parse HEAD) \
                PR_LABELS='["secret-scan-allow-rename"]' \
                bash apps/web-platform/scripts/rename-guard.sh
              echo "PASS: rename-guard suppressed by label override"
              ;;
            rename-guard-trailer-override)
              # #3160 — script must EXIT 0 when a Rename-Allowed-By trailer is present.
              mkdir -p apps/web-platform/server/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/server/smoke/with-secret.ts
              git add apps/web-platform/server/smoke/with-secret.ts
              git commit -m "fixture: baseline" --no-verify
              mkdir -p apps/web-platform/test/__synthesized__
              git mv apps/web-platform/server/smoke/with-secret.ts \
                     apps/web-platform/test/__synthesized__/now-allowed.ts
              git commit --no-verify -m "$(printf 'fixture: rename into allowlist\n\nRename-Allowed-By: smoke-tests\n')"
              BASE_SHA=$(git rev-parse HEAD~2) HEAD_SHA=$(git rev-parse HEAD) PR_LABELS='[]' \
                bash apps/web-platform/scripts/rename-guard.sh
              echo "PASS: rename-guard suppressed by Rename-Allowed-By trailer"
              ;;
            allowlist-diff-fires)
              # #3323 — script must EXIT 1 when .gitleaks.toml gains an allowlist
              # path with no acknowledgement, AND emit a ::error:: annotation.
              # Smoke runs WITHOUT PR_NUMBER so the gh pr comment step is skipped
              # (smoke mode); the gating logic is what's under test here.
              git commit --allow-empty -m "fixture: baseline before allowlist edit" --no-verify
              # Append a brand-new path to the existing top-level [allowlist] block.
              python3 -c "import re,sys; p='.gitleaks.toml'; s=open(p).read(); s2=re.sub(r\"(\[allowlist\][\s\S]*?paths = \[)\", r\"\1\n  '''smoke/synthetic/path/added\\\\.txt$''',\", s, count=1); assert s != s2, 'smoke setup failed: regex did not match [allowlist] block'; open(p,'w').write(s2)"
              git add .gitleaks.toml
              git commit -m "fixture: widen allowlist for smoke test" --no-verify
              SMOKE_OUT=$(mktemp)
              if BASE_SHA=$(git rev-parse HEAD~1) HEAD_SHA=$(git rev-parse HEAD) PR_LABELS='[]' \
                  bash apps/web-platform/scripts/allowlist-diff.sh >"$SMOKE_OUT" 2>&1; then
                echo "FAIL: allowlist-diff did NOT fire on widening" >&2
                cat "$SMOKE_OUT" >&2
                exit 1
              fi
              if ! grep -qF '::error::' "$SMOKE_OUT"; then
                echo "FAIL: allowlist-diff exited non-zero but emitted no ::error:: annotation" >&2
                cat "$SMOKE_OUT" >&2
                exit 1
              fi
              echo "PASS: allowlist-diff fired on un-acknowledged widening with ::error:: annotation"
              ;;
            colocated-lib-test-allowlist)
              # #4099 — colocated lib/<m>/*.test.ts must allowlist like legacy test/.
              mkdir -p apps/web-platform/lib/safety/smoke
              echo "$FAKE_DOPPLER" > apps/web-platform/lib/safety/smoke/with-secret.test.ts
              git add apps/web-platform/lib/safety/smoke/with-secret.test.ts
              ./gitleaks git --pre-commit --staged --redact --no-banner --exit-code 1
              echo "PASS: colocated lib test path didn't trip"
              ;;
            *)
              echo "Unknown case: ${CASE}" >&2
              exit 1
              ;;
          esac
