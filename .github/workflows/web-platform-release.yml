name: Web Platform Release

on:
  push:
    branches: [main]
    paths: ['apps/web-platform/**']
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      skip_deploy:
        description: "Skip deployment after release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      component: web-platform
      component_display: "Soleur Web Platform"
      path_filter: "apps/web-platform/"
      tag_prefix: "web-v"
      docker_image: "ghcr.io/jikig-ai/soleur-web-platform"
      docker_context: "apps/web-platform"
      vendor_plugin: true
      bump_type: ${{ inputs.bump_type || '' }}
      force_run: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  # Gate the prod cutover (deploy job) on CI's `test` aggregator for THIS
  # commit's SHA. The image still builds in parallel (release job) — only the
  # final deploy waits, so time-to-prod = max(build, CI), not build+CI.
  # Push-only: workflow_dispatch is the operator escape hatch (mirrors
  # skip_deploy) and bypasses this gate by design. See plan
  # knowledge-base/project/plans/2026-06-08-feat-cd-deploy-ci-gate-and-build-cache-plan.md
  await-ci:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read          # commits/<sha>/check-runs API
      actions: read         # actions/workflows/ci.yml/runs API (fast no-CI-run detection)
    timeout-minutes: 20      # hard ceiling > MAX_ATTEMPTS*INTERVAL (15m) > p100 CI (~8m)
    steps:
      - name: Wait for CI test check-run on this SHA
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          MAX_ATTEMPTS: "90"      # 90 * 10s = 900s = 15m. INDEPENDENT window sized to CI p100 (~8m); NOT governed by the deploy job's STATUS/HEALTH/IN_FLIGHT drift assertion.
          INTERVAL_S: "10"
          GRACE_ATTEMPTS: "6"     # 60s grace for a CI run to register before declaring "no CI for this SHA"
        run: |
          set -euo pipefail
          # FAIL-CLOSED. We do NOT trust a [skip ci] token in the commit message
          # as a deploy authorizer — GitHub honors it only on the last line, but a
          # grep over the whole message would match a substring in a PR body and
          # wave a RED CI through. Instead: if NO ci.yml run ever registers for this
          # SHA, fail-CLOSED after a 60s grace; deliberate skip-ci releases use the
          # workflow_dispatch escape hatch. Brand-survival = single-user incident.
          status=missing; conclusion=none
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            # var-based (NOT piped-into-grep) to avoid set -e + pipe fragility;
            # stderr captured so a missing checks:read perm is diagnosable now.
            if ! resp=$(gh api "repos/$REPO/commits/$SHA/check-runs" 2>/tmp/gherr); then
              echo "attempt $attempt: check-runs query failed: $(cat /tmp/gherr) — retrying"
              sleep "$INTERVAL_S"; continue
            fi
            # Most-recent NON-cancelled check-run named exactly "test" (excluding
            # cancelled stops a cancelled re-run shadowing an older green run).
            sel='([.check_runs[]|select(.name=="test" and .conclusion!="cancelled")]|sort_by(.started_at)|last)//{}'
            status=$(jq -r "$sel|.status//\"missing\"" <<<"$resp")
            conclusion=$(jq -r "$sel|.conclusion//\"none\"" <<<"$resp")
            echo "attempt $attempt: test status=$status conclusion=$conclusion"
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI test passed for $SHA — deploy may proceed."
                exit 0
              fi
              echo "::error::CI test concluded '$conclusion' for $SHA — blocking deploy (fail-closed)."
              exit 1
            fi
            # Fast fail-closed: after grace, if ci.yml never triggered for this SHA,
            # block now instead of burning 15m (latency optimization atop the timeout).
            if [ "$status" = "missing" ] && [ "$attempt" -ge "$GRACE_ATTEMPTS" ]; then
              runs=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA" --jq '.total_count' 2>/dev/null || echo "0")
              if [ "$runs" = "0" ]; then
                echo "::error::No ci.yml run for $SHA after grace — CI was skipped or never triggered. Blocking deploy (fail-closed). Use workflow_dispatch to force a release."
                exit 1
              fi
            fi
            sleep "$INTERVAL_S"
          done
          echo "::error::Timed out after $((MAX_ATTEMPTS * INTERVAL_S))s waiting for CI test (last status=$status) — blocking deploy (fail-closed)."
          exit 1

  migrate:
    needs: release
    if: needs.release.outputs.version != '' && (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    runs-on: ubuntu-latest
    # Holds the migrate-web-platform lock (cancel-in-progress: false), so an
    # unbounded hang serializes all releases. Cap above any legitimate apply;
    # DDL is transactional, so a timeout-kill rolls the in-flight migration back.
    timeout-minutes: 30
    concurrency:
      group: migrate-web-platform
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
      - name: Run migrations
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler run -c prd -- bash apps/web-platform/scripts/run-migrations.sh

  verify-migrations:
    # Runs supabase/verify/*.sql sentinels post-apply, then closes any open
    # `follow-through` issue whose body references a verified migration. Keeps
    # migration verification out of the human follow-through loop. See runbook
    # knowledge-base/engineering/operations/runbooks/supabase-migrations.md §3.
    needs: migrate
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    # Hard cap the job: this job holds the `verify-migrations-web-platform`
    # concurrency lock (cancel-in-progress: false), so a wedged step serializes
    # ALL web-platform releases behind it. Without an explicit cap it inherits
    # the 6h GitHub default — the #5559 deploy hung ~3h on `Install psql` and
    # blocked every subsequent release until manually cancelled.
    timeout-minutes: 15
    concurrency:
      group: verify-migrations-web-platform
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
      - name: Install psql
        # Step-level cap + retry so a transient apt mirror/lock stall fails fast
        # (and the job/concurrency lock releases) instead of hanging for hours.
        timeout-minutes: 5
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update -qq && \
               sudo apt-get install -y -qq --no-install-recommends postgresql-client; then
              exit 0
            fi
            echo "apt attempt ${attempt} failed; retrying in 5s" >&2
            sleep 5
          done
          echo "::error::Install psql failed after 3 attempts" >&2
          exit 1
      - name: Run verify files
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler run -c prd -- bash apps/web-platform/scripts/run-verify.sh

      - name: Close follow-through issues for verified migrations
        # Scans open issues labeled `follow-through` for migration filenames
        # that (a) appear in the body AND (b) have a sibling
        # supabase/verify/<filename> committed. Body content is fetched via
        # `gh issue view` into a bash variable and only used as a grep -qF
        # argument (fixed-string, no regex, never eval'd) — safe per
        # workflow-injection guidance.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          verify_files=(apps/web-platform/supabase/verify/*.sql)
          shopt -u nullglob
          if [[ "${#verify_files[@]}" -eq 0 ]]; then
            echo "No verify files — nothing to auto-close."
            exit 0
          fi

          # Build a list of (full_filename, stem) pairs. Match on either:
          # - full filename (e.g. "031_normalize_repo_url.sql") — precise
          # - stem (e.g. "031_normalize_repo_url") — catches issue bodies that
          #   omit the extension. Stem is long and distinctive (NNN_ prefix +
          #   snake_case name), so false-positive risk across unrelated issues
          #   is effectively zero.
          # Bare "NNN" / "031" is NOT matched — too ambiguous (collides with
          # issue numbers, dates, etc.).
          verified_names=()
          verified_stems=()
          for f in "${verify_files[@]}"; do
            full="$(basename "$f")"
            verified_names+=("$full")
            verified_stems+=("${full%.sql}")
          done
          echo "Verified migrations: ${verified_names[*]}"

          issue_numbers=$(gh issue list \
            --label follow-through --state open \
            --limit 200 --json number --jq '.[].number')
          if [[ -z "$issue_numbers" ]]; then
            echo "No open follow-through issues."
            exit 0
          fi

          closed=0
          while IFS= read -r issue_number; do
            [[ -z "$issue_number" ]] && continue
            body=$(gh issue view "$issue_number" --json body --jq .body 2>/dev/null || echo "")
            [[ -z "$body" ]] && continue

            matched=""
            for i in "${!verified_names[@]}"; do
              name="${verified_names[$i]}"
              stem="${verified_stems[$i]}"
              if printf '%s' "$body" | grep -qF -- "$name" \
                 || printf '%s' "$body" | grep -qF -- "$stem"; then
                matched="$name"
                break
              fi
            done
            [[ -z "$matched" ]] && continue

            echo "Issue #$issue_number references verified migration $matched — closing."
            short_sha="${COMMIT_SHA:0:12}"
            {
              echo "## Verified by CI"
              echo
              echo "Migration \`$matched\` passed the sentinel + idempotence probes defined in \`apps/web-platform/supabase/verify/$matched\`."
              echo
              echo "- **Run:** $RUN_URL"
              echo "- **Commit:** $short_sha"
              echo
              echo "Closed automatically by the \`verify-migrations\` job."
            } > /tmp/auto-close-body.md
            gh issue comment "$issue_number" --body-file /tmp/auto-close-body.md
            gh issue close "$issue_number"
            closed=$((closed + 1))
          done <<< "$issue_numbers"

          echo "Auto-closed $closed follow-through issue(s)."

  verify-doppler-secrets:
    # Pre-deploy guard: asserts the hand-maintained list of required NEXT_PUBLIC_*
    # secrets is present in Doppler prd. Closes #2769 (silent Doppler drift that
    # shipped NEXT_PUBLIC_APP_URL=undefined via PR #2767).
    runs-on: ubuntu-latest
    # Holds the verify-secrets-web-platform lock (cancel-in-progress: false);
    # cap so a hung doppler/network call can't serialize releases. This job is a
    # fast secrets-existence check — 10 min is generous headroom.
    timeout-minutes: 10
    concurrency:
      group: verify-secrets-web-platform
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
      - name: Assert required NEXT_PUBLIC_* secrets present in Doppler prd
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler run -c prd -- bash apps/web-platform/scripts/verify-required-secrets.sh

  deploy:
    needs: [release, migrate, verify-migrations, verify-doppler-secrets, await-ci]
    # verify-doppler-secrets must succeed — skipped/failed blocks deploy (unlike
    # migrate which tolerates 'skipped' when no migrations changed).
    # verify-migrations tolerates 'skipped' because it only runs on
    # migrate.result==success; when migrate is itself skipped, verify is
    # skipped too, and deploy should still proceed.
    # await-ci gates the prod cutover on CI's `test` for this SHA: on push it must
    # succeed (fail-closed); on workflow_dispatch it is skipped (push-only job) and
    # tolerated, mirroring the skip_deploy operator escape hatch.
    if: >-
      always() &&
      needs.release.outputs.docker_pushed == 'true' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      (needs.verify-migrations.result == 'success' || needs.verify-migrations.result == 'skipped') &&
      needs.verify-doppler-secrets.result == 'success' &&
      (needs.await-ci.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && needs.await-ci.result == 'skipped')) &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    runs-on: ubuntu-latest
    # Holds the deploy-web-platform lock (cancel-in-progress: false). The job
    # already self-bounds via the STATUS+HEALTH poll loops below (30m + 30m
    # sequential ceiling) plus the image build; this 90m cap is the backstop for
    # a hang BEFORE those loops (e.g. a buildx wedge per post-mortems/
    # v0116-1-buildx-driver-full-repull-deploy-timeout) and MUST stay above the
    # ~65m legitimate ceiling so it never kills a slow-but-healthy deploy.
    timeout-minutes: 90
    concurrency:
      group: deploy-web-platform
      cancel-in-progress: false
    # Job-level poll-window constants. All three windows MUST agree per
    # cq-align-ci-poll-windows-with-adjacent-steps:
    #   STATUS_POLL_MAX_ATTEMPTS * STATUS_POLL_INTERVAL_S  (Verify deploy script completion)
    #     == HEALTH_POLL_MAX_ATTEMPTS * HEALTH_POLL_INTERVAL_S  (Verify deploy health and version)
    #     == IN_FLIGHT_CEILING_S  (Pre-rerun lock probe)
    # The Pre-rerun lock probe step asserts this at runtime, so a future PR
    # that adjusts one constant without the others fails CI rather than
    # silently producing stale-state false positives or premature rerun
    # blocks. See #2205, #2519, #3398, #3408. Sizing rationale + rerun-
    # during-flight unsafety:
    # knowledge-base/project/learnings/best-practices/2026-05-07-deploy-poll-ceiling-must-track-realistic-deploy-window.md
    # Runbook: plugins/soleur/skills/postmerge/references/deploy-status-debugging.md
    # Ceiling raised 900s→1800s (#5061): a build-driver switch or a base-layer
    # bump (claude-code/playwright/node) forces a one-time FULL image re-pull on
    # the prod server, which a 900s ceiling cannot fit — see the v0.116.1 buildx
    # full-repull PIR (post-mortems/v0116-1-buildx-driver-full-repull-deploy-timeout).
    # All four windows move together (asserted at runtime + by ci-deploy-wrapper.test.sh):
    #   STATUS: 360 * 5s = 1800   HEALTH: 180 * 10s = 1800   IN_FLIGHT_CEILING_S: 1800   wrapper: 1800s
    env:
      STATUS_POLL_MAX_ATTEMPTS: 360
      STATUS_POLL_INTERVAL_S: 5
      HEALTH_POLL_MAX_ATTEMPTS: 180
      HEALTH_POLL_INTERVAL_S: 10
      # IN_FLIGHT_CEILING_S MUST equal the wall-clock cap in
      # apps/web-platform/infra/ci-deploy-wrapper.sh (timeout ... 1800s ...)
      # so the server-side hard-kill fires exactly when the workflow gives
      # up polling (#3704). Drift produces either a perpetual "running"
      # state (workflow gives up before kill) or wasted polling cycles
      # (kill fires before workflow times out).
      IN_FLIGHT_CEILING_S: 1800
    steps:
      - name: Pre-rerun lock probe
        # #3408: short-circuit if the prior deploy is still in flight, so a
        # `gh run rerun --failed` doesn't cascade into a flock-rejected POST
        # that masks the original deploy's actual fate. GET-only / read-only;
        # the load-bearing safety net is still ci-deploy.sh's `flock -n`.
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # Drift assertion: fail CI rather than silently let one constant
          # outpace its siblings (the original #3398 recurrence pattern).
          STATUS_WINDOW=$((STATUS_POLL_MAX_ATTEMPTS * STATUS_POLL_INTERVAL_S))
          HEALTH_WINDOW=$((HEALTH_POLL_MAX_ATTEMPTS * HEALTH_POLL_INTERVAL_S))
          if [ "$STATUS_WINDOW" -ne "$IN_FLIGHT_CEILING_S" ] || [ "$HEALTH_WINDOW" -ne "$IN_FLIGHT_CEILING_S" ]; then
            echo "::error::Poll-window drift: STATUS=${STATUS_WINDOW}s HEALTH=${HEALTH_WINDOW}s IN_FLIGHT_CEILING=${IN_FLIGHT_CEILING_S}s — all three must agree."
            exit 1
          fi
          SIGNATURE=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          HTTP_CODE=$(curl -s --max-time 10 \
            -o /tmp/preflight-body \
            -w '%{http_code}' \
            -X GET \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            "https://deploy.soleur.ai/hooks/deploy-status" || echo "000")
          BODY=$(cat /tmp/preflight-body 2>/dev/null || echo "")
          # Degraded-permissive: any non-JSON / empty / HTTP-error response
          # falls through to the deploy step. flock is the load-bearing gate;
          # this probe is a fast-path UX improvement, not a new safety net.
          if [ -z "$BODY" ] || ! echo "$BODY" | jq -e . >/dev/null 2>&1; then
            echo "Pre-rerun probe: non-JSON or empty body (HTTP $HTTP_CODE) — proceeding (degraded-permissive)"
            exit 0
          fi
          PRIOR_EXIT=$(echo "$BODY" | jq -r '.exit_code // -99')
          if [ "$PRIOR_EXIT" != "-1" ]; then
            echo "Pre-rerun probe: no in-flight deploy (exit_code=$PRIOR_EXIT) — proceeding"
            exit 0
          fi
          PRIOR_TAG=$(echo "$BODY" | jq -r '.tag // "?"')
          # Strict-numeric guard on start_ts: distinguish absent/corrupt state
          # from a real "elapsed exceeded ceiling" stale-state read. Without
          # this, a missing field aliases to elapsed≈now and falls through to
          # "proceed (stale)" — masking corrupt-state cases the operator
          # should know about. The 1700000000 floor is the unix epoch for
          # 2023-11-15 (well before this codebase was deployed), so any
          # parseable older value is corrupt-by-construction.
          PRIOR_START=$(echo "$BODY" | jq -r '.start_ts // empty')
          if ! [[ "$PRIOR_START" =~ ^[0-9]+$ ]] || [ "$PRIOR_START" -lt 1700000000 ]; then
            echo "Pre-rerun probe: prior deploy in-flight but start_ts absent/invalid (got '$PRIOR_START') — proceeding (state corrupt; flock will catch concurrent POSTs)"
            exit 0
          fi
          ELAPSED=$(($(date +%s) - PRIOR_START))
          if [ "$ELAPSED" -gt "$IN_FLIGHT_CEILING_S" ]; then
            echo "Pre-rerun probe: prior deploy of $PRIOR_TAG marked running but elapsed=${ELAPSED}s exceeds ${IN_FLIGHT_CEILING_S}s ceiling — proceeding (state likely stale)"
            exit 0
          fi
          echo "::error::Prior deploy of $PRIOR_TAG still running (elapsed=${ELAPSED}s). Wait for completion or cancel manually before re-running."
          exit 1

      - name: Deploy via webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          PAYLOAD=$(printf '{"command":"deploy web-platform ghcr.io/jikig-ai/soleur-web-platform v%s"}' "$VERSION")
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -d "$PAYLOAD" \
            "https://deploy.soleur.ai/hooks/deploy")
          if [[ "$HTTP_CODE" != "202" ]]; then
            echo "::error::Deploy webhook rejected (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deploy initiated (HTTP 202), polling health endpoint..."

      - name: Verify deploy script completion
        # STATUS_POLL_MAX_ATTEMPTS / STATUS_POLL_INTERVAL_S inherited from
        # job-level env (see top of `deploy:` job for the alignment rationale).
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # /hooks/deploy-status is GET (read-only, idempotent). adnanh/webhook's
          # payload-hmac-sha256 rule verifies the signature over the request body;
          # for GET the body is empty, so we sign the empty string (#2204).
          SIGNATURE=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          for i in $(seq 1 "$STATUS_POLL_MAX_ATTEMPTS"); do
            # Capture HTTP code alongside body for easier triage (#2205).
            HTTP_CODE=$(curl -s --max-time 10 \
              -o /tmp/status-body \
              -w '%{http_code}' \
              -X GET \
              -H "X-Signature-256: sha256=$SIGNATURE" \
              -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
              -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
              "https://deploy.soleur.ai/hooks/deploy-status" || echo "000")
            BODY=$(cat /tmp/status-body 2>/dev/null || echo "")
            if [ -z "$BODY" ]; then
              echo "Attempt $i/$STATUS_POLL_MAX_ATTEMPTS: HTTP $HTTP_CODE, empty body (endpoint not ready)"
              sleep "$STATUS_POLL_INTERVAL_S"
              continue
            fi
            # Tolerate non-JSON bodies (endpoint cold-start, 404 HTML, transient
            # Cloudflare edge error). Without this guard, jq's parse error under
            # bash -e kills the step before the retry loop can react (#2214).
            if ! echo "$BODY" | jq -e . >/dev/null 2>&1; then
              echo "Attempt $i/$STATUS_POLL_MAX_ATTEMPTS: HTTP $HTTP_CODE, non-JSON body (endpoint not ready)"
              sleep "$STATUS_POLL_INTERVAL_S"
              continue
            fi
            EXIT_CODE=$(echo "$BODY" | jq -r '.exit_code // -99')
            REASON=$(echo "$BODY" | jq -r '.reason // "unknown"')
            TAG=$(echo "$BODY" | jq -r '.tag // ""')
            case "$EXIT_CODE" in
              0)
                if [ "$TAG" = "v$VERSION" ]; then
                  echo "ci-deploy.sh completed successfully for v$VERSION"
                  exit 0
                fi
                echo "Attempt $i/$STATUS_POLL_MAX_ATTEMPTS: last deploy was for $TAG (want v$VERSION)"
                ;;
              -1)
                # Elapsed-since-running annotation (#3398): surfaces ceiling drift in the log.
                STARTED=$(echo "$BODY" | jq -r '.start_ts // 0')
                ELAPSED=$(($(date +%s) - STARTED))
                echo "Attempt $i/$STATUS_POLL_MAX_ATTEMPTS: ci-deploy.sh still running (reason=$REASON, elapsed=${ELAPSED}s)"
                ;;
              -2)
                echo "Attempt $i/$STATUS_POLL_MAX_ATTEMPTS: no prior deploy recorded"
                ;;
              -3)
                # Transient read during ci-deploy.sh mv of state file (#2205).
                # Retry — the next poll should see the atomic post-mv state.
                echo "Attempt $i/$STATUS_POLL_MAX_ATTEMPTS: corrupt state read (reason=$REASON), retrying"
                ;;
              *)
                echo "::error::ci-deploy.sh exited $EXIT_CODE (reason=$REASON, tag=$TAG)"
                echo "$BODY" | jq .
                exit 1
                ;;
            esac
            sleep "$STATUS_POLL_INTERVAL_S"
          done
          echo "::error::ci-deploy.sh did not report completion for v$VERSION within $((STATUS_POLL_MAX_ATTEMPTS * STATUS_POLL_INTERVAL_S))s"
          exit 1

      - name: Verify deploy health and version
        # HEALTH_POLL_MAX_ATTEMPTS / HEALTH_POLL_INTERVAL_S inherited from
        # job-level env (see top of `deploy:` job for the alignment rationale).
        env:
          VERSION: ${{ needs.release.outputs.version }}
          # #3409: assert the running image was built from this workflow's
          # commit SHA. Defense-in-depth against a bad tag→image association
          # (right semver, wrong source tree). github.sha is the same SHA the
          # docker-build step at reusable-release.yml tagged the image with.
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for i in $(seq 1 "$HEALTH_POLL_MAX_ATTEMPTS"); do
            HEALTH=$(curl -sf "https://app.soleur.ai/health" 2>/dev/null || echo "")
            if [ -z "$HEALTH" ]; then
              echo "Attempt $i/$HEALTH_POLL_MAX_ATTEMPTS: health endpoint unreachable"
            else
              # Tolerate non-JSON 200-OK bodies (e.g., Cloudflare edge HTML served over a
              # healthy upstream). Without this guard, jq's parse error under bash -e kills
              # the step before the retry loop can react (#2214, #2236).
              # AGENTS.md: cq-ci-steps-polling-json-endpoints-under.
              # Mirrors the twin guard in the "Verify deploy script completion" step above.
              if ! echo "$HEALTH" | jq -e . >/dev/null 2>&1; then
                echo "Attempt $i/$HEALTH_POLL_MAX_ATTEMPTS: non-JSON body from /health, retrying"
                sleep "$HEALTH_POLL_INTERVAL_S"
                continue
              fi
              STATUS=$(echo "$HEALTH" | jq -r '.status // empty')
              if [ "$STATUS" = "ok" ]; then
                DEPLOYED_VERSION=$(echo "$HEALTH" | jq -r '.version // empty')
                if [ "$DEPLOYED_VERSION" = "$VERSION" ]; then
                  SUPABASE_STATUS=$(echo "$HEALTH" | jq -r '.supabase // empty')
                  if [ "$SUPABASE_STATUS" != "connected" ]; then
                    echo "Attempt $i/$HEALTH_POLL_MAX_ATTEMPTS: version $VERSION deployed but supabase not connected (status=${SUPABASE_STATUS:-missing})"
                  else
                    # #3409 build_sha gate. Three outcomes:
                    #   missing/dev → mid-swap (old image still answering LB), retry
                    #   mismatch → bad-tag→image association, fail-fast (non-retryable)
                    #   match → deploy verified
                    DEPLOYED_SHA=$(echo "$HEALTH" | jq -r '.build_sha // empty')
                    if [ -z "$DEPLOYED_SHA" ] || [ "$DEPLOYED_SHA" = "dev" ]; then
                      echo "Attempt $i/$HEALTH_POLL_MAX_ATTEMPTS: version $VERSION + supabase ok, but build_sha is missing/dev — possibly mid-swap, retrying"
                    elif [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
                      echo "::error::version=$VERSION supabase=connected but build_sha=$DEPLOYED_SHA (expected $EXPECTED_SHA) — wrong image tagged with right version"
                      exit 1
                    else
                      echo "Deploy verified: version $VERSION running, supabase connected, build_sha=$DEPLOYED_SHA"
                      echo "$HEALTH" | jq .
                      exit 0
                    fi
                  fi
                else
                  UPTIME=$(echo "$HEALTH" | jq -r '.uptime // "unknown"')
                  echo "Attempt $i/$HEALTH_POLL_MAX_ATTEMPTS: version mismatch (expected=$VERSION got=$DEPLOYED_VERSION uptime=${UPTIME}s)"
                fi
              else
                echo "Attempt $i/$HEALTH_POLL_MAX_ATTEMPTS: health status=$STATUS"
                echo "$HEALTH" | jq . 2>/dev/null || echo "$HEALTH"
              fi
            fi
            sleep "$HEALTH_POLL_INTERVAL_S"
          done
          echo "::error::Deploy verification failed after $((HEALTH_POLL_MAX_ATTEMPTS * HEALTH_POLL_INTERVAL_S))s — expected version $VERSION with supabase connected"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Report-only live-verify gate (#5487 — item 3 of the #5463 prereq chain).
  # Runs the post-deploy harness (apps/web-platform/scripts/live-verify/run.ts)
  # on a deterministic, host-isolated ubuntu-latest runner AFTER the deploy job's
  # "Verify deploy health and version" step (ordered via `needs: [deploy]`).
  #
  # REPORT-ONLY by TWO independent mechanisms (wg-dark-launch-deploy-gates):
  #   (1) TOPOLOGY — NO job lists `live-verify` in its `needs:`, so a job-level
  #       failure can NEVER gate, block, or roll back the deploy or "done".
  #   (2) STEP-LEVEL — the harness step carries `continue-on-error: true`.
  # Either alone suffices; both are kept so removing one later still leaves the
  # gate report-only. The report-only→blocking flip is #5463, gated on observing
  # >=1 real green PASS Sentry event (tag gate=live-verify) from this job.
  #
  # Substrate = GitHub Actions, NOT Inngest (CTO ruling 2026-06-17; ADR-064
  # §Substrate "Inngest re-home considered and rejected"): a blocking deploy-gate
  # needs a deterministic, synchronous, host-isolated exit-code signal.
  live-verify:
    needs: [deploy]
    if: always() && needs.deploy.result == 'success' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # The trigger-paths gate runs FIRST (it needs only `gh` + the committed
      # trigger-paths.txt). The bun/doppler/playwright setup + harness below are
      # gated on `triggered == '1'`, so a SKIP release (most merges — no
      # realtime/WS/auth/DOM-timing surface changed) never pays the ~10min
      # `playwright install --with-deps chromium`, and a triggering release does
      # not let that install compete with the harness for the 15-min budget (#5497).
      - name: Changed-file trigger gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          # GH compare API (NOT `git diff`): actions/checkout is fetch-depth:1, so
          # `before..sha` errors on the zero-SHA / shallow graph. compare needs no
          # local history. A compare failure is CANT-RUN, never a silent SKIP.
          if ! files=$(gh api "repos/${REPO}/compare/${BEFORE_SHA}...${AFTER_SHA}" --jq '.files[].filename' 2>/tmp/gate.err); then
            echo "::warning::live-verify trigger-gate compare API failed: $(tr '\n' ' ' </tmp/gate.err)"
            {
              echo "triggered=0"
              echo "gate_failed=1"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          patterns=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' \
            apps/web-platform/scripts/live-verify/trigger-paths.txt)
          if printf '%s\n' "$files" | grep -qE -f <(printf '%s\n' "$patterns"); then
            triggered=1
          else
            triggered=0
          fi
          {
            echo "triggered=$triggered"
            echo "gate_failed=0"
          } >> "$GITHUB_OUTPUT"
      - name: Install Doppler CLI
        if: steps.gate.outputs.triggered == '1'
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
      - name: Install bun
        if: steps.gate.outputs.triggered == '1'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
      - name: Install web-platform deps
        if: steps.gate.outputs.triggered == '1'
        working-directory: apps/web-platform
        run: bun install --frozen-lockfile
      - name: Install Playwright chromium (+ OS deps)
        if: steps.gate.outputs.triggered == '1'
        working-directory: apps/web-platform
        # Use the @playwright/test version bun just installed (package.json pins
        # 1.58.2). --with-deps installs the OS shared libs ubuntu-latest lacks; a
        # bare install would leave chromium.launch() failing on missing libs
        # (spurious CANT-RUN). The harness's optional system-browser override
        # env vars are deliberately left unset here so run.ts uses the bundled
        # chromium that ubuntu-latest installs cleanly.
        run: npx playwright install --with-deps chromium
      - name: Run live-verify harness (report-only)
        id: harness
        if: steps.gate.outputs.triggered == '1'
        continue-on-error: true
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          # `set +e` so a non-zero harness exit (run.ts exits 1 on FAIL/CANT-RUN)
          # cannot abort the step before the RESULT extraction + $GITHUB_OUTPUT
          # write. "Failure cannot fail the job" (topology + continue-on-error) is
          # a DISTINCT invariant from "failure still produces a recording" (this).
          set +e
          cd apps/web-platform
          # Redact the harness's merged stdout+stderr BEFORE it reaches the run
          # log / the extracted tail (#5487 review, user-impact FINDING 3): a raw
          # `2>&1 | tee` writes an unhandled Playwright/bun/doppler stderr stack —
          # which could embed a captured secret — verbatim into the Actions run
          # log (visible to any Actions-read principal). redact-stdin.ts is
          # idempotent on run.ts's own already-redacted RESULT line.
          doppler run -c prd -- bun run scripts/live-verify/run.ts 2>&1 \
            | bun run scripts/live-verify/redact-stdin.ts \
            | tee /tmp/live-verify.out
          rc=${PIPESTATUS[0]}   # bun's exit code (first pipe stage), NOT redact/tee
          set -e
          RESULT_LINE=$(grep -E '^RESULT: ' /tmp/live-verify.out | tail -1)
          if [ -z "$RESULT_LINE" ]; then
            # Harness crashed before emitting its own redacted RESULT line. The raw
            # tail may carry live secrets → scrub through the redact module before
            # embedding. Distinct failure classes (Doppler-auth, OOM, chromium
            # hard-crash) collapse to empty stdout, so embed the exit code to keep
            # them distinguishable.
            TAIL=$(tail -8 /tmp/live-verify.out \
              | bun run scripts/live-verify/redact-stdin.ts 2>/dev/null | tr '\n' ' ')
            RESULT_LINE="RESULT: CANT-RUN:no-result-line:exit=${rc} — ${TAIL}"
          fi
          {
            echo "rc=${rc}"
            echo "result_line<<__LV_EOF__"
            echo "${RESULT_LINE}"
            echo "__LV_EOF__"
          } >> "$GITHUB_OUTPUT"
      - name: Emit result to Sentry (report-only observability)
        if: always()
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          TRIGGERED: ${{ steps.gate.outputs.triggered }}
          GATE_FAILED: ${{ steps.gate.outputs.gate_failed }}
          RESULT_LINE: ${{ steps.harness.outputs.result_line }}
          HARNESS_OUTCOME: ${{ steps.harness.outcome }}
          RC: ${{ steps.harness.outputs.rc }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          # Compose the tri-state result + Sentry level. Order matters: setup
          # failure (gate never ran) → CANT-RUN; gate-diff failure → CANT-RUN;
          # no triggering paths → SKIPPED; harness ran → PASS/FAIL/CANT-RUN.
          # Every job run emits EXACTLY ONE queryable event (the #5463 soak needs
          # a denominator — "ran and skipped" must be distinguishable from "never
          # ran").
          if [ -z "${TRIGGERED:-}" ] && [ -z "${GATE_FAILED:-}" ]; then
            RESULT="CANT-RUN:setup-failed"; LEVEL="error"
            MSG="RESULT: ${RESULT} (job setup failed before the trigger gate)"
          elif [ "${GATE_FAILED:-0}" = "1" ]; then
            RESULT="CANT-RUN:gate-diff-failed"; LEVEL="error"
            MSG="RESULT: ${RESULT} (changed-file compare API failed)"
          elif [ "${TRIGGERED:-0}" = "0" ]; then
            RESULT="SKIPPED"; LEVEL="info"
            MSG="RESULT: SKIPPED:no-triggering-paths"
          elif [ -z "${RESULT_LINE:-}" ]; then
            RESULT="CANT-RUN:no-result-line"; LEVEL="error"
            MSG="RESULT: ${RESULT}:outcome=${HARNESS_OUTCOME:-unknown}:exit=${RC:-unknown}"
          else
            MSG="${RESULT_LINE}"
            case "${RESULT_LINE}" in
              "RESULT: PASS"*) RESULT="PASS"; LEVEL="info" ;;
              "RESULT: FAIL"*) RESULT="FAIL"; LEVEL="error" ;;
              *no-result-line*|*gate-diff-failed*) RESULT="CANT-RUN"; LEVEL="error" ;;
              "RESULT: CANT-RUN"*) RESULT="CANT-RUN"; LEVEL="warning" ;;
              *) RESULT="CANT-RUN"; LEVEL="warning" ;;
            esac
          fi
          echo "live-verify: result=${RESULT} level=${LEVEL}" >> "$GITHUB_STEP_SUMMARY"
          # Parse the public client DSN: https://<public_key>@<host>/<project_id>.
          # The POST host MUST carry the DSN's own region segment
          # (…ingest.<region>.sentry.io) — never default to a cluster, or the
          # event silently 4xx's into the wrong region.
          DSN="${NEXT_PUBLIC_SENTRY_DSN:-}"
          if [ -z "$DSN" ]; then
            echo "::error::live-verify: NEXT_PUBLIC_SENTRY_DSN unset — ${RESULT} event NOT emitted"
            echo "live-verify: Sentry DSN unset — event NOT emitted (result=${RESULT})" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          PUBLIC_KEY=$(printf '%s' "$DSN" | sed -E 's#^https?://([^@:]+)(:[^@]*)?@.*#\1#')
          HOST=$(printf '%s' "$DSN" | sed -E 's#^https?://[^@]+@([^/]+)/.*#\1#')
          PROJECT_ID=$(printf '%s' "$DSN" | sed -E 's#.*/([0-9]+)/?$#\1#')
          if [ -z "$PUBLIC_KEY" ] || [ -z "$HOST" ] || [ -z "$PROJECT_ID" ]; then
            echo "::error::live-verify: could not parse NEXT_PUBLIC_SENTRY_DSN — ${RESULT} event NOT emitted"
            echo "live-verify: Sentry DSN unparseable — event NOT emitted (result=${RESULT})" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          STORE_URL="https://${HOST}/api/${PROJECT_ID}/store/"
          PAYLOAD=$(jq -nc --arg msg "$MSG" --arg level "$LEVEL" --arg result "$RESULT" \
            --arg sha "${GITHUB_SHA:-}" \
            '{message:$msg, level:$level, platform:"other",
              tags:{gate:"live-verify", component:"web-platform", result:$result},
              extra:{sha:$sha}}')
          ok=0; code="000"
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
              -X POST "$STORE_URL" \
              -H "Content-Type: application/json" \
              -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_client=live-verify-gha/1.0, sentry_key=${PUBLIC_KEY}" \
              --data "$PAYLOAD" 2>/dev/null || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "202" ]; then ok=1; break; fi
            echo "live-verify: Sentry POST attempt ${attempt} → HTTP ${code}"
            sleep 3
          done
          if [ "$ok" != "1" ]; then
            echo "::error::live-verify: Sentry event POST failed after 3 attempts (last HTTP ${code}) for result=${RESULT}"
            echo "live-verify: Sentry POST FAILED (result=${RESULT}, last HTTP ${code}) — observability degraded, deploy NOT affected" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "live-verify: Sentry event emitted (result=${RESULT}, level=${LEVEL})" >> "$GITHUB_STEP_SUMMARY"
          fi
