name: fix-constraints-stage-a

# Stage A — UNTRUSTED producer of the two-stage constraint-gate recovery (ADR-074, #5814).
# Dogfood copy of references/fix-constraints-stage-a.template (sed __TARGET_DIR__ ->
# apps/web-platform). Runs on `pull_request` — NOT the privileged issue_comment /
# pull-request-target trigger — holds NO write token, and treats running PR-head code as
# the EXPECTED, safe thing (`pull_request` is CodeQL's designated untrusted context). If the
# L1 constraint-gate is red on a same-repo PR, it dispatches the agent to FIX it (fix-only —
# never grows the suppression baseline), re-verifies the gate is green, and uploads the fix
# as a full-post-image-contents artifact (per-file sha256 + meta.json) for the privileged
# Stage B (fix-constraints-stage-b, workflow_run) to apply. No commit, no push, no repo-write
# scope here.
#
# SECURITY: `permissions: contents: read` ONLY. The write capability lives exclusively in
# Stage B, which never executes this untrusted tree (Git Data API, no checkout/no apply). The
# name: field above is load-bearing — Stage B's `on: workflow_run: workflows:` matches it by
# NAME, not by filename; a rename here silently stops recovery. Manual retry: re-run this
# workflow (workflow_dispatch) or push a commit to the PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/web-platform/app/**'
      - 'apps/web-platform/components/**'
      - 'apps/web-platform/server/**'
      - 'apps/web-platform/.dependency-cruiser.cjs'
      - 'apps/web-platform/.dependency-cruiser-known-violations.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One agent dispatch per head SHA — a push-storm on one PR can't fan out N paid runs.
  group: fix-constraints-a-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  produce:
    # Loop guard: Stage B opens `soleur/fix-constraints/<pr>` follow-up PRs; those must never
    # re-dispatch Stage A (github.head_ref is empty on workflow_dispatch → guard passes).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.head_ref, 'soleur/fix-constraints/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout the PR head (immutable SHA)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # pull_request checks out the ephemeral merge ref by default; pin to the immutable
          # head SHA so the tree the gate runs on == the tree Stage B attests via head_sha.
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Anthropic preflight
        id: preflight
        # EXITS 1 (red) when ANTHROPIC_API_KEY is absent (e.g. fork PRs get no secrets);
        # continue-on-error so a keyless run skips the agent instead of failing the job.
        continue-on-error: true
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Setup Bun                          # the gate's depcruise binary lives in node_modules
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies (no postinstall scripts over untrusted PR code)
        working-directory: apps/web-platform
        # --ignore-scripts kills the postinstall ACE vector on fork-controlled package.json.
        # (It does NOT stop the gate's own .dependency-cruiser.cjs from running — that is the
        # accepted Stage-A residual, bounded by the capped/rotatable key + no write token.)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run the constraint-gate (capture rc)
        id: gate
        run: |
          set +e
          bash apps/web-platform/scripts/constraint-gates.sh
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Dispatch agent to fix the gate (fix-only)
        if: steps.gate.outputs.rc != '0' && steps.preflight.outputs.ok == 'true'
        id: agent
        uses: anthropics/claude-code-action@5aa6f47e977fec3321f32c06d8076b1f503f832c # v1.0.161
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Model pin + action SHA mirror claude-code-review.yml verbatim (CI-validated).
          # Pin freshness is model-launch-review's job — do NOT substitute a model id from memory.
          claude_args: '--model claude-sonnet-5 --max-turns 20 --allowedTools Bash,Read,Write,Edit,Glob,Grep'
          prompt: |
            A constraint-gate tripped on this PR. Run `apps/web-platform/scripts/constraint-gates.sh`,
            read the failure, and FIX the offending import so a client ("use client") module no longer
            value-imports the server-only tree (server/**). Make file edits ONLY under
            apps/web-platform/{app,components,server}.
            You are FIX-ONLY: do NOT run the constraint-scaffold generator, do NOT pass
            --refresh-baseline, and do NOT edit .dependency-cruiser-known-violations.json — growing
            the suppression baseline would whitelist a real client->server-secret leak and is a
            maintainer-only local action, never an auto-recovery path.
            If the failure is not a real leak you can fix with an import change, make NO edits.
            Do NOT commit or push — the workflow owns delivery.

      - name: Capture API spend
        if: steps.agent.outputs.execution_file != ''
        continue-on-error: true
        env:
          SOLEUR_RUN_ID: ${{ github.run_id }}
          SOLEUR_SHA: ${{ github.event.pull_request.head.sha }}
          SOLEUR_WORKFLOW: fix-constraints-stage-a.yml
          EXEC_FILE: ${{ steps.agent.outputs.execution_file }}
        run: |
          set -uo pipefail
          mkdir -p /tmp/api-spend
          out="/tmp/api-spend/api-spend-${SOLEUR_RUN_ID}.json"
          bash scripts/extract-api-spend.sh "$EXEC_FILE" > "$out" \
            || { echo "::warning::api-spend capture failed (non-fatal)"; rm -f "$out"; exit 0; }

      - name: Upload API spend artifact
        if: steps.agent.outputs.execution_file != '' && hashFiles(format('/tmp/api-spend/api-spend-{0}.json', github.run_id)) != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-spend-${{ github.run_id }}
          path: /tmp/api-spend/api-spend-${{ github.run_id }}.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Re-run the gate to VERIFY the fix
        # Assert the invariant — never trust "agent exited 0" (it exits 0 even on give-up).
        if: steps.agent.outcome == 'success'
        id: verify
        run: |
          set +e
          bash apps/web-platform/scripts/constraint-gates.sh
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          # `git status --porcelain` (not `git diff`) so a fix that CREATES a new in-scope
          # file (untracked) counts as changed — `git diff` ignores untracked files.
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build recovery artifact (full post-image contents + per-file sha256 + meta.json)
        # Only when the agent produced a real, verified-green change. FIX-ONLY + in-scope:
        # any changed path outside apps/web-platform/{app,components,server} (incl. the baseline
        # JSON, constraint-gates.sh, .github/**, *.cjs) ABORTS the artifact — baseline growth is
        # maintainer-only; auto-recovery never ships an out-of-scope edit.
        if: steps.verify.outputs.rc == '0' && steps.verify.outputs.changed == 'true'
        id: artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/fix-constraints-patch"
          rm -rf "$staging"; mkdir -p "$staging/files"
          # Stage ALL agent changes (tracked edits AND new untracked in-scope files; git add
          # respects .gitignore so node_modules etc. are excluded), then enumerate them
          # NUL-delimited so any filename survives. Out-of-scope edits are still enumerated
          # here so the allowlist below can ABORT on them (never silently ship a partial fix).
          git add -A
          mapfile -d '' changed < <(git diff --cached --name-only -z)
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "::notice::no changed files — nothing to deliver"; exit 0
          fi
          # Positive-charset, end-anchored allowlist + explicit absolute/`..` reject (matches
          # Stage B's validator; defense-in-depth so the producer's scope boundary does not rely
          # on a git-diff normalization invariant).
          allow_re='^apps/web-platform/(app|components|server)/[A-Za-z0-9._/-]+$'
          files_json='[]'
          for f in "${changed[@]}"; do
            if [[ "$f" == /* ]] || [[ "$f" == *".."* ]] || [[ ! "$f" =~ $allow_re ]]; then
              echo "::error::agent edited an out-of-scope path (${f}) — auto-recovery is fix-only and in-scope-only; no artifact produced. A maintainer must review."
              # Record the give-up reason so the marker step (below) can tell Stage B to comment.
              echo "giveup_reason=edited an out-of-scope path" >> "$GITHUB_OUTPUT"
              exit 0   # no recovery artifact => a give-up marker is produced instead
            fi
            dest="$staging/files/$f"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
            sha="$(sha256sum "$f" | awk '{print $1}')"
            files_json="$(jq -c --arg p "$f" --arg s "$sha" '. + [{path:$p, sha256:$s}]' <<<"$files_json")"
          done
          jq -n --arg pr "$PR_NUMBER" --arg sha "$HEAD_SHA" --arg ref "$HEAD_REF" \
                --argjson files "$files_json" \
            '{pr_number: ($pr|tonumber), head_sha: $sha, head_ref: $ref, files: $files, touches_baseline: false}' \
            > "$staging/meta.json"
          echo "dir=${staging}" >> "$GITHUB_OUTPUT"
          echo "produced=true" >> "$GITHUB_OUTPUT"

      - name: Upload recovery artifact
        if: steps.artifact.outputs.produced == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fix-constraints-patch-${{ github.event.pull_request.number }}
          path: ${{ steps.artifact.outputs.dir }}
          retention-days: 1
          if-no-files-found: error

      - name: Build give-up marker (red gate, no in-scope fix delivered)
        # The gate was RED but no recovery artifact was produced (no key, agent didn't run,
        # made no edits, still red after the fix, or greened via an out-of-scope path). Emit a
        # tiny marker so the privileged Stage B can post ONE "maintainer needed" comment on the
        # PR — the founder is NEVER left silently deadlocked (plan AC: no terminal state is
        # silent). No marker when the gate was already green (nothing tripped → no comment).
        if: steps.gate.outputs.rc != '0' && steps.artifact.outputs.produced != 'true'
        id: giveup
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PREFLIGHT_OK: ${{ steps.preflight.outputs.ok }}
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          VERIFY_RC: ${{ steps.verify.outputs.rc }}
          ARTIFACT_REASON: ${{ steps.artifact.outputs.giveup_reason }}
        run: |
          set -euo pipefail
          if [ "${PREFLIGHT_OK}" != 'true' ]; then
            reason="the fix agent could not run (API key unavailable or a fork PR)"
          elif [ -n "${ARTIFACT_REASON}" ]; then
            reason="${ARTIFACT_REASON}"
          elif [ "${AGENT_OUTCOME}" != 'success' ]; then
            reason="the fix agent did not complete"
          elif [ "${VERIFY_RC}" != '0' ]; then
            reason="the gate was still red after the agent's attempt"
          else
            reason="the agent made no edits — this gate may not be auto-fixable"
          fi
          staging="${RUNNER_TEMP}/fix-constraints-giveup"
          rm -rf "$staging"; mkdir -p "$staging"
          jq -n --arg pr "$PR_NUMBER" --arg sha "$HEAD_SHA" --arg r "$reason" \
            '{pr_number: ($pr|tonumber), head_sha: $sha, reason: $r}' > "$staging/meta.json"
          echo "dir=${staging}" >> "$GITHUB_OUTPUT"
          echo "produced=true" >> "$GITHUB_OUTPUT"

      - name: Upload give-up marker
        if: steps.giveup.outputs.produced == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fix-constraints-giveup-${{ github.event.pull_request.number }}
          path: ${{ steps.giveup.outputs.dir }}
          retention-days: 1
          if-no-files-found: error
