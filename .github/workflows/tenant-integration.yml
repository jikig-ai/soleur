# .github/workflows/tenant-integration.yml
#
# Runs apps/web-platform/test/server/*.tenant-isolation.test.ts under
# TENANT_INTEGRATION_TEST=1 with dev-Supabase secrets resolved via Doppler.
# Closes the silent-skip trap that lets vitest report green for tenant-
# isolation tests when the gate env var is unset (the default in ci.yml's
# test-webplat job). Unblocks PR-D #3883 which adds new Storage deny
# tests under the same describe.skipIf gate.
#
# Security: DOPPLER_TOKEN_DEV_SCHEDULED is scoped to the dev_scheduled
# Doppler config. A runtime assertion confirms the config resolves to
# environment=dev before any Supabase secret is touched, per
# hr-dev-prd-distinct-supabase-projects. No untrusted github.event.*
# inputs are interpolated in any run: block; only secrets.*, runner.os,
# github.ref (concurrency group only), and hashFiles() are referenced.
#
# Triggers (#5585): the workflow ALWAYS triggers on push-to-main + every PR
# (no workflow-level `paths:` filter). Path detection moved into the
# `detect-changes` job so the always-run `tenant-integration-required` gate
# job reports a required-check context on EVERY PR — a path-filtered workflow
# never reports a context for filtered-out PRs, which would leave a required
# check "Expected — Waiting" forever. The rate-budget invariant is preserved:
# the heavy `tenant-integration` job is gated on detect-changes.outputs.tenant,
# so the Doppler/dev-Supabase work still runs only on the ~5% of PRs that touch
# the isolation surface. Mirrors ci.yml's detect-changes + `test` aggregator.
#
# Refs: #3869 item 6, #3244 (umbrella), #3883 (PR-D), #5585 (required-check shim).

name: Tenant integration (dev-Supabase)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  # cancel-in-progress: false (intentional, #5585 R3): a superseded run
  # cancelled mid-flight would conclude `cancelled` and fail the gate on the
  # head SHA until a re-run; keeping false avoids that edge at the cost of a
  # second full suite on rapid pushes to an isolation-touching PR (rare).
  group: tenant-integration-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # detect-changes: decides whether the heavy suite runs (#5585). Cheap —
  # one checkout + one git diff, NO Doppler/dev-Supabase access. Mirrors
  # ci.yml's detect-changes (single boolean output). BASE_REF is only set on
  # pull_request; non-PR events (push to main / workflow_dispatch) short-circuit
  # to tenant=true (main is the source of truth). BASE_REF is passed via env: +
  # quoted "$BASE_REF" per workflow-injection guidance.
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tenant: ${{ steps.filter.outputs.tenant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            # push to main / workflow_dispatch: always run (main is source of truth).
            printf 'tenant=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A git/checkout error (missing origin/$BASE_REF, etc.) must FAIL the
          # job — never silently emit tenant=false. The gate job treats a
          # detect-changes failure as fail-closed (see tenant-integration-required).
          if ! CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD"); then
            echo "::error::git diff against origin/${BASE_REF} failed; failing detect-changes closed." >&2
            exit 1
          fi
          # Anchors must cover the ISOLATION SURFACE the suite verifies, not just
          # the former on.paths (#5585 review, user-impact P1): the suite imports
          # @/lib/supabase/tenant and exercises the RLS-bypassing service-role
          # client (lib/supabase/service.ts), so lib/supabase/ + middleware.ts
          # (per-request tenant scoping) + test/helpers/ (shared isolation
          # fixtures) are part of the surface — a regression there must run the
          # suite, not skip to an authoritative GREEN. Anti-bypass: the workflow
          # file AND the extracted verdict script are anchored (gate logic now
          # lives in both), mirroring ci.yml's (ci|deploy-docs).yml self-trigger.
          # SCOPE BOUNDARY: app/api/**/route.ts is deliberately NOT anchored —
          # anchoring all routes would run the heavy dev-Supabase suite on most
          # PRs, defeating the rate-budget purpose that is the reason for #5585.
          # Route-level isolation relies on the anchored lib/supabase/ clients +
          # DB RLS policies (migrations, anchored). See ADR-032 amendment.
          if printf '%s\n' "$CHANGED" | grep -qE '^(apps/web-platform/test/server/.*\.tenant-isolation\.test\.ts$|apps/web-platform/test/helpers/|apps/web-platform/server/|apps/web-platform/lib/supabase/|apps/web-platform/middleware\.ts$|apps/web-platform/supabase/migrations/|\.github/workflows/tenant-integration\.yml$|scripts/tenant-integration-gate-verdict\.sh$)'; then
            printf 'tenant=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'tenant=false\n' >> "$GITHUB_OUTPUT"
          fi

  tenant-integration:
    needs: detect-changes
    if: needs.detect-changes.outputs.tenant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # depth>1 so git diff origin/main...HEAD populates for the
          # FK-precondition lint (Delta 2 of issue 4325 hardening).
          fetch-depth: 2

      # FK-precondition lint (Delta 2 of issue 4325 hardening). Static
      # PR-diff check: every new/modified migration with a cross-file
      # REFERENCES public.<table> must include a to_regclass precondition
      # per the schema-vs-ledger drift learning. Runs early (no Doppler /
      # DB needed) so a malformed migration short-circuits before the
      # costly dev apply. Pairs with MIGRATION_SCHEMA_PRECONDITION_PROBE
      # (default-on per Delta 4) — PR-time prevention vs apply-time defense.
      # No untrusted github.event.* inputs interpolated; safe per
      # GitHub Actions injection guidance.
      - name: Lint migration FK preconditions
        working-directory: apps/web-platform
        run: bash scripts/lint-migration-fk-preconditions.sh --from-pr-diff

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: .bun-version

      - name: Cache bun install (apps/web-platform)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
            apps/web-platform/node_modules
          key: bun-webplat-${{ runner.os }}-${{ hashFiles('apps/web-platform/bun.lock') }}
          restore-keys: |
            bun-webplat-${{ runner.os }}-

      - name: Install web-platform dependencies
        working-directory: apps/web-platform
        run: bun install --frozen-lockfile

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify DOPPLER_TOKEN_DEV_SCHEDULED is provisioned
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
        run: |
          set -uo pipefail
          if [[ -z "${DOPPLER_TOKEN_CHECK:-}" ]]; then
            echo "::error::DOPPLER_TOKEN_DEV_SCHEDULED is not set. Provision a dev-scoped Doppler service token and 'gh secret set DOPPLER_TOKEN_DEV_SCHEDULED'. Aborting -- do NOT silent-skip (would re-create the gate trap this workflow closes)."
            exit 1
          fi

      - name: Assert Doppler config resolves to environment=dev
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
        run: |
          set -uo pipefail
          env_name=$(doppler configs get dev_scheduled -p soleur --json 2>/dev/null \
            | jq -r '.environment // empty') || env_name=""
          if [[ -z "$env_name" ]]; then
            echo "::error::doppler configs get dev_scheduled -p soleur returned empty. Config does not exist or token lacks read access."
            exit 1
          fi
          if [[ "$env_name" != "dev" ]]; then
            # Strip CR/LF + ASCII control bytes via tr, then multi-byte
            # UTF-8 separators (U+2028, U+2029, U+200B, U+FEFF) via sed —
            # bash `tr` is byte-oriented and cannot match multi-byte
            # sequences. Mirrors scheduled-realtime-probe.yml's
            # strip_log_injection function (tr + sed two-stage).
            env_safe=$(printf '%s' "$env_name" | LC_ALL=C tr -d '\000-\037\177' \
              | sed -E 's/\xe2\x80\xa8//g; s/\xe2\x80\xa9//g; s/\xe2\x80\x8b//g; s/\xef\xbb\xbf//g; s/\xc2\x85//g')
            echo "::error::dev_scheduled config resolves to environment=${env_safe} (expected: dev). Token rotated to wrong scope; reset before running tenant-integration."
            exit 1
          fi
          echo "Doppler config dev_scheduled -> environment=dev (verified)."

      # Drift probe (#4241) — composite action shared with scheduled cron at
      # `.github/workflows/scheduled-dev-migration-drift.yml`. Surfaces
      # `_schema_migrations` rows on dev whose file is missing from
      # origin/main OR whose content_sha drifts (caught by migration 054).
      # Severity is `::warning::` by design: the apply-time gate in
      # `apps/web-platform/scripts/run-migrations.sh` (#4241 Phase 3.1) is
      # the enforcement layer, this probe is the visibility layer.
      - name: Detect dev-vs-main migration drift
        uses: ./.github/actions/dev-migration-drift-probe
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}

      # Preflight: schema-vs-ledger consistency check (#4338). Logic
      # lives in apps/web-platform/scripts/preflight-schema-vs-ledger.sh
      # so the workflow surface stays free of inline run: shell with
      # interpolated bash variables. Orthogonal to the drift probe above:
      # the drift probe checks ledger-vs-origin/main (filename + content
      # _sha drift class, #4241); this preflight checks ledger-vs-live-
      # schema (the #4338 drift class). Both passing is the necessary-
      # and-sufficient condition for a safe apply.
      - name: Preflight schema-vs-ledger consistency check
        working-directory: apps/web-platform
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
        run: |
          set -uo pipefail
          doppler run -p soleur -c dev_scheduled -- \
            bash scripts/preflight-schema-vs-ledger.sh

      # Apply migrations to dev before running tests. Without this step,
      # tenant-integration tests run against whatever schema dev happens to
      # have, which can lag behind the PR's migration files — producing
      # ambiguous "RLS deny" failures whose root cause is "migration never
      # applied" rather than "policy logic incorrect." See PR #3911
      # diagnosis: the same 42501 error fires whether the migration is
      # absent (default RLS deny) or present-but-broken (policy returns
      # false), which makes CI useless for distinguishing the two cases
      # until the apply gap is closed.
      #
      # SAFETY: dev only. Per `hr-menu-option-ack-not-prod-write-auth`,
      # prd migration apply MUST remain operator-gated. This step uses
      # the dev_scheduled Doppler config (asserted as environment=dev
      # by the preceding step), and `run-migrations.sh` uses
      # `DATABASE_URL_POOLER` which is the dev-pooler endpoint.
      #
      # `psql` is pre-installed on github-hosted ubuntu runners, so no
      # explicit setup step is needed. The script tracks applied
      # migrations in `public._schema_migrations` and is idempotent on
      # re-runs (skips already-applied filenames). `--bootstrap=skip`
      # is correct for dev (which has a populated tracking table;
      # bootstrap-auto's 001-010 sentinel-row seed is meant for the
      # legacy prd-first apply path, not dev).
      # Seed bot fixtures before migrations — migrations like
      # 071_ux_audit_artifacts_bucket.sql reference auth.users rows
      # that bot-fixture.ts creates. Without this, the migration
      # degrades gracefully (NOTICE, not EXCEPTION) but the RLS
      # policy is deferred until a post-seed re-apply.
      - name: Seed bot fixtures (pre-migration)
        working-directory: apps/web-platform
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
        run: |
          set -uo pipefail
          doppler run -p soleur -c dev_scheduled -- \
            bun plugins/soleur/skills/ux-audit/scripts/bot-fixture.ts seed \
            || echo "::warning::bot-fixture.ts seed failed — migrations will degrade gracefully"

      - name: Apply migrations to dev
        working-directory: apps/web-platform
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
          # The unmerged-apply gate (#4241) blocks files not on origin/main
          # unless this env is set. The workflow IS the legitimate apply path
          # for this PR's own in-flight migrations — PR review (mandatory for
          # merge) is the gate for content; this env flag is the gate for the
          # apply path. Direct-`psql` applies outside CI still require explicit
          # operator ack via the same flag. The drift probe above surfaces any
          # leave-behind state on every run, so a maliciously-shipped migration
          # cannot stay invisible. See learning file for full discussion.
          ALLOW_UNMERGED_DEV_APPLY: "1"
          # Schema-presence probe (#4338): before applying each migration,
          # confirm the cross-file tables it REFERENCES exist in the live
          # schema. Catches schema-vs-ledger drift one migration earlier
          # than the FK parser, with a self-describing error that names
          # the missing relation. Composes with the workflow-level
          # preflight above: preflight runs once at workflow-time;
          # this runner-level probe fires per-migration so dynamic-
          # produced dependencies (caught later in the apply sequence)
          # still get a named-relation error.
          MIGRATION_SCHEMA_PRECONDITION_PROBE: "1"
        run: |
          set -uo pipefail
          doppler run -p soleur -c dev_scheduled -- \
            bash scripts/run-migrations.sh --bootstrap=skip

      # WORM-vs-cascade contradiction gate (#5372). Scans the LIVE post-apply
      # schema for tables with an ON DELETE SET NULL/CASCADE FK to public.users
      # that ALSO carry a raising BEFORE UPDATE/DELETE trigger — the class that
      # aborts the Art-17 account-delete cascade as an opaque GoTrue 500
      # (routine_runs / #5342). STATEMENT-level → ::error:: + exit 1 (breaks
      # deletion for ALL users); ROW-level → ::warning:: (latent). Runs AFTER
      # apply (scans live schema) and BEFORE the tests so a poisoned schema
      # fails fast with a NAMED relation instead of a 500 three layers deep.
      - name: Preflight WORM-vs-cascade contradiction check
        working-directory: apps/web-platform
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
        run: |
          set -uo pipefail
          doppler run -p soleur -c dev_scheduled -- \
            bash scripts/preflight-worm-cascade-contradiction.sh

      - name: Run tenant-isolation tests
        working-directory: apps/web-platform
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_DEV_SCHEDULED }}
        run: |
          set -uo pipefail
          # NOTE: invoke via `npm run test:ci` (not `bun x vitest`) for
          # byte-parity with .github/workflows/ci.yml `test-webplat` job,
          # which calls `npm run test:ci` from the `webplat` branch of
          # scripts/test-all.sh. `--` separates npm-run args from vitest's.
          doppler run -p soleur -c dev_scheduled -- \
            env TENANT_INTEGRATION_TEST=1 \
            npm run test:ci -- test/server/ --project unit --reporter=verbose

  # Always-run aggregator gate (#5585). This job — NOT the heavy
  # `tenant-integration` job — is the required status check registered in the
  # "CI Required" ruleset (infra/github/ruleset-ci-required.tf). It runs on
  # every PR (if: always()) so a context is always reported, and asserts the
  # verdict INSIDE a run: step (never a job-level if:, which would report no
  # context and reopen the path-filter gap). Fail-closed allow-list: passes
  # only when detect-changes succeeded AND the suite is success|skipped. The
  # verdict lives in scripts/tenant-integration-gate-verdict.sh so its five
  # branches are unit-tested (tests/scripts/test-tenant-integration-gate-verdict.sh).
  # Results are read via env: + quoted "$VAR" per workflow-injection guidance.
  tenant-integration-required:
    needs: [detect-changes, tenant-integration]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Aggregate gate verdict (fail-closed)
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          SUITE_RESULT: ${{ needs.tenant-integration.result }}
        run: bash scripts/tenant-integration-gate-verdict.sh "$DETECT_RESULT" "$SUITE_RESULT"
