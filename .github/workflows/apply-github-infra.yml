# Auto-apply `github_repository_ruleset` resources whenever a PR that touches
# `infra/github/*.tf` merges to main. Replaces the deprecated follow-through
# pattern (#3895/#3896) where operator was required to mint PAT, run
# terraform import + apply manually at terminal, then file verify-workflow
# follow-up.
#
# Mirrors `apply-sentry-infra.yml` (ADR-031) with adjustments for the
# `infra/github/` root:
#   - Auth: GitHub App credentials (GITHUB_APP_ID + GITHUB_APP_PRIVATE_KEY)
#     from Doppler `prd_terraform`. Migrated from GH_RULESET_PAT in #4384 per
#     AGENTS.core.md hr-github-app-auth-not-pat.
#   - First-apply import: if state does not yet contain
#     github_repository_ruleset.ci_required, the workflow imports it before
#     plan. Idempotent — subsequent runs no-op the import.
#   - No `environment:` reviewer gate. Sentry uses one because Sentry resource
#     destruction has cross-tenant blast radius; `infra/github/` only affects
#     the founder's repo, so CODEOWNERS + [ack-destroy] gate is sufficient.
#
# Authorization model: the PR merge IS the human authorization
# (`hr-menu-option-ack-not-prod-write-auth`). Same boundary drawn by ADR-031.
#
# Kill switch: include `[skip-github-apply]` on its own line in the merge
# commit message to skip auto-apply for that merge.
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a
# transient failure. The first apply now triggers automatically when a PR
# that touches `infra/github/*.tf` merges to main (App credentials live
# permanently in Doppler — no PAT mint flow gates the first apply per #4384).
#
# Untrusted-input handling: HEAD_MSG and REASON are routed through env vars
# (never interpolated directly into run: blocks) per the github.blog
# workflow-injection guidance. All action references are SHA-pinned.

name: Apply github infra (rulesets)

on:
  push:
    branches: [main]
    paths:
      - "infra/github/*.tf"
      - "infra/github/.terraform.lock.hcl"
      # Defense-in-depth: re-fire on filter mutations so a PR that mutates
      # the destroy-guard filter without touching infra still runs the
      # apply step against `main`'s captured baseline (#4419).
      - "tests/scripts/lib/destroy-guard-filter.jq"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (manual re-run only — e.g. retry-after-transient-failure)"
        required: true
        type: string

concurrency:
  group: terraform-apply-github-infra
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: infra/github

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-github-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Fetch GitHub App credentials from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          # #4384 — migrated from GH_RULESET_PAT to App-installation auth per
          # AGENTS.core.md hr-github-app-auth-not-pat. App credentials are
          # mirrored from prd to prd_terraform by apps/web-platform/infra/'s
          # doppler_secret resources (#4150), so no separate mint step exists.
          APP_ID=$(doppler secrets get GITHUB_APP_ID --plain 2>/dev/null) || {
            echo "::error::GITHUB_APP_ID not found in Doppler prd_terraform. Mirror from prd via apps/web-platform/infra/ apply."
            exit 1
          }
          PEM=$(doppler secrets get GITHUB_APP_PRIVATE_KEY --plain 2>/dev/null) || {
            echo "::error::GITHUB_APP_PRIVATE_KEY not found in Doppler prd_terraform. One-shot download at App creation; cannot be re-downloaded — recover from password manager or App admin UI."
            exit 1
          }
          if [[ -z "$APP_ID" || -z "$PEM" ]]; then
            echo "::error::GitHub App credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          # APP_ID is short and non-secret-like; masking still cheap defence.
          printf '::add-mask::%s\n' "$APP_ID"
          # Per-line ::add-mask:: for every non-empty PEM line BEFORE writing
          # to $GITHUB_ENV. GitHub Actions does NOT auto-mask values written
          # to $GITHUB_ENV via heredoc (only `secrets.*`-sourced env vars are
          # masked); a downstream `TF_LOG=DEBUG` or `set -x` could otherwise
          # echo the full PEM. (review: PR #4384 — security-sentinel F1.)
          while IFS= read -r pem_line; do
            [[ -n "$pem_line" ]] && printf '::add-mask::%s\n' "$pem_line"
          done <<< "$PEM"
          # Multi-line PEM must use the GitHub Actions multiline env-var form.
          # Single-line `printf '%s\n' "$PEM" >> $GITHUB_ENV` corrupts newlines.
          printf 'TF_VAR_github_app_id=%s\n' "$APP_ID" >> "$GITHUB_ENV"
          {
            echo 'TF_VAR_github_app_private_key<<__SOLEUR_PEM_EOF__'
            printf '%s\n' "$PEM"
            echo '__SOLEUR_PEM_EOF__'
          } >> "$GITHUB_ENV"
          # Also stash the PEM to a runner-temp file (chmod 600) so the post-
          # apply verify step can mint an App-JWT for `gh api .../rulesets/N`
          # (rulesets read requires Administration:Read, which the default
          # secrets.GITHUB_TOKEN does NOT carry). Per Risk R10 in the #4384
          # plan: this replaces the deleted GITHUB_TOKEN_PAT line.
          umask 077
          APP_PEM_FILE=$(mktemp -p "$RUNNER_TEMP" soleur-ai-app-pem.XXXXXX)
          printf '%s\n' "$PEM" > "$APP_PEM_FILE"
          chmod 600 "$APP_PEM_FILE"
          # PEM-shape pre-flight: catch a corrupted PEM in Doppler (literal
          # `\n` instead of newlines, BOM, partial paste) HERE with a
          # routable error, rather than later at `openssl dgst -sign` with a
          # generic `unable to load Private Key`. (review: PR #4384 —
          # code-quality Q3 / pattern-recognition Item 3.)
          if ! openssl rsa -in "$APP_PEM_FILE" -check -noout 2>/dev/null; then
            echo "::error::GITHUB_APP_PRIVATE_KEY in Doppler prd_terraform is not a valid RSA PEM. One-shot download at App creation; recover from password manager or App admin UI."
            exit 1
          fi
          printf 'APP_ID=%s\n' "$APP_ID" >> "$GITHUB_ENV"
          printf 'APP_PEM_FILE=%s\n' "$APP_PEM_FILE" >> "$GITHUB_ENV"

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: First-apply import (idempotent)
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          # Match any github_repository_ruleset.* address (not just .ci_required)
          # so a future `moved {}` block rename doesn't silently re-trigger an
          # import that would fail with "resource already managed".
          if terraform state list 2>/dev/null | grep -qE '^github_repository_ruleset\.'; then
            echo "Resource already in state, skipping import."
          else
            echo "Importing existing ruleset 14145388 into state (one-time bootstrap)."
            doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
              terraform import github_repository_ruleset.ci_required soleur:14145388
          fi

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # `-e` is intentionally omitted so we can capture terraform plan's
          # exit code in $rc — plan exits non-zero on legitimate failures we
          # want to surface, not abort silently. All later commands re-enable
          # fail-fast semantics inline.
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          # Destroy guard — counts BOTH resource-level deletes AND nested
          # `required_check` block removals on `github_repository_ruleset`
          # (closes #3915 / unblocks AC20 of #4392). The pre-existing
          # resource-only counter missed the PR #4395 shape:
          # `Plan: 0 to add, 1 to change, 0 to destroy` that silently
          # un-required the `enforce` status check. Filter is path-specific
          # to one nested-block surface; sibling apply workflows tracked
          # at a follow-up issue. Source of truth:
          # tests/scripts/lib/destroy-guard-filter.jq (also exercised by
          # tests/scripts/test-destroy-guard-counter.sh).
          counts=$(terraform show -json tfplan | \
            jq -f "${GITHUB_WORKSPACE}/tests/scripts/lib/destroy-guard-filter.jq")
          resource_deletes=$(echo "$counts" | jq -r '.resource_deletes')
          nested_deletes=$(echo "$counts" | jq -r '.nested_deletes')
          # Validate counters parsed correctly — empty values from a jq
          # failure would silently evaluate false in the `-gt 0` test and
          # let destructive plans slip past the guard.
          if [[ ! "$resource_deletes" =~ ^[0-9]+$ ]] || [[ ! "$nested_deletes" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy-guard counter parse failed (resource_deletes='${resource_deletes}', nested_deletes='${nested_deletes}')."
            exit 1
          fi
          destroy_count=$((resource_deletes + nested_deletes))
          ack_destroy=false
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[ack-destroy\]($|$'\n') ]]; then
            ack_destroy=true
          fi
          if [[ "$destroy_count" -gt 0 ]] && [[ "$ack_destroy" != "true" ]]; then
            echo "::error::terraform plan shows ${destroy_count} destructive change(s) on github infra (${resource_deletes} resource-level delete(s) + ${nested_deletes} nested-block removal(s))."
            echo "::error::Add a line containing exactly '[ack-destroy]' to the merge commit message to acknowledge, or revert the trigger commit."
            grep -E 'will be destroyed|Plan:' tfplan.txt | head -20 >&2
            exit 1
          fi

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -auto-approve -input=false tfplan

      - name: Post-apply verify (ruleset 14145388 required check count)
        id: verify
        env:
          # Mint a short-lived App-installation token from the soleur-ai App
          # credentials already loaded into env by the Fetch step. The
          # rulesets API requires `Administration: Read` scope which the
          # default `secrets.GITHUB_TOKEN` does NOT carry — but the App
          # installation does (the same scope it uses to write the ruleset).
          # Migrated from PAT auth (the deleted GITHUB_TOKEN_PAT) per #4384.
          APP_ID: ${{ env.APP_ID }}
          APP_PEM_FILE: ${{ env.APP_PEM_FILE }}
          INSTALLATION_ID: "122213433"
        run: |
          set -euo pipefail
          # Trap-based cleanup so the PEM file is shredded on BOTH success
          # and any failure exit (open/jq/curl/gh failures, set -e tripping
          # mid-step). The `|| true` keeps the trap idempotent if the file
          # was already removed. (review: PR #4384 — security-sentinel F2.)
          trap 'rm -f "${APP_PEM_FILE:-}" 2>/dev/null || true' EXIT

          b64url() {
            base64 -w 0 | tr '+/' '-_' | tr -d '=\n'
          }

          # ---- Step 1: mint App-JWT (RS256, lifetime 540s, backdate 60s) ----
          now=$(date +%s)
          header=$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | b64url)
          payload=$(jq -nc \
            --argjson iss "$APP_ID" \
            --argjson iat "$((now - 60))" \
            --argjson exp "$((now + 540))" \
            '{iss: $iss, iat: $iat, exp: $exp}' | b64url)
          unsigned="${header}.${payload}"
          signature=$(printf '%s' "$unsigned" | \
            openssl dgst -sha256 -sign "$APP_PEM_FILE" -binary | b64url)
          JWT="${unsigned}.${signature}"
          if [[ -z "$JWT" ]]; then
            echo "::error::App-JWT mint produced empty output."
            exit 1
          fi
          echo "::add-mask::$JWT"

          # ---- Step 2: exchange App-JWT for installation access token ----
          INSTALL_TOKEN=$(curl -sS -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" \
            | jq -r '.token // empty')
          if [[ -z "$INSTALL_TOKEN" ]]; then
            echo "::error::Installation-token exchange returned empty token. App may lack permission or installation_id mismatch."
            exit 1
          fi
          echo "::add-mask::$INSTALL_TOKEN"

          # ---- Step 3: ruleset count probe ----
          RULESET_JSON=$(GH_TOKEN="$INSTALL_TOKEN" gh api "repos/${GITHUB_REPOSITORY}/rulesets/14145388" 2>&1) || {
            echo "::error::gh api rulesets/14145388 failed — App lacks Administration:Read or ruleset deleted. Response: ${RULESET_JSON}"
            exit 1
          }
          # Order-independent select (#5780): adding a sibling `merge_queue`
          # rule in PR-2 can reorder `rules[]` so `rules[0]` is no longer the
          # required_status_checks rule (→ null → the ^[0-9]+$ guard exit 1).
          # Selecting by .type is stable regardless of rule order.
          ACTUAL=$(echo "$RULESET_JSON" | jq '.rules[] | select(.type=="required_status_checks") | .parameters.required_status_checks | length')
          if [[ ! "$ACTUAL" =~ ^[0-9]+$ ]]; then
            echo "::error::Unexpected jq result for required_status_checks count: ${ACTUAL}."
            exit 1
          fi

          # PEM file shred is handled by the EXIT trap at the top of this
          # step (covers both success and failure paths).

          echo "actual_count=$ACTUAL" >> "$GITHUB_OUTPUT"
          echo "Ruleset 14145388: required_status_checks count = ${ACTUAL}."

      - name: Post-apply summary
        if: always()
        env:
          TRIGGER: ${{ github.event_name }}
          MERGE_SHA: ${{ github.sha }}
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTUAL: ${{ steps.verify.outputs.actual_count }}
        run: |
          {
            echo "## Apply github infra (rulesets)"
            echo ""
            echo "**Trigger:** ${TRIGGER}"
            echo "**Merge SHA:** ${MERGE_SHA}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Ruleset 14145388 required_status_checks count:** ${ACTUAL:-n/a}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
