# Weekly SEO/AEO audit and fix using the soleur:seo-aeo skill.
# Runs /soleur:seo-aeo fix to auto-apply technical SEO fixes, then commits to main.
# Produces a GitHub Issue documenting findings and changes.
# To test manually: gh workflow run scheduled-seo-aeo-audit.yml

name: "Scheduled: SEO/AEO Audit"

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10:00 UTC
  workflow_dispatch:

concurrency:
  group: schedule-seo-aeo-audit
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  seo-aeo-audit:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create scheduled-seo-aeo-audit \
            --description "Weekly SEO/AEO audit and fix" \
            --color "0E8A16" 2>/dev/null || true

      - name: Run SEO/AEO audit and fix
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-sonnet-4-6 --max-turns 40 --allowedTools Bash,Read,Write,Edit,Glob,Grep'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            MILESTONE RULE: Every gh issue create command must include --milestone "Post-MVP / Later".

            Run /soleur:seo-aeo fix on this repository.

            After the audit and fix is complete, create a GitHub issue titled
            "[Scheduled] SEO/AEO Audit - <today's date in YYYY-MM-DD format>"
            with the label "scheduled-seo-aeo-audit" summarizing:
            - What issues were found
            - What fixes were applied
            - Build validation results

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/seo-aeo-audit-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "fix(seo): weekly SEO/AEO audit fixes"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "fix(seo): weekly SEO/AEO audit fixes $(date -u +%Y-%m-%d)" \
              --body "Automated commit from SEO/AEO audit workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: SEO/AEO Audit workflow failed'
          body: '<p><strong>Scheduled: SEO/AEO Audit</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
