# Main branch health monitor.
# Runs the full test suite against main on a schedule.
# If tests fail and no open tracking issue exists, creates a P1 issue.
# To test manually: gh workflow run main-health-monitor.yml
#
# Security: No untrusted event inputs used in run: blocks. All values
# are generated by the workflow itself or read via gh CLI.

name: "Main Health Monitor"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: main-health-monitor
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web-platform dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web-platform

      - name: Install telegram-bridge dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/telegram-bridge

      - name: Run test suite
        id: tests
        continue-on-error: true
        run: bash scripts/test-all.sh 2>&1 | tee /tmp/test-output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Check for existing open issue with the same label
          EXISTING=$(gh issue list \
            --label "ci/main-broken" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [[ -n "$EXISTING" ]]; then
            echo "Open tracking issue already exists: #$EXISTING. Adding comment."
            gh issue comment "$EXISTING" --body "Main branch tests still failing as of $(date -u +%Y-%m-%dT%H:%M:%SZ).

Run: $RUN_URL"
            exit 0
          fi

          # Extract failure summary (last 30 lines of test output)
          SUMMARY=$(tail -30 /tmp/test-output.txt)

          gh label create "ci/main-broken" \
            --description "Main branch CI is failing" \
            --color "B60205" \
            --force 2>/dev/null || true

          # Write issue body to temp file to avoid heredoc indentation issues
          cat > /tmp/issue-body.md <<ISSUE_EOF
## Main branch tests are failing

The scheduled health monitor detected test failures on the main branch.

### Failure summary

\`\`\`
${SUMMARY}
\`\`\`

### Actions required

1. Identify the commit that introduced the failure
2. Fix the tests or revert the breaking change
3. Verify CI passes on main before closing this issue

### Run details

- **Run:** ${RUN_URL}
- **Commit:** ${COMMIT_SHA}
- **Detected:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
ISSUE_EOF

          gh issue create \
            --title "CI: main branch tests failing" \
            --body-file /tmp/issue-body.md \
            --label "ci/main-broken" \
            --label "priority/p1-high" \
            --label "type/bug" \
            --milestone "Post-MVP / Later"

          echo "::error::Main branch tests are failing. Issue created."

      - name: Close issue on success
        if: steps.tests.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          EXISTING=$(gh issue list \
            --label "ci/main-broken" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [[ -n "$EXISTING" ]]; then
            gh issue close "$EXISTING" \
              --comment "Main branch tests are passing again. Auto-closing.

Run: $RUN_URL"
            echo "Closed issue #$EXISTING -- main is green again."
          fi
