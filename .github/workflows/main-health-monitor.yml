# Main branch health monitor.
# Runs the full test suite against main on a schedule.
# If tests fail and no open tracking issue exists, creates a P1 issue.
# To test manually: gh workflow run main-health-monitor.yml
#
# Security: No untrusted event inputs used in run: blocks. All values
# are generated by the workflow itself or read via gh CLI.

name: "Main Health Monitor"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: main-health-monitor
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web-platform dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web-platform

      - name: Run test suite
        id: tests
        continue-on-error: true
        run: bash scripts/test-all.sh 2>&1 | tee /tmp/test-output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Check for existing open issue with the same label
          EXISTING=$(gh issue list \
            --label "ci/main-broken" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [[ -n "$EXISTING" ]]; then
            echo "Open tracking issue already exists: #$EXISTING. Adding comment."
            COMMENT="Main branch tests still failing as of $(date -u +%Y-%m-%dT%H:%M:%SZ)."
            COMMENT="${COMMENT}"$'\n\n'"Run: ${RUN_URL}"
            gh issue comment "$EXISTING" --body "$COMMENT"
            exit 0
          fi

          # Extract failure summary (last 30 lines of test output)
          SUMMARY=$(tail -30 /tmp/test-output.txt)

          gh label create "ci/main-broken" \
            --description "Main branch CI is failing" \
            --color "B60205" \
            --force 2>/dev/null || true

          # Build issue body without heredoc (heredocs break YAML literal blocks)
          {
            echo "## Main branch tests are failing"
            echo ""
            echo "The scheduled health monitor detected test failures on the main branch."
            echo ""
            echo "### Failure summary"
            echo ""
            echo '```'
            echo "${SUMMARY}"
            echo '```'
            echo ""
            echo "### Actions required"
            echo ""
            echo "1. Identify the commit that introduced the failure"
            echo "2. Fix the tests or revert the breaking change"
            echo "3. Verify CI passes on main before closing this issue"
            echo ""
            echo "### Run details"
            echo ""
            echo "- **Run:** ${RUN_URL}"
            echo "- **Commit:** ${COMMIT_SHA}"
            echo "- **Detected:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > /tmp/issue-body.md

          gh issue create \
            --title "CI: main branch tests failing" \
            --body-file /tmp/issue-body.md \
            --label "ci/main-broken" \
            --label "priority/p1-high" \
            --label "type/bug" \
            --milestone "Post-MVP / Later"

          echo "::error::Main branch tests are failing. Issue created."

      - name: Close issue on success
        if: steps.tests.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          EXISTING=$(gh issue list \
            --label "ci/main-broken" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [[ -n "$EXISTING" ]]; then
            COMMENT="Main branch tests are passing again. Auto-closing."
            COMMENT="${COMMENT}"$'\n\n'"Run: ${RUN_URL}"
            gh issue close "$EXISTING" --comment "$COMMENT"
            echo "Closed issue #$EXISTING -- main is green again."
          fi
