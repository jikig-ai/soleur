# Biweekly growth execution using the soleur:growth skill.
# Runs /soleur:growth fix on stale pages from the SEO refresh queue.
# Commits keyword optimizations to main and creates a GitHub Issue.
# To test manually: gh workflow run scheduled-growth-execution.yml

name: "Scheduled: Growth Execution"

on:
  schedule:
    - cron: '0 10 1,15 * *'  # 1st and 15th of month, 10:00 UTC
  workflow_dispatch:

concurrency:
  group: schedule-growth-execution
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  growth-execution:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create scheduled-growth-execution \
            --description "Biweekly growth keyword optimization" \
            --color "0E8A16" 2>/dev/null || true

      - name: Run growth execution
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-sonnet-4-6 --max-turns 40 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebSearch'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            MILESTONE RULE: Every gh issue create command must include --milestone "Post-MVP / Later".

            Read knowledge-base/marketing/seo-refresh-queue.md and identify
            Priority 1 ("Update immediately") stale pages that need keyword
            optimization.

            For each stale page found, run /soleur:growth fix <page-path>
            to apply keyword injection, meta description rewrites, and
            FAQ section additions.

            After fixing all stale pages, validate the changes:
            ```
            npx @11ty/eleventy
            bash plugins/soleur/skills/seo-aeo/scripts/validate-seo.sh _site
            ```

            Then create a GitHub issue titled
            "[Scheduled] Growth Execution - <today's date in YYYY-MM-DD format>"
            with the label "scheduled-growth-execution" summarizing:
            - Which pages were optimized
            - What changes were made (keywords added, meta descriptions updated, etc.)
            - Build validation results

            If no stale pages are found in Priority 1, create the issue noting
            "No stale pages found — all Priority 1 items are up to date."

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/growth-execution-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "fix(growth): biweekly keyword optimization"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "fix(growth): biweekly keyword optimization $(date -u +%Y-%m-%d)" \
              --body "Automated commit from growth execution workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Growth Execution workflow failed'
          body: '<p><strong>Scheduled: Growth Execution</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
