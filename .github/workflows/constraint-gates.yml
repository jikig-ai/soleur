name: constraint-gates (L1 import boundary)

# MONOROPO-LIVE instance of the gate generated by
# `plugins/soleur/skills/constraint-scaffold` (ADR-070). The skill emits its
# workflow to `<target>/.github/workflows/` (correct for a standalone product
# repo); GitHub Actions only executes workflows under the REPO-ROOT
# `.github/workflows/`, so this repo-root copy is what actually dogfoods the
# gate on Soleur's own `apps/web-platform`. It is informational (NOT in branch
# protection) until deliberately promoted to a required check — a one-line
# branch-protection change. Promotion to a REQUIRED check is BLOCKED on #5791
# (the `/soleur fix constraints` recovery dispatcher — not yet wired, so a
# founder hotfix that trips a required gate would have no agent-free recovery)
# and #5778 (the monorepo/multi-stack follow-up). Always-runs + internal
# path-check: fires on every PR, reports a real conclusion, exits 0 fast when
# `apps/web-platform/**` is untouched. The agent — never the founder — owns this
# file. To recover a tripped gate, re-run the constraint-scaffold skill (the
# agent fixes the import or runs `--refresh-baseline`); the
# `/soleur fix constraints` comment-dispatcher is PLANNED (#5791), not yet wired.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  constraint-gates:
    name: L1 import-boundary gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect target changes
        id: changed
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # No --depth here: a shallow fetch can leave the merge-base unreachable,
          # making the three-dot diff fail under `set -e` and redden every
          # non-target PR. checkout already used fetch-depth: 0 (full history).
          git fetch --no-tags origin "$BASE_REF"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE '^apps/web-platform/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "apps/web-platform/** unchanged in this PR — constraint-gates passes (no-op)."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.changed == 'true'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/web-platform
        run: bun install --frozen-lockfile

      - name: Run constraint gates (fail-closed)
        if: steps.changed.outputs.changed == 'true'
        run: bash apps/web-platform/scripts/constraint-gates.sh
