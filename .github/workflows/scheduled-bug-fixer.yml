# Daily bot-fix agent for open bugs.
# Cascades through priority levels (p3-low -> p2-medium -> p1-high), picking
# the oldest open issue with type/bug (excluding bot-fix/attempted and issues
# that already have an open bot-fix PR), then invokes soleur:fix-issue to
# attempt a single-file fix and open a PR.
# After the agent creates a PR, the auto-merge gate evaluates eligibility:
# single-file p3-low fixes with passing tests are auto-merged; all others
# require human review.
# Phase 3 of #370. Runs after daily triage (04:00 UTC).
# To test manually: gh workflow run scheduled-bug-fixer.yml
#
# Security: Issue content is read by the claude-code-action agent via gh CLI,
# not interpolated into shell commands. The label creation and issue selection
# steps use only hardcoded strings and GitHub API output.

name: "Scheduled: Bug Fixer"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Override: fix a specific issue number'
        required: false
        type: string

concurrency:
  group: schedule-bug-fixer
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  fix-bug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Pre-create labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "bot-fix/attempted" \
            --description "Bot attempted fix but failed" \
            --color "D93F0B" 2>/dev/null || true
          gh label create "bot-fix/auto-merge-eligible" \
            --description "Bot fix qualifies for autonomous merge" \
            --color "0E8A16" 2>/dev/null || true
          gh label create "bot-fix/review-required" \
            --description "Bot fix requires human review" \
            --color "FBCA04" 2>/dev/null || true
          gh label create "bot-fix/verified" \
            --description "Bot fix verified on main (CI passed)" \
            --color "0075CA" 2>/dev/null || true
          gh label create "bot-fix/reverted" \
            --description "Bot fix was auto-reverted (CI failed on main)" \
            --color "B60205" 2>/dev/null || true

      - name: Select issue
        id: select
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ inputs.issue_number }}
        run: |
          if [[ -n "$OVERRIDE" ]]; then
            if [[ ! "$OVERRIDE" =~ ^[0-9]+$ ]]; then
              echo "::error::issue_number must be a positive integer, got: $OVERRIDE"
              exit 1
            fi
            echo "issue=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Collect issue numbers that already have open bot-fix PRs
          OPEN_FIXES=$(gh pr list \
            --state open \
            --json headRefName \
            --jq '[.[].headRefName | select(startswith("bot-fix/")) | split("/")[1] | split("-")[0]] | unique | join(",")')
          export OPEN_FIXES
          echo "Issues with open bot-fix PRs: ${OPEN_FIXES:-none}"

          # Agent-authored exclusion clause: see
          # plugins/soleur/skills/fix-issue/references/exclude-label-jq-snippet.md
          # Drops any issue labeled `ux-audit` OR any label starting with `agent:`.
          for PRIORITY in priority/p3-low priority/p2-medium priority/p1-high; do
            ISSUE=$(gh issue list \
              --label "$PRIORITY" \
              --label "type/bug" \
              --state open \
              --json number,title,labels,createdAt \
              --jq '
                ($ENV.OPEN_FIXES | split(",") | map(select(length > 0)) | map(tonumber? // empty)) as $skip_nums |
                [.[] | select(
                  (.labels | map(.name) | index("bot-fix/attempted") | not) and
                  (.labels | map(.name) | index("ux-audit") | not) and
                  (.labels | map(.name) | any(startswith("agent:")) | not) and
                  (.number | IN($skip_nums[]) | not)
                )] | sort_by(.createdAt) | .[0].number // empty')

            if [[ -n "$ISSUE" ]]; then
              echo "Selected issue #$ISSUE from $PRIORITY"
              echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "No qualifying issues found at any priority level"

      - name: Fix issue
        if: steps.select.outputs.issue
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1.0.75
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 35
            --allowedTools Bash,Read,Write,Edit,Glob,Grep
          prompt: |
            Run /soleur:fix-issue ${{ steps.select.outputs.issue }} --exclude-label ux-audit --exclude-label 'agent:*'

      # --- Auto-Merge Gate ---
      # Runs OUTSIDE claude-code-action using GITHUB_TOKEN (not the agent's
      # App token which is revoked in post-step cleanup).

      - name: Detect bot-fix PR
        if: always() && steps.select.outputs.issue
        id: detect_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the most recently opened bot-fix PR (prefix match via jq)
          PR_NUM=$(gh pr list \
            --state open \
            --json number,headRefName,createdAt \
            --jq '[.[] | select(.headRefName | startswith("bot-fix/"))] | sort_by(.createdAt) | last | .number // empty')

          if [[ -z "$PR_NUM" ]]; then
            echo "No open bot-fix PR found (agent may have failed or aborted)"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found bot-fix PR #$PR_NUM"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Auto-merge gate
        if: always() && steps.detect_pr.outputs.pr_number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ steps.detect_pr.outputs.pr_number }}
          ISSUE_NUM: ${{ steps.select.outputs.issue }}
        run: |
          # Verify PR was created by a known bot identity.
          # claude-code-action creates PRs as "app/claude" (GitHub App slug,
          # not the [bot] suffix convention). Match both patterns.
          PR_AUTHOR=$(gh pr view "$PR_NUM" \
            --json author \
            --jq '.author.login // empty')
          ALLOWED=false
          case "$PR_AUTHOR" in
            github-actions\[bot\]|*\[bot\]*|app/claude) ALLOWED=true ;;
          esac
          if [[ "$ALLOWED" != "true" ]]; then
            echo "::warning::PR #$PR_NUM author is '$PR_AUTHOR', not a recognized bot. Skipping auto-merge."
            exit 0
          fi

          # Check if the PR has the auto-merge-eligible label
          HAS_LABEL=$(gh pr view "$PR_NUM" \
            --json labels \
            --jq '[.labels[].name] | index("bot-fix/auto-merge-eligible") // empty')

          if [[ -z "$HAS_LABEL" ]]; then
            echo "PR #$PR_NUM does not have bot-fix/auto-merge-eligible label"
            echo "Skipping auto-merge -- human review required"
            exit 0
          fi

          # Mechanical safety net: verify single file changed
          FILE_COUNT=$(gh pr diff "$PR_NUM" --name-only | wc -l)
          if [[ "$FILE_COUNT" -ne 1 ]]; then
            echo "::warning::PR #$PR_NUM has $FILE_COUNT files changed, removing auto-merge label"
            gh pr edit "$PR_NUM" --remove-label "bot-fix/auto-merge-eligible"
            gh pr edit "$PR_NUM" --add-label "bot-fix/review-required"
            exit 0
          fi

          # Mechanical safety net: verify source issue is p3-low
          PRIORITY=$(gh issue view "$ISSUE_NUM" \
            --json labels \
            --jq '[.labels[].name | select(startswith("priority/"))] | .[0] // "unknown"')
          if [[ "$PRIORITY" != "priority/p3-low" ]]; then
            echo "::warning::Source issue #$ISSUE_NUM is $PRIORITY, not p3-low. Overriding to review-required."
            gh pr edit "$PR_NUM" --remove-label "bot-fix/auto-merge-eligible"
            gh pr edit "$PR_NUM" --add-label "bot-fix/review-required"
            exit 0
          fi

          echo "[ok] PR #$PR_NUM is eligible for auto-merge (1 file, p3-low, auto-merge-eligible label)"
          gh pr merge "$PR_NUM" --squash --auto
          echo "Auto-merge queued for PR #$PR_NUM"

      - name: Check auto-merge status
        if: always() && steps.detect_pr.outputs.pr_number
        id: check_auto_merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ steps.detect_pr.outputs.pr_number }}
        run: |
          AUTO_MERGE=$(gh pr view "$PR_NUM" \
            --json autoMergeRequest \
            --jq '.autoMergeRequest // empty')
          if [[ -n "$AUTO_MERGE" ]]; then
            echo "queued=true" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-merge not queued, skipping notification"
            echo "queued=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email notification (auto-merge queued)
        if: always() && steps.check_auto_merge.outputs.queued == 'true'
        continue-on-error: true
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[BOT-FIX] Auto-merge queued for PR #${{ steps.detect_pr.outputs.pr_number }}'
          body: '<p><strong>Bot fix auto-merge queued</strong></p><p>PR: <a href="${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.detect_pr.outputs.pr_number }}">#${{ steps.detect_pr.outputs.pr_number }}</a></p><p>Will merge automatically once CI passes.</p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
