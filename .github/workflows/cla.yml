name: CLA Assistant

# Upstream filter for CLA signatures. After a contributor types "I have read the
# CLA Document and I hereby sign the CLA" (or a PR is opened by a non-bot,
# non-allowlisted user), the `contributor-assistant/github-action` records the
# signature in the `cla-signatures` branch of this repo.
#
# The PR-evidence sidecar at `.github/workflows/cla-evidence.yml` watches the
# same events and writes a content-addressed canonical record (PR number, doc
# hash, RFC 3161 timestamp inputs) to the `soleur-cla-evidence` R2 bucket. The
# sidecar is independent — failures here do not block the sidecar, and failures
# in the sidecar do not block the merge gate. Edits that change the allowlist
# below MUST be mirrored in the sidecar's `build-bypass.ts` parser (the sidecar
# reads this file at run-time to stay in sync).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

# SECURITY: This workflow uses pull_request_target which runs with write access
# to the base branch. Do NOT add steps that checkout or build PR code.

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request)
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://soleur.ai/pages/legal/individual-cla.html"
          branch: "cla-signatures"
          # contributor-assistant resolves PR authors via GraphQL `commit.author.user.login`
          # (returns `claude[bot]` for the Anthropic GitHub App, DB ID 209825114).
          # REST-based gates (e.g. .github/workflows/scheduled-bug-fixer.yml) match `app/claude` —
          # do NOT harmonize the two; the surfaces are different. See #2907.
          # `soleur-ai[bot]` (bot user ID 273333864) is Soleur's own automation app, which
          # opens bot-fix PRs via `soleur:fix-issue`. For the login match to fire, the bot's
          # commits MUST carry the `273333864+soleur-ai[bot]@users.noreply.github.com` author
          # email (pinned in `plugins/soleur/skills/fix-issue/SKILL.md` Phase 5) — the cloud
          # runtime's ambient `agent@soleur.ai` email resolves to a NULL login and never
          # matches. Login-based (non-spoofable) by design; do NOT add a plain author-name
          # entry like `Soleur Agent`. See #5520 (the PR that exposed the null-login gap).
          allowlist: "dependabot[bot],github-actions[bot],renovate[bot],deruelle,claude[bot],soleur-ai[bot]"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can accept it, you need to sign our [Contributor License Agreement](https://soleur.ai/pages/legal/individual-cla.html).

            **Why?** Soleur uses a Business Source License (BSL 1.1) and supports dual licensing. The CLA ensures Jikigai has the rights needed to maintain and distribute your contribution under all applicable licenses, while you retain your copyright.

            **How to sign:** Comment on this PR with the following text:

            > I have read the CLA Document and I hereby sign the CLA

            If your employer owns your work, please ask them to sign the [Corporate CLA](https://soleur.ai/pages/legal/corporate-cla.html) by contacting legal@jikigai.com.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
          lock-pullrequest-aftermerge: false
          use-dco-flag: false
