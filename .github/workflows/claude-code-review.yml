name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  claude-review:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@5aa6f47e977fec3321f32c06d8076b1f503f832c # v1.0.161
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Explicit model pin (ADR-053): this is a supplementary advisory commenter;
          # the merge-gating review is the plugin's multi-agent /soleur:review (inherit).
          # Pin form matches test-pretooluse-hooks.yml. Unpinned, the action's default
          # model drifts with action releases — an unbounded per-PR spend surface.
          claude_args: '--model claude-sonnet-5'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # Capture metered API spend (#5086). Extracts ONLY an allowlisted record from
      # the action's execution_file (the raw log is never persisted) and uploads it
      # as a per-run artifact; a monthly agent-run reconciliation rolls it into the
      # ops ledger. Non-fatal: cost-capture flakiness must never red the review job.
      - name: Capture API spend
        if: steps.claude-review.outputs.execution_file != ''
        continue-on-error: true
        env:
          SOLEUR_RUN_ID: ${{ github.run_id }}
          SOLEUR_SHA: ${{ github.sha }}
          SOLEUR_WORKFLOW: claude-code-review.yml
          EXEC_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          set -uo pipefail
          mkdir -p /tmp/api-spend
          out="/tmp/api-spend/api-spend-${SOLEUR_RUN_ID}.json"
          bash scripts/extract-api-spend.sh "$EXEC_FILE" > "$out" \
            || { echo "::warning::api-spend capture failed (non-fatal)"; rm -f "$out"; exit 0; }
      - name: Upload API spend artifact
        if: steps.claude-review.outputs.execution_file != '' && hashFiles(format('/tmp/api-spend/api-spend-{0}.json', github.run_id)) != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: api-spend-${{ github.run_id }}
          path: /tmp/api-spend/api-spend-${{ github.run_id }}.json
          retention-days: 90
          if-no-files-found: ignore

