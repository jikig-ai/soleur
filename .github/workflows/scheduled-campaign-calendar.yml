# Weekly campaign calendar refresh and content-strategy review.
# 1. Scans distribution-content/ frontmatter and generates a rolling calendar view.
# 2. Flags overdue distribution content (publish_date in the past) via GitHub issues.
# 3. Updates content-strategy.md last_reviewed date to enforce weekly review cadence.
# Persists changes to knowledge-base/marketing/ on main.
# Runs Monday 16:00 UTC (after content-publisher's 14:00 UTC window).
# To test manually: gh workflow run scheduled-campaign-calendar.yml
#
# Security: This workflow does NOT use untrusted event inputs in run: commands.
# All inputs come from schedule/workflow_dispatch triggers (no user-controlled strings).

name: "Scheduled: Campaign Calendar"

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

concurrency:
  group: schedule-campaign-calendar
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  refresh-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "scheduled-campaign-calendar" \
            --description "Weekly campaign calendar refresh" \
            --color "0E8A16" 2>/dev/null || true

      - name: Refresh campaign calendar
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1.0.75
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-sonnet-4-6 --max-turns 20 --allowedTools Bash,Read,Write,Edit,Glob,Grep'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            STEP 1 — Refresh campaign calendar:
            Run /soleur:campaign-calendar on this repository.

            STEP 2 — Flag overdue distribution content:
            Scan all files in knowledge-base/marketing/distribution-content/ for items where:
            - status is "scheduled" AND publish_date is in the past (before today)
            - status is "draft" AND publish_date is non-empty and in the past
            For each overdue item, create a GitHub issue titled
            "[Content] Overdue: <title> (was scheduled for <date>)"
            with labels "action-required,scheduled-campaign-calendar"
            and milestone "Post-MVP / Later" listing the file path and
            suggesting rescheduling to the next available Tue/Thu slot.

            STEP 3 — Update content-strategy review date:
            In knowledge-base/marketing/content-strategy.md, update the
            frontmatter last_reviewed field to today's date (YYYY-MM-DD format).

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add knowledge-base/marketing/campaign-calendar.md knowledge-base/marketing/content-strategy.md
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/campaign-calendar-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "ci: update campaign calendar and content-strategy review"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "ci: update campaign calendar $(date -u +%Y-%m-%d)" \
              --body "Automated commit from campaign calendar workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping failure notification"
            exit 0
          fi
          RUN_URL="${REPO_URL}/actions/runs/${RUN_ID}"
          MESSAGE=$(printf '**Campaign Calendar refresh failed**\n\nWorkflow run: %s\n\nCheck logs for details.' \
            "$RUN_URL")
          PAYLOAD=$(jq -n \
            --arg content "$MESSAGE" \
            --arg username "Sol" \
            --arg avatar_url "https://raw.githubusercontent.com/jikig-ai/soleur/main/plugins/soleur/docs/images/logo-mark-512.png" \
            '{content: $content, username: $username, avatar_url: $avatar_url, allowed_mentions: {parse: []}}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Discord failure notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Discord failure notification failed (HTTP $HTTP_CODE)"
          fi
