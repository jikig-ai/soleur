# Weekly campaign calendar refresh and content-strategy review.
# 1. Scans distribution-content/ frontmatter and generates a rolling calendar view.
# 2. Flags overdue distribution content (publish_date in the past) via GitHub issues.
# 3. Updates content-strategy.md last_reviewed date to enforce weekly review cadence.
# Persists changes to knowledge-base/marketing/ on main.
# Runs Monday 16:00 UTC (after content-publisher's 14:00 UTC window).
# To test manually: gh workflow run scheduled-campaign-calendar.yml
#
# Security: No untrusted event inputs in ${{ }} expressions or run: commands.
# All triggers come from schedule/workflow_dispatch (no user-controlled strings).
# Frontmatter content (title, publish_date) read by the agent from
# knowledge-base/marketing/distribution-content/*.md is treated as trusted
# (repo-internal, PR-gated). The STEP 2 prompt instructs the agent to bind
# titles via shell variables ("$TITLE") and jq --arg, never literal
# substitution into command strings — see STEP 2 step (a) below.

name: "Scheduled: Campaign Calendar"

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

concurrency:
  group: schedule-campaign-calendar
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  refresh-calendar:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "scheduled-campaign-calendar" \
            --description "Weekly campaign calendar refresh" \
            --color "0E8A16" 2>/dev/null || true

      - name: Refresh campaign calendar
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-sonnet-4-6 --max-turns 40 --allowedTools Bash,Read,Write,Edit,Glob,Grep'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            STEP 1 — Refresh campaign calendar:
            Run /soleur:campaign-calendar on this repository.

            STEP 2 — Flag overdue distribution content (with dedup):
            Scan all files in knowledge-base/marketing/distribution-content/ for items where:
            - status is "scheduled" AND publish_date is in the past (before today)
            - status is "draft" AND publish_date is non-empty and in the past

            SAFE-SUBSTITUTION RULE (load-bearing): never paste a frontmatter
            value (title, publish_date) literally into a command string.
            Always assign to a shell variable first and pass via "$VAR" /
            jq --arg. This makes the dedup correct under titles containing
            quotes or shell metacharacters. Treat the corpus as trusted
            (repo-internal) but encode the safe pattern anyway.

            For each overdue item, before creating an issue:
            (a) Bind the title and publish_date to shell variables, e.g.
                  TITLE_RAW=$(awk -F': ' '/^title:/{sub(/^"|"$/,"",$2); print $2; exit}' "$FILE")
                  PUBLISH_DATE=$(awk -F': ' '/^publish_date:/{print $2; exit}' "$FILE")
                  CANONICAL_TITLE="[Content] Overdue: ${TITLE_RAW} (was scheduled for ${PUBLISH_DATE})"
            (b) Search for an existing OPEN issue with that exact title.
                Pipe gh --json output to a standalone jq --arg (gh's
                built-in --jq does NOT forward --arg to jq; use a separate
                jq stage to bind the title safely):
                  N=$(gh issue list \
                    --repo "$GITHUB_REPOSITORY" \
                    --label scheduled-campaign-calendar \
                    --state open \
                    --search "\"$CANONICAL_TITLE\" in:title" \
                    --json number,title \
                    | jq -r --arg t "$CANONICAL_TITLE" '.[] | select(.title == $t) | .number' \
                    | head -1)
            (c) If $N is non-empty, comment on it with a heartbeat note:
                  gh issue comment "$N" --repo "$GITHUB_REPOSITORY" \
                    --body "Re-detected on $(date -u +%Y-%m-%d); still overdue. Heartbeat from campaign-calendar workflow run."
                Do NOT create a new issue. Increment DEDUP.
            (d) If $N is empty, create a new issue (pass title via "$VAR",
                not literal interpolation):
                  gh issue create \
                    --repo "$GITHUB_REPOSITORY" \
                    --title "$CANONICAL_TITLE" \
                    --label "action-required,scheduled-campaign-calendar" \
                    --milestone "Post-MVP / Later" \
                    --body "File: $FILE. Status=$STATUS, publish_date=$PUBLISH_DATE. Reschedule to next Tue/Thu slot, or set status to cancelled."
                Increment NEW.

            Track three counters across STEP 2: NEW (issues created), DEDUP
            (existing issues commented on), OVERDUE (total overdue items
            scanned). Print all three at the end of STEP 2 for visibility.

            STEP 2.5 — Heartbeat audit issue (always runs when no new issues):
            If STEP 2 created zero new issues (NEW == 0) — either all overdue
            items deduped against existing open issues, or no overdue items
            were found — create and immediately close a heartbeat audit issue
            so the watchdog's label-cadence query
            (.github/workflows/scheduled-cloud-task-heartbeat.yml) sees recent
            activity. Capture the URL from gh issue create stdout
            (deterministic; no list-search needed) and pass it to gh issue
            close:
              TITLE="[Scheduled] Campaign Calendar - $(date -u +%Y-%m-%d) (heartbeat)"
              URL=$(gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "$TITLE" \
                --label "scheduled-campaign-calendar" \
                --milestone "Post-MVP / Later" \
                --body "No new overdue items detected this run. Tracking heartbeat.")
              gh issue close "$URL" --repo "$GITHUB_REPOSITORY" --comment "Auto-closed: heartbeat record only."
            If STEP 2 created at least one new issue, skip STEP 2.5 — the new
            issue is itself the heartbeat signal.

            STEP 3 — Update content-strategy review date:
            In knowledge-base/marketing/content-strategy.md, update the
            frontmatter last_reviewed field to today's date (YYYY-MM-DD format).

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add knowledge-base/marketing/campaign-calendar.md knowledge-base/marketing/content-strategy.md
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/campaign-calendar-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "ci: update campaign calendar and content-strategy review"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "ci: update campaign calendar $(date -u +%Y-%m-%d)" \
              --body "Automated commit from campaign calendar workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Campaign Calendar workflow failed'
          body: '<p><strong>Scheduled: Campaign Calendar</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
