# Daily follow-through monitor for external dependencies.
# Scans open issues with the `follow-through` label, runs verification
# predicates (http-200, dns-txt, dns-a), auto-closes on pass, and
# escalates with @-mention after SLA or 30 business day max.
# To test manually: gh workflow run scheduled-follow-through.yml
#
# Security: This workflow does NOT use any untrusted event inputs
# (issue titles, bodies, etc.) in run: commands. All issue content
# is read by the claude-code-action agent via gh CLI, not interpolated
# into shell commands. The label creation step uses only hardcoded strings.

name: "Scheduled: Follow-Through Monitor"

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

concurrency:
  group: schedule-follow-through
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  follow-through-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "follow-through" \
            --description "External dependency awaiting verification" \
            --color "C5DEF5" 2>/dev/null || true
          gh label create "needs-attention" \
            --description "SLA exceeded, requires human action" \
            --color "D93F0B" 2>/dev/null || true

      - name: Monitor follow-through issues
        uses: anthropics/claude-code-action@0432df8bfe0572278dd19bca33be32cdc8061ebb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools Bash,Read,Glob,Grep
          prompt: |
            You are a follow-through monitor agent. Your job is to check open GitHub
            issues labeled `follow-through` and take action based on their verification
            predicates and SLA status.

            ## Instructions

            1. List open follow-through issues:
               `gh issue list --label follow-through --state open --json number,title,body,createdAt,author --jq '.'`

            2. If zero issues are found, output "No open follow-through issues." and stop.

            3. For each issue:

               a. Extract the fenced YAML code block from the issue body. Look for
                  a block between triple-backtick yaml markers. Parse the YAML to get:
                  - `type`: manual, http-200, dns-txt, or dns-a
                  - `sla_business_days`: integer (default 5)
                  - Type-specific fields: `url`, `domain`, `expected`

               b. Calculate BUSINESS DAYS elapsed since `createdAt`. Count only
                  Monday through Friday. Use this bash approach:
                  `python3 -c "from datetime import date; d=(date.today()-date.fromisoformat('YYYY-MM-DD')); bd=sum(1 for i in range(d.days) if (date.fromisoformat('YYYY-MM-DD')+__import__('datetime').timedelta(i)).weekday()<5); print(bd)"`

               c. Run the predicate check based on type:
                  - `manual`: No automated check. Only track SLA.
                  - `http-200`: `curl -s -o /dev/null -w "%{http_code}" "<url>"`
                    Pass if result is "200".
                  - `dns-txt`: `dig +short TXT "<domain>"`
                    Pass if output contains the `expected` value.
                  - `dns-a`: `dig +short A "<domain>"`
                    Pass if output contains the `expected` IP.

               d. Take action based on result. ONLY comment on STATE TRANSITIONS
                  (do NOT add daily "still pending" comments):

                  - PREDICATE PASSES: Close the issue with comment:
                    "Verified: [result details]. Auto-closing."

                  - SLA EXCEEDED (first time — issue does NOT already have
                    `needs-attention` label): Add `needs-attention` label.
                    Comment: "SLA exceeded ([N] business days, limit was [M]).
                    @[author login] — manual intervention required."

                  - MAX POLLING EXCEEDED (30 business days): Add `needs-attention`
                    label. Close the issue with comment: "Maximum polling period
                    reached (30 business days). Stopping automated monitoring.
                    @[author login] — manual intervention required."

                  - WITHIN SLA, NO STATE CHANGE: Do nothing. No comment.

            4. After processing all issues, output a summary table:
               | Issue | Type | Business Days | SLA | Status |

            ## Sharp Edges

            - NEVER modify issue bodies. Only add comments and labels.
            - NEVER create new issues.
            - NEVER close issues unless a predicate passes or 30 business day max
              is exceeded.
            - If `gh` commands fail for an issue, skip it and continue with the rest.
            - If `dig` or `curl` are unavailable, comment: "Predicate check
              unavailable in this environment" and continue.
            - Check if `needs-attention` label already exists on an issue before
              adding it (avoid duplicate label-add API calls).
            - When @-mentioning the author, use the `author.login` field from
              the issue JSON.
