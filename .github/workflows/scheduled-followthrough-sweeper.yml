# Daily sweep of `follow-through` labeled issues. Parses the
# `<!-- soleur:followthrough script=... earliest=... secrets=... -->`
# directive in each open issue body and runs the referenced script with
# only the secrets it declared. Closes with PASS comment on exit 0,
# comments FAIL on exit 1, comments TRANSIENT on any other exit.
#
# Convention: knowledge-base/engineering/operations/runbooks/followthrough-convention.md
#
# Cron `0 18 * * *` (daily 18:00 UTC) — aligns with the issue-body
# convention to express `earliest` in UTC and gives one sweep per
# wall-clock day.
#
# Security model:
#   - Verification scripts MUST live under scripts/followthroughs/ in the
#     repo. The sweeper rejects any other path before exec. This means
#     issue body editors cannot point the runner at arbitrary files.
#   - The sweeper exports ONLY the secrets listed in the directive's
#     `secrets=` clause. Add new secrets here as new follow-throughs
#     declare them.
#   - Issue body content is parsed via awk on stdin (never shell
#     interpolation), then passed to bash as parameter values. Issue
#     creators cannot inject shell commands via body content.
#
# To test manually: gh workflow run scheduled-followthrough-sweeper.yml

name: "Scheduled: Follow-Through Sweeper"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, parse + report but do not comment or close'
        required: false
        type: boolean
        default: false

concurrency:
  group: schedule-followthrough-sweeper
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run sweeper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          # Secrets that one or more verification scripts may declare via
          # the `secrets=` directive clause. Add new ones here when a new
          # follow-through ships needing them.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          # #5875 canary-promotion-5875.sh — GETs /hooks/deploy-status (HMAC + CF-Access).
          WEBHOOK_DEPLOY_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          # #5934 chardevice-wedge-nonrecurrence-5934.sh (and #5110 betterstack-
          # quota-verdict) — Better Stack Telemetry read creds for scripts/
          # betterstack-query.sh (mirror Doppler soleur/prd_terraform). If these GH
          # secrets are not yet provisioned they resolve to "", and the probes are
          # fail-safe TRANSIENT (never a false PASS/close) until they are set.
          BETTERSTACK_QUERY_HOST: ${{ secrets.BETTERSTACK_QUERY_HOST }}
          BETTERSTACK_QUERY_USERNAME: ${{ secrets.BETTERSTACK_QUERY_USERNAME }}
          BETTERSTACK_QUERY_PASSWORD: ${{ secrets.BETTERSTACK_QUERY_PASSWORD }}
          # #6438 l3-probe-armed-6438.sh — Better Stack heartbeats API (uptime.betterstack.com
          # /api/v2/heartbeats) read for the web-1 private-net probe soak (mirror Doppler
          # soleur/prd_terraform BETTERSTACK_API_TOKEN). Distinct from the QUERY_* Logs creds
          # above (ClickHouse); this is the account-wide uptime API token. Fail-safe TRANSIENT
          # (never a false PASS/close) if unset.
          BETTERSTACK_API_TOKEN: ${{ secrets.BETTERSTACK_API_TOKEN }}
          # #6168 autovacuum-thrash-6168.sh — read-only pg_stat_all_tables query
          # against prod via the Supabase Management API (soak gate for PR #6164).
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/sweep-followthroughs.sh
