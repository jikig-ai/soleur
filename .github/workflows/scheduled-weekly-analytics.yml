# Scheduled weekly analytics snapshot.
# Pulls metrics from Plausible Analytics API v1 and commits a markdown
# snapshot to knowledge-base/marketing/analytics/.
#
# Schedule: Every Monday at 06:00 UTC.
# Manual trigger: workflow_dispatch (no inputs).
#
# Required secrets:
#   PLAUSIBLE_API_KEY  - Plausible API key
#   PLAUSIBLE_SITE_ID  - Site ID (typically the domain, e.g. soleur.ai)
#   RESEND_API_KEY     - Resend API key for email failure notifications
#
# Security: No external code execution. Shell script + curl + jq only.
#   No untrusted input is used in run: commands -- all inputs come from
#   repository secrets (not event payloads). server_url and repository are
#   safe GitHub context values (not user-controlled).

name: "Scheduled: Weekly Analytics"

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: weekly-analytics
  cancel-in-progress: false

permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Generate analytics snapshot
        id: analytics
        env:
          PLAUSIBLE_API_KEY: ${{ secrets.PLAUSIBLE_API_KEY }}
          PLAUSIBLE_SITE_ID: ${{ secrets.PLAUSIBLE_SITE_ID }}
        run: bash scripts/weekly-analytics.sh

      - name: Email notification (KPI miss)
        if: steps.analytics.outputs.kpi_miss == 'true'
        continue-on-error: true
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[ALERT] Weekly Analytics: KPI Miss'
          body: '<p><strong>Weekly Analytics: KPI Miss</strong></p><p>Phase: ${{ steps.analytics.outputs.kpi_phase }}<br>Target: ${{ steps.analytics.outputs.kpi_target }} WoW<br>Actual: ${{ steps.analytics.outputs.kpi_actual }} WoW<br>Visitors: ${{ steps.analytics.outputs.kpi_visitors }}</p><p><a href="${{ github.server_url }}/${{ github.repository }}/tree/main/knowledge-base/marketing/analytics">Dashboard</a></p><p>Remediation: SEO audit, growth execution, and content generator workflows will be dispatched.</p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Dispatch CMO remediation workflows
        if: steps.analytics.outputs.kpi_miss == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run scheduled-seo-aeo-audit.yml || echo "::warning::Failed to dispatch scheduled-seo-aeo-audit.yml"
          gh workflow run scheduled-growth-execution.yml || echo "::warning::Failed to dispatch scheduled-growth-execution.yml"
          gh workflow run scheduled-content-generator.yml || echo "::warning::Failed to dispatch scheduled-content-generator.yml"

      - name: Create PR with snapshot
        uses: ./.github/actions/bot-pr-with-synthetic-checks
        with:
          add-paths: knowledge-base/marketing/analytics/
          branch-prefix: ci/weekly-analytics-
          commit-message: "ci: weekly analytics snapshot"
          pr-title-prefix: "ci: weekly analytics snapshot"
          pr-body: "Automated weekly analytics snapshot from Plausible API."
          change-summary: "Analytics snapshot only, no code changes"
          gh-token: ${{ github.token }}

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Weekly Analytics workflow failed'
          body: '<p><strong>Scheduled: Weekly Analytics</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
