# Backup monitor: check CF Access service token expiry via Cloudflare API.
# Primary alert is the Terraform-managed cloudflare_notification_policy.
# This workflow catches cases where the CF notification is missed.
#
# Security: CF_API_TOKEN from repository secrets (not user-controlled).
# CF_ACCOUNT_ID is a non-secret repository variable.
# No untrusted user input is used in run: commands.

name: "Scheduled: CF Token Expiry Check"

on:
  workflow_dispatch:
  # Add cron after validating the workflow works end-to-end:
  # schedule:
  #   - cron: '0 9 * * 1'  # Monday 09:00 UTC

concurrency:
  group: scheduled-cf-token-expiry-check
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  check-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sentry check-in (in_progress)
        if: always()
        continue-on-error: true
        env:
          SENTRY_INGEST_DOMAIN: ${{ secrets.SENTRY_INGEST_DOMAIN }}
          SENTRY_PROJECT_ID: ${{ secrets.SENTRY_PROJECT_ID }}
          SENTRY_PUBLIC_KEY: ${{ secrets.SENTRY_PUBLIC_KEY }}
          MONITOR_SLUG: scheduled-cf-token-expiry-check
        run: |
          set -u
          if [[ -z "${SENTRY_INGEST_DOMAIN:-}" || -z "${SENTRY_PROJECT_ID:-}" || -z "${SENTRY_PUBLIC_KEY:-}" ]]; then
            echo "::warning::Sentry Crons secrets not configured; skipping check-in."
            exit 0
          fi
          resp=$(curl --max-time 10 -fSs -X POST \
            "https://${SENTRY_INGEST_DOMAIN}/api/${SENTRY_PROJECT_ID}/cron/${MONITOR_SLUG}/${SENTRY_PUBLIC_KEY}/?status=in_progress" || true)
          if [[ -n "$resp" ]]; then
            printf '%s' "$resp" | jq -r '.id // empty' > "${RUNNER_TEMP}/sentry-checkin-id-${MONITOR_SLUG}" || true
          fi
      - name: Check service token expiry
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          WARN_DAYS: "30"
          TOKEN_NAME: "github-actions-deploy"
        run: |
          set -euo pipefail

          TMPFILE=$(mktemp)
          trap 'rm -f "$TMPFILE"' EXIT

          if [[ -z "${CF_API_TOKEN:-}" ]]; then
            echo "::warning::CF_API_TOKEN secret is not set. Skipping check."
            exit 0
          fi

          if [[ -z "${CF_ACCOUNT_ID:-}" ]]; then
            echo "::warning::CF_ACCOUNT_ID variable is not set. Skipping check."
            exit 0
          fi

          # List service tokens
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/access/service_tokens")

          if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
            echo "::warning::Cloudflare API returned HTTP $HTTP_CODE. Token status unknown."
            exit 0
          fi

          # Validate body is JSON before any jq -r call. Cloudflare's API is
          # normally reliable, but edge incidents and rate-limit HTML pages have
          # been observed. Under set -euo pipefail, a jq parse error would crash
          # this single-shot check and create a false operator signal.
          # See AGENTS.md cq-ci-steps-polling-json-endpoints-under (#2214, #2236).
          if ! jq -e . "$TMPFILE" >/dev/null 2>&1; then
            echo "::warning::Cloudflare API returned non-JSON body on HTTP $HTTP_CODE. Skipping this check -- will retry next cron."
            exit 0
          fi

          # Find the deploy token by name
          EXPIRES_AT=$(jq -r \
            --arg name "$TOKEN_NAME" \
            '.result[] | select(.name == $name) | .expires_at // empty' \
            "$TMPFILE")

          if [[ -z "$EXPIRES_AT" ]]; then
            echo "::warning::Service token '$TOKEN_NAME' not found in API response."
            exit 0
          fi

          # Validate ISO 8601 format before passing to date
          if [[ ! "$EXPIRES_AT" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2} ]]; then
            echo "::error::Unexpected date format from API: '$EXPIRES_AT'"
            exit 1
          fi

          # Calculate days remaining (ISO 8601 -> epoch)
          EXPIRES_EPOCH=$(date -d "$EXPIRES_AT" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_REMAINING=$(( (EXPIRES_EPOCH - NOW_EPOCH) / 86400 ))

          echo "Token '$TOKEN_NAME' expires at $EXPIRES_AT ($DAYS_REMAINING days remaining)."

          ISSUE_TITLE="[Action Required] Cloudflare deploy service token expiring"
          ISSUE_SEARCH="in:title \"[Action Required] Cloudflare deploy service token\""

          if [[ "$DAYS_REMAINING" -le "$WARN_DAYS" ]]; then
            echo "::warning::Token expires in $DAYS_REMAINING days (threshold: $WARN_DAYS)."

            BODY=$(cat <<ISSUE_BODY
          ## Cloudflare Deploy Service Token Expiring

          The \`github-actions-deploy\` service token expires on **$EXPIRES_AT** ($DAYS_REMAINING days remaining).

          When expired, all deploys via \`web-platform-release.yml\` will fail with HTTP 403.

          ### What to do

          Follow the [rotation runbook](https://github.com/${GH_REPO}/blob/main/knowledge-base/engineering/ops/runbooks/cloudflare-service-token-rotation.md) for renewal steps.

          **References:** #974
          ISSUE_BODY
          )

            # Dedup: check for existing open issue
            EXISTING=$(gh issue list --repo "$GH_REPO" --state open \
              --search "$ISSUE_SEARCH" \
              --json number --jq '.[0].number // empty')

            if [[ -n "$EXISTING" ]]; then
              echo "Issue already exists: #$EXISTING -- adding comment."
              gh issue comment "$EXISTING" --repo "$GH_REPO" \
                --body "Token check ran $(date -u '+%Y-%m-%d %H:%M UTC') -- $DAYS_REMAINING days remaining."
            else
              # Pre-create label if missing
              gh label create "action-required" --repo "$GH_REPO" \
                --description "Requires manual intervention" --color "B60205" 2>/dev/null || true
              gh issue create --repo "$GH_REPO" \
                --title "$ISSUE_TITLE" \
                --label "action-required" \
                --milestone "Post-MVP / Later" \
                --body "$BODY"
            fi
          else
            echo "Token is healthy ($DAYS_REMAINING days remaining)."

            # Close stale renewal issues
            STALE=$(gh issue list --repo "$GH_REPO" --state open \
              --search "$ISSUE_SEARCH" \
              --json number --jq '.[0].number // empty')

            if [[ -n "$STALE" ]]; then
              echo "Closing stale renewal issue #$STALE."
              gh issue close "$STALE" --repo "$GH_REPO" \
                --comment "Token check ran $(date -u '+%Y-%m-%d %H:%M UTC') -- $DAYS_REMAINING days remaining. Auto-closing."
            fi
          fi

      - name: Sentry check-in (ok)
        if: success()
        continue-on-error: true
        env:
          SENTRY_INGEST_DOMAIN: ${{ secrets.SENTRY_INGEST_DOMAIN }}
          SENTRY_PROJECT_ID: ${{ secrets.SENTRY_PROJECT_ID }}
          SENTRY_PUBLIC_KEY: ${{ secrets.SENTRY_PUBLIC_KEY }}
          MONITOR_SLUG: scheduled-cf-token-expiry-check
        run: |
          set -u
          if [[ -z "${SENTRY_INGEST_DOMAIN:-}" ]]; then exit 0; fi
          CHECKIN_ID=$(cat "${RUNNER_TEMP}/sentry-checkin-id-${MONITOR_SLUG}" 2>/dev/null || true)
          if [[ -n "${CHECKIN_ID}" ]]; then
            curl --max-time 10 -fSs -X PUT \
              "https://${SENTRY_INGEST_DOMAIN}/api/${SENTRY_PROJECT_ID}/cron/${MONITOR_SLUG}/${SENTRY_PUBLIC_KEY}/${CHECKIN_ID}/?status=ok" || true
          fi

      - name: Sentry check-in (error)
        if: failure()
        continue-on-error: true
        env:
          SENTRY_INGEST_DOMAIN: ${{ secrets.SENTRY_INGEST_DOMAIN }}
          SENTRY_PROJECT_ID: ${{ secrets.SENTRY_PROJECT_ID }}
          SENTRY_PUBLIC_KEY: ${{ secrets.SENTRY_PUBLIC_KEY }}
          MONITOR_SLUG: scheduled-cf-token-expiry-check
        run: |
          set -u
          if [[ -z "${SENTRY_INGEST_DOMAIN:-}" ]]; then exit 0; fi
          CHECKIN_ID=$(cat "${RUNNER_TEMP}/sentry-checkin-id-${MONITOR_SLUG}" 2>/dev/null || true)
          if [[ -n "${CHECKIN_ID}" ]]; then
            curl --max-time 10 -fSs -X PUT \
              "https://${SENTRY_INGEST_DOMAIN}/api/${SENTRY_PROJECT_ID}/cron/${MONITOR_SLUG}/${SENTRY_PUBLIC_KEY}/${CHECKIN_ID}/?status=error" || true
          fi
