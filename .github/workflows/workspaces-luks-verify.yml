# #6604 — the /workspaces LUKS at-rest VERIFY workflow (the no-SSH runbook artifact).
#
# READ-ONLY. workflow_dispatch-only. This is the discoverability_test the runbook points at instead
# of "log in and check" (hr-no-ssh-fallback-in-runbooks): over the CF Tunnel SSH bridge it runs the
# SAME probe logic as the daily luks-monitor.sh (DP-11 — DRY, not a bespoke reimplementation), plus
# an app-level liveness probe of /health, the mount-coupled /internal/readyz assert, and the
# workspace INVENTORY comparison, then prints the discriminating fields.
#
# NON-DESTRUCTIVE, but not literally "mutates nothing" (#6807): the readyz assert reaches
# server/readiness.ts:isWorkspacesWritable, which write+unlinks one 48-bit-random probe FILE at the
# workspaces root. That is the only way to detect a read-only or failed volume attach from inside
# the container (the classic st_dev mountpoint check is inert over a docker bind mount), and the
# probe is a regular file, so countWorkspaceDirsAt's isDirectory() filter excludes it from the
# inventory even in the window before the unlink. No freeze, no flip, no wipe, no device is opened.
# The destructive cutover is a separate, environment-gated workflow (workspaces-luks-cutover.yml).
#
# #6807 — this workflow was STRUCTURALLY INCAPABLE OF PASSING before that fix: it asserted 200 on
# the API-PREFIXED health path, which has no route, so it fell through to middleware and 307'd to
# /login. Observed live as a 307 on run 29783424497, against a cutover (run 29782780158) that had
# in fact SUCCEEDED. The runbook §5 gate was dead for as long as that assertion stood. /health is
# the correct endpoint: it is served by the CUSTOM SERVER (server/index.ts), which intercepts
# before Next.js routing.
#
# The literal API-prefixed spelling is deliberately ABSENT from this file, comments included: the
# workspaces-luks-freeze.test.sh gate greps this workflow WITHOUT stripping comments, precisely so a
# stale prose claim cannot outlive the assertion it describes.
#
# Reach model: the GH runner egress IP is not in var.admin_ips, so it reaches web-1 over the CF
# Tunnel SSH bridge (.github/actions/cf-tunnel-ssh-bridge) — the same path apply-web-platform-infra
# and git-data-cutover use. Creds are held here in GitHub secrets; nothing is held on the host.

name: workspaces-luks verify (#6604 read-only re-assert)

on:
  workflow_dispatch:
    inputs:
      seed_workspace_count:
        description: >-
          ONE-TIME baseline seed. Digits only. Writes WORKSPACES_COUNT=<n> to the host state file
          BEFORE the assert runs. Leave EMPTY for every normal verify. Only needed because the
          2026-07-20 cutover predates the persist_state call that now records this automatically
          (workspaces-cutover.sh, C1 gate), so the live host carries no baseline and the
          fail-closed comparison has no operand.
          The value must come from an INDEPENDENT proof of the inventory, never from the host's
          own live count — seeding from the live count would make the comparison compare a number
          to itself and certify any shrink green. For web-1 the independent proof is the C1
          byte-identity differential of run 29782780158 (total=8, every workspace dst_rc=0),
          measured BEFORE the repoint.
        required: false
        type: string
        default: ""

concurrency:
  # Read-only, but serialize dispatches so two verifies do not interleave their SSH sessions.
  group: workspaces-luks-verify
  cancel-in-progress: false

permissions:
  contents: read

env:
  INFRA_DIR: apps/web-platform/infra
  CLOUDFLARED_VERSION: "2026.5.0"
  CLOUDFLARED_SHA256: "0095e46fdc88855d801c4d304cb1f5dd4bd656116c47ab94c2ad0ae7cda1c7ec"
  # web-1 private IP — single source for BOTH the bridge `server-ip` (NAT redirect
  # scope) and the probe `WEB_HOST` (dial target); they MUST match.
  WEB_HOST_PRIVATE_IP: "10.0.1.10"

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "$DOPPLER_TOKEN_CHECK" ]] || { echo "::error::DOPPLER_TOKEN not configured."; exit 1; }

      - name: CF Tunnel SSH bridge
        uses: ./.github/actions/cf-tunnel-ssh-bridge
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          infra-dir: ${{ env.INFRA_DIR }}
          cloudflared-version: ${{ env.CLOUDFLARED_VERSION }}
          cloudflared-sha256: ${{ env.CLOUDFLARED_SHA256 }}
          # server-ip == WEB_HOST (10.0.1.10): scopes the NAT redirect to the
          # address the probe SSHes to + enables the WEB_HOST_SSH export. No
          # infra-state read here. Single-sourced from env.WEB_HOST_PRIVATE_IP.
          server-ip: ${{ env.WEB_HOST_PRIVATE_IP }}

      - name: Re-assert /workspaces LUKS at-rest (read-only)
        env:
          # The bridge exports WEB_HOST_SSH as the exact ssh invocation (key -i <keyfile> + the
          # iptables NAT redirect scoped to server-ip; no ProxyCommand — the Go/bash client dials
          # 10.0.1.10:22 which the kernel redirects to the local cloudflared forward).
          WEB_HOST: ${{ env.WEB_HOST_PRIVATE_IP }}
          # prd_workspaces_luks-scoped boot token — luks-monitor.sh reads WORKSPACES_LUKS_KEY via
          # `doppler … --config prd_workspaces_luks`, so it needs this token. Delivered via a 0600
          # stdin .env (same discipline as the cutover), NEVER argv. Published by the DEFAULT apply.
          WORKSPACES_LUKS_BOOT_TOKEN: ${{ secrets.WORKSPACES_LUKS_BOOT_TOKEN }}
          # Via env:, never inlined into the run: body — a workflow_dispatch input is
          # attacker-influenceable in the general case and `${{ }}` inside run: is textual
          # substitution, i.e. shell injection. It is additionally validated digits-only below
          # before it is ever allowed near the SSH command string.
          SEED_WORKSPACE_COUNT: ${{ inputs.seed_workspace_count }}
        run: |
          # set +e so a failing probe is captured in probe_rc (and reported) rather than exiting the
          # step at the ssh line under GitHub's inherited `-e` (which `set -uo pipefail` does not clear).
          set +e
          set -uo pipefail
          # Fail loud if the bridge did not export WEB_HOST_SSH (bare ssh would connect keyless).
          [[ -n "${WEB_HOST_SSH:-}" ]] || { echo "::error::CF Tunnel SSH bridge did not export WEB_HOST_SSH — cannot reach web-1. Check the bridge step logs."; exit 1; }
          [[ -n "${WORKSPACES_LUKS_BOOT_TOKEN:-}" ]] || { echo "::error::WORKSPACES_LUKS_BOOT_TOKEN not configured — run the DEFAULT apply of apply-web-platform-infra.yml to publish it (#6649)."; exit 1; }
          # Ship luks-monitor.sh + its emit sibling to a temp dir on the PERSISTENT STATE_DIR and run
          # it AS A FILE (read-only; MUTATES NOTHING — it opens no device). This removes the
          # dependency on a prior cutover having installed /usr/local/bin/luks-monitor AND, unlike the
          # old `sudo /usr/local/bin/luks-monitor`, delivers the boot token the probe needs (the
          # installed binary has no EnvironmentFile in this SSH session). No sudo: WEB_HOST_SSH lands
          # `-l root` (sudo's env_reset would scrub HOME + the sourced .env). Boot token via 0600
          # stdin .env, shredded on a host-local EXIT trap — same discipline as the cutover.
          # shellcheck disable=SC2086
          REMOTE_DIR="$(${WEB_HOST_SSH} "$WEB_HOST" 'mkdir -p /var/lib/workspaces-luks && chmod 700 /var/lib/workspaces-luks && mktemp -d /var/lib/workspaces-luks/wl-verify.XXXXXX')"
          [[ -n "$REMOTE_DIR" ]] || { echo "::error::failed to create the remote bundle dir on web-1"; exit 1; }
          echo "REMOTE_DIR=$REMOTE_DIR" >> "$GITHUB_ENV"
          # shellcheck disable=SC2086
          tar czf - -C "$INFRA_DIR" luks-monitor.sh workspaces-luks-emit.sh \
            | ${WEB_HOST_SSH} "$WEB_HOST" "tar xzf - -C '$REMOTE_DIR'"
          # WEB_HOST_SSH is guaranteed set past the guard above (no :-ssh fallback).
          # shellcheck disable=SC2086
          # ONE-TIME baseline seed (see the input's description). Digits-only validation happens
          # BEFORE the value is allowed anywhere near the SSH command string; a rejected value fails
          # the run rather than being silently dropped, so a typo cannot look like "no seed
          # requested". Appended, and read back with `tail -1`, matching persist_state's semantics
          # in workspaces-cutover.sh:170 — the state file is append-only with last-write-wins.
          if [[ -n "${SEED_WORKSPACE_COUNT:-}" ]]; then
            case "$SEED_WORKSPACE_COUNT" in
              ''|*[!0-9]*)
                echo "::error::seed_workspace_count must be digits only (got a non-numeric value). Refusing to write a malformed baseline."
                exit 1 ;;
            esac
            # shellcheck disable=SC2086
            ${WEB_HOST_SSH} "$WEB_HOST" "mkdir -p /var/lib/workspaces-luks && chmod 700 /var/lib/workspaces-luks && printf 'WORKSPACES_COUNT=%s\n' '$SEED_WORKSPACE_COUNT' >> /var/lib/workspaces-luks/state" \
              || { echo "::error::failed to seed the workspace-inventory baseline on web-1"; exit 1; }
            echo "::warning::SEEDED the workspace-inventory baseline to WORKSPACES_COUNT=$SEED_WORKSPACE_COUNT on this run. The comparison below is only meaningful because this value comes from an INDEPENDENT proof (the C1 differential of run 29782780158), not from the host's own live count. Future cutovers persist it automatically."
          fi

          # LUKS_MONITOR_ASSERT_READYZ rides the .env that is ALREADY `set -a`-sourced on the host,
          # NOT the triple-nested quoting of the ssh command string. If the flag were lost in that
          # nest, luks-monitor.sh would exit 0 having never probed readyz and this workflow would
          # print PASSED — byte-for-byte the silent-green shape #6807 exists to remove. The verdict
          # grep below is the positive control that makes a lost flag FAIL rather than pass.
          probe_log="${RUNNER_TEMP:-/tmp}/luks-monitor-probe.log"
          printf 'DOPPLER_TOKEN=%s\nLUKS_MONITOR_ASSERT_READYZ=1\n' "$WORKSPACES_LUKS_BOOT_TOKEN" \
            | ${WEB_HOST_SSH} "$WEB_HOST" "bash -c 'install -m600 /dev/stdin \"$REMOTE_DIR/.env\"; trap \"shred -u \\\"$REMOTE_DIR/.env\\\" 2>/dev/null || rm -f \\\"$REMOTE_DIR/.env\\\"\" EXIT; set -a; . \"$REMOTE_DIR/.env\"; set +a; bash \"$REMOTE_DIR/luks-monitor.sh\"'" \
            > "$probe_log" 2>&1
          probe_rc=$?
          cat "$probe_log"
          echo "luks-monitor probe rc=$probe_rc"

          # App-level liveness over the full public HTTPS path, RETRIED to an attempt bound.
          #
          # This is the one probe in the feature that cannot share the on-host helper
          # (workspaces-luks-emit.sh :: wl_probe_http) — it runs on the RUNNER, which has no copy of
          # the host code. The shapes are kept identical deliberately and the duplication is
          # asserted only by grep, never by behaviour; do not let them drift.
          #
          # STRUCTURAL codes fail fast (no retry burn); everything else retries. 521/530 are CF-edge
          # codes emitted while the tunnel connector reattaches after a container restart, and they
          # are FAST responses — which is why the old single-shot probe's `--max-time 20` never
          # helped: the budget is never consumed by an instant 521.
          health=000
          for attempt in $(seq 1 10); do
            health=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 https://app.soleur.ai/health || echo "000")
            case "$health" in
              200) break ;;
              307|401|403|404|405|525|526)
                echo "::error::app /health returned a STRUCTURAL $health — an endpoint/routing regression, not a boot race. Not retrying."
                break ;;
            esac
            echo "app /health=$health (attempt $attempt/10)"
            if [[ "$attempt" -lt 10 ]]; then sleep 3; fi
          done
          echo "app /health=$health"

          # rc 255 is ssh's OWN transport failure code (bridge down, connection dropped). It is NOT
          # an at-rest drift verdict, and no Sentry event exists for it — the old single error
          # message told the operator to go read one that was never emitted.
          if [[ "$probe_rc" -eq 255 ]]; then
            echo "::error::SSH transport failure (rc=255) reaching web-1 over the CF Tunnel bridge. This is a REACHABILITY failure, NOT an at-rest drift finding: no Sentry event was emitted and NOTHING has been proven about the volume either way. Check the bridge step logs and re-dispatch."
            exit 255
          fi
          if [[ "$probe_rc" -eq 2 ]]; then
            echo "::error::workspaces-luks READINESS/INVENTORY assert FAILED (rc=2). The volume is a correct LUKS mapper, but the application cannot serve from it or the workspace inventory shrank. Read the FAIL line above for the reason code, then follow the verdict triage table in knowledge-base/engineering/operations/runbooks/workspaces-luks-cutover-6604.md §5 — a capacity fault (ENOSPC/EROFS) and a count shortfall have DIFFERENT operator responses. Sentry: feature=workspaces-luks op=workspaces-luks-drift."
            exit 2
          fi
          if [[ "$probe_rc" -ne 0 ]]; then
            echo "::error::workspaces-luks AT-REST re-assert FAILED (rc=$probe_rc) — see the emitted Sentry event: feature=workspaces-luks op=workspaces-luks-drift."
            exit "$probe_rc"
          fi
          if [[ "$health" != "200" ]]; then
            echo "::error::app /health returned $health (expected 200) after the full retry budget."
            exit 1
          fi
          # POSITIVE CONTROL — assert the verdict line is PRESENT, not merely that nothing errored.
          # A silently-skipped assert exits 0, so "no error" is exactly what a lost flag looks like.
          # `grep -c` on a FILE, never `cmd | grep -q`: under `pipefail` an early match SIGPIPEs the
          # producer for 141 and the negative arm fails OPEN.
          if [[ "$(grep -cE '^\[luks-monitor\] SOLEUR_WORKSPACES_READYZ ready=true ' "$probe_log" || true)" -lt 1 ]]; then
            echo "::error::the readiness/inventory verdict line is ABSENT from the probe output. The assert did not run (LUKS_MONITOR_ASSERT_READYZ was lost before reaching luks-monitor.sh), so this run proves NOTHING about whether the repointed volume is serving user data. Treat as FAILED, not passed."
            exit 1
          fi
          grep -E '^\[luks-monitor\] SOLEUR_WORKSPACES_READYZ ' "$probe_log" || true
          echo "workspaces-luks re-assert PASSED (blkid=crypto_LUKS, mapper mount, escrow ok, /health 200, readyz ready=true, workspace inventory >= baseline)."

      - name: Remove remote verify bundle
        if: always()
        env:
          WEB_HOST: ${{ env.WEB_HOST_PRIVATE_IP }}
        # Belt-and-suspenders: the .env is shredded by the host-local EXIT trap even on an SSH drop;
        # this removes the (script-only, non-secret) bundle dir. REMOTE_DIR is exported to GITHUB_ENV
        # by the Re-assert step; empty if that step never created it.
        run: |
          set +e
          if [[ -n "${WEB_HOST_SSH:-}" && -n "${REMOTE_DIR:-}" ]]; then
            # shellcheck disable=SC2086
            ${WEB_HOST_SSH} "$WEB_HOST" "rm -rf '$REMOTE_DIR'" 2>/dev/null || true
          fi

      - name: Tear down cloudflared SSH bridge
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${SERVER_IP:-}" ]]; then
            sudo iptables -t nat -D OUTPUT -d "$SERVER_IP" -p tcp --dport 22 \
              -j REDIRECT --to-ports 2222 2>/dev/null || true
          fi
          if [[ -n "${CLOUDFLARED_PID:-}" ]]; then
            kill "$CLOUDFLARED_PID" 2>/dev/null || true
          fi
          if [[ -n "${CI_SSH_KEYFILE:-}" && -f "$CI_SSH_KEYFILE" ]]; then
            shred -u "$CI_SSH_KEYFILE" 2>/dev/null || true
          fi
          if [[ -f /tmp/cloudflared.log ]]; then tail -n 200 /tmp/cloudflared.log || true; fi

      - name: Verify summary
        if: always()
        env:
          ACTOR: ${{ github.actor }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## workspaces-luks verify (read-only)"
            echo ""
            echo "**Actor:** ${ACTOR}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
            echo ""
            echo "Re-assert of /mnt/data == LUKS mapper + escrow + /health + /internal/readyz + workspace inventory."
            echo "Non-destructive: no freeze, no flip, no wipe. The readyz check write+unlinks one random probe file."
          } >> "$GITHUB_STEP_SUMMARY"
