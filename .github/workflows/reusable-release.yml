name: Reusable Release

on:
  workflow_call:
    inputs:
      component:
        description: "Component identifier (e.g., plugin, web-platform)"
        type: string
        required: true
      component_display:
        description: "Human-readable name for notifications (e.g., Soleur Web Platform)"
        type: string
        required: true
      path_filter:
        description: "Space-separated list of git pathspecs to detect changes (e.g., 'apps/web-platform/' or 'apps/web-platform/ plugins/soleur/ :(exclude)plugins/soleur/docs/'). No embedded spaces within a token; filesystem globbing is disabled in check_changed, so use git directory-prefix + :(exclude) magic, NOT ** globs."
        type: string
        required: true
      tag_prefix:
        description: "Git tag prefix (e.g., v, web-v)"
        type: string
        required: true
      docker_image:
        description: "Docker image name (empty = skip Docker build)"
        type: string
        default: ""
      docker_context:
        description: "Docker build context path (e.g., apps/web-platform)"
        type: string
        default: ""
      bump_type:
        description: "Override bump type (empty = use PR labels)"
        type: string
        default: ""
      force_run:
        description: "Skip path change detection (for workflow_dispatch)"
        type: boolean
        default: false
      vendor_plugin:
        description: "Vendor plugins/soleur into <docker_context>/_plugin-vendored before docker build (#3045)"
        type: boolean
        default: false
    outputs:
      version:
        description: "Computed version without prefix (e.g., 0.1.1)"
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: "Full git tag (e.g., web-v0.1.1)"
        value: ${{ jobs.release.outputs.tag }}
      released:
        description: "Whether a release was created (true/false)"
        value: ${{ jobs.release.outputs.released }}
      docker_pushed:
        description: "Whether Docker image was built and pushed (true/false)"
        value: ${{ jobs.release.outputs.docker_pushed }}

concurrency:
  group: release-${{ inputs.component }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.next }}
      tag: ${{ steps.version.outputs.tag }}
      # released=true when a new git tag is materialized this run: a fresh draft
      # was created (create_release) OR an orphaned draft is re-published by the
      # Finalise step (idempotency.draft_exists). An already-published release
      # yields false (no new tag). Refs #4902.
      released: ${{ steps.create_release.outputs.released == 'true' || steps.idempotency.outputs.draft_exists == 'true' }}
      docker_pushed: ${{ steps.docker_pushed.outputs.pushed || 'false' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2
          token: ${{ github.token }}

      - name: Fetch all tags
        run: git fetch --tags

      - name: Check if component files changed
        id: check_changed
        run: |
          set -euo pipefail
          if [ "$FORCE_RUN" = "true" ]; then
            printf 'changed=%s\n' "true" >> "$GITHUB_OUTPUT"
            echo "Release forced (workflow_dispatch or force_run)"
            exit 0
          fi

          # PATH_FILTER is a SPACE-SEPARATED list of git pathspecs (may include
          # :(exclude) magic). Disable filesystem globbing so the tokens reach git
          # verbatim (an unquoted `**` would be shell-expanded and silently miss
          # newly-added files — the incident's failure mode), then intentionally
          # word-split PATH_FILTER into multiple pathspec args.
          set -f
          # shellcheck disable=SC2086  # deliberate word-split into git pathspecs
          if ! CHANGED=$(git diff --name-only HEAD~1 -- $PATH_FILTER); then
            echo "::error::check_changed: git diff failed for PATH_FILTER='$PATH_FILTER'"
            exit 1
          fi
          set +f

          if [ -z "$CHANGED" ]; then
            printf 'changed=%s\n' "false" >> "$GITHUB_OUTPUT"
            echo "No $COMPONENT files changed, skipping"
          else
            printf 'changed=%s\n' "true" >> "$GITHUB_OUTPUT"
            echo "$COMPONENT files changed, proceeding"
          fi
        env:
          FORCE_RUN: ${{ inputs.force_run }}
          PATH_FILTER: ${{ inputs.path_filter }}
          COMPONENT: ${{ inputs.component }}

      - name: Create secure temp files
        if: steps.check_changed.outputs.changed == 'true'
        id: tmpfiles
        run: |
          printf 'pr_body=%s\n' "$(mktemp)" >> "$GITHUB_OUTPUT"
          printf 'release_notes=%s\n' "$(mktemp)" >> "$GITHUB_OUTPUT"
          printf 'gh_err=%s\n' "$(mktemp)" >> "$GITHUB_OUTPUT"

      - name: Find merged PR
        if: steps.check_changed.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_BODY_FILE: ${{ steps.tmpfiles.outputs.pr_body }}
        run: |
          give_up() {
            local reason="$1"
            echo "::warning::${reason}, using commit message as title"
            printf 'number=\n' >> "$GITHUB_OUTPUT"
            printf 'title=%s\n' "$(echo "$COMMIT_MSG" | head -1 | tr -d '\n\r')" >> "$GITHUB_OUTPUT"
            printf 'labels=\n' >> "$GITHUB_OUTPUT"
            echo "" > "$PR_BODY_FILE"
            printf 'body_file=%s\n' "$PR_BODY_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf 'number=\n' >> "$GITHUB_OUTPUT"
            printf 'title=%s\n' "Manual version bump" >> "$GITHUB_OUTPUT"
            printf 'labels=\n' >> "$GITHUB_OUTPUT"
            echo "" > "$PR_BODY_FILE"
            printf 'body_file=%s\n' "$PR_BODY_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUM=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -z "$PR_NUM" ]; then
            echo "::notice::API lookup returned empty, falling back to commit message parsing"
            PR_NUM=$(echo "$COMMIT_MSG" | head -1 | grep -oP '\(#\K\d+(?=\))' || true)
          fi

          if [ -n "$PR_NUM" ] && ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "::warning::PR_NUM '$PR_NUM' is not a valid integer"
            PR_NUM=""
          fi

          [ -z "$PR_NUM" ] && give_up "No PR number found"

          PR_JSON=$(gh pr view "$PR_NUM" --json number,title,labels,body 2>/dev/null) \
            || give_up "#$PR_NUM is not a PR"

          printf 'number=%s\n' "$PR_NUM" >> "$GITHUB_OUTPUT"
          printf 'title=%s\n' "$(echo "$PR_JSON" | jq -r '.title' | tr -d '\n\r')" >> "$GITHUB_OUTPUT"
          printf 'labels=%s\n' "$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")' | tr -d '\n\r')" >> "$GITHUB_OUTPUT"
          echo "$PR_JSON" | jq -r '.body // ""' > "$PR_BODY_FILE"
          printf 'body_file=%s\n' "$PR_BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Determine bump type
        if: steps.check_changed.outputs.changed == 'true'
        id: bump
        env:
          BUMP_TYPE_INPUT: ${{ inputs.bump_type }}
          PR_LABELS: ${{ steps.pr.outputs.labels }}
        run: |
          # Direct override from caller (workflow_dispatch passthrough)
          if [ -n "$BUMP_TYPE_INPUT" ]; then
            printf 'type=%s\n' "$BUMP_TYPE_INPUT" >> "$GITHUB_OUTPUT"
            echo "Bump type from input: $BUMP_TYPE_INPUT"
            exit 0
          fi

          if echo "$PR_LABELS" | grep -q "semver:major"; then
            printf 'type=%s\n' "major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "semver:minor"; then
            printf 'type=%s\n' "minor" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "semver:patch"; then
            printf 'type=%s\n' "patch" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No semver label found on PR, defaulting to patch"
            printf 'type=%s\n' "patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.check_changed.outputs.changed == 'true'
        id: version
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
        run: |
          # Escape regex metacharacters in the caller-supplied prefix so the
          # anchored post-filter below stays correct if a future caller passes
          # a prefix containing `.`, `+`, `*`, `(`, etc. Today's callers pass
          # `v`, `web-v`, `telegram-v` (metachar-free); the escape is defense
          # in depth.
          TAG_PREFIX_RE=$(printf '%s' "$TAG_PREFIX" | sed 's/[][\\.^$*+?(){}|/]/\\&/g')

          # Glob is fnmatch-style (cheap pre-filter); anchored regex enforces
          # strict ${TAG_PREFIX}X.Y.Z shape so collisions like `vinngest-v1.0.0`
          # under the bare `v` prefix are rejected (#4082). `grep -m1` over
          # `head -1` avoids SIGPIPE if the corpus ever exceeds the kernel pipe
          # buffer. `|| [ $? -eq 1 ]` lets the existing empty-fallback below
          # fire on no-match (grep exit 1, bootstrap of a new prefix) WITHOUT
          # masking grep exit 2 (regex syntax error — would surface a latent
          # escaping bug instead of silently falling back to 0.0.0).
          LATEST_TAG=$(git tag --list "${TAG_PREFIX}*" --sort=-version:refname \
            | { grep -m1 -E "^${TAG_PREFIX_RE}[0-9]+\.[0-9]+\.[0-9]+$" || [ $? -eq 1 ]; })

          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
            echo "No existing ${TAG_PREFIX}* tags, starting from 0.0.0"
          else
            CURRENT="${LATEST_TAG#"$TAG_PREFIX"}"
            echo "Latest tag: $LATEST_TAG (version: $CURRENT)"
          fi
          printf 'current=%s\n' "$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid version components: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH (from $CURRENT)"
            exit 1
          fi

          case "$BUMP_TYPE" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            *) echo "::error::Unknown bump type: $BUMP_TYPE"; exit 1 ;;
          esac

          printf 'next=%s\n' "$NEXT" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "${TAG_PREFIX}${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEXT ($BUMP_TYPE), tag: ${TAG_PREFIX}${NEXT}"

      - name: Check idempotency
        if: steps.check_changed.outputs.changed == 'true'
        id: idempotency
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # exists=true ONLY when the release is already PUBLISHED. A non-existent
          # release OR an orphaned DRAFT (a draft materializes NO git tag) both
          # yield exists=false so the pipeline proceeds -- an orphaned draft is
          # re-published by the Finalise step below, self-healing a transient
          # prior-run failure instead of locking the version baseline forever.
          # The OLD bare `gh release view` check treated a draft as "done" and
          # skipped re-creation on every later run, freezing BUILD_VERSION.
          # Refs #4902 (stuck-draft deadlock).
          REL_JSON=$(mktemp)
          if gh release view "$TAG" --json isDraft >"$REL_JSON" 2>/dev/null; then
            IS_DRAFT=$(jq -r '.isDraft' "$REL_JSON")
            if [ "$IS_DRAFT" = "false" ]; then
              printf 'exists=%s\n' "true" >> "$GITHUB_OUTPUT"
              printf 'draft_exists=%s\n' "false" >> "$GITHUB_OUTPUT"
              echo "Release $TAG already published, skipping"
            else
              printf 'exists=%s\n' "false" >> "$GITHUB_OUTPUT"
              printf 'draft_exists=%s\n' "true" >> "$GITHUB_OUTPUT"
              echo "Release $TAG exists as an ORPHANED DRAFT -- will re-publish (self-heal)"
            fi
          else
            printf 'exists=%s\n' "false" >> "$GITHUB_OUTPUT"
            printf 'draft_exists=%s\n' "false" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$REL_JSON"

      - name: Extract changelog from PR body
        if: steps.check_changed.outputs.changed == 'true' && steps.idempotency.outputs.exists == 'false'
        id: changelog
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
          BODY_FILE: ${{ steps.tmpfiles.outputs.pr_body }}
          RELEASE_NOTES_FILE: ${{ steps.tmpfiles.outputs.release_notes }}
        run: |
          CHANGELOG=""
          if [ -f "$BODY_FILE" ] && [ -s "$BODY_FILE" ]; then
            CHANGELOG=$(awk '/^## Changelog/{found=1; next} /^## /{if(found) exit} found{print}' "$BODY_FILE")
            CHANGELOG=$(echo "$CHANGELOG" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- $PR_TITLE"
          fi

          echo "$CHANGELOG" > "$RELEASE_NOTES_FILE"

      - name: Create GitHub Release (as draft)
        if: steps.check_changed.outputs.changed == 'true' && steps.idempotency.outputs.exists == 'false' && steps.idempotency.outputs.draft_exists == 'false'
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.tmpfiles.outputs.release_notes }}
        # `--draft` is load-bearing: GitHub now creates published releases as
        # IMMUTABLE by default, which causes `gh release upload` to fail with
        # HTTP 422 ("Cannot upload assets to an immutable release"). Drafts
        # remain mutable, so we create as draft, let the audit step upload its
        # asset, then `gh release edit --draft=false` flips it to a published
        # (and now-immutable) release in the finalise-release step below.
        # Refs #3849 AC16 / run 26156985840 (web-v0.99.1 upload failure).
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RELEASE_NOTES_FILE" \
            --draft
          printf 'released=%s\n' "true" >> "$GITHUB_OUTPUT"
          echo "Created draft release $TAG"

      # Sentry Monitors/Alerts migration audit (Phase 2.2 of #3814).
      # Re-runs the audit after each release and uploads the dated Markdown
      # report as a release asset. Provides an evergreen Article 30 §5(2)
      # accountability evidence trail co-located with release notes.
      #
      # NON-BLOCKING: this step is telemetry and MUST NOT fail the release
      # pipeline. `continue-on-error: true` + an inner non-set-e shell with
      # explicit exit-0 conversion ensures a Sentry-side transient (token
      # scope mismatch, region-probe failure, API outage) cannot block the
      # Docker build/push that follows. Initial #3811 ship hit this failure
      # mode: the CI SENTRY_AUTH_TOKEN lacked the `/users/me/` scope the
      # region probe requires, the audit script exited 1, and BOTH the
      # plugin release AND the web-platform release skipped Docker push
      # while the GitHub Release tags landed — production stayed stale.
      #
      # SENTRY_API_HOST bypasses the audit script's `/users/me/` region
      # probe (which requires `member:read` scope — a scope that personal
      # tokens minted for CI commonly lack even after the post-#3849 token
      # rotation). Mirrors the escape hatch added to
      # `configure-sentry-alerts.sh` in #3858. Falls back to `sentry.io`
      # (US ingest — the empirically-verified host the operator's
      # 2026-05-15 baseline audit ran against per the committed artifact
      # at `knowledge-base/legal/audits/sentry-migration-audit-2026-05-15.md`).
      # Override via the `SENTRY_API_HOST` repo secret if Sentry residency
      # changes (e.g., migration to `de.sentry.io`).
      #
      # Skips silently when SENTRY_AUTH_TOKEN is unavailable (e.g. component
      # release where the secret isn't required).
      - name: Sentry Monitors/Alerts migration audit
        if: steps.create_release.outputs.released == 'true'
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Branch-C correction (2026-05-17): default is now the org-subdomain,
          # NOT `de.sentry.io` (ingest-only, no `/api/0/`) or `eu.sentry.io`
          # (silently rewrites slugs ending in `-eu` per learning
          # `2026-05-17-sentry-eu-region-host-rewrites-slugs-with-eu-suffix.md`).
          # Fail-loud if SENTRY_API_HOST secret is not set — the audit script
          # MUST hit the right host for slug-scoped probes to work.
          SENTRY_API_HOST: ${{ secrets.SENTRY_API_HOST }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          # Required for Gate 4 (audit_dsn_org_id_matches_token_org_id) — the
          # split-state detector that catches an audit token authenticating
          # against a different org than the runtime DSN points at. Without
          # the DSN env, gate 4 cannot run and the residency check is silently
          # downgraded. The script tolerates empty NEXT_PUBLIC_SENTRY_DSN (the
          # `|| true` brace on the o<id> extraction protects pipefail), but
          # passing it makes the gate meaningful at release time.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # No `set -e` — every audit failure path must exit 0 so the
          # release pipeline continues. The `continue-on-error: true`
          # marker above is belt; this is suspenders.
          set -uo pipefail
          if [[ -z "${SENTRY_AUTH_TOKEN:-}" ]]; then
            echo "::notice::SENTRY_AUTH_TOKEN unavailable; skipping migration audit (no Article 30 evidence uploaded for this release)."
            exit 0
          fi
          if [[ ! -x apps/web-platform/scripts/sentry-monitors-audit.sh ]]; then
            echo "::notice::Audit script not present in this checkout; skipping."
            exit 0
          fi
          set +e
          AUDIT_OUT_DIR="${RUNNER_TEMP}/sentry-audit" \
            bash apps/web-platform/scripts/sentry-monitors-audit.sh
          script_rc=$?
          set -e
          if [[ "$script_rc" -ne 0 ]]; then
            echo "::warning::Sentry migration audit script exited ${script_rc} — no Article 30 evidence uploaded for this release. If the script output reads 'Sentry token not valid against either US or EU ingest', verify SENTRY_API_HOST is reaching the script (defaults to 'de.sentry.io'; override via repo secret if residency changed). If the token is rejected past the probe, rotate per ADR-031 §Authentication."
            exit 0
          fi
          report=$(ls "${RUNNER_TEMP}/sentry-audit"/sentry-migration-audit-*.md 2>/dev/null | head -1 || true)
          if [[ -z "$report" ]]; then
            echo "::warning::Audit produced no report file."
            exit 0
          fi
          gh release upload "$TAG" "$report" --clobber
          echo "Uploaded $(basename "$report") to release $TAG."

      - name: Count plugin components
        id: plugin_stats
        if: steps.version.outputs.next != '' && inputs.docker_image != ''
        run: |
          AGENT_COUNT=$(find plugins/soleur/agents -name "*.md" 2>/dev/null | wc -l)
          printf 'agent_count=%s\n' "$AGENT_COUNT" >> "$GITHUB_OUTPUT"
          echo "Counted $AGENT_COUNT agents"

      - name: Docker login
        id: docker_login
        if: steps.version.outputs.next != '' && inputs.docker_image != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Mirrored regex sites (edit together):
      #   - apps/web-platform/lib/supabase/validate-url.ts (CANONICAL_HOSTNAME + PROD_ALLOWED_HOSTS)
      #   - apps/web-platform/scripts/verify-required-secrets.sh (SUPABASE_URL_RE)
      #   - plugins/soleur/skills/preflight/SKILL.md Check 5 (deployed-bundle gate)
      - name: Validate NEXT_PUBLIC_SUPABASE_URL build-arg
        if: steps.version.outputs.next != '' && inputs.docker_image != ''
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL:-}" ]]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL secret is empty"
            exit 1
          fi
          if [[ ! "$SUPABASE_URL" =~ ^https://([a-z0-9]{20}\.supabase\.co|api\.soleur\.ai)$ ]]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL has non-canonical value (likely a placeholder leak)"
            echo "::error::Expected: https://<20-char-ref>.supabase.co or https://api.soleur.ai"
            exit 1
          fi
          echo "::notice::NEXT_PUBLIC_SUPABASE_URL passes canonical-shape validation"

      # Mirrored JWT-claims sites (edit together):
      #   - apps/web-platform/lib/supabase/validate-anon-key.ts (claims assertion)
      #   - apps/web-platform/scripts/verify-required-secrets.sh (Doppler-side gate)
      #   - plugins/soleur/skills/preflight/SKILL.md Check 5 Step 5.4 (deployed-bundle gate)
      # IMPORTANT: depends on the URL Validate step above for `expected_ref`
      # derivation; must run AFTER it and BEFORE docker/build-push-action.
      - name: Validate NEXT_PUBLIC_SUPABASE_ANON_KEY build-arg
        if: steps.version.outputs.next != '' && inputs.docker_image != ''
        env:
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ANON_KEY:-}" ]]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY secret is empty"
            exit 1
          fi
          KEY="${SUPABASE_ANON_KEY//$'\r'/}"
          KEY="${KEY//$'\n'/}"
          if [[ "$(printf '%s' "$KEY" | tr -cd '.' | wc -c)" -ne 2 ]]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY is not a 3-segment JWT"
            exit 1
          fi
          payload=$(printf '%s' "$KEY" | cut -d. -f2)
          if [[ -z "$payload" ]]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY payload segment is empty"
            exit 1
          fi
          pad=$(( (4 - ${#payload} % 4) % 4 ))
          if [[ $pad -gt 0 ]]; then
            padded="$payload$(printf '=%.0s' $(seq 1 $pad))"
          else
            padded="$payload"
          fi
          json=$(printf '%s' "$padded" | tr '_-' '/+' | base64 -d 2>/dev/null) || {
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY payload is not valid base64url"
            exit 1
          }
          iss=$(printf '%s' "$json" | jq -r '.iss // ""')
          role=$(printf '%s' "$json" | jq -r '.role // ""')
          ref=$(printf '%s' "$json" | jq -r '.ref // ""')
          # Strip CR/LF/control chars before echo to defend against log
          # injection via crafted JWT claim values (e.g., a `\n::error::JWT iss="supabase"`
          # injection that would forge a success-looking annotation).
          iss_safe="${iss//[$'\n\r']/}"
          role_safe="${role//[$'\n\r']/}"
          ref_safe="${ref//[$'\n\r']/}"
          if [[ "$iss" != "supabase" ]]; then
            echo "::error::JWT iss=\"$iss_safe\", expected \"supabase\""
            exit 1
          fi
          if [[ "$role" != "anon" ]]; then
            echo "::error::JWT role=\"$role_safe\", expected \"anon\" (a non-anon role in the browser bundle is a critical security issue: role=service_role grants admin RLS bypass to every visitor)"
            exit 1
          fi
          if [[ ! "$ref" =~ ^[a-z0-9]{20}$ ]]; then
            echo "::error::JWT ref=\"$ref_safe\" does not match canonical 20-char shape (^[a-z0-9]{20}$)"
            exit 1
          fi
          case "$ref" in
            test*|placeholder*|example*|service*|local*|dev*|stub*)
              echo "::error::JWT ref=\"$ref_safe\" is a placeholder/test-fixture value"
              exit 1
              ;;
          esac
          # Derive the canonical 20-char ref from $SUPABASE_URL via the
          # single-sourced resolver (handles both canonical *.supabase.co
          # URLs AND custom-domain CNAME fallback, with the subdomain-bypass
          # anchored regex). Future tuning of the regex / DNS timeout lives
          # in one place. DNS wall-clock widens from ~6s (was +time=3 +tries=2)
          # to ~10s (helper-pinned +time=5 +tries=2) — deliberate, per #4323
          # AC11.
          # shellcheck source=apps/web-platform/scripts/lib/supabase-ref-resolver.sh
          . apps/web-platform/scripts/lib/supabase-ref-resolver.sh
          if ! expected_ref=$(resolve_supabase_ref "$SUPABASE_URL" 2>&1); then
            expected_ref_safe="${expected_ref//[$'\n\r']/}"
            echo "::error::${expected_ref_safe}"
            exit 1
          fi
          if [[ "$ref" != "$expected_ref" ]]; then
            echo "::error::JWT ref=\"$ref_safe\" does not match URL canonical ref=\"$expected_ref\""
            exit 1
          fi
          echo "::notice::NEXT_PUBLIC_SUPABASE_ANON_KEY passes JWT-claims validation (ref=$ref_safe)"

      - name: Vendor plugin into build context
        if: steps.version.outputs.next != '' && inputs.docker_image != '' && inputs.vendor_plugin
        env:
          DOCKER_CONTEXT: ${{ inputs.docker_context }}
        run: |
          set -euo pipefail
          # Defense-in-depth: bound DOCKER_CONTEXT to the apps/* prefix so a
          # future caller passing untrusted input cannot rm -rf an arbitrary
          # path under "$DOCKER_CONTEXT/_plugin-vendored".
          if [[ ! "$DOCKER_CONTEXT" =~ ^apps/[a-z0-9-]+$ ]]; then
            echo "::error::vendor_plugin: DOCKER_CONTEXT='$DOCKER_CONTEXT' must match ^apps/[a-z0-9-]+$"
            exit 1
          fi
          DEST="${DOCKER_CONTEXT}/_plugin-vendored"
          rm -rf "$DEST"
          # `cp -a --no-dereference` preserves symlinks AS symlinks rather than
          # following them. Without it, an absolute or escaping symlink under
          # plugins/soleur (e.g. -> /etc/passwd) would land its target's
          # CONTENT in the build context and be baked into the image.
          cp -a --no-dereference plugins/soleur "$DEST"
          # Reject any symlink whose resolved target escapes the vendor tree.
          # readlink -f resolves transitively; the resolved absolute path is
          # compared against the absolute DEST. Symlinks that stay inside
          # _plugin-vendored (e.g. test fixtures) pass.
          DEST_ABS="$(readlink -f "$DEST")"
          while IFS= read -r link; do
            target="$(readlink -f "$link" || true)"
            if [[ -z "$target" ]] || [[ "$target" != "$DEST_ABS"* ]]; then
              echo "::error::vendor_plugin: symlink escapes vendor tree: $link -> $target"
              exit 1
            fi
          done < <(find "$DEST" -type l)
          echo "Vendored $(find "$DEST" -type f | wc -l) plugin files into $DEST"

      # type=gha cache requires the docker-container driver (the default driver
      # cannot export gha cache) — setup-buildx provides it.
      - name: Set up Docker Buildx
        if: steps.version.outputs.next != '' && inputs.docker_image != ''
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push Docker image
        id: docker_build
        if: steps.version.outputs.next != '' && inputs.docker_image != ''
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ inputs.docker_context }}
          push: true
          # mode=min is secret-safe ONLY while no non-public secret ARG is consumed
          # in the runner/final-image stage of apps/web-platform/Dockerfile (the
          # builder-only SENTRY_AUTH_TOKEN must stay out of the runner stage). Do NOT
          # flip to mode=max, and do NOT add a non-public secret build-arg to the
          # runner stage — either would export a secret-bearing layer to the
          # repo-readable gha cache. mode=min caches only runner-stage layers, which
          # is where the heavy-install wins live (claude-code/likec4/apt/playwright).
          cache-from: type=gha,scope=web-platform-release
          cache-to: type=gha,mode=min,scope=web-platform-release
          tags: |
            ${{ inputs.docker_image }}:v${{ steps.version.outputs.next }}
            ${{ inputs.docker_image }}:${{ github.sha }}
            ${{ inputs.docker_image }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_GITHUB_APP_SLUG=${{ secrets.NEXT_PUBLIC_GITHUB_APP_SLUG }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_IAC_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            BUILD_VERSION=${{ steps.version.outputs.next }}
            BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_AGENT_COUNT=${{ steps.plugin_stats.outputs.agent_count }}

      - name: Set docker_pushed output
        id: docker_pushed
        if: steps.docker_build.outcome == 'success'
        run: printf 'pushed=%s\n' "true" >> "$GITHUB_OUTPUT"

      # Publish the draft release once Docker has pushed AND the audit
      # asset has uploaded. GitHub now publishes releases as IMMUTABLE —
      # once a release is out of draft state, `gh release upload` returns
      # HTTP 422. So the `create_release` step creates as `--draft`; this
      # step flips it live after all post-creation uploads complete.
      # Failure semantics preserved: if Docker push fails, this step
      # doesn't run and the release stays a draft (invisible to ops) —
      # operator manually publishes once Docker is recovered. Email/
      # Slack notify steps below fire after this, so they always link
      # to a visible release URL. Refs #3849 AC16 / run 26156985840
      # (web-v0.99.1 upload-to-immutable HTTP 422).
      # Self-heal gate (#4902): publish when EITHER a new draft was created this
      # run OR the idempotency step found an orphaned draft. `gh release edit
      # --draft=false` is idempotent -- on a draft it publishes (materializing
      # the git tag); on an already-published release it is a no-op. The
      # orphaned-draft path skips the audit-upload step above (gated on
      # create_release.released), which is correct: we only flip draft->published
      # here, never upload to a published (immutable) release.
      - name: Finalise release (publish draft)
        if: >-
          steps.check_changed.outputs.changed == 'true' &&
          (steps.create_release.outputs.released == 'true' ||
           steps.idempotency.outputs.draft_exists == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release edit "$TAG" --draft=false
          echo "Published release $TAG"

      # Notify on a self-heal too (#4902): an orphaned draft means the prior run
      # died BEFORE this step, so the re-publish is the FIRST successful release
      # announcement -- fire it. (Unlike the Sentry-audit step above, which stays
      # create-only: its asset upload is an evidence-trail re-run, not an
      # announcement, and re-uploading to a published release would 422.)
      - name: Email notification (release)
        if: >-
          steps.check_changed.outputs.changed == 'true' &&
          (steps.create_release.outputs.released == 'true' ||
           steps.idempotency.outputs.draft_exists == 'true')
        continue-on-error: true
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[RELEASE] ${{ inputs.component_display }} v${{ steps.version.outputs.next }}'
          body: '<p><strong>${{ inputs.component_display }} v${{ steps.version.outputs.next }} released!</strong></p><p><a href="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}">View release notes</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      # Inline step required: GITHUB_TOKEN-created releases don't fire
      # 'release: published' events, so a separate workflow cannot trigger.
      # Inline shell (not a composite action) per plan-review: single
      # consumer (YAGNI), and identity inputs are dead on app-based webhooks.
      - name: Post to Slack (release)
        if: >-
          steps.check_changed.outputs.changed == 'true' &&
          (steps.create_release.outputs.released == 'true' ||
           steps.idempotency.outputs.draft_exists == 'true')
        continue-on-error: true
        env:
          SLACK_RELEASES_WEBHOOK_URL: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.next }}
          COMPONENT_DISPLAY: ${{ inputs.component_display }}
          RELEASE_NOTES_FILE: ${{ steps.tmpfiles.outputs.release_notes }}
        run: |
          WEBHOOK="${SLACK_RELEASES_WEBHOOK_URL:-}"
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::No Slack webhook URL configured, skipping release notification"
            exit 0
          fi
          echo "::add-mask::$WEBHOOK"

          if [ -f "$RELEASE_NOTES_FILE" ]; then
            # Convert the untrusted GFM changelog to Slack mrkdwn AND keep it
            # injection-inert in a single pass: scripts/md-to-mrkdwn.mjs rewrites
            # **bold**/[t](u)/## headings to mrkdwn while entity-escaping every
            # author-typed <!channel>/<@U..>/disguised <url|label> (Slack has no
            # allowed_mentions). The converter also caps + structure-aware-
            # truncates (no dangling <url|, closed fences) at 3000 chars so the
            # header and release link always survive (Slack display-folds ~4k).
            #
            # Fallback is for AVAILABILITY, not safety: a non-zero exit must
            # never fail the release, so fall back to the prior sed-escaped
            # plain body. The `if ! BODY=$(...)` form is load-bearing — a bare
            # `BODY=$(node ... || sed ...)` assignment masks the exit code
            # under `bash -e`, so the fallback would never trigger. Safety
            # lives in the converter's escape correctness + its keystone output
            # invariant (asserted in scripts/md-to-mrkdwn.test.mjs and the T7
            # contract test), NOT in this non-zero-exit guard.
            if ! BODY=$(node scripts/md-to-mrkdwn.mjs --max 3000 < "$RELEASE_NOTES_FILE"); then
              echo "::warning::md-to-mrkdwn failed; sent plain escaped body"
              BODY=$(sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' "$RELEASE_NOTES_FILE")
              if [[ ${#BODY} -gt 3000 ]]; then
                BODY="${BODY:0:2997}..."
              fi
            fi
          else
            BODY=""
          fi
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

          # Slack mrkdwn bold is *single asterisk* (not **double**)
          MESSAGE=$(printf '*%s v%s released!*\n\n%s\n\nFull release notes: %s' \
            "$COMPONENT_DISPLAY" "$VERSION" "$BODY" "$RELEASE_URL")

          PAYLOAD=$(jq -n \
            --arg text "$MESSAGE" \
            '{text: $text, unfurl_links: false}')

          # `|| echo 000` keeps a curl transport failure (timeout, DNS) on the
          # ::warning path -- without it `bash -e` kills the step before the
          # warning is emitted.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK" || echo "000")

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Slack notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Slack notification failed (HTTP $HTTP_CODE)"
          fi
