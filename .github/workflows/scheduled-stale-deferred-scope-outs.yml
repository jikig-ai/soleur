# Daily sweep that auto-closes deferred-scope-out issues with 90+ days of no activity.
# Kill switch: apply the `do-not-autoclose` label to exempt an issue.
# Dry-run mode: workflow_dispatch input `dry_run: true` lists candidates without closing.
#
# Existing scope-outs at PR #4452 merge time were backfilled with `do-not-autoclose`;
# only NEW scope-outs filed AFTER this merge are subject to the sweep by default.
#
# Untrusted-text safety: issue titles are read via gh --json + jq -r, never interpolated
# into shell command positions.

name: "Scheduled: Stale Deferred-Scope-Out Auto-Close"

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, list stale candidates but do not comment or close'
        required: false
        type: boolean
        default: false

concurrency:
  group: schedule-stale-deferred-scope-outs
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Auto-close stale deferred-scope-out issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          set -euo pipefail

          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%d)
          echo "Cutoff date (no activity since): ${CUTOFF}"
          echo "Dry-run mode: ${DRY_RUN}"

          # Query open deferred-scope-out issues with no updates since cutoff.
          # Sort oldest-first so the sweep makes steady progress on the tail.
          CANDIDATES=$(gh issue list \
            --label deferred-scope-out \
            --state open \
            --search "updated:<${CUTOFF} sort:updated-asc" \
            --limit 200 \
            --json number,title,updatedAt,labels)

          TOTAL=$(echo "$CANDIDATES" | jq 'length')
          echo "Stale candidates found: ${TOTAL}"

          if [[ "$TOTAL" -eq 0 ]]; then
            echo "Auto-closed 0 stale deferred-scope-out issues (0 skipped via do-not-autoclose label)"
            exit 0
          fi

          CLOSED=0
          SKIPPED=0

          # Iterate via jq -c so each issue is one JSON line; avoids
          # word-splitting on titles. NUMBER is digit-validated before use
          # in `gh issue comment` / `gh issue close` so a hypothetical
          # injection via a tampered issue number is foreclosed.
          while IFS= read -r issue; do
            NUMBER=$(echo "$issue" | jq -r '.number')
            TITLE=$(echo "$issue" | jq -r '.title')
            UPDATED=$(echo "$issue" | jq -r '.updatedAt')
            HAS_KILLSWITCH=$(echo "$issue" | jq -r '[.labels[].name] | any(. == "do-not-autoclose")')

            if [[ ! "$NUMBER" =~ ^[0-9]+$ ]]; then
              echo "SKIP malformed issue number: ${NUMBER}"
              continue
            fi

            if [[ "$HAS_KILLSWITCH" == "true" ]]; then
              # Title is logged but never re-injected into a shell command.
              echo "SKIP #${NUMBER} (do-not-autoclose): ${TITLE}"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "CANDIDATE #${NUMBER} (updated ${UPDATED}): ${TITLE}"

            if [[ "$DRY_RUN" == "1" ]]; then
              continue
            fi

            COMMENT_BODY=$(cat <<-'EOF'
          	Auto-closing: this issue has been open with no activity for 90+ days.

          	If the concern is still relevant, re-file with an updated re-evaluation trigger
          	(date / counter / event-grep / dependency â€” see `plugins/soleur/skills/review/references/review-todo-structure.md`).
          	Open-ended scope-outs accumulate into the backlog this auto-close exists to drain.

          	See PR #4452 for rationale; apply the `do-not-autoclose` label to exempt.
          	EOF
          )
            gh issue comment "$NUMBER" --body "$COMMENT_BODY"
            gh issue close "$NUMBER" --reason "not planned"
            CLOSED=$((CLOSED + 1))
          done < <(echo "$CANDIDATES" | jq -c '.[]')

          echo "Auto-closed ${CLOSED} stale deferred-scope-out issues (${SKIPPED} skipped via do-not-autoclose label)"
