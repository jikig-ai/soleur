# Auto-apply Doppler / Cloudflare / Better Stack / GitHub / random_id / Hetzner-firewall
# resources whenever a PR that touches `apps/web-platform/infra/*.tf` merges to main.
# Closes the workflow gap surfaced by PR-H (#4066 — Daily Priorities multi-source
# webhook + KB-drift walker): every infra-touching PR previously required the
# operator to open a shell, `doppler run --name-transformer tf-var`, `terraform plan`,
# `terraform apply` manually per a PR-body runbook.
#
# This workflow IS the canonical boundary for `hr-all-infrastructure-provisioning-servers`
# for the `apps/web-platform/infra/` root (matches the precedent set by
# `apply-sentry-infra.yml` for `apps/web-platform/infra/sentry/` and
# `apply-github-infra.yml` for `infra/github/`).
#
# Adapted from `apply-sentry-infra.yml` (ADR-031) with two adjustments:
#   1. Doppler `--name-transformer tf-var` invocation wraps `terraform plan`/`apply`
#      because the web-platform root reads ~12 `TF_VAR_*` inputs from Doppler.
#   2. `-target=`-scoped apply (70 explicit targets). server.tf SSH-provisioned
#      `terraform_data.*` resources are EXCLUDED — the GitHub runner egress IP is
#      not in `var.admin_ips`, so any SSH connection from the runner fails with
#      `ssh: handshake failed: connection reset by peer`. Those 7 resources land
#      via `apply-deploy-pipeline-fix.yml` (mirrors that workflow's `-target=`
#      pattern). `hcloud_server.web`, `hcloud_volume.workspaces`,
#      `hcloud_volume_attachment.workspaces`, and `hcloud_ssh_key.default` are
#      also excluded — managed by initial-apply + drift detector, not per-PR.
#
# Destroy-guard shape: copies `apply-github-infra.yml` (post-#3903) — numeric-regex
# validation of `destroy_count` + `set -e` re-enable after `rc=$?` capture.
# `apply-sentry-infra.yml` is the structural template but its destroy-guard pattern
# is vulnerable to the empty-string bypass class flagged in
# `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
#
# Authorization model: the PR merge IS the human authorization
# (`hr-menu-option-ack-not-prod-write-auth`), AND the `environment:` gate forces
# an explicit reviewer-click before apply runs. Defense-in-depth: a leaked PAT with
# `contents:write` would have to bypass BOTH CODEOWNERS review on `.github/workflows/`
# AND the environment reviewer click.
#
# Kill switch: include `[skip-web-platform-apply]` on its own line in the merge
# commit message to skip auto-apply for that merge.
#
# Destroy acknowledgement: include `[ack-destroy]` on its own line in the merge
# commit message to acknowledge planned destroys (otherwise apply halts).
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a transient
# failure or for ad-hoc applies (still target-scoped to the allow-list below).
#
# Untrusted-input handling: HEAD_MSG and REASON are routed through env vars
# (never interpolated directly into `run:` blocks) per the github.blog
# workflow-injection guidance. All action references are SHA-pinned.

name: Apply web-platform infra (Doppler/Cloudflare/BetterStack/GitHub-App/Inngest/firewall)

on:
  push:
    branches: [main]
    paths:
      - "apps/web-platform/infra/**"
      - ".github/workflows/apply-web-platform-infra.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (manual re-run only — e.g. transient retry)"
        required: true
        type: string

concurrency:
  # `cancel-in-progress: false` per `hr-multi-step-post-merge-bootstrap-script`
  # — cancelling a half-applied terraform run is worse than queueing the next.
  group: terraform-apply-web-platform-infra
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: apps/web-platform/infra

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # Anchor `[skip-web-platform-apply]` to its own line so it cannot
        # fire from a quoted block, code fence, or trailer that happens
        # to carry the literal substring. Symmetric posture with the
        # `[ack-destroy]` gate in the apply job.
        run: |
          set -euo pipefail
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-web-platform-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    # Budget: ~0.6 min/resource × ~70 targets = ~42 min worst-case cold-cache,
    # but plan + apply against an already-provisioned state typically completes
    # in ~3-5 min. 15 min is the operator-tolerance ceiling that matches
    # `apply-deploy-pipeline-fix.yml`.
    timeout-minutes: 15
    # Required-reviewer gate. Configured at the repo level
    # (Settings → Environments → web-platform-infra-apply) with @deruelle as
    # the sole required reviewer and a custom branch policy restricting
    # deployments to `main`. Defense layer paired with `.github/CODEOWNERS`
    # for PR-time review — a leaked PAT with `contents:write` would have to
    # bypass BOTH (the PR can't merge without code-owner review AND the
    # apply can't run without manual approval click). Diverges from
    # `apply-github-infra.yml` (which skips the gate) because the
    # web-platform root rotates broader secret surface (Inngest signing
    # keys, GitHub App webhook secret, R2 creds) than the rulesets-only
    # github root.
    environment: web-platform-infra-apply

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering.
        # hcloud_ssh_key.default is NOT in the apply allow-list (header lines
        # 21-23), so this dummy public key is never consumed -- it just
        # satisfies HCL parsing. Mirrors scheduled-terraform-drift.yml:49-52.
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        # `-lockfile=readonly` refuses to download a provider whose checksum
        # is not already in `.terraform.lock.hcl`. Combined with the committed
        # lockfile, this defends against a malicious republish of a pinned
        # provider version. Verified present:
        # `apps/web-platform/infra/.terraform.lock.hcl`.
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (allow-list, non-SSH resources only)
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # ALLOW-LIST MAINTENANCE: if a future PR adds a new `.tf` resource at
        # `apps/web-platform/infra/*.tf`, append a matching `-target=<addr>`
        # line below (and exclude server.tf SSH-provisioned resources per
        # header comment). `scheduled-terraform-drift.yml` is the 12h backstop
        # if you forget — drift surfaces in the next cron run.
        run: |
          # `-e` is intentionally omitted so we can capture terraform plan's
          # exit code in $rc — plan exits non-zero on legitimate failures we
          # want to surface, not abort silently. Re-enabled with `set -e`
          # after the rc-capture window per
          # `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -var="ssh_key_path=${CI_SSH_PUB}" \
              -target=betteruptime_policy.github_webhook \
              -target=betteruptime_monitor.github_webhook_failures \
              -target=betteruptime_heartbeat.github_webhook_sig_failures \
              -target=betteruptime_heartbeat.github_api_429_sustained \
              -target=cloudflare_ruleset.cache_shared_binaries \
              -target=doppler_secret.github_app_id \
              -target=doppler_secret.github_app_private_key \
              -target=random_id.github_webhook_secret \
              -target=doppler_secret.github_app_webhook_secret \
              -target=cloudflare_bot_management.soleur_ai \
              -target=cloudflare_ruleset.seo_page_redirects \
              -target=cloudflare_ruleset.seo_response_headers \
              -target=random_id.tunnel_secret \
              -target=cloudflare_zero_trust_tunnel_cloudflared.web \
              -target=cloudflare_zero_trust_tunnel_cloudflared_config.web \
              -target=cloudflare_zero_trust_access_application.deploy \
              -target=cloudflare_zero_trust_access_service_token.deploy \
              -target=cloudflare_zero_trust_access_policy.deploy_service_token \
              -target=cloudflare_zero_trust_access_application.ssh \
              -target=cloudflare_zero_trust_access_service_token.ci_ssh \
              -target=cloudflare_zero_trust_access_policy.ci_ssh_service_token \
              -target=cloudflare_notification_policy.service_token_expiry \
              -target=cloudflare_zone_settings_override.soleur_ai \
              -target=cloudflare_record.app \
              -target=cloudflare_record.deploy \
              -target=cloudflare_record.ssh \
              -target=cloudflare_record.dkim_resend \
              -target=cloudflare_record.spf_send \
              -target=cloudflare_record.mx_send \
              -target=cloudflare_record.dkim_resend_send \
              -target=cloudflare_record.spf_send_send \
              -target=cloudflare_record.mx_send_send \
              -target=cloudflare_record.dmarc \
              -target=cloudflare_record.supabase_custom_domain \
              -target=cloudflare_record.supabase_acme_challenge \
              -target=cloudflare_record.spf_root \
              -target=cloudflare_record.google_site_verification \
              -target=cloudflare_record.protonmail_verification \
              -target=cloudflare_record.protonmail_mx_primary \
              -target=cloudflare_record.protonmail_mx_secondary \
              -target=cloudflare_record.protonmail_dkim_1 \
              -target=cloudflare_record.protonmail_dkim_2 \
              -target=cloudflare_record.protonmail_dkim_3 \
              -target=cloudflare_record.github_pages \
              -target=cloudflare_record.www \
              -target=cloudflare_record.github_pages_challenge \
              -target=cloudflare_record.buttondown_ns1 \
              -target=cloudflare_record.buttondown_ns2 \
              -target=cloudflare_zone_dnssec.soleur_ai \
              -target=cloudflare_ruleset.allowlist_ai_crawlers \
              -target=random_id.kb_drift_ingest_signing_key \
              -target=doppler_secret.kb_drift_ingest_signing_key \
              -target=doppler_secret.kb_drift_ingest_url \
              -target=doppler_service_token.kb_drift \
              -target=github_actions_secret.doppler_token_kb_drift \
              -target=betteruptime_monitor.soleur_apex \
              -target=betteruptime_policy.uptime \
              -target=random_id.inngest_signing_key_prd \
              -target=random_id.inngest_signing_key_dev \
              -target=random_id.inngest_event_key_prd \
              -target=random_id.inngest_event_key_dev \
              -target=doppler_secret.inngest_signing_key_prd \
              -target=doppler_secret.inngest_signing_key_dev \
              -target=doppler_secret.inngest_event_key_prd \
              -target=doppler_secret.inngest_event_key_dev \
              -target=betteruptime_heartbeat.inngest_prd \
              -target=betteruptime_policy.inngest \
              -target=doppler_secret.inngest_heartbeat_url_prd \
              -target=hcloud_firewall.web \
              -target=hcloud_firewall_attachment.web
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          # Authoritative destroy count via the structured plan, not the
          # `Plan: …` summary line.
          destroy_count=$(terraform show -json tfplan | \
            jq '[.resource_changes[]? | select(.change.actions? | index("delete"))] | length')
          # Validate destroy_count parsed correctly — an empty value from a jq
          # failure would silently evaluate false in the `-gt 0` test and let
          # destructive plans slip past the guard.
          if [[ ! "$destroy_count" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy_count parse failed (jq returned: '${destroy_count}')."
            exit 1
          fi
          # Anchor `[ack-destroy]` to its own line (start-of-string OR
          # preceded by newline; followed by newline OR end-of-string) so
          # the token cannot fire from a quoted block, code fence, or
          # `Co-Authored-By:` trailer carrying that literal substring.
          ack_destroy=false
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[ack-destroy\]($|$'\n') ]]; then
            ack_destroy=true
          fi
          if [[ "$destroy_count" -gt 0 ]] && [[ "$ack_destroy" != "true" ]]; then
            echo "::error::terraform plan shows ${destroy_count} destroy operation(s) on web-platform infra."
            echo "::error::Add a line containing exactly '[ack-destroy]' to the merge commit message to acknowledge, or revert the trigger commit."
            grep -E 'will be destroyed|Plan:' tfplan.txt | head -20 >&2
            exit 1
          fi

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -auto-approve -input=false tfplan

      - name: Post-apply summary
        if: always()
        env:
          TRIGGER: ${{ github.event_name }}
          MERGE_SHA: ${{ github.sha }}
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## Apply web-platform infra"
            echo ""
            echo "**Trigger:** ${TRIGGER}"
            echo "**Merge SHA:** ${MERGE_SHA}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
