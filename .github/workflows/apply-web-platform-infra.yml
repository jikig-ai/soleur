# Auto-apply Doppler / Cloudflare / Better Stack / GitHub / random_id / Hetzner-firewall
# resources whenever a PR that touches `apps/web-platform/infra/*.tf` merges to main.
# Closes the workflow gap surfaced by PR-H (#4066 — Daily Priorities multi-source
# webhook + KB-drift walker): every infra-touching PR previously required the
# operator to open a shell, `doppler run --name-transformer tf-var`, `terraform plan`,
# `terraform apply` manually per a PR-body runbook.
#
# This workflow IS the canonical boundary for `hr-all-infrastructure-provisioning-servers`
# for the `apps/web-platform/infra/` root (matches the precedent set by
# `apply-sentry-infra.yml` for `apps/web-platform/infra/sentry/` and
# `apply-github-infra.yml` for `infra/github/`).
#
# Adapted from `apply-sentry-infra.yml` (ADR-031) with two adjustments:
#   1. Doppler `--name-transformer tf-var` invocation wraps `terraform plan`/`apply`
#      because the web-platform root reads ~12 `TF_VAR_*` inputs from Doppler.
#   2. `-target=`-scoped apply, split into TWO applies (#4844):
#      (a) the main saved-`tfplan` apply covers the 80 non-SSH resources;
#      (b) a SEPARATE token-gated SSH apply, run AFTER the post-apply token sync
#          and behind the CF Tunnel SSH bridge (.github/actions/cf-tunnel-ssh-bridge),
#          covers the 8 SSH-provisioned `terraform_data.*` siblings in server.tf
#          (disk_monitor_install, resource_monitor_install, fail2ban_tuning,
#          journald_persistent, docker_seccomp_config, apparmor_bwrap_profile,
#          orphan_reaper_install). The GitHub runner egress IP is not in
#          `var.admin_ips`, so the bridge (not a direct :22 dial) is the access
#          path. Before #4844 these 7 silently drifted: they were excluded here
#          with no apply path, and apply-deploy-pipeline-fix.yml only `-target`s
#          deploy_pipeline_fix + infra_config_handler_bootstrap (its header's old
#          "those 7 land via apply-deploy-pipeline-fix.yml" claim was never true).
#      `hcloud_server.web`, `hcloud_volume.workspaces`,
#      `hcloud_volume_attachment.workspaces`, and `hcloud_ssh_key.default` remain
#      excluded — managed by initial-apply + drift detector, not per-PR.
#      `terraform_data.root_authorized_keys` (ci-ssh-key.tf) is ALSO excluded:
#      it stays operator-local (firewall chicken-and-egg — it is what authorizes
#      the CI key the bridge itself uses), re-firing via `triggers_replace` from a
#      future operator-local `terraform apply -replace=tls_private_key.ci_ssh`.
#
# Destroy-guard shape: copies `apply-github-infra.yml` (post-#3903) — numeric-regex
# validation of `destroy_count` + `set -e` re-enable after `rc=$?` capture.
# `apply-sentry-infra.yml` is the structural template but its destroy-guard pattern
# is vulnerable to the empty-string bypass class flagged in
# `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
#
# Authorization model: the PR merge IS the human authorization
# (`hr-menu-option-ack-not-prod-write-auth`). PR #4220 dropped the
# `environment:` reviewer-click gate after measuring its real-world cost
# (apply runs sitting in `waiting` for up to 13h, blocking sibling
# applies via the concurrency group). The merge-time gate (CODEOWNERS
# on `.github/workflows/` + branch protection on `main`) is the load-
# bearing control; the env-reviewer click was duplicative.
#
# Kill switch: include `[skip-web-platform-apply]` on its own line in the merge
# commit message to skip auto-apply for that merge.
#
# Destroy acknowledgement: include `[ack-destroy]` on its own line in the merge
# commit message to acknowledge planned destroys (otherwise apply halts).
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a transient
# failure or for ad-hoc applies (still target-scoped to the allow-list below).
#
# Untrusted-input handling: HEAD_MSG and REASON are routed through env vars
# (never interpolated directly into `run:` blocks) per the github.blog
# workflow-injection guidance. All action references are SHA-pinned.

name: Apply web-platform infra (Doppler/Cloudflare/BetterStack/GitHub-App/Inngest/firewall)

on:
  push:
    branches: [main]
    paths:
      - "apps/web-platform/infra/**"
      - ".github/workflows/apply-web-platform-infra.yml"
      # Defense-in-depth: re-fire on filter mutations so a PR that mutates
      # the destroy-guard filter without touching infra still runs the
      # apply step against `main`'s captured baseline (#4419).
      - "tests/scripts/lib/destroy-guard-filter-web-platform.jq"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (e.g. transient retry, or the dispatch reason)"
        required: true
        type: string
      # `manual-rerun` (default) preserves the historical escape-hatch behavior EXACTLY
      # — the `apply` job's allow-list re-run. Every other value selects a dedicated,
      # MUTUALLY-EXCLUSIVE dispatch job (see each job's `if:`), so a dispatch runs
      # exactly one apply path. Post-merge trigger (menu ack, not a prod-write authored
      # by a non-technical user — `hr-menu-option-ack-not-prod-write-auth`):
      #   gh workflow run apply-web-platform-infra.yml -f apply_target=<target> -f reason='...'
      #
      # The `warm-standby` and `web-2-recreate` targets were REMOVED 2026-07-20 (#6575)
      # after web-2 was retired 2026-07-17 (#6538). Both hard-`-target`ed addresses that
      # no longer exist, so neither could run to completion; the runbook surfaces that told
      # operators to dispatch them were rewritten or superseded in the same change (the
      # host_creates HALT below, scheduled-inngest-health.yml, the stock-preflight tine, and
      # knowledge-base/engineering/operations/runbooks/ -- see web-host-birth.md). web-1 still has no
      # automated birth path — that HALT is tracked by #6730, not by these targets.
      apply_target:
        description: "Which apply path? manual-rerun (default, allow-list re-run) | inngest-host (additive net-new inngest host + secrets) | inngest-host-replace (scoped -replace of the inngest host to re-run cloud-init; preserves the Redis AOF volume) | registry-host-replace (scoped -replace of the registry host to re-run cloud-init + apply any pending volume resize; preserves the zot storage volume) | registry-region-migrate (#6288: move the registry to var.registry_location + recreate the store volume in the new region — the store is a disposable GHCR mirror that re-fills from GHCR; scoped, guarded, no out-of-scope destroys) | git-data-host-replace (scoped -replace of the git-data host to re-run cloud-init; preserves BOTH data volumes + the LUKS passphrase; #6242) | workspaces-luks-cutover (#6604: FIRST-PROVISION +create of the five workspaces_luks resources — the encrypted volume + attachment + passphrase/secret/token — gate-guarded so it touches NEITHER the live plaintext /mnt/data volume/attachment NOR the web-1 server; the freeze/rsync/repoint runs from the separate environment-gated workspaces-luks-cutover.yml)"
        required: false
        default: manual-rerun
        type: choice
        options:
          - manual-rerun
          - inngest-host
          - inngest-host-replace
          - registry-host-replace
          - registry-region-migrate
          - git-data-host-replace
          - workspaces-luks-cutover

concurrency:
  # LOAD-BEARING shared group (#4844): this MUST be the IDENTICAL literal string
  # used in apply-deploy-pipeline-fix.yml. The R2 backend has NO state lock
  # (apps/web-platform/infra/main.tf `use_lockfile = false` — R2 lacks S3
  # conditional writes), so this shared GitHub Actions concurrency group is the
  # SOLE serializer preventing two concurrent `terraform apply` runs from
  # last-writer-wins-clobbering web-platform/terraform.tfstate. Both workflows
  # SSH-apply apparmor_bwrap_profile (this one in its SSH -target set; the other
  # pulls it transitively via deploy_pipeline_fix's depends_on), so they overlap
  # on the same R2 object. GHA does NOT error on divergent group strings — they
  # silently fail to serialize — so do not "rename for clarity".
  #
  # `cancel-in-progress: false` per `hr-multi-step-post-merge-bootstrap-script`
  # — cancelling a half-applied unlocked terraform run is the worse split-state.
  group: terraform-apply-web-platform-host
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: apps/web-platform/infra
  # cloudflared binary for the CF Tunnel SSH bridge (#4844) — the token-gated
  # SSH apply of the 8 server.tf terraform_data siblings reaches the host over
  # the tunnel via .github/actions/cf-tunnel-ssh-bridge. SHA-256 computed against
  # the real released binary at the pinned version (NEVER paste a checksum from
  # documentation or AI output per the 2026-03-21 server-provisioning learning,
  # Session Error #4; re-verified at /work time). Kept byte-identical to
  # apply-deploy-pipeline-fix.yml's pins so both bridges install the same binary.
  CLOUDFLARED_VERSION: "2026.5.0"
  CLOUDFLARED_SHA256: "0095e46fdc88855d801c4d304cb1f5dd4bd656116c47ab94c2ad0ae7cda1c7ec"

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # Anchor `[skip-web-platform-apply]` to its own line so it cannot
        # fire from a quoted block, code fence, or trailer that happens
        # to carry the literal substring. Symmetric posture with the
        # `[ack-destroy]` gate in the apply job.
        run: |
          set -euo pipefail
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-web-platform-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # Vector config + VRL fixture validation lives in its own workflow at
  # .github/workflows/validate-vector-config.yml (#4293 FR5) so it can trigger
  # on pull_request -- this workflow only triggers on push to main, which is
  # the apply gate. Branch protection requires the validate workflow's check
  # before merge.
  apply:
    needs: preflight
    # Runs on push (auto-apply) and on the `manual-rerun` dispatch (the historical
    # escape hatch). Every other `apply_target` value selects a dedicated dispatch
    # job below INSTEAD — the `if:` guards are mutually exclusive, so exactly one
    # apply path executes per dispatch.
    # On push, `inputs.apply_target` is null → the `github.event_name == 'push'`
    # clause carries it (current behavior, unchanged).
    if: >-
      needs.preflight.outputs.skip != 'true' &&
      (github.event_name == 'push' || inputs.apply_target == 'manual-rerun')
    runs-on: ubuntu-24.04
    # Budget: ~0.6 min/resource × ~70 targets = ~42 min worst-case cold-cache,
    # but plan + apply against an already-provisioned state typically completes
    # in ~3-5 min. 15 min is the operator-tolerance ceiling that matches
    # `apply-deploy-pipeline-fix.yml`.
    timeout-minutes: 15
    # No `environment:` reviewer gate. PR #4220 removed it: the per-apply
    # reviewer click was duplicative friction on top of the PR-merge gate
    # (CODEOWNERS review + branch protection on main), and was blocking
    # apply runs for up to 13h (#4204 on 2026-05-20). The PR-merge IS the
    # human authorization per `hr-menu-option-ack-not-prod-write-auth`.
    # `apply-github-infra.yml` already omits the gate without incident.
    # The "broader secret surface" rationale below was the original
    # justification for diverging from apply-github-infra.yml; in
    # practice the divergence produced friction without measurable
    # security benefit (a leaked PAT with `contents:write` can also
    # bypass the env gate by submitting a workflow change).

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering.
        # hcloud_ssh_key.default is NOT in the apply allow-list (header lines
        # 21-23), so this dummy public key is never consumed -- it just
        # satisfies HCL parsing. Mirrors scheduled-terraform-drift.yml:49-52.
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      # TWO-TOKEN MODEL (post-#4195). This workflow consumes two distinct
      # Doppler service tokens via separate GH Actions secrets:
      #
      #   - `secrets.DOPPLER_TOKEN`        — `prd_terraform` READ-only.
      #                                       Used by every step that only
      #                                       READS Doppler secrets (init,
      #                                       plan, apply).
      #   - `secrets.DOPPLER_TOKEN_WRITE`  — `prd_terraform` READ/WRITE.
      #                                       Used by the post-apply sync
      #                                       step that WRITES the
      #                                       CI_SSH_ACCESS_TOKEN_*
      #                                       outputs back into Doppler.
      #
      # New steps that need write access MUST use `DOPPLER_TOKEN_WRITE`;
      # do NOT copy the `secrets.DOPPLER_TOKEN` line below without
      # confirming the step only reads. The `--silent` + `add-mask`
      # discipline in the sync step (~line 367-368) is the leak-defense
      # for the write-scoped token.
      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        # `-lockfile=readonly` refuses to download a provider whose checksum
        # is not already in `.terraform.lock.hcl`. Combined with the committed
        # lockfile, this defends against a malicious republish of a pinned
        # provider version. Verified present:
        # `apps/web-platform/infra/.terraform.lock.hcl`.
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (allow-list, non-SSH resources only)
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # ALLOW-LIST MAINTENANCE: if a future PR adds a new `.tf` resource at
        # `apps/web-platform/infra/*.tf`, append a matching `-target=<addr>`
        # line below (and exclude server.tf SSH-provisioned resources per
        # header comment). `scheduled-terraform-drift.yml` is the 12h backstop
        # if you forget — drift surfaces in the next cron run.
        run: |
          # `-e` is intentionally omitted so we can capture terraform plan's
          # exit code in $rc — plan exits non-zero on legitimate failures we
          # want to surface, not abort silently. Re-enabled with `set -e`
          # after the rc-capture window per
          # `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -var="ssh_key_path=${CI_SSH_PUB}" \
              -target=betteruptime_policy.github_webhook \
              -target=betteruptime_monitor.github_webhook_failures \
              -target=betteruptime_heartbeat.github_webhook_sig_failures \
              -target=betteruptime_heartbeat.github_api_429_sustained \
              -target=cloudflare_ruleset.cache_shared_binaries \
              -target=doppler_secret.github_app_id \
              -target=doppler_secret.github_app_private_key \
              -target=random_id.github_webhook_secret \
              -target=doppler_secret.github_app_webhook_secret \
              -target=cloudflare_bot_management.soleur_ai \
              -target=cloudflare_ruleset.seo_page_redirects \
              -target=cloudflare_ruleset.seo_response_headers \
              -target=cloudflare_ruleset.seo_config_settings \
              -target=cloudflare_list.legal_redirects \
              -target=cloudflare_ruleset.bulk_redirects \
              -target=random_id.tunnel_secret \
              -target=cloudflare_zero_trust_tunnel_cloudflared.web \
              -target=cloudflare_zero_trust_tunnel_cloudflared_config.web \
              -target=cloudflare_zero_trust_access_application.deploy \
              -target=cloudflare_zero_trust_access_service_token.deploy \
              -target=cloudflare_zero_trust_access_policy.deploy_service_token \
              -target=cloudflare_zero_trust_access_application.ssh \
              -target=cloudflare_zero_trust_access_service_token.ci_ssh \
              -target=cloudflare_zero_trust_access_policy.ci_ssh_service_token \
              -target=cloudflare_notification_policy.service_token_expiry \
              -target=cloudflare_zone_settings_override.soleur_ai \
              -target=cloudflare_record.app \
              -target=cloudflare_record.deploy \
              -target=cloudflare_record.ssh \
              -target=cloudflare_record.dkim_resend \
              -target=cloudflare_record.spf_send \
              -target=cloudflare_record.mx_send \
              -target=cloudflare_record.dkim_resend_send \
              -target=cloudflare_record.spf_send_send \
              -target=cloudflare_record.mx_send_send \
              -target=cloudflare_record.dmarc \
              -target=cloudflare_record.supabase_custom_domain \
              -target=cloudflare_record.supabase_acme_challenge \
              -target=cloudflare_record.spf_root \
              -target=cloudflare_record.google_site_verification \
              -target=cloudflare_record.protonmail_verification \
              -target=cloudflare_record.protonmail_mx_primary \
              -target=cloudflare_record.protonmail_mx_secondary \
              -target=cloudflare_record.protonmail_dkim_1 \
              -target=cloudflare_record.protonmail_dkim_2 \
              -target=cloudflare_record.protonmail_dkim_3 \
              -target=cloudflare_record.github_pages \
              -target=cloudflare_record.www \
              -target=cloudflare_record.github_pages_challenge \
              -target=cloudflare_record.buttondown_ns1 \
              -target=cloudflare_record.buttondown_ns2 \
              -target=cloudflare_zone_dnssec.soleur_ai \
              -target=cloudflare_ruleset.allowlist_ai_crawlers \
              -target=random_id.kb_drift_ingest_signing_key \
              -target=doppler_secret.kb_drift_ingest_signing_key \
              -target=doppler_secret.kb_drift_ingest_signing_key_app_runtime \
              -target=doppler_secret.kb_drift_operator_founder_id_app_runtime \
              -target=doppler_secret.kb_drift_ingest_url \
              -target=doppler_service_token.kb_drift \
              -target=github_actions_secret.doppler_token_kb_drift \
              -target=doppler_service_token.write \
              -target=github_actions_secret.doppler_token_write \
              -target=doppler_service_token.inngest_arm_write \
              -target=github_repository_environment.inngest_cutover \
              -target=github_repository_environment.inngest_config_signing \
              -target=github_repository_environment.workspaces_luks_cutover \
              -target=cloudflare_r2_bucket.workspaces_luks_header \
              -target=doppler_secret.workspaces_luks_header_bucket \
              -target=doppler_secret.workspaces_luks_header_r2_endpoint \
              -target=doppler_service_token.workspaces_luks \
              -target=github_actions_secret.workspaces_luks_boot_token \
              -target=github_actions_secret.doppler_token_inngest_arm \
              -target=tls_private_key.ci_ssh \
              -target=doppler_secret.deploy_ssh_private_key \
              -target=doppler_secret.ghcr_read_user \
              -target=doppler_secret.ghcr_read_token \
              -target=doppler_service_token.ghcr_minter \
              -target=doppler_secret.ghcr_minter_doppler_token \
              -target=betteruptime_monitor.soleur_apex \
              -target=betteruptime_policy.uptime \
              -target=betteruptime_monitor.app \
              -target=random_id.inngest_signing_key_prd \
              -target=random_id.inngest_signing_key_dev \
              -target=random_id.inngest_event_key_prd \
              -target=random_id.inngest_event_key_dev \
              -target=random_id.inngest_manual_trigger_secret_prd \
              -target=random_id.inngest_manual_trigger_secret_dev \
              -target=doppler_secret.inngest_signing_key_prd \
              -target=doppler_secret.inngest_signing_key_dev \
              -target=doppler_secret.inngest_event_key_prd \
              -target=doppler_secret.inngest_event_key_dev \
              -target=doppler_secret.inngest_manual_trigger_secret_prd \
              -target=doppler_secret.inngest_manual_trigger_secret_dev \
              -target=betteruptime_heartbeat.inngest_prd \
              -target=betteruptime_policy.inngest \
              -target=doppler_secret.inngest_heartbeat_url_prd \
              -target=random_password.inngest_redis_password_prd \
              -target=doppler_secret.inngest_redis_password_prd \
              -target=github_actions_secret.supabase_access_token \
              -target=hcloud_firewall.web \
              -target=hcloud_firewall_attachment.web \
              -target=doppler_secret.resend_receiving_api_key \
              -target=doppler_secret.cf_api_token_dns_edit \
              -target=betteruptime_heartbeat.web_zot_consumer \
              -target=betteruptime_heartbeat.web_nic_guard \
              -target=doppler_secret.web_zot_consumer_url \
              -target=doppler_secret.web_nic_guard_url \
              -target=doppler_service_token.web_probes \
              -target=doppler_service_token.web_arm_write \
              -target=github_actions_secret.doppler_token_web_arm \
              -target=betteruptime_team_member.ops
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          # Authoritative destroy count via the structured plan, not the
          # `Plan: …` summary line. Sibling of apply-github-infra.yml's
          # destroy-guard (closes #4419 — extends the #4420 widening to
          # apply-web-platform-infra). Filter is path-specific per the
          # #4420 plan-review iteration; covers 5 vulnerable Cloudflare
          # resource types (ruleset.rules, tunnel.ingress_rule,
          # zone_settings.security_header, notification.email_integration,
          # access_policy.include). Source of truth:
          # tests/scripts/lib/destroy-guard-filter-web-platform.jq (also
          # exercised by tests/scripts/test-destroy-guard-counter-web-platform.sh).
          counts=$(terraform show -json tfplan | \
            jq -f "${GITHUB_WORKSPACE}/tests/scripts/lib/destroy-guard-filter-web-platform.jq")
          resource_deletes=$(echo "$counts" | jq -r '.resource_deletes')
          nested_deletes=$(echo "$counts" | jq -r '.nested_deletes')
          # reboot_updates (#5911): reboot-forcing in-place update on
          # hcloud_server.* (placement_group_id / server_type change →
          # power-off reboot of the running host, 0 destroys — invisible to
          # the two counters above). Source of truth:
          # tests/scripts/lib/destroy-guard-filter-web-platform.jq.
          reboot_updates=$(echo "$counts" | jq -r '.reboot_updates')
          # host_creates (#6416): a pure `+ create` of an hcloud_server /
          # hcloud_volume. INVISIBLE to all three counters above (no delete, no
          # nested-block shrinkage, not an ["update"]). This apply path must
          # NEVER birth a host: `-target` is transitive at the RESOURCE level, so
          # cloudflare_record.app (dns.tf) and hcloud_firewall_attachment.web
          # (firewall.tf) each pull the whole hcloud_server.web for_each map —
          # but the map's hcloud_server_network attachments are NOT
          # target-reachable. That asymmetry is exactly how soleur-web-2 came up
          # with no private-net IP, unable to reach zot at 10.0.1.30:5000, while
          # still serving as a CF tunnel connector replica (ADR-114 I1). Such a host
          # also boots with NO firewall (hcloud provider 1.63.0:
          # hcloud_firewall_attachment does not attach before first boot, unlike
          # hcloud_server.firewall_ids). Source of truth:
          # tests/scripts/lib/destroy-guard-filter-web-platform.jq.
          host_creates=$(echo "$counts" | jq -r '.host_creates')
          # Validate counters parsed correctly — empty values from a jq
          # failure would silently evaluate false in the `-gt 0` test and
          # let destructive plans slip past the guard.
          if [[ ! "$resource_deletes" =~ ^[0-9]+$ ]] || [[ ! "$nested_deletes" =~ ^[0-9]+$ ]] || [[ ! "$reboot_updates" =~ ^[0-9]+$ ]] || [[ ! "$host_creates" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy-guard counter parse failed (resource_deletes='${resource_deletes}', nested_deletes='${nested_deletes}', reboot_updates='${reboot_updates}', host_creates='${host_creates}')."
            exit 1
          fi
          # HALT on a host create — evaluated OUTSIDE the destroy_count sum below
          # and BEFORE it, so `[ack-destroy]` cannot bypass this one. Rationale:
          # ack is the right resolution for an intended nested-block removal, but
          # an unattended per-PR apply is never the right place to birth a host —
          # the dispatch jobs that legitimately create one are not gated here.
          # This is a TRIPWIRE, not a routine gate: host_creates == 0 on every
          # normal merge, so it is a no-op until the #6416 drift class recurs.
          if [[ "$host_creates" -gt 0 ]]; then
            echo "::error::terraform plan would CREATE ${host_creates} hcloud_server/hcloud_volume resource(s) on the per-PR apply path. This path must never birth a host: the server is target-reachable but its hcloud_server_network attachment is not, so the host would come up with no private-net IP (and, transiently, no firewall) — the #6416 failure mode."
            echo "::error::Remediation depends on WHICH host is being created (see the plan output above):"
            echo "::error::  • ANY hcloud_server.web[*] / its volume → there is NO automated path. Every route that could reach hcloud_server.web HALTs: this job (#6416), apply-deploy-pipeline-fix.yml (#6718) and workspaces-luks-cutover (gate requires zero actions on the web-1 server). Use the operator-local full apply below, run through the PINNED-IMAGE CHAIN at the end of this message."
            echo "::error::    This no-automated-web-host-birth state violates hr-fresh-host-provisioning-reachable-from-terraform-apply and is tracked by #6730 — that issue owns closing it. Scope: WEB hosts only (inngest-host below does birth a host, and the registry/git-data paths are scoped -replace)."
            echo "::error::  • hcloud_server.inngest → dispatch '-f apply_target=inngest-host'."
            echo "::error::  • hcloud_server.registry → NO dispatch creates it (registry-host-replace and registry-region-migrate are both scoped -replace and need the resource already in state). Run the operator-local full apply per the OPERATOR_APPLIED_EXCLUSIONS contract (ADR-096) BEFORE merging."
            echo "::error::  • a legitimate new host (e.g. web-3 added to var.web_hosts) → NO dispatch creates it either. The reason is the host_creates HALT on each of the three enumerated routes above. That HALT is NOT inherited: it is a separate inline copy per workflow (plus a distinct sourced gate for the luks cutover), and it lives in the apply job, whose if: guard is mutually exclusive with every dispatch job. A NEW dispatch job inherits nothing and MUST add its own guard. It needs an operator-local full apply BEFORE the code merges, or EVERY subsequent merge HALTs here — not just this PR's."
            echo "::error::PINNED-IMAGE CHAIN — run this BEFORE any operator-local apply that CREATES a web host. A create bakes var.image_name into user_data; the mutable ':latest' can resolve to an image whose baked /opt/soleur/host-scripts disagree with this tree, and the new host then aborts cloud-init at STAGE=verify and never serves (ADR-080). Pin a digest and prove coherence first:"
            echo "::error::    DIGEST=\$(crane digest ghcr.io/jikig-ai/soleur-web-platform:latest)   # any OCI digest reader works; crane is not preinstalled — go install github.com/google/go-containerregistry/cmd/crane@latest"
            echo "::error::    PINNED=\"ghcr.io/jikig-ai/soleur-web-platform@\${DIGEST}\""
            echo "::error::    PINNED=\"\$PINNED\" bash apps/web-platform/infra/scripts/host-image-coherence-preflight.sh   # docker-cp the pinned image's baked host-scripts out, recompute their combined sha256 byte-identically to the cloud-init boot check, and compare against 'terraform console local.host_scripts_content_hash'. exit 0 = coherent, non-zero = do NOT apply."
            echo "::error::    test -n \"\$(doppler secrets get SENTRY_DSN -p soleur -c prd_terraform --plain)\" || { echo 'EMPTY SENTRY_DSN — do NOT create the host'; exit 1; }   # MANDATORY (#6575). The pre-extraction boot stages read ONLY the baked \${sentry_dsn}; doppler is not installed yet, so its fallback is dead. An empty DSN means the host boots DARK: no telemetry, no page, no signal that it died. The web-2-recreate job used to assert this automatically; that job is gone and nothing else enforces it (ADR-128 makes it a MUST for the #6730 birth path)."
            echo "::error::    cd apps/web-platform/infra && doppler run -p soleur -c prd_terraform --name-transformer tf-var -- terraform apply -var image_name=\"\$PINNED\"   # full apply per the OPERATOR_APPLIED_EXCLUSIONS contract (ADR-096)"
            echo "::error::    Do not substitute 'just run the preflight' for this chain: the preflight REFUSES a mutable tag by design, so it is only actionable once DIGEST is resolved. And do not skip it — an incoherent pin destroys nothing at plan time, it strands you with a booted host that never passes verify."
            echo "::error::    hcloud_server.web carries lifecycle ignore_changes = [user_data, ssh_keys, image, placement_group_id] (server.tf). Two consequences: the pin is honoured ONLY at create, and a later routine merge apply passing ':latest' will NOT drift it back; conversely, editing user_data or image is INERT for an already-running host, so this chain matters only on the create path."
            echo "::error::UNWEDGE (immediate): add a line containing exactly '[skip-web-platform-apply]' to the merge commit message. That is the only bypass — [ack-destroy] deliberately does NOT reach this HALT. Use it to unblock merges while the correct dispatch/apply above is arranged; it skips the apply, it does not perform it."
            grep -E 'will be created|Plan:' tfplan.txt | head -20 >&2
            exit 1
          fi
          destroy_count=$((resource_deletes + nested_deletes + reboot_updates))
          # Anchor `[ack-destroy]` to its own line (start-of-string OR
          # preceded by newline; followed by newline OR end-of-string) so
          # the token cannot fire from a quoted block, code fence, or
          # `Co-Authored-By:` trailer carrying that literal substring.
          ack_destroy=false
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[ack-destroy\]($|$'\n') ]]; then
            ack_destroy=true
          fi
          if [[ "$destroy_count" -gt 0 ]] && [[ "$ack_destroy" != "true" ]]; then
            echo "::error::terraform plan shows ${destroy_count} destructive change(s) on web-platform infra (${resource_deletes} resource-level delete(s) + ${nested_deletes} nested-block removal(s) + ${reboot_updates} reboot-forcing in-place update(s) on hcloud_server.*)."
            # Only surface the generic `[ack-destroy]` instruction when a
            # delete/nested-removal component exists — ack is the correct
            # resolution there. On a PURE reboot trip (reboot_updates > 0 with
            # zero deletes) the generic line contradicts the reboot-specific
            # steer below, so suppress it: ack-through would execute the
            # transitively-included reboot on the unattended apply.
            # STEER (#6538 / AC-B5). The pre-#6538 text read: "Add a line
            # containing exactly '[ack-destroy]' ... or revert the trigger
            # commit." During a scoped host retirement BOTH of its options are
            # wrong, and this is the only instruction the operator sees:
            #
            #   - [ack-destroy] authorizes a PARTIAL destroy. This per-PR apply's
            #     `-target` scope reaches hcloud_server.web["web-2"] but NOT
            #     hcloud_volume.workspaces["web-2"] (measured 2026-07-17:
            #     `0 to add, 1 to change, 1 to destroy`). Acking through kills the
            #     host and strands a 20 GB volume that bills forever with nothing
            #     attached to it.
            #   - "revert the trigger commit" blames an INNOCENT merge. While
            #     config says N hosts and state still says N+1, EVERY merge trips
            #     this. The trigger is not the cause.
            #
            # The safe resolution is to skip THIS merge's apply and let the
            # supervised operator-local full-scope apply complete the retirement.
            # [ack-destroy] is still offered (it remains correct for an ordinary
            # intentional delete) but never bare — it carries the partial warning.
            echo "::error::If a scoped host retirement is in flight (config drops a host that is still in state), do NOT ack this. Add a line containing exactly '[skip-web-platform-apply]' to the merge commit message: it suppresses this merge's apply so the supervised full-scope apply can complete the retirement. Reverting the trigger commit does NOT help — the trigger is an innocent merge; every merge trips this until the retirement lands."
            if [[ "$resource_deletes" -gt 0 || "$nested_deletes" -gt 0 ]]; then
              echo "::error::Otherwise, for an ordinary intentional delete, add a line containing exactly '[ack-destroy]' to the merge commit message. WARNING: [ack-destroy] authorizes ONLY what this apply's -target scope reaches, which may be a PARTIAL destroy — e.g. a server deleted while its data volume is out of scope and survives, attached to nothing and still billing. Read the 'will be destroyed' list below and confirm it is the WHOLE intended change before acking."
            fi
            if [[ "$reboot_updates" -gt 0 ]]; then
              echo "::error::A reboot-forcing hcloud_server.* update is planned. Resolve via the operator maintenance-window apply — do NOT add [ack-destroy] to unblock this unattended apply: the host update is transitively in the saved plan, so ack-through would REBOOT prod unattended."
            fi
            grep -E 'will be destroyed|Plan:' tfplan.txt | head -20 >&2
            exit 1
          fi

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -auto-approve -input=false tfplan

      # Tunnel ingress origin verification (#6594 / ADR-114 I2).
      #
      # WHY THIS EXISTS: `terraform apply` of a Cloudflare tunnel config ALWAYS
      # succeeds — CF accepts an ingress `service` without ever checking the origin is
      # reachable. So a wrong origin (bad IP, wrong port, an un-converged private NIC)
      # applied GREEN and took out the management plane silently. Nothing else caught
      # it: apply-deploy-pipeline-fix.yml does NOT fire on tunnel.tf (its `paths:`
      # lists explicit .sh files + server.tf), and the SSH bridge's readiness check is
      # `nc -z 127.0.0.1 2222`, which proves only that the LOCAL cloudflared listener
      # opened — true whether or not the origin answers. A tunnel.tf-only merge had
      # ZERO post-apply verification: the same "closed by construction, verified by
      # nothing" defect (#6425/#6594) this change exists to retire. Do not delete
      # without a replacement that reads the LIVE config plane.
      #
      # Two instruments, because they prove different things:
      #   (a) CF API config read-back — authoritative, vantage-free. Proves the edge
      #       holds the config we intended.
      #   (b) HMAC probe of /hooks/deploy-status — proves the pinned origin is
      #       actually SERVING. (a) cannot: a perfect config pointing at a dead origin
      #       reads back clean.
      #
      # Deliberately NOT a data-plane distribution check: connector selection is
      # colo-STICKY (scheduled-inngest-health.yml — on 2026-07-15, 10/10 identical EU
      # reads "proved" inngest was down while a US runner read it healthy). Polling N
      # times from one runner colo samples ONE sticky binding N times, not a
      # distribution. (b) asserts an INVARIANT (the route serves), which is
      # colo-independent and needs no control arm.
      - name: Verify tunnel ingress origins are live and origin-relative
        if: success()
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/apps/web-platform/infra/scripts/verify-tunnel-ingress-origin.sh"

      # Bootstrap-cycle guard (#4195): on the FIRST apply that creates
      # `github_actions_secret.doppler_token_write`, the runner started
      # before the secret existed — interpolation returns empty for
      # that one run because GH Actions resolves secrets at job-start,
      # not step-start. The warning is non-fatal; the operator re-fires
      # the workflow once after first merge via `gh workflow run
      # apply-web-platform-infra.yml --ref main -F reason='bootstrap'`.
      # The local-fallback script
      # `apps/web-platform/infra/scripts/sync-ci-ssh-access-token.sh`
      # remains available as backup. Operator follow-through obligation
      # is tracked separately as a `follow-through` GH issue per
      # `wg-block-pr-ready-on-undeferred-operator-steps`.
      - name: Verify DOPPLER_TOKEN_WRITE present
        id: doppler_write_check
        env:
          DOPPLER_TOKEN_WRITE_CHECK: ${{ secrets.DOPPLER_TOKEN_WRITE }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_WRITE_CHECK" ]]; then
            echo "::warning::DOPPLER_TOKEN_WRITE not yet present — this is expected on the first apply that creates it. Subsequent applies will use the synced token. If you see this on the second+ run, manually trigger one more apply via gh workflow run."
            echo "skip_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync CF Access CI-SSH service token to Doppler
        # Reads the new sensitive outputs produced by the
        # `cloudflare_zero_trust_access_service_token.ci_ssh` resource
        # and writes them into Doppler prd_terraform so the sibling
        # `apply-deploy-pipeline-fix.yml` workflow can pull them at run
        # time without an operator handoff step (closes #4177 P1).
        # Idempotent — doppler-secrets-set overwrites in place.
        # Uses the in-band-minted write-capable service token (post-#4195
        # — see apps/web-platform/infra/doppler-write-token.tf) — every
        # other step in this workflow consumes the existing read-only
        # token.
        if: steps.doppler_write_check.outputs.skip_sync != 'true'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_WRITE }}
        run: |
          set -euo pipefail
          CLIENT_ID=$(terraform output -raw ci_ssh_access_service_token_client_id 2>/dev/null || true)
          CLIENT_SECRET=$(terraform output -raw ci_ssh_access_service_token_client_secret 2>/dev/null || true)
          if [[ -z "$CLIENT_ID" || -z "$CLIENT_SECRET" ]]; then
            echo "::warning::ci_ssh_access_service_token outputs missing or empty — likely a -target= run that skipped the SSH-access resources. Falling back to operator sync."
            exit 0
          fi
          printf '::add-mask::%s\n' "$CLIENT_ID"
          printf '::add-mask::%s\n' "$CLIENT_SECRET"
          # `--silent` suppresses doppler's success-path value-echo;
          # stderr is intentionally NOT redirected so permission-denied
          # / quota / network errors surface in the GH Actions log (the
          # original #4195 failure was masked by a `>/dev/null 2>&1`
          # redirect on these two lines).
          printf '%s' "$CLIENT_ID" \
            | doppler secrets set CI_SSH_ACCESS_TOKEN_ID --silent --no-interactive -p soleur -c prd_terraform
          printf '%s' "$CLIENT_SECRET" \
            | doppler secrets set CI_SSH_ACCESS_TOKEN_SECRET --silent --no-interactive -p soleur -c prd_terraform
          unset CLIENT_ID CLIENT_SECRET
          echo "Synced CI_SSH_ACCESS_TOKEN_ID/_SECRET to Doppler prd_terraform."

      # --- #4844: token-gated SSH apply of the 8 server.tf terraform_data siblings ---
      # Runs AFTER the post-apply token sync above (shape B) so a from-scratch
      # rebuild self-heals: the bridge needs the CF Access ci_ssh token that the
      # sync step produces, so on the very first apply (tokens absent) this step
      # `::warning::`-skips and the next run lands the 8 once the token exists.
      - name: Check CI-SSH token presence (gates the SSH apply)
        id: ssh_token_gate
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        # Mirrors the skip_sync bootstrap-cycle guard above. `doppler secrets get
        # --plain` returns rc=1 when the key is absent and rc=0 + empty stdout
        # when present-but-empty; the `-z` guard catches both.
        run: |
          set -euo pipefail
          TOKEN_ID=$(doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain 2>/dev/null || true)
          if [[ -z "$TOKEN_ID" ]]; then
            echo "ssh_apply_skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::first-bootstrap: CI_SSH_ACCESS_TOKEN_ID absent in Doppler prd_terraform — the 8 SSH-provisioned resources are deferred to the next run after the token sync lands. The non-SSH apply + token sync above still succeeded."
          else
            echo "ssh_apply_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CF Tunnel SSH bridge (gated)
        if: steps.ssh_token_gate.outputs.ssh_apply_skip != 'true'
        uses: ./.github/actions/cf-tunnel-ssh-bridge
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          infra-dir: ${{ env.INFRA_DIR }}
          cloudflared-version: ${{ env.CLOUDFLARED_VERSION }}
          cloudflared-sha256: ${{ env.CLOUDFLARED_SHA256 }}

      - name: Terraform apply (SSH-provisioned resources, over the bridge)
        if: steps.ssh_token_gate.outputs.ssh_apply_skip != 'true'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # No destroy-guard on this step (data-integrity Q4 / AC9): the
        # destroy-guard-filter-web-platform.jq scope is Cloudflare-resource-only
        # and would never flag a `terraform_data` replace, AND none of the 7
        # resources has a `when = destroy` provisioner — a triggers_replace
        # destroy+recreate is a pure state-entry swap with no on-host teardown.
        # A future maintainer adding a destroy-provisioned SSH resource here MUST
        # add guard coverage.
        #
        # This is a SEPARATE `terraform apply` (not the saved tfplan), so it runs
        # its own internal plan against the 8 targets. R2 backend creds (bare
        # AWS_ACCESS_KEY_ID/_SECRET) are already in $GITHUB_ENV from "Extract
        # backend credentials" and persist across steps; `--name-transformer
        # tf-var` injects TF_VAR_* doppler secrets but passes those bare AWS_*
        # vars through untouched (same pattern as the main apply above).
        # `-var="ssh_key_path=${CI_SSH_PUB}"` satisfies HCL file() parsing for the
        # excluded hcloud_ssh_key.default (never consumed; see the plan step).
        # TF_VAR_ci_ssh_private_key is exported by the bridge action → agent=false.
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -auto-approve -input=false \
              -var="ssh_key_path=${CI_SSH_PUB}" \
              -target=terraform_data.disk_monitor_install \
              -target=terraform_data.resource_monitor_install \
              -target=terraform_data.container_restart_monitor_install \
              -target=terraform_data.fail2ban_tuning \
              -target=terraform_data.journald_persistent \
              -target=terraform_data.cosign_trusted_root \
              -target=terraform_data.registry_insecure_config \
              -target=terraform_data.docker_seccomp_config \
              -target=terraform_data.apparmor_bwrap_profile \
              -target=terraform_data.orphan_reaper_install \
              -target=terraform_data.cron_egress_firewall \
              -target=terraform_data.private_nic_guard_install \
              -target=terraform_data.zot_consumer_probe_install \
              -target=terraform_data.git_data_probe_install

      # --- #6438/#6548: measured-beat ARM gate (ADR-117 automated) ------------------------------
      # The brand-critical step (#6400 shape prevention): a heartbeat that ships GREEN-but-inert is
      # the very failure this bundle exists to catch, so acceptance is a REAL measured beat, never a
      # passing unit test. The sequence is ADR-117's (VERIFIED against the live Better Stack API):
      # a paused heartbeat exposes NO usable ping timestamp — `attributes` is
      # {status, paused, period, grace, updated_at, url, …} with NO last_ping_at, and `updated_at`
      # does not move when a beat arrives while paused. So the only way to MEASURE a real beat is to
      # UNPAUSE and watch `status` transition to `up`, rolling back BEFORE the first absence alert if
      # it never does. For each web-host probe/guard heartbeat + git_data_prd this:
      #   1. resolves the monitor id from TFSTATE (never a name-regex — a name collision would arm
      #      the wrong monitor);
      #   2. OP/STATE-GATES on live `status=="paused"`: a monitor already `up`/`pending`/`down`
      #      (ignore_changes=[paused] keeps SOURCE paused=true forever, but a prior arm unpaused it
      #      LIVE) is skipped, so routine re-applies are a TRUE no-op and never flake on a BS blip;
      #   3. PATCH {paused:false}, then poll `status` every 10s until `up` within period+grace−10s;
      #   4. `up` ⇒ a real beat landed ⇒ ARMED. Otherwise PATCH {paused:true} IMMEDIATELY (roll back
      #      BEFORE the first absence alert would fire) and FAIL the apply loud — never leave an
      #      unfed monitor live, never leave a green-but-inert one paused-and-forgotten.
      # Uses the DEDICATED DOPPLER_TOKEN_WEB_ARM (read) to fetch BETTERSTACK_API_TOKEN, then writes
      # the account-wide Better Stack API (blast radius recorded in ADR-117). The read-only
      # "Best-effort heartbeat status" steps are deliberately NOT reused (they swallow errors and
      # return "unavailable"). Never gated on the provisioner's exit code (P0-1). Runs only when the
      # SSH provisioners actually installed the timers this run.
      - name: Arm web-host probe heartbeats (unpause→verify-status→rollback, fail-loud)
        if: steps.ssh_token_gate.outputs.ssh_apply_skip != 'true'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN_WEB_ARM: ${{ secrets.DOPPLER_TOKEN_WEB_ARM }}
        run: |
          set -uo pipefail
          if [[ -z "${DOPPLER_TOKEN_WEB_ARM:-}" ]]; then
            echo "::error::DOPPLER_TOKEN_WEB_ARM is not configured — cannot arm the measured-beat heartbeats. It is minted by doppler_service_token.web_arm_write on the FIRST apply that lands web-arm-write-token.tf; re-run this workflow once that token has synced."
            exit 1
          fi
          BS_TOKEN=$(doppler secrets get BETTERSTACK_API_TOKEN --plain --token "$DOPPLER_TOKEN_WEB_ARM" 2>/dev/null || true)
          if [[ -z "$BS_TOKEN" ]]; then
            echo "::error::BETTERSTACK_API_TOKEN unreadable via DOPPLER_TOKEN_WEB_ARM."
            exit 1
          fi
          printf '::add-mask::%s\n' "$BS_TOKEN"
          terraform show -json > /tmp/webplat-tfstate.json

          hb_status() {  # <id> -> prints attributes.status (empty on lookup failure)
            curl -fsS --max-time 15 -H "Authorization: Bearer ${BS_TOKEN}" \
              "https://uptime.betterstack.com/api/v2/heartbeats/$1" 2>/dev/null \
              | jq -r '.data.attributes.status // empty' 2>/dev/null || true
          }
          hb_patch_paused() {  # <id> <true|false> -> exit 0 on success
            curl -fsS --max-time 15 -X PATCH \
              -H "Authorization: Bearer ${BS_TOKEN}" -H 'Content-Type: application/json' \
              "https://uptime.betterstack.com/api/v2/heartbeats/$1" \
              --data-raw "{\"paused\":$2}" >/dev/null 2>&1
          }

          # arm_one <state-address> <label> <deadline_seconds = period + grace - 10>
          arm_one() {
            local addr="$1" label="$2" deadline="$3"
            local id status
            id=$(jq -r --arg a "$addr" '.values.root_module.resources[]? | select(.address==$a) | .values.id' /tmp/webplat-tfstate.json)
            if [[ -z "$id" || "$id" == "null" ]]; then
              echo "::notice::${label}: not present in tfstate (address ${addr}) — skipping (this apply path did not create it)."
              return 0
            fi
            status=$(hb_status "$id")
            if [[ -z "$status" ]]; then
              echo "::error::${label}: GET /heartbeats/${id} failed — cannot verify arm state."
              return 1
            fi
            if [[ "$status" != "paused" ]]; then
              echo "${label}: already armed (status=${status}) — no-op."
              return 0
            fi
            echo "${label}: monitor ${id} is paused; unpausing and watching for a real beat (status→up, deadline=${deadline}s)…"
            if ! hb_patch_paused "$id" false; then
              echo "::error::${label}: PATCH paused=false FAILED — cannot begin arming."
              return 1
            fi
            local waited=0
            while (( waited < deadline )); do
              sleep 10
              waited=$(( waited + 10 ))
              status=$(hb_status "$id")
              if [[ "$status" == "up" ]]; then
                echo "::notice::${label}: status=up within ${waited}s — a real beat landed. ARMED."
                return 0
              fi
            done
            # No `up` in time: roll back to paused BEFORE the first absence alert, then fail loud.
            hb_patch_paused "$id" true || echo "::error::${label}: rollback PATCH paused=true ALSO failed — the monitor is unpaused-and-unfed; investigate immediately."
            echo "::error::${label}: status never reached 'up' within ${deadline}s (probe timer never pinged) — ROLLED BACK to paused and FAILING the apply. A green-but-inert monitor is the #6400 shape this gate exists to prevent. Investigate: is the web-1 timer installed + the private-net path healthy?"
            return 1
          }

          rc=0
          # deadline = period + grace − 10 (roll back just before the first absence alert):
          # zot 180+60−10, nic-guard 360+120−10, git-data 60+180−10.
          arm_one 'betteruptime_heartbeat.web_zot_consumer["web-1"]' 'web-zot-consumer (web-1)' 230 || rc=1
          arm_one 'betteruptime_heartbeat.web_nic_guard["web-1"]'    'web-nic-guard (web-1)'    470 || rc=1
          arm_one 'betteruptime_heartbeat.git_data_prd'              'git-data-prd'             230 || rc=1
          exit "$rc"

      - name: Tear down cloudflared SSH bridge
        if: always()
        # Caller-side teardown (the composite action cannot register a post-job
        # hook). The `-n` guards make this a clean no-op when the bridge never ran
        # (gated-skip or pre-bridge failure → SERVER_IP/CLOUDFLARED_PID unset), so
        # it is intentionally `if: always()` (not gated on ssh_apply_skip). A
        # left-over OUTPUT NAT rule or orphaned cloudflared would corrupt a later
        # job on a persistent runner (moot on GH-hosted ephemeral runners, but the
        # discipline is required — SpecFlow 1a).
        run: |
          set +e
          if [[ -n "${SERVER_IP:-}" ]]; then
            sudo iptables -t nat -D OUTPUT \
              -d "$SERVER_IP" -p tcp --dport 22 \
              -j REDIRECT --to-ports 2222 2>/dev/null || true
          fi
          if [[ -n "${CLOUDFLARED_PID:-}" ]]; then
            kill "$CLOUDFLARED_PID" 2>/dev/null || true
          fi
          if [[ -f /tmp/cloudflared.log ]]; then
            echo "=== /tmp/cloudflared.log (last 200 lines) ==="
            if [[ -s /tmp/cloudflared.log ]]; then
              tail -n 200 /tmp/cloudflared.log
            else
              echo "(log empty — cloudflared may have failed before writing any output)"
            fi
          fi

      - name: Post-apply summary
        if: always()
        env:
          TRIGGER: ${{ github.event_name }}
          MERGE_SHA: ${{ github.sha }}
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## Apply web-platform infra"
            echo ""
            echo "**Trigger:** ${TRIGGER}"
            echo "**Merge SHA:** ${MERGE_SHA}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # #6178 (ADR-100) — provision the dedicated Inngest singleton host. A dispatch-only job
  # (apply_target=inngest-host) whose -targets are STRIPPED from the per-merge coverage set
  # (terraform-target-parity.test.ts stripDispatchJobs). PURE CREATE of the net-new host set:
  # the per-PR CI apply bridges over SSH to the EXISTING web host and cannot provision a brand-
  # new host (registry/git-data precedent). Cloud-init-only, NO remote-exec → no operator-egress
  # firewall dependency at apply time (reaches Hetzner's API, not SSH).
  inngest_host:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'inngest-host'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering. The
        # inngest set does not consume hcloud_ssh_key.default's file, but var.ssh_key_path
        # must parse — a throwaway key satisfies it (never consumed by the apply).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (inngest-host target set)
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # EXACTLY the inngest-host set enumerated in OPERATOR_APPLIED_EXCLUSIONS
        # (terraform-target-parity.test.ts). Pure create — the destroy-guard below fails
        # the dispatch on ANY resource delete (a net-new host apply must add, never remove).
        run: |
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -var="ssh_key_path=${CI_SSH_PUB}" \
              -target='hcloud_server.inngest' \
              -target='hcloud_volume.inngest_redis' \
              -target='hcloud_volume_attachment.inngest_redis' \
              -target='hcloud_server_network.inngest' \
              -target='hcloud_firewall.inngest' \
              -target='hcloud_firewall_attachment.inngest' \
              -target='random_id.inngest_signing_key_dedicated' \
              -target='random_id.inngest_event_key_dedicated' \
              -target='random_password.inngest_redis_password_dedicated' \
              -target='doppler_project.inngest' \
              -target='doppler_environment.inngest_prd' \
              -target='doppler_secret.inngest_signing_key_dedicated' \
              -target='doppler_secret.inngest_event_key_dedicated' \
              -target='doppler_secret.inngest_redis_password_dedicated' \
              -target='doppler_secret.inngest_betterstack_logs_token' \
              -target='doppler_service_token.inngest'
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (inngest-host) failed (exit $rc)."
            exit $rc
          fi
          set -e
          # Additive-only guard (the same filter the `apply` job uses): a net-new
          # host provisioning must create, never destroy. Any delete → abort BEFORE apply.
          counts=$(terraform show -json tfplan | \
            jq -f "${GITHUB_WORKSPACE}/tests/scripts/lib/destroy-guard-filter-web-platform.jq")
          resource_deletes=$(echo "$counts" | jq -r '.resource_deletes')
          nested_deletes=$(echo "$counts" | jq -r '.nested_deletes')
          if [[ ! "$resource_deletes" =~ ^[0-9]+$ ]] || [[ ! "$nested_deletes" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy-guard counter parse failed (resource_deletes='${resource_deletes}', nested_deletes='${nested_deletes}')."
            exit 1
          fi
          if [[ "$resource_deletes" -gt 0 || "$nested_deletes" -gt 0 ]]; then
            echo "::error::inngest-host plan shows destructive change(s) (${resource_deletes} resource delete(s) + ${nested_deletes} nested-block removal(s)) — provisioning a brand-new host is additive-only. Aborting."
            terraform show -no-color tfplan | grep -E 'will be destroyed|Plan:' | head -20 >&2
            exit 1
          fi
          terraform show -no-color tfplan | grep -E '^Plan:' || true

      - name: Terraform apply (inngest-host)
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## inngest-host provisioning (ADR-100, #6178)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── inngest-host scoped -replace (dispatch-only; re-run cloud-init; #6197) ────
  # Selected by `-f apply_target=inngest-host-replace`. The additive-only `inngest_host`
  # job above CANNOT force-replace the host (its destroy-guard aborts on any delete), so a
  # cloud-init/bootstrap change (e.g. the arm64 Vector wiring, #6197) that force-replaces
  # hcloud_server.inngest needs THIS scoped -replace path — the same gated, scoped -replace
  # shape the registry-host-replace and git-data-host-replace jobs use. The
  # sourced inngest_host_replace_gate permits EXACTLY the server + its 2 id-referencing
  # dependents and PRESERVES the durable Redis AOF volume (hcloud_volume.inngest_redis).
  # ADR-100: this host is the SOLE scheduler post-cutover — gate this to the maintenance window.
  inngest_host_replace:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'inngest-host-replace'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped inngest replace).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (scoped inngest-host -replace) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Scoped -replace of the inngest server + its 2 id-referencing dependents
        # (hcloud_server_network.inngest, hcloud_volume_attachment.inngest_redis — both
        # interpolate the NEW server id → ForceNew replace). hcloud_volume.inngest_redis is
        # DELIBERATELY NOT -targeted so the durable Redis AOF volume is preserved. The sourced
        # inngest_host_replace_gate (no [ack-destroy] bypass) reads the STRUCTURED plan JSON and
        # ABORTS unless the plan is EXACTLY the scoped recreate.
        run: |
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -replace='hcloud_server.inngest' \
              -target='hcloud_server.inngest' \
              -target='hcloud_server_network.inngest' \
              -target='hcloud_volume_attachment.inngest_redis' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (inngest-host-replace) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-inngest-host-replace-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/inngest-host-replace-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/inngest-host-replace-gate.sh"
          if ! inngest_host_replace_gate tfplan.json; then
            echo "::error::inngest-host-replace destroy-guard ABORTED: the plan is not the exact scoped inngest-host recreate (an out-of-scope change, a Redis AOF volume destroy, or a no-op). Refusing to apply. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be updated in-place|Plan:' tfplan.txt | head -30 >&2
            exit 1
          fi
          # #6453 STOCK preflight — TRIPWIRE, not a routine gate (posture matches :447). The
          # guard above proves the plan's SHAPE; it cannot prove the create is FEASIBLE. A
          # -replace DESTROYS first, so with no DC stock the destroy succeeds, the create fails
          # resource_unavailable, and the fleet strands with no rollback (#6393 -> ~10h prod
          # deploy freeze, #6400). The account CAP never engages — a -replace frees its own
          # slot. Full rationale + the available-vs-supported trap: the gate lib's header.
          # HCLOUD_TOKEN: this step's env: is DOPPLER_TOKEN only and the sourced gate runs
          # OUTSIDE the `doppler run` wrapper above — without this read it fail-closes on EVERY
          # dispatch (an outage, not a tripwire). Read-only; never echoed. Precedent:
          # cutover-inngest.yml:359.
          HCLOUD_TOKEN=$(doppler secrets get HCLOUD_TOKEN -p soleur -c prd_terraform --plain) || HCLOUD_TOKEN=""
          # Doppler-fetched secrets are NOT auto-masked by Actions (unlike secrets.*) — mask
          # before any later step can echo it. This token carries destroy authority over the
          # whole prod fleet. Convention: cla-evidence.yml:63, apply-github-infra.yml:134.
          [[ -n "$HCLOUD_TOKEN" ]] && printf '::add-mask::%s\n' "$HCLOUD_TOKEN"
          if [[ -z "$HCLOUD_TOKEN" ]]; then
            echo "::error::stock-preflight ABORT: cannot read HCLOUD_TOKEN from Doppler (prd_terraform) — cannot PROVE stock. Fail-closed: an unreadable token is not evidence of availability. NO [ack-destroy] bypass."
            exit 1
          fi
          export HCLOUD_TOKEN
          # shellcheck source=tests/scripts/lib/stock-preflight-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/stock-preflight-gate.sh"
          if ! stock_preflight_gate tfplan.json; then
            echo "::error::inngest-host-replace stock-preflight ABORTED: the planned server_type is not orderable in its target location (see the ::error:: lines above). Refusing to apply — the destroy would succeed and the create would not, stranding the inngest host with its Redis AOF volume detached (#6393, #6463). NO [ack-destroy] bypass on this path."
            exit 1
          fi
          echo "inngest-host-replace plan is the exact scoped recreate. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (inngest-host -replace) — Redis-volume-preserved assert
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply: prove from the SAVED plan (the exact plan
        # we applied) that the Redis AOF volume carries no delete action (backstop to the guard).
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan
          VOL_DELETES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume.inngest_redis")
            | select(.change.actions? | index("delete"))] | length' tfplan.json)
          if [[ "$VOL_DELETES" != "0" ]]; then
            echo "::error::hcloud_volume.inngest_redis shows ${VOL_DELETES} delete action(s) in the applied plan — the Redis AOF volume must be preserved. This should have been caught by the guard; failing hard."
            exit 1
          fi
          echo "Redis AOF volume preserved (0 delete actions in the applied plan)."

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## inngest-host-replace (ADR-100, #6197)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── registry-host scoped -replace (dispatch-only; re-run cloud-init; ADR-096) ─
  # Selected by `-f apply_target=registry-host-replace`. zot-registry.tf resources are
  # OPERATOR_APPLIED_EXCLUSIONS (CTO ruling 2026-07-06) — deliberately NOT in the per-PR
  # `-target=` allow-list, and the per-PR path bridges over SSH to the EXISTING web host so
  # it cannot reprovision the registry host at all. This scoped -replace is the sanctioned
  # non-SSH reprovision path (mirrors inngest_host_replace / ADR-100): it re-runs the
  # registry cloud-init (installs the zot-disk-heartbeat cron + storage.retention) and
  # applies any pending storage-volume resize, WITHOUT destroying the zot OCI store.
  #
  # 6-target scope (server + its 3 id-referencing dependents + the storage volume + the isolated
  # Better Stack Logs token secret):
  #   hcloud_server.registry             (-replace: force a fresh cloud-init boot)
  #   hcloud_server_network.registry     (network.tf — server_id ForceNew → replace; else the
  #                                        new host has no private NIC 10.0.1.30 for web pulls)
  #   hcloud_volume_attachment.registry  (zot-registry.tf — server_id ForceNew → replace)
  #   hcloud_firewall_attachment.registry (server_ids update-in-place; INTENTIONAL deviation
  #                                        from inngest — else the new host loses its deny-all
  #                                        public firewall on first boot)
  #   hcloud_volume.registry             (in-scope so the storage volume's pending size update
  #                                        can ride in; the gate PRESERVES it — size-update-only,
  #                                        NEVER delete/forget/replace)
  #   doppler_secret.registry_betterstack_logs_token (#6244 — MUST ride the SAME dispatch: the
  #                                        amended boot guard now expects a 3rd admitted secret
  #                                        (BETTERSTACK_LOGS_TOKEN); without it the guard FATALs
  #                                        and zot never launches. A pure-create on first apply,
  #                                        no-op thereafter — the gate admits it in its allow-set.)
  # The sourced registry_host_replace_gate (no [ack-destroy] bypass) reads the STRUCTURED plan
  # JSON and ABORTS unless the plan is EXACTLY this scoped recreate with the store preserved.
  registry_host_replace:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'registry-host-replace'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped registry replace).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (scoped registry-host -replace) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Scoped -replace of the registry server + its 3 id-referencing dependents + the
        # in-scope storage volume (permitted a size-update-only, preserved by the gate). The
        # sourced registry_host_replace_gate (no [ack-destroy] bypass) reads the STRUCTURED
        # plan JSON and ABORTS unless the plan is EXACTLY the scoped recreate.
        run: |
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -replace='hcloud_server.registry' \
              -target='hcloud_server.registry' \
              -target='hcloud_server_network.registry' \
              -target='hcloud_volume_attachment.registry' \
              -target='hcloud_firewall_attachment.registry' \
              -target='hcloud_volume.registry' \
              -target='doppler_secret.registry_betterstack_logs_token' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (registry-host-replace) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-registry-host-replace-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/registry-host-replace-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/registry-host-replace-gate.sh"
          if ! registry_host_replace_gate tfplan.json; then
            echo "::error::registry-host-replace destroy-guard ABORTED: the plan is not the exact scoped registry-host recreate. Refusing to apply. Specifically verify: the zot OCI STORE volume (hcloud_volume.registry) is preserved (no delete/forget/replace), the private NIC (hcloud_server_network.registry) is re-created, and the deny-all FIREWALL (hcloud_firewall_attachment.registry) is re-attached. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be updated in-place|Plan:' tfplan.txt | head -30 >&2
            exit 1
          fi
          # #6453 STOCK preflight — TRIPWIRE, not a routine gate (posture matches :447). The
          # guard above proves the plan's SHAPE; it cannot prove the create is FEASIBLE. A
          # -replace DESTROYS first, so with no DC stock the destroy succeeds, the create fails
          # resource_unavailable, and the fleet strands with no rollback (#6393 -> ~10h prod
          # deploy freeze, #6400). The account CAP never engages — a -replace frees its own
          # slot. Full rationale + the available-vs-supported trap: the gate lib's header.
          # HCLOUD_TOKEN: this step's env: is DOPPLER_TOKEN only and the sourced gate runs
          # OUTSIDE the `doppler run` wrapper above — without this read it fail-closes on EVERY
          # dispatch (an outage, not a tripwire). Read-only; never echoed. Precedent:
          # cutover-inngest.yml:359.
          HCLOUD_TOKEN=$(doppler secrets get HCLOUD_TOKEN -p soleur -c prd_terraform --plain) || HCLOUD_TOKEN=""
          # Doppler-fetched secrets are NOT auto-masked by Actions (unlike secrets.*) — mask
          # before any later step can echo it. This token carries destroy authority over the
          # whole prod fleet. Convention: cla-evidence.yml:63, apply-github-infra.yml:134.
          [[ -n "$HCLOUD_TOKEN" ]] && printf '::add-mask::%s\n' "$HCLOUD_TOKEN"
          if [[ -z "$HCLOUD_TOKEN" ]]; then
            echo "::error::stock-preflight ABORT: cannot read HCLOUD_TOKEN from Doppler (prd_terraform) — cannot PROVE stock. Fail-closed: an unreadable token is not evidence of availability. NO [ack-destroy] bypass."
            exit 1
          fi
          export HCLOUD_TOKEN
          # shellcheck source=tests/scripts/lib/stock-preflight-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/stock-preflight-gate.sh"
          if ! stock_preflight_gate tfplan.json; then
            echo "::error::registry-host-replace stock-preflight ABORTED: the planned server_type is not orderable in its target location (see the ::error:: lines above). Refusing to apply — the destroy would succeed and the create would not, stranding the registry with its zot store volume detached (#6393, #6463). NO [ack-destroy] bypass on this path."
            exit 1
          fi
          echo "registry-host-replace plan is the exact scoped recreate. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (registry-host -replace) — store-volume-preserved assert
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan (the exact
        # plan we applied): the zot store volume carries 0 delete/forget actions (preserved), and
        # the private NIC shows a create (re-attached) — belt-and-suspenders to the guard.
        run: |
          set -euo pipefail
          # A mid-replace apply failure (old host destroyed, new create fails — quota/image/boot)
          # leaves the registry DOWN. Emit a self-documenting recovery annotation, then fail hard
          # (gating behavior unchanged). Serving is covered by the ADR-096 GHCR dark-launch
          # fallback; the store volume is preserved (guarded), so re-dispatch re-creates the host.
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (registry-host-replace) failed mid-replace — registry may be DOWN; GHCR fallback covers serving; re-dispatch registry-host-replace to recover from the preserved volume"
            exit 1
          fi
          VOL_DELETES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume.registry")
            | select(.change.actions? | any(. == "delete" or . == "forget"))] | length' tfplan.json)
          if [[ "$VOL_DELETES" != "0" ]]; then
            echo "::error::hcloud_volume.registry shows ${VOL_DELETES} delete/forget action(s) in the applied plan — the zot OCI store must be preserved. This should have been caught by the guard; failing hard."
            exit 1
          fi
          NIC_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_server_network.registry")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$NIC_CREATES" == "0" ]]; then
            echo "::error::hcloud_server_network.registry shows no create action in the applied plan — the new host would have no private NIC. This should have been caught by the guard; failing hard."
            exit 1
          fi
          echo "zot store volume preserved (0 delete/forget) and private NIC re-attached (create present) in the applied plan."

      - name: Best-effort heartbeat status (non-gating)
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # INFORMATIONAL only — MUST NOT gate the apply (Better Stack ingestion lags a fresh
        # boot ping; the deterministic plan/apply guards above gate the job, and the
        # authoritative bounded-poll assert lives post-merge). A never-pinged disk heartbeat
        # reads pending/down; only `up` proves the redeploy's first ping arrived. Swallows
        # every error so a status lookup can never fail a prod apply.
        run: |
          set +e
          STATUS="unavailable (lookup failed or not yet ingested)"
          TOKEN=$(doppler secrets get BETTERSTACK_API_TOKEN --plain 2>/dev/null)
          if [[ -n "$TOKEN" ]]; then
            printf '::add-mask::%s\n' "$TOKEN"
            BODY=$(curl -fsS --max-time 10 -H "Authorization: Bearer ${TOKEN}" \
              https://uptime.betterstack.com/api/v2/heartbeats 2>/dev/null)
            if [[ -n "$BODY" ]]; then
              S=$(printf '%s' "$BODY" | jq -r '.data[]? | select(.attributes.name=="soleur-registry-disk-prd") | .attributes.status' 2>/dev/null | head -1)
              [[ -n "$S" ]] && STATUS="$S"
            fi
          fi
          {
            echo "## registry disk heartbeat (best-effort, non-gating)"
            echo ""
            echo "\`soleur-registry-disk-prd\` status: **${STATUS}**"
            echo ""
            echo "_Authoritative bounded-poll (status==up + incident auto-resolve) runs post-merge; this line is informational._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## registry-host-replace (ADR-096)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Selected by `-f apply_target=registry-region-migrate` (#6288). A REGION migration
  # (var.registry_location change) is ForceNew on hcloud_volume.registry: the zot store volume is
  # DESTROYED in the old region and RECREATED in the new one. registry-host-replace forbids that
  # (store_destroyed==0); this path PERMITS it because the 35 GB store is a DISPOSABLE GHCR MIRROR
  # that re-fills from GHCR on the next CI dual-push (pulls fall through to GHCR meanwhile —
  # non-release-blocking, ADR-096). It exists because the #6288 OOM remediation needs an 8 GB host
  # and the real 8 GB type (cx33) is offered in hel1 but NOT nbg1 (the plan's cx32 target does not
  # exist). No -replace flag: with the new location in variables.tf, the volume ForceNew + the host
  # create (the old host was already torn down by the failed cx32 -replace) happen naturally from a
  # plain -target of the registry's own resources. The sourced registry_region_migrate_gate
  # (no [ack-destroy] bypass) reads the STRUCTURED plan JSON and ABORTS unless the plan touches ONLY
  # the registry's own 6 resources (out_of_scope==0), preserves the logs-token secret, and CREATES
  # the server + fresh store volume + NIC + volume-attachment + firewall in the new region.
  registry_region_migrate:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'registry-region-migrate'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped registry migration).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (scoped registry region migration) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Scoped -target of the registry server + its 3 id-referencing dependents + the store
        # volume (ForceNew on the new location -> replace) + the isolated logs-token secret. NO
        # -replace flag — the location change drives the volume replace and the absent host drives
        # its create. The sourced registry_region_migrate_gate reads the STRUCTURED plan JSON and
        # ABORTS unless the plan is EXACTLY the scoped region migration.
        run: |
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -target='hcloud_server.registry' \
              -target='hcloud_server_network.registry' \
              -target='hcloud_volume_attachment.registry' \
              -target='hcloud_firewall_attachment.registry' \
              -target='hcloud_volume.registry' \
              -target='doppler_secret.registry_betterstack_logs_token' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (registry-region-migrate) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-registry-region-migrate-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/registry-region-migrate-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/registry-region-migrate-gate.sh"
          if ! registry_region_migrate_gate tfplan.json; then
            echo "::error::registry-region-migrate destroy-guard ABORTED: the plan is not the exact scoped registry region migration. Refusing to apply. Verify: ONLY the registry's own 6 resources change (no out-of-scope create/update/destroy), the logs-token secret is preserved, and the server + fresh store volume + private NIC + volume-attachment + deny-all firewall are all CREATED in the new region. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be created|Plan:' tfplan.txt | head -40 >&2
            exit 1
          fi
          # #6453 STOCK preflight — TRIPWIRE, not a routine gate (posture matches :447). The
          # guard above proves the plan's SHAPE; it cannot prove the create is FEASIBLE.
          # This path carries NO -replace flag (:2023-2024) — the var.registry_location change
          # itself forces the replacement — but the destroy-then-create ordering, and therefore
          # the stranding risk, is identical: no stock in the TARGET region => the old registry
          # is destroyed and the new one never lands (#6393 -> ~10h prod deploy freeze, #6400).
          # This is the path stock most obviously governs: the target region is operator-chosen,
          # and change.after.location gives the gate that target for free. Full rationale + the
          # available-vs-supported trap: the gate lib's header.
          # HCLOUD_TOKEN: this step's env: is DOPPLER_TOKEN only and the sourced gate runs
          # OUTSIDE the `doppler run` wrapper above — without this read it fail-closes on EVERY
          # dispatch (an outage, not a tripwire). Read-only; never echoed. Precedent:
          # cutover-inngest.yml:359.
          HCLOUD_TOKEN=$(doppler secrets get HCLOUD_TOKEN -p soleur -c prd_terraform --plain) || HCLOUD_TOKEN=""
          # Doppler-fetched secrets are NOT auto-masked by Actions (unlike secrets.*) — mask
          # before any later step can echo it. This token carries destroy authority over the
          # whole prod fleet. Convention: cla-evidence.yml:63, apply-github-infra.yml:134.
          [[ -n "$HCLOUD_TOKEN" ]] && printf '::add-mask::%s\n' "$HCLOUD_TOKEN"
          if [[ -z "$HCLOUD_TOKEN" ]]; then
            echo "::error::stock-preflight ABORT: cannot read HCLOUD_TOKEN from Doppler (prd_terraform) — cannot PROVE stock. Fail-closed: an unreadable token is not evidence of availability. NO [ack-destroy] bypass."
            exit 1
          fi
          export HCLOUD_TOKEN
          # shellcheck source=tests/scripts/lib/stock-preflight-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/stock-preflight-gate.sh"
          if ! stock_preflight_gate tfplan.json; then
            echo "::error::registry-region-migrate stock-preflight ABORTED: the registry's server_type is not orderable in the TARGET region (var.registry_location; see the ::error:: lines above). Refusing to apply — the old registry would be destroyed and the new one would not land (#6393, #6463). Pick a region where the type is orderable, or wait for stock. NO [ack-destroy] bypass on this path."
            exit 1
          fi
          echo "registry-region-migrate plan is the exact scoped migration. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (registry region migration) — scope backstop
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan: the registry
        # server + fresh store volume are CREATED, and NO out-of-scope resource is touched (the
        # load-bearing safety — belt-and-suspenders to the guard).
        run: |
          set -euo pipefail
          # A mid-migration apply failure (old volume/host gone, new create fails — quota/stock/boot)
          # leaves the registry DOWN. Serving is covered by the ADR-096 GHCR dark-launch fallback;
          # the store is a GHCR mirror (re-fills), so re-dispatch re-creates the host + fresh volume.
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (registry-region-migrate) failed — registry may be DOWN; GHCR fallback covers serving; re-dispatch registry-region-migrate to retry the fresh-region create"
            exit 1
          fi
          SERVER_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_server.registry")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          VOL_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume.registry")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$SERVER_CREATES" == "0" || "$VOL_CREATES" == "0" ]]; then
            echo "::error::applied plan did not CREATE the registry server (${SERVER_CREATES}) + fresh store volume (${VOL_CREATES}) in the new region. This should have been caught by the guard; failing hard."
            exit 1
          fi
          echo "registry server + fresh store volume created in the new region (server_creates=${SERVER_CREATES} volume_creates=${VOL_CREATES})."

      - name: Best-effort heartbeat status (non-gating)
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # INFORMATIONAL only — MUST NOT gate the apply (Better Stack ingestion lags a fresh boot
        # ping). Swallows every error so a status lookup can never fail a prod apply.
        run: |
          set +e
          STATUS="unavailable (lookup failed or not yet ingested)"
          TOKEN=$(doppler secrets get BETTERSTACK_API_TOKEN --plain 2>/dev/null)
          if [[ -n "$TOKEN" ]]; then
            printf '::add-mask::%s\n' "$TOKEN"
            BODY=$(curl -fsS --max-time 10 -H "Authorization: Bearer ${TOKEN}" \
              https://uptime.betterstack.com/api/v2/heartbeats 2>/dev/null)
            if [[ -n "$BODY" ]]; then
              S=$(printf '%s' "$BODY" | jq -r '.data[]? | select(.attributes.name=="soleur-registry-disk-prd") | .attributes.status' 2>/dev/null | head -1)
              [[ -n "$S" ]] && STATUS="$S"
            fi
          fi
          {
            echo "## registry disk heartbeat (best-effort, non-gating)"
            echo ""
            echo "\`soleur-registry-disk-prd\` status: **${STATUS}**"
            echo ""
            echo "_The fresh hel1 store is EMPTY on first boot; pulls fall through to GHCR until the next CI dual-push re-mirrors. This line is informational._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## registry-region-migrate (#6288, ADR-096)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Selected by `-f apply_target=git-data-host-replace` (#6242, ADR-103). git-data.tf +
  # git-data-luks.tf + network.tf resources are OPERATOR_APPLIED_EXCLUSIONS (ADR-068) —
  # deliberately NOT in the per-PR `-target=` allow-list, and the per-PR path bridges over SSH
  # to the EXISTING web host so it cannot reprovision the git-data host at all. Before this job
  # git-data had ZERO non-SSH reprovision path (a standing hr-prod-host-config-change-immutable-
  # redeploy gap on the fleet's most irreplaceable data store). This scoped -replace is the
  # sanctioned non-SSH reprovision path (mirrors registry_host_replace / inngest_host_replace):
  # it re-runs the git-data cloud-init WITHOUT SSH and WITHOUT touching either data volume.
  #
  # 5-target scope (server + its 4 id-referencing dependents; BOTH data volumes + the LUKS
  # passphrase are PRESERVED BY OMISSION — an untargeted resource cannot be planned for destroy):
  #   hcloud_server.git_data                   (-replace: force a fresh cloud-init boot)
  #   hcloud_server_network.git_data           (network.tf:48 — server_id ForceNew → replace;
  #                                              else the new host has no private NIC 10.0.1.20)
  #   hcloud_volume_attachment.git_data        (git-data.tf:207 — server_id ForceNew → replace;
  #                                              else /mnt/git-data — plaintext bare-repo store —
  #                                              boots UNMOUNTED)
  #   hcloud_volume_attachment.git_data_luks   (git-data-luks.tf:90 — server_id ForceNew → replace;
  #                                              else /mnt/git-data-luks — LUKS at-rest store —
  #                                              boots UNMOUNTED)
  #   hcloud_firewall_attachment.git_data      (git-data.tf:228 — server_ids update-in-place;
  #                                              registry-style INCLUDE — else the fresh host boots
  #                                              NAKED on its public IPv4/IPv6)
  # LUKS re-open on fresh boot is SAFE because the passphrase is unchanged: the idempotent isLuks
  # skip (cloud-init-git-data.yml:142-163) re-opens the existing header with no luksFormat. This
  # holds ONLY while random_password.git_data_luks / doppler_secret.git_data_luks_key are OUT of
  # scope — the sourced git_data_host_replace_gate's luks_passphrase_touched backstop asserts it.
  #
  # The sourced git_data_host_replace_gate (no [ack-destroy] bypass) reads the STRUCTURED plan
  # JSON and ABORTS unless the plan is EXACTLY this scoped recreate with BOTH volumes preserved.
  git_data_host_replace:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'git-data-host-replace'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped git-data replace — the host is
        # cloud-init-only, NO remote-exec provisioner, git-data.tf:9).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (scoped git-data-host -replace) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Scoped -replace of the git-data server + its 4 id-referencing dependents. The two data
        # volumes + the LUKS passphrase are PRESERVED BY OMISSION (not -targeted → cannot be
        # planned for destroy). The sourced git_data_host_replace_gate (no [ack-destroy] bypass)
        # reads the STRUCTURED plan JSON and ABORTS unless the plan is EXACTLY the scoped recreate.
        run: |
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -replace='hcloud_server.git_data' \
              -target='hcloud_server.git_data' \
              -target='hcloud_server_network.git_data' \
              -target='hcloud_volume_attachment.git_data' \
              -target='hcloud_volume_attachment.git_data_luks' \
              -target='hcloud_firewall_attachment.git_data' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (git-data-host-replace) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-git-data-host-replace-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/git-data-host-replace-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/git-data-host-replace-gate.sh"
          if ! git_data_host_replace_gate tfplan.json; then
            echo "::error::git-data-host-replace destroy-guard ABORTED: the plan is not the exact scoped git-data-host recreate. Refusing to apply. Specifically verify: BOTH data volumes (hcloud_volume.git_data + hcloud_volume.git_data_luks) are preserved (no delete/forget/replace), the LUKS passphrase (random_password.git_data_luks + doppler_secret.git_data_luks_key) is untouched, the private NIC (hcloud_server_network.git_data) is re-created, BOTH store attachments are re-created, and the deny-all FIREWALL (hcloud_firewall_attachment.git_data) is re-attached. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be updated in-place|Plan:' tfplan.txt | head -30 >&2
            exit 1
          fi
          # #6453 STOCK preflight — TRIPWIRE, not a routine gate (posture matches :447).
          # This path needs the gate MOST, and not for the -replace reason the others do:
          # `terraform plan -replace=<addr>` on an address NOT in state exits 0 with no warning
          # and plans a plain CREATE. hcloud_server.git_data is declared unconditionally
          # (git-data.tf:118) and the host has never been born, so this dispatch tries to CREATE
          # git-data — with a cax11 type that was orderable in 0 of 3 EU DCs on 2026-07-15. It
          # is a live path that fails, not dead code. Full rationale + the available-vs-supported
          # trap: the gate lib's header.
          # HCLOUD_TOKEN: this step's env: is DOPPLER_TOKEN only and the sourced gate runs
          # OUTSIDE the `doppler run` wrapper above — without this read it fail-closes on EVERY
          # dispatch (an outage, not a tripwire). Read-only; never echoed. Precedent:
          # cutover-inngest.yml:359.
          HCLOUD_TOKEN=$(doppler secrets get HCLOUD_TOKEN -p soleur -c prd_terraform --plain) || HCLOUD_TOKEN=""
          # Doppler-fetched secrets are NOT auto-masked by Actions (unlike secrets.*) — mask
          # before any later step can echo it. This token carries destroy authority over the
          # whole prod fleet. Convention: cla-evidence.yml:63, apply-github-infra.yml:134.
          [[ -n "$HCLOUD_TOKEN" ]] && printf '::add-mask::%s\n' "$HCLOUD_TOKEN"
          if [[ -z "$HCLOUD_TOKEN" ]]; then
            echo "::error::stock-preflight ABORT: cannot read HCLOUD_TOKEN from Doppler (prd_terraform) — cannot PROVE stock. Fail-closed: an unreadable token is not evidence of availability. NO [ack-destroy] bypass."
            exit 1
          fi
          export HCLOUD_TOKEN
          # shellcheck source=tests/scripts/lib/stock-preflight-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/stock-preflight-gate.sh"
          if ! stock_preflight_gate tfplan.json; then
            echo "::error::git-data-host-replace stock-preflight ABORTED: the planned server_type is not orderable in its target location (see the ::error:: lines above). If git-data has never been born, this dispatch plans a plain CREATE — and cax11 has had no EU stock, so it cannot be born at any account cap. Refusing to apply (#6393, #6463). NO [ack-destroy] bypass on this path."
            exit 1
          fi
          echo "git-data-host-replace plan is the exact scoped recreate. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (git-data-host -replace) — both-volumes-preserved assert
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan (the exact
        # plan we applied): BOTH data volumes carry 0 delete/forget actions (preserved), the
        # private NIC + BOTH store attachments show a create (re-attached) — belt-and-suspenders
        # to the guard.
        run: |
          set -euo pipefail
          # A mid-replace apply failure (old host destroyed, new create fails — quota/image/boot)
          # leaves git-data DOWN with the writer-side CAS fence offline. UNLIKE registry (GHCR
          # fallback) / inngest (paused reminders), git-data has NO serving fallback — but BOTH
          # volumes are preserved (guarded), so re-dispatch recovers from them. Writes FAIL, not
          # corrupt (single-writer at replicas=1 → no split-brain). Emit a self-documenting
          # recovery annotation, then fail hard (gating behavior unchanged).
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (git-data-host-replace) failed mid-replace — git-data may be DOWN (single-writer, no serving fallback); pushes/pulls fail (not corrupt); BOTH volumes are preserved — re-dispatch git-data-host-replace to recover from them"
            exit 1
          fi
          for VOL in hcloud_volume.git_data hcloud_volume.git_data_luks; do
            VOL_DELETES=$(jq --arg v "$VOL" '[.resource_changes[]?
              | select(.address == $v)
              | select(.change.actions? | any(. == "delete" or . == "forget"))] | length' tfplan.json)
            if [[ "$VOL_DELETES" != "0" ]]; then
              echo "::error::${VOL} shows ${VOL_DELETES} delete/forget action(s) in the applied plan — the data store must be preserved. This should have been caught by the guard; failing hard."
              exit 1
            fi
          done
          NIC_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_server_network.git_data")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$NIC_CREATES" == "0" ]]; then
            echo "::error::hcloud_server_network.git_data shows no create action in the applied plan — the new host would have no private NIC. This should have been caught by the guard; failing hard."
            exit 1
          fi
          for ATT in hcloud_volume_attachment.git_data hcloud_volume_attachment.git_data_luks; do
            ATT_CREATES=$(jq --arg a "$ATT" '[.resource_changes[]?
              | select(.address == $a)
              | select(.change.actions? | index("create"))] | length' tfplan.json)
            if [[ "$ATT_CREATES" == "0" ]]; then
              echo "::error::${ATT} shows no create action in the applied plan — the new host would boot with that store UNMOUNTED. This should have been caught by the guard; failing hard."
              exit 1
            fi
          done
          echo "both data volumes preserved (0 delete/forget), private NIC + both store attachments re-attached (create present) in the applied plan."

      - name: Post-replace readiness note (authoritative liveness is web-host-driven, non-SSH)
        # git-data is a deny-all blind host: this CI runner canNOT SSH it, canNOT reach it over the
        # private net, and Better Stack canNOT pull it (git_data_prd is a PUSH heartbeat, paused
        # until #5274 PR C arms the web-host probe cron). So the AUTHORITATIVE post-replace liveness
        # gate is NOT in this job — it is the EXISTING web-host-driven readiness/cutover check that
        # runs `git ls-remote` over the private net to 10.0.1.20 (git-data.tf:12-14,
        # hr-fresh-host-provisioning-reachable-from-terraform-apply). This step ONLY records the
        # in-job deterministic guards (plan/apply asserts above) as the gate for THIS run and points
        # the operator at the out-of-job liveness check. It NEVER SSHes the deny-all host and NEVER
        # implies a Better Stack pull. (No best-effort heartbeat step — unlike registry — because
        # git_data_prd is paused + its probe cron is unbuilt, so a status lookup would be useless.)
        run: |
          {
            echo "## git-data-host-replace readiness (non-SSH)"
            echo ""
            echo "In-job gate: the destroy-guard + post-apply jq asserts (both volumes preserved, NIC + both store attachments + firewall re-attached) gated this run."
            echo ""
            echo "Authoritative liveness: the web-host-driven \`git ls-remote\` readiness/cutover check over the private net (10.0.1.20) — NOT SSH, NOT a Better Stack pull. git-data is a deny-all blind host."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## git-data-host-replace (ADR-103, #6242)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Selected by `-f apply_target=workspaces-luks-cutover` (#6604, ADR-119). The FIVE workspaces_luks
  # resources (workspaces-luks.tf) are OPERATOR_APPLIED_EXCLUSIONS — deliberately NOT in the per-PR
  # `-target=` allow-list (they ride THIS dispatch), and the per-PR `host_creates` TRIPWIRE fires on
  # any `hcloud_volume` create, so the volume MUST be born here, never on a merge. This is a
  # FIRST PROVISION (a pure `+create` of all five), NOT a host -replace — so NO `-replace` flag; the
  # sourced workspaces_luks_cutover_gate PERMITS the five creates and counts luks_passphrase_touched
  # on update/delete/forget only (DP-1). It ABORTS if the plan touches the LIVE plaintext /mnt/data
  # volume/attachment (the old volume has NO prevent_destroy — #6593 omitted it), the web-1 server
  # (cx33-unrebuildable), or anything out of scope. NO [ack-destroy] bypass (a sole-copy-data volume
  # is authorized by the menu-ack dispatch, hr-menu-option-ack-not-prod-write-auth). The freeze /
  # rsync / repoint / canary run from the SEPARATE environment-gated workspaces-luks-cutover.yml
  # AFTER this create; this job only provisions + attaches the encrypted volume (zero downtime).
  workspaces_luks_cutover:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'workspaces-luks-cutover'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Job-level web-1-swap mutex (DP-3): this job attaches a volume to web-1, so it shares the
    # cross-pipeline `web-1-swap` group with the release deploy (web-platform-release.yml),
    # apply-deploy-pipeline-fix.yml and workspaces-luks-cutover.yml —
    # at most one web-1 mutation in flight. COEXISTS with (does not replace) the workflow-level R2
    # serializer (terraform-apply-web-platform-host) that protects the lockless backend.
    concurrency:
      group: web-1-swap
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped volume create).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."; exit 1; }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."; exit 1; }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."; exit 1; fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (workspaces-luks first provision) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Pure `+create` of the five workspaces_luks resources (NO -replace — first provision). The
        # sourced workspaces_luks_cutover_gate reads the STRUCTURED plan JSON and ABORTS unless the
        # plan is EXACTLY this create with the live plaintext volume/attachment + web-1 preserved.
        run: |
          # set +e so the `rc=$?` diagnostic below actually runs — GitHub runs `run:` under an
          # inherited `-e`, which `set -uo pipefail` does not clear, so without this the plan failure
          # would exit the step before the ::error:: guidance prints. `set -e` is re-armed after.
          set +e
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -target='random_password.workspaces_luks' \
              -target='doppler_secret.workspaces_luks_key' \
              -target='doppler_service_token.workspaces_luks' \
              -target='hcloud_volume.workspaces_luks' \
              -target='hcloud_volume_attachment.workspaces_luks' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (workspaces-luks-cutover) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-workspaces-luks-cutover-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/workspaces-luks-cutover-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/workspaces-luks-cutover-gate.sh"
          if ! workspaces_luks_cutover_gate tfplan.json; then
            echo "::error::workspaces-luks-cutover destroy-guard ABORTED: the plan is not the exact scoped first provision. Verify the LIVE plaintext /mnt/data volume (hcloud_volume.workspaces[\"web-1\"]) + its attachment + the web-1 server are UNTOUCHED, no passphrase re-mint, no destroy/forget, and the encrypted volume + attachment + doppler_secret each show a create. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be updated in-place|Plan:' tfplan.txt | head -30 >&2
            exit 1
          fi
          echo "workspaces-luks-cutover plan is the exact scoped first provision. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (workspaces-luks first provision) — live-volume-preserved assert
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan (belt-and-
        # suspenders to the gate): the live plaintext volume/attachment + web-1 carry ZERO actions,
        # the encrypted volume + attachment each show a create. This is additive — zero downtime.
        run: |
          set -euo pipefail
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (workspaces-luks-cutover) failed — the encrypted volume was not provisioned. The live plaintext /mnt/data is UNTOUCHED (additive create); re-dispatch to retry."
            exit 1
          fi
          for ADDR in 'hcloud_volume.workspaces["web-1"]' 'hcloud_volume_attachment.workspaces["web-1"]' 'hcloud_server.web["web-1"]'; do
            TOUCHED=$(jq --arg a "$ADDR" '[.resource_changes[]?
              | select(.address == $a)
              | select(.change.actions? | any(. == "create" or . == "update" or . == "delete" or . == "forget"))] | length' tfplan.json)
            if [[ "$TOUCHED" != "0" ]]; then
              echo "::error::${ADDR} shows ${TOUCHED} action(s) in the applied plan — the LIVE plaintext store / web-1 must be preserved. This should have been caught by the guard; failing hard."
              exit 1
            fi
          done
          VOL_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume.workspaces_luks")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          ATT_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume_attachment.workspaces_luks")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$VOL_CREATES" == "0" || "$ATT_CREATES" == "0" ]]; then
            echo "::error::the encrypted volume/attachment shows no create in the applied plan — nothing was provisioned. Failing hard."
            exit 1
          fi
          echo "live plaintext volume/attachment + web-1 untouched (0 actions); encrypted volume + attachment created. Additive — zero downtime. Next: dispatch workspaces-luks-cutover.yml (environment-gated) for the freeze/rsync/repoint."

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## workspaces-luks-cutover first provision (ADR-119, #6604)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
            echo ""
            echo "Additive +create of the encrypted volume (zero downtime). The freeze/rsync/repoint/canary is the SEPARATE environment-gated workspaces-luks-cutover.yml dispatch."
          } >> "$GITHUB_STEP_SUMMARY"
