# Auto-apply Doppler / Cloudflare / Better Stack / GitHub / random_id / Hetzner-firewall
# resources whenever a PR that touches `apps/web-platform/infra/*.tf` merges to main.
# Closes the workflow gap surfaced by PR-H (#4066 — Daily Priorities multi-source
# webhook + KB-drift walker): every infra-touching PR previously required the
# operator to open a shell, `doppler run --name-transformer tf-var`, `terraform plan`,
# `terraform apply` manually per a PR-body runbook.
#
# This workflow IS the canonical boundary for `hr-all-infrastructure-provisioning-servers`
# for the `apps/web-platform/infra/` root (matches the precedent set by
# `apply-sentry-infra.yml` for `apps/web-platform/infra/sentry/` and
# `apply-github-infra.yml` for `infra/github/`).
#
# Adapted from `apply-sentry-infra.yml` (ADR-031) with two adjustments:
#   1. Doppler `--name-transformer tf-var` invocation wraps `terraform plan`/`apply`
#      because the web-platform root reads ~12 `TF_VAR_*` inputs from Doppler.
#   2. `-target=`-scoped apply, split into TWO applies (#4844):
#      (a) the main saved-`tfplan` apply covers the 80 non-SSH resources;
#      (b) a SEPARATE token-gated SSH apply, run AFTER the post-apply token sync
#          and behind the CF Tunnel SSH bridge (.github/actions/cf-tunnel-ssh-bridge),
#          covers the 8 SSH-provisioned `terraform_data.*` siblings in server.tf
#          (disk_monitor_install, resource_monitor_install, fail2ban_tuning,
#          journald_persistent, docker_seccomp_config, apparmor_bwrap_profile,
#          orphan_reaper_install). The GitHub runner egress IP is not in
#          `var.admin_ips`, so the bridge (not a direct :22 dial) is the access
#          path. Before #4844 these 7 silently drifted: they were excluded here
#          with no apply path, and apply-deploy-pipeline-fix.yml only `-target`s
#          deploy_pipeline_fix + infra_config_handler_bootstrap (its header's old
#          "those 7 land via apply-deploy-pipeline-fix.yml" claim was never true).
#      `hcloud_server.web`, `hcloud_volume.workspaces`,
#      `hcloud_volume_attachment.workspaces`, and `hcloud_ssh_key.default` remain
#      excluded — managed by initial-apply + drift detector, not per-PR.
#      `terraform_data.root_authorized_keys` (ci-ssh-key.tf) is ALSO excluded:
#      it stays operator-local (firewall chicken-and-egg — it is what authorizes
#      the CI key the bridge itself uses), re-firing via `triggers_replace` from a
#      future operator-local `terraform apply -replace=tls_private_key.ci_ssh`.
#
# Destroy-guard shape: copies `apply-github-infra.yml` (post-#3903) — numeric-regex
# validation of `destroy_count` + `set -e` re-enable after `rc=$?` capture.
# `apply-sentry-infra.yml` is the structural template but its destroy-guard pattern
# is vulnerable to the empty-string bypass class flagged in
# `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
#
# Authorization model: the PR merge IS the human authorization
# (`hr-menu-option-ack-not-prod-write-auth`). PR #4220 dropped the
# `environment:` reviewer-click gate after measuring its real-world cost
# (apply runs sitting in `waiting` for up to 13h, blocking sibling
# applies via the concurrency group). The merge-time gate (CODEOWNERS
# on `.github/workflows/` + branch protection on `main`) is the load-
# bearing control; the env-reviewer click was duplicative.
#
# Kill switch: include `[skip-web-platform-apply]` on its own line in the merge
# commit message to skip auto-apply for that merge.
#
# Destroy acknowledgement: include `[ack-destroy]` on its own line in the merge
# commit message to acknowledge planned destroys (otherwise apply halts).
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a transient
# failure or for ad-hoc applies (still target-scoped to the allow-list below).
#
# Untrusted-input handling: HEAD_MSG and REASON are routed through env vars
# (never interpolated directly into `run:` blocks) per the github.blog
# workflow-injection guidance. All action references are SHA-pinned.

name: Apply web-platform infra (Doppler/Cloudflare/BetterStack/GitHub-App/Inngest/firewall)

on:
  push:
    branches: [main]
    paths:
      - "apps/web-platform/infra/**"
      - ".github/workflows/apply-web-platform-infra.yml"
      # Defense-in-depth: re-fire on filter mutations so a PR that mutates
      # the destroy-guard filter without touching infra still runs the
      # apply step against `main`'s captured baseline (#4419).
      - "tests/scripts/lib/destroy-guard-filter-web-platform.jq"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (manual re-run only — e.g. transient retry)"
        required: true
        type: string

concurrency:
  # LOAD-BEARING shared group (#4844): this MUST be the IDENTICAL literal string
  # used in apply-deploy-pipeline-fix.yml. The R2 backend has NO state lock
  # (apps/web-platform/infra/main.tf `use_lockfile = false` — R2 lacks S3
  # conditional writes), so this shared GitHub Actions concurrency group is the
  # SOLE serializer preventing two concurrent `terraform apply` runs from
  # last-writer-wins-clobbering web-platform/terraform.tfstate. Both workflows
  # SSH-apply apparmor_bwrap_profile (this one in its SSH -target set; the other
  # pulls it transitively via deploy_pipeline_fix's depends_on), so they overlap
  # on the same R2 object. GHA does NOT error on divergent group strings — they
  # silently fail to serialize — so do not "rename for clarity".
  #
  # `cancel-in-progress: false` per `hr-multi-step-post-merge-bootstrap-script`
  # — cancelling a half-applied unlocked terraform run is the worse split-state.
  group: terraform-apply-web-platform-host
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: apps/web-platform/infra
  # cloudflared binary for the CF Tunnel SSH bridge (#4844) — the token-gated
  # SSH apply of the 8 server.tf terraform_data siblings reaches the host over
  # the tunnel via .github/actions/cf-tunnel-ssh-bridge. SHA-256 computed against
  # the real released binary at the pinned version (NEVER paste a checksum from
  # documentation or AI output per the 2026-03-21 server-provisioning learning,
  # Session Error #4; re-verified at /work time). Kept byte-identical to
  # apply-deploy-pipeline-fix.yml's pins so both bridges install the same binary.
  CLOUDFLARED_VERSION: "2026.5.0"
  CLOUDFLARED_SHA256: "0095e46fdc88855d801c4d304cb1f5dd4bd656116c47ab94c2ad0ae7cda1c7ec"

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # Anchor `[skip-web-platform-apply]` to its own line so it cannot
        # fire from a quoted block, code fence, or trailer that happens
        # to carry the literal substring. Symmetric posture with the
        # `[ack-destroy]` gate in the apply job.
        run: |
          set -euo pipefail
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-web-platform-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # Vector config + VRL fixture validation lives in its own workflow at
  # .github/workflows/validate-vector-config.yml (#4293 FR5) so it can trigger
  # on pull_request -- this workflow only triggers on push to main, which is
  # the apply gate. Branch protection requires the validate workflow's check
  # before merge.
  apply:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    # Budget: ~0.6 min/resource × ~70 targets = ~42 min worst-case cold-cache,
    # but plan + apply against an already-provisioned state typically completes
    # in ~3-5 min. 15 min is the operator-tolerance ceiling that matches
    # `apply-deploy-pipeline-fix.yml`.
    timeout-minutes: 15
    # No `environment:` reviewer gate. PR #4220 removed it: the per-apply
    # reviewer click was duplicative friction on top of the PR-merge gate
    # (CODEOWNERS review + branch protection on main), and was blocking
    # apply runs for up to 13h (#4204 on 2026-05-20). The PR-merge IS the
    # human authorization per `hr-menu-option-ack-not-prod-write-auth`.
    # `apply-github-infra.yml` already omits the gate without incident.
    # The "broader secret surface" rationale below was the original
    # justification for diverging from apply-github-infra.yml; in
    # practice the divergence produced friction without measurable
    # security benefit (a leaked PAT with `contents:write` can also
    # bypass the env gate by submitting a workflow change).

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering.
        # hcloud_ssh_key.default is NOT in the apply allow-list (header lines
        # 21-23), so this dummy public key is never consumed -- it just
        # satisfies HCL parsing. Mirrors scheduled-terraform-drift.yml:49-52.
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      # TWO-TOKEN MODEL (post-#4195). This workflow consumes two distinct
      # Doppler service tokens via separate GH Actions secrets:
      #
      #   - `secrets.DOPPLER_TOKEN`        — `prd_terraform` READ-only.
      #                                       Used by every step that only
      #                                       READS Doppler secrets (init,
      #                                       plan, apply).
      #   - `secrets.DOPPLER_TOKEN_WRITE`  — `prd_terraform` READ/WRITE.
      #                                       Used by the post-apply sync
      #                                       step that WRITES the
      #                                       CI_SSH_ACCESS_TOKEN_*
      #                                       outputs back into Doppler.
      #
      # New steps that need write access MUST use `DOPPLER_TOKEN_WRITE`;
      # do NOT copy the `secrets.DOPPLER_TOKEN` line below without
      # confirming the step only reads. The `--silent` + `add-mask`
      # discipline in the sync step (~line 367-368) is the leak-defense
      # for the write-scoped token.
      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        # `-lockfile=readonly` refuses to download a provider whose checksum
        # is not already in `.terraform.lock.hcl`. Combined with the committed
        # lockfile, this defends against a malicious republish of a pinned
        # provider version. Verified present:
        # `apps/web-platform/infra/.terraform.lock.hcl`.
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (allow-list, non-SSH resources only)
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # ALLOW-LIST MAINTENANCE: if a future PR adds a new `.tf` resource at
        # `apps/web-platform/infra/*.tf`, append a matching `-target=<addr>`
        # line below (and exclude server.tf SSH-provisioned resources per
        # header comment). `scheduled-terraform-drift.yml` is the 12h backstop
        # if you forget — drift surfaces in the next cron run.
        run: |
          # `-e` is intentionally omitted so we can capture terraform plan's
          # exit code in $rc — plan exits non-zero on legitimate failures we
          # want to surface, not abort silently. Re-enabled with `set -e`
          # after the rc-capture window per
          # `2026-05-16-adr-amendment-required-when-reversing-and-destroy-guard-empty-string-bypass.md`.
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -var="ssh_key_path=${CI_SSH_PUB}" \
              -target=betteruptime_policy.github_webhook \
              -target=betteruptime_monitor.github_webhook_failures \
              -target=betteruptime_heartbeat.github_webhook_sig_failures \
              -target=betteruptime_heartbeat.github_api_429_sustained \
              -target=cloudflare_ruleset.cache_shared_binaries \
              -target=doppler_secret.github_app_id \
              -target=doppler_secret.github_app_private_key \
              -target=random_id.github_webhook_secret \
              -target=doppler_secret.github_app_webhook_secret \
              -target=cloudflare_bot_management.soleur_ai \
              -target=cloudflare_ruleset.seo_page_redirects \
              -target=cloudflare_ruleset.seo_response_headers \
              -target=cloudflare_list.legal_redirects \
              -target=cloudflare_ruleset.bulk_redirects \
              -target=random_id.tunnel_secret \
              -target=cloudflare_zero_trust_tunnel_cloudflared.web \
              -target=cloudflare_zero_trust_tunnel_cloudflared_config.web \
              -target=cloudflare_zero_trust_access_application.deploy \
              -target=cloudflare_zero_trust_access_service_token.deploy \
              -target=cloudflare_zero_trust_access_policy.deploy_service_token \
              -target=cloudflare_zero_trust_access_application.ssh \
              -target=cloudflare_zero_trust_access_service_token.ci_ssh \
              -target=cloudflare_zero_trust_access_policy.ci_ssh_service_token \
              -target=cloudflare_notification_policy.service_token_expiry \
              -target=cloudflare_zone_settings_override.soleur_ai \
              -target=cloudflare_record.app \
              -target=cloudflare_record.deploy \
              -target=cloudflare_record.ssh \
              -target=cloudflare_record.dkim_resend \
              -target=cloudflare_record.spf_send \
              -target=cloudflare_record.mx_send \
              -target=cloudflare_record.dkim_resend_send \
              -target=cloudflare_record.spf_send_send \
              -target=cloudflare_record.mx_send_send \
              -target=cloudflare_record.dmarc \
              -target=cloudflare_record.supabase_custom_domain \
              -target=cloudflare_record.supabase_acme_challenge \
              -target=cloudflare_record.spf_root \
              -target=cloudflare_record.google_site_verification \
              -target=cloudflare_record.protonmail_verification \
              -target=cloudflare_record.protonmail_mx_primary \
              -target=cloudflare_record.protonmail_mx_secondary \
              -target=cloudflare_record.protonmail_dkim_1 \
              -target=cloudflare_record.protonmail_dkim_2 \
              -target=cloudflare_record.protonmail_dkim_3 \
              -target=cloudflare_record.github_pages \
              -target=cloudflare_record.www \
              -target=cloudflare_record.github_pages_challenge \
              -target=cloudflare_record.buttondown_ns1 \
              -target=cloudflare_record.buttondown_ns2 \
              -target=cloudflare_zone_dnssec.soleur_ai \
              -target=cloudflare_ruleset.allowlist_ai_crawlers \
              -target=random_id.kb_drift_ingest_signing_key \
              -target=doppler_secret.kb_drift_ingest_signing_key \
              -target=doppler_secret.kb_drift_ingest_signing_key_app_runtime \
              -target=doppler_secret.kb_drift_operator_founder_id_app_runtime \
              -target=doppler_secret.kb_drift_ingest_url \
              -target=doppler_service_token.kb_drift \
              -target=github_actions_secret.doppler_token_kb_drift \
              -target=doppler_service_token.write \
              -target=github_actions_secret.doppler_token_write \
              -target=tls_private_key.ci_ssh \
              -target=doppler_secret.deploy_ssh_private_key \
              -target=betteruptime_monitor.soleur_apex \
              -target=betteruptime_policy.uptime \
              -target=cloudflare_record.web_host \
              -target=betteruptime_monitor.web_host \
              -target=random_id.inngest_signing_key_prd \
              -target=random_id.inngest_signing_key_dev \
              -target=random_id.inngest_event_key_prd \
              -target=random_id.inngest_event_key_dev \
              -target=random_id.inngest_manual_trigger_secret_prd \
              -target=random_id.inngest_manual_trigger_secret_dev \
              -target=doppler_secret.inngest_signing_key_prd \
              -target=doppler_secret.inngest_signing_key_dev \
              -target=doppler_secret.inngest_event_key_prd \
              -target=doppler_secret.inngest_event_key_dev \
              -target=doppler_secret.inngest_manual_trigger_secret_prd \
              -target=doppler_secret.inngest_manual_trigger_secret_dev \
              -target=betteruptime_heartbeat.inngest_prd \
              -target=betteruptime_policy.inngest \
              -target=doppler_secret.inngest_heartbeat_url_prd \
              -target=random_password.inngest_redis_password_prd \
              -target=doppler_secret.inngest_redis_password_prd \
              -target=github_actions_secret.supabase_access_token \
              -target=hcloud_firewall.web \
              -target=hcloud_firewall_attachment.web \
              -target=doppler_secret.resend_receiving_api_key
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          # Authoritative destroy count via the structured plan, not the
          # `Plan: …` summary line. Sibling of apply-github-infra.yml's
          # destroy-guard (closes #4419 — extends the #4420 widening to
          # apply-web-platform-infra). Filter is path-specific per the
          # #4420 plan-review iteration; covers 5 vulnerable Cloudflare
          # resource types (ruleset.rules, tunnel.ingress_rule,
          # zone_settings.security_header, notification.email_integration,
          # access_policy.include). Source of truth:
          # tests/scripts/lib/destroy-guard-filter-web-platform.jq (also
          # exercised by tests/scripts/test-destroy-guard-counter-web-platform.sh).
          counts=$(terraform show -json tfplan | \
            jq -f "${GITHUB_WORKSPACE}/tests/scripts/lib/destroy-guard-filter-web-platform.jq")
          resource_deletes=$(echo "$counts" | jq -r '.resource_deletes')
          nested_deletes=$(echo "$counts" | jq -r '.nested_deletes')
          # reboot_updates (#5911): reboot-forcing in-place update on
          # hcloud_server.* (placement_group_id / server_type change →
          # power-off reboot of the running host, 0 destroys — invisible to
          # the two counters above). Source of truth:
          # tests/scripts/lib/destroy-guard-filter-web-platform.jq.
          reboot_updates=$(echo "$counts" | jq -r '.reboot_updates')
          # Validate counters parsed correctly — empty values from a jq
          # failure would silently evaluate false in the `-gt 0` test and
          # let destructive plans slip past the guard.
          if [[ ! "$resource_deletes" =~ ^[0-9]+$ ]] || [[ ! "$nested_deletes" =~ ^[0-9]+$ ]] || [[ ! "$reboot_updates" =~ ^[0-9]+$ ]]; then
            echo "::error::destroy-guard counter parse failed (resource_deletes='${resource_deletes}', nested_deletes='${nested_deletes}', reboot_updates='${reboot_updates}')."
            exit 1
          fi
          destroy_count=$((resource_deletes + nested_deletes + reboot_updates))
          # Anchor `[ack-destroy]` to its own line (start-of-string OR
          # preceded by newline; followed by newline OR end-of-string) so
          # the token cannot fire from a quoted block, code fence, or
          # `Co-Authored-By:` trailer carrying that literal substring.
          ack_destroy=false
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[ack-destroy\]($|$'\n') ]]; then
            ack_destroy=true
          fi
          if [[ "$destroy_count" -gt 0 ]] && [[ "$ack_destroy" != "true" ]]; then
            echo "::error::terraform plan shows ${destroy_count} destructive change(s) on web-platform infra (${resource_deletes} resource-level delete(s) + ${nested_deletes} nested-block removal(s) + ${reboot_updates} reboot-forcing in-place update(s) on hcloud_server.*)."
            # Only surface the generic `[ack-destroy]` instruction when a
            # delete/nested-removal component exists — ack is the correct
            # resolution there. On a PURE reboot trip (reboot_updates > 0 with
            # zero deletes) the generic line contradicts the reboot-specific
            # steer below, so suppress it: ack-through would execute the
            # transitively-included reboot on the unattended apply.
            if [[ "$resource_deletes" -gt 0 || "$nested_deletes" -gt 0 ]]; then
              echo "::error::Add a line containing exactly '[ack-destroy]' to the merge commit message to acknowledge, or revert the trigger commit."
            fi
            if [[ "$reboot_updates" -gt 0 ]]; then
              echo "::error::A reboot-forcing hcloud_server.* update is planned. Resolve via the operator maintenance-window apply — do NOT add [ack-destroy] to unblock this unattended apply: the host update is transitively in the saved plan, so ack-through would REBOOT prod unattended."
            fi
            grep -E 'will be destroyed|Plan:' tfplan.txt | head -20 >&2
            exit 1
          fi

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -auto-approve -input=false tfplan

      # Bootstrap-cycle guard (#4195): on the FIRST apply that creates
      # `github_actions_secret.doppler_token_write`, the runner started
      # before the secret existed — interpolation returns empty for
      # that one run because GH Actions resolves secrets at job-start,
      # not step-start. The warning is non-fatal; the operator re-fires
      # the workflow once after first merge via `gh workflow run
      # apply-web-platform-infra.yml --ref main -F reason='bootstrap'`.
      # The local-fallback script
      # `apps/web-platform/infra/scripts/sync-ci-ssh-access-token.sh`
      # remains available as backup. Operator follow-through obligation
      # is tracked separately as a `follow-through` GH issue per
      # `wg-block-pr-ready-on-undeferred-operator-steps`.
      - name: Verify DOPPLER_TOKEN_WRITE present
        id: doppler_write_check
        env:
          DOPPLER_TOKEN_WRITE_CHECK: ${{ secrets.DOPPLER_TOKEN_WRITE }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_WRITE_CHECK" ]]; then
            echo "::warning::DOPPLER_TOKEN_WRITE not yet present — this is expected on the first apply that creates it. Subsequent applies will use the synced token. If you see this on the second+ run, manually trigger one more apply via gh workflow run."
            echo "skip_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync CF Access CI-SSH service token to Doppler
        # Reads the new sensitive outputs produced by the
        # `cloudflare_zero_trust_access_service_token.ci_ssh` resource
        # and writes them into Doppler prd_terraform so the sibling
        # `apply-deploy-pipeline-fix.yml` workflow can pull them at run
        # time without an operator handoff step (closes #4177 P1).
        # Idempotent — doppler-secrets-set overwrites in place.
        # Uses the in-band-minted write-capable service token (post-#4195
        # — see apps/web-platform/infra/doppler-write-token.tf) — every
        # other step in this workflow consumes the existing read-only
        # token.
        if: steps.doppler_write_check.outputs.skip_sync != 'true'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_WRITE }}
        run: |
          set -euo pipefail
          CLIENT_ID=$(terraform output -raw ci_ssh_access_service_token_client_id 2>/dev/null || true)
          CLIENT_SECRET=$(terraform output -raw ci_ssh_access_service_token_client_secret 2>/dev/null || true)
          if [[ -z "$CLIENT_ID" || -z "$CLIENT_SECRET" ]]; then
            echo "::warning::ci_ssh_access_service_token outputs missing or empty — likely a -target= run that skipped the SSH-access resources. Falling back to operator sync."
            exit 0
          fi
          printf '::add-mask::%s\n' "$CLIENT_ID"
          printf '::add-mask::%s\n' "$CLIENT_SECRET"
          # `--silent` suppresses doppler's success-path value-echo;
          # stderr is intentionally NOT redirected so permission-denied
          # / quota / network errors surface in the GH Actions log (the
          # original #4195 failure was masked by a `>/dev/null 2>&1`
          # redirect on these two lines).
          printf '%s' "$CLIENT_ID" \
            | doppler secrets set CI_SSH_ACCESS_TOKEN_ID --silent --no-interactive -p soleur -c prd_terraform
          printf '%s' "$CLIENT_SECRET" \
            | doppler secrets set CI_SSH_ACCESS_TOKEN_SECRET --silent --no-interactive -p soleur -c prd_terraform
          unset CLIENT_ID CLIENT_SECRET
          echo "Synced CI_SSH_ACCESS_TOKEN_ID/_SECRET to Doppler prd_terraform."

      # --- #4844: token-gated SSH apply of the 8 server.tf terraform_data siblings ---
      # Runs AFTER the post-apply token sync above (shape B) so a from-scratch
      # rebuild self-heals: the bridge needs the CF Access ci_ssh token that the
      # sync step produces, so on the very first apply (tokens absent) this step
      # `::warning::`-skips and the next run lands the 8 once the token exists.
      - name: Check CI-SSH token presence (gates the SSH apply)
        id: ssh_token_gate
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        # Mirrors the skip_sync bootstrap-cycle guard above. `doppler secrets get
        # --plain` returns rc=1 when the key is absent and rc=0 + empty stdout
        # when present-but-empty; the `-z` guard catches both.
        run: |
          set -euo pipefail
          TOKEN_ID=$(doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain 2>/dev/null || true)
          if [[ -z "$TOKEN_ID" ]]; then
            echo "ssh_apply_skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::first-bootstrap: CI_SSH_ACCESS_TOKEN_ID absent in Doppler prd_terraform — the 8 SSH-provisioned resources are deferred to the next run after the token sync lands. The non-SSH apply + token sync above still succeeded."
          else
            echo "ssh_apply_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CF Tunnel SSH bridge (gated)
        if: steps.ssh_token_gate.outputs.ssh_apply_skip != 'true'
        uses: ./.github/actions/cf-tunnel-ssh-bridge
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          infra-dir: ${{ env.INFRA_DIR }}
          cloudflared-version: ${{ env.CLOUDFLARED_VERSION }}
          cloudflared-sha256: ${{ env.CLOUDFLARED_SHA256 }}

      - name: Terraform apply (SSH-provisioned resources, over the bridge)
        if: steps.ssh_token_gate.outputs.ssh_apply_skip != 'true'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # No destroy-guard on this step (data-integrity Q4 / AC9): the
        # destroy-guard-filter-web-platform.jq scope is Cloudflare-resource-only
        # and would never flag a `terraform_data` replace, AND none of the 7
        # resources has a `when = destroy` provisioner — a triggers_replace
        # destroy+recreate is a pure state-entry swap with no on-host teardown.
        # A future maintainer adding a destroy-provisioned SSH resource here MUST
        # add guard coverage.
        #
        # This is a SEPARATE `terraform apply` (not the saved tfplan), so it runs
        # its own internal plan against the 8 targets. R2 backend creds (bare
        # AWS_ACCESS_KEY_ID/_SECRET) are already in $GITHUB_ENV from "Extract
        # backend credentials" and persist across steps; `--name-transformer
        # tf-var` injects TF_VAR_* doppler secrets but passes those bare AWS_*
        # vars through untouched (same pattern as the main apply above).
        # `-var="ssh_key_path=${CI_SSH_PUB}"` satisfies HCL file() parsing for the
        # excluded hcloud_ssh_key.default (never consumed; see the plan step).
        # TF_VAR_ci_ssh_private_key is exported by the bridge action → agent=false.
        run: |
          set -euo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -auto-approve -input=false \
              -var="ssh_key_path=${CI_SSH_PUB}" \
              -target=terraform_data.disk_monitor_install \
              -target=terraform_data.resource_monitor_install \
              -target=terraform_data.container_restart_monitor_install \
              -target=terraform_data.fail2ban_tuning \
              -target=terraform_data.journald_persistent \
              -target=terraform_data.docker_seccomp_config \
              -target=terraform_data.apparmor_bwrap_profile \
              -target=terraform_data.orphan_reaper_install \
              -target=terraform_data.cron_egress_firewall

      - name: Tear down cloudflared SSH bridge
        if: always()
        # Caller-side teardown (the composite action cannot register a post-job
        # hook). The `-n` guards make this a clean no-op when the bridge never ran
        # (gated-skip or pre-bridge failure → SERVER_IP/CLOUDFLARED_PID unset), so
        # it is intentionally `if: always()` (not gated on ssh_apply_skip). A
        # left-over OUTPUT NAT rule or orphaned cloudflared would corrupt a later
        # job on a persistent runner (moot on GH-hosted ephemeral runners, but the
        # discipline is required — SpecFlow 1a).
        run: |
          set +e
          if [[ -n "${SERVER_IP:-}" ]]; then
            sudo iptables -t nat -D OUTPUT \
              -d "$SERVER_IP" -p tcp --dport 22 \
              -j REDIRECT --to-ports 2222 2>/dev/null || true
          fi
          if [[ -n "${CLOUDFLARED_PID:-}" ]]; then
            kill "$CLOUDFLARED_PID" 2>/dev/null || true
          fi
          if [[ -f /tmp/cloudflared.log ]]; then
            echo "=== /tmp/cloudflared.log (last 200 lines) ==="
            if [[ -s /tmp/cloudflared.log ]]; then
              tail -n 200 /tmp/cloudflared.log
            else
              echo "(log empty — cloudflared may have failed before writing any output)"
            fi
          fi

      - name: Post-apply summary
        if: always()
        env:
          TRIGGER: ${{ github.event_name }}
          MERGE_SHA: ${{ github.sha }}
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## Apply web-platform infra"
            echo ""
            echo "**Trigger:** ${TRIGGER}"
            echo "**Merge SHA:** ${MERGE_SHA}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
