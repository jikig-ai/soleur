          # Doppler-fetched secrets are NOT auto-masked by Actions (unlike secrets.*) — mask
          # before any later step can echo it. This token carries destroy authority over the
          # whole prod fleet. Convention: cla-evidence.yml:63, apply-github-infra.yml:134.
          [[ -n "$HCLOUD_TOKEN" ]] && printf '::add-mask::%s\n' "$HCLOUD_TOKEN"
          if [[ -z "$HCLOUD_TOKEN" ]]; then
            echo "::error::stock-preflight ABORT: cannot read HCLOUD_TOKEN from Doppler (prd_terraform) — cannot PROVE stock. Fail-closed: an unreadable token is not evidence of availability. NO [ack-destroy] bypass."
            exit 1
          fi
          export HCLOUD_TOKEN
          # shellcheck source=tests/scripts/lib/stock-preflight-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/stock-preflight-gate.sh"
          if ! stock_preflight_gate tfplan.json; then
            echo "::error::registry-region-migrate stock-preflight ABORTED: the registry's server_type is not orderable in the TARGET region (var.registry_location; see the ::error:: lines above). Refusing to apply — the old registry would be destroyed and the new one would not land (#6393, #6463). Pick a region where the type is orderable, or wait for stock. NO [ack-destroy] bypass on this path."
            exit 1
          fi
          echo "registry-region-migrate plan is the exact scoped migration. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (registry region migration) — scope backstop
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan: the registry
        # server + fresh store volume are CREATED, and NO out-of-scope resource is touched (the
        # load-bearing safety — belt-and-suspenders to the guard).
        run: |
          set -euo pipefail
          # A mid-migration apply failure (old volume/host gone, new create fails — quota/stock/boot)
          # leaves the registry DOWN. Serving is covered by the ADR-096 GHCR dark-launch fallback;
          # the store is a GHCR mirror (re-fills), so re-dispatch re-creates the host + fresh volume.
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (registry-region-migrate) failed — registry may be DOWN; GHCR fallback covers serving; re-dispatch registry-region-migrate to retry the fresh-region create"
            exit 1
          fi
          SERVER_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_server.registry")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          VOL_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume.registry")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$SERVER_CREATES" == "0" || "$VOL_CREATES" == "0" ]]; then
            echo "::error::applied plan did not CREATE the registry server (${SERVER_CREATES}) + fresh store volume (${VOL_CREATES}) in the new region. This should have been caught by the guard; failing hard."
            exit 1
          fi
          echo "registry server + fresh store volume created in the new region (server_creates=${SERVER_CREATES} volume_creates=${VOL_CREATES})."

      - name: Best-effort heartbeat status (non-gating)
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # INFORMATIONAL only — MUST NOT gate the apply (Better Stack ingestion lags a fresh boot
        # ping). Swallows every error so a status lookup can never fail a prod apply.
        run: |
          set +e
          STATUS="unavailable (lookup failed or not yet ingested)"
          TOKEN=$(doppler secrets get BETTERSTACK_API_TOKEN --plain 2>/dev/null)
          if [[ -n "$TOKEN" ]]; then
            printf '::add-mask::%s\n' "$TOKEN"
            BODY=$(curl -fsS --max-time 10 -H "Authorization: Bearer ${TOKEN}" \
              https://uptime.betterstack.com/api/v2/heartbeats 2>/dev/null)
            if [[ -n "$BODY" ]]; then
              S=$(printf '%s' "$BODY" | jq -r '.data[]? | select(.attributes.name=="soleur-registry-disk-prd") | .attributes.status' 2>/dev/null | head -1)
              [[ -n "$S" ]] && STATUS="$S"
            fi
          fi
          {
            echo "## registry disk heartbeat (best-effort, non-gating)"
            echo ""
            echo "\`soleur-registry-disk-prd\` status: **${STATUS}**"
            echo ""
            echo "_The fresh hel1 store is EMPTY on first boot; pulls fall through to GHCR until the next CI dual-push re-mirrors. This line is informational._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## registry-region-migrate (#6288, ADR-096)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Selected by `-f apply_target=git-data-host-replace` (#6242, ADR-103). git-data.tf +
  # git-data-luks.tf + network.tf resources are OPERATOR_APPLIED_EXCLUSIONS (ADR-068) —
  # deliberately NOT in the per-PR `-target=` allow-list, and the per-PR path bridges over SSH
  # to the EXISTING web host so it cannot reprovision the git-data host at all. Before this job
  # git-data had ZERO non-SSH reprovision path (a standing hr-prod-host-config-change-immutable-
  # redeploy gap on the fleet's most irreplaceable data store). This scoped -replace is the
  # sanctioned non-SSH reprovision path (mirrors registry_host_replace / inngest_host_replace):
  # it re-runs the git-data cloud-init WITHOUT SSH and WITHOUT touching either data volume.
  #
  # 5-target scope (server + its 4 id-referencing dependents; BOTH data volumes + the LUKS
  # passphrase are PRESERVED BY OMISSION — an untargeted resource cannot be planned for destroy):
  #   hcloud_server.git_data                   (-replace: force a fresh cloud-init boot)
  #   hcloud_server_network.git_data           (network.tf:48 — server_id ForceNew → replace;
  #                                              else the new host has no private NIC 10.0.1.20)
  #   hcloud_volume_attachment.git_data        (git-data.tf:207 — server_id ForceNew → replace;
  #                                              else /mnt/git-data — plaintext bare-repo store —
  #                                              boots UNMOUNTED)
  #   hcloud_volume_attachment.git_data_luks   (git-data-luks.tf:90 — server_id ForceNew → replace;
  #                                              else /mnt/git-data-luks — LUKS at-rest store —
  #                                              boots UNMOUNTED)
  #   hcloud_firewall_attachment.git_data      (git-data.tf:228 — server_ids update-in-place;
  #                                              registry-style INCLUDE — else the fresh host boots
  #                                              NAKED on its public IPv4/IPv6)
  # LUKS re-open on fresh boot is SAFE because the passphrase is unchanged: the idempotent isLuks
  # skip (cloud-init-git-data.yml:142-163) re-opens the existing header with no luksFormat. This
  # holds ONLY while random_password.git_data_luks / doppler_secret.git_data_luks_key are OUT of
  # scope — the sourced git_data_host_replace_gate's luks_passphrase_touched backstop asserts it.
  #
  # The sourced git_data_host_replace_gate (no [ack-destroy] bypass) reads the STRUCTURED plan
  # JSON and ABORTS unless the plan is EXACTLY this scoped recreate with BOTH volumes preserved.
  git_data_host_replace:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'git-data-host-replace'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped git-data replace — the host is
        # cloud-init-only, NO remote-exec provisioner, git-data.tf:9).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."
            exit 1
          }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."
            exit 1
          }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."
            exit 1
          fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (scoped git-data-host -replace) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Scoped -replace of the git-data server + its 4 id-referencing dependents. The two data
        # volumes + the LUKS passphrase are PRESERVED BY OMISSION (not -targeted → cannot be
        # planned for destroy). The sourced git_data_host_replace_gate (no [ack-destroy] bypass)
        # reads the STRUCTURED plan JSON and ABORTS unless the plan is EXACTLY the scoped recreate.
        run: |
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -replace='hcloud_server.git_data' \
              -target='hcloud_server.git_data' \
              -target='hcloud_server_network.git_data' \
              -target='hcloud_volume_attachment.git_data' \
              -target='hcloud_volume_attachment.git_data_luks' \
              -target='hcloud_firewall_attachment.git_data' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (git-data-host-replace) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-git-data-host-replace-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/git-data-host-replace-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/git-data-host-replace-gate.sh"
          if ! git_data_host_replace_gate tfplan.json; then
            echo "::error::git-data-host-replace destroy-guard ABORTED: the plan is not the exact scoped git-data-host recreate. Refusing to apply. Specifically verify: BOTH data volumes (hcloud_volume.git_data + hcloud_volume.git_data_luks) are preserved (no delete/forget/replace), the LUKS passphrase (random_password.git_data_luks + doppler_secret.git_data_luks_key) is untouched, the private NIC (hcloud_server_network.git_data) is re-created, BOTH store attachments are re-created, and the deny-all FIREWALL (hcloud_firewall_attachment.git_data) is re-attached. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be updated in-place|Plan:' tfplan.txt | head -30 >&2
            exit 1
          fi
          # #6453 STOCK preflight — TRIPWIRE, not a routine gate (posture matches :447).
          # This path needs the gate MOST, and not for the -replace reason the others do:
          # `terraform plan -replace=<addr>` on an address NOT in state exits 0 with no warning
          # and plans a plain CREATE. hcloud_server.git_data is declared unconditionally
          # (git-data.tf:118) and the host has never been born, so this dispatch tries to CREATE
          # git-data — with a cax11 type that was orderable in 0 of 3 EU DCs on 2026-07-15. It
          # is a live path that fails, not dead code. Full rationale + the available-vs-supported
          # trap: the gate lib's header.
          # HCLOUD_TOKEN: this step's env: is DOPPLER_TOKEN only and the sourced gate runs
          # OUTSIDE the `doppler run` wrapper above — without this read it fail-closes on EVERY
          # dispatch (an outage, not a tripwire). Read-only; never echoed. Precedent:
          # cutover-inngest.yml:359.
          HCLOUD_TOKEN=$(doppler secrets get HCLOUD_TOKEN -p soleur -c prd_terraform --plain) || HCLOUD_TOKEN=""
          # Doppler-fetched secrets are NOT auto-masked by Actions (unlike secrets.*) — mask
          # before any later step can echo it. This token carries destroy authority over the
          # whole prod fleet. Convention: cla-evidence.yml:63, apply-github-infra.yml:134.
          [[ -n "$HCLOUD_TOKEN" ]] && printf '::add-mask::%s\n' "$HCLOUD_TOKEN"
          if [[ -z "$HCLOUD_TOKEN" ]]; then
            echo "::error::stock-preflight ABORT: cannot read HCLOUD_TOKEN from Doppler (prd_terraform) — cannot PROVE stock. Fail-closed: an unreadable token is not evidence of availability. NO [ack-destroy] bypass."
            exit 1
          fi
          export HCLOUD_TOKEN
          # shellcheck source=tests/scripts/lib/stock-preflight-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/stock-preflight-gate.sh"
          if ! stock_preflight_gate tfplan.json; then
            echo "::error::git-data-host-replace stock-preflight ABORTED: the planned server_type is not orderable in its target location (see the ::error:: lines above). If git-data has never been born, this dispatch plans a plain CREATE — and cax11 has had no EU stock, so it cannot be born at any account cap. Refusing to apply (#6393, #6463). NO [ack-destroy] bypass on this path."
            exit 1
          fi
          echo "git-data-host-replace plan is the exact scoped recreate. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (git-data-host -replace) — both-volumes-preserved assert
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan (the exact
        # plan we applied): BOTH data volumes carry 0 delete/forget actions (preserved), the
        # private NIC + BOTH store attachments show a create (re-attached) — belt-and-suspenders
        # to the guard.
        run: |
          set -euo pipefail
          # A mid-replace apply failure (old host destroyed, new create fails — quota/image/boot)
          # leaves git-data DOWN with the writer-side CAS fence offline. UNLIKE registry (GHCR
          # fallback) / inngest (paused reminders), git-data has NO serving fallback — but BOTH
          # volumes are preserved (guarded), so re-dispatch recovers from them. Writes FAIL, not
          # corrupt (single-writer at replicas=1 → no split-brain). Emit a self-documenting
          # recovery annotation, then fail hard (gating behavior unchanged).
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (git-data-host-replace) failed mid-replace — git-data may be DOWN (single-writer, no serving fallback); pushes/pulls fail (not corrupt); BOTH volumes are preserved — re-dispatch git-data-host-replace to recover from them"
            exit 1
          fi
          for VOL in hcloud_volume.git_data hcloud_volume.git_data_luks; do
            VOL_DELETES=$(jq --arg v "$VOL" '[.resource_changes[]?
              | select(.address == $v)
              | select(.change.actions? | any(. == "delete" or . == "forget"))] | length' tfplan.json)
            if [[ "$VOL_DELETES" != "0" ]]; then
              echo "::error::${VOL} shows ${VOL_DELETES} delete/forget action(s) in the applied plan — the data store must be preserved. This should have been caught by the guard; failing hard."
              exit 1
            fi
          done
          NIC_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_server_network.git_data")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$NIC_CREATES" == "0" ]]; then
            echo "::error::hcloud_server_network.git_data shows no create action in the applied plan — the new host would have no private NIC. This should have been caught by the guard; failing hard."
            exit 1
          fi
          for ATT in hcloud_volume_attachment.git_data hcloud_volume_attachment.git_data_luks; do
            ATT_CREATES=$(jq --arg a "$ATT" '[.resource_changes[]?
              | select(.address == $a)
              | select(.change.actions? | index("create"))] | length' tfplan.json)
            if [[ "$ATT_CREATES" == "0" ]]; then
              echo "::error::${ATT} shows no create action in the applied plan — the new host would boot with that store UNMOUNTED. This should have been caught by the guard; failing hard."
              exit 1
            fi
          done
          echo "both data volumes preserved (0 delete/forget), private NIC + both store attachments re-attached (create present) in the applied plan."

      - name: Post-replace readiness note (authoritative liveness is web-host-driven, non-SSH)
        # git-data is a deny-all blind host: this CI runner canNOT SSH it, canNOT reach it over the
        # private net, and Better Stack canNOT pull it (git_data_prd is a PUSH heartbeat, paused
        # until #5274 PR C arms the web-host probe cron). So the AUTHORITATIVE post-replace liveness
        # gate is NOT in this job — it is the EXISTING web-host-driven readiness/cutover check that
        # runs `git ls-remote` over the private net to 10.0.1.20 (git-data.tf:12-14,
        # hr-fresh-host-provisioning-reachable-from-terraform-apply). This step ONLY records the
        # in-job deterministic guards (plan/apply asserts above) as the gate for THIS run and points
        # the operator at the out-of-job liveness check. It NEVER SSHes the deny-all host and NEVER
        # implies a Better Stack pull. (No best-effort heartbeat step — unlike registry — because
        # git_data_prd is paused + its probe cron is unbuilt, so a status lookup would be useless.)
        run: |
          {
            echo "## git-data-host-replace readiness (non-SSH)"
            echo ""
            echo "In-job gate: the destroy-guard + post-apply jq asserts (both volumes preserved, NIC + both store attachments + firewall re-attached) gated this run."
            echo ""
            echo "Authoritative liveness: the web-host-driven \`git ls-remote\` readiness/cutover check over the private net (10.0.1.20) — NOT SSH, NOT a Better Stack pull. git-data is a deny-all blind host."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## git-data-host-replace (ADR-103, #6242)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Selected by `-f apply_target=workspaces-luks-cutover` (#6604, ADR-119). The FIVE workspaces_luks
  # resources (workspaces-luks.tf) are OPERATOR_APPLIED_EXCLUSIONS — deliberately NOT in the per-PR
  # `-target=` allow-list (they ride THIS dispatch), and the per-PR `host_creates` TRIPWIRE fires on
  # any `hcloud_volume` create, so the volume MUST be born here, never on a merge. This is a
  # FIRST PROVISION (a pure `+create` of all five), NOT a host -replace — so NO `-replace` flag; the
  # sourced workspaces_luks_cutover_gate PERMITS the five creates and counts luks_passphrase_touched
  # on update/delete/forget only (DP-1). It ABORTS if the plan touches the LIVE plaintext /mnt/data
  # volume/attachment (the old volume has NO prevent_destroy — #6593 omitted it), the web-1 server
  # (cx33-unrebuildable), or anything out of scope. NO [ack-destroy] bypass (a sole-copy-data volume
  # is authorized by the menu-ack dispatch, hr-menu-option-ack-not-prod-write-auth). The freeze /
  # rsync / repoint / canary run from the SEPARATE environment-gated workspaces-luks-cutover.yml
  # AFTER this create; this job only provisions + attaches the encrypted volume (zero downtime).
  workspaces_luks_cutover:
    if: github.event_name == 'workflow_dispatch' && inputs.apply_target == 'workspaces-luks-cutover'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Job-level web-1-swap mutex (DP-3): this job attaches a volume to web-1, so it shares the
    # cross-pipeline `web-1-swap` group with warm_standby / web_2_recreate / the release deploy —
    # at most one web-1 mutation in flight. COEXISTS with (does not replace) the workflow-level R2
    # serializer (terraform-apply-web-platform-host) that protects the lockless backend.
    concurrency:
      group: web-1-swap
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate ephemeral SSH public key for var.ssh_key_path
        # HCL evaluates file() at plan-time regardless of -target= filtering; a throwaway key
        # satisfies var.ssh_key_path (never consumed by the scoped volume create).
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Verify required secrets present
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain 2>/dev/null) || {
            echo "::error::AWS_ACCESS_KEY_ID not found in Doppler prd_terraform."; exit 1; }
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain 2>/dev/null) || {
            echo "::error::AWS_SECRET_ACCESS_KEY not found in Doppler prd_terraform."; exit 1; }
          if [[ -z "$KEY_ID" || -z "$SECRET" ]]; then
            echo "::error::AWS R2 backend credentials are empty in Doppler prd_terraform."; exit 1; fi
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform plan (workspaces-luks first provision) + destroy-guard
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Pure `+create` of the five workspaces_luks resources (NO -replace — first provision). The
        # sourced workspaces_luks_cutover_gate reads the STRUCTURED plan JSON and ABORTS unless the
        # plan is EXACTLY this create with the live plaintext volume/attachment + web-1 preserved.
        run: |
          # set +e so the `rc=$?` diagnostic below actually runs — GitHub runs `run:` under an
          # inherited `-e`, which `set -uo pipefail` does not clear, so without this the plan failure
          # would exit the step before the ::error:: guidance prints. `set -e` is re-armed after.
          set +e
          set -uo pipefail
          doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform plan -no-color -input=false -out=tfplan \
              -target='random_password.workspaces_luks' \
              -target='doppler_secret.workspaces_luks_key' \
              -target='doppler_service_token.workspaces_luks' \
              -target='hcloud_volume.workspaces_luks' \
              -target='hcloud_volume_attachment.workspaces_luks' \
              -var="ssh_key_path=${CI_SSH_PUB}"
          rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "::error::terraform plan (workspaces-luks-cutover) failed (exit $rc)."
            exit $rc
          fi
          set -e
          terraform show -no-color tfplan > tfplan.txt
          terraform show -json tfplan > tfplan.json
          # Sourced gate — the SAME bytes tests/scripts/test-workspaces-luks-cutover-gate.sh exercises.
          # shellcheck source=tests/scripts/lib/workspaces-luks-cutover-gate.sh
          source "${GITHUB_WORKSPACE}/tests/scripts/lib/workspaces-luks-cutover-gate.sh"
          if ! workspaces_luks_cutover_gate tfplan.json; then
            echo "::error::workspaces-luks-cutover destroy-guard ABORTED: the plan is not the exact scoped first provision. Verify the LIVE plaintext /mnt/data volume (hcloud_volume.workspaces[\"web-1\"]) + its attachment + the web-1 server are UNTOUCHED, no passphrase re-mint, no destroy/forget, and the encrypted volume + attachment + doppler_secret each show a create. NO [ack-destroy] bypass on this path."
            grep -E 'will be destroyed|must be replaced|will be updated in-place|Plan:' tfplan.txt | head -30 >&2
            exit 1
          fi
          echo "workspaces-luks-cutover plan is the exact scoped first provision. Plan summary:"
          grep -E '^Plan:' tfplan.txt || true

      - name: Terraform apply (workspaces-luks first provision) — live-volume-preserved assert
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # Apply the saved, guarded plan. Post-apply jq backstops from the SAVED plan (belt-and-
        # suspenders to the gate): the live plaintext volume/attachment + web-1 carry ZERO actions,
        # the encrypted volume + attachment each show a create. This is additive — zero downtime.
        run: |
          set -euo pipefail
          if ! doppler run -p soleur -c prd_terraform --name-transformer tf-var -- \
            terraform apply -no-color -input=false tfplan; then
            echo "::error::terraform apply (workspaces-luks-cutover) failed — the encrypted volume was not provisioned. The live plaintext /mnt/data is UNTOUCHED (additive create); re-dispatch to retry."
            exit 1
          fi
          for ADDR in 'hcloud_volume.workspaces["web-1"]' 'hcloud_volume_attachment.workspaces["web-1"]' 'hcloud_server.web["web-1"]'; do
            TOUCHED=$(jq --arg a "$ADDR" '[.resource_changes[]?
              | select(.address == $a)
              | select(.change.actions? | any(. == "create" or . == "update" or . == "delete" or . == "forget"))] | length' tfplan.json)
            if [[ "$TOUCHED" != "0" ]]; then
              echo "::error::${ADDR} shows ${TOUCHED} action(s) in the applied plan — the LIVE plaintext store / web-1 must be preserved. This should have been caught by the guard; failing hard."
              exit 1
            fi
          done
          VOL_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume.workspaces_luks")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          ATT_CREATES=$(jq '[.resource_changes[]?
            | select(.address == "hcloud_volume_attachment.workspaces_luks")
            | select(.change.actions? | index("create"))] | length' tfplan.json)
          if [[ "$VOL_CREATES" == "0" || "$ATT_CREATES" == "0" ]]; then
            echo "::error::the encrypted volume/attachment shows no create in the applied plan — nothing was provisioned. Failing hard."
            exit 1
          fi
          echo "live plaintext volume/attachment + web-1 untouched (0 actions); encrypted volume + attachment created. Additive — zero downtime. Next: dispatch workspaces-luks-cutover.yml (environment-gated) for the freeze/rsync/repoint."

      - name: Dispatch summary
        if: always()
        env:
          REASON: ${{ inputs.reason }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## workspaces-luks-cutover first provision (ADR-119, #6604)"
            echo ""
            echo "**Dispatch reason:** ${REASON:-n/a}"
            echo "**Status:** ${JOB_STATUS}"
            echo "**Run:** ${RUN_URL}"
            echo ""
            echo "Additive +create of the encrypted volume (zero downtime). The freeze/rsync/repoint/canary is the SEPARATE environment-gated workspaces-luks-cutover.yml dispatch."
          } >> "$GITHUB_STEP_SUMMARY"
