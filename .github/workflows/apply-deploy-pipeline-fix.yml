# Auto-apply `terraform_data.deploy_pipeline_fix` whenever a PR that touches
# the host-resident deploy-pipeline trigger files merges to main. This
# eliminates the "edit script → drift on next 12h cron → manually apply"
# cycle documented in:
#   knowledge-base/project/learnings/bug-fixes/2026-04-24-recurring-deploy-pipeline-fix-drift-as-feature.md
#
# Authorization model: the PR merge IS the human authorization. Same model as
# `web-platform-release.yml` — the reviewer's approval click on the merge
# button is the load-bearing `yes`, replacing the in-terminal Terraform
# prompt. Restricted to the 5 trigger files via the `paths:` filter so
# unrelated merges (app code, docs, plugin changes) never write prod.
#
# Kill switch: include `[skip-deploy-fix-apply]` anywhere in a commit message
# on the PR to skip auto-apply for that merge (e.g., when the change is
# intentionally not meant to land on prod yet).
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a
# transient failure or for ad-hoc applies.
#
# Doppler `prd_terraform` config provides:
#   - HCLOUD_TOKEN          (via doppler run --name-transformer tf-var)
#   - AWS_ACCESS_KEY_ID     (R2 backend)
#   - AWS_SECRET_ACCESS_KEY (R2 backend)
#   - DEPLOY_SSH_PRIVATE_KEY (auth for remote-exec; generated by
#                             `tls_private_key.ci_ssh` in
#                             apps/web-platform/infra/ci-ssh-key.tf and synced
#                             to Doppler by `doppler_secret.deploy_ssh_private_key`
#                             in the same file. The matching public half is
#                             appended to root's `~/.ssh/authorized_keys` by
#                             `terraform_data.root_authorized_keys` — also in
#                             ci-ssh-key.tf. Fresh-host parity for new hosts
#                             via the top-level `ssh_authorized_keys:` block
#                             in cloud-init.yml.)
#
# All untrusted inputs (commit messages, workflow_dispatch inputs) are routed
# through env vars before reaching any `run:` block — CI workflow
# injection-prevention convention. All action references are SHA-pinned.

name: Apply deploy-pipeline-fix

on:
  push:
    branches: [main]
    paths:
      - "apps/web-platform/infra/ci-deploy.sh"
      - "apps/web-platform/infra/ci-deploy-wrapper.sh"
      - "apps/web-platform/infra/webhook.service"
      - "apps/web-platform/infra/cat-deploy-state.sh"
      - "apps/web-platform/infra/canary-bundle-claim-check.sh"
      - "apps/web-platform/infra/hooks.json.tmpl"
      - "apps/web-platform/infra/deploy-inngest-bootstrap.sudoers"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (manual re-run only)"
        required: true
        type: string

concurrency:
  group: terraform-apply-deploy-pipeline-fix
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: apps/web-platform/infra
  # cloudflared binary for the CF Tunnel SSH bridge (see #4177).
  # SHA-256 is computed against the real binary at the pinned version
  # (NEVER paste a checksum from documentation or AI output per the
  # 2026-03-21 server-provisioning learning, Session Error #4).
  CLOUDFLARED_VERSION: "2026.5.0"
  CLOUDFLARED_SHA256: "0095e46fdc88855d801c4d304cb1f5dd4bd656116c47ab94c2ad0ae7cda1c7ec"

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        # Anchor `[skip-deploy-fix-apply]` to its own line (matches the
        # sibling `apply-web-platform-infra.yml` posture) so the token
        # cannot fire from a quoted block, code fence, or trailer that
        # happens to carry the literal substring.
        run: |
          set -euo pipefail
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-deploy-fix-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify DOPPLER_TOKEN
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Verify Deploy SSH key
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          if ! KEY=$(doppler secrets get DEPLOY_SSH_PRIVATE_KEY --plain 2>/dev/null) || [[ -z "$KEY" ]]; then
            echo "::error::Doppler secret DEPLOY_SSH_PRIVATE_KEY is missing or empty. See workflow header for setup."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain)
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain)
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Generate CI public SSH key for var.ssh_key_path
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Start ssh-agent with deploy key
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)"
          printf 'SSH_AUTH_SOCK=%s\n' "$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          printf 'SSH_AGENT_PID=%s\n' "$SSH_AGENT_PID" >> "$GITHUB_ENV"
          doppler secrets get DEPLOY_SSH_PRIVATE_KEY --plain | ssh-add - >/dev/null 2>&1
          ssh-add -l >/dev/null

      - name: Capture local hashes (pre-apply)
        run: |
          set -euo pipefail
          sha256sum \
            "${INFRA_DIR}/ci-deploy.sh" \
            "${INFRA_DIR}/ci-deploy-wrapper.sh" \
            "${INFRA_DIR}/webhook.service" \
            "${INFRA_DIR}/cat-deploy-state.sh" \
            "${INFRA_DIR}/canary-bundle-claim-check.sh" \
            "${INFRA_DIR}/deploy-inngest-bootstrap.sudoers" \
            > /tmp/local-hashes.txt
          cat /tmp/local-hashes.txt

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false

      - name: Install cloudflared (SHA-pinned)
        # The runner cannot reach the host on port 22 — the Hetzner firewall
        # restricts SSH to var.admin_ips (operator/static), and the ~6575
        # GitHub Actions egress CIDRs cannot be added (Hetzner firewall
        # rule cap is 100). Bridge SSH through the existing Cloudflare
        # Tunnel via `cloudflared access tcp` (see #4177, #749 precedent).
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/cloudflared \
            "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64"
          echo "${CLOUDFLARED_SHA256}  /tmp/cloudflared" | sha256sum -c -
          sudo install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
          rm /tmp/cloudflared
          cloudflared --version

      - name: Pull CF Access service-token credentials from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        # `doppler secrets get … --plain` returns rc=1 ONLY when the key
        # is absent; for keys present with an empty value it returns rc=0
        # + empty stdout. The `-z` guard catches both.
        # Prereq: `apply-web-platform-infra.yml` must have succeeded once
        # to create the CF Access service token AND populate Doppler.
        run: |
          set -euo pipefail
          TOKEN_ID=$(doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain 2>/dev/null || true)
          TOKEN_SECRET=$(doppler secrets get CI_SSH_ACCESS_TOKEN_SECRET --plain 2>/dev/null || true)
          if [[ -z "$TOKEN_ID" || -z "$TOKEN_SECRET" ]]; then
            echo "::error::CI_SSH_ACCESS_TOKEN_ID/_SECRET missing or empty in Doppler prd_terraform. Apply apply-web-platform-infra.yml first (it auto-syncs both secrets post-apply); fall back to apps/web-platform/infra/scripts/sync-ci-ssh-access-token.sh for local reprovisioning."
            exit 1
          fi
          printf '::add-mask::%s\n' "$TOKEN_ID"
          printf '::add-mask::%s\n' "$TOKEN_SECRET"
          printf 'TUNNEL_SERVICE_TOKEN_ID=%s\n' "$TOKEN_ID" >> "$GITHUB_ENV"
          printf 'TUNNEL_SERVICE_TOKEN_SECRET=%s\n' "$TOKEN_SECRET" >> "$GITHUB_ENV"

      - name: Start cloudflared SSH bridge + iptables NAT redirect
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          # `var.app_domain_base` defaults to "soleur.ai" (see
          # apps/web-platform/infra/variables.tf); Doppler `prd_terraform`
          # has only `APP_DOMAIN`, not `APP_DOMAIN_BASE`, so we use the
          # literal default here. The TF resource `cloudflare_record.ssh`
          # is built from the same `var.app_domain_base` value at apply
          # time — keep this literal in sync with the variable default.
          APP_DOMAIN_BASE="soleur.ai"
          SERVER_IP=$(terraform output -raw server_ip)
          printf '::add-mask::%s\n' "$SERVER_IP"
          printf 'SERVER_IP=%s\n' "$SERVER_IP" >> "$GITHUB_ENV"

          # Start cloudflared in the background; it forwards 127.0.0.1:2222
          # over the tunnel to host's localhost:22 (sshd) via the new
          # `ssh.${app_domain_base}` ingress rule. Service-token auth at
          # the CF Access edge uses TUNNEL_SERVICE_TOKEN_ID/_SECRET env.
          # `--loglevel warn` bounds steady-state log volume; flap/handshake
          # failures still surface (see cleanup step at job end).
          cloudflared access tcp \
            --loglevel warn \
            --hostname "ssh.${APP_DOMAIN_BASE}" \
            --url 127.0.0.1:2222 \
            > /tmp/cloudflared.log 2>&1 &
          CF_PID=$!
          printf 'CLOUDFLARED_PID=%s\n' "$CF_PID" >> "$GITHUB_ENV"
          disown "$CF_PID"

          # Wait up to 15s for the local TCP listener to come up.
          for _ in $(seq 1 15); do
            if nc -z 127.0.0.1 2222 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if ! nc -z 127.0.0.1 2222 2>/dev/null; then
            echo "::error::cloudflared TCP forward did not open on 127.0.0.1:2222 within 15s."
            cat /tmp/cloudflared.log >&2 || true
            exit 1
          fi

          # iptables NAT redirect: terraform's `provisioner "file"` /
          # `remote-exec` blocks use the Go SSH client in
          # `golang.org/x/crypto/ssh` directly, which does NOT consult
          # `~/.ssh/config` (only the system `ssh` binary does). To steer
          # those calls through the cloudflared local forward without
          # modifying server.tf (AC4 invariant), kernel-redirect outbound
          # SERVER_IP:22 to 127.0.0.1:2222 on this runner. Restricted to
          # the OUTPUT chain so only this runner's egress is affected.
          sudo iptables -t nat -A OUTPUT \
            -d "$SERVER_IP" -p tcp --dport 22 \
            -j REDIRECT --to-ports 2222

          # Seed host-key against the local forward so the Go SSH client's
          # StrictHostKeyChecking has a known fingerprint. cloudflared
          # forwards the real sshd banner end-to-end, so the captured key
          # is the production host's, not an MITM.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 2222 -H 127.0.0.1 >> ~/.ssh/known_hosts

          # Also seed an entry keyed by SERVER_IP so the post-apply
          # `Verify server-side file hashes` step (which uses the system
          # ssh client) finds the same fingerprint via the iptables
          # redirect path.
          ssh-keyscan -p 22 -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Terraform plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          doppler run --name-transformer tf-var -- \
            terraform plan -target=terraform_data.deploy_pipeline_fix \
            -var="ssh_key_path=${CI_SSH_PUB}" \
            -no-color -input=false

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          doppler run --name-transformer tf-var -- \
            terraform apply -target=terraform_data.deploy_pipeline_fix \
            -var="ssh_key_path=${CI_SSH_PUB}" \
            -auto-approve -input=false

      - name: Verify server-side file hashes match local
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          set -euo pipefail
          SERVER_IP=$(terraform output -raw server_ip)
          printf '::add-mask::%s\n' "$SERVER_IP"

          REMOTE_OUT=$(ssh -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
            root@"$SERVER_IP" \
            "sha256sum /usr/local/bin/ci-deploy.sh /usr/local/bin/ci-deploy-wrapper.sh /etc/systemd/system/webhook.service /usr/local/bin/cat-deploy-state.sh /usr/local/bin/canary-bundle-claim-check.sh /etc/sudoers.d/deploy-inngest-bootstrap && systemctl is-active webhook")
          echo "Server-side state:"
          echo "$REMOTE_OUT"

          # Basename mapping note: `deploy-inngest-bootstrap.sudoers` (source
          # filename in apps/web-platform/infra/) installs to
          # `/etc/sudoers.d/deploy-inngest-bootstrap` (no extension, per
          # sudoers.d convention). Strip the `.sudoers` suffix on the local
          # side so the basename key matches the remote install path.
          declare -A REMOTE
          while read -r hash path; do
            base=$(basename "$path")
            REMOTE["$base"]="$hash"
          done < <(printf '%s\n' "$REMOTE_OUT" | grep -E '^[a-f0-9]{64}  ')

          MISMATCH=0
          while read -r hash path; do
            base=$(basename "$path")
            base="${base%.sudoers}"
            r="${REMOTE[$base]:-}"
            if [[ -z "$r" ]]; then
              echo "::error::No remote hash recorded for $base"
              MISMATCH=1
            elif [[ "$r" != "$hash" ]]; then
              echo "::error::Hash mismatch for $base: local=$hash remote=$r"
              MISMATCH=1
            else
              echo "OK: $base hash matches ($hash)"
            fi
          done < /tmp/local-hashes.txt

          if [[ "$MISMATCH" -ne 0 ]]; then
            echo "::error::One or more files diverged between local and server post-apply."
            exit 1
          fi

          if ! printf '%s\n' "$REMOTE_OUT" | tail -n 1 | grep -qx 'active'; then
            echo "::error::systemctl is-active webhook returned non-'active' on the server."
            exit 1
          fi

          echo "All trigger-file hashes match and webhook is active."

      - name: Auto-close any open drift issues for this stack
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          issues=$(gh issue list --label "infra-drift" --state open \
            --search "infra: drift detected in web-platform in:title" \
            --json number --jq '.[].number')
          for n in $issues; do
            gh issue comment "$n" --body "Auto-closed by \`apply-deploy-pipeline-fix.yml\` after merge ${MERGE_SHA}. Server state was re-aligned with HEAD."
            gh issue close "$n" --reason completed
            echo "Closed #$n"
          done

      - name: Tear down cloudflared SSH bridge
        if: always()
        run: |
          set +e
          if [[ -n "${SERVER_IP:-}" ]]; then
            sudo iptables -t nat -D OUTPUT \
              -d "$SERVER_IP" -p tcp --dport 22 \
              -j REDIRECT --to-ports 2222 2>/dev/null || true
          fi
          if [[ -n "${CLOUDFLARED_PID:-}" ]]; then
            kill "$CLOUDFLARED_PID" 2>/dev/null || true
          fi
          if [[ -s /tmp/cloudflared.log ]]; then
            echo "=== /tmp/cloudflared.log (last 200 lines) ==="
            tail -n 200 /tmp/cloudflared.log
          fi

      - name: Post-apply summary
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REASON: ${{ inputs.reason }}
        run: |
          {
            echo "## Apply deploy-pipeline-fix"
            echo ""
            echo "**Trigger:** ${{ github.event_name }}"
            echo "**Merge SHA:** ${{ github.sha }}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${{ job.status }}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
