# Auto-apply `terraform_data.deploy_pipeline_fix` whenever a PR that touches
# the host-resident deploy-pipeline trigger files merges to main. This
# eliminates the "edit script → drift on next 12h cron → manually apply"
# cycle documented in:
#   knowledge-base/project/learnings/bug-fixes/2026-04-24-recurring-deploy-pipeline-fix-drift-as-feature.md
#
# Authorization model: the PR merge IS the human authorization. Same model as
# `web-platform-release.yml` — the reviewer's approval click on the merge
# button is the load-bearing `yes`, replacing the in-terminal Terraform
# prompt. Restricted to the trigger files via the `paths:` filter so
# unrelated merges (app code, docs, plugin changes) never write prod.
#
# Kill switch: include `[skip-deploy-fix-apply]` anywhere in a commit message
# on the PR to skip auto-apply for that merge (e.g., when the change is
# intentionally not meant to land on prod yet).
#
# Manual escape hatch: `workflow_dispatch` is kept for re-runs after a
# transient failure or for ad-hoc applies.
#
# Doppler `prd_terraform` config provides:
#   - HCLOUD_TOKEN          (via doppler run --name-transformer tf-var)
#   - AWS_ACCESS_KEY_ID     (R2 backend)
#   - AWS_SECRET_ACCESS_KEY (R2 backend)
#
# Two apply targets (#4829):
#   - terraform_data.deploy_pipeline_fix — HTTPS-only (#3756): its local-exec
#     provisioner POSTs base64 file payloads through the CF Tunnel to
#     /hooks/infra-config; the webhook handler (infra-config-apply.sh) writes them
#     atomically. No SSH needed for THIS target.
#   - terraform_data.infra_config_handler_bootstrap — root SSH (#4827). It
#     delivers the handler + the infra-config-install escalation helper + the
#     sudoers grant, which the webhook path cannot self-deliver (chicken-and-egg,
#     #4811). The GitHub-hosted runner's egress IP is not in var.admin_ips, so this
#     job bridges SSH through the existing CF Tunnel SSH route (tunnel.tf:
#     ssh://localhost:22 ingress + CF Access ci_ssh service token): install
#     cloudflared, open a `cloudflared access tcp` localhost forward, and add an
#     `iptables -t nat OUTPUT REDIRECT` rule rewriting SERVER_IP:22 → 127.0.0.1:2222
#     (transparent to terraform's Go SSH client, which ignores ~/.ssh/config —
#     learning 2026-05-20-terraform-go-ssh-client-ignores-ssh-config-multi-agent-catch.md).
#     The bridge authenticates with TF_VAR_ci_ssh_private_key (Doppler
#     DEPLOY_SSH_PRIVATE_KEY); the host trusts the matching pubkey via
#     terraform_data.root_authorized_keys (ci-ssh-key.tf, operator-local apply).
#     The firewall admin_ips allowlist is byte-unchanged — the tunnel is the access
#     path, not an IP grant.
#
# RESOLVED (#4844): deploy_pipeline_fix has `depends_on = [apparmor_bwrap_profile]`,
# and `-target` pulls in dependencies, so a CI apply also recreates
# apparmor_bwrap_profile over SSH. As of #4844 ALL 7 sibling SSH provisioners
# (including apparmor_bwrap_profile and docker_seccomp_config) carry the
# dual-context connection block (private_key = var.ci_ssh_private_key;
# agent = var.ci_ssh_private_key == null), so the agent-less runner authenticates
# with the explicit CI key — no `publickey` failure on a profile co-change. The
# earlier #4829 CAVEAT (a profile co-change in the same merge as a trigger file
# required an operator-local `terraform apply`) no longer applies.
#
# All untrusted inputs (commit messages, workflow_dispatch inputs) are routed
# through env vars before reaching any `run:` block — CI workflow
# injection-prevention convention. All action references are SHA-pinned.

name: Apply deploy-pipeline-fix

on:
  push:
    branches: [main]
    paths:
      - "apps/web-platform/infra/ci-deploy.sh"
      - "apps/web-platform/infra/ci-deploy-wrapper.sh"
      - "apps/web-platform/infra/webhook.service"
      - "apps/web-platform/infra/cat-deploy-state.sh"
      - "apps/web-platform/infra/canary-bundle-claim-check.sh"
      - "apps/web-platform/infra/hooks.json.tmpl"
      - "apps/web-platform/infra/deploy-inngest-bootstrap.sudoers"
      - "apps/web-platform/infra/infra-config-apply.sh"
      # #4829 — the escalation helper is delivered by the SSH bridge, not the
      # webhook path. A helper-only change must still fire the auto-apply so the
      # bridge re-runs over the tunnel.
      - "apps/web-platform/infra/infra-config-install.sh"
      - "apps/web-platform/infra/push-infra-config.sh"
      - "apps/web-platform/infra/cat-infra-config-state.sh"
      # #5505 — the 4 inngest cutover scripts are webhook-delivered AND registered in
      # server.tf's deploy_pipeline_fix triggers_replace hash, so a body-only edit to
      # any of them must fire this apply. Without these, the inngest-only #5504 merge
      # did NOT auto-deploy and the fix needed a manual workflow_dispatch. Kept in sync
      # with TRIGGER_FILES by ship-deploy-pipeline-fix-gate.test.ts (#5505 parity test).
      - "apps/web-platform/infra/inngest-enumerate-reminders.sh"
      - "apps/web-platform/infra/inngest-rearm-reminders.sh"
      - "apps/web-platform/infra/inngest-wiped-volume-verify.sh"
      - "apps/web-platform/infra/cat-inngest-verify-state.sh"
      - "apps/web-platform/infra/inngest-inventory.sh"
      - "apps/web-platform/infra/git-lock-chardevice-sweep.sh"
      # #5873 — the container seccomp profile is delivered by the
      # docker_seccomp_config SSH provisioner (server.tf), whose triggers_replace
      # hashes this file. A profile-only edit must fire this apply so the new
      # profile reaches /etc/docker/seccomp-profiles/soleur-bwrap.json on the
      # host. NOTE: the RUNNING container only loads a new seccomp profile at
      # `docker run` (container start), so a redeploy is required AFTER this apply
      # for a profile change to take effect — sequence apply→redeploy explicitly
      # (do not rely on the concurrent web-platform-release run winning the race).
      - "apps/web-platform/infra/seccomp-bwrap.json"
      # #5875 apply-parity — the container apparmor profile is delivered by the
      # apparmor_bwrap_profile SSH provisioner (server.tf), whose triggers_replace
      # hashes this file. Before #5875 it was in deploy_pipeline_fix's depends_on
      # but NOT co-`-target`ed here nor in this paths filter, so an apparmor-only
      # edit did not auto-apply at all (identical gap to the #5873 seccomp case).
      # The RUNNING container only loads a new --security-opt apparmor at
      # `docker run`, so the sequenced apply→redeploy below applies to it too.
      # Kept in sync with the #5505 paths-union test in ship-deploy-pipeline-fix-gate.ts.
      - "apps/web-platform/infra/apparmor-soleur-bwrap.profile"
      - "apps/web-platform/infra/server.tf"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you applying? (manual re-run only)"
        required: true
        type: string
      allow_missing_status_endpoint:
        description: "Tolerate a 404 from /hooks/infra-config-status (first-bootstrap ONLY — before the host has the status hook). Never set on a routine apply."
        required: false
        default: false
        type: boolean

concurrency:
  # LOAD-BEARING shared group (#4844): this MUST be the IDENTICAL literal string
  # used in apply-web-platform-infra.yml. The R2 backend has NO state lock
  # (apps/web-platform/infra/main.tf `use_lockfile = false` — R2 lacks S3
  # conditional writes), so this shared GitHub Actions concurrency group is the
  # SOLE serializer preventing two concurrent `terraform apply` runs from
  # last-writer-wins-clobbering web-platform/terraform.tfstate. Both workflows
  # now SSH-apply apparmor_bwrap_profile (this one pulls it transitively via
  # deploy_pipeline_fix's depends_on; the other lists it in its SSH -target set),
  # so they overlap on the same R2 object. As of #5515 deploy_pipeline_fix's
  # depends_on has TWO elements — it now transitively pulls BOTH apparmor_bwrap_profile
  # AND infra_config_handler_bootstrap into this run — but the overlap surface with
  # apply-web-platform-infra.yml is UNCHANGED: that workflow SSH-`-target`s only
  # apparmor_bwrap_profile (not the bridge), so the new edge is never traversed by it.
  # GHA does NOT error on divergent group
  # strings — they silently fail to serialize — so do not "rename for clarity".
  group: terraform-apply-web-platform-host
  # cancel-in-progress: false — cancelling a half-applied unlocked run is the
  # worse split-state (no backend lock to recover from).
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  TERRAFORM_VERSION: "1.10.5"
  INFRA_DIR: apps/web-platform/infra
  # cloudflared binary for the CF Tunnel SSH bridge to the
  # infra_config_handler_bootstrap resource (#4829, see #4177/#4181 precedent).
  # SHA-256 computed against the real released binary at the pinned version
  # (NEVER paste a checksum from documentation or AI output per the 2026-03-21
  # server-provisioning learning, Session Error #4; re-verified at /work time).
  CLOUDFLARED_VERSION: "2026.5.0"
  CLOUDFLARED_SHA256: "0095e46fdc88855d801c4d304cb1f5dd4bd656116c47ab94c2ad0ae7cda1c7ec"

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      skip: ${{ steps.kill_switch.outputs.skip }}
    steps:
      - id: kill_switch
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_MSG" =~ (^|$'\n')\[skip-deploy-fix-apply\]($|$'\n') ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Kill switch detected in commit message — skipping apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    # 90 min (was 15) because the #5875 item-4 "Redeploy to load applied profile"
    # step below can trigger ONE graceful ci-deploy.sh swap, which inherits the
    # ADR-078 cron drain (CRON_DRAIN_TIMEOUT=4200s ≈ 70 min worst case). This is a
    # CEILING, not a duration: the redeploy only fires when the running container's
    # loaded seccomp profile differs from committed (a rare profile change), so a
    # routine script/server.tf-only apply skips the swap and finishes in minutes.
    # Matches web-platform-release.yml's deploy job (also 90).
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Verify DOPPLER_TOKEN
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [[ -z "$DOPPLER_TOKEN_CHECK" ]]; then
            echo "::error::DOPPLER_TOKEN secret is not configured."
            exit 1
          fi

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain)
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain)
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Generate CI public SSH key for var.ssh_key_path
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init -input=false

      # --- #4844: CF Tunnel SSH bridge (extracted to a shared composite action) ---
      # Brings up cloudflared + iptables NAT redirect so terraform's Go SSH client
      # reaches infra_config_handler_bootstrap over the tunnel. Same mechanism as
      # the prior inline bridge (#4830); now shared with apply-web-platform-infra.yml.
      # SETUP ONLY — the caller-side `if: always()` teardown below is load-bearing
      # (the composite action cannot register a post-job hook).
      - name: CF Tunnel SSH bridge
        uses: ./.github/actions/cf-tunnel-ssh-bridge
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          infra-dir: ${{ env.INFRA_DIR }}
          cloudflared-version: ${{ env.CLOUDFLARED_VERSION }}
          cloudflared-sha256: ${{ env.CLOUDFLARED_SHA256 }}

      - name: Terraform plan
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          doppler run --name-transformer tf-var -- \
            terraform plan -target=terraform_data.deploy_pipeline_fix \
            -target=terraform_data.infra_config_handler_bootstrap \
            -target=terraform_data.docker_seccomp_config \
            -target=terraform_data.apparmor_bwrap_profile \
            -var="ssh_key_path=${CI_SSH_PUB}" \
            -no-color -input=false

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set -euo pipefail
          doppler run --name-transformer tf-var -- \
            terraform apply -target=terraform_data.deploy_pipeline_fix \
            -target=terraform_data.infra_config_handler_bootstrap \
            -target=terraform_data.docker_seccomp_config \
            -target=terraform_data.apparmor_bwrap_profile \
            -var="ssh_key_path=${CI_SSH_PUB}" \
            -auto-approve -input=false

      - name: Tear down cloudflared SSH bridge
        if: always()
        # Remove the NAT redirect + kill cloudflared as soon as the apply is done
        # (the post-apply verifies below are HTTPS, not SSH). `if: always()` so a
        # failed apply still leaves no stray rule/process — a left-over OUTPUT NAT
        # rule or orphaned cloudflared would corrupt a later job on a persistent
        # runner (moot on GH-hosted ephemeral runners, but the discipline is required).
        run: |
          set +e
          if [[ -n "${SERVER_IP:-}" ]]; then
            sudo iptables -t nat -D OUTPUT \
              -d "$SERVER_IP" -p tcp --dport 22 \
              -j REDIRECT --to-ports 2222 2>/dev/null || true
          fi
          if [[ -n "${CLOUDFLARED_PID:-}" ]]; then
            kill "$CLOUDFLARED_PID" 2>/dev/null || true
          fi
          if [[ -f /tmp/cloudflared.log ]]; then
            echo "=== /tmp/cloudflared.log (last 200 lines) ==="
            if [[ -s /tmp/cloudflared.log ]]; then
              tail -n 200 /tmp/cloudflared.log
            else
              echo "(log empty — cloudflared may have failed before writing any output)"
            fi
          fi

      - name: Verify webhook is alive post-apply
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        # Poll /hooks/deploy-status up to 3 times at 5s intervals.
        # The self-restart (systemd-run --on-active=3s) plus webhook
        # binary init takes ~5-8s; the 15s window covers this plus a
        # margin for on-failure restart cycles (RestartSec=5).
        run: |
          set -euo pipefail
          APP_DOMAIN_BASE=$(doppler secrets get APP_DOMAIN_BASE --plain 2>/dev/null || echo "soleur.ai")
          WEBHOOK_SECRET=$(doppler secrets get WEBHOOK_DEPLOY_SECRET --plain)
          CF_ACCESS_ID=$(doppler secrets get CF_ACCESS_CLIENT_ID --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain)
          CF_ACCESS_SECRET=$(doppler secrets get CF_ACCESS_CLIENT_SECRET --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_SECRET --plain)

          for attempt in 1 2 3; do
            HMAC=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
            HTTP_CODE=$(curl -s -o /tmp/deploy-status-response.txt -w '%{http_code}' \
              --max-time 10 \
              -H "X-Signature-256: sha256=${HMAC}" \
              -H "CF-Access-Client-Id: ${CF_ACCESS_ID}" \
              -H "CF-Access-Client-Secret: ${CF_ACCESS_SECRET}" \
              "https://deploy.${APP_DOMAIN_BASE}/hooks/deploy-status" 2>/dev/null || echo "000")

            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Webhook is alive (HTTP 200 on attempt $attempt)"
              cat /tmp/deploy-status-response.txt
              break
            fi

            echo "Attempt $attempt: HTTP $HTTP_CODE (retrying in 5s...)"
            if [[ "$attempt" -lt 3 ]]; then
              sleep 5
            fi
          done

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Webhook did not respond with HTTP 200 after 3 attempts (15s window)."
            cat /tmp/deploy-status-response.txt >&2 2>/dev/null || true
            exit 1
          fi

      - name: Verify infra-config apply succeeded
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
          # 404-tolerance is a bounded first-bootstrap escape hatch only: a host
          # whose stale hooks.json predates the /hooks/infra-config-status hook
          # returns 404. On a routine `push` apply this flag is always 'false',
          # so a persistent 404 FAILS the step (it was the exact false-success
          # vector for the 2026-05-21 freeze, #4804). Set the boolean input on a
          # manual workflow_dispatch ONLY for a documented first bootstrap.
          ALLOW_MISSING_STATUS: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_missing_status_endpoint }}
        run: |
          set -euo pipefail
          APP_DOMAIN_BASE=$(doppler secrets get APP_DOMAIN_BASE --plain 2>/dev/null || echo "soleur.ai")
          WEBHOOK_SECRET=$(doppler secrets get WEBHOOK_DEPLOY_SECRET --plain)
          CF_ACCESS_ID=$(doppler secrets get CF_ACCESS_CLIENT_ID --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain)
          CF_ACCESS_SECRET=$(doppler secrets get CF_ACCESS_CLIENT_SECRET --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_SECRET --plain)

          # Initial delay: the async script + state write + sync + restart
          # scheduling takes ~5-8s; polling immediately wastes attempt 1.
          sleep 8

          # The webhook returns HTTP 202 the moment the hook TRIGGERS, not when
          # the async handler finishes writing files (trigger-and-forget,
          # #4804). So success is NOT "the proxy responded" — it is "the state
          # JSON proves every file landed". Assert the full invariant:
          #   exit_code == 0 AND files_failed == 0 AND files_written == files_total
          # files_total is derived from the JSON (never hardcoded to the FILE_MAP
          # length) so the gate survives future FILE_MAP additions.
          EXIT_CODE=""
          FILES_FAILED=""
          FILES_WRITTEN=""
          FILES_TOTAL=""
          for attempt in 1 2 3; do
            HMAC=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
            HTTP_CODE=$(curl -s -o /tmp/infra-config-status-response.txt -w '%{http_code}' \
              --max-time 10 \
              -H "X-Signature-256: sha256=${HMAC}" \
              -H "CF-Access-Client-Id: ${CF_ACCESS_ID}" \
              -H "CF-Access-Client-Secret: ${CF_ACCESS_SECRET}" \
              "https://deploy.${APP_DOMAIN_BASE}/hooks/infra-config-status" 2>/dev/null || echo "000")

            if [[ "$HTTP_CODE" == "200" ]]; then
              EXIT_CODE=$(jq -r '.exit_code' /tmp/infra-config-status-response.txt 2>/dev/null || echo "MISSING")
              FILES_FAILED=$(jq -r '.files_failed' /tmp/infra-config-status-response.txt 2>/dev/null || echo "MISSING")
              FILES_WRITTEN=$(jq -r '.files_written' /tmp/infra-config-status-response.txt 2>/dev/null || echo "MISSING")
              FILES_TOTAL=$(jq -r '.files_total' /tmp/infra-config-status-response.txt 2>/dev/null || echo "MISSING")
              if [[ "$EXIT_CODE" == "0" && "$FILES_FAILED" == "0" \
                    && "$FILES_TOTAL" != "MISSING" && "$FILES_TOTAL" != "null" \
                    && "$FILES_WRITTEN" == "$FILES_TOTAL" ]]; then
                echo "Infra-config apply succeeded (exit_code=0, files_written=${FILES_WRITTEN}/${FILES_TOTAL}, files_failed=0 on attempt $attempt)"
                cat /tmp/infra-config-status-response.txt
                break
              fi
              echo "Attempt $attempt: exit_code=$EXIT_CODE files_failed=$FILES_FAILED files_written=$FILES_WRITTEN files_total=$FILES_TOTAL (retrying in 5s...)"
            elif [[ "$HTTP_CODE" == "404" ]]; then
              echo "Attempt $attempt: infra-config-status endpoint not found (HTTP 404)"
            else
              echo "Attempt $attempt: HTTP $HTTP_CODE (retrying in 5s...)"
            fi

            if [[ "$attempt" -lt 3 ]]; then
              sleep 5
            fi
          done

          # --- Final adjudication (fail loud; no silent pass) ---
          if [[ "$HTTP_CODE" == "404" ]]; then
            if [[ "$ALLOW_MISSING_STATUS" == "true" ]]; then
              echo "::warning::infra-config-status returned 404; tolerated via allow_missing_status_endpoint (documented first-bootstrap escape hatch)."
            else
              echo "::error::infra-config-status returned HTTP 404 after all retries — the host's hooks.json predates the status endpoint and the apply did NOT verify. This is the false-success freeze vector (#4804). For a genuine first bootstrap, re-run via workflow_dispatch with allow_missing_status_endpoint=true."
              cat /tmp/infra-config-status-response.txt >&2 2>/dev/null || true
              exit 1
            fi
          elif [[ "$HTTP_CODE" == "200" ]]; then
            if [[ "$EXIT_CODE" != "0" ]]; then
              echo "::error::infra-config-apply reported exit_code=$EXIT_CODE (partial failure)."
              cat /tmp/infra-config-status-response.txt >&2 2>/dev/null || true
              exit 1
            fi
            if [[ "$FILES_FAILED" != "0" ]]; then
              echo "::error::infra-config-apply reported files_failed=$FILES_FAILED — one or more files did not land on the host."
              cat /tmp/infra-config-status-response.txt >&2 2>/dev/null || true
              exit 1
            fi
            if [[ "$FILES_TOTAL" == "MISSING" || "$FILES_TOTAL" == "null" || "$FILES_WRITTEN" != "$FILES_TOTAL" ]]; then
              echo "::error::infra-config-apply landed-files mismatch: files_written=$FILES_WRITTEN files_total=$FILES_TOTAL (expected equal and non-null)."
              cat /tmp/infra-config-status-response.txt >&2 2>/dev/null || true
              exit 1
            fi
          else
            echo "::error::infra-config-status did not respond with HTTP 200 after 3 attempts (last HTTP $HTTP_CODE). The handler is async behind a 202 trigger-and-forget, so a non-responding status endpoint cannot be treated as success."
            cat /tmp/infra-config-status-response.txt >&2 2>/dev/null || true
            exit 1
          fi

      - name: Redeploy to load applied profile and assert loaded==committed (#5875 item 4)
        if: success()
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        # "Applied ≠ loaded" gap closer (#5875 item 4 / ADR-079). The terraform
        # apply above delivered the seccomp profile to the HOST
        # (/etc/docker/seccomp-profiles/soleur-bwrap.json), but the RUNNING container
        # only loads a new `--security-opt seccomp=<file>` at `docker run`. The
        # concurrent web-platform-release deploy is UNORDERED on the same merge
        # (different concurrency groups), so the fix deploy can run the STALE profile
        # and go green while every tenant stays broken — worst during a #5874-style
        # RECOVERY. This step sequences the redeploy AFTER the apply and fails loud
        # unless the running container's LOADED seccomp hash equals the committed one.
        #
        # AppArmor needs NO redeploy: apparmor_bwrap_profile runs `apparmor_parser -r`
        # at apply (server.tf), which reloads the kernel profile for the running
        # confined container immediately. Only seccomp is bound at container start.
        #
        # Conditional-by-construction (AC "fires only on an actual profile change"):
        # if the running container's loaded hash already equals committed (a
        # script/server.tf/apparmor-only apply, OR an already-current profile), this
        # step no-ops without a swap. Only a seccomp change (loaded != committed)
        # triggers ONE graceful, canary-validated, ADR-078-cron-drained swap via
        # /hooks/deploy (ci-deploy.sh); `flock -n` in ci-deploy.sh dedupes any
        # concurrent release deploy (idempotent). No drift-poll/retrigger loop.
        run: |
          set -euo pipefail
          APP_DOMAIN_BASE=$(doppler secrets get APP_DOMAIN_BASE --plain 2>/dev/null || echo "soleur.ai")
          WEBHOOK_SECRET=$(doppler secrets get WEBHOOK_DEPLOY_SECRET --plain)
          CF_ACCESS_ID=$(doppler secrets get CF_ACCESS_CLIENT_ID --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain)
          CF_ACCESS_SECRET=$(doppler secrets get CF_ACCESS_CLIENT_SECRET --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_SECRET --plain)

          STATUS_URL="https://deploy.${APP_DOMAIN_BASE}/hooks/deploy-status"
          DEPLOY_URL="https://deploy.${APP_DOMAIN_BASE}/hooks/deploy"

          # Committed profile hash — sha256 of the in-repo file at this merge commit.
          COMMITTED_SHA=$(sha256sum seccomp-bwrap.json | cut -d' ' -f1)
          echo "Committed seccomp profile sha256: ${COMMITTED_SHA}"

          # GET /hooks/deploy-status (HMAC over empty body + CF-Access).
          get_status() {
            local sig
            sig=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
            curl -s --max-time 15 -o /tmp/redeploy-status.json -w '%{http_code}' \
              -X GET \
              -H "X-Signature-256: sha256=${sig}" \
              -H "CF-Access-Client-Id: ${CF_ACCESS_ID}" \
              -H "CF-Access-Client-Secret: ${CF_ACCESS_SECRET}" \
              "$STATUS_URL" 2>/dev/null || echo "000"
          }

          # --- Read current loaded profile + running tag + baseline start_ts ---
          HTTP=$(get_status)
          if [[ "$HTTP" != "200" ]]; then
            echo "::error::Cannot read /hooks/deploy-status (HTTP $HTTP) — refusing to assert loaded profile blind."
            cat /tmp/redeploy-status.json >&2 2>/dev/null || true
            exit 1
          fi
          LOADED_SHA=$(jq -r '.seccomp_profile_sha256 // ""' /tmp/redeploy-status.json 2>/dev/null || echo "")
          CURRENT_TAG=$(jq -r '.tag // ""' /tmp/redeploy-status.json 2>/dev/null || echo "")
          PRIOR_START=$(jq -r '.start_ts // 0' /tmp/redeploy-status.json 2>/dev/null || echo 0)
          [[ "$PRIOR_START" =~ ^[0-9]+$ ]] || PRIOR_START=0
          echo "Running container loaded seccomp sha256: '${LOADED_SHA:-<none>}' (tag='${CURRENT_TAG}')"

          # --- Fast path: already loaded → no swap needed ---
          if [[ "$LOADED_SHA" == "$COMMITTED_SHA" ]]; then
            echo "Loaded profile already equals committed — no profile change to load; skipping redeploy."
            exit 0
          fi

          echo "Loaded ('${LOADED_SHA:-<none>}') != committed ('${COMMITTED_SHA}') — a seccomp change is applied but not loaded. Redeploying to load it."

          # Validate the tag we will redeploy (server-supplied state, but pinned to a
          # safe charset before it reaches the payload — no shell/JSON injection).
          if [[ -z "$CURRENT_TAG" || "$CURRENT_TAG" == "?" || ! "$CURRENT_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Cannot determine a valid current image tag from /hooks/deploy-status (.tag='${CURRENT_TAG}'). Trigger a normal web-platform deploy, then re-run this apply."
            exit 1
          fi

          # POST /hooks/deploy — redeploy the SAME image so the container restarts and
          # loads the applied profile. No `peers` (single-host reload; fan-out is a
          # dormant no-op at single-host, ADR-068). ci-deploy.sh's flock dedupes any
          # concurrent web-platform-release deploy.
          PAYLOAD=$(printf '{"command":"deploy web-platform ghcr.io/jikig-ai/soleur-web-platform %s"}' "$CURRENT_TAG")
          POST_SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          POST_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=${POST_SIG}" \
            -H "CF-Access-Client-Id: ${CF_ACCESS_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_SECRET}" \
            -d "$PAYLOAD" \
            "$DEPLOY_URL" 2>/dev/null || echo "000")
          if [[ "$POST_CODE" != "202" ]]; then
            echo "::error::Redeploy webhook rejected (HTTP $POST_CODE) — profile is applied but NOT loaded."
            exit 1
          fi
          echo "Redeploy initiated (HTTP 202). Polling for completion (bounded by the ADR-078 cron drain)..."

          # Poll until a deploy that STARTED after our trigger reaches a terminal
          # exit_code (>=0). 160 × 30s = 4800s, inside the 90-min job ceiling and
          # ≥ CRON_DRAIN_TIMEOUT (4200s). exit_code -1 == running (ci-deploy #2205).
          FINAL_EXIT=""
          FINAL_LOADED=""
          FINAL_VERDICT=""
          for attempt in $(seq 1 160); do
            sleep 30
            HTTP=$(get_status)
            [[ "$HTTP" == "200" ]] || { echo "Attempt $attempt: status HTTP $HTTP"; continue; }
            EXIT=$(jq -r '.exit_code // -99' /tmp/redeploy-status.json 2>/dev/null || echo -99)
            START=$(jq -r '.start_ts // 0' /tmp/redeploy-status.json 2>/dev/null || echo 0)
            [[ "$START" =~ ^[0-9]+$ ]] || START=0
            if [[ "$EXIT" =~ ^-?[0-9]+$ ]] && [[ "$EXIT" -ge 0 ]] && [[ "$START" -gt "$PRIOR_START" ]]; then
              FINAL_EXIT="$EXIT"
              FINAL_LOADED=$(jq -r '.seccomp_profile_sha256 // ""' /tmp/redeploy-status.json 2>/dev/null || echo "")
              FINAL_VERDICT=$(jq -r '.sandbox_canary.verdict // "unknown"' /tmp/redeploy-status.json 2>/dev/null || echo unknown)
              echo "Redeploy terminal after ${attempt} poll(s): exit_code=${FINAL_EXIT} loaded=${FINAL_LOADED} canary=${FINAL_VERDICT}"
              break
            fi
            echo "Attempt $attempt/160: exit_code=${EXIT} start_ts=${START} (waiting for a post-trigger terminal state)..."
          done

          # --- Fail-loud adjudication ---
          if [[ -z "$FINAL_EXIT" ]]; then
            echo "::error::Redeploy did not reach a terminal state within the poll window — profile load UNVERIFIED. Check /hooks/deploy-status + the ci-deploy.sh journald log."
            exit 1
          fi
          if [[ "$FINAL_EXIT" != "0" ]]; then
            echo "::error::Redeploy failed (exit_code=${FINAL_EXIT}). The applied seccomp profile was NOT loaded. See /hooks/deploy-status .reason."
            cat /tmp/redeploy-status.json >&2 2>/dev/null || true
            exit 1
          fi
          if [[ "$FINAL_LOADED" != "$COMMITTED_SHA" ]]; then
            echo "::error::LOADED != COMMITTED after redeploy: loaded='${FINAL_LOADED}' committed='${COMMITTED_SHA}'. The running container is NOT enforcing the committed seccomp profile (the exact 'applied ≠ loaded' failure #5875 item 4 exists to catch)."
            exit 1
          fi
          # Per ADR-079 the faithful canary is still NON-BLOCKING dark-launch: pass /
          # canary_infra_error / fixture_uncaptured are all acceptable here; only a
          # faithful sandbox_broken (a real bwrap EPERM against the committed profile)
          # is fatal. Promotion of the canary to a blocking gate is soak-owned (#5889).
          if [[ "$FINAL_VERDICT" == "sandbox_broken" ]]; then
            echo "::error::Faithful sandbox canary verdict=sandbox_broken after redeploy — the committed seccomp profile EPERMs the real SDK bwrap argv. Do NOT leave this profile live."
            exit 1
          fi
          echo "Loaded == committed (${COMMITTED_SHA}); canary verdict=${FINAL_VERDICT} (not sandbox_broken). Profile is live."

      - name: Check whether #4804 is still open (scopes the one-time self-heal verification)
        id: check_4804
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STATE=$(gh issue view 4804 --json state --jq '.state' 2>/dev/null || echo "MISSING")
          if [[ "$STATE" == "OPEN" ]]; then
            echo "open=true" >> "$GITHUB_OUTPUT"
            echo "#4804 is OPEN — running the one-time journald self-heal verification + close."
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
            echo "#4804 is ${STATE} (not OPEN) — skipping the journald close-out check; the generic files_written==files_total gate above is the standing landed-files guard."
          fi

      - name: Verify journald_storage no-SSH surface is live (AC12, #4804)
        if: success() && steps.check_4804.outputs.open == 'true'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        # ONE-TIME close-out check for #4804, NOT a standing regression guard.
        # The ORIGINAL symptom: /hooks/deploy-status returned journald_storage ==
        # null because cat-deploy-state.sh was frozen at 2026-05-21 (#4804). After
        # the apply pushes the fresh cat-deploy-state.sh (carrying the #4792/#4800
        # journald_storage field), the field must report persistent == true before
        # we close #4804. It is gated on #4804 still being OPEN so it auto-disables
        # once resolved — the generic `files_written == files_total && files_failed
        # == 0` gate above is the STANDING landed-files guard (it already proves
        # cat-deploy-state.sh landed). Asserting a specific FIELD VALUE on every
        # future apply would over-couple this deploy-reliability workflow to one
        # feature and false-red on a deliberate future journald change.
        run: |
          set -euo pipefail
          APP_DOMAIN_BASE=$(doppler secrets get APP_DOMAIN_BASE --plain 2>/dev/null || echo "soleur.ai")
          WEBHOOK_SECRET=$(doppler secrets get WEBHOOK_DEPLOY_SECRET --plain)
          CF_ACCESS_ID=$(doppler secrets get CF_ACCESS_CLIENT_ID --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_ID --plain)
          CF_ACCESS_SECRET=$(doppler secrets get CF_ACCESS_CLIENT_SECRET --plain 2>/dev/null || doppler secrets get CI_SSH_ACCESS_TOKEN_SECRET --plain)

          PERSISTENT=""
          for attempt in 1 2 3; do
            HMAC=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
            HTTP_CODE=$(curl -s -o /tmp/deploy-status-journald.txt -w '%{http_code}' \
              --max-time 10 \
              -H "X-Signature-256: sha256=${HMAC}" \
              -H "CF-Access-Client-Id: ${CF_ACCESS_ID}" \
              -H "CF-Access-Client-Secret: ${CF_ACCESS_SECRET}" \
              "https://deploy.${APP_DOMAIN_BASE}/hooks/deploy-status" 2>/dev/null || echo "000")

            if [[ "$HTTP_CODE" == "200" ]]; then
              PERSISTENT=$(jq -r '.journald_storage.persistent' /tmp/deploy-status-journald.txt 2>/dev/null || echo "MISSING")
              if [[ "$PERSISTENT" == "true" ]]; then
                echo "journald_storage.persistent == true (attempt $attempt) — the #4792/#4800 no-SSH surface is live; the false-success freeze is cleared."
                break
              fi
              echo "Attempt $attempt: journald_storage.persistent=$PERSISTENT (retrying in 5s...)"
            else
              echo "Attempt $attempt: HTTP $HTTP_CODE (retrying in 5s...)"
            fi

            if [[ "$attempt" -lt 3 ]]; then
              sleep 5
            fi
          done

          if [[ "$PERSISTENT" != "true" ]]; then
            echo "::error::/hooks/deploy-status .journald_storage.persistent is '$PERSISTENT', expected 'true'. The cat-deploy-state.sh update from #4792/#4800 has not landed on the host (or persistent journald storage is not configured)."
            cat /tmp/deploy-status-journald.txt >&2 2>/dev/null || true
            exit 1
          fi

      - name: Close #4804 after self-heal verified
        if: success() && steps.check_4804.outputs.open == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          STATE=$(gh issue view 4804 --json state --jq '.state' 2>/dev/null || echo "MISSING")
          if [[ "$STATE" == "OPEN" ]]; then
            gh issue comment 4804 --body "Auto-closed by \`apply-deploy-pipeline-fix.yml\` after merge ${MERGE_SHA}: infra-config files landed (files_written == files_total, files_failed == 0) and \`/hooks/deploy-status\` confirms \`journald_storage.persistent == true\`. The deploy-pipeline-fix false-success freeze is resolved."
            gh issue close 4804 --reason completed
            echo "Closed #4804"
          else
            echo "#4804 is ${STATE} (not OPEN); skipping close."
          fi

      - name: Auto-close any open drift issues for this stack
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          issues=$(gh issue list --label "infra-drift" --state open \
            --search "infra: drift detected in web-platform in:title" \
            --json number --jq '.[].number')
          for n in $issues; do
            gh issue comment "$n" --body "Auto-closed by \`apply-deploy-pipeline-fix.yml\` after merge ${MERGE_SHA}. Server state was re-aligned with HEAD."
            gh issue close "$n" --reason completed
            echo "Closed #$n"
          done

      - name: Post-apply summary
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REASON: ${{ inputs.reason }}
          EVENT_NAME: ${{ github.event_name }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          {
            echo "## Apply deploy-pipeline-fix"
            echo ""
            echo "**Trigger:** ${EVENT_NAME}"
            echo "**Merge SHA:** ${MERGE_SHA}"
            echo "**Reason (manual only):** ${REASON:-n/a}"
            echo "**Status:** ${{ job.status }}"
            echo "**Run:** ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
