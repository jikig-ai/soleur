# Poll CodeQL code scanning alerts and create GitHub issues for new findings.
# Integrates with auto-label-security.yml via "sec:" title prefix.
# Deduplicates by checking for existing open issues with the alert number.
#
# Note: code_scanning_alert is NOT a valid GitHub Actions trigger event.
# This workflow uses schedule + workflow_dispatch instead.

name: CodeQL Alert to Issue

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  security-events: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process open CodeQL alerts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          echo "Fetching open code scanning alerts..."
          ALERTS=$(gh api repos/${GH_REPO}/code-scanning/alerts?state=open --jq '.[] | select(.rule.security_severity_level == "critical" or .rule.security_severity_level == "high") | {number, rule_id: .rule.id, rule_desc: .rule.description, severity: .rule.security_severity_level, tool: .tool.name, file: .most_recent_instance.location.path, line: .most_recent_instance.location.start_line, message: .most_recent_instance.message.text, html_url: .html_url, ref: .most_recent_instance.ref}' 2>&1) || true

          if [ -z "$ALERTS" ]; then
            echo "No open critical/high severity alerts found."
            exit 0
          fi

          CREATED=0
          SKIPPED=0

          # Process-substitution keeps the loop in the parent shell so CREATED/
          # SKIPPED counter increments survive past `done`. A piped `| while`
          # subshells the loop and the final telemetry would always print 0/0.
          while IFS= read -r alert; do
            ALERT_NUMBER=$(echo "$alert" | jq -r '.number')
            ALERT_RULE_ID=$(echo "$alert" | jq -r '.rule_id')
            ALERT_RULE_DESC=$(echo "$alert" | jq -r '.rule_desc')
            ALERT_SEVERITY=$(echo "$alert" | jq -r '.severity')
            ALERT_TOOL=$(echo "$alert" | jq -r '.tool')
            ALERT_FILE=$(echo "$alert" | jq -r '.file')
            ALERT_LINE=$(echo "$alert" | jq -r '.line')
            ALERT_MESSAGE=$(echo "$alert" | jq -r '.message')
            ALERT_HTML_URL=$(echo "$alert" | jq -r '.html_url')
            ALERT_REF=$(echo "$alert" | jq -r '.ref')

            SEARCH_QUERY="sec: CodeQL alert #${ALERT_NUMBER} repo:${GH_REPO} is:issue is:open"
            EXISTING=$(gh search issues "$SEARCH_QUERY" --json number --jq 'length' 2>/dev/null || echo "0")

            if [ "$EXISTING" -gt 0 ]; then
              echo "Issue already exists for CodeQL alert #${ALERT_NUMBER} — skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            TITLE="sec: CodeQL alert #${ALERT_NUMBER} — ${ALERT_RULE_DESC}"

            { echo "## CodeQL Alert #${ALERT_NUMBER}"; echo ""; echo "**Rule:** \`${ALERT_RULE_ID}\` — ${ALERT_RULE_DESC}"; echo "**Severity:** ${ALERT_SEVERITY}"; echo "**Tool:** ${ALERT_TOOL}"; echo "**File:** \`${ALERT_FILE}:${ALERT_LINE}\`"; echo "**Ref:** \`${ALERT_REF}\`"; echo ""; echo "### Message"; echo ""; echo "${ALERT_MESSAGE}"; echo ""; echo "### Links"; echo ""; echo "- [View alert](${ALERT_HTML_URL})"; echo ""; echo "---"; echo "*Auto-created by codeql-to-issues.yml*"; } > "${RUNNER_TEMP}/issue-body-${ALERT_NUMBER}.md"

            gh issue create --title "$TITLE" --body-file "${RUNNER_TEMP}/issue-body-${ALERT_NUMBER}.md" --label "type/security"
            echo "Created issue for CodeQL alert #${ALERT_NUMBER} (severity: ${ALERT_SEVERITY})"
            CREATED=$((CREATED + 1))
          done < <(echo "$ALERTS" | jq -c '.')

          echo "Done. Created: ${CREATED}, Skipped (existing): ${SKIPPED}"

  close-orphans:
    # Auto-close open type/security issues whose referenced CodeQL alerts have
    # all been dismissed. See knowledge-base/project/learnings/best-practices/
    # 2026-04-19-codeql-orphan-issue-post-dismissal-sweep.md for context.
    needs: check-alerts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Close orphan CodeQL-derived security issues
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Pull every open type/security issue (cap 200; the workflow is
          # idempotent so any overflow gets caught on the next daily run).
          # Explicit `gh` exit check + GitHub annotation so a CLI/network
          # failure surfaces as a workflow warning instead of silent skip.
          if ! gh issue list --state open --label "type/security" \
            --json number,title,body,labels --limit 200 \
            > /tmp/sec-issues.json 2>/tmp/sec-issues.err; then
            echo "::warning title=close-orphans::gh issue list failed: $(cat /tmp/sec-issues.err)"
            exit 0
          fi

          if ! jq -e . /tmp/sec-issues.json >/dev/null 2>&1; then
            echo "::warning title=close-orphans::Issue list returned non-JSON body — skipping orphan sweep."
            exit 0
          fi

          TOTAL=$(jq 'length' /tmp/sec-issues.json)
          echo "Scanning ${TOTAL} open type/security issues for orphan CodeQL references..."

          CLOSED=0
          KEPT=0
          SKIPPED=0

          # Process-substitution feed (`done < <(...)`) keeps the loop in the
          # parent shell so the counters above survive past `done`. A piped
          # `jq | while` subshells the loop and the final tally would always
          # print 0/0/0.
          while IFS= read -r issue; do
            ISSUE_NUMBER=$(echo "$issue" | jq -r '.number')
            HAS_KEEP_OPEN=$(echo "$issue" | jq -r '[.labels[].name] | any(. == "keep-open")')
            if [ "$HAS_KEEP_OPEN" = "true" ]; then
              echo "Issue #${ISSUE_NUMBER}: keep-open label present — skipping"
              KEPT=$((KEPT + 1))
              continue
            fi

            # Extract alert numbers cited in title or body. The CodeQL-issue
            # convention is "CodeQL alert #NNN" (this workflow's title format)
            # or human-filed bodies that say "alert #NNN". Match the literal
            # word "alert" then capture trailing numerics. Issue title and body
            # flow through JSON encoding, jq, then grep — never evaluated as
            # shell, so injection is not possible via this path.
            #
            # `head -n 50` caps per-issue alert lookups: a body-stuffed
            # adversarial issue claiming thousands of alert numbers cannot
            # exhaust the authenticated rate limit (5000/hr); the cap bounds
            # the per-issue API cost to 50 calls × 200 issues = 10k worst
            # case, well inside one rate-limit window across daily runs.
            # `|| true` swallows the inner `grep` exit-1 on no-match. Without
            # it, the `pipefail` set above propagates the failure out of
            # `$(...)` and `bash -e` (GitHub Actions default) kills the whole
            # job on the first issue whose title/body has no `alert #N` token.
            # Both grep calls in the pipe need guarding (the second `grep -oE`
            # also exits 1 if the first emits nothing).
            ALERTS=$(echo "$issue" | jq -r '.title + "\n" + (.body // "")' \
              | { grep -oiE 'alert[[:space:]]*#?[0-9]+' || true; } \
              | { grep -oE '[0-9]+' || true; } \
              | sort -un | head -n 50)

            if [ -z "$ALERTS" ]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            ALL_DISMISSED=1
            REASONS=""
            for AN in $ALERTS; do
              # Per AGENTS.md cq-ci-steps-polling-json-endpoints-under: query
              # state with --jq server-side; any non-200 produces no output.
              STATE=$(gh api "/repos/${GH_REPO}/code-scanning/alerts/${AN}" \
                --jq '.state' 2>/dev/null || true)
              if [ -z "$STATE" ]; then
                # Alert lookup failed — could be deleted, rate-limited, or
                # the number was a false match. Skip without closing.
                ALL_DISMISSED=0
                break
              fi
              if [ "$STATE" != "dismissed" ]; then
                ALL_DISMISSED=0
                break
              fi
              REASONS="${REASONS}- alert #${AN}: dismissed"$'\n'
            done

            if [ "$ALL_DISMISSED" -eq 1 ]; then
              { printf 'All referenced CodeQL alerts are now dismissed.\n\n'; \
                printf '%s\n' "$REASONS"; \
                printf 'Closing as resolved by dismissal. Reopen with the `keep-open` label if this issue tracks something other than the alert state.\n'; \
              } > "${RUNNER_TEMP}/close-comment-${ISSUE_NUMBER}.md"
              gh issue comment "$ISSUE_NUMBER" --body-file "${RUNNER_TEMP}/close-comment-${ISSUE_NUMBER}.md"
              gh issue close "$ISSUE_NUMBER" --reason completed
              echo "Closed orphan issue #${ISSUE_NUMBER} (alerts: ${ALERTS//$'\n'/, })"
              CLOSED=$((CLOSED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done < <(jq -c '.[]' /tmp/sec-issues.json)

          echo "Done. Closed: ${CLOSED}, Kept (keep-open): ${KEPT}, Skipped: ${SKIPPED}"
