# Scheduled ship-merge for qualifying PRs.
# Selects the oldest open PR that is non-draft, targets main, is 24+ hours old,
# has required CI checks passing, and lacks ship/failed or no-auto-ship labels.
# Invokes soleur:ship --headless via claude-code-action to run the full ship
# pipeline (compound, tests, PR update, semver label, conflict resolution, merge).
# Phase 1 of #417. v1 uses workflow_dispatch only; cron deferred to post-#419.
# To test manually: gh workflow run scheduled-ship-merge.yml
#
# Security: PR content is read by the claude-code-action agent via gh CLI,
# not interpolated into shell commands. The label creation and PR selection
# steps use only hardcoded strings and GitHub API output.

name: "Scheduled: Ship Merge"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Override: ship a specific PR number'
        required: false
        type: string

concurrency:
  group: schedule-ship-merge
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  ship-merge:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pre-create labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "ship/failed" \
            --description "Scheduled ship failed — remove to re-queue" \
            --color "D93F0B" 2>/dev/null || true
          gh label create "no-auto-ship" \
            --description "Exclude this PR from scheduled ship-merge" \
            --color "FBCA04" 2>/dev/null || true

      - name: Select PR
        id: select
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ inputs.pr_number }}
        run: |
          if [[ -n "$OVERRIDE" ]]; then
            if [[ ! "$OVERRIDE" =~ ^[0-9]+$ ]]; then
              echo "::error::pr_number must be a positive integer, got: $OVERRIDE"
              exit 1
            fi
            printf "pr_number=%s" "$OVERRIDE" | tr -d '\n\r' >> "$GITHUB_OUTPUT"
            echo "Override: shipping PR #$OVERRIDE"
            exit 0
          fi

          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff: $CUTOFF"

          PR=$(gh pr list \
            --state open \
            --json number,createdAt,isDraft,labels,baseRefName \
            --jq "
              [.[] | select(
                .isDraft == false and
                .baseRefName == \"main\" and
                (.createdAt < \"$CUTOFF\") and
                (.labels | map(.name) |
                  (index(\"ship/failed\") | not) and
                  (index(\"no-auto-ship\") | not))
              )] | sort_by(.createdAt) | .[0].number // empty
            ")

          if [[ -z "$PR" ]]; then
            echo "No qualifying PRs found"
            exit 0
          fi

          echo "Selected PR #$PR"

          # Verify required checks pass before committing to the LLM step
          if ! gh pr checks "$PR" --required --fail-fast 2>/dev/null; then
            echo "Required checks not passing for PR #$PR, skipping"
            exit 0
          fi

          printf "pr_number=%s" "$PR" | tr -d '\n\r' >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        if: steps.select.outputs.pr_number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.select.outputs.pr_number }}
        run: gh pr checkout "$PR_NUMBER"

      - name: Ship PR
        if: steps.select.outputs.pr_number
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools Bash,Read,Write,Edit,Glob,Grep
          prompt: |
            Run /soleur:ship --headless

      - name: Post-run cleanup
        if: always() && steps.select.outputs.pr_number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.select.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq .state)

          if [[ "$PR_STATE" == "MERGED" ]]; then
            echo "PR #$PR_NUMBER merged successfully"
            exit 0
          fi

          echo "PR #$PR_NUMBER not merged (state: $PR_STATE)"
          gh pr edit "$PR_NUMBER" --add-label "ship/failed" 2>/dev/null || true
          gh pr comment "$PR_NUMBER" --body "**Scheduled Ship Failed**

          The automated ship-merge workflow failed for this PR.

          **Run:** $RUN_URL

          To re-queue this PR for auto-ship, remove the \`ship/failed\` label." 2>/dev/null || true
