# Weekly strategy document review check.
# Scans knowledge-base/{product,marketing,sales}/ for documents past their
# review_cadence and creates GitHub issues for overdue reviews.
# To test manually: gh workflow run scheduled-strategy-review.yml

name: Strategy Review

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override today date (YYYY-MM-DD) for testing'
        required: false
        type: string

concurrency:
  group: schedule-strategy-review
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  check-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check strategy document reviews
        env:
          GH_TOKEN: ${{ github.token }}
          DATE_OVERRIDE: ${{ inputs.date_override }}
          SERVER_URL: ${{ github.server_url }}
          REPO_NAME: ${{ github.repository }}
        run: bash scripts/strategy-review-check.sh

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Strategy Review workflow failed'
          body: '<p><strong>Strategy Review</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
