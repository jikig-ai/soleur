# Weekly strategy document review check.
# Scans knowledge-base/{product,marketing,sales}/ for documents past their
# review_cadence and creates GitHub issues for overdue reviews.
# To test manually: gh workflow run scheduled-strategy-review.yml

name: Strategy Review

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override today date (YYYY-MM-DD) for testing'
        required: false
        type: string

concurrency:
  group: schedule-strategy-review
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  check-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check strategy document reviews
        env:
          GH_TOKEN: ${{ github.token }}
          DATE_OVERRIDE: ${{ inputs.date_override }}
          SERVER_URL: ${{ github.server_url }}
          REPO_NAME: ${{ github.repository }}
        run: bash scripts/strategy-review-check.sh

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping failure notification"
            exit 0
          fi
          RUN_URL="${REPO_URL}/actions/runs/${RUN_ID}"
          MESSAGE=$(printf '**Strategy Review workflow failed**\n\nWorkflow run: %s\n\nCheck logs for details.' \
            "$RUN_URL")
          PAYLOAD=$(jq -n \
            --arg content "$MESSAGE" \
            --arg username "Sol" \
            --arg avatar_url "https://raw.githubusercontent.com/jikig-ai/soleur/main/plugins/soleur/docs/images/logo-mark-512.png" \
            '{content: $content, username: $username, avatar_url: $avatar_url, allowed_mentions: {parse: []}}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Discord failure notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Discord failure notification failed (HTTP $HTTP_CODE)"
          fi
