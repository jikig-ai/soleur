# Scheduled content publisher for blog and case study distribution.
# Scans distribution-content/ for files with publish_date == today and
# status: scheduled, then posts to declared channels (Discord, X/Twitter, LinkedIn, Bluesky).
# Implements #530, #549: directory-driven content publisher.
#
# Triggers: daily cron at 14:00 UTC + manual workflow_dispatch.
# Status updates are committed back to main after publishing.
#
# Security: This workflow does NOT use untrusted event inputs in run: commands.
# All inputs come from schedule/workflow_dispatch triggers (no user-controlled strings).

name: "Scheduled: Content Publisher"

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: scheduled-content-publisher
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "action-required" \
            --description "Manual action needed from the CEO" \
            --color "D93F0B" 2>/dev/null || true
          gh label create "content-publisher" \
            --description "Scheduled content publisher workflow" \
            --color "0E8A16" 2>/dev/null || true

      - name: Publish content
        id: publish
        env:
          DISCORD_BLOG_WEBHOOK_URL: ${{ secrets.DISCORD_BLOG_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_ALLOW_POST: "true"
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
          LINKEDIN_ALLOW_POST: "true"
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          BSKY_ALLOW_POST: "true"
          GH_TOKEN: ${{ github.token }}
        run: |
          exit_code=0
          bash scripts/content-publisher.sh || exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [[ "$exit_code" -eq 2 ]]; then
            echo "::warning::Partial failure -- some platforms failed but fallback issues were created."
            exit 0
          fi
          exit "$exit_code"

      - name: Commit status updates via PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge-base/marketing/distribution-content/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          BRANCH="ci/content-publisher-$(date -u +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "ci: update content distribution status [skip ci]"
          git push -u origin "$BRANCH"
          # Set CLA check status to success -- bot PRs have no human
          # contributor to sign a CLA, and the CLA Required ruleset
          # blocks auto-merge without this status.
          SHA=$(git rev-parse HEAD)
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state=success \
            -f context=cla-check \
            -f description="CLA not required for automated PRs"
          gh pr create \
            --title "ci: update content distribution status $(date -u +%Y-%m-%d)" \
            --body "Automated status update from content publisher workflow." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --squash --auto || gh pr merge "$BRANCH" --squash

      # Failure alerts use general webhook, not blog-specific
      - name: Discord notification (failure)
        if: failure() && steps.publish.outputs.exit_code != '2'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping failure notification"
            exit 0
          fi
          RUN_URL="${REPO_URL}/actions/runs/${RUN_ID}"
          MESSAGE=$(printf '**Content Publisher failed**\n\nWorkflow run: %s\n\nCheck logs for details.' \
            "$RUN_URL")
          PAYLOAD=$(jq -n \
            --arg content "$MESSAGE" \
            --arg username "Sol" \
            --arg avatar_url "https://raw.githubusercontent.com/jikig-ai/soleur/main/plugins/soleur/docs/images/logo-mark-512.png" \
            '{content: $content, username: $username, avatar_url: $avatar_url, allowed_mentions: {parse: []}}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Discord failure notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Discord failure notification failed (HTTP $HTTP_CODE)"
          fi
