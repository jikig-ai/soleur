# <!-- gate-override: new-scheduled-cron-prefer-inngest -->
# Override justification: this monitor MUST be external to Inngest. An Inngest
# cron cannot detect Inngest being down (a crash-looping server runs no crons) —
# that blind spot is the exact #5542 failure this workflow closes. Pure-GH ops.
#
# External Inngest health watchdog (#5542 incident — the ~3.5h silent crash-loop).
#
# WHY THIS EXISTS: inngest-server crash-looped for hours with NO alert. The
# existing self-healing watchdog (inngest-watchdog-restart-dispatch.yml) is
# INTERNAL — it relies on an inngest cron firing the `inngest-desync-restart`
# label, but a cron cannot run while inngest is fully DOWN. So a hard crash-loop
# (e.g. durable ExecStart live but inngest-redis missing → connection refused) is
# invisible: no internal cron, no external probe, no alert. vector ships the
# crash logs to Better Stack but nothing alerts on them.
#
# This workflow is the EXTERNAL probe that runs independently of inngest: it hits
# the loopback-health signal via the inngest-inventory deploy hook every 15 min.
# On failure it (1) auto-dispatches restart-inngest-server.yml (github.token has
# actions:write; a direct dispatch — NOT the label path, which github.token
# cannot trigger due to GHA's same-token recursion guard), (2) files/updates a
# P1 tracking issue, and (3) reports an error heartbeat to Sentry so a MISSING
# check-in also alerts. Pattern mirrors scheduled-realtime-probe.yml.
#
# Security: all untrusted values (probe response body) flow through env vars +
# strip_log_injection before any echo into ::error:: or $GITHUB_OUTPUT. No
# github.event.* inputs are consumed. The deploy-webhook HMAC + CF Access gates
# are unchanged (read-only GET of the inventory hook).
#
# Tracks #5542.

name: "Scheduled: Inngest Health Watchdog"

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min — inngest-down is a brand-survival outage
  workflow_dispatch: {}

concurrency:
  group: scheduled-inngest-health
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: write   # to dispatch restart-inngest-server.yml on failure

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      # #6374: check out so the probe + age-gate steps can source the extracted,
      # unit-tested classifier/age-gate helpers (scripts/inngest-liveness-classify.sh,
      # scripts/inngest-restart-age-gate.sh) — the decision logic is out of the inline
      # workflow bash and under scripts/*.test.sh coverage.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: probe
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_DEPLOY_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -uo pipefail
          # shellcheck disable=SC2020  # tr char-set strip is intentional (verbatim from scheduled-realtime-probe.yml)

          strip_log_injection() {
            printf '%s' "$1" | LC_ALL=C tr -d '\000-\037\177' \
              | sed -E 's/\xe2\x80\xa8//g; s/\xe2\x80\xa9//g; s/\xe2\x80\x8b//g; s/\xef\xbb\xbf//g; s/\xc2\x85//g'
          }

          fail_mode=""; fail_detail=""; dstate=""
          record_failure() { if [[ -z "$fail_mode" ]]; then fail_mode="$1"; fail_detail="$2"; fi; }

          if [[ -z "${WEBHOOK_SECRET:-}" || -z "${CF_ACCESS_CLIENT_ID:-}" || -z "${CF_ACCESS_CLIENT_SECRET:-}" ]]; then
            record_failure "secret_unset" "WEBHOOK_DEPLOY_SECRET / CF_ACCESS_* not set — cannot probe the inngest health hook."
          fi

          # Health signal (#6374 Defect 2): GET the LIVENESS-only hook, which runs
          # inngest-inventory.sh in INVENTORY_LIVENESS_ONLY mode — the cheap /v0/gql
          # functions query + durability_state ONLY, decoupled from the heavy 365-day
          # eventsV2 scan whose faults false-positived as inngest_down (the #6374 root
          # cause) while the executor kept firing crons. The extracted, unit-tested
          # classifier (scripts/inngest-liveness-classify.sh) maps (HTTP code, body) →
          # mode, distinguishing a GENUINE down (our FATAL sentinel body → inngest_down,
          # restart) from a broken/undeployed probe path (404/000/403 with no sentinel →
          # probe_unavailable, NO restart — the deploy-race tolerance / relocated
          # false-positive fix). Probe up to 3x (8s apart): a single transient blip or a
          # cold-start empty registry (functions_count==0) must NOT churn a restart.
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/scripts/inngest-liveness-classify.sh"
          if [[ -z "$fail_mode" ]]; then
            SIG=$(printf '' | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
            last_mode=""; last_detail=""; healthy="no"
            for attempt in 1 2 3; do
              rm -f /tmp/health-body
              CODE=$(curl -s --max-time 30 -o /tmp/health-body -w '%{http_code}' \
                -X GET \
                -H "X-Signature-256: sha256=$SIG" \
                -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
                -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
                "https://deploy.soleur.ai/hooks/inngest-liveness" || echo "000")
              BODY=$(cat /tmp/health-body 2>/dev/null || echo "")
              MODE=$(classify_liveness_mode "$CODE" "$BODY")
              if [[ "$MODE" == "healthy" ]]; then
                fn=$(printf '%s' "$BODY" | jq -r '.functions | length')
                echo "Inngest healthy on attempt ${attempt}/3: functions=${fn}"
                # On a healthy body, read the no-SSH durability surface (#5553): a
                # constrained enum. An OLDER on-host script (pre-#5553) lacks the field →
                # coerce to "absent" (benign, self-heals on next deploy). "unknown" means a
                # redeployed host whose parser could not read the ExecStart (a read failure).
                dstate=$(printf '%s' "$BODY" | jq -r '.durability_state // "absent"' 2>/dev/null || echo "absent")
                healthy="yes"; break
              fi
              cause=$(strip_log_injection "$(printf '%s' "$BODY" | tr '\n' ' ' | head -c 400)")
              case "$MODE" in
                cold_start)
                  # functions_count==0 grace (#6374): a live-but-empty registry is legitimate
                  # transiently after a restart. Retry; only a PERSISTENT empty registry across
                  # all 3 attempts declares inngest_unhealthy (the Defect-3 age gate is the backstop).
                  last_mode="inngest_unhealthy"; last_detail="attempt ${attempt}/3: liveness 200 but functions registry EMPTY (cold start) — grace/retry" ;;
                inngest_down)
                  last_mode="inngest_down"; last_detail="attempt ${attempt}/3: liveness hook HTTP ${CODE} inngest unreachable: ${cause:-<empty body>}" ;;
                functions_query_degraded)
                  # #6407 Defect A: the /v0/gql functions read transiently failed BUT the
                  # host corroborated loopback /health=200 (inngest-server IS serving; DEGRADED
                  # sentinel). SOFT — NO restart, own [ci/inngest-functions-degraded] issue class.
                  # Retry across all 3 attempts (a genuine transient may recover to healthy); a
                  # SUSTAINED degraded state escalates to inngest_down downstream (the
                  # persistence-escalation ceiling in the "Resolve effective failure mode" step).
                  last_mode="functions_query_degraded"; last_detail="attempt ${attempt}/3: /v0/gql functions transiently unreachable but /health=200 (inngest-server serving) — soft, no restart: ${cause:-<empty body>}" ;;
                inngest_unhealthy)
                  last_mode="inngest_unhealthy"; last_detail="attempt ${attempt}/3: liveness 200 but no functions array: ${cause}" ;;
                probe_unavailable)
                  last_mode="probe_unavailable"; last_detail="attempt ${attempt}/3: liveness probe path unavailable (HTTP ${CODE}, not a well-formed down) — deploy-race window or CF-Access/webhook.service degrade: ${cause:-<empty body>}" ;;
                *)
                  last_mode="probe_unavailable"; last_detail="attempt ${attempt}/3: unclassified probe response (HTTP ${CODE}): ${cause:-<empty body>}" ;;
              esac
              echo "Probe attempt ${attempt}/3: ${MODE}; retrying…"
              [[ "$attempt" -lt 3 ]] && sleep 8
            done
            [[ "$healthy" == "no" ]] && record_failure "$last_mode" "$last_detail"
          fi

          fail_mode_safe=$(strip_log_injection "$fail_mode")
          fail_detail_safe=$(strip_log_injection "$fail_detail")
          dstate_safe=$(strip_log_injection "${dstate:-}")
          { echo "failure_mode=${fail_mode_safe}"; echo "failure_detail=${fail_detail_safe}"; echo "durability_state=${dstate_safe}"; } >> "$GITHUB_OUTPUT"
          if [[ -n "$fail_mode_safe" ]]; then
            echo "::error::Inngest health probe failed: ${fail_mode_safe} — ${fail_detail_safe}"
          elif [[ "$dstate_safe" == "absent" ]]; then
            echo "::notice::Inngest healthy; durability_state field absent (older on-host inventory script, pre-#5553). No durability signal until the next infra-config push re-stages inngest-inventory.sh — blind window made visible, no issue filed."
          elif [[ "$dstate_safe" == "unknown" ]]; then
            echo "::warning::Inngest healthy but durability_state=unknown — the on-host inventory could not read the inngest-server ExecStart (parser/permission regression). This is a read failure, not a confirmed degradation; investigate. No issue filed."
          elif [[ -n "$dstate_safe" && "$dstate_safe" != "durable" && "$dstate_safe" != "sqlite_only" && "$dstate_safe" != "degraded" ]]; then
            echo "::warning::Inngest healthy but durability_state=${dstate_safe} is UNRECOGNIZED — no advisory routing exists for this value (expected durable|degraded|sqlite_only|unknown|absent). A forward-compat drift between inngest-inventory.sh's enum and this workflow; surface it here so it is not silent."
          fi

      # Pool-utilization probe (#5562) — leading indicator + EMAXCONNSESSION
      # classification. Reads pg_stat_activity session counts on the dedicated
      # inngest Supabase project (ref pigsfuxruiopinouvjwy) via the Management API.
      # Runs AFTER the liveness probe and only evaluates pool state when the
      # liveness verdict is empty — a genuinely-down inngest MUST keep its restart
      # path (record_failure-first wins). Sets THREE names, on TWO routes:
      #   pool_pressure / pool_exhausted → pool-family alert (NO restart — a restart
      #     churns MORE session connections and worsens EMAXCONNSESSION; #5558).
      #   pool_probe_unavailable          → soft probe-health alert (broken probe is
      #     itself visible — closes the dark-probe zone).
      # This step re-emits the EFFECTIVE failure_mode/failure_detail (id: poolprobe)
      # so all downstream steps read ONE source of truth.
      - name: Pool-utilization probe (leading indicator + EMAXCONNSESSION)
        id: poolprobe
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PRIOR_FAIL_MODE: ${{ steps.probe.outputs.failure_mode }}
          PRIOR_FAIL_DETAIL: ${{ steps.probe.outputs.failure_detail }}
          # Inngest's worst-case TOTAL client-connection footprint (#6258, ADR-105).
          # --postgres-max-open-conns is PER-POOL, not total: inngest opens ~P separate
          # Postgres pools (queue/state/history/api), each capped independently at 5, so
          # worst-case total = P × 5 ≤ 20 for P ≤ 4. This is the ceiling on
          # inngest-attributable sessions and the correct denominator for the leading
          # indicator — NOT the pooler's default_pool_size (server-side fan-in, dominated
          # by Supabase infra baseline; counting total pg_stat_activity against it
          # false-fires — #5563 follow-up, see the filtered query below). Decoupled from
          # the #5562 default_pool_size 30→15 revert by design (that revert is SUPERSEDED —
          # default_pool_size stays 30; see ADR-105). Bump this only if the per-pool cap or
          # the confirmed pool count P changes (post-#6258 Phase-1 measurement confirms P).
          INNGEST_CLIENT_CAP: '20'
        run: |
          set -uo pipefail
          # shellcheck disable=SC2020  # tr char-set strip is intentional (verbatim from the probe step above)

          # Re-declared per-step — bash functions do not cross GH-Actions steps.
          # Copied verbatim from the probe step (cq-regex-unicode-separators-escape-only).
          strip_log_injection() {
            printf '%s' "$1" | LC_ALL=C tr -d '\000-\037\177' \
              | sed -E 's/\xe2\x80\xa8//g; s/\xe2\x80\xa9//g; s/\xe2\x80\x8b//g; s/\xef\xbb\xbf//g; s/\xc2\x85//g'
          }
          # scrub_pat: redact a leaked Supabase account PAT (sbp_…) before any print.
          # strip_log_injection strips control/separator chars but does NOT redact a
          # token; GitHub's exact-match secret masking can be defeated by truncation.
          # Ported verbatim from apps/web-platform/scripts/postgrest-reload-schema.sh.
          scrub_pat() {
            printf '%s' "$1" | sed -E 's/sbp_[A-Za-z0-9]{20,}/sbp_REDACTED/g'
          }
          sanitize() { scrub_pat "$(strip_log_injection "$1")"; }

          # Start from the upstream liveness verdict (carried via env).
          fail_mode="$PRIOR_FAIL_MODE"; fail_detail="$PRIOR_FAIL_DETAIL"

          if [[ -n "$fail_mode" ]]; then
            echo "Upstream failure_mode='${fail_mode}' set — skipping pool probe (a down inngest keeps its restart path)."
          elif [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            fail_mode="pool_probe_unavailable"
            fail_detail="SUPABASE_ACCESS_TOKEN unset — cannot read pg_stat_activity (pool probe degraded, not a restart)."
          else
            # Endpoint pinned to api.supabase.com — NO env override. An overridable
            # host is a PAT-exfil-via-redirect seam (mirrors postgrest-reload-schema.sh's
            # deliberate refusal of a host seam). curl 2>/dev/null keeps the
            # Authorization header out of $response; scrub_pat is the second line.
            response="$(curl --silent --show-error \
              --request POST \
              --url "https://api.supabase.com/v1/projects/pigsfuxruiopinouvjwy/database/query" \
              --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"query":"select coalesce(application_name,'\''(none)'\'') as app, usename, state, count(*)::int as n from pg_stat_activity where backend_type = '\''client backend'\'' and query not ilike '\''%pg_stat_activity%'\'' group by 1,2,3 order by 4 desc"}' \
              --max-time 15 \
              -w $'\n%{http_code}' \
              2>/dev/null)"
            curl_rc=$?
            http_code="${response##*$'\n'}"
            body="${response%$'\n'*}"
            # Truncate BEFORE sanitize (matches the probe step's head -c 400); scrub
            # runs after truncation so redaction sees the final string.
            body_safe="$(sanitize "$(printf '%s' "$body" | tr '\n' ' ' | head -c 400)")"

            if [[ "$curl_rc" != "0" ]]; then
              fail_mode="pool_probe_unavailable"
              fail_detail="curl failed (rc=${curl_rc}) against Supabase Management API — pool probe degraded."
            elif printf '%s' "$body" | grep -qF 'EMAXCONNSESSION'; then
              # The pooler rejected a client connection — already at the cap. This
              # EMAXCONNSESSION 5xx-body check is the reliable cliff detector and is
              # independent of the count metric below.
              fail_mode="pool_exhausted"
              fail_detail="Management API HTTP ${http_code} EMAXCONNSESSION — session pool at the cap. body=${body_safe}"
            elif [[ "$http_code" == 2?? ]]; then
              if printf '%s' "$body" | jq -e 'type == "array"' >/dev/null 2>&1; then
                # Count ONLY inngest-attributable client backends: role 'postgres'
                # (inngest connects through the session pooler as postgres.<ref>),
                # excluding the pooler's own warm connections (app 'Supavisor*') and
                # the mgmt-api probe. Compared against inngest's worst-case TOTAL client
                # footprint (INNGEST_CLIENT_CAP = P × per-pool cap 5 ≤ 20; #6258/ADR-105),
                # NOT total pg_stat_activity vs
                # default_pool_size — that total is dominated by Supabase infra
                # baseline (Supavisor/PostgREST/pg_net/pg_cron/exporter/walsenders)
                # and false-fires (#5563 follow-up to #5562).
                inngest_conns=$(printf '%s' "$body" | jq '[.[] | select(.usename == "postgres" and (.app | startswith("Supavisor") | not) and .app != "mgmt-api") | .n] | add // 0')
                # Full client-backend breakdown to stdout for visibility +
                # future-proofing the discriminator (sanitized — application_name is
                # client-settable, defense-in-depth against log injection).
                breakdown="$(sanitize "$(printf '%s' "$body" | jq -r '.[] | "\(.usename // "?")/\(.app)/\(.state // "null")=\(.n)"' | tr '\n' ' ' | head -c 400)")"
                echo "Inngest client backends: ${breakdown}"
                if ! [[ "$inngest_conns" =~ ^[0-9]+$ ]]; then
                  fail_mode="pool_probe_unavailable"
                  fail_detail="could not compute inngest-attributable connection count (non-numeric) — breakdown: ${breakdown}"
                elif (( inngest_conns * 100 >= INNGEST_CLIENT_CAP * 80 )); then
                  # Integer arithmetic only — float under set -u aborts the step.
                  fail_mode="pool_pressure"
                  fail_detail="inngest client-attributable connections ${inngest_conns} >= 80% of client cap ${INNGEST_CLIENT_CAP} (leading indicator, before EMAXCONNSESSION). breakdown: ${breakdown}"
                else
                  echo "Inngest pool OK: inngest_conns=${inngest_conns} (client cap ${INNGEST_CLIENT_CAP}, threshold 80%)."
                fi
              else
                fail_mode="pool_probe_unavailable"
                fail_detail="Management API HTTP ${http_code} but body is not a JSON array — body=${body_safe}"
              fi
            else
              # 401/403/other non-2xx without EMAXCONNSESSION → soft mode (print body;
              # a Mgmt-API 401 is often a validation/scope signal, not pure auth).
              fail_mode="pool_probe_unavailable"
              fail_detail="Management API non-2xx HTTP ${http_code} (no EMAXCONNSESSION) — pool probe degraded. body=${body_safe}"
            fi
          fi

          # failure_mode is a CONTROLLED enum this step sets (or carries from the
          # upstream probe): '' | inngest_down | inngest_unhealthy | secret_unset |
          # pool_pressure | pool_exhausted | pool_probe_unavailable. It is NEVER
          # untrusted, so it is emitted RAW — a controlled enum should never be
          # routed through a content-mutating sanitizer. (Historically this was
          # load-bearing: the old strip_log_injection `tr -d '…\x7f\x85'` deleted
          # the LITERAL chars x,7,f,8,5 because GNU tr does not parse \xNN as hex,
          # turning 'pool_exhausted' → 'pool_ehausted' and mis-routing it to the
          # [ci/inngest-down] class — #5563. The tr is now fixed to strip C0
          # controls + DEL byte-safely, but raw-emit of a controlled enum remains
          # the correct invariant.) Only fail_detail (which may embed untrusted
          # body/breakdown) is sanitized.
          fail_detail_safe="$(sanitize "$fail_detail")"
          { printf '%s\n' "failure_mode=${fail_mode}"; printf '%s\n' "failure_detail=${fail_detail_safe}"; } >> "$GITHUB_OUTPUT"
          if [[ -n "$fail_mode" ]]; then
            echo "::error::Inngest pool probe: ${fail_mode} — ${fail_detail_safe}"
          fi

      # Persistence-escalation resolver (#6407, R6). A sustained functions_query_degraded
      # (loopback /health=200 but the /v0/gql functions query PERMANENTLY wedged) must not be
      # soft-masked forever. Reuse the age-gate timestamp logic against the
      # [ci/inngest-functions-degraded] issue: first occurrence = soft (no restart); once the
      # issue age >= GIVE_UP_WINDOW (~45 min ≈ 3 */15 cycles, matching the down-family window)
      # RECLASSIFY the cycle's verdict to inngest_down (restart + page). All OTHER modes pass
      # through unchanged. This step is the SINGLE SOURCE OF TRUTH downstream consumers read
      # (agegate / dispatch / file-issue / auto-close / heartbeat) so the escalation reaches
      # every consumer (union-widening).
      - name: Resolve effective failure mode (functions-degraded escalation, #6407)
        id: effmode
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FAIL_MODE: ${{ steps.poolprobe.outputs.failure_mode }}
          FAIL_DETAIL: ${{ steps.poolprobe.outputs.failure_detail }}
        run: |
          set -euo pipefail
          eff_mode="$FAIL_MODE"; eff_detail="$FAIL_DETAIL"
          if [[ "$FAIL_MODE" == "functions_query_degraded" ]]; then
            # shellcheck source=/dev/null
            source "$GITHUB_WORKSPACE/scripts/inngest-restart-age-gate.sh"
            GIVE_UP_WINDOW_MIN=45
            # `|| true` (#6407 review F2, pattern-recognition): under `set -euo pipefail` a transient
            # gh API failure (rate-limit / 5xx) in this substitution would ABORT the effmode step, so
            # it never writes $GITHUB_OUTPUT and the always() heartbeat reads failure_mode='' → 'ok'
            # (a missed escalation page for that cycle). Degrade a gh blip to empty CREATED instead:
            # empty → restart_ok_from_age treats it as first-occurrence soft (self-heals next */15 tick).
            CREATED=$(gh issue list --repo "$GH_REPO" --label ci/inngest-functions-degraded --state open --json createdAt --jq '.[0].createdAt // empty' 2>/dev/null || true)
            # Escalation decision via the extracted, unit-tested resolver (#6407 review, test-design
            # Finding A): functions_query_degraded stays soft while the open-issue age < window (or on
            # first occurrence), and reclassifies to inngest_down once age >= window. The `gh` read
            # stays here (outside the pure seam) so the decision itself is deterministically testable
            # in inngest-restart-age-gate.test.sh.
            eff_mode=$(resolve_effective_failure_mode "$FAIL_MODE" "$CREATED" "$GIVE_UP_WINDOW_MIN" "$(date -u +%s)")
            if [[ "$eff_mode" == "inngest_down" ]]; then
              eff_detail="ESCALATED (#6407): functions_query_degraded sustained >= ${GIVE_UP_WINDOW_MIN}m (open [ci/inngest-functions-degraded] age) — /health=200 but /v0/gql functions permanently wedged; reclassified to inngest_down (restart + page). ${FAIL_DETAIL}"
            fi
            echo "functions-degraded escalation gate: created='${CREATED:-<none>}' window=${GIVE_UP_WINDOW_MIN}m → effective_mode=$eff_mode"
          fi
          { printf '%s\n' "failure_mode=${eff_mode}"; printf '%s\n' "failure_detail=${eff_detail}"; } >> "$GITHUB_OUTPUT"

      # Restart give-up AGE gate (#6374 Defect 3). Runs BEFORE the dispatch step for the
      # down-family only. Reads the open [ci/inngest-down] issue's createdAt (ONE gh read,
      # zero writes) and emits restart_ok via the extracted, unit-tested age-gate helper:
      #   no open issue (first failure) → true (dispatch once)
      #   age < GIVE_UP_WINDOW (~45 min ≈ 3 */15 cycles) → true
      #   age >= GIVE_UP_WINDOW → false (give up — restarts exhausted)
      # An age gate sidesteps the counter's chicken-and-egg (dispatch runs before the issue
      # exists) + RMW clobber; recovery auto-closes the issue → next episode resets the age.
      - name: Restart give-up age gate (#6374 Defect 3)
        id: agegate
        if: steps.effmode.outputs.failure_mode == 'inngest_down' || steps.effmode.outputs.failure_mode == 'inngest_unhealthy'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/scripts/inngest-restart-age-gate.sh"
          GIVE_UP_WINDOW_MIN=45
          CREATED=$(gh issue list --repo "$GH_REPO" --label ci/inngest-down --state open --json createdAt --jq '.[0].createdAt // empty')
          RESTART_OK=$(restart_ok_from_age "$CREATED" "$GIVE_UP_WINDOW_MIN" "$(date -u +%s)")
          echo "restart_ok=$RESTART_OK" >> "$GITHUB_OUTPUT"
          echo "give-up age gate: restart_ok=$RESTART_OK (open [ci/inngest-down] createdAt='${CREATED:-<none>}', window=${GIVE_UP_WINDOW_MIN}m)"

      # Auto-restart is dispatched ONLY for the down-family (inngest_down /
      # inngest_unhealthy) AND while the age gate permits (restart_ok == 'true'). At
      # give-up the dispatch is suppressed and the file-issue step escalates (loud
      # "restarts exhausted" comment + human-attention label); the Sentry heartbeat keeps
      # paging (it keys off failure_mode, not dispatch). pool_pressure / pool_exhausted /
      # pool_probe_unavailable / probe_unavailable are structurally EXCLUDED — a restart
      # churns more session connections (#5558) or a broken probe is not a real down.
      # Do NOT add pool/probe modes to this gate.
      - name: Auto-dispatch inngest restart (failure)
        if: (steps.effmode.outputs.failure_mode == 'inngest_down' || steps.effmode.outputs.failure_mode == 'inngest_unhealthy') && steps.agegate.outputs.restart_ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Dispatching restart-inngest-server.yml (auto-recovery)…"
          gh workflow run restart-inngest-server.yml --repo "$GH_REPO" --ref main || \
            echo "::warning::restart dispatch failed — the tracking issue below carries the escalation."

      - name: File or comment tracking issue (failure)
        if: steps.effmode.outputs.failure_mode != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FAIL_MODE: ${{ steps.effmode.outputs.failure_mode }}
          FAIL_DETAIL: ${{ steps.effmode.outputs.failure_detail }}
          RESTART_OK: ${{ steps.agegate.outputs.restart_ok }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # shellcheck disable=SC2016  # literal single-quoted GitHub search + backticked markdown are intentional
          set -euo pipefail
          # Branch the tracking issue on failure-mode CLASS, four distinct titles so
          # auto-close never cross-matches:
          #   pool          → [ci/inngest-pool]              session-pool pressure/exhaustion (do-NOT-restart remediation)
          #   pool-probe    → [ci/inngest-pool-probe]        the pool probe itself is degraded (401/scope/non-JSON) — NOT pool-hot
          #   liveness-probe→ [ci/inngest-probe-unavailable] the LIVENESS probe path is unavailable (404/000/403 — deploy race /
          #                   CF-Access / webhook.service degrade) OR the watchdog's own secrets are unset (secret_unset).
          #                   SOFT — NO restart, and a DISTINCT title from [ci/inngest-down] so it never pollutes the
          #                   Defect-3 age gate (#6374). secret_unset routes here (not `down`): the watchdog could not
          #                   probe, so a restart it never dispatched must not be claimed, and this must not seed the age gate.
          #   down          → [ci/inngest-down]              the liveness restart body (down / unhealthy)
          #   functions-degraded → [ci/inngest-functions-degraded] the /v0/gql functions read
          #                   transiently failed BUT loopback /health=200 (inngest IS serving;
          #                   #6407). SOFT — NO restart, DISTINCT title from [ci/inngest-down] so
          #                   the age gate is never polluted. MANDATORY arm BEFORE the `*)→down`
          #                   default: without it a functions_query_degraded verdict falls through
          #                   to `down` → a false [ci/inngest-down] P1 (the exact #6407 regression).
          case "$FAIL_MODE" in
            pool_pressure|pool_exhausted)    ISSUE_CLASS="pool" ;;
            pool_probe_unavailable)          ISSUE_CLASS="pool-probe" ;;
            probe_unavailable|secret_unset)  ISSUE_CLASS="liveness-probe" ;;
            functions_query_degraded)        ISSUE_CLASS="functions-degraded" ;;
            *)                               ISSUE_CLASS="down" ;;
          esac
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY_FILE=$(mktemp); trap 'rm -f "$BODY_FILE"' EXIT
          if [[ "$ISSUE_CLASS" == "liveness-probe" ]]; then
            # #6374 Defect 2: the LIVENESS probe path is unavailable (deploy-race window
            # before /hooks/inngest-liveness lands, or a CF-Access / webhook.service
            # degrade). SOFT — NO restart dispatched, and a title DISTINCT from
            # [ci/inngest-down] so the Defect-3 age gate is never polluted. p2: the probe
            # is dark, not a confirmed inngest-down. The Sentry heartbeat stays `ok` for
            # this mode (see the check-in step) so a transient deploy-race window does not
            # false-page — this issue is the surviving soft signal.
            ISSUE_TITLE="[ci/inngest-probe-unavailable] Inngest liveness probe unavailable"
            ISSUE_SEARCH='in:title "[ci/inngest-probe-unavailable] Inngest liveness probe unavailable"'
            gh label create "ci/inngest-probe-unavailable" --repo "$GH_REPO" \
              --description "External watchdog: the inngest LIVENESS probe path is unavailable (deploy race / CF-Access — NOT a confirmed down)" --color "5319E7" 2>/dev/null || true
            {
              printf '## Inngest liveness probe unavailable\n\n'
              printf -- '- **Failure mode:** `%s`\n' "$FAIL_MODE"
              printf -- '- **Detail:** %s\n' "$FAIL_DETAIL"
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### The probe path is unavailable — this is NOT a confirmed inngest-down\n\nThe `/hooks/inngest-liveness` GET returned a non-200 with no well-formed body (404/000/403). Most common cause: the **deploy-race window** right after the #6374 merge — the repointed workflow is live but the on-host hook has not landed yet (it ships async via the infra-config push). It also fires on a Cloudflare Access or `webhook.service` degrade. NO restart is dispatched (a restart cannot fix a broken probe path), and this does NOT open a `[ci/inngest-down]` issue.\n\n'
              printf '### Remediation\n\n1. If this is right after the #6374 merge, WAIT one infra-config push cycle — `curl https://deploy.soleur.ai/hooks/inngest-liveness` (HMAC + CF-Access) should return the liveness JSON once the hook lands; the watchdog then auto-closes this issue.\n2. Otherwise check CF-Access / `webhook.service` health per `knowledge-base/engineering/operations/runbooks/inngest-server.md` (no-SSH).\n'
            } > "$BODY_FILE"
            EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Liveness probe still unavailable at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. Run: ${RUN_URL}"
            else
              gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
                --label "ci/inngest-probe-unavailable" --label "priority/p2-medium" --body-file "$BODY_FILE"
            fi
          elif [[ "$ISSUE_CLASS" == "functions-degraded" ]]; then
            # #6407 Defect A: the /v0/gql functions read transiently failed but the host
            # corroborated loopback /health=200 (inngest-server IS serving). SOFT — NO restart
            # dispatched, own title DISTINCT from [ci/inngest-down] so the age gate is never
            # polluted. Do NOT reuse the [ci/inngest-probe-unavailable] class — its "probe path
            # unavailable / deploy-race / CF-Access" body is inaccurate for THIS mode (here the
            # probe path IS reachable and /health=200; only the functions query blipped). The
            # Sentry heartbeat stays `ok` for this mode. A SUSTAINED degraded state escalates to
            # inngest_down via the persistence gate (this issue's age) — see the effmode step.
            ISSUE_TITLE="[ci/inngest-functions-degraded] Inngest functions query transiently degraded"
            ISSUE_SEARCH='in:title "[ci/inngest-functions-degraded] Inngest functions query transiently degraded"'
            gh label create "ci/inngest-functions-degraded" --repo "$GH_REPO" \
              --description "External watchdog: /v0/gql functions read transiently failed but /health=200 (inngest serving) — soft, NO restart" --color "5319E7" 2>/dev/null || true
            {
              printf '## Inngest functions query transiently degraded\n\n'
              printf -- '- **Failure mode:** `%s`\n' "$FAIL_MODE"
              printf -- '- **Detail:** %s\n' "$FAIL_DETAIL"
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### The /v0/gql functions read blipped, but inngest IS serving — NOT a confirmed inngest-down\n\nThe on-host liveness probe corroborated the failed `/v0/gql functions` query against the loopback `/health` endpoint on the SAME inngest-server and got **HTTP 200** — inngest-server is up and processing events; only the cheap functions read transiently failed (a curl transport blip → `__FETCH_FAILED__`). NO restart is dispatched (the server is healthy), and this does NOT open a `[ci/inngest-down]` P1. If `/health` had NOT returned 200, this would have stayed `inngest_down` (restart).\n\n'
              printf '### Persistence-escalation ceiling\n\nIf this degraded state persists for >= ~45 min (3 `*/15` cycles), the watchdog reclassifies it to `inngest_down` (dispatch restart + Sentry page) — a `/health`-ok-but-functions-permanently-wedged residual is not soft-masked forever. First occurrence = soft; sustained = escalates.\n\n'
              printf '### Remediation\n\nUsually self-resolves on the next `*/15` tick (auto-closes on recovery). If it persists, query Better Stack for `SOLEUR_INNGEST_LIVENESS_VERDICT mode=degraded` (tag `inngest-inventory`) and check inngest-server function registration per `knowledge-base/engineering/operations/runbooks/inngest-server.md` (no-SSH).\n'
            } > "$BODY_FILE"
            EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Functions query still degraded at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. /health=200 (inngest serving); NO restart. Run: ${RUN_URL}"
            else
              gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
                --label "ci/inngest-functions-degraded" --label "priority/p2-medium" --body-file "$BODY_FILE"
            fi
          elif [[ "$ISSUE_CLASS" == "pool-probe" ]]; then
            ISSUE_TITLE="[ci/inngest-pool-probe] Inngest pool probe unavailable"
            ISSUE_SEARCH='in:title "[ci/inngest-pool-probe] Inngest pool probe unavailable"'
            gh label create "ci/inngest-pool-probe" --repo "$GH_REPO" \
              --description "External watchdog: the pool-utilization probe itself is degraded (not pool-hot)" --color "5319E7" 2>/dev/null || true
            {
              printf '## Inngest pool probe unavailable\n\n'
              printf -- '- **Failure mode:** `%s`\n' "$FAIL_MODE"
              printf -- '- **Detail:** %s\n' "$FAIL_DETAIL"
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### The probe is degraded — the pool is NOT necessarily hot\n\nThe Management-API pool read failed (401/403/scope, non-JSON body, or curl error). This is a dark-probe alert: the watchdog cannot see the session pool, so pool pressure could degrade the durable backend invisibly (the #5558 class). Do NOT restart inngest-server (the pool reading is unknown, not exhausted).\n\n'
              printf '### Remediation\n\n1. Read the printed response body in the **Detail** above / run log — a Supabase Management-API 401 is often a validation/scope signal, not pure auth.\n2. Verify `SUPABASE_ACCESS_TOKEN` is set as a GH Actions secret (TF `github_actions_secret.supabase_access_token`) AND in Doppler `prd`, and that the PAT owner has read access to project `pigsfuxruiopinouvjwy`.\n3. Re-run the read-only probe per the **session-pool pressure/exhaustion** subsection of `knowledge-base/engineering/operations/runbooks/inngest-server.md` (no-SSH).\n'
            } > "$BODY_FILE"
            EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Probe still unavailable at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. Run: ${RUN_URL}"
            else
              gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
                --label "ci/inngest-pool-probe" --label "priority/p1-high" --body-file "$BODY_FILE"
            fi
          elif [[ "$ISSUE_CLASS" == "pool" ]]; then
            ISSUE_TITLE="[ci/inngest-pool] Inngest session-pool pressure/exhaustion"
            ISSUE_SEARCH='in:title "[ci/inngest-pool] Inngest session-pool pressure/exhaustion"'
            gh label create "ci/inngest-pool" --repo "$GH_REPO" \
              --description "External watchdog detected inngest session-pool pressure/exhaustion (do NOT restart)" --color "FBCA04" 2>/dev/null || true
            {
              printf '## Inngest session-pool pressure / exhaustion\n\n'
              printf -- '- **Failure mode:** `%s`\n' "$FAIL_MODE"
              printf -- '- **Detail:** %s\n' "$FAIL_DETAIL"
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### Do NOT restart inngest-server\n\nA restart re-opens all of inngest'\''s pooler connections at once, churning MORE session connections and DEEPENING `EMAXCONNSESSION`. This issue is intentionally excluded from the auto-restart gate.\n\n'
              printf '### Remediation (stale-session / client-cap)\n\n1. Read **Detail** above: `pool_pressure` is inngest-attributable client connections vs inngest'\''s worst-case total footprint (INNGEST_CLIENT_CAP = P × per-pool cap 5 ≤ 20); `pool_exhausted` is an actual `EMAXCONNSESSION` from the pooler. The per-backend breakdown is in the run log (`Inngest client backends: …`).\n2. Confirm the cap holds: inngest-server runs with `--postgres-max-open-conns 5 --postgres-max-idle-conns 2 --postgres-conn-max-idle-time 1` (#6258, ADR-105). --postgres-max-open-conns is PER-POOL (not total), so worst-case total is P×5; if inngest-attributable connections approach the cap, inngest is opening more pools than expected — check for a stuck/looping function holding pooled connections.\n3. If sessions are stale (idle/idle-in-transaction climbing), terminate them via the read-only Management API path (`pg_terminate_backend`) — see the **session-pool pressure/exhaustion** subsection of `knowledge-base/engineering/operations/runbooks/inngest-server.md` (no-SSH first).\n4. The leading indicator tracks inngest'\''s worst-case total footprint (P × per-pool cap), NOT the pooler `default_pool_size` (which is Supabase-infra-dominated) — so this alert is decoupled from the #5562 `default_pool_size` 30→15 revert (that revert is SUPERSEDED; default_pool_size stays 30 — ADR-105). Refs #6258 #5558.\n'
            } > "$BODY_FILE"
            EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Still hot at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. Do NOT restart. Run: ${RUN_URL}"
            else
              gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
                --label "ci/inngest-pool" --label "priority/p1-high" --body-file "$BODY_FILE"
            fi
          else
            ISSUE_TITLE="[ci/inngest-down] Inngest health watchdog failed"
            ISSUE_SEARCH='in:title "[ci/inngest-down] Inngest health watchdog failed"'
            gh label create "ci/inngest-down" --repo "$GH_REPO" \
              --description "External watchdog detected inngest-server down/unhealthy" --color "B60205" 2>/dev/null || true
            {
              printf '## Inngest health watchdog failed\n\n'
              printf -- '- **Failure mode:** `%s`\n' "$FAIL_MODE"
              printf -- '- **Detail:** %s\n' "$FAIL_DETAIL"
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### Auto-recovery\n\nThis run dispatched `restart-inngest-server.yml`. If inngest stays down after the restart, the durable backend likely lost its Redis (`inngest-redis.service` missing → crash-loop): the deploy must re-stage the redis assets, OR roll the ExecStart back to SQLite-only. See `knowledge-base/engineering/operations/runbooks/inngest-server.md` + the #5542 incident.\n'
            } > "$BODY_FILE"
            EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              # #6374 Defect 3: the comment text must be TRUTHFUL about whether a restart
              # was actually dispatched (the age gate may have suppressed it). When
              # restart_ok=false (>= GIVE_UP_WINDOW), escalate ONCE at the boundary: a loud
              # "restarts exhausted" comment REPLACES the "re-dispatched" text + add a
              # human-attention label (idempotent — guarded on label absence so we escalate
              # once, not every */15 cycle). The Sentry heartbeat keeps paging regardless
              # (it keys off failure_mode, not dispatch).
              if [[ "$RESTART_OK" == "true" ]]; then
                # A restart WAS dispatched this cycle (the age gate permitted it) — truthful claim.
                gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Still failing at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. Restart re-dispatched. Run: ${RUN_URL}"
              elif [[ "$RESTART_OK" == "false" ]]; then
                HAS_ESCALATION=$(gh issue view "$EXISTING" --repo "$GH_REPO" --json labels --jq '[.labels[].name] | index("ci/inngest-restart-exhausted") // empty')
                if [[ -z "$HAS_ESCALATION" ]]; then
                  gh label create "ci/inngest-restart-exhausted" --repo "$GH_REPO" \
                    --description "External watchdog gave up auto-restarting inngest (>= give-up window) — human root-cause needed" --color "B60205" 2>/dev/null || true
                  gh issue edit "$EXISTING" --repo "$GH_REPO" --add-label "ci/inngest-restart-exhausted" 2>/dev/null || true
                  gh issue comment "$EXISTING" --repo "$GH_REPO" --body "🚨 RESTARTS EXHAUSTED at ${NOW} — inngest still \`${FAIL_MODE}\` after repeated auto-restarts (issue age >= 45 min). Auto-restart is now SUPPRESSED (a restart is not fixing it); human root-cause needed — likely a lost \`inngest-redis.service\` (durable backend crash-loop) or a config regression. See the #5542 incident + \`knowledge-base/engineering/operations/runbooks/inngest-server.md\`. Detail: ${FAIL_DETAIL}. Run: ${RUN_URL}"
                else
                  gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Still \`${FAIL_MODE}\` at ${NOW}; auto-restart remains suppressed (age gate). Detail: ${FAIL_DETAIL}. Run: ${RUN_URL}"
                fi
              else
                # No-claim-on-empty (2026-07-13 untruthful-comment learning): RESTART_OK is
                # empty only if the age gate did not run for this verdict (a defense-in-depth
                # dead-branch for an excluded/escalated mode reaching the down class without the
                # gate). Do NOT assert "Restart re-dispatched" — a restart that may not have been
                # dispatched must never be claimed. State the uncertainty; the heartbeat pages.
                gh issue comment "$EXISTING" --repo "$GH_REPO" --body "Still failing at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. (Restart-dispatch status unavailable this cycle — see the run log; the Sentry heartbeat continues to page.) Run: ${RUN_URL}"
              fi
            else
              gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
                --label "ci/inngest-down" --label "priority/p1-high" --body-file "$BODY_FILE"
            fi
          fi

      - name: Auto-close tracking issue (healthy)
        if: steps.effmode.outputs.failure_mode == ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016  # literal single-quoted GitHub search strings are intentional
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          # Healthy means BOTH liveness AND pool are fine. Close each class's issue
          # with its OWN title search — never a union search (a union close-search
          # would close the wrong issue; #5562 plan R5 / union-AC trap).
          STALE_DOWN=$(gh issue list --repo "$GH_REPO" --state open \
            --search 'in:title "[ci/inngest-down] Inngest health watchdog failed"' --json number --jq '.[0].number // empty')
          if [[ -n "$STALE_DOWN" ]]; then
            gh issue close "$STALE_DOWN" --repo "$GH_REPO" --comment "Inngest healthy again at ${NOW}. Run: ${RUN_URL}"
          fi
          STALE_POOL=$(gh issue list --repo "$GH_REPO" --state open \
            --search 'in:title "[ci/inngest-pool] Inngest session-pool pressure/exhaustion"' --json number --jq '.[0].number // empty')
          if [[ -n "$STALE_POOL" ]]; then
            gh issue close "$STALE_POOL" --repo "$GH_REPO" --comment "Inngest session pool back under threshold at ${NOW}. Run: ${RUN_URL}"
          fi
          STALE_PROBE=$(gh issue list --repo "$GH_REPO" --state open \
            --search 'in:title "[ci/inngest-pool-probe] Inngest pool probe unavailable"' --json number --jq '.[0].number // empty')
          if [[ -n "$STALE_PROBE" ]]; then
            gh issue close "$STALE_PROBE" --repo "$GH_REPO" --comment "Inngest pool probe healthy again at ${NOW}. Run: ${RUN_URL}"
          fi
          # #6374: close the liveness-probe-unavailable issue once the probe path is
          # reachable AND healthy again (the deploy-race window closed / CF-Access recovered).
          STALE_LIVENESS_PROBE=$(gh issue list --repo "$GH_REPO" --state open \
            --search 'in:title "[ci/inngest-probe-unavailable] Inngest liveness probe unavailable"' --json number --jq '.[0].number // empty')
          if [[ -n "$STALE_LIVENESS_PROBE" ]]; then
            gh issue close "$STALE_LIVENESS_PROBE" --repo "$GH_REPO" --comment "Inngest liveness probe reachable + healthy again at ${NOW}. Run: ${RUN_URL}"
          fi
          # #6407: close the functions-degraded issue once the /v0/gql functions read is
          # healthy again (the transient blip cleared). Without this close the soft issue rots
          # open forever (state-machine Q4 dead-end).
          STALE_FUNCTIONS_DEGRADED=$(gh issue list --repo "$GH_REPO" --state open \
            --search 'in:title "[ci/inngest-functions-degraded] Inngest functions query transiently degraded"' --json number --jq '.[0].number // empty')
          if [[ -n "$STALE_FUNCTIONS_DEGRADED" ]]; then
            gh issue close "$STALE_FUNCTIONS_DEGRADED" --repo "$GH_REPO" --comment "Inngest /v0/gql functions query healthy again at ${NOW}. Run: ${RUN_URL}"
          fi

      # --- #5553: continuous between-deploy durability detector ---------------
      # The deploy-time ci-deploy.sh durability signal fires only at deploy time;
      # a host that runs non-durable BETWEEN deploys re-alerts no one (a SQLite-only-
      # but-alive server returns 200 + functions array, so the inngest_down/unhealthy
      # checks above pass). These two steps close that gap using the inventory hook's
      # no-SSH durability_state enum.
      - name: File or comment durability advisory (non-durable)
        if: steps.probe.outputs.failure_mode == '' && (steps.probe.outputs.durability_state == 'sqlite_only' || steps.probe.outputs.durability_state == 'degraded')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DSTATE: ${{ steps.probe.outputs.durability_state }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # shellcheck disable=SC2016  # literal single-quoted GitHub search + backticked markdown are intentional
          set -euo pipefail
          ISSUE_TITLE="[ci/inngest-degraded-durability] Inngest non-durable between deploys"
          ISSUE_SEARCH='in:title "[ci/inngest-degraded-durability] Inngest non-durable between deploys"'
          gh label create "ci/inngest-degraded-durability" --repo "$GH_REPO" \
            --description "Between-deploy detector: inngest running non-durable (sqlite_only/degraded)" --color "D93F0B" 2>/dev/null || true
          # Severity: degraded (durable backend configured but the durability invariant
          # is broken — the #5542 incident state) is canonically MORE severe than
          # sqlite_only (server alive on the fail-safe). [#5553 review P0-1]
          if [[ "$DSTATE" == "degraded" ]]; then PRIO="priority/p1-high"; else PRIO="priority/p2-medium"; fi
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY_FILE=$(mktemp); trap 'rm -f "$BODY_FILE"' EXIT
          {
            printf '## Inngest running non-durable between deploys\n\n'
            printf -- '- **Durability state:** `%s`\n' "$DSTATE"
            printf -- '- **Severity:** `%s`\n' "$PRIO"
            printf -- '- **Detected at:** %s\n' "$NOW"
            printf -- '- **Run log:** %s\n\n' "$RUN_URL"
            printf '### What this means\n\n'
            printf '`sqlite_only` — the host is on the SQLite-only fail-safe ExecStart: the server is alive, but armed reminders survive only until the next host rebuild, then are lost.\n\n'
            printf '`degraded` — the durable backend is configured (the `--postgres-max-open-conns` sentinel is present) but `inngest-redis.service` is inactive. This is the #5542 incident state (durable backend, broken durability invariant); armed-reminder loss risk is present now, not just on rebuild. (Since #5560 the postgres/redis URIs are env-delivered, not on argv — durability is keyed on the non-secret sentinel.)\n\n'
            printf '### Remediation\n\n'
            printf 'Re-deploy inngest with Redis ready (the deploy re-stages the redis assets → durable ExecStart), or restart `inngest-redis.service`. See `knowledge-base/engineering/operations/runbooks/inngest-server.md` and the #5450 durability epic. This is the continuous between-deploy detector; the deploy-time `ci-deploy.sh` signal fires only at deploy time.\n'
          } > "$BODY_FILE"
          EXISTING=$(gh issue list --repo "$GH_REPO" --state open --label "ci/inngest-degraded-durability" --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            # Keep severity accurate across sqlite_only<->degraded transitions so the
            # issue never rots at a stale severity (#5553 review P2-1): add the current
            # severity label, drop the opposite.
            if [[ "$PRIO" == "priority/p1-high" ]]; then OTHER_PRIO="priority/p2-medium"; else OTHER_PRIO="priority/p1-high"; fi
            gh issue edit "$EXISTING" --repo "$GH_REPO" --add-label "$PRIO" --remove-label "$OTHER_PRIO" 2>/dev/null || true
            gh issue comment "$EXISTING" --repo "$GH_REPO" \
              --body "Still non-durable at ${NOW} — \`durability_state=${DSTATE}\` (severity ${PRIO}). Run: ${RUN_URL}"
          else
            gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
              --label "ci/inngest-degraded-durability" --label "$PRIO" --body-file "$BODY_FILE"
          fi

      - name: Auto-close durability advisory (durable)
        if: steps.probe.outputs.failure_mode == '' && steps.probe.outputs.durability_state == 'durable'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # shellcheck disable=SC2016  # literal single-quoted GitHub search string is intentional
          set -euo pipefail
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          STALE=$(gh issue list --repo "$GH_REPO" --state open --label "ci/inngest-degraded-durability" \
            --search 'in:title "[ci/inngest-degraded-durability] Inngest non-durable between deploys"' --json number --jq '.[0].number // empty')
          if [[ -n "$STALE" ]]; then
            gh issue close "$STALE" --repo "$GH_REPO" --comment "Inngest durable again at ${NOW} (durability_state=durable). Run: ${RUN_URL}"
          fi

      - name: Sentry check-in (final)
        if: always()
        continue-on-error: true
        uses: ./.github/actions/sentry-heartbeat
        with:
          monitor-slug: scheduled-inngest-health
          # #6374: `probe_unavailable` (a broken/undeployed probe path — the deploy-race
          # window, CF-Access/webhook.service degrade) checks in `ok`, NOT `error`. It is a
          # SOFT signal surfaced via the [ci/inngest-probe-unavailable] issue, not a page —
          # so a transient post-merge deploy-race tick does NOT false-page the operator
          # (the relocated-false-positive fix). Only a CONFIRMED down/unhealthy/pool state
          # flips the heartbeat to `error` → Sentry monitor-failure page.
          # #6407: `functions_query_degraded` (/v0/gql functions blipped but /health=200 —
          # inngest IS serving) is ALSO soft → `ok` (surfaced via [ci/inngest-functions-degraded],
          # not a page). Reads the effmode SOURCE OF TRUTH: a SUSTAINED degraded state is
          # reclassified to inngest_down there → falls through to `error` here (the escalation
          # DOES page). Without this arm the soft mode would false-page every */15.
          status: ${{ (steps.effmode.outputs.failure_mode == '' || steps.effmode.outputs.failure_mode == 'probe_unavailable' || steps.effmode.outputs.failure_mode == 'functions_query_degraded') && 'ok' || 'error' }}
          sentry-ingest-domain: ${{ secrets.SENTRY_INGEST_DOMAIN }}
          sentry-project-id: ${{ secrets.SENTRY_PROJECT_ID }}
          sentry-public-key: ${{ secrets.SENTRY_PUBLIC_KEY }}

  # ---------------------------------------------------------------------------
  # #6425 — Cloudflare Tunnel connector census. The standing regression guard for
  # ADR-114 I1 (one connector per tunnel).
  #
  # WHY THIS IS A SEPARATE JOB, AND WHY IT IS HERE:
  # The probe job above reads a tunnel-routed hostname from ONE vantage. Connector selection
  # is colo-STICKY, so that read cannot detect a second connector no matter how many times it
  # runs — on 2026-07-15, 10/10 identical EU reads "proved" inngest was down while a US runner
  # read it healthy. Both were true, about different hosts. This census asks Cloudflare's
  # control plane how many connectors are registered; the answer does not depend on who asks
  # or from where. It is the ONLY vantage-independent instrument, and it is the check that
  # would have caught #6425 on day one and every day after.
  #
  # It does NOT depend on `probe` — a wedged inngest must not blind the connector guard (and a
  # second connector is frequently the CAUSE of a probe failure, not a consequence).
  connector_census:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # doppler is NOT preinstalled on ubuntu-latest. Without this the census step's
      # `doppler secrets get` hits `command not found`, its `|| true` swallows it, the creds
      # read empty, and the census reports census_unavailable — green, silent, forever. The
      # census_unavailable-never-pages rule (correct on its own terms) is exactly what would
      # hide it. A detector that cannot fire is the failure this whole PR exists to close.
      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4
      - name: Census tunnel connectors (ADR-114 I1)
        id: census
        env:
          # prd_terraform holds CF_API_TOKEN (Tunnel scope) + CF_ACCOUNT_ID. Read via Doppler
          # rather than duplicating them into GH Actions secrets: two copies of a credential
          # drift, and `secrets.DOPPLER_TOKEN` is already the read-only token for this config.
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          source scripts/tunnel-connector-census.sh

          CF_API_TOKEN=$(doppler secrets get CF_API_TOKEN --project soleur --config prd_terraform --plain 2>/dev/null || true)
          CF_ACCOUNT_ID=$(doppler secrets get CF_ACCOUNT_ID --project soleur --config prd_terraform --plain 2>/dev/null || true)
          # GHA auto-masks `secrets.*` but NOT values fetched at runtime. Mask before first use
          # so the next diagnostic someone adds to this step cannot print the token.
          # (Precedent: apply-web-platform-infra.yml's mask-before-use.)
          [[ -n "$CF_API_TOKEN" ]] && echo "::add-mask::$CF_API_TOKEN"
          if [[ -z "$CF_API_TOKEN" || -z "$CF_ACCOUNT_ID" ]]; then
            # Unreadable creds are census_unavailable — NOT zero connectors. Fail soft.
            echo "verdict=census_unavailable" >> "$GITHUB_OUTPUT"
            echo "count=-1" >> "$GITHUB_OUTPUT"
            echo "detail=doppler read failed for CF_API_TOKEN/CF_ACCOUNT_ID" >> "$GITHUB_OUTPUT"
            echo "SOLEUR_ORIGIN_HOST_CHURN verdict=census_unavailable count=-1 reason=doppler_read_failed"
            exit 0
          fi

          TUNNEL_ID=$(curl -s --max-time 20 -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/cfd_tunnel?name=soleur-web-platform" \
            | jq -r '.result[0].id // empty' 2>/dev/null || true)
          if [[ -z "$TUNNEL_ID" ]]; then
            echo "verdict=census_unavailable" >> "$GITHUB_OUTPUT"
            echo "count=-1" >> "$GITHUB_OUTPUT"
            echo "detail=could not resolve tunnel id for soleur-web-platform" >> "$GITHUB_OUTPUT"
            echo "SOLEUR_ORIGIN_HOST_CHURN verdict=census_unavailable count=-1 reason=tunnel_id_unresolved"
            exit 0
          fi

          RESP=$(curl -s --max-time 20 -w '\n%{http_code}' -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/cfd_tunnel/$TUNNEL_ID/connections" || printf '\n000')
          CODE=$(printf '%s' "$RESP" | tail -1)
          BODY=$(printf '%s' "$RESP" | sed '$d')

          read -r VERDICT COUNT <<<"$(classify_connector_census "$CODE" "$BODY")"
          EVIDENCE=$(describe_connectors "$BODY")

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "detail=http=$CODE connectors=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "evidence<<CENSUS_EOF"
            echo "${EVIDENCE:-(no live connectors)}"
            echo "CENSUS_EOF"
          } >> "$GITHUB_OUTPUT"

          # Agent-facing breadcrumb, mirroring SOLEUR_INNGEST_LIVENESS_VERDICT / SOLEUR_ZOT_DISK.
          # This is a DIAGNOSTIC marker in the run log, NOT an alert route — a log marker nobody
          # greps is how the last 16h investigation started. The action-required issue below is
          # the alert.
          echo "SOLEUR_ORIGIN_HOST_CHURN verdict=$VERDICT count=$COUNT tunnel=${TUNNEL_ID:0:8}"
          # Guard on non-empty rather than filtering inside the loop. Under `set -euo pipefail`
          # a `while read` whose last body command is a false `[[ -n "$line" ]]` exits 1, so an
          # EMPTY $EVIDENCE failed this step — and $EVIDENCE is empty precisely and only on
          # zero_connectors. A plain-expression `if:` carries an implicit `success() &&`, so the
          # failing step skipped the paging step below: the one verdict meaning "deploy., ssh.
          # and registry. are ALL dark" would have filed nothing at all.
          if [[ -n "$EVIDENCE" ]]; then
            while IFS= read -r line; do
              [[ -n "$line" ]] && echo "SOLEUR_ORIGIN_HOST_CHURN connector $line"
            done <<< "$EVIDENCE"
          fi

      - name: File action-required on a broken connector invariant
        # ONLY the two REAL connector verdicts page. census_unavailable is deliberately excluded:
        # a token expiry or API blip must never page the operator against a healthy tunnel (the
        # #6374 relocated-false-positive class). It surfaces in the run log breadcrumb instead.
        if: steps.census.outputs.verdict == 'multi_connector' || steps.census.outputs.verdict == 'zero_connectors'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERDICT: ${{ steps.census.outputs.verdict }}
          COUNT: ${{ steps.census.outputs.count }}
          EVIDENCE: ${{ steps.census.outputs.evidence }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')
          BODY_FILE=$(mktemp)
          gh label create "ci/tunnel-connector-drift" --repo "$GH_REPO" \
            --description "Tunnel connector census != 1 — ingress origin is non-deterministic (ADR-114 I1)" \
            --color "B60205" 2>/dev/null || true

          if [[ "$VERDICT" == "multi_connector" ]]; then
            # No ${COUNT} in the title: it must be stable across a 2->3 transition, or the
            # dedupe re-collides and files a second issue for the same condition.
            ISSUE_TITLE="[ci/tunnel-connector-drift] Tunnel has MORE THAN ONE connector — ingress origin is non-deterministic"
            ISSUE_SEARCH="in:title \"$ISSUE_TITLE\""
            {
              printf '## More than one connector is registered on the tunnel\n\n'
              printf -- '- **Connectors:** `%s` (invariant: exactly 1)\n' "$COUNT"
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### What this means\n\nCloudflare binds ingress to a **tunnel**, then picks a connector **per edge colo**. With more than one connector, `localhost:` ingress no longer means "this host" — it means "whichever replica answered". Only `/hooks/deploy` fans out to peers, so everything else is now coin-flipped:\n\n- `/hooks/deploy-status` + `/hooks/inngest-liveness` read a **random host** (a freshly-recreated non-primary host has no `inngest-inventory.sh` at all → false `inngest_down` P1s)\n- `/hooks/infra-config` is a coin-flipped **WRITE**, self-verified against a separately coin-flipped read\n- `ssh.soleur.ai` lands the seccomp/apparmor SSH bridge on a **random host** — a sandbox-escape control update can silently land on the wrong host while CI reports green\n\nThis is the #6425 regression. Users are not directly affected (`app.soleur.ai` is a direct A record to web-1, never through the tunnel).\n\n'
              printf '### Live connectors\n\n```\n%s\n```\n\n' "$EVIDENCE"
              printf 'Colo geography attributes a connector to a host (`origin_ip` is null on this endpoint): `ams*`/`hel*` = hel1 = **web-1**, which since the #6538 retire is the ONLY web host. A connector in any other colo therefore attributes to NO fleet host — it is a stray `cloudflared` (leftover process, container, or off-fleet machine holding a valid tunnel token).\n\n'
              printf '### Remediation\n\n1. **Identify the extra connector** from the colo attribution and the `Live connectors` block above. web-1 is the only host `server.tf` grants a connector to (`web_tunnel_connector = each.key == "web-1"`, which gates the `cloudflared` install in `cloud-init.yml`), so every connector beyond the one hel1/ams connector is a stray.\n2. **Evict it, no-SSH first:** DELETE the stray client_id under `accounts/$CF_ACCOUNT_ID/cfd_tunnel/$TUNNEL_ID/connections` (the same endpoint this check reads), then rotate the tunnel token so the stray cannot re-register with the credential it holds. **There is NO recreate dispatch to fall back on** — `apply_target=web-2-recreate` and `warm-standby` were removed with the web-2 retire (#6575/#6538), and no automated path births or recreates a web host (that gap is #6730). Do not go looking for a dispatch that no longer exists.\n3. **If the predicate itself regressed** (i.e. `web_tunnel_connector` would evaluate true for a host that must not run `cloudflared`), fix `server.tf` and ship it on the normal merge path; the running host reconciles via the infra-config push. Recreating a host is NOT the remedy and is not available.\n4. Do **not** "fix" this by adding a per-hostname ingress rule — ADR-114 records that as a normative anti-pattern: a per-hostname rule does not pin a connector.\n5. Re-pooling a host is NOT a weight flip and is blocked on #6466 (host-addressability).\n\nRefs #6425 (the regression class this detects; the issue itself is closed), ADR-114 (I1/I2), ADR-068.\n'
            } > "$BODY_FILE"
          else
            ISSUE_TITLE="[ci/tunnel-connector-drift] Tunnel has ZERO live connectors — every tunnel-routed surface is dark"
            ISSUE_SEARCH="in:title \"$ISSUE_TITLE\""
            {
              printf '## The tunnel has no live connectors\n\n'
              printf -- '- **Connectors:** `0` (invariant: exactly 1)\n'
              printf -- '- **Detected at:** %s\n' "$NOW"
              printf -- '- **Run log:** %s\n\n' "$RUN_URL"
              printf '### What this means\n\nCloudflare answered and reported **no** live connectors — this is a well-formed census, not a failed read. Every tunnel-routed surface is dark: `deploy.soleur.ai` (the deploy pipeline), `ssh.soleur.ai` (the SSH bridge), `registry.soleur.ai`.\n\n**`app.soleur.ai` is unaffected** — it is a direct CF-proxied A record to web-1 and never traverses the tunnel. So users are still served; what is lost is the ability to deploy to and remediate the host serving them.\n\n'
              printf '### Remediation\n\n1. Check `cloudflared` on the designated ingress host (web-1). It is `restart-on-failure` under systemd, so a total absence points at the host, not the process.\n2. `app.soleur.ai` still resolves directly, so user-facing checks will look green — do not read that as "the tunnel is fine".\n3. Since #6425 only the designated ingress host runs a connector by construction, so there is no second connector to absorb this. That trade is deliberate and recorded in ADR-068: a silent-wrong-answer mode was traded for a loud-total-outage mode.\n\nRefs #6425, ADR-114 (I1), ADR-068.\n'
            } > "$BODY_FILE"
          fi

          # `action-required` is load-bearing, not decoration: operator-digest harvests ONLY
          # issues carrying it. The sibling ci/inngest-* labels this workflow files are NOT
          # harvested — so without this label the alert would be detected and then discarded
          # into a log nobody reads until the next 16h investigation.
          EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search "$ISSUE_SEARCH" --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" --repo "$GH_REPO" \
              --body "Still \`${VERDICT}\` (connectors=${COUNT}) at ${NOW}. Run: ${RUN_URL}"
          else
            gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" \
              --label "ci/tunnel-connector-drift" --label "action-required" --label "priority/p1-high" \
              --body-file "$BODY_FILE"
          fi

      - name: Auto-resolve the drift issue once the invariant is restored
        if: steps.census.outputs.verdict == 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # Self-closing, mirroring the sibling inngest-down issue's recovery comment. An
          # action-required issue that outlives its cause trains the operator to ignore the label.
          EXISTING=$(gh issue list --repo "$GH_REPO" --state open --search 'in:title "[ci/tunnel-connector-drift]"' \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            gh issue close "$EXISTING" --repo "$GH_REPO" \
              --comment "Connector invariant restored (census = 1) at $(date -u +'%Y-%m-%d %H:%M UTC'). Run: ${RUN_URL}"
          fi
