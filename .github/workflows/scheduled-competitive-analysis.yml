# Monthly competitive intelligence scan using the soleur:competitive-analysis skill.
# Produces a GitHub Issue with competitive landscape findings for tiers 0 and 3.
# Persists the report to knowledge-base/product/competitive-intelligence.md on main.
# First consumer of the soleur:schedule infrastructure (v3.5.0).
# To test manually: gh workflow run scheduled-competitive-analysis.yml

name: Competitive Analysis

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

concurrency:
  group: schedule-competitive-analysis
  cancel-in-progress: false

permissions:
  issues: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  competitive-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create scheduled-competitive-analysis \
            --description "Monthly competitive analysis report" \
            --color "0E8A16" 2>/dev/null || true

      - name: Run scheduled skill
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1.0.75
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-opus-4-6 --max-turns 45 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            Run /soleur:competitive-analysis --tiers 0,3 on this repository.
            After your analysis is complete, create a GitHub issue titled
            "[Scheduled] Competitive Analysis - <today's date in YYYY-MM-DD format>"
            with the label "scheduled-competitive-analysis" summarizing your findings.

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add knowledge-base/product/competitive-intelligence.md
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/competitive-analysis-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "docs: update competitive intelligence report [skip ci]"
            git push -u origin "$BRANCH"
            SHA=$(git rev-parse HEAD)
            bash scripts/post-bot-statuses.sh "$SHA"
            gh pr create \
              --title "docs: update competitive intelligence report $(date -u +%Y-%m-%d)" \
              --body "Automated commit from competitive analysis workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping failure notification"
            exit 0
          fi
          RUN_URL="${REPO_URL}/actions/runs/${RUN_ID}"
          MESSAGE=$(printf '**Competitive Analysis workflow failed**\n\nWorkflow run: %s\n\nCheck logs for details.' \
            "$RUN_URL")
          PAYLOAD=$(jq -n \
            --arg content "$MESSAGE" \
            --arg username "Sol" \
            --arg avatar_url "https://raw.githubusercontent.com/jikig-ai/soleur/main/plugins/soleur/docs/images/logo-mark-512.png" \
            '{content: $content, username: $username, avatar_url: $avatar_url, allowed_mentions: {parse: []}}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Discord failure notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Discord failure notification failed (HTTP $HTTP_CODE)"
          fi
