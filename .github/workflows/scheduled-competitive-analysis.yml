# Monthly competitive intelligence scan using the soleur:competitive-analysis skill.
# Produces a GitHub Issue with competitive landscape findings for tiers 0 and 3.
# Persists the report to knowledge-base/product/competitive-intelligence.md on main.
# First consumer of the soleur:schedule infrastructure (v3.5.0).
# To test manually: gh workflow run scheduled-competitive-analysis.yml

name: Competitive Analysis

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

concurrency:
  group: schedule-competitive-analysis
  cancel-in-progress: false

permissions:
  issues: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  competitive-analysis:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create scheduled-competitive-analysis \
            --description "Monthly competitive analysis report" \
            --color "0E8A16" 2>/dev/null || true

      - name: Run scheduled skill
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-opus-4-7 --max-turns 45 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            MILESTONE RULE: Every gh issue create command must include --milestone "Post-MVP / Later".

            Run /soleur:competitive-analysis --tiers 0,3 on this repository.
            After your analysis is complete, create a GitHub issue titled
            "[Scheduled] Competitive Analysis - <today's date in YYYY-MM-DD format>"
            with the label "scheduled-competitive-analysis" summarizing your findings.

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add knowledge-base/product/competitive-intelligence.md
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/competitive-analysis-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "docs: update competitive intelligence report"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "docs: update competitive intelligence report $(date -u +%Y-%m-%d)" \
              --body "Automated commit from competitive analysis workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Competitive Analysis workflow failed'
          body: '<p><strong>Competitive Analysis</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
