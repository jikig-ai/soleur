name: Test Anthropic Preflight (temporary)

# Temporary smoke test for .github/actions/anthropic-preflight/.
# Exercises both the OK path (real 1-token probe) and the cap-exhausted
# path (deterministic mock via ANTHROPIC_PREFLIGHT_MOCK_RESPONSE).
# Delete this file before merging PR #2717.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which branch to exercise: ok | cap-exhausted'
        required: true
        default: 'ok'
        type: choice
        options:
          - ok
          - cap-exhausted

permissions:
  contents: read

concurrency:
  group: test-anthropic-preflight
  cancel-in-progress: false

jobs:
  ok-path:
    if: ${{ inputs.scenario == 'ok' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: preflight
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Assert ok=true
        shell: bash
        env:
          OK: ${{ steps.preflight.outputs.ok }}
        run: |
          set -euo pipefail
          if [[ "$OK" != "true" ]]; then
            echo "::error::Expected ok=true, got: $OK"
            exit 1
          fi
          echo "T1 OK path: ok=true as expected"

  cap-exhausted-path:
    if: ${{ inputs.scenario == 'cap-exhausted' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ANTHROPIC_PREFLIGHT_MOCK_RESPONSE: '{"type":"error","error":{"type":"invalid_request_error","message":"You have reached your specified API usage limits"}}'
      ANTHROPIC_PREFLIGHT_MOCK_HTTP_CODE: '400'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: preflight
        uses: ./.github/actions/anthropic-preflight
        with:
          anthropic-api-key: 'mock-not-used'
      - name: Assert ok=false
        shell: bash
        env:
          OK: ${{ steps.preflight.outputs.ok }}
        run: |
          set -euo pipefail
          if [[ "$OK" != "false" ]]; then
            echo "::error::Expected ok=false, got: $OK"
            exit 1
          fi
          echo "T2 cap-exhausted path: ok=false as expected"
