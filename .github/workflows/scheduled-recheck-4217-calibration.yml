name: "Scheduled (once): Re-check #4217 template auth calibration (T+30d)"

on:
  schedule:
    - cron: '0 9 20 6 *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: schedule-once-recheck-4217-calibration
  cancel-in-progress: false

env:
  ISSUE_NUMBER: "4217"
  COMMENT_ID: "4508367295"
  FIRE_DATE: "2026-06-20"
  WORKFLOW_NAME: "scheduled-recheck-4217-calibration.yml"
  EXPECTED_AUTHOR: "deruelle"
  EXPECTED_CREATED_AT: "2026-05-21T12:43:50Z"

jobs:
  run-once:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: One-time fire (with self-neutralization)
        uses: anthropics/claude-code-action@20c8abf165d5f85ab3fc970db9498436377dc9d1 # v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: >-
            --max-turns 25
            --allowedTools Bash,Read,Write,Edit,Glob,Grep
          prompt: |
            ## Neutralization primitive

            To neutralize the workflow (prevent any future cron fires), do
            the following IN ORDER:

            1. Idempotency precheck. Read .github/workflows/$WORKFLOW_NAME.
               If the on: block has already had schedule: removed (or only
               contains workflow_dispatch:), the workflow is already
               neutralized — skip to step 6 (success, no-op).
            2. Edit YAML. Use the Read+Edit tools (NOT shell sed/awk) to
               remove the schedule: key and its child list under on:. Leave
               other triggers intact. If schedule: is the ONLY trigger,
               replace the entire on: block with on:\n  workflow_dispatch:.
            3. Stage and guard against no-op commit.
               git add .github/workflows/$WORKFLOW_NAME then git diff
               --cached --quiet. If the diff is empty, skip to step 6.
            4. Configure git identity, then commit:
               git config user.name "github-actions[bot]"
               git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
               git commit -m "chore(schedule): neutralize one-time workflow $WORKFLOW_NAME"
            5. Push — direct first, PR fallback.
               5a. Try direct push to default branch. If exit 0, done.
               5b. If direct push fails, check for existing neutralization PR
                   via gh pr list --search "head:chore/neutralize-$WORKFLOW_NAME"
                   --state open. If one exists, skip to step 6. Otherwise
                   create an ephemeral branch
                   chore/neutralize-$WORKFLOW_NAME-$(date -u +%Y%m%d%H%M%S),
                   push it, then gh pr create with --base default-branch
                   --head $BRANCH and squash-merge via the merge-main lock:
                   bash .claude/hooks/lib/session-state.sh with_lock merge-main 600 -- gh pr merge --squash --auto "$PR_URL"
            6. Success.
            7. Both legs failed: post fallback comment to issue
               #$ISSUE_NUMBER instructing manual edit.

            ## Pre-flight (abort if any check fails)

            1. Date guard (D3): assert FIRE_DATE matches today (UTC).
               [[ "$FIRE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || abort.
               [[ "$(date -u +%F)" == "$FIRE_DATE" ]] or invoke neutralization.
            2. Idempotency: if workflow on: block no longer contains
               schedule:, exit 0.
            3. Repo not archived.
            4. Issue OPEN + same repo.
            5. Comment exists + matches issue.
            6. Comment-author pin (D5a): author equals $EXPECTED_AUTHOR.
            7. Comment-immutability pin (D5b): created_at equals
               $EXPECTED_CREATED_AT AND created_at equals updated_at.

            If ANY pre-flight check fails, post observation comment naming
            the failed check, invoke neutralization, exit 0.

            ## Task

            Fetch the task spec from the referenced comment, then
            re-evaluate the re-eval criteria on issue #4217:

            1. PR-I (#4078) merged — already true.
            2. >=1 founder has executed >=10 draft_one_click sends under
               PR-I bounds.
            3. Quota-exhaustion or expiration triggers have fired.
            4. Article 7(3) defensibility re-confirmed by the
               legal-compliance-auditor agent against calibrated values.

            Investigation steps:
            - Query Supabase production via the supabase MCP server (or the
              read-only role) for: count of template_authorizations rows
              with revoked_at IS NULL; count of messaging_audit (or
              equivalent send-log) rows with provenance draft_one_click
              grouped by founder; count of rows with revocation_reason in
              ('expired','quota_exhausted').
            - If founder-send count >=10 for at least one founder AND any
              quota/expiration trigger has fired, criteria 2 and 3 hold.
            - If criteria 2+3 hold, post a comment on #4217 linking the
              cohort data and stating "criteria met; ready to brainstorm
              calibration values". Recommend the operator run
              /soleur:brainstorm #4217.
            - If criteria 2+3 do NOT hold, post a follow-up comment with
              the cohort numbers and re-schedule via /soleur:schedule with
              a new --comment ID pointing to that new comment.

            Post results as a follow-up comment on issue #$ISSUE_NUMBER.

            ## Final step (mandatory, last)

            Invoke the Neutralization primitive above (D4). The post-step
            below this action then verifies neutralization on the default
            branch.

      - name: Post-fire verification
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          STILL_HAS_SCHEDULE=99
          HAS_DISPATCH=0
          for attempt in 1 2 3; do
            CONTENT=$(gh api "repos/$REPO/contents/.github/workflows/$WORKFLOW_NAME" --jq .content 2>/dev/null | base64 -d || true)
            STILL_HAS_SCHEDULE=$(printf '%s' "$CONTENT" | grep -cE '^[[:space:]]*schedule:' || true)
            HAS_DISPATCH=$(printf '%s' "$CONTENT" | grep -cE '^[[:space:]]*workflow_dispatch:' || true)
            if [[ "$STILL_HAS_SCHEDULE" == "0" && "$HAS_DISPATCH" -ge "1" ]]; then
              echo "::notice::Post-fire verification passed (attempt $attempt)."
              exit 0
            fi
            echo "Attempt $attempt: schedule=$STILL_HAS_SCHEDULE dispatch=$HAS_DISPATCH — retrying after replication lag."
            sleep 10
          done
          echo "::error::Post-fire verification failed: schedule=$STILL_HAS_SCHEDULE dispatch=$HAS_DISPATCH"
          exit 1
