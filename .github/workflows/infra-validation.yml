# Security: DOPPLER_TOKEN from repository secrets injects Terraform credentials
# for the plan job. All Doppler secrets are scoped to prd_terraform config.
# Plan output is posted as a PR comment -- sensitive variables are marked
# sensitive = true in variables.tf and redacted by Terraform.
# Fork PRs cannot access secrets -- plan job gracefully skips.
# Offline jobs (validate, deploy-script-tests) require no secrets.
# Inputs: only paths from the PR diff (not user-controlled content).
# All action references are SHA-pinned.
name: Infra Validation

on:
  pull_request:
    paths:
      - "apps/*/infra/**"
      - "infra/**"
      - ".github/workflows/infra-validation.yml"
      # (#6454) The render-then-validate gate and its fixture suite. Without these,
      # editing the validator would not run the validator's own tests — the job that
      # proves the gate works would be skipped by the very PR changing the gate.
      - ".github/scripts/validate-infra-templates.sh"
      - ".github/scripts/test/fixtures-validate-infra-templates.sh"
      # ci-deploy.test.sh cross-file drift guard (#5145) reads the restart
      # workflow's poll budget; without this path the guard never fires on
      # client-side edits (deploy-script-tests job is ungated).
      - ".github/workflows/restart-inngest-server.yml"
      # apply-inngest-rls-dev-workflow.test.sh asserts the PAIR of RLS apply
      # workflows (path routing, project pinning, issue/concurrency identity).
      # Without these paths, an edit to either workflow — including re-widening
      # the prd `paths:` glob that used to auto-apply 0001 to Inngest prd — would
      # never run the guard that catches it.
      - ".github/workflows/apply-inngest-rls.yml"
      - ".github/workflows/apply-inngest-rls-dev.yml"
      # (#3366) supabase-advisor/scan-workflow.test.sh reads all of these. The
      # guard's whole job is to catch a gate that looks present but does nothing
      # — so a guard that cannot fire when its own subjects are edited would be
      # that same defect. cron-monitors.tf is already covered by apps/*/infra/**;
      # these five are not. apply-sentry-infra.yml is here because its plan gate
      # and destroy gate are what make an infra/sentry/** change safe: since
      # #6589 it plans the FULL ROOT (declared ≡ applied — the per-resource
      # `-target=` list that could leave a monitor declared-but-never-applied is
      # gone), so the risk moved from a dropped allow-list line to a weakened
      # gate. Editing that workflow must still be able to trip this guard.
      - ".github/workflows/scheduled-supabase-advisor-scan.yml"
      - ".github/workflows/apply-sentry-infra.yml"
      - "scripts/supabase-advisor-scan.sh"
      - "apps/web-platform/server/inngest/functions/cron-supabase-advisor-scan.ts"
      - "knowledge-base/engineering/architecture/diagrams/model.c4"
  workflow_dispatch:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.10.5"

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      directories: ${{ steps.dirs.outputs.directories }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Find changed infra directories
        id: dirs
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Two infra-root families covered:
          #   - apps/*/infra/...      (per-app roots: web-platform, cla-evidence, ...)
          #   - infra/<name>/...      (repo-level roots: infra/github/, ...)
          #
          # The PR-diff branch filters via `grep -E` rather than git pathspec:
          # git pathspec `*` does NOT cross `/` in default semantics, so
          # `'apps/*/infra/'` silently returned empty and the matrix fanned
          # out to zero jobs (matrix-zero is a skipped-not-failed outcome).
          # The brace group `{ grep -E ... || true; }` neutralizes grep's
          # exit-1 on zero-match BEFORE it can poison the pipeline status
          # under any future `set -o pipefail`. Downstream `sort -u | jq`
          # collapses empty input to `[]`. Mirror unit test:
          # plugins/soleur/test/infra-validation-detect.test.sh. See #4012.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            DIRS=$( { find apps/*/infra -maxdepth 0 -type d 2>/dev/null ; \
                       find infra/* -maxdepth 0 -type d 2>/dev/null ; } \
                    | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            DIRS=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
              | { grep -E '^(apps/[^/]+/infra|infra/[^/]+)/' || true; } \
              | sed -E 's|^(apps/[^/]+/infra)/.*|\1|; s|^(infra/[^/]+)/.*|\1|' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          printf 'directories=%s\n' "$DIRS" >> "$GITHUB_OUTPUT"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.directories != '[]'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        directory: ${{ fromJSON(needs.detect-changes.outputs.directories) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate cloud-init schema
        run: |
          if [[ -f cloud-init.yml ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq cloud-init 2>&1 | tail -1
            # cloud-init.yml is a Terraform templatefile(), so it is NOT a YAML document until
            # rendered: a col-0 `%{ if ... ~}` directive is a YAML *directive indicator*, and the
            # parser aborts on it ("while scanning a directive") before reading a single key.
            # This step has therefore been validating nothing since the first col-0 directive
            # landed (#6344, 2026-07-11) — it just had not re-run on main to show it. #6425's
            # second directive pair surfaced it by moving the first error from :665 to :592.
            #
            # Strip the directive lines and validate the remainder. The `${...}` interpolations
            # survive: they sit inside scalars, so they parse fine un-rendered. This checks the
            # schema of everything that ISN'T the gate. Anchored ^%\{ so an indented (broken)
            # directive is NOT stripped — it stays visible to this parser rather than being
            # hidden by its own guard.
            #
            # KEPT DELIBERATELY (#6454, operator call — it was also an operator call in #6456
            # that this step stays). `Validate infra templates` below now renders every
            # templatefile and schema-checks the RENDERED document, which supersedes this
            # check on every axis: five templates to this step's one, rendered vs raw, and it
            # renders BOTH arms of the `%{ if }` gate, whereas a directive-strip produces a
            # document that is neither arm — both bodies concatenated, which ships to no host.
            #
            # What this step is, precisely: a REDUNDANT SECOND OPINION on cloud-init.yml via a
            # different implementation. Its value is bounded and worth stating honestly,
            # because the obvious justification for it is WRONG: it does NOT backstop the
            # script reporting a false-green `0/0`. The script's discovery set B globs
            # `cloud-init*.yml`, which strictly subsumes this step's `[[ -f cloud-init.yml ]]`
            # — so whenever this step does any work, discovery has already found >=1 and `0/0`
            # is unreachable. The two predicates fire on identical conditions. What it DOES
            # cover is a bug in the script's clever middle: a wrong derived var map, an
            # attribution picking the wrong call site, or a decode handing back raw text. Ten
            # cheap seconds against that, in a job where cloud-init and terraform are
            # installed anyway.
            #
            # Known fragility, priced in: if a future `%{ else }` arm ever repeats a key from
            # its `if` arm, the strip merges both and YAML reds on DUPLICATE KEYS — a false red
            # on a correct template, which is #6454's own dynamic. If that fires, DELETE this
            # step rather than patching the grep; the render check below already covers it, and
            # a second opinion is not worth reintroducing the bug this PR exists to end.
            grep -vE '^%\{' cloud-init.yml > /tmp/cloud-init.stripped.yml
            cloud-init schema -c /tmp/cloud-init.stripped.yml
          else
            echo "No cloud-init.yml found, skipping"
          fi
        working-directory: ${{ matrix.directory }}

      # terraform_wrapper: false is load-bearing here, not hygiene: the wrapper
      # wraps stdout, and `Validate infra templates` below decodes
      # `terraform console` output byte-for-byte. deploy-script-tests sets it for
      # exactly this reason (see the `deploy-script-tests` job's setup-terraform step;
      # deliberately cited by job name, not line number — this PR's own +lines shifted
      # that comment and a bare line reference is self-invalidating).
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      # #6454. The `Validate cloud-init schema` step above ran `cloud-init schema` against
      # the RAW Terraform templatefile until #6456 taught it to strip directives, so it was
      # red on EVERY PR touching apps/*/infra/** from #6344 — and, being pull_request-only,
      # invisible on main. Stripping un-reds it, but it still validates ONE file (`if [[ -f
      # cloud-init.yml ]]`), leaving two more cloud-inits and hooks.json.tmpl unvalidated,
      # and it validates un-RENDERED text, which cannot see `permissions: 384` (valid YAML,
      # schema-invalid) or the `~}` whitespace trim.
      #
      # This step closes that: the script renders each templatefile via `terraform console`
      # and validates the RENDERED document — what work/SKILL.md §6.1 has prescribed all
      # along. It must run AFTER setup-terraform (it needs terraform on PATH). No
      # continue-on-error: that yields conclusion=success over outcome=failure, which is how
      # a gate goes quiet. The two checks are kept side by side deliberately; the rationale
      # and the exit condition for dropping the older one are recorded on it above.
      #
      # MATRIX_DIR goes through `env:`, never `${{ }}` inside `run:`. The matrix
      # values are path prefixes derived from the PR diff, and detect-changes'
      # sed only collapses them to `apps/<name>/infra` where <name> is [^/]+ —
      # so a fork PR adding `apps/evil;id/infra/x.tf` would carry shell
      # metacharacters straight into this shell. The stripped step above uses
      # `working-directory:` (not a shell context) and has no such surface.
      - name: Validate infra templates (render-then-validate)
        env:
          MATRIX_DIR: ${{ matrix.directory }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloud-init 2>&1 | tail -1
          bash "$GITHUB_WORKSPACE/.github/scripts/validate-infra-templates.sh" "$MATRIX_DIR"

      - name: Terraform format check
        run: terraform fmt -check -recursive .
        working-directory: ${{ matrix.directory }}

      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: ${{ matrix.directory }}

      # Any infra root that ships tests/*.tftest.hcl gets `terraform test` run
      # after validate. Used by apps/web-platform/infra for the credential-free
      # var.web_hosts EU-residency negative tests (CLO T-1) via mock_provider —
      # variable validation is proven WITHOUT a Hetzner token or the R2 backend.
      - name: Terraform test (if tests/ present)
        run: |
          if compgen -G "tests/*.tftest.hcl" > /dev/null; then
            echo "→ terraform test"
            terraform test
          else
            echo "No tests/*.tftest.hcl in this directory; skipping."
          fi
        working-directory: ${{ matrix.directory }}

      # Optional per-app lint hook: any infra root that ships a `main.test.sh`
      # gets it executed after fmt/validate. Used by apps/cla-evidence/infra
      # to assert content invariants (Governance mode, 3650-day retention,
      # prevent_destroy, no IP-allowlist) that fmt/validate alone can't see.
      - name: Run per-app main.test.sh (if present)
        run: |
          if [[ -f main.test.sh ]]; then
            echo "→ bash main.test.sh"
            bash main.test.sh
          else
            echo "No main.test.sh in this directory; skipping."
          fi
        working-directory: ${{ matrix.directory }}

  # #6454. `validate` is a MATRIX job, so its check names are dynamic
  # (`validate (apps/web-platform/infra)`) and cannot be pinned as required
  # contexts in infra/github/ruleset-ci-required.tf — which is precisely why it
  # survived being red from #6344 onward with nobody blocked.
  #
  # This is the static-named gate a matrix job cannot be, and the second clause is
  # the anti-silent-skip guard at JOB level: infra changed but validate did not
  # succeed (skipped/cancelled/failure) -> red.
  #
  # DO NOT make this a required context yet — it would deadlock every non-infra PR.
  # `if: always()` is a JOB-level condition: it only guarantees the job runs once the
  # WORKFLOW runs. This workflow still carries a top-level `paths:` filter (see `on:`),
  # so a PR touching no infra never triggers it, no context is ever posted, and a
  # required check sits at "Expected — Waiting for status" forever. This workflow also
  # has no `merge_group:` trigger, so the context would never post on the queue's temp
  # ref either.
  #
  # `tenant-integration-required` (ruleset-ci-required.tf) is the precedent to COPY,
  # and it is the counter-example to the shortcut: that workflow DROPPED its
  # workflow-level `paths:` filter and moved path detection into its `detect-changes`
  # job precisely so the always-run gate reports on every PR. Making this required is
  # therefore NOT a one-line ruleset edit — the prerequisites are: drop `paths:` here
  # (keep the heavy matrix gated on `detect-changes`), add `merge_group:`, register the
  # context in ruleset-ci-required.tf AND scripts/required-checks.txt (bot PRs block
  # otherwise). And `deploy-script-tests` + `check-secrets` currently have NO
  # `needs:`/`if:`, so dropping `paths:` without gating them on `detect-changes` puts
  # an 8-minute docker build on every docs-only PR. Tracked in #6480.
  infra-validate-required:
    name: infra-validate-required
    needs: [detect-changes, validate]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Fail closed if validate did not succeed when it should have
        env:
          DIRS: ${{ needs.detect-changes.outputs.directories }}
          RESULT: ${{ needs.validate.result }}
        run: |
          if [[ "$DIRS" == "[]" ]]; then
            echo "No infra directories changed; nothing to validate."
            exit 0
          fi
          if [[ "$RESULT" != "success" ]]; then
            echo "validate did not succeed (result=$RESULT) while infra changed: $DIRS"
            exit 1
          fi
          echo "validate succeeded for: $DIRS"

  deploy-script-tests:
    runs-on: ubuntu-24.04
    # 12 (was 8, was 5): the #5875 sandbox-canary regression below builds a small
    # alpine+bubblewrap image and runs two docker bwrap probes on top of the existing
    # bash suite. Self-validating (SKIPs if the runner cannot do bwrap userns).
    # 8→12 (#6649): the `ci-deploy.sh tests` step alone now measures ~407s (real
    # sleeps for the #6525 transient-retry backoff + lease/lock/drain timing + the
    # #6475 soak path), consuming the whole 8-min budget with near-zero effective
    # slack — so the job flakily times out mid-suite on a slightly-slow runner (the
    # `~12s of slack` note below is now within runner variance of zero). Bumping to
    # 12 restores real headroom for every infra PR, not just this one. Root-cause
    # fix (broaden the MOCK_SLEEP_NOOP gate so those tests stop paying real
    # wall-clock where timing fidelity is not asserted) is tracked as a follow-up.
    timeout-minutes: 12
    steps:
      # fetch-depth: 0 + fetch-tags: true make the vinngest-v* tags reachable so
      # the cloud-init-inngest-bootstrap drift-guard (AC6, #4675) can compare the
      # pin against the latest published tag. Without tags the guard self-skips
      # (visible SKIP, never false-green). detect-changes already uses
      # fetch-depth: 0 as precedent.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true

      # #6178: the cloud-init-inngest-bootstrap drift-guard (below) includes an AC7
      # terraform-render leg — the behavioral authority for the web_colocate_inngest gate
      # (only a real `terraform templatefile` render exercises the load-bearing `~}`
      # whitespace-strip). Without terraform on PATH the leg SKIPs; this step makes it
      # execute (a broken gate then reds this job's log). NOTE: deploy-script-tests is an
      # advisory job (not in ruleset-ci-required.tf) — this is a visible-red signal, not a
      # merge-blocking gate. terraform_wrapper: false keeps `terraform console` stdout
      # byte-clean so the render leg's heredoc-strip (render_yaml_ok, which depends on the
      # last output line being exactly `EOT`) is not corrupted by the default log wrapper.
      # terraform_version pinned (#6454): this step was unpinned and floated to latest
      # while every other setup-terraform here pins env.TERRAFORM_VERSION. The template
      # fixtures below assert on `terraform console`'s encoding behaviour, so a silent
      # major bump would red them for a non-reason.
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      # cloud-init here serves TWO consumers in this job, both of which SKIP or fail
      # rather than false-green without it:
      #
      #  1. (#6446) the render leg in cloud-init-inngest-bootstrap.test.sh runs `cloud-init
      #     schema` on the RENDERED document. Without the binary the leg SKIPs visibly
      #     rather than false-greening; this step makes it execute.
      #  2. (#6454) the validate-infra-templates.sh fixture suite below.
      #
      # Neither replaces the `validate` job's raw-source `Validate cloud-init schema` step —
      # that step is KEPT and directive-stripped (cited by step name, not line number: this
      # PR's own +lines shift it, and a bare line reference is self-invalidating). An earlier
      # draft of #6446 deleted it; #6426 landed a different fix on main mid-pipeline (keep
      # the step, strip the col-0 `%{` lines, schema-check the remainder) and both were
      # kept, an operator call — re-affirmed when #6454 landed the render-then-validate
      # gate. The reasoning and the exit condition for dropping the stripped step live on
      # the step itself.
      - name: Install cloud-init (render-leg schema check + infra-template fixtures)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloud-init 2>&1 | tail -1
          cloud-init --version

      # #6454. Fixture suite for .github/scripts/validate-infra-templates.sh. It lives
      # HERE, not in `guard-script-fixture-tests` (which auto-globs
      # .github/scripts/test/test-*.sh), because it needs terraform + cloud-init and that
      # job is a bare-bash runner that is REQUIRED, merge_group-triggered and path-filter-
      # free. Adding apt there would put a package-mirror dependency on the merge-queue
      # critical path for every PR in the repo, docs-only included — a worse failure mode
      # than the bug being fixed. Hence the file is named `fixtures-*` to stay out of that
      # glob; see the contract note in .github/scripts/test/run-all.sh.
      #
      # Trade-off recorded honestly: deploy-script-tests is ADVISORY, so this suite does
      # not block merge today. Gate CORRECTNESS being advisory is the same property that
      # let #6454 live for four days — tracked by the follow-up that makes
      # infra-validate-required a real required context (#6480).
      - name: Fixture tests for validate-infra-templates.sh (#6454)
        run: bash .github/scripts/test/fixtures-validate-infra-templates.sh

      - name: Run ci-deploy.sh tests
        run: bash apps/web-platform/infra/ci-deploy.test.sh

      - name: Run cosign trusted-root staleness + integrity gate (#6005)
        run: bash apps/web-platform/infra/cosign-trusted-root-staleness.test.sh

      - name: Run inngest config-refresh bundle packager guard (#6780 ADR-135 HARD-2 + fail-closed)
        run: bash apps/web-platform/infra/inngest-config-bundle-pack.test.sh

      - name: Run inngest config-refresh drift comparator guard (#6780 ADR-135 HARD-8 + channel-live)
        run: bash apps/web-platform/infra/inngest-config-drift-compare.test.sh

      - name: Run cloud-init GHCR seed-login regression guard (#6005 private-pull fix)
        run: bash apps/web-platform/infra/cloud-init-ghcr-seed-login.test.sh

      - name: Run fresh-boot observability probe guard (#6090 baked-DSN + readiness gates + H3)
        run: bash apps/web-platform/infra/soleur-host-bootstrap-observability.test.sh

      # LOAD-BEARING registration (this job lists each infra test explicitly — no glob, so an
      # unregistered suite is ZERO coverage, silently and greenly). This suite is hybrid: static
      # drift-guards over the authored marker + a BEHAVIORAL extraction that runs the baked
      # soleur-fresh-boot-ready helper against stubbed commands + path seams, asserting the
      # ready=/reason= decision per unmet field (the fixture-cardinality rule, not string-matching).
      - name: Run fresh-boot readiness marker guard (#6459/#6538 SOLEUR_FRESH_BOOT_READY dark-host)
        run: bash apps/web-platform/infra/fresh-boot-ready.test.sh

      # LOAD-BEARING registration (explicit list, no glob). Byte-identity + wiring guard for the
      # Phase-2.2 fresh-boot parity bakes (orphan-reaper + bwrap-userns sysctl). Pins the baked unit
      # bodies to their retained SSH-heredoc twins so the two delivery paths cannot silently drift.
      - name: Run fresh-boot parity guard (#6459 Phase 2.2 baked==SSH-heredoc + wiring)
        run: bash apps/web-platform/infra/fresh-boot-parity.test.sh

      # LOAD-BEARING registration (explicit, no glob — an unregistered suite is silent ZERO
      # coverage; this is exactly the "gate that looks present but does nothing" class #6575
      # deleted). Rebuilt ADR-068 §(c) / ADR-142 D3 anti-pooling gate: fail-closed serving-weight
      # top-guard (web-2 weight==0 standby PASSES; weight>0 pre-flip with unmet flip-shape FAILS,
      # AC7) + the WORKSPACES_LUKS precondition (coupling #2 — a plaintext web-2 cannot be pooled)
      # + Condition C static committed-HCL assertions (dns.tf web-1-only, connector excludes web-2,
      # no LB pools web-2). Guards the "workspace-gone" single-user incident (#6459/#6575).
      - name: Run anti-pooling LB-weight gate guard (#6575 rebuild / ADR-142 D3 — web-2 not pooled pre-flip)
        run: bash apps/web-platform/infra/lb-weight-gate.test.sh

      # LOAD-BEARING registration (this job lists each infra test explicitly — no glob, so an
      # unregistered suite is ZERO coverage, silently and greenly). This suite is behavioural,
      # not grep-only: it extracts the baked soleur-wait-nic helper and EXECUTES it against a
      # stub `ip`, which is the only way the fail-open contract (always exit 0 — CF-5) and the
      # probe-fault-is-not-absence arm (#6415) are actually asserted rather than string-matched.
      - name: Run first-boot NIC-wait gate guard (#6441 ADR-114 I1 defer-not-abort + 3 arms)
        run: bash apps/web-platform/infra/nic-wait-gate.test.sh

      - name: Run /workspaces LUKS drift observability guard (#6604 emit tags/DSN + daily probe + gate)
        run: bash apps/web-platform/infra/luks-monitor.test.sh

      - name: Run /workspaces LUKS C1 verify diagnosability guard (#6604 separate stdout/stderr + emit path before rm/die)
        run: bash apps/web-platform/infra/workspaces-luks-verify.test.sh

      # MECHANISM + STRUCTURE harness for #6733. The G4 quiescence probe used to create+unlink an
      # entry INSIDE $MOUNT between the pass-2 delta rsync and C1, advancing the transfer root's
      # mtime, so the itemized verify emitted `.d..t...... ./` and five real cutovers safe-aborted
      # on a byte-identical tree. Keeps the RED reproduction (so the mechanism stays measured, not
      # remembered), then pins the SHIPPED shape: the probe is a READ-open of $MOUNT/workspaces
      # (`exec 9<`), the holder filter subtracts by PID rather than by path (which is what makes
      # reusing a real path safe), the lsof child cannot inherit fd 9, and the bracket-era repair
      # helpers are gone from the file. Also pins that C1 itself is never narrowed to paper over it.
      # Skips cleanly on non-GNU coreutils / an ACL-less filesystem rather than false-greening.
      - name: Run /workspaces LUKS C1 root-mtime mechanism + read-probe structure (#6733)
        run: bash apps/web-platform/infra/workspaces-luks-verify-root-mtime.test.sh

      # The #6733 MUTATION BATTERY. Distinct from the reproduction harness above, and registered
      # separately BECAUSE registration here is the only coverage this directory gets (no glob):
      # the harness above proves the MECHANISM with filesystem physics, this suite mutates the SUT
      # (it copies workspaces-cutover.sh into scratch, edits it against a pristine backup, and runs
      # the REAL assert_mount_quiesced out of the mutated copy) and mutates the DESTINATION tree to
      # prove C1 still rejects every difference it rejected before the fix.
      #
      # Covers: m1-m12 + a newline-bearing hostile filename (C1 non-regression, every icode MEASURED
      # by running rsync — none predicted); m13/m14 the non-vacuity pair, one character apart (the
      # shipped `exec 9<` vs a reverted `exec 9>`), run at BOTH call-site phases (`pre-verify` AND
      # `freeze` — the freeze phase was structurally uncovered before this change); m15 an absent
      # workspaces/ fails closed (the wrong-device / empty-bind-source state in which every
      # downstream gate compares empty against empty and reports green); m16 our own fd and any
      # inheriting child are NOT counted as stragglers WHILE a genuine straggler still IS (the pair
      # that pins the PID filter's operator); m18 a post-probe foreign write still aborts C1;
      # m19 lsof header/format drift fails closed; m20 a read-only mount fails closed while
      # `errors=remount-ro` does NOT (the substring trap); m21 lsof-unavailable refuses; m22 the
      # positive control still requires BOTH our PID and the probed path.
      # m17 is deliberately NOT asserted — it is FALSIFIED and re-measured as such on every run.
      #
      # Every mutation carries a landing assertion against a pristine backup measured with an
      # instrument INDEPENDENT of rsync; a mutation that did not land reports UN-RUN and reds the
      # job rather than passing. Skips cleanly (exit 0) when nanosecond mtime fidelity or ACL/xattr
      # support is absent, rather than false-greening on a host that cannot observe the defect.
      - name: Run /workspaces LUKS G4 mutation battery (#6733 C1 non-regression + read-probe mutations)
        run: bash apps/web-platform/infra/workspaces-luks-g4-mutation.test.sh

      # LOAD-BEARING registration: this job lists each infra test explicitly (no glob), so an
      # unregistered suite is ZERO coverage, silently and greenly.
      - name: Run /workspaces LUKS freeze-quiesce guard (#6588 redis in quiesce set + fail-closed G4 + /health canary)
        run: bash apps/web-platform/infra/workspaces-luks-freeze.test.sh

      # Shares workspaces-luks-harness.sh with the freeze suite above. Registered EXPLICITLY for the
      # same reason as every line in this job: an unregistered suite is zero coverage, silently green.
      - name: Run /workspaces LUKS staging-target guard (#6588 mkfs-if-empty + fail-closed staging mount + capacity gate)
        run: bash apps/web-platform/infra/workspaces-luks-staging.test.sh

      # Guards the cutover WORKFLOW rather than the script: the `environment:` gate expression
      # (exact-string, because operand inversion silently ungates a destructive arm) and the
      # pre-gate mode validation, which it asserts by EXECUTING the workflow's own extracted `run:`
      # body against every input combination. Registered explicitly for the same reason as every
      # line in this job: an unregistered suite is zero coverage, silently green.
      - name: Run /workspaces LUKS cutover WORKFLOW gate (#6588 mode gating + CLEAN_STRAY reachability)
        run: bash apps/web-platform/infra/workspaces-luks-cutover-workflow.test.sh

      # REGISTRATION IS NOT ENVIRONMENT. The loopback suite below is the only workspaces-luks test
      # that touches a REAL block device (losetup + real cryptsetup luksFormat/luksOpen + real
      # mkfs.ext4 + real mount), so it must land in a job that can actually do that:
      #   - deploy-script-tests runs on `runs-on: ubuntu-24.04`, a GH-hosted VM — NOT a job
      #     container — so /dev/loop-control, dm-crypt and privileged mounts are available.
      #   - GH-hosted runners have passwordless sudo; the suite self-elevates, and is invoked
      #     under sudo here anyway so the privilege requirement is explicit at the call site.
      #   - losetup/mount/findmnt/blkid/mkfs.ext4 ship with the image; `cryptsetup` does not, so
      #     it is installed below rather than assumed. Installing it is what makes the
      #     registration real: without it the suite exits non-zero with LOOPBACK_UNAVAILABLE.
      # The suite NEVER self-skips — if the device layer is unusable it fails LOUDLY with the
      # literal token LOOPBACK_UNAVAILABLE, because a silent skip is the exact fail-open class
      # #6588 exists to remove (the 2026-07-19 cutover rsynced onto the root disk and every
      # string-only gate certified it green).
      - name: Run /workspaces LUKS staging-target loopback evidence (#6588 real mkfs + fail-closed mount + source-is-mapper)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cryptsetup-bin
          sudo bash apps/web-platform/infra/workspaces-luks-loopback.test.sh

      # #6511: `connect_timeout = 5` was a bare number where the pinned v4 provider's schema says
      # `string`. It coerced to "5", failed Cloudflare's duration parse, landed as "0s", and the
      # #6357 fail-fast mitigation on the registry origin was inert for weeks while every apply
      # re-planned it. This job lists its tests explicitly (no glob), so an unregistered test file
      # ships as zero coverage — the trap tests/scripts/test-stock-preflight-gate.sh documents.
      - name: Run tunnel origin_request schema-type guard (#6511 connect_timeout string vs int)
        run: bash apps/web-platform/infra/tunnel-origin-request-types.test.sh

      - name: Run tunnel origin-relative ingress guard (#6594 ADR-114 I2 coin-flipped management plane)
        run: bash apps/web-platform/infra/tunnel-origin-relative-ingress.test.sh

      - name: Run tunnel-ingress verify infra-dir resolution guard (#6595 relative-INFRA_DIR cd)
        run: bash apps/web-platform/infra/verify-tunnel-ingress-origin-infradir.test.sh

      - name: Run infra-config apply gate adjudicator guard (#6594 content assert vs stale-same-count)
        run: bash apps/web-platform/infra/infra-config-gate.test.sh

      - name: Run ci-deploy-wrapper.sh tests
        run: bash apps/web-platform/infra/ci-deploy-wrapper.test.sh

      - name: Run canary-bundle-claim-check.sh tests
        run: bash apps/web-platform/infra/canary-bundle-claim-check.test.sh

      - name: Run infra-config-apply.sh tests
        run: bash apps/web-platform/infra/infra-config-apply.test.sh

      - name: Run infra-config-install.sh helper tests
        run: bash apps/web-platform/infra/infra-config-install.test.sh

      - name: Run infra-config-handler-bootstrap drift-guard
        run: bash apps/web-platform/infra/infra-config-handler-bootstrap.test.sh

