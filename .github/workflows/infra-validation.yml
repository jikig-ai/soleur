# Security: DOPPLER_TOKEN from repository secrets injects Terraform credentials
# for the plan job. All Doppler secrets are scoped to prd_terraform config.
# Plan output is posted as a PR comment -- sensitive variables are marked
# sensitive = true in variables.tf and redacted by Terraform.
# Fork PRs cannot access secrets -- plan job gracefully skips.
# Offline jobs (validate, deploy-script-tests) require no secrets.
# Inputs: only paths from the PR diff (not user-controlled content).
# All action references are SHA-pinned.
name: Infra Validation

on:
  pull_request:
    paths:
      - "apps/*/infra/**"
      - "infra/**"
      - ".github/workflows/infra-validation.yml"
      # ci-deploy.test.sh cross-file drift guard (#5145) reads the restart
      # workflow's poll budget; without this path the guard never fires on
      # client-side edits (deploy-script-tests job is ungated).
      - ".github/workflows/restart-inngest-server.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.10.5"

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      directories: ${{ steps.dirs.outputs.directories }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Find changed infra directories
        id: dirs
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Two infra-root families covered:
          #   - apps/*/infra/...      (per-app roots: web-platform, cla-evidence, ...)
          #   - infra/<name>/...      (repo-level roots: infra/github/, ...)
          #
          # The PR-diff branch filters via `grep -E` rather than git pathspec:
          # git pathspec `*` does NOT cross `/` in default semantics, so
          # `'apps/*/infra/'` silently returned empty and the matrix fanned
          # out to zero jobs (matrix-zero is a skipped-not-failed outcome).
          # The brace group `{ grep -E ... || true; }` neutralizes grep's
          # exit-1 on zero-match BEFORE it can poison the pipeline status
          # under any future `set -o pipefail`. Downstream `sort -u | jq`
          # collapses empty input to `[]`. Mirror unit test:
          # plugins/soleur/test/infra-validation-detect.test.sh. See #4012.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            DIRS=$( { find apps/*/infra -maxdepth 0 -type d 2>/dev/null ; \
                       find infra/* -maxdepth 0 -type d 2>/dev/null ; } \
                    | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            DIRS=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
              | { grep -E '^(apps/[^/]+/infra|infra/[^/]+)/' || true; } \
              | sed -E 's|^(apps/[^/]+/infra)/.*|\1|; s|^(infra/[^/]+)/.*|\1|' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          printf 'directories=%s\n' "$DIRS" >> "$GITHUB_OUTPUT"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.directories != '[]'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        directory: ${{ fromJSON(needs.detect-changes.outputs.directories) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate cloud-init schema
        run: |
          if [[ -f cloud-init.yml ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq cloud-init 2>&1 | tail -1
            cloud-init schema -c cloud-init.yml
          else
            echo "No cloud-init.yml found, skipping"
          fi
        working-directory: ${{ matrix.directory }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive .
        working-directory: ${{ matrix.directory }}

      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: ${{ matrix.directory }}

      # Any infra root that ships tests/*.tftest.hcl gets `terraform test` run
      # after validate. Used by apps/web-platform/infra for the credential-free
      # var.web_hosts EU-residency negative tests (CLO T-1) via mock_provider —
      # variable validation is proven WITHOUT a Hetzner token or the R2 backend.
      - name: Terraform test (if tests/ present)
        run: |
          if compgen -G "tests/*.tftest.hcl" > /dev/null; then
            echo "→ terraform test"
            terraform test
          else
            echo "No tests/*.tftest.hcl in this directory; skipping."
          fi
        working-directory: ${{ matrix.directory }}

      # Optional per-app lint hook: any infra root that ships a `main.test.sh`
      # gets it executed after fmt/validate. Used by apps/cla-evidence/infra
      # to assert content invariants (Governance mode, 3650-day retention,
      # prevent_destroy, no IP-allowlist) that fmt/validate alone can't see.
      - name: Run per-app main.test.sh (if present)
        run: |
          if [[ -f main.test.sh ]]; then
            echo "→ bash main.test.sh"
            bash main.test.sh
          else
            echo "No main.test.sh in this directory; skipping."
          fi
        working-directory: ${{ matrix.directory }}

  deploy-script-tests:
    runs-on: ubuntu-24.04
    # 8 (was 5): the #5875 sandbox-canary regression below builds a small alpine+
    # bubblewrap image and runs two docker bwrap probes on top of the existing bash
    # suite. Self-validating (SKIPs if the runner cannot do bwrap userns).
    timeout-minutes: 8
    steps:
      # fetch-depth: 0 + fetch-tags: true make the vinngest-v* tags reachable so
      # the cloud-init-inngest-bootstrap drift-guard (AC6, #4675) can compare the
      # pin against the latest published tag. Without tags the guard self-skips
      # (visible SKIP, never false-green). detect-changes already uses
      # fetch-depth: 0 as precedent.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run ci-deploy.sh tests
        run: bash apps/web-platform/infra/ci-deploy.test.sh

      - name: Run ci-deploy-wrapper.sh tests
        run: bash apps/web-platform/infra/ci-deploy-wrapper.test.sh

      - name: Run canary-bundle-claim-check.sh tests
        run: bash apps/web-platform/infra/canary-bundle-claim-check.test.sh

      - name: Run infra-config-apply.sh tests
        run: bash apps/web-platform/infra/infra-config-apply.test.sh

      - name: Run infra-config-install.sh helper tests
        run: bash apps/web-platform/infra/infra-config-install.test.sh

      - name: Run infra-config-handler-bootstrap drift-guard
        run: bash apps/web-platform/infra/infra-config-handler-bootstrap.test.sh

      - name: Run www-apex-canonicalizer drift-guard
        run: bash apps/web-platform/infra/www-apex-canonicalizer.test.sh

      - name: Run cloud-init inngest-bootstrap pin drift-guard
        run: bash apps/web-platform/infra/cloud-init-inngest-bootstrap.test.sh

      - name: Run journald persistent-storage tests
        run: bash apps/web-platform/infra/journald-config.test.sh

      - name: Run bwrap userns sysctl drift-guard
        run: bash apps/web-platform/infra/bwrap-userns-sysctl.test.sh

      - name: Run cron-egress firewall drift-guard
        run: bash apps/web-platform/infra/cron-egress-firewall.test.sh

      - name: Run fresh-host egress-enforcement probe drift-guard
        run: bash apps/web-platform/infra/cron-egress-enforce-probe.test.sh

      - name: Run GitHub /meta CIDR generator tests
        run: bash apps/web-platform/infra/scripts/gen-github-egress-cidr.test.sh

      - name: Run server.tf remote-exec set -e drift-guard
        run: bash apps/web-platform/infra/server-tf-set-e.test.sh

      - name: Run deploy fan-out peer-list parity drift-guard
        run: bash apps/web-platform/infra/web-hosts-fanout-parity.test.sh

      - name: Run firewall port-9000 deny drift-guard
        run: bash apps/web-platform/infra/firewall-9000-deny.test.sh

      - name: Run §(c) LB-weight gate shape-only tests
        run: bash apps/web-platform/infra/lb-weight-gate.test.sh

      # Host monitor family (#5417 registered these; resource-monitor +
      # cat-deploy-state were pre-existing orphan suites CI never ran).
      - name: Run container-restart-monitor.sh tests
        run: bash apps/web-platform/infra/container-restart-monitor.test.sh

      - name: Run resource-monitor.sh tests
        run: bash apps/web-platform/infra/resource-monitor.test.sh

      - name: Run cat-deploy-state.sh tests
        run: bash apps/web-platform/infra/cat-deploy-state.test.sh

      # Faithful sandbox canary soak accumulator (#5875 / ADR-079).
      - name: Run sandbox-canary-soak.sh tests
        run: bash apps/web-platform/infra/sandbox-canary-soak.test.sh

      # #5875 item 3 / ADR-079 — docker-run bwrap would-have-caught proof. Sets the
      # userns sysctl (ephemeral GH-hosted runner ONLY, guardrail 3 — re-gate if CI
      # moves to a persistent/self-hosted runner) and runs the synthesized
      # split-unshare argv under BOTH the committed and the synthesized pre-5874
      # seccomp profiles: the committed profile must ALLOW it, the pre-5874 profile
      # must EPERM it (proving the profile would have caught #5849). Self-validating:
      # SKIPs (never false-fails) if the runner cannot execute the bwrap userns setup.
      # The structural layer (always-on) and the sdk-bump gate are the deterministic
      # blocking guards; this is the higher-fidelity runtime confirmation.
      - name: Run sandbox-canary would-have-caught regression (docker bwrap)
        env:
          SDK_SANDBOX_REGRESSION_DOCKER: "1"
        run: bash apps/web-platform/scripts/sandbox-canary-regression.test.sh

      # No-SSH inngest cutover orchestration (#5450).
      - name: Run inngest-enumerate-reminders.sh tests
        run: bash apps/web-platform/infra/inngest-enumerate-reminders.test.sh

      - name: Run inngest-rearm-reminders.sh tests
        run: bash apps/web-platform/infra/inngest-rearm-reminders.test.sh

      - name: Run inngest-wiped-volume-verify.sh tests
        run: bash apps/web-platform/infra/inngest-wiped-volume-verify.test.sh

      - name: Run cat-inngest-verify-state.sh tests
        run: bash apps/web-platform/infra/cat-inngest-verify-state.test.sh

      - name: Run inngest-inventory.sh tests
        run: bash apps/web-platform/infra/inngest-inventory.test.sh

      - name: Run git-lock-chardevice-sweep.sh tests
        run: bash apps/web-platform/infra/git-lock-chardevice-sweep.test.sh

      - name: Run inngest.tf + bootstrap drift-guards
        run: bash apps/web-platform/infra/inngest.test.sh

      - name: Run cutover-inngest.yml workflow tests
        run: bash apps/web-platform/infra/cutover-inngest-workflow.test.sh

      - name: Run inngest-rls lockdown SQL shape guards
        run: bash apps/web-platform/infra/inngest-rls/inngest-rls.test.sh

      - name: Run git-data writer-side CAS fence tests
        run: bash apps/web-platform/infra/git-data-pre-receive.test.sh

      - name: Run git-data bare-repo provisioner tests
        run: bash apps/web-platform/infra/git-data-provision.test.sh

      - name: Run git-data bare-repo erasure (Art. 17) tests
        run: bash apps/web-platform/infra/git-data-remove.test.sh

      - name: Run git-data LUKS-at-rest cutover drift-guards
        run: bash apps/web-platform/infra/git-data-luks.test.sh

      - name: Run git-data transport-wrapper allowlist tests
        run: bash apps/web-platform/infra/git-data-transport-wrapper.test.sh

  check-secrets:
    runs-on: ubuntu-24.04
    outputs:
      has-doppler-token: ${{ steps.check.outputs.has_token }}
    steps:
      - name: Check DOPPLER_TOKEN availability
        id: check
        env:
          DOPPLER_TOKEN_CHECK: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [[ -n "${DOPPLER_TOKEN_CHECK}" ]]; then
            printf 'has_token=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'has_token=false\n' >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: [detect-changes, validate, check-secrets]
    if: |
      needs.detect-changes.outputs.directories != '[]' &&
      needs.check-secrets.outputs.has-doppler-token == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        directory: ${{ fromJSON(needs.detect-changes.outputs.directories) }}
      fail-fast: false
    concurrency:
      group: terraform-plan-${{ github.event.number || github.run_id }}-${{ matrix.directory }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate CI SSH key
        run: ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain)
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain)
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ matrix.directory }}

      - name: Terraform plan
        id: plan
        continue-on-error: true
        working-directory: ${{ matrix.directory }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          VAR_ARGS=()
          if grep -q 'variable "ssh_key_path"' variables.tf 2>/dev/null; then
            VAR_ARGS+=(-var="ssh_key_path=/tmp/ci_ssh_key.pub")
          fi
          PLAN_OUTPUT=$(doppler run --name-transformer tf-var -- \
            terraform plan -no-color -input=false \
            "${VAR_ARGS[@]}" 2>&1)
          PLAN_EXIT=$?

          if [[ ${#PLAN_OUTPUT} -gt 60000 ]]; then
            PLAN_OUTPUT="${PLAN_OUTPUT:0:60000}

          ... (plan output truncated -- exceeded 60,000 chars)"
          fi

          DELIMITER="PLAN_EOF_$(openssl rand -hex 8)"
          {
            printf 'plan<<%s\n' "$DELIMITER"
            printf '%s\n' "$PLAN_OUTPUT"
            printf '%s\n' "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

          printf 'exit_code=%d\n' "$PLAN_EXIT" >> "$GITHUB_OUTPUT"
          exit "$PLAN_EXIT"

      - name: Post plan comment
        if: always() && steps.plan.outcome != 'skipped'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: terraform-plan-${{ matrix.directory }}
          message: |
            ### Terraform Plan: `${{ matrix.directory }}`

            **Result:** ${{ steps.plan.outcome == 'success' && '✅ Success' || '❌ Failed' }} (exit code: ${{ steps.plan.outputs.exit_code }})

            <details>
            <summary>Plan output</summary>

            ```
            ${{ steps.plan.outputs.plan }}
            ```

            </details>

      - name: Fail job on plan failure
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
