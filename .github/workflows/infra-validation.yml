      - name: Run inngest-rls lockdown SQL shape guards
        run: bash apps/web-platform/infra/inngest-rls/inngest-rls.test.sh

      - name: Run apply-inngest-rls{,-dev}.yml workflow shape guards
        run: bash apps/web-platform/infra/inngest-rls/apply-inngest-rls-dev-workflow.test.sh

      # (#3366) This step is the ONLY thing that makes the advisor-scan shape
