name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-bot-statuses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint bot synthetic statuses
        run: bash scripts/lint-bot-synthetic-statuses.sh

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Install web-platform dependencies
        run: bun install
        working-directory: apps/web-platform

      - name: Type-check web-platform
        run: npx tsc --noEmit
        working-directory: apps/web-platform

      - name: Install telegram-bridge dependencies
        run: bun install
        working-directory: apps/telegram-bridge

      - name: Run tests
        run: bash scripts/test-all.sh

      - name: Enforce telegram-bridge coverage
        run: bun test --coverage
        working-directory: apps/telegram-bridge
