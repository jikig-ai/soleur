name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Merge queue (#5780). The queue dispatches `merge_group` against the
  # gh-readonly-queue/main/* temp ref. INVARIANT: EVERY job that produces a
  # required status context (the full set is scripts/required-checks.txt minus
  # the CLA + CodeQL rows — e.g. `test`, `e2e`, `lockfile-sync`,
  # `service-role-allowlist-gate`, `tc-document-sha-guard`, `adr-ordinals`,
  # `rule-body-lint`, `grok-fidelity`, `credential-path-guard`) must run on
  # `merge_group` — do NOT add an `event_name == 'pull_request'` gate to any of
  # them or that required context never reports → the queue entry stalls pending
  # forever. None gate on the event today, so they run unconditionally. This is a
  # non-exhaustive example list, not the authority; required-checks.txt is.
  # `tc-document-sha-guard` additionally
  # receives `MERGE_GROUP_BASE_SHA` so its T&C TC_VERSION-bump bypass still works
  # on the candidate (github.base_ref is empty on merge_group). `detect-changes`
  # short-circuits non-PR events to docs=true (critical-css-gate runs — extra,
  # not required); its event-shape refinement is optional polish (P2-6).
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress CI runs for the same PR when a newer commit lands.
# Scoped to pull_request events only — on `main` we let prior runs finish
# so the audit trail (post-merge monitors, release-gate evidence) stays
# intact. Group keys off (workflow, ref) so PR runs don't compete with
# main-branch runs of the same workflow. github.workflow / github.ref /
# github.event_name are GitHub-controlled meta-vars, not attacker-
# controlled — safe to interpolate directly (the security-reminder hook
# fires for any ${{ … }} in workflow files; the run:-command injection
# class does not apply here).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  readme-counts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify README component counts match filesystem
        run: bash scripts/sync-readme-counts.sh --check

  # detect-changes: drives the if:-gate on critical-css-gate. Mirrors the
  # infra-validation.yml pattern (single boolean output instead of matrix).
  # Cheap (one checkout + one git diff). See #3624.
  # BASE_REF is only set on pull_request events; we short-circuit on other
  # events (push / workflow_dispatch) before referencing it. It is passed
  # via env: + quoted "$BASE_REF" per workflow-injection guidance — see
  # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            # push to main / workflow_dispatch: always run (main is source of truth).
            printf 'docs=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Path anchors mirror .github/workflows/deploy-docs.yml's on.push.paths
          # (docs/skills/agents/commands/eleventy.config.js). The ci|deploy-docs
          # workflow self-trigger is an intentional addition NOT in deploy-docs:
          # edits to the gate workflow itself must run the gate to prevent
          # silent gate-bypass on gate-logic changes. Keep this list in sync
          # with deploy-docs.yml's paths: when adding new docs source trees.
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if printf '%s\n' "$CHANGED" | grep -qE '^(plugins/soleur/(docs|skills|agents|commands)/|eleventy\.config\.js$|\.github/workflows/(ci|deploy-docs)\.yml$)'; then
            printf 'docs=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'docs=false\n' >> "$GITHUB_OUTPUT"
          fi

  # BLOCKING required check (#6882). Registered in scripts/required-checks.txt,
  # scripts/ci-required-ruleset-canonical-required-status-checks.json, and
  # infra/github/ruleset-ci-required.tf — the job NAME is public ABI across all
  # three (ADR-032 Sharp Edge 1): renaming it here silently un-requires the gate
  # until those files are updated in the SAME PR.
  #
  # Regression teeth for the credential auto-attach class: fail a tracked doc
  # that writes a home-relative RESOLVABLE path to a real credential file. Claude
  # Code's harness auto-attaches such a file into model context when the doc
  # loads — the vector that read a live Doppler token into session transcripts
  # via preflight/SKILL.md.
  #
  # FULL SCAN, not --changed: #6880 drained the grandfathered backlog to zero, so
  # a green here asserts "the repository contains none", not merely "this diff
  # introduced none". That also drops the merge-base dependency — deliberately no
  # `fetch-depth: 0` (a shallow checkout suffices) and no `github.base_ref` read,
  # which is empty on merge_group.
  #
  # Deliberately NO `if:` on github.event_name — a required context that does not
  # report on merge_group leaves the queue entry pending forever (see the header
  # note on this workflow's merge_group trigger).
  credential-path-guard:
    runs-on: ubuntu-latest
    steps:
      # Do NOT add sparse-checkout or a paths filter here. The linter exits 0
      # over an empty scan set ("OK: 0 scanned file(s)"), so any checkout that
      # excludes plugins/ or knowledge-base/ would silently turn this required
      # gate fail-OPEN — the exact fabrication class this job exists to block.
      # A full checkout (the default) is load-bearing.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint resolvable credential-file paths in docs (full scan)
        run: python3 scripts/lint-credential-path-literals.py

  # ADVISORY job — absent from scripts/required-checks.txt and the ruleset, so a
  # PR can merge with it red. See the #6882 note inside for what moved out.
  lint-bot-statuses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so lint-infra-no-human-steps can merge-base against the
          # PR base ref (changed-files grandfathering mode).
          fetch-depth: 0
      - name: Lint bot synthetic statuses
        run: bash scripts/lint-bot-synthetic-statuses.sh
      - name: Lint bot synthetic completeness
        run: bash scripts/lint-bot-synthetic-completeness.sh
      # Enforcement teeth for hr-no-ssh-fallback-in-runbooks: fail a
      # plan/spec/runbook/ADR/legal-runbook that prescribes a *human-run*
      # terraform / SSH / reboot / verify-on-private-net infra step. Changed-files
      # mode grandfathers pre-existing docs; the diff base is the PR base ref
      # (falls back to origin/main on push/merge_group).
      - name: Lint infra no-human-steps (changed vs base)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            python3 scripts/lint-infra-no-human-steps.py --changed --base "origin/$BASE_REF"
          else
            python3 scripts/lint-infra-no-human-steps.py --changed
          fi
      # NOTE (#6882): the resolvable-credential-path guard used to live here. It
      # was extracted to the `credential-path-guard` job below and promoted to a
      # BLOCKING required check. Every step remaining in THIS job is ADVISORY —
      # `lint-bot-statuses` is absent from BOTH scripts/required-checks.txt and
      # the Terraform ruleset, so a PR can still merge with it red. Promoting any
      # of them is a deliberate follow-up (see the #6734/ADR-129 note below),
      # not a side effect: it means adding this job to required-checks.txt AND
      # the ruleset together, and re-deriving the ALLOWED_PATHS ∩ SCAN_DIRS test
      # (ADR-139) for each content-scoped step first.
      # #6734 tempfile-cleanup ownership. Rule (a) subshell-append runs repo-wide;
      # rule (c) mktemp-with-no-owning-trap is new-entrant-scoped, because the existing
      # class-b population is an accepted, ratcheted debt (ADR-129).
      #
      # ENFORCEMENT LEVEL IS ADVISORY, NOT BLOCKING. This job is absent from BOTH
      # scripts/required-checks.txt and the Terraform ruleset, so a PR can merge with it
      # red. That is stated here, in ADR-129, and in the linter's own docstring rather
      # than left implied -- a gate that claims teeth it lacks is worse than one that
      # does not, because it stops people looking. Promoting it is a deliberate
      # follow-up: add the job to required-checks.txt AND the ruleset together.
      - name: Lint tempfile-cleanup ownership (#6734)
        run: python3 scripts/lint-trap-tempfile-ownership.py
      - name: Ratchet the accepted class-b tempfile population
        run: python3 scripts/lint-trap-tempfile-ownership.py --check-highwater
      - name: Lint orphan test suites (scripts/*.test.sh must be registered)
        run: bash scripts/lint-orphan-test-suites.sh
      # NOTE (#6901): the Encryption-posture Layer A repo-sweep (ADR-140) used to
      # run here as a step inside this shared advisory job. It was extracted to the
      # standalone `encryption-posture` job below so its green/red status is
      # attributable to the sweep alone (this job's status is polluted by the
      # tempfile-ownership + orphan-suite siblings) — the prerequisite for a
      # measure-then-arm soak (ADR-117) before promotion to a required check.

  # Encryption-posture Layer A repo-sweep (ADR-140), extracted from lint-bot-statuses
  # in #6901. Asserts every persistent store and cross-component connection in
  # scripts/encryption-posture-ledger.json resolves to real code (device_binding for
  # LUKS — never name similarity), and every plaintext/cert-off exception carries a
  # live tracking issue + unexpired expires_on.
  #
  # ADVISORY, NOT BLOCKING. This job is absent from scripts/required-checks.txt, the
  # CI-Required ruleset (infra/github/ruleset-ci-required.tf), the canonical parity
  # JSON (scripts/ci-required-ruleset-canonical-required-status-checks.json), and the
  # bot action CHECK_NAMES (.github/actions/bot-pr-with-synthetic-checks/action.yml),
  # so a PR can merge with it red. It exists to SOAK an attributable green streak
  # before promotion (#6901; ADR-117 measure-then-arm). The promotion is a five-site
  # byte-consistent coupling — see the arming tracking issue #6907 and the ADR-140
  # Amendment (2026-07-24, #6901) for the canonical recipe (15368 integration_id +
  # add-to-required-checks.txt + sound-by-unreachability fabrication, NOT CodeQL's
  # non-15368 omit shape, which would wedge every PR at "Expected — Waiting").
  #
  # The full checkout (no paths filter) is load-bearing: --repo-sweep is whole-repo.
  encryption-posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Encryption posture — Layer A repo-sweep (ADR-140)
        run: python3 scripts/lint-encryption-posture.py --repo-sweep

  lint-conversations-update-callsites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint conversations update callsites (R8 wrapper enforcement)
        run: bash scripts/lint-conversations-update-callsites.sh

  # PR-B §1.6 — Service-role allowlist gate. Rejects any importer of
  # `createServiceClient` / `getServiceClient` in apps/web-platform/{server,lib}
  # that is not enumerated in apps/web-platform/.service-role-allowlist.
  # Replaces the rejected ESLint custom rule (per DHH cut #1, simplicity #6).
  # CODEOWNERS pins the allowlist file so this gate cannot be self-defeated.
  service-role-allowlist-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Service-role allowlist gate
        run: bash apps/web-platform/scripts/service-role-allowlist-gate.sh
      - name: Service-role allowlist gate self-test
        run: bash apps/web-platform/test/ci/service-role-allowlist-gate.test.sh

  # Legal-doc SHA-pin guard (all 9 docs) + T&C mirror-drift guard
  # (feat-oauth-tc-consent-3205, extended #4324). Job name preserved
  # because infra/github/ruleset-ci-required.tf pins this context per
  # ADR-032; rename requires a paired terraform apply (out of scope).
  # Asserts every canonical at docs/legal/*.md has a matching SHA
  # literal (TC_DOCUMENT_SHA in tc-version.ts for T&C; LEGAL_DOC_SHAS
  # in legal-doc-shas.ts for the other 8) and, for T&C only, that the
  # Eleventy mirror prose body is identical after normalisation. The
  # T&C SHA bypass via TC_VERSION bump is preserved.
  tc-document-sha-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Verify all 9 legal-doc SHAs pinned
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          # github.base_ref is empty on merge_group; the script falls back to
          # this candidate base SHA so the T&C TC_VERSION-bump bypass still works
          # on the queue ref (else a legit stale-SHA + TC_VERSION-bump PR is
          # green-on-PR but red-on-queue → dequeued). #5780.
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: bash apps/web-platform/scripts/check-tc-document-sha.sh

  # ADR ordinal + required-content sentinel (PR-B #4379 ADR-040 + ADR-041).
  # Catches: (a) NEW ordinal collisions in knowledge-base/engineering/
  # architecture/decisions/ (pre-existing collisions on main allowlisted in
  # the script); (b) PR-B-required ADR-040 / ADR-041 missing or empty;
  # (c) ADR file missing ## Status / ## Context / ## Decision /
  # ## Consequences headings. See AC18 in 2026-05-25-feat-anthropic-leader-
  # loop-pr-b-plan.md. No user-controlled inputs; static script call.
  adr-ordinals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check ADR ordinals + content completeness
        run: bash scripts/check-adr-ordinals.sh

  # Hard-rule body-weakening gate (ADR-092, #6103). BLOCKS any un-acked change
  # or deletion of an `hr-*`/`wg-*` rule BODY line in AGENTS.{core,docs,rest}.md
  # (see scripts/lint-rule-bodies.py). This job's name IS the `rule-body-lint`
  # required context pinned in infra/github/ruleset-ci-required.tf +
  # scripts/ci-required-ruleset-canonical-required-status-checks.json — a rename
  # requires a paired terraform apply. MUST stay ALWAYS-RUN (no `paths:`/`if:`
  # event gate) and green on the no-op path: a path-gated required 15368 context
  # never posts on unrelated PRs → permanent `pending` → wedges every human PR
  # (CTO ruling 2026-07-06; mirrors the `enforce`/`tenant-integration-required`
  # always-run contexts). The gate itself is green when no body changed, so the
  # no-op path needs no explicit short-circuit. fetch-depth: 0 + `git fetch
  # origin main` so the merge-base (NOT origin/main tip) is resolvable on
  # pull_request / push / merge_group alike.
  rule-body-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Hard-rule body-weakening gate (ADR-092)
        run: |
          git fetch --no-tags --quiet origin main
          BASE="$(git merge-base origin/main HEAD)"
          python3 scripts/lint-rule-bodies.py --check --base "$BASE"

  rule-metrics-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Validate rule-metrics.json shape
        env:
          METRICS_FILE: knowledge-base/project/rule-metrics.json
        run: |
          if [[ ! -f "$METRICS_FILE" ]]; then
            echo "No $METRICS_FILE yet — skipping shape check."
            exit 0
          fi
          jq empty "$METRICS_FILE"
          jq -e 'has("generated_at") and has("rules") and has("summary")' "$METRICS_FILE" >/dev/null
          jq -e '.summary | has("total_rules_tagged") and has("rules_unused_over_8w") and has("rules_bypassed_over_baseline") and has("orphan_rule_ids")' "$METRICS_FILE" >/dev/null
          # Per-rule fields (applied_count/warn_count/fire_count) added for
          # #2866 are validated by scripts/rule-metrics-aggregate.test.sh —
          # not enforced here because the committed artifact lags the
          # aggregator until the first post-merge Sunday run.

  # Regenerates apps/web-platform/package-lock.json under a pinned npm
  # major and diffs against the committed file. Catches the `bun add`
  # defect class (package.json changes without lockfile sync) AND the
  # operator/CI npm-major-skew defect class — recurrence history:
  #   - #4014 (2026-04, libc-arrays shape facet, operator-side `npx npm@10`)
  #   - #4331 (2026-05, regression — flagsmith bun-add)
  #   - #4334 (2026-05, hotfix regenerated under npm 11 but CI was on npm 10)
  #   - #4337 (2026-05, this PR — codified the pin inside the gate)
  # The pin step below is the durable fix; see
  # knowledge-base/project/learnings/2026-05-22-npm-version-pin-required-for-lockfile-sync-gate.md.
  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Override bundled npm with npm@11
        # `actions/setup-node@v4.4.0` ships npm 10.9.x with node-version 22 and
        # has no `npm-version` input — `npm install -g npm@<major>` is the only
        # available pin mechanism. Operators on Node 23+ or post-`bun add`
        # flows produce npm 11 lockfiles; pinning here keeps CI and the
        # committed lockfile on the same major so the regenerate-and-diff
        # check below is meaningful. The bundled npm 10.x is discarded
        # (the global install replaces it for the rest of this job only).
        run: npm install -g npm@11

      - name: Regenerate package-lock.json
        working-directory: apps/web-platform
        run: npm install --package-lock-only

      - name: Check lockfile sync
        run: |
          if ! git diff --exit-code apps/web-platform/package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json in apps/web-platform/."
            echo "::error::Run 'npx --yes npm@11 install --package-lock-only' in apps/web-platform/ and commit the updated package-lock.json. (CI pins npm@11 — using a different npm version locally will produce a divergent lockfile shape.)"
            exit 1
          fi

      # #5875 item 3 / ADR-079 — SDK-bump sandbox gate (BLOCKING). Asserts
      # bun.lock↔package-lock parity for both @anthropic-ai SDK packages AND, on a
      # resolved-version bump vs the base branch, requires an `sdk-bump-verified:`
      # ack (a maintainer attests the committed seccomp profile was validated against
      # the new SDK). Closes the #5849 "a routine SDK bump shipped green because
      # nothing forced a look" class deterministically (no model turn / creds). The
      # base comparison needs origin/main; the default checkout is depth-1, so fetch it.
      - name: SDK-bump sandbox gate (lockfile parity + bump ack)
        run: |
          git fetch --no-tags --depth=1 origin main 2>/dev/null || true
          bash apps/web-platform/scripts/sdk-bump-sandbox-gate.sh

  # #5913 / ADR-079 deferral B — creds-gated canary CAPTURE gate. DARK-LAUNCH:
  # NOT a required status check yet (do not add to branch protection until it has
  # soaked — see ADR-079 amendment). It re-captures the SDK's real bwrap argv,
  # canonically projects it, and byte-diffs the committed fixture (block on drift),
  # ONLY on PRs that touch a capture input. Same-repo PRs only: fork PRs get no
  # secrets → skipped (the capture check "passes"; section 2's bump-ack in
  # lockfile-sync still applies to forks). Skips merge_group so it never stalls the
  # queue. The --verify runs INSIDE the deploy base image (node:22-slim) via
  # sandbox-canary-verify-in-image.sh — the capture-env==replay-env invariant
  # (ADR-079 amendment): running the capture on the ubuntu-latest runner (which has
  # /etc/ssh) would emit a host-conditional --tmpfs /etc/ssh token absent in the
  # node:22-slim deploy image and byte-diff-fail the committed fixture. bwrap is
  # REPLACED by an in-process PATH shim during capture (no real bubblewrap needed).
  sandbox-canary-capture-gate:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect capture-input changes
        id: trigger
        run: |
          git fetch --no-tags --depth=1 origin main 2>/dev/null || true
          CHANGED="$(git diff --name-only origin/main...HEAD 2>/dev/null || true)"
          if printf '%s\n' "$CHANGED" | grep -qE 'apps/web-platform/(package-lock\.json|server/agent-runner-sandbox-config\.ts|scripts/sandbox-canary\.mjs|infra/sandbox-canary-argv\.json)'; then
            echo "hit=1" >> "$GITHUB_OUTPUT"
          else
            echo "hit=0" >> "$GITHUB_OUTPUT"
            echo "sandbox-canary-capture-gate: no capture-input change — skipping (nothing to re-verify)."
          fi

      # No node/bun/npm-ci on the runner: the --verify runs inside a node:22-slim
      # container (the deploy base image) via the helper below, which does its own
      # npm ci. The runner needs only docker (preinstalled) + git.
      - name: Canary capture gate (in-image --verify drift + ack-fallback)
        if: steps.trigger.outputs.hit == '1'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANDBOX_CANARY_GATE_ENABLED: "1"
          # --verify runs inside node:22-slim (deploy base) — see helper header.
          SDK_GATE_VERIFY_CMD: bash apps/web-platform/scripts/sandbox-canary-verify-in-image.sh
        run: |
          git fetch --no-tags --depth=1 origin main 2>/dev/null || true
          bash apps/web-platform/scripts/sdk-bump-sandbox-gate.sh

  # plugin-root-propagation-verify-in-image.sh — the F2 runtime guarantee
  # (Slice B / AC7a, #6121): proves CLAUDE_PLUGIN_ROOT (injected by buildAgentEnv)
  # actually reaches the bwrap-SANDBOXED Bash env, so the deployed skills'
  # `${CLAUDE_PLUGIN_ROOT:-./plugins/soleur}` never silently falls back to the
  # untrusted connected-repo copy on the server. Must run in the node:22-slim
  # deploy base (with socat) — the SDK's claude-CLI → bwrap env projection is
  # SDK-internal; a future `--clearenv` regression would break propagation and is
  # caught here. Creds-gated (one paid Haiku turn); skipped when the injection
  # inputs or the SDK are unchanged.
  plugin-root-propagation-gate:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect propagation-input changes
        id: trigger
        run: |
          git fetch --no-tags --depth=1 origin main 2>/dev/null || true
          CHANGED="$(git diff --name-only origin/main...HEAD 2>/dev/null || true)"
          # Trigger set = the probe's ACTUAL inputs: it imports buildAgentEnv
          # (agent-env.ts) + buildAgentSandboxConfig (agent-runner-sandbox-config.ts)
          # + the SDK (package-lock.json) + the probe itself. Deliberately NOT
          # agent-runner-query-options.ts: the probe calls buildAgentEnv directly,
          # so a query-options `pluginPath`-threading regression is invisible to it
          # (covered by agent-runner-query-options.test.ts instead) — including it
          # would burn a paid Haiku turn on a probe that cannot detect the change.
          if printf '%s\n' "$CHANGED" | grep -qE 'apps/web-platform/(package-lock\.json|server/agent-env\.ts|server/agent-runner-sandbox-config\.ts|scripts/plugin-root-sandbox-propagation-probe\.mjs)'; then
            echo "hit=1" >> "$GITHUB_OUTPUT"
          else
            echo "hit=0" >> "$GITHUB_OUTPUT"
            echo "plugin-root-propagation-gate: no propagation-input change — skipping."
          fi

      # Runs entirely inside node:22-slim (deploy base) via the helper, which does
      # its own apt (socat) + npm ci. The runner needs only docker + git.
      - name: CLAUDE_PLUGIN_ROOT sandbox-propagation (in-image, fail-closed)
        if: steps.trigger.outputs.hit == '1'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          VERDICT_JSON="$(bash apps/web-platform/scripts/plugin-root-propagation-verify-in-image.sh | tail -1)"
          echo "verdict: $VERDICT_JSON"
          V="$(printf '%s' "$VERDICT_JSON" | sed -n 's/.*"verdict":"\([a-z_]*\)".*/\1/p')"
          case "$V" in
            propagates) echo "OK: CLAUDE_PLUGIN_ROOT reaches sandbox bash." ;;
            infra_error) echo "::warning::propagation probe infra_error (creds/sandbox-engage) — not a regression signal." ;;
            does_not_propagate) echo "::error::CLAUDE_PLUGIN_ROOT no longer reaches sandbox bash — deployed skills would run the untrusted ./plugins copy. See #6121 / ADR-093."; exit 1 ;;
            *) echo "::error::unrecognized propagation verdict: $VERDICT_JSON"; exit 1 ;;
          esac

  # next build runs the App Router route-file validator that vitest and `tsc --noEmit`
  # skip — catches non-HTTP exports from `app/**/route.{ts,tsx}` before merge instead
  # of inside the post-merge Docker build (#2347/#2401 outage).
  web-platform-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-platform/package-lock.json

      - name: Install web-platform dependencies
        working-directory: apps/web-platform
        run: npm ci

      - name: Build (next build runs the route-file validator)
        working-directory: apps/web-platform
        run: npm run build

  # --- Test matrix: 3 shards + synthetic aggregator ---
  #
  # The single `test` job was split into three parallel shards
  # (test-webplat / test-bun / test-scripts) so install + typecheck +
  # vitest + bun-test workloads run concurrently. The synthetic `test`
  # aggregator (below) is the required status check on branch-protection
  # ruleset 14145388 — its NAME and EXISTENCE are load-bearing for
  # every merge. Each shard invokes scripts/test-all.sh with the
  # corresponding TEST_GROUP positional arg (`webplat`/`bun`/`scripts`).
  # See plan: knowledge-base/project/plans/2026-05-12-feat-ci-test-job-speedup-plan.md
  #
  # NOTE for future maintainers: keep `actions/checkout`, `oven-sh/setup-bun`,
  # `actions/setup-node`, and `actions/cache` SHA pins in lockstep across
  # test-webplat / test-bun / test-scripts. When bumping any action, edit
  # all three job blocks in the same commit; this YAML has no include or
  # anchor mechanism so the duplication is structural.
  # 2-way vitest --shard matrix. Vitest natively supports `--shard=K/N`;
  # `test:ci` forwards `--shard=$VITEST_SHARD` when VITEST_SHARD is set.
  # `tsc --noEmit` is independent of shard and runs only on shard 1 to
  # avoid duplicated ~18s of type-check work. The synthetic `test`
  # aggregator (below) reads `needs.test-webplat.result` which rolls up
  # the matrix outcome — failure on any shard fails the whole job.
  test-webplat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/2", "2/2"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # First actions/cache usage in this repo. SHA pinned per the standing
      # vendor-pin discipline (every other action above is also SHA-pinned).
      # Cache key uses `apps/web-platform/bun.lock` (text format — `bun.lockb`
      # does not exist in this repo; hashFiles() would silently hash zero bytes).
      - name: Cache bun install (apps/web-platform)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
            apps/web-platform/node_modules
          key: bun-webplat-${{ runner.os }}-${{ hashFiles('apps/web-platform/bun.lock') }}
          restore-keys: |
            bun-webplat-${{ runner.os }}-

      - name: Install web-platform dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web-platform

      - name: Type-check web-platform
        # Gated to the first matrix run so we type-check once even though
        # vitest runs are sharded. `strategy.job-index == 0` is matrix-
        # resize-safe (survives 2→N changes); a literal `'1/2'` would
        # silently stop running tsc if the matrix is renumbered.
        if: strategy.job-index == 0
        run: npx tsc --noEmit
        working-directory: apps/web-platform

      - name: Run webplat tests (vitest --shard)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITEST_SHARD: ${{ matrix.shard }}
        run: bash scripts/test-all.sh webplat

  test-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      # setup-node is required for `npx --yes @11ty/eleventy` inside
      # scripts/validate-blog-links.sh (one of the bun-group suites).
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Cache bun install (root)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-root-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-root-${{ runner.os }}-

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run bun-side tests
        run: bash scripts/test-all.sh bun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-scripts:
    runs-on: ubuntu-latest
    # No setup-bun, no setup-node — bash + python3 + a stock node (with npm)
    # ship on ubuntu-latest by default, and the one `node --test` entry in the
    # scripts group (scripts/md-to-mrkdwn.test.mjs) runs on the stock
    # ubuntu-latest node — no version pin needed (same bare-`node` precedent as
    # secret-scan.yml; node --test ships in Node >=18). No `bun` in the
    # scripts group: verified at plan time `grep -l '^bun '
    # plugins/soleur/test/*.test.sh` returned zero matches. If a future
    # .test.sh adds a `bun` invocation, add `setup-bun` here.
    #
    # Two CLIs ARE installed for tests in this shard:
    #  - gitleaks: plugins/soleur/skills/code-to-prd/test/ (#2726) preflights
    #    `command -v gitleaks` and aborts exit 2 if absent. Version + SHA
    #    pinned identically to .github/workflows/secret-scan.yml — to upgrade,
    #    bump both files together.
    #  - likec4@1.50.0: plugins/soleur/test/c4-model-freshness.test.sh renders
    #    the .c4 sources and byte-diffs the committed model.likec4.json. The
    #    version MUST match apps/web-platform/Dockerfile + package.json
    #    (@likec4/core/@likec4/diagram), guarded by c4-likec4-version-pin.test.ts.
    # Variables are workflow-internal literals; no untrusted input is
    # interpolated into the run: blocks.
    env:
      GITLEAKS_VERSION: "8.24.2"
      GITLEAKS_SHA256: "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
    steps:
      # fetch-depth: 0 — scripts/lint-trap-tempfile-ownership.py scopes rule (c) to
      # lines added vs the merge base against origin/main. The default shallow
      # checkout (depth 1) has no origin/main, so `git merge-base` exits 128 and the
      # linter degrades to an untracked-only scope: it emits nothing, returns 0, and
      # its own test suite's "should fire" assertions all fail. Full history is what
      # gives that job the real new-entrant semantics.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned, sha-verified)
        run: |
          set -euo pipefail
          curl -sSLo gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install likec4 CLI (pinned — matches Dockerfile/package.json)
        run: |
          set -euo pipefail
          npm install -g likec4@1.50.0
          likec4 --version

      - name: Run scripts-side tests (bash + python3)
        run: bash scripts/test-all.sh scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Phase F #6325 — Grok fidelity CI: grok inspect contract + /go golden-path eval.
  # Job name `grok-fidelity` is load-bearing once pinned in ruleset-ci-required.tf.
  grok-fidelity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install Grok CLI
        run: |
          set -euo pipefail
          curl -fsSL https://x.ai/cli/install.sh | bash
          echo "$HOME/.grok/bin" >> "$GITHUB_PATH"
          grok --version

      - name: Grok fidelity gate (inspect contract + golden-path eval)
        run: bash plugins/soleur/scripts/grok-fidelity-gate.sh

  # Synthetic aggregator.
  #
  # LOAD-BEARING SUB-VALUE — this job is NOT redundant with
  # branch-protection ruleset 14145388's `test` required check. It carries
  # three distinct values: (a) cross-layer truing — converts three shard
  # `conclusion`s into the single required-context conclusion the ruleset
  # already expects by name; (b) drift-resilience — survives a future
  # ruleset edit that changes the required-context list, as long as the
  # `test` name still gates merge; (c) observability — single PR-status
  # row to inspect, not three. Removing this job orphans the ruleset's
  # `test` required check and breaks every PR merge.
  #
  # The name `test` MUST match the required-context name on ruleset
  # 14145388 exactly. Drift = merge gate orphaned for the whole team.
  #
  # `if: always()` + per-shard `result` inspection is the documented
  # fail-closed pattern (precedent: scheduled-compound-promote.yml). Without
  # `if: always()`, the default `needs:` semantics produce `skipped` when
  # any dependency fails — and some branch-protection configs treat
  # `skipped` as success (fail-open). No `|| true`, no `continue-on-error`.
  # Per-shard `result` is read via env: + quoted "$VAR" per workflow-injection
  # guidance (https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/).
  test:
    needs: [test-webplat, test-bun, test-scripts]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate shard results
        env:
          WEBPLAT_RESULT: ${{ needs.test-webplat.result }}
          BUN_RESULT: ${{ needs.test-bun.result }}
          SCRIPTS_RESULT: ${{ needs.test-scripts.result }}
        run: |
          fail=0
          # Single colon-delimited iteration collapses the prior parallel
          # for-list + case-arms. Adding a 4th shard now requires editing
          # one line (plus needs: + env:); previously also required
          # editing a separate case arm.
          for entry in "test-webplat:$WEBPLAT_RESULT" "test-bun:$BUN_RESULT" "test-scripts:$SCRIPTS_RESULT"; do
            shard="${entry%%:*}"
            result="${entry#*:}"
            if [[ "$result" != "success" ]]; then
              echo "$shard: $result" >&2
              fail=1
            fi
          done
          if [[ $fail -ne 0 ]]; then
            exit 1
          fi
          echo "All three shards green."

  # E2E job runs inside the official Playwright container so Chromium + OS deps
  # are pre-installed at the matching Playwright version. Container tag, digest,
  # and the playwright pin in apps/web-platform/package-lock.json (1.58.2) MUST
  # stay in lockstep — Playwright's browser-binary lookup is exact-revision (see
  # learning 2026-03-20-playwright-shared-cache-version-coupling.md). When
  # bumping playwright in apps/web-platform, bump BOTH the tag and the digest
  # below in the same PR. NOTE: distinct from critical-css-gate's container
  # (which uses v1.60.0 against the root install) — the two jobs use different
  # lockfiles and are independent. DO NOT unify these versions without first
  # bumping the corresponding lockfile pin (apps/web-platform/package-lock.json
  # for this job, root for critical-css-gate); the two jobs are deliberately
  # decoupled and a "tidying" unification will break browser-binary lookup.
  e2e:
    runs-on: ubuntu-latest
    container:
      # Pinned by both tag (greppable version) AND multi-arch manifest-list
      # digest (vendor-pin discipline, per AGENTS.md
      # hr-mcp-tools-playwright-etc-resolve-paths). The Playwright image runs
      # as root by default — that is the supported path for actions/checkout
      # (see https://github.com/actions/checkout/issues/956). Do NOT add
      # `options: --user 1001` — it triggers UID-mismatch permission errors
      # against /__w/_temp. Image ships Node 24 (no actions/setup-node needed).
      image: mcr.microsoft.com/playwright:v1.58.2-jammy@sha256:4698a73749c5848d3f5fcd42a2174d172fcad2b2283e087843b115424303a565
    defaults:
      run:
        # GitHub Actions container `run:` steps default to /bin/sh (dash on
        # Jammy). Explicit bash avoids dash-vs-bash drift on any future step.
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install unzip (required by setup-bun)
        # The Playwright Jammy image does not include unzip, which oven-sh/setup-bun
        # shells out to during install. Without it the action fails with
        # "error: unzip is required to install bun" (see oven-sh/setup-bun#55).
        # critical-css-gate did not hit this because that job uses npm, not bun.
        # Chained with `&&` so a flaky `apt-get update` (mirror outage) fails the
        # step instead of falling through to a stale-cache install.
        # `--no-install-recommends` keeps the install footprint minimal (no docs,
        # no suggested-package pulls).
        run: apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web-platform dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web-platform

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web-platform

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: apps/web-platform/test-results/
          retention-days: 7

  # Pre-merge variant of the deploy-docs critical-CSS gate. Catches FOUC-class
  # regressions before merge, not after — see AGENTS.md cq-eleventy-critical-css-screenshot-gate.
  # Scoped to docs-touching PRs via detect-changes (see #3624).
  # Runs inside the official Playwright container so Chromium + OS deps are
  # pre-installed at the matching Playwright version. Container tag, digest,
  # and the playwright@X.Y.Z npm pin below MUST stay in lockstep with
  # deploy-docs.yml's `deploy` job — both gates assert the same FOUC contract
  # via the same screenshot-gate.mjs script.
  critical-css-gate:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    container:
      # Pinned by both tag (greppable version) AND digest (vendor-pin discipline,
      # per AGENTS.md hr-mcp-tools-playwright-etc-resolve-paths). The Playwright
      # image runs as root by default — that is the supported path for
      # actions/checkout (see https://github.com/actions/checkout/issues/956).
      # Do NOT add `options: --user 1001` — it triggers UID-mismatch permission
      # errors against /__w/_temp. Image ships Node 24 (no actions/setup-node
      # needed). Future Playwright bumps: update tag, digest, AND the
      # `playwright@<X.Y.Z>` npm pin below, in BOTH this workflow and
      # deploy-docs.yml — see Sharp Edges in the plan.
      image: mcr.microsoft.com/playwright:v1.60.0-jammy@sha256:e1529a04087193966ea15d4a1617345bdaa0791690a24ab2c42b65f9ce5b2cdc
    defaults:
      run:
        # GitHub Actions container `run:` steps default to /bin/sh (dash on
        # Jammy). Explicit bash avoids dash-vs-bash drift on any future step
        # that uses `[[ ]]`, arrays, `read -r`, etc.
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install root dependencies
        run: npm ci

      - name: Build docs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx @11ty/eleventy

      - name: Validate CSP (hashes + inline event-handler attributes)
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-csp.sh _site

      - name: Validate SEO
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-seo.sh _site

      - name: Static critical-CSS coverage check
        run: node plugins/soleur/docs/scripts/check-critical-css-coverage.mjs

      - name: Install Playwright + http-server
        # Container provides the Chromium binary + OS deps; the npm package
        # (used by `import { chromium } from "playwright"` in screenshot-gate.mjs)
        # must match the container's Playwright version EXACTLY — browser-binary
        # lookup is exact-revision (see learning
        # 2026-03-20-playwright-shared-cache-version-coupling.md). Use exact
        # `X.Y.Z` — no `^`, no `~`, no `playwright@1` floating tag — or the
        # npm package drifts off the container's Chromium revision. Keep this
        # pin in sync with the container image tag above and with
        # deploy-docs.yml's matching step.
        run: npm install --no-save playwright@1.60.0 http-server@14

      - name: Screenshot + stylesheet-swap gates
        run: |
          npx http-server _site -p 8888 -a 127.0.0.1 -c-1 -s &
          SERVER_PID=$!
          UP=0
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:8888/; then UP=1; break; fi
            sleep 0.5
          done
          if [ "$UP" -ne 1 ]; then
            echo "gates: http-server failed to come up within 15s" >&2
            kill $SERVER_PID 2>/dev/null || true
            exit 2
          fi
          set +e
          node plugins/soleur/docs/scripts/screenshot-gate.mjs
          GATE_EXIT=$?
          if [ "$GATE_EXIT" -eq 0 ]; then
            node plugins/soleur/docs/scripts/check-stylesheet-swap.mjs
            GATE_EXIT=$?
          fi
          set -e
          kill $SERVER_PID 2>/dev/null || true
          exit $GATE_EXIT

      - name: Upload screenshot-gate failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshot-gate-failures-pr
          path: screenshot-gate-failures/
          if-no-files-found: ignore
          retention-days: 14
