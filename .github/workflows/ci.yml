name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readme-counts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify README component counts match filesystem
        run: bash scripts/sync-readme-counts.sh --check

  # detect-changes: drives the if:-gate on critical-css-gate. Mirrors the
  # infra-validation.yml pattern (single boolean output instead of matrix).
  # Cheap (one checkout + one git diff). See #3624.
  # BASE_REF is only set on pull_request events; we short-circuit on other
  # events (push / workflow_dispatch) before referencing it. It is passed
  # via env: + quoted "$BASE_REF" per workflow-injection guidance — see
  # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            # push to main / workflow_dispatch: always run (main is source of truth).
            printf 'docs=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Path anchors mirror .github/workflows/deploy-docs.yml's on.push.paths
          # (docs/skills/agents/commands/eleventy.config.js). The ci|deploy-docs
          # workflow self-trigger is an intentional addition NOT in deploy-docs:
          # edits to the gate workflow itself must run the gate to prevent
          # silent gate-bypass on gate-logic changes. Keep this list in sync
          # with deploy-docs.yml's paths: when adding new docs source trees.
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if printf '%s\n' "$CHANGED" | grep -qE '^(plugins/soleur/(docs|skills|agents|commands)/|eleventy\.config\.js$|\.github/workflows/(ci|deploy-docs)\.yml$)'; then
            printf 'docs=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'docs=false\n' >> "$GITHUB_OUTPUT"
          fi

  lint-bot-statuses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint bot synthetic statuses
        run: bash scripts/lint-bot-synthetic-statuses.sh
      - name: Lint bot synthetic completeness
        run: bash scripts/lint-bot-synthetic-completeness.sh

  lint-conversations-update-callsites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Lint conversations update callsites (R8 wrapper enforcement)
        run: bash scripts/lint-conversations-update-callsites.sh

  # PR-B §1.6 — Service-role allowlist gate. Rejects any importer of
  # `createServiceClient` / `getServiceClient` in apps/web-platform/{server,lib}
  # that is not enumerated in apps/web-platform/.service-role-allowlist.
  # Replaces the rejected ESLint custom rule (per DHH cut #1, simplicity #6).
  # CODEOWNERS pins the allowlist file so this gate cannot be self-defeated.
  service-role-allowlist-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Service-role allowlist gate
        run: bash apps/web-platform/scripts/service-role-allowlist-gate.sh
      - name: Service-role allowlist gate self-test
        run: bash apps/web-platform/test/ci/service-role-allowlist-gate.test.sh

  rule-metrics-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Validate rule-metrics.json shape
        env:
          METRICS_FILE: knowledge-base/project/rule-metrics.json
        run: |
          if [[ ! -f "$METRICS_FILE" ]]; then
            echo "No $METRICS_FILE yet — skipping shape check."
            exit 0
          fi
          jq empty "$METRICS_FILE"
          jq -e 'has("generated_at") and has("rules") and has("summary")' "$METRICS_FILE" >/dev/null
          jq -e '.summary | has("total_rules_tagged") and has("rules_unused_over_8w") and has("rules_bypassed_over_baseline") and has("orphan_rule_ids")' "$METRICS_FILE" >/dev/null
          # Per-rule fields (applied_count/warn_count/fire_count) added for
          # #2866 are validated by scripts/rule-metrics-aggregate.test.sh —
          # not enforced here because the committed artifact lags the
          # aggregator until the first post-merge Sunday run.

  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Regenerate package-lock.json
        working-directory: apps/web-platform
        run: npm install --package-lock-only

      - name: Check lockfile sync
        run: |
          if ! git diff --exit-code apps/web-platform/package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json in apps/web-platform/."
            echo "::error::Run 'npm install' in apps/web-platform/ and commit the updated package-lock.json."
            exit 1
          fi

  # next build runs the App Router route-file validator that vitest and `tsc --noEmit`
  # skip — catches non-HTTP exports from `app/**/route.{ts,tsx}` before merge instead
  # of inside the post-merge Docker build (#2347/#2401 outage).
  web-platform-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-platform/package-lock.json

      - name: Install web-platform dependencies
        working-directory: apps/web-platform
        run: npm ci

      - name: Build (next build runs the route-file validator)
        working-directory: apps/web-platform
        run: npm run build

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web-platform dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web-platform

      - name: Type-check web-platform
        run: npx tsc --noEmit
        working-directory: apps/web-platform

      - name: Run tests
        run: bash scripts/test-all.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web-platform dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web-platform

      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('apps/web-platform/bun.lock') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web-platform

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: apps/web-platform

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web-platform

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: apps/web-platform/test-results/
          retention-days: 7

  # Pre-merge variant of the deploy-docs critical-CSS gate. Catches FOUC-class
  # regressions before merge, not after — see AGENTS.md cq-eleventy-critical-css-screenshot-gate.
  # Scoped to docs-touching PRs via detect-changes (see #3624).
  critical-css-gate:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build docs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx @11ty/eleventy

      - name: Validate CSP (hashes + inline event-handler attributes)
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-csp.sh _site

      - name: Validate SEO
        run: bash plugins/soleur/skills/seo-aeo/scripts/validate-seo.sh _site

      - name: Static critical-CSS coverage check
        run: node plugins/soleur/docs/scripts/check-critical-css-coverage.mjs

      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # Cache key MUST track the Playwright npm version (lives in
          # package-lock.json), NOT the consumer script. The cache-hit branch
          # runs only `npx playwright install-deps chromium` (OS deps), not
          # the binary — keying on screenshot-gate.mjs let stale browser
          # binaries persist across Playwright bumps. See #3624.
          key: playwright-critical-css-gate-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + http-server (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          npm install --no-save playwright@1 http-server@14
          npx playwright install --with-deps chromium

      - name: Install Playwright + http-server (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          npm install --no-save playwright@1 http-server@14
          npx playwright install-deps chromium

      - name: Screenshot + stylesheet-swap gates
        run: |
          npx http-server _site -p 8888 -a 127.0.0.1 -c-1 -s &
          SERVER_PID=$!
          UP=0
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:8888/; then UP=1; break; fi
            sleep 0.5
          done
          if [ "$UP" -ne 1 ]; then
            echo "gates: http-server failed to come up within 15s" >&2
            kill $SERVER_PID 2>/dev/null || true
            exit 2
          fi
          set +e
          node plugins/soleur/docs/scripts/screenshot-gate.mjs
          GATE_EXIT=$?
          if [ "$GATE_EXIT" -eq 0 ]; then
            node plugins/soleur/docs/scripts/check-stylesheet-swap.mjs
            GATE_EXIT=$?
          fi
          set -e
          kill $SERVER_PID 2>/dev/null || true
          exit $GATE_EXIT

      - name: Upload screenshot-gate failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshot-gate-failures-pr
          path: screenshot-gate-failures/
          if-no-files-found: ignore
          retention-days: 14
