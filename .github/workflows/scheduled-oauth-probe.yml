# Synthetic OAuth probe: detects sign-in regressions before users hit them.
# Probes prod public auth surface every 15 minutes and pages ops on failure.
# Pattern: scheduled-cf-token-expiry-check.yml (issue file/comment dedup) +
# scheduled-terraform-drift.yml (notify-ops-email integration).
#
# Security: all untrusted values (probe outputs) flow through env: vars before
# being interpolated into run: shells. No github.event.* inputs are consumed.
#
# See: knowledge-base/engineering/ops/runbooks/oauth-probe-failure.md
# Closes #2997.

name: "Scheduled: OAuth Probe"

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: scheduled-oauth-probe
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Required so the `Email notification (failure)` step below can resolve
      # `./.github/actions/notify-ops-email`. Without this, the runner workspace
      # is empty and the local-path action lookup fails with
      # `Can't find 'action.yml' under .github/actions/notify-ops-email`.
      # Sparse: the only repo path consumed at runtime is `.github/actions/`;
      # cone-mode disabled so the nested path matches as a literal subdirectory.
      - name: Checkout (for local composite action)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: |
            .github/actions
          sparse-checkout-cone-mode: false
      - id: probe
        env:
          APP_HOST: app.soleur.ai
          API_HOST: api.soleur.ai
          # Supabase /auth/v1/settings requires the anon key. The
          # NEXT_PUBLIC_* anon key is shipped in the client bundle so
          # exposing it to the workflow is no broader leak than its
          # baseline scope. Still mask via secret to keep logs clean.
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # GitHub App user-OAuth client_id (Iv23...). Used to probe each
          # registered callback URL against GitHub's /login/oauth/authorize.
          # Prefix is OAUTH_PROBE_ because GitHub rejects repo secrets
          # starting with GITHUB_ (HTTP 422 from the secrets API).
          # Stored as a workflow secret to avoid hardcoding even though the
          # client_id is public — keeps PR/log surfaces clean.
          OAUTH_PROBE_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_PROBE_GITHUB_CLIENT_ID }}
          # 20-char Supabase project ref ([a-z0-9]{20}) for the canonical
          # supabase.co fallback URL. Set via gh secret set from
          # Doppler prd.NEXT_PUBLIC_SUPABASE_URL after CNAME deref. Probe
          # cross-checks this against a live `dig CNAME api.soleur.ai`
          # at runtime to catch silent project re-provisioning.
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -uo pipefail
          # Note: NOT set -e — we collect failure mode and emit it as output.

          fail_mode=""
          fail_detail=""

          record_failure() {
            if [[ -z "$fail_mode" ]]; then
              fail_mode="$1"
              fail_detail="$2"
            fi
          }

          # strip_log_injection — defense against log-annotation forgery via
          # values echoed into ::error::/::warning:: or $GITHUB_OUTPUT. Strips
          # CR/LF (\r\n), form-feed/vertical-tab/DEL (\f\v\x7f), NEL (\x85),
          # and the Unicode line/paragraph/zwsp/bom separators U+2028, U+2029,
          # U+200B, U+FEFF. Bash ${var//[$'…']/} does NOT reliably cover
          # multi-byte UTF-8 sequences (verified on bash 5.2); use tr+sed.
          # See: knowledge-base/project/learnings/security-issues/2026-04-17-log-injection-unicode-line-separators.md
          strip_log_injection() {
            printf '%s' "$1" | tr -d '\r\n\f\v\x7f\x85' \
              | sed -E 's/\xe2\x80\xa8//g; s/\xe2\x80\xa9//g; s/\xe2\x80\x8b//g; s/\xef\xbb\xbf//g'
          }

          # check_redirect <provider> <expected_host> — probes a Supabase
          # OAuth /authorize endpoint and asserts the 302 lands on the
          # expected provider host. Sets fail_mode/fail_detail on miss.
          # NOTE: uses GET (not HEAD/-sI) — Supabase Auth's /authorize
          # rejects HEAD with 405 (Allow: GET).
          check_redirect() {
            local provider="$1" expected="$2"
            local url line http redirect redirect_host
            url="https://${API_HOST}/auth/v1/authorize?provider=${provider}&redirect_to=https%3A%2F%2F${APP_HOST}%2Fcallback"
            # Default curl does NOT follow redirects (no -L), so the 302
            # Location lands in %{redirect_url} without an extra hop.
            line=$(curl -s --max-time 10 --max-redirs 0 -o /dev/null \
              -w '%{http_code} %{redirect_url}' "$url" 2>/dev/null) || line="network_error"
            if [[ "$line" == "network_error" ]]; then
              record_failure "network_error" \
                "GET ${url} -> curl error (DNS, TLS, or connect failure)"
              return
            fi
            http=${line%% *}
            redirect=${line#* }
            redirect_host=$(printf '%s' "$redirect" | awk -F/ '{print $3}')
            if [[ "$http" != "302" || "$redirect_host" != "$expected" ]]; then
              record_failure "${provider}_authorize" \
                "GET ${url} -> HTTP ${http}, redirect_host=${redirect_host}"
            fi
          }

          # 1. /login is reachable
          code=$(curl -s --max-time 10 -o /dev/null -w '%{http_code}' \
            "https://${APP_HOST}/login" 2>/dev/null) || code="network_error"
          if [[ "$code" == "network_error" ]]; then
            record_failure "network_error" \
              "GET https://${APP_HOST}/login -> curl error"
          elif [[ "$code" != "200" ]]; then
            record_failure "login_unreachable" \
              "GET https://${APP_HOST}/login -> HTTP ${code}"
          fi

          # 2. Google OAuth redirect lands on accounts.google.com
          [[ -z "$fail_mode" ]] && check_redirect "google" "accounts.google.com"

          # 3. GitHub OAuth redirect lands on github.com
          [[ -z "$fail_mode" ]] && check_redirect "github" "github.com"

          # 3b. Probe each registered GitHub App callback URL against
          # GitHub's /login/oauth/authorize and assert it is still
          # associated with our App (Iv23...). Healthy state: HTTP 200 +
          # body does NOT contain "redirect_uri is not associated".
          # Both healthy and failing states return HTTP 200 — the body
          # grep is load-bearing.
          # See: docs.github.com/.../troubleshooting-authorization-request-errors
          # See: knowledge-base/project/learnings/integration-issues/2026-05-04-github-app-callback-url-three-entries.md
          # See: knowledge-base/engineering/ops/runbooks/github-app-callback-audit.md
          probe_github_redirect_uri() {
            local label="$1" redirect_uri="$2"
            local url http body_file
            local redirect_uri_safe
            redirect_uri_safe=$(strip_log_injection "$redirect_uri")

            # URL-encode via jq (no awk/printf escape traps). State omitted —
            # probe never completes the callback round-trip.
            local enc
            enc=$(jq -nr --arg u "$redirect_uri" '$u|@uri')
            url="https://github.com/login/oauth/authorize?client_id=${OAUTH_PROBE_GITHUB_CLIENT_ID}&redirect_uri=${enc}"

            # Tmpfile pattern (matches the /auth/v1/settings probe below).
            # -L follows the GitHub /login redirect for unauthenticated
            # callers; the error page renders BEFORE the login form when
            # redirect_uri is bad, so -L safely captures both code paths.
            # User-Agent identifies the probe so GitHub can rate-limit
            # politely if it ever needs to.
            body_file=$(mktemp)
            # shellcheck disable=SC2064
            trap "rm -f '$body_file'" RETURN
            http=$(curl --max-time 10 -L -s -o "$body_file" \
              -H "User-Agent: soleur-oauth-probe/1.0" \
              -w '%{http_code}' \
              "$url" 2>/dev/null) || {
              record_failure "github_oauth_${label}_network" \
                "GET .../authorize for redirect_uri=${redirect_uri_safe} -> curl error (DNS, TLS, or connect; see runbook)"
              return
            }

            if [[ "$http" != "200" ]]; then
              record_failure "github_oauth_${label}_http" \
                "GET .../authorize for ${redirect_uri_safe} -> HTTP ${http} (see runbook)"
              return
            fi
            if grep -q "redirect_uri is not associated" "$body_file"; then
              record_failure "github_oauth_${label}_unregistered" \
                "GitHub rejected redirect_uri=${redirect_uri_safe} — operator must add this URL verbatim to the GitHub App callback list (see runbook)"
              return
            fi
            if grep -q "Application suspended" "$body_file"; then
              record_failure "github_app_suspended" \
                "GitHub App for the probe's client_id is suspended — every GitHub auth flow breaks until reinstated (see runbook)"
              return
            fi
            # Positive proof: a healthy authorize page contains GitHub-
            # specific anchors. Generic <form/Authorize substrings are too
            # permissive (GitHub rate-limit / abuse pages also contain
            # <form). Match the authenticity_token input or the explicit
            # GitHub copy. Both-missing = GitHub HTML reworded; treat as
            # drift rather than silent-pass.
            if ! grep -qE 'name="authenticity_token"|Sign in to GitHub|Authorize [A-Z]' "$body_file"; then
              record_failure "github_oauth_${label}_html_drift" \
                "Authorize response for ${redirect_uri_safe} lacked GitHub-specific anchors (authenticity_token / Sign in to GitHub / Authorize <App>) — GitHub may have reworded the page; refresh sentinels in oauth-probe-contract.test.ts (see runbook)"
              return
            fi
          }

          # End-to-end probe of the Supabase Flow A shape — the URL real
          # users hit when they click "Continue with GitHub" on /signup.
          # The 3-URL in-isolation probe above checks each callback URL
          # alone, but Supabase 302s to GitHub with redirect_to AND
          # redirect_uri together; a drift that only manifests in that
          # combined shape (issue #3183) goes unobserved by the in-isolation
          # probe. This probe captures the Supabase 302, re-issues the
          # exact GitHub URL with -L, and asserts no rejection sentinel.
          # NOTE: NO cookies between legs — Supabase sets a transient `sb-`
          # cookie that can change GitHub's response surface if persisted.
          # All inputs are env-vars (APP_HOST, API_HOST) or sanitized via
          # strip_log_injection before any echo/record_failure interpolation.
          probe_github_supabase_shape_e2e() {
            local redirect_to="$1"
            local supabase_url enc line http redirect_url body_file
            local redirect_uri_safe
            redirect_uri_safe=$(strip_log_injection "$redirect_to")

            enc=$(jq -nr --arg u "$redirect_to" '$u|@uri')
            supabase_url="https://${API_HOST}/auth/v1/authorize?provider=github&redirect_to=${enc}"

            # Leg 1 — capture Supabase 302 location.
            line=$(curl -s --max-time 10 --max-redirs 0 -o /dev/null \
              -w '%{http_code} %{redirect_url}' "$supabase_url" 2>/dev/null) \
              || line="network_error"
            if [[ "$line" == "network_error" ]]; then
              record_failure "github_oauth_supabase_shape_e2e_network" \
                "GET ${supabase_url} -> curl error (DNS, TLS, or connect; see runbook)"
              return
            fi
            http=${line%% *}
            redirect_url=${line#* }
            if [[ "$http" != "302" ]]; then
              record_failure "github_oauth_supabase_shape_e2e_network" \
                "Supabase /auth/v1/authorize for redirect_to=${redirect_uri_safe} -> HTTP ${http} (see runbook)"
              return
            fi

            # Leg 2 — fresh curl, follow into GitHub authorize page.
            body_file=$(mktemp)
            # shellcheck disable=SC2064
            trap "rm -f '$body_file'" RETURN
            http=$(curl --max-time 10 -L -s -o "$body_file" \
              -H "User-Agent: soleur-oauth-probe/1.0" \
              -w '%{http_code}' \
              "$redirect_url" 2>/dev/null) || {
              record_failure "github_oauth_supabase_shape_e2e_network" \
                "Follow Supabase 302 for redirect_to=${redirect_uri_safe} -> curl error (see runbook)"
              return
            }
            if [[ "$http" != "200" ]]; then
              record_failure "github_oauth_supabase_shape_e2e_network" \
                "Follow Supabase 302 for redirect_to=${redirect_uri_safe} -> HTTP ${http} (see runbook)"
              return
            fi
            if grep -q "redirect_uri is not associated" "$body_file"; then
              record_failure "github_oauth_supabase_shape_e2e_unregistered" \
                "GitHub rejected user-shape redirect_uri (Supabase Flow A) for redirect_to=${redirect_uri_safe} — operator must audit GitHub App callback list (see runbook)"
              return
            fi
            if grep -q "Application suspended" "$body_file"; then
              record_failure "github_app_suspended" \
                "GitHub App for the probe's client_id is suspended (detected via Supabase shape) — every GitHub auth flow breaks until reinstated (see runbook)"
              return
            fi
            if ! grep -qE 'name="authenticity_token"|Sign in to GitHub|Authorize [A-Z]' "$body_file"; then
              record_failure "github_oauth_supabase_shape_e2e_html_drift" \
                "Supabase-shape authorize response for redirect_to=${redirect_uri_safe} lacked GitHub-specific anchors — refresh sentinels in oauth-probe-contract.test.ts (see runbook)"
              return
            fi
          }

          # Skip the new probes gracefully when secrets are unset (e.g.,
          # on a repo fork or before the first `gh secret set`). Each
          # missing secret records a distinct failure mode so the operator
          # knows which `gh secret set` to run.
          if [[ -z "$fail_mode" ]]; then
            if [[ -z "${OAUTH_PROBE_GITHUB_CLIENT_ID:-}" ]]; then
              record_failure "github_client_id_probe_unset" \
                "OAUTH_PROBE_GITHUB_CLIENT_ID secret is not set — cannot probe GitHub App callback URL registration (see runbook)"
            elif [[ -z "${SUPABASE_PROJECT_REF:-}" ]]; then
              record_failure "supabase_project_ref_unset" \
                "SUPABASE_PROJECT_REF secret is not set — cannot probe canonical supabase.co callback URL (see runbook)"
            else
              # 3c. SUPABASE_PROJECT_REF integrity — derive at runtime via
              # CNAME deref of api.soleur.ai and assert byte-equality with
              # the stored secret. Catches silent Supabase project re-
              # provisioning (region migration, restore-from-backup) where
              # the static secret would otherwise probe a phantom URL.
              # `dig` pinned per cq-when-a-plan-prescribes-dig... rule.
              cname_ref=$(dig +time=3 +tries=2 +short CNAME "${API_HOST}" 2>/dev/null \
                | sed -E 's/\.supabase\.co\.?$//' \
                | head -1)
              if [[ -z "$cname_ref" ]]; then
                # CNAME deref failed (network, DNS, custom domain unwound).
                # Fall back to the secret — better than no probe.
                cname_ref="${SUPABASE_PROJECT_REF}"
              fi
              if [[ "$cname_ref" != "${SUPABASE_PROJECT_REF}" ]]; then
                cname_ref_safe=$(strip_log_injection "$cname_ref")
                record_failure "supabase_project_ref_drift" \
                  "dig CNAME ${API_HOST} resolved ref=${cname_ref_safe} but workflow secret SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF} — re-run gh secret set or investigate Supabase re-provision (see runbook)"
              fi

              # 3d. github-resolve callback (Flow B — App-direct OAuth)
              [[ -z "$fail_mode" ]] && probe_github_redirect_uri "github_resolve" \
                "https://${APP_HOST}/api/auth/github-resolve/callback"

              # 3e. Supabase custom-domain callback (Flow A primary)
              [[ -z "$fail_mode" ]] && probe_github_redirect_uri "supabase_custom" \
                "https://${API_HOST}/auth/v1/callback"

              # 3f. Supabase canonical callback (Flow A fallback during
              # custom-domain CNAME re-provisioning — see Supabase docs
              # on custom-domain dual-registration)
              [[ -z "$fail_mode" ]] && probe_github_redirect_uri "supabase_canonical" \
                "https://${SUPABASE_PROJECT_REF}.supabase.co/auth/v1/callback"

              # 3g. User-shape end-to-end probe — exercises the actual
              # Supabase 302 → GitHub authorize URL combination that real
              # users hit. The 3-URL in-isolation probe (3d/3e/3f) cannot
              # detect a drift that only manifests when redirect_to AND
              # redirect_uri are sent together (Supabase Flow A shape).
              # Closes the H_C gate-detection gap from issue #3183.
              [[ -z "$fail_mode" ]] && probe_github_supabase_shape_e2e "https://${APP_HOST}/callback"
            fi
          fi

          # 4. /auth/v1/settings exposes google + github as enabled.
          # Requires the Supabase anon `apikey` header — without it the
          # endpoint returns 401 with `external: { google: null }`.
          # The anon key is public (NEXT_PUBLIC_*) so passing it via
          # an env var is safe; we still mark it `***` in logs.
          if [[ -z "$fail_mode" ]]; then
            if [[ -z "${SUPABASE_ANON_KEY:-}" ]]; then
              record_failure "settings_misconfigured" \
                "SUPABASE_ANON_KEY secret is not set on the workflow"
            else
              tmp=$(mktemp)
              trap 'rm -f "$tmp"' EXIT
              http=$(curl -s --max-time 10 -o "$tmp" -w '%{http_code}' \
                -H "apikey: ${SUPABASE_ANON_KEY}" \
                "https://${API_HOST}/auth/v1/settings" 2>/dev/null) || http="network_error"
              if [[ "$http" == "network_error" ]]; then
                record_failure "network_error" \
                  "GET https://${API_HOST}/auth/v1/settings -> curl error"
              elif [[ "$http" != "200" ]]; then
                record_failure "settings_http" \
                  "GET https://${API_HOST}/auth/v1/settings -> HTTP ${http}"
              elif ! jq -e . "$tmp" >/dev/null 2>&1; then
                record_failure "settings_invalid_json" \
                  "GET https://${API_HOST}/auth/v1/settings -> non-JSON body (HTTP ${http})"
              else
                for prov in google github; do
                  enabled=$(jq -r --arg p "$prov" '.external[$p] // false' "$tmp")
                  if [[ "$enabled" != "true" ]]; then
                    record_failure "settings_provider_disabled" \
                      "external.${prov}=${enabled}"
                    break
                  fi
                done
              fi
            fi
          fi

          # 5. /callback?error=access_denied 302s to /login?error=oauth_cancelled.
          # Closes the regression class from the 2026-04-29 demo failure
          # where a user who cancelled OAuth landed on /login?error=auth_failed
          # with the wrong "try email instead" copy. The route now classifies
          # provider errors before the `if (code)` block; this probe asserts
          # the redirect path. Uses APP_HOST from the env: block (no untrusted
          # input — same pattern as check_redirect above).
          if [[ -z "$fail_mode" ]]; then
            cb_url="https://${APP_HOST}/callback?error=access_denied"
            cb_line=$(curl -s --max-time 10 --max-redirs 0 -o /dev/null \
              -w '%{http_code} %{redirect_url}' "$cb_url" 2>/dev/null) || cb_line="network_error"
            if [[ "$cb_line" == "network_error" ]]; then
              record_failure "network_error" \
                "GET ${cb_url} -> curl error"
            else
              cb_http=${cb_line%% *}
              cb_redirect=${cb_line#* }
              # Accept both 302 and 307 (NextResponse.redirect emits 307 by default).
              if [[ "$cb_http" != "302" && "$cb_http" != "307" ]] || \
                 [[ "$cb_redirect" != *"/login?error=oauth_cancelled"* ]]; then
                record_failure "callback_error_passthrough" \
                  "GET ${cb_url} -> HTTP ${cb_http}, redirect=${cb_redirect}"
              fi
            fi
          fi

          # Sanitize for $GITHUB_OUTPUT — strip CR/LF + Unicode line/paragraph
          # separators (U+2028/U+2029) that could break the key=value contract
          # or forge ::warning:: annotations. Use tr for byte-class portability;
          # bash's "${var//[$'…']/}" pattern doesn't reliably cover U+2028/9.
          # Sanitise both fail_mode (defensive — current values are
          # hardcoded literals but a future contributor might interpolate)
          # and fail_detail before writing to $GITHUB_OUTPUT. Uses the
          # shared strip_log_injection helper.
          fail_mode_safe=$(strip_log_injection "$fail_mode")
          fail_detail_safe=$(strip_log_injection "$fail_detail")
          {
            echo "failure_mode=${fail_mode_safe}"
            echo "failure_detail=${fail_detail_safe}"
          } >> "$GITHUB_OUTPUT"

          if [[ -n "$fail_mode_safe" ]]; then
            echo "::warning::OAuth probe failed: ${fail_mode_safe} — ${fail_detail_safe}"
          else
            echo "OAuth probe passed."
          fi

      - name: File or comment on tracking issue (failure)
        if: steps.probe.outputs.failure_mode != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FAIL_MODE: ${{ steps.probe.outputs.failure_mode }}
          FAIL_DETAIL: ${{ steps.probe.outputs.failure_detail }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUNBOOK_URL: ${{ github.server_url }}/${{ github.repository }}/blob/main/knowledge-base/engineering/ops/runbooks/oauth-probe-failure.md
        run: |
          set -euo pipefail

          ISSUE_TITLE="[ci/auth-broken] Synthetic OAuth probe failed"
          ISSUE_SEARCH='in:title "[ci/auth-broken] Synthetic OAuth probe failed"'

          # Pre-create the label defensively (idempotent).
          gh label create "ci/auth-broken" --repo "$GH_REPO" \
            --description "Synthetic CI probe detected an auth-flow regression" \
            --color "B60205" 2>/dev/null || true

          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Build body via printf to avoid heredoc-leading-whitespace traps
          # (4+ leading spaces would render the body as a code block).
          BODY_FILE=$(mktemp)
          trap 'rm -f "$BODY_FILE"' EXIT
          {
            printf '## Synthetic OAuth probe failed\n\n'
            printf -- '- **Failure mode:** `%s`\n' "$FAIL_MODE"
            printf -- '- **Detail:** %s\n' "$FAIL_DETAIL"
            printf -- '- **Detected at:** %s\n' "$NOW"
            printf -- '- **Run log:** %s\n\n' "$RUN_URL"
            # When the failure is a callback-URL drift (or App suspension),
            # inline the required-list so the operator can compute the diff
            # without fetching the runbook. The list is the canonical
            # source-of-truth from github-app-callback-audit.md.
            case "$FAIL_MODE" in
              github_oauth_*_unregistered|github_app_suspended)
                printf '### Required GitHub App callback URLs\n\n'
                printf 'The App `soleur-ai` (client_id `Iv23li9p88M5ZxYv1b7V`) MUST have ALL THREE of these registered:\n\n'
                printf '```text\n'
                printf 'https://app.soleur.ai/api/auth/github-resolve/callback\n'
                printf 'https://api.soleur.ai/auth/v1/callback\n'
                printf 'https://ifsccnjhymdmidffkzhl.supabase.co/auth/v1/callback\n'
                printf '```\n\n'
                printf 'Audit at: https://github.com/organizations/jikig-ai/settings/apps/soleur-ai\n\n'
                ;;
            esac
            printf '### What to do\n\nSee [oauth-probe-failure.md runbook](%s).\n\n' "$RUNBOOK_URL"
            printf '**Tracks:** #2997\n'
          } > "$BODY_FILE"

          EXISTING=$(gh issue list --repo "$GH_REPO" --state open \
            --search "$ISSUE_SEARCH" \
            --json number --jq '.[0].number // empty')

          if [[ -n "$EXISTING" ]]; then
            echo "Existing tracking issue #$EXISTING — adding comment."
            gh issue comment "$EXISTING" --repo "$GH_REPO" \
              --body "Probe failed again at ${NOW} — \`${FAIL_MODE}\`: ${FAIL_DETAIL}. Run: ${RUN_URL}"
          else
            gh issue create --repo "$GH_REPO" \
              --title "$ISSUE_TITLE" \
              --label "ci/auth-broken" \
              --label "priority/p1-high" \
              --body-file "$BODY_FILE"
          fi

      - name: Email notification (failure)
        if: steps.probe.outputs.failure_mode != ''
        uses: ./.github/actions/notify-ops-email
        with:
          subject: "[Soleur Ops] OAuth probe failure: ${{ steps.probe.outputs.failure_mode }}"
          body: |
            <p><strong>Failure mode:</strong> ${{ steps.probe.outputs.failure_mode }}</p>
            <p><strong>Detail:</strong> ${{ steps.probe.outputs.failure_detail }}</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Run log</a></p>
            <p>Runbook: <a href="https://github.com/${{ github.repository }}/blob/main/knowledge-base/engineering/ops/runbooks/oauth-probe-failure.md">oauth-probe-failure.md</a></p>
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      - name: Auto-close stale issue (probe green)
        if: steps.probe.outputs.failure_mode == ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          ISSUE_SEARCH='in:title "[ci/auth-broken] Synthetic OAuth probe failed"'
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          STALE=$(gh issue list --repo "$GH_REPO" --state open \
            --search "$ISSUE_SEARCH" \
            --json number --jq '.[0].number // empty')

          if [[ -n "$STALE" ]]; then
            echo "Closing stale tracking issue #$STALE."
            gh issue close "$STALE" --repo "$GH_REPO" \
              --comment "Probe green at ${NOW}. All checks passed (login HTTP 200, google+github authorize 302, settings JSON valid, all 3 GitHub App callback URLs registered, Supabase user-shape e2e green, callback-error pass-through). Run: ${RUN_URL}"
          else
            echo "No stale tracking issue to close."
          fi
