# Security: DOPPLER_TOKEN from repository secrets provides Terraform credentials
# via `doppler run --name-transformer tf-var`. R2 backend credentials are extracted
# separately via `doppler secrets get --plain` (not through --name-transformer,
# which would convert them to TF_VAR_* format and break S3 auth).
# Plan output is sanitized before posting to GitHub issues.
# All action references are SHA-pinned.
# Trigger: the twice-daily fire (06:00/18:00 UTC) is now Inngest-dispatched via
# apps/web-platform/server/inngest/functions/cron-terraform-drift.ts (workflow_dispatch),
# NOT a GitHub Actions `schedule:` trigger. Inngest is the single scheduling
# substrate (ADR-033); this removes GHA scheduled-dispatch jitter at its source.
# terraform still runs HERE in the ephemeral runner (the Inngest fn only dispatches).
# To test manually: gh workflow run scheduled-terraform-drift.yml
name: Terraform Drift Detection

on:
  workflow_dispatch:

concurrency:
  group: terraform-drift
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  TERRAFORM_VERSION: "1.10.5"

jobs:
  drift-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        directory:
          - apps/web-platform/infra
          # infra/github (#5780, CTO B-2): scheduled drift detection for the
          # GitHub branch-protection ruleset, incl. the new merge_queue rule.
          # A queue silently removed/mangled outside Terraform (provider 6.x
          # nested-block history) would leave the stall probe blind (no entries
          # -> nothing to detect), so `terraform plan` here is the real drift
          # detector. Authenticates identically to apply-github-infra.yml:
          # Doppler prd_terraform (App-auth TF_VAR_github_app_* + R2 backend
          # creds) via --name-transformer tf-var. infra/github declares no
          # ssh_key_path variable, so the CI-SSH-key VAR_ARGS guard below skips
          # it automatically.
          - infra/github
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # CRITICAL: terraform_wrapper must be false for -detailed-exitcode.
      # The wrapper converts exit code 2 to 1 (setup-terraform #152, #9).
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Generate CI SSH key
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_ssh_key -N "" -q
          printf 'CI_SSH_PUB=%s\n' "/tmp/ci_ssh_key.pub" >> "$GITHUB_ENV"

      - name: Extract backend credentials
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          KEY_ID=$(doppler secrets get AWS_ACCESS_KEY_ID --plain)
          SECRET=$(doppler secrets get AWS_SECRET_ACCESS_KEY --plain)
          printf '::add-mask::%s\n' "$KEY_ID"
          printf '::add-mask::%s\n' "$SECRET"
          printf 'AWS_ACCESS_KEY_ID=%s\n' "$KEY_ID" >> "$GITHUB_ENV"
          printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$SECRET" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ matrix.directory }}

      - name: Terraform plan (drift detection)
        id: plan
        working-directory: ${{ matrix.directory }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
          MATRIX_DIR: ${{ matrix.directory }}
        run: |
          set +e
          VAR_ARGS=()
          if grep -q 'variable "ssh_key_path"' variables.tf 2>/dev/null; then
            VAR_ARGS+=(-var="ssh_key_path=${CI_SSH_PUB}")
          fi
          PLAN_OUTPUT=$(doppler run --name-transformer tf-var -- \
            terraform plan -detailed-exitcode -no-color -input=false \
            "${VAR_ARGS[@]}" 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          printf '%s' "$PLAN_OUTPUT" | head -c 60000 > ${RUNNER_TEMP}/plan-output.txt
          sed -i \
            -e 's/\(token\s*=\s*\)"[^"]*"/\1"***"/gi' \
            -e 's/\(secret\s*=\s*\)"[^"]*"/\1"***"/gi' \
            -e 's/\(password\s*=\s*\)"[^"]*"/\1"***"/gi' \
            ${RUNNER_TEMP}/plan-output.txt

          STACK_NAME=$(echo "$MATRIX_DIR" | sed 's|apps/||;s|/infra||')
          echo "stack_name=$STACK_NAME" >> "$GITHUB_OUTPUT"

          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "No drift detected in $STACK_NAME"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "::warning::Drift detected in $STACK_NAME"
          else
            echo "::error::Terraform plan failed in $STACK_NAME (exit $EXIT_CODE)"
          fi

      - name: Ensure infra-drift label exists
        if: steps.plan.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create "infra-drift" --description "Terraform detected infrastructure drift" --color "D93F0B" 2>/dev/null || true

      - name: Create or update drift issue
        if: steps.plan.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ github.token }}
          STACK_NAME: ${{ steps.plan.outputs.stack_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TITLE="infra: drift detected in ${STACK_NAME}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          EXISTING=$(gh issue list --label "infra-drift" --state open \
            --limit 100 \
            --json number,title \
            --jq ".[] | select(.title == \"${TITLE}\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            {
              echo "Drift still present as of ${TIMESTAMP}."
              echo ""
              echo "<details><summary>Plan output</summary>"
              echo ""
              echo '```'
              cat ${RUNNER_TEMP}/plan-output.txt
              echo '```'
              echo ""
              echo "</details>"
            } > /tmp/issue-body.md
            gh issue comment "$EXISTING" --body-file /tmp/issue-body.md
            echo "Updated existing issue #$EXISTING"
          else
            {
              echo "## Drift Detected"
              echo ""
              echo "**Stack:** \`${STACK_NAME}\`"
              echo "**Detected:** ${TIMESTAMP}"
              echo "**Workflow:** [Run #${RUN_NUMBER}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID})"
              echo ""
              echo "Terraform \`plan -detailed-exitcode\` returned exit code 2, indicating infrastructure has drifted from the Terraform state."
              echo ""
              echo "<details><summary>Plan output</summary>"
              echo ""
              echo '```'
              cat ${RUNNER_TEMP}/plan-output.txt
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              echo "## Next Steps"
              echo ""
              echo "1. Review the plan output above"
              echo "2. If the drift is intentional, run \`terraform apply\` locally to update state"
              echo "3. If the drift is unintentional, revert the manual change"
              echo "4. Close this issue when resolved"
              echo ""
              echo "_Auto-created by the [terraform-drift workflow](${SERVER_URL}/${REPOSITORY}/actions/workflows/scheduled-terraform-drift.yml)._"
            } > /tmp/issue-body.md
            gh issue create \
              --title "$TITLE" \
              --label "infra-drift" \
              --milestone "Post-MVP / Later" \
              --body-file /tmp/issue-body.md
            echo "Created new drift issue for $STACK_NAME"
          fi

      - name: Prepare email content
        id: email
        if: steps.plan.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
          STACK_NAME: ${{ steps.plan.outputs.stack_name }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          if [[ "$EXIT_CODE" == "2" ]]; then
            SUBJECT="[DRIFT] Infrastructure drift detected in ${STACK_NAME}"
            ALERT_TYPE="Drift Detected"
          else
            SUBJECT="[ERROR] Terraform plan failed for ${STACK_NAME}"
            ALERT_TYPE="Plan Error (exit ${EXIT_CODE})"
          fi

          PLAN_SNIPPET=""
          if [[ -f "${RUNNER_TEMP}/plan-output.txt" ]]; then
            PLAN_SNIPPET=$(head -c 4000 "${RUNNER_TEMP}/plan-output.txt" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          fi

          { echo "<h2>${ALERT_TYPE}: ${STACK_NAME}</h2>"
            echo "<p><strong>Stack:</strong> ${STACK_NAME}<br>"
            echo "<strong>Time:</strong> ${TIMESTAMP}<br>"
            echo "<strong>Run:</strong> <a href=\"${RUN_URL}\">${RUN_URL}</a></p>"
            if [[ -n "$PLAN_SNIPPET" ]]; then
              echo "<details><summary>Plan output (truncated)</summary>"
              echo "<pre>${PLAN_SNIPPET}</pre></details>"
            fi
          } > /tmp/email-body.html

          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"
          { echo "body<<EOFBODY"; cat /tmp/email-body.html; echo "EOFBODY"; } >> "$GITHUB_OUTPUT"

      - name: Email notification (drift/error)
        if: steps.plan.outputs.exit_code != '0'
        uses: ./.github/actions/notify-ops-email
        with:
          subject: ${{ steps.email.outputs.subject }}
          body: ${{ steps.email.outputs.body }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      # Single end-of-job heartbeat check-in via the shared
      # ./.github/actions/sentry-heartbeat composite action.
      # Status branches on `terraform plan -detailed-exitcode`:
      #   exit 0 = clean (no diff)              -> ?status=ok
      #   exit 2 = drift detected (success path -- downstream filer handles
      #            the issue/email)             -> ?status=ok
      #   exit 1 = real error (init/plan failure) -> ?status=error
      - name: Sentry check-in (final)
        if: always()
        continue-on-error: true
        uses: ./.github/actions/sentry-heartbeat
        with:
          monitor-slug: scheduled-terraform-drift
          status: ${{ (steps.plan.outputs.exit_code == '0' || steps.plan.outputs.exit_code == '2') && 'ok' || 'error' }}
          sentry-ingest-domain: ${{ secrets.SENTRY_INGEST_DOMAIN }}
          sentry-project-id: ${{ secrets.SENTRY_PROJECT_ID }}
          sentry-public-key: ${{ secrets.SENTRY_PUBLIC_KEY }}

  # Source-vs-live Better Stack heartbeat reconcile (#6549 item 2). The static
  # heartbeat-reprovision-parity.test.ts proves a feeder exists in SOURCE, but
  # `ignore_changes = [paused]` (plus these resources being untargeted) makes the
  # .tf `paused` value only a LOWER BOUND on live state — a heartbeat live-paused
  # or live-absent is invisible to any source-only test (the #6537 9-days-dark
  # shape). This job READS `GET /api/v2/heartbeats` and reconciles it against the
  # executable MANIFEST; it never unpauses anything. Rides the same twice-daily
  # Inngest dispatch as drift-check (no new schedule/Inngest function).
  heartbeat-live-reconcile:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Doppler CLI
        uses: DopplerHQ/cli-action@5351693ec144fc7f7a2d30025061acfc3c53c47c # v4

      - name: Reconcile live heartbeats
        id: reconcile
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: soleur
          DOPPLER_CONFIG: prd_terraform
        run: |
          set +e
          TOKEN=$(doppler secrets get BETTERSTACK_API_TOKEN_READONLY --plain 2>/dev/null)
          if [[ -n "$TOKEN" ]]; then
            printf '::add-mask::%s\n' "$TOKEN"
          fi
          # The script reads the BETTERSTACK_API_TOKEN env, sourced from the Read-scoped
          # BETTERSTACK_API_TOKEN_READONLY secret in Doppler (least privilege: reconcile only
          # GETs /api/v2/heartbeats). It prints SOLEUR_HEARTBEAT_RECONCILE_* markers, and NEVER
          # echoes the token. Capture stdout+stderr to a file.
          BETTERSTACK_API_TOKEN="$TOKEN" \
            bun plugins/soleur/scripts/reconcile-live-heartbeats.ts \
            > "${RUNNER_TEMP}/reconcile-output.txt" 2>&1
          RC=$?
          set -e
          # Normalize any exit outside the script's own 0/1/2 contract (a bun-level crash: OOM 137,
          # SIGSEGV 139, timeout 124) into the error path. An abnormal crash MUST page, never green
          # the liveness monitor — that is the 9-days-dark failure class this whole job exists to kill.
          if [[ "$RC" != "0" && "$RC" != "1" && "$RC" != "2" ]]; then
            echo "::error::Better Stack heartbeat live-reconcile exited abnormally (rc=$RC)"
            RC=1
          fi
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          cat "${RUNNER_TEMP}/reconcile-output.txt"
          if [[ "$RC" == "2" ]]; then
            echo "::warning::Better Stack heartbeat live-reconcile found a mismatch (see the heartbeat-reconcile-mismatch issue)"
          elif [[ "$RC" == "1" ]]; then
            echo "::error::Better Stack heartbeat live-reconcile errored (auth/token/malformed response)"
          elif grep -q "SOLEUR_HEARTBEAT_RECONCILE_UNREACHABLE" "${RUNNER_TEMP}/reconcile-output.txt"; then
            echo "::warning::Better Stack unreachable after retries — reconcile skipped this run (no page)"
          fi

      - name: Ensure heartbeat-reconcile-mismatch label exists
        if: steps.reconcile.outputs.rc == '2'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create "heartbeat-reconcile-mismatch" --description "Better Stack heartbeat live-reconcile mismatch (source vs live)" --color "5319E7" 2>/dev/null || true

      - name: Create or update reconcile issue
        id: reconcile_issue
        if: steps.reconcile.outputs.rc == '2'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TITLE="infra: Better Stack heartbeat live-reconcile mismatch"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          # Only the structured markers reach the issue body (the script never emits the token).
          MARKERS=$(grep -E '^SOLEUR_HEARTBEAT_RECONCILE_' "${RUNNER_TEMP}/reconcile-output.txt" || true)

          EXISTING=$(gh issue list --label "heartbeat-reconcile-mismatch" --state open \
            --limit 100 \
            --json number,title \
            --jq ".[] | select(.title == \"${TITLE}\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            {
              echo "Mismatch still present as of ${TIMESTAMP}."
              echo ""
              echo "<details><summary>Reconcile markers</summary>"
              echo ""
              echo '```'
              echo "$MARKERS"
              echo '```'
              echo ""
              echo "</details>"
            } > /tmp/reconcile-body.md
            # Escalate (re-email) when a NEW mismatched heartbeat appears while the issue is already
            # open — a real regression must not hide silently under the deduped git_data/workspaces
            # issue. Compare current marker names against everything already recorded on the issue.
            CUR_NAMES=$(printf '%s\n' "$MARKERS" | grep -oE 'name=[^ ]+' | sort -u || true)
            PRIOR=$(gh issue view "$EXISTING" --json body,comments \
              --jq '.body + " " + ([.comments[].body] | join(" "))' 2>/dev/null || true)
            ESCALATE=false
            while IFS= read -r n; do
              [[ -z "$n" ]] && continue
              printf '%s' "$PRIOR" | grep -qF "$n" || ESCALATE=true
            done <<< "$CUR_NAMES"
            gh issue comment "$EXISTING" --body-file /tmp/reconcile-body.md
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "escalate=$ESCALATE" >> "$GITHUB_OUTPUT"
            echo "Updated existing reconcile issue #$EXISTING (escalate=$ESCALATE)"
          else
            {
              echo "## Better Stack heartbeat live-reconcile mismatch"
              echo ""
              echo "**Detected:** ${TIMESTAMP}"
              echo "**Workflow:** [Run #${RUN_NUMBER}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID})"
              echo ""
              echo "The nightly source-vs-live reconcile found a heartbeat whose LIVE Better Stack"
              echo "state diverges from the executable MANIFEST — a state the static parity guard"
              echo "cannot see. Each marker discriminates the class:"
              echo ""
              echo "- \`reason=fed-but-paused\` — a fed heartbeat is \`paused\` live (the #6537 shape)."
              echo "- \`reason=absent-live\` — a non-count-gated heartbeat is missing live (the #6548 \`git_data\` shape)."
              echo ""
              echo "<details><summary>Reconcile markers</summary>"
              echo ""
              echo '```'
              echo "$MARKERS"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              echo "## Next Steps"
              echo ""
              echo "1. For \`fed-but-paused\`: verify a real ping lands, then unpause via the Better Stack UI/API (#6210 — never unpause an unfed monitor)."
              echo "2. For \`absent-live\`: disposition the heartbeat — build its feeder or delete the monitor (the #6548 build-vs-delete call)."
              echo "3. Close this issue when every listed heartbeat reconciles; the reconcile re-opens it if a mismatch recurs."
              echo ""
              echo "_Auto-created by the [terraform-drift workflow](${SERVER_URL}/${REPOSITORY}/actions/workflows/scheduled-terraform-drift.yml) heartbeat-live-reconcile job._"
            } > /tmp/reconcile-body.md
            gh issue create \
              --title "$TITLE" \
              --label "heartbeat-reconcile-mismatch" \
              --milestone "Post-MVP / Later" \
              --body-file /tmp/reconcile-body.md
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "escalate=false" >> "$GITHUB_OUTPUT"
            echo "Created new reconcile-mismatch issue"
          fi

      - name: Prepare reconcile email content
        id: reconcile_email
        # Creation-only for a mismatch (avoid twice-daily spam while a heartbeat awaits
        # disposition); always on a hard error (rc=1).
        if: steps.reconcile.outputs.rc == '1' || steps.reconcile_issue.outputs.created == 'true' || steps.reconcile_issue.outputs.escalate == 'true'
        env:
          RC: ${{ steps.reconcile.outputs.rc }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          MARKERS=$(grep -E '^SOLEUR_HEARTBEAT_RECONCILE_' "${RUNNER_TEMP}/reconcile-output.txt" \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' || true)
          if [[ "$RC" == "1" ]]; then
            SUBJECT="[ERROR] Better Stack heartbeat live-reconcile failed"
            ALERT_TYPE="Reconcile error (auth/token/malformed)"
          else
            SUBJECT="[HEARTBEAT] Better Stack heartbeat live-reconcile mismatch"
            ALERT_TYPE="Live-reconcile mismatch"
          fi
          { echo "<h2>${ALERT_TYPE}</h2>"
            echo "<p><strong>Time:</strong> ${TIMESTAMP}<br>"
            echo "<strong>Run:</strong> <a href=\"${RUN_URL}\">${RUN_URL}</a></p>"
            echo "<pre>${MARKERS}</pre>"
          } > /tmp/reconcile-email.html
          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"
          { echo "body<<EOFBODY"; cat /tmp/reconcile-email.html; echo "EOFBODY"; } >> "$GITHUB_OUTPUT"

      - name: Email notification (reconcile)
        if: steps.reconcile.outputs.rc == '1' || steps.reconcile_issue.outputs.created == 'true' || steps.reconcile_issue.outputs.escalate == 'true'
        uses: ./.github/actions/notify-ops-email
        with:
          subject: ${{ steps.reconcile_email.outputs.subject }}
          body: ${{ steps.reconcile_email.outputs.body }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}

      # Single end-of-job liveness check-in. Status mirrors the drift job:
      #   rc 0 (OK/UNREACHABLE) or rc 2 (mismatch — the issue/email are the signal) -> ok
      #   rc 1 (real error)                                                          -> error
      - name: Sentry check-in (final)
        if: always()
        continue-on-error: true
        uses: ./.github/actions/sentry-heartbeat
        with:
          monitor-slug: scheduled-heartbeat-reconcile
          status: ${{ (steps.reconcile.outputs.rc == '0' || steps.reconcile.outputs.rc == '2') && 'ok' || 'error' }}
          sentry-ingest-domain: ${{ secrets.SENTRY_INGEST_DOMAIN }}
          sentry-project-id: ${{ secrets.SENTRY_PROJECT_ID }}
          sentry-public-key: ${{ secrets.SENTRY_PUBLIC_KEY }}
