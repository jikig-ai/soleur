# Twice-weekly content generation from the SEO refresh queue.
# Growth plan fallback topic is scoped to brand positioning.
# Update the STEP 1b topic string if brand-guide.md positioning changes.
# Reads the queue for the highest-priority unwritten topic, generates an article
# via content-writer, creates a distribution file via social-distribute, and
# commits both to main. The existing content-publisher picks up the distribution
# file for automated publishing at 14:00 UTC.
# To test manually: gh workflow run scheduled-content-generator.yml

name: "Scheduled: Content Generator"

on:
  # MIGRATED TO CLOUD SCHEDULED TASK — 2026-03-25 (PR #1095).
  # Silence detection: .github/workflows/scheduled-cloud-task-heartbeat.yml (#2714).
  # Diagnosis/restore runbook: knowledge-base/engineering/ops/runbooks/cloud-scheduled-tasks.md
  # Uncomment schedule to revert to GHA execution.
  # schedule:
  #   - cron: '0 10 * * 2,4'  # Tuesday + Thursday 10:00 UTC
  workflow_dispatch:

concurrency:
  group: schedule-content-generator
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  content-generator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create scheduled-content-generator \
            --description "Automated content generation from SEO queue" \
            --color "0E8A16" 2>/dev/null || true

      - name: Run content generator
        uses: anthropics/claude-code-action@ab8b1e6471c519c585ba17e8ecaccc9d83043541 # v1.0.101
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/jikig-ai/soleur.git'
          plugins: 'soleur@soleur'
          claude_args: '--model claude-sonnet-4-6 --max-turns 50 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task'
          prompt: |
            IMPORTANT: This is an automated CI workflow. The AGENTS.md rule
            Do NOT push directly to main.
            Use the PR-based commit pattern in the MANDATORY FINAL STEP.

            MILESTONE RULE: Every gh issue create command must include --milestone "Post-MVP / Later".

            STEP 1 — Select topic from queue:
            Read knowledge-base/marketing/seo-refresh-queue.md and identify
            the highest-priority item that does NOT have a "generated_date"
            annotation. Priority order: Priority 1 items first, then Priority 2
            pillar content pages, then Priority 2 comparison pages.

            If ALL items already have a generated_date:

              STEP 1b — Discover new topic via growth plan:
              Run /soleur:growth plan "Company-as-a-Service content for solo founders building with AI"
              From the growth plan output, extract the single highest-priority P1
              content suggestion: its topic title and target keywords.

              If growth plan produced no usable P1 topic (e.g., WebSearch failed
              or no relevant results), create a GitHub issue titled
              "[Scheduled] Content Generator - <today's date in YYYY-MM-DD format>"
              with the label "scheduled-content-generator" and body
              "SEO refresh queue exhausted and growth plan fallback produced no
              usable topic. Add more topics to the queue manually." Then stop.

              Use the discovered topic and keywords for STEP 2 below.

            STEP 2 — Generate article:
            Run /soleur:content-writer <topic> --headless
            where <topic> is the title/description of the selected queue item.

            If the content-writer aborts due to FAIL citations, create a GitHub
            issue documenting the failed citations and stop.

            STEP 3 — Generate distribution content:
            Run /soleur:social-distribute <path-to-generated-article> --headless
            This creates a distribution content file in
            knowledge-base/marketing/distribution-content/.

            After the distribution file is created, ensure its frontmatter has:
            - publish_date: <today's date in YYYY-MM-DD format>
            - status: scheduled
            - channels: discord, x, bluesky, linkedin-company

            STEP 4 — Validate:
            Build the site to verify the new article renders correctly:
            ```
            npx @11ty/eleventy
            ```
            If the build fails, do NOT commit. Create a GitHub issue documenting
            the build error and stop.

            Then validate all distribution content URLs against the build output:
            ```
            bash scripts/validate-blog-links.sh _site
            ```
            If any links are broken, do NOT commit. Create a GitHub issue
            documenting the broken links and stop.

            STEP 5 — Record topic in queue:
            If STEP 1b was used (topic was auto-discovered via growth plan):
              Append the discovered topic to
              knowledge-base/marketing/seo-refresh-queue.md under a
              "## Auto-Discovered Topics" section (create if it doesn't exist)
              as a table row:
              | <topic> | <keywords> | growth plan (auto-discovered) | <today's date> |

            If a queue item was used (normal path):
              Edit knowledge-base/marketing/seo-refresh-queue.md and add
              "generated_date: <today's date>" annotation to the queue item
              that was just written. Add it as a note below the item or as
              an additional column in the table row.

            STEP 6 — Create audit issue:
            Create a GitHub issue titled
            "[Scheduled] Content Generator - <today's date in YYYY-MM-DD format>"
            with the label "scheduled-content-generator" summarizing:
            - Topic selected from queue
            - Topic source: growth plan (if STEP 1b) or SEO refresh queue
            - Article path written
            - Distribution file path created
            - Build validation result

            MANDATORY FINAL STEP — persist via PR (do not push directly to main):
            Use the appropriate commit message based on which path was taken:
            - If STEP 1b was used: "feat(content): auto-generate article via growth plan discovery"
            - If a queue item was used: "feat(content): auto-generate article from SEO queue"
            Run these bash commands:
            ```
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            BRANCH="ci/content-gen-$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "<appropriate commit message from above>"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "feat(content): auto-generate article $(date -u +%Y-%m-%d)" \
              --body "Automated commit from content generator workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --squash --auto
            ```

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Content Generator workflow failed'
          body: '<p><strong>Scheduled: Content Generator</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
