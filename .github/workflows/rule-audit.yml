# Bi-weekly audit of always-loaded governance rules (AGENTS.md + constitution.md).
# Counts rules, identifies hook-enforced migration candidates, and creates/updates
# a GitHub issue with findings.
#
# Security: No untrusted user input is used in run: commands.
# All strings are hardcoded or come from safe GitHub context values.
# Uses GITHUB_TOKEN only (no additional secrets except RESEND_API_KEY for email notifications).
#
# Related: #451, #422

name: "Scheduled: Rule Audit"

on:
  schedule:
    - cron: '0 9 1,15 * *'
  workflow_dispatch:

concurrency:
  group: scheduled-rule-audit
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run rule audit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/rule-audit.sh

      # Model-launch drift detection (#5100). audit-models.sh --detect exits 10 on
      # stale config model IDs. On drift, find-or-update ONE idempotent model-drift
      # issue (never a PR — the fix PR is operator-initiated via the skill). The
      # audit output is the only input and is fully hardcoded/derived (no untrusted
      # GitHub event data), so it is safe to embed in the issue body file.
      - name: Detect model drift
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          set +e
          OUT="$(bash plugins/soleur/skills/model-launch-review/scripts/audit-models.sh --detect 2>&1)"
          RC=$?
          set -e
          if [ "$RC" -eq 0 ]; then
            echo "No model drift."
            exit 0
          elif [ "$RC" -ne 10 ]; then
            echo "audit-models.sh exited unexpectedly (rc=$RC); failing step." >&2
            echo "$OUT" >&2
            exit "$RC"
          fi
          # rc=10 → drift; file/update one idempotent model-drift issue.
          gh label create model-drift --color FBCA04 \
            --description "Stale model IDs / pin / pricing drift (model-launch-review)" \
            --force >/dev/null 2>&1 || true
          {
            echo "Stale Anthropic model IDs were detected in config-class files."
            echo
            echo '```'
            echo "$OUT"
            echo '```'
            echo
            echo "Remediation: run \`/soleur:model-launch-review\` (interactive) to auto-fix"
            echo "model-ID swaps into a CI-gated PR and flag pin/pricing/tier-map items."
            echo
            echo "_Filed automatically by rule-audit.yml model-drift detection (#5100)._"
          } > "$RUNNER_TEMP/model-drift-body.md"
          EXISTING="$(gh issue list --label model-drift --state open --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file "$RUNNER_TEMP/model-drift-body.md"
            echo "Updated existing model-drift issue #$EXISTING."
          else
            gh issue create --label model-drift \
              --title "model-drift: stale Anthropic model IDs in config" \
              --body-file "$RUNNER_TEMP/model-drift-body.md"
          fi

      - name: Email notification (failure)
        if: failure()
        uses: ./.github/actions/notify-ops-email
        with:
          subject: '[FAIL] Scheduled: Rule Audit workflow failed'
          body: '<p><strong>Scheduled: Rule Audit</strong> failed.</p><p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>'
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
