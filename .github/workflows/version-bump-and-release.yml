name: Version Bump and Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (escape hatch for manual releases)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2
          token: ${{ github.token }}

      - name: Check if plugin files changed
        id: check_plugin
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Plugin bump forced via workflow_dispatch"
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 -- plugins/soleur/ | head -1)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No plugin files changed, skipping version bump"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Plugin files changed, proceeding with version bump"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}

      - name: Create secure temp files
        if: steps.check_plugin.outputs.changed == 'true'
        id: tmpfiles
        run: |
          echo "pr_body=$(mktemp)" >> "$GITHUB_OUTPUT"
          echo "release_notes=$(mktemp)" >> "$GITHUB_OUTPUT"
          echo "current_tag=$(mktemp)" >> "$GITHUB_OUTPUT"
          echo "gh_err=$(mktemp)" >> "$GITHUB_OUTPUT"

      - name: Find merged PR
        if: steps.check_plugin.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_BODY_FILE: ${{ steps.tmpfiles.outputs.pr_body }}
        run: |
          # Fallback: emit empty PR metadata and use commit message as title
          give_up() {
            local reason="$1"
            echo "::warning::${reason}, using commit message as title"
            echo "number=" >> "$GITHUB_OUTPUT"
            printf 'title=%s\n' "$(echo "$COMMIT_MSG" | head -1 | tr -d '\n\r')" >> "$GITHUB_OUTPUT"
            echo "labels=" >> "$GITHUB_OUTPUT"
            echo "" > "$PR_BODY_FILE"
            echo "body_file=$PR_BODY_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "title=Manual version bump" >> "$GITHUB_OUTPUT"
            echo "labels=" >> "$GITHUB_OUTPUT"
            echo "" > "$PR_BODY_FILE"
            echo "body_file=$PR_BODY_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Primary: Use GitHub API to find PR from merge commit
          # '// empty' ensures jq emits nothing (not "null") when array is empty
          PR_NUM=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || true)

          # Fallback: Parse PR number from title line of squash-merge commit message
          # GitHub appends (#PR_NUMBER) as the last parenthesized ref on the title line
          if [ -z "$PR_NUM" ]; then
            echo "::notice::API lookup returned empty, falling back to commit message parsing"
            PR_NUM=$(echo "$COMMIT_MSG" | head -1 | grep -oP '\(#\K\d+(?=\))' || true)
          fi

          # Guard: ensure PR_NUM is a valid integer
          if [ -n "$PR_NUM" ] && ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "::warning::PR_NUM '$PR_NUM' is not a valid integer"
            PR_NUM=""
          fi

          [ -z "$PR_NUM" ] && give_up "No PR number found"

          # Fetch all PR metadata in a single API call (also validates it's a PR)
          PR_JSON=$(gh pr view "$PR_NUM" --json number,title,labels,body 2>/dev/null) \
            || give_up "#$PR_NUM is not a PR"

          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          printf 'title=%s\n' "$(echo "$PR_JSON" | jq -r '.title' | tr -d '\n\r')" >> "$GITHUB_OUTPUT"
          printf 'labels=%s\n' "$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")' | tr -d '\n\r')" >> "$GITHUB_OUTPUT"
          echo "$PR_JSON" | jq -r '.body // ""' > "$PR_BODY_FILE"
          echo "body_file=$PR_BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Determine bump type
        if: steps.check_plugin.outputs.changed == 'true'
        id: bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_BUMP: ${{ github.event.inputs.bump_type }}
          PR_LABELS: ${{ steps.pr.outputs.labels }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "type=$DISPATCH_BUMP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$PR_LABELS" | grep -q "semver:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "semver:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "semver:patch"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No semver label found on PR, defaulting to patch"
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.check_plugin.outputs.changed == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
          CURRENT_TAG_FILE: ${{ steps.tmpfiles.outputs.current_tag }}
          GH_ERR_FILE: ${{ steps.tmpfiles.outputs.gh_err }}
        run: |
          # Separate "no releases yet" from "API error"
          if ! gh release view --json tagName --jq '.tagName' > "$CURRENT_TAG_FILE" 2>"$GH_ERR_FILE"; then
            if grep -q "release not found" "$GH_ERR_FILE"; then
              CURRENT="0.0.0"
              echo "No existing releases, starting from 0.0.0"
            else
              echo "::error::gh release view failed: $(cat "$GH_ERR_FILE")"
              exit 1
            fi
          else
            CURRENT=$(sed 's/^v//' "$CURRENT_TAG_FILE")
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Validate version components are numeric
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid version components: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH (from $CURRENT)"
            exit 1
          fi

          case "$BUMP_TYPE" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            *) echo "::error::Unknown bump type: $BUMP_TYPE"; exit 1 ;;
          esac

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEXT ($BUMP_TYPE)"

      - name: Check idempotency
        if: steps.check_plugin.outputs.changed == 'true'
        id: idempotency
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog from PR body
        if: steps.check_plugin.outputs.changed == 'true' && steps.idempotency.outputs.exists == 'false'
        id: changelog
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
          BODY_FILE: ${{ steps.tmpfiles.outputs.pr_body }}
          RELEASE_NOTES_FILE: ${{ steps.tmpfiles.outputs.release_notes }}
        run: |
          # Extract content between ## Changelog and next ## heading
          CHANGELOG=""
          if [ -f "$BODY_FILE" ] && [ -s "$BODY_FILE" ]; then
            CHANGELOG=$(awk '/^## Changelog/{found=1; next} /^## /{if(found) exit} found{print}' "$BODY_FILE")

            # Trim leading/trailing whitespace
            CHANGELOG=$(echo "$CHANGELOG" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          fi

          # Fallback to PR title if no changelog section or empty
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- $PR_TITLE"
          fi

          # Write release notes (just the body, no heading)
          echo "$CHANGELOG" > "$RELEASE_NOTES_FILE"

      - name: Create GitHub Release
        if: steps.check_plugin.outputs.changed == 'true' && steps.idempotency.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.tmpfiles.outputs.release_notes }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RELEASE_NOTES_FILE"

      - name: Post to Discord
        if: steps.check_plugin.outputs.changed == 'true' && steps.idempotency.outputs.exists == 'false'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.tmpfiles.outputs.release_notes }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set, skipping Discord notification"
            exit 0
          fi

          BODY=$(cat "$RELEASE_NOTES_FILE")
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          RELEASE_URL="${REPO_URL}/releases/tag/${TAG}"

          # Truncate body to 1900 chars for Discord's 2000 char limit
          if [ ${#BODY} -gt 1900 ]; then
            BODY="${BODY:0:1897}..."
          fi

          MESSAGE=$(printf '**Soleur %s released!**\n\n%s\n\nFull release notes: %s' \
            "$TAG" "$BODY" "$RELEASE_URL")

          PAYLOAD=$(jq -n \
            --arg content "$MESSAGE" \
            --arg username "Sol" \
            --arg avatar_url "https://raw.githubusercontent.com/jikig-ai/soleur/main/plugins/soleur/docs/images/logo-mark-512.png" \
            '{content: $content, username: $username, avatar_url: $avatar_url, allowed_mentions: {parse: []}}')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [[ "$HTTP_CODE" =~ ^2 ]]; then
            echo "Discord notification sent (HTTP $HTTP_CODE)"
          else
            echo "::warning::Discord notification failed (HTTP $HTTP_CODE)"
          fi
